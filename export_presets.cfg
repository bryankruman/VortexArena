; XonoticGodot export presets (T33 — ADR-0014; extended 2026-06 for the full release matrix).
; Four presets covering the ADR-0012 scope (Windows/Linux/macOS desktop clients + a headless server),
; mirroring the upstream binary topology (Base/Makefile: CLIENTBIN=xonotic-sdl + SERVERBIN=xonotic-dedicated):
;   preset.0  windows-client   — the Windows desktop client.
;   preset.1  linux-dedicated  — the headless server, exported in Godot's "dedicated server" mode
;                                (dedicated_server=true strips visual resources and applies the
;                                `dedicated_server` feature tag — the ADR-0012 server topology).
;                                NOTE: the mode is the BOOLEAN `dedicated_server` key, not an
;                                `export_filter` value (verified against the 4.6.3 editor's
;                                serialization: export_filter ∈ all_resources/scenes/resources/
;                                exclude/customized).
;   preset.2  linux-client     — the Linux desktop client (the playable Linux build).
;   preset.3  macos-client     — the macOS desktop client (.app bundle). BEST-EFFORT / UNVERIFIED:
;                                macOS export config is finicky (codesign + bundle id) and has never been
;                                run; the release workflow marks the macOS job continue-on-error so a macOS
;                                failure never blocks the Win/Linux release. `application/bundle_identifier`
;                                is REQUIRED or the export aborts. Architecture is "universal" (x86_64+arm64);
;                                if the .NET universal publish fails on CI, switch to "arm64" (matches the
;                                Apple-Silicon macos-latest runner) — see .github/workflows/release.yml.
; The game's Xonotic assets (assets/data/) are NOT in the pck — they are mounted by the game's own
; VFS from BESIDE the binary (the install-dir contract). Resolution is now executable-relative, not CWD —
; GameDemo.ResolveDataPath probes <exe-dir>/assets/data and, for the macOS .app, ../Resources/assets/data —
; so a double-clicked binary works regardless of CWD. tools/package.sh lays the data out accordingly.
; CAUTION: the editor normalizes this file (and drops these comments) on first use.

