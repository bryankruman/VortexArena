; XonoticGodot export presets (T33 — ADR-0014). Two presets mirroring the upstream two-binary
; distribution (Base/Makefile: CLIENTBIN=xonotic-sdl + SERVERBIN=xonotic-dedicated):
;   preset.0  windows-client   — the desktop client.
;   preset.1  linux-dedicated  — the headless server, exported in Godot's "dedicated server" mode
;                                (dedicated_server=true strips visual resources and applies the
;                                `dedicated_server` feature tag — the ADR-0012 server topology).
;                                NOTE: the mode is the BOOLEAN `dedicated_server` key, not an
;                                `export_filter` value (verified against the 4.6.3 editor's
;                                serialization: export_filter ∈ all_resources/scenes/resources/
;                                exclude/customized).
; The game's Xonotic assets (assets/data/) are NOT in the pck — they are mounted by the game's own
; VFS from beside the binary (the CWD contract — see tools/package.sh + run-dedicated.sh).
; CAUTION: exporting has not been exercised yet (no templates were installed when these were
; authored); the editor normalizes this file (and drops these comments) on first use.

[preset.0]

name="windows-client"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="assets/*"
export_path="dist/windows-client/XonoticGodot.exe"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
binary_format/architecture="x86_64"
codesign/enable=false
application/modify_resources=true
application/icon=""
application/console_wrapper_icon=""
application/icon_interpolation=4
application/file_version=""
application/product_version=""
application/company_name=""
application/product_name="XonoticGodot"
application/file_description="XonoticGodot client"
application/copyright=""
application/trademarks=""
application/export_angle=0
application/export_d3d12=0
application/d3d12_agility_sdk_multiarch=true
ssh_remote_deploy/enabled=false
dotnet/include_scripts_content=false
dotnet/include_debug_symbols=true
dotnet/embed_build_outputs=false

[preset.1]

name="linux-dedicated"
platform="Linux"
runnable=true
advanced_options=false
dedicated_server=true
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="assets/*"
export_path="dist/linux-dedicated/xonoticgodot-dedicated.x86_64"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.1.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
binary_format/architecture="x86_64"
ssh_remote_deploy/enabled=false
dotnet/include_scripts_content=false
dotnet/include_debug_symbols=true
dotnet/embed_build_outputs=false
