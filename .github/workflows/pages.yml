name: Deploy docs to Pages

# Publishes the GitHub Pages site:
#   /                -> planning/upstream-watch/LEDGER.html (regenerated from LEDGER.yaml)
#   /balance.html    -> planning/reference/xonotic-balance-history.html
#   /physics.html    -> planning/reference/xonotic-physics-history.html

on:
  push:
    branches: [main]
    paths:
      - planning/upstream-watch/LEDGER.yaml
      - planning/reference/xonotic-balance-history.html
      - planning/reference/xonotic-physics-history.html
      - tools/upstream-ledger-html.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install pyyaml
      - name: Generate LEDGER.html from LEDGER.yaml
        run: python tools/upstream-ledger-html.py
      - name: Assemble site
        run: |
          mkdir -p _site
          cp planning/upstream-watch/LEDGER.html _site/index.html
          cp planning/reference/xonotic-balance-history.html _site/balance.html
          cp planning/reference/xonotic-physics-history.html _site/physics.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
