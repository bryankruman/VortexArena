# CI for the XonoticGodot port (T33 — see planning/decisions/ADR-0014-ci-packaging-distribution.md).
#
# Topology:
#   test       — always: restore + run the full xUnit suite (no Godot, no assets; the ~18 real-data
#                test classes self-skip without assets/data, so CI green proves LESS than a local
#                `ci/ci.sh` run with assets mounted — that stays the authoritative gate).
#   build-host — always: compile the Godot host project (XonoticGodot.csproj) from a clean clone with
#                NO Godot editor installed — proves the Godot.NET.Sdk/GodotSharp 4.6.3 restore works
#                purely from nuget.org.
# Export + packaging + GitHub Releases live in a SEPARATE workflow (.github/workflows/release.yml),
# triggered on `v*` tags (and workflow_dispatch). Keeping the heavy Godot export off this per-push gate is
# deliberate (ADR-0014): the mono export templates are ~1 GB and the data is ~1.5 GB.
#
# The one repo-specific gotcha: nuget.config adds the Windows dev machine's Godot editor nupkgs folder
# as a package source ("godot-editor"). On a Linux runner that path doesn't exist and NuGet hard-fails
# on a missing local source — and the MSBuild SDK resolver for `Sdk="Godot.NET.Sdk/4.6.3"` reads the
# same config. Every job therefore removes that source FIRST. Godot.NET.Sdk 4.6.3 / GodotSharp 4.6.3
# are published on nuget.org (verified 2026-06), so everything restores from there.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  DOTNET_NOLOGO: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  # Run the Node-20 JS actions on Node 24 now (documented opt-in; no-op once Node 24 is the default).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Tests (libraries, no Godot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x" # global.json: 8.0.0 + rollForward latestMajor (matches the dev machine)

      - name: Drop the Windows-only Godot editor NuGet source
        run: dotnet nuget remove source godot-editor --configfile nuget.config

      - name: Restore
        run: dotnet restore tests/XonoticGodot.Tests/XonoticGodot.Tests.csproj

      - name: Test
        run: >
          dotnet test tests/XonoticGodot.Tests/XonoticGodot.Tests.csproj
          -c Debug --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults

  build-host:
    name: Build Godot host (nuget.org SDK restore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Drop the Windows-only Godot editor NuGet source
        run: dotnet nuget remove source godot-editor --configfile nuget.config

      - name: Build the Godot host project
        run: dotnet build XonoticGodot.csproj -c Debug
