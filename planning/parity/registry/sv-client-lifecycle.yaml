unit: sv-client-lifecycle
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-27"
summary:
  feature_count: 22
  worst_gaps:
    - "(NEW-GAP 2026-06-27 drift, values) idle/spectator cvar DEFAULTS diverge from Base out of the box: sv_maxidle_playertospectator (Base 60, port 0 → port never moves an idle player to spec), sv_maxidle_minplayers (Base 2, port 0), and g_maxplayers_spectator_blocktime (Base 10, port 5 → the sv_spectate=0 grace is halved). All three are read live; the machinery is correct but the numeric defaults are wrong. frame.idle_kick + frame.spectator_kick values faithful->partial."
    - "(RESOLVED 2026-06-27 drift) frame.name_and_version — previously all-missing — is now FULLY ported and LIVE. PlayerFrameNameAndGodMode (GameWorld.cs:1985, called from PlayerFrameIdleAll :1877 once per server frame per real client) does the line-for-line client.qc:2900-2955 block: sv_name_maxlength (64) visible-length truncation + ^7 (TruncateVisible honoring color codes) + 'name truncated' sprint, invisible-name → Player#<id> + 'invisible names not allowed' sprint, the :name: GameLog line (netname_previous assume-unchanged guard), and INFO_GODMODE_OFF when FL_GODMODE drops while max_armorvalue is set. The version-nag is ALSO ported: version_nagtime is armed at connect (ClientManager.cs:229 = Now+10+random()*10, exact Base formula) and Commands.CheckClientVersion (Commands.cs:427), fired from PlayerPreThink (GameWorld.cs:2159-2166), sends INFO_VERSION_BETA/OUTDATED/OLD by comparing the client's replicated g_xonoticversion (sent via the internal `clientversion` command, Commands.cs:3248) against the server's, with the git/autobuild beta branch. Only residual: the QC ignore_list_send interleave is a separate ignore-list feature (still deferred)."
    - "Join queue + team-selection ordering (queuePlayer / TeamBalance_JoinBestTeam priority pass, queued-team dibs conflict) not modeled: in team modes the queued-team conflict resolution and best-team-by-skill ordering are absent; PutPlayerInServer's own wants_join>0 / bot_forced_team / TeamBalance_JoinBestTeam team-assign is also not run (the port pre-assigns at connect only). (Wave-2 added the JOIN_PLAY / JOIN_PLAY_TEAM notification tail; the queue-conflict / ANNCE_BEGIN branches stay deferred.)"
    - "joinAllowed is reduced to MIN_SPEC_TIME + lockteams + forced-spectator + playban + a gametype gate: version-mismatch, g_maxping, and the queue/nJoinAllowed (g_maxplayers/GetPlayerLimit/bots_would_leave) capacity gate are still missing — a mismatched/high-ping/over-cap client can still join, and no CENTER_JOIN_PREVENT*/PING/VERSIONMISMATCH centerprints fire."
    - "PRESSED_KEYS server-side is now FIXED (GetPressedKeys ported + live in OnPlayerPostThink, observer-clear, SpectateCopy inherit); the only residual is the net layer — Player.PressedKeys is not in the owner-state protocol and PressedKeysPanel.PressedKeysOverride is never fed, so a SPECTATED player's keys don't reach the client HUD."
    - "(RESOLVED 2026-06-25 drift) sv_maxidle idle-kick / move-to-spec / sv_spectate=0 spectator-kick / alivetime AFK-gate are now FULLY ported and LIVE (GameWorld.PlayerFrameIdleAll, :1701, run every server frame from OnStartFrame; activity tracker at :1971). Idle countdown bangs (SND TALK2 via Play2), CENTER_DISCONNECT_IDLING / CENTER_MOVETOSPEC_IDLING, INFO_QUIT_KICK_IDLING / MOVETOSPEC_IDLING(_QUEUE), SPECTATE_WARNING + INFO_QUIT_KICK_SPECTATING all fire. Only the dedicated-server sv_maxidle_slots free-slot threshold is unimplemented (no engine maxclients in the headless core)."
    - "No server->client welcome channel: clientstuff/FixClientCvars/cl_jumpspeedcap_min-max/cl_shootfromfixedorigin stuffcmds, clientversion request, _teams_available, sv_notice_join/SendWelcomeMessage MOTD, Send_NextMap_To_Player, ClientInit_misc per-client init entity, playban/chatban, model_randomizer — none modeled. (Handicap_Initialize IS now wired in the spawn path.)"
    - "PutObserverInServer still omits SelectObservePoint/observe-spawn placement, vote/ready recount, the one-shot SPECTATE_WARNING block, RemoveGrapplingHooks/Portal_ClearAll, and the is_forced/use_spawnpoint signature. (The PlayerFrame sv_spectate-disabled spectator kick — SPECTATE_WARNING / INFO_QUIT_KICK_SPECTATING — is NOW ported as a separate row, frame.spectator_kick.)"
    - "UpdateChatBubble (chat/minigame-busy bubble over a typing player) is not modeled; version nag, nameless/too-long/invisible-name enforcement (sv_name_maxlength), GOD MODE info, and the PlayerPreThink misc dispatch (PlayerUseKey edge as a unit, SetZoomState, target_voicescript_next) are missing or scattered (the deferred teamkill-complaint voice timer IS now driven from the regen frame)."
  wave6c_fixes:
    - "spawn.spawn_shield: the (!sv_ready_restart_after_countdown && time < game_starttime) countdown extension is NOW applied (SpawnSystem.cs:761-782) — shield + pauserotarmor/health + pauseregen rolled forward by game_starttime-time, fuel rot deliberately NOT extended, matching Base client.qc:665-671. logic partial->faithful, timing partial->faithful."
    - "dead.respawn_countdown_announce: ShowRespawnCountdown is NOW ported (GameWorld.cs:2751) and called from DeadPlayerThink (GameWorld.cs:2733): the 10-9-8 NUM_RESPAWN announcer decrements RespawnCountdown per whole second with the 0.5s overlap guard, gated on the (default-disabled, opt-in) announcer's Enabled flag. all dims missing->faithful, liveness na->live."
    - "dead.respawn_state_machine: DeadPlayerThink now calls ShowRespawnCountdown each tick. presentation partial->faithful."
    - "frame.player_powerups: player_powerups is now a faithful port — EF_NODEPTHTEST clear+set, g_fullbrightplayers, player_powerups_remove_all-on-death, the full 4-case superweapon state machine with CENTER_SUPERWEAPON_LOST/BROKEN/PICKUP + INFO_SUPERWEAPON_PICKUP broadcast + play_countdown(SND_POWEROFF). Only MF_ROCKET jetpack modelflag is dropped (no modelflag channel; cosmetic). logic partial->faithful, presentation missing->faithful, audio missing->faithful."
    - "frame.player_regen: the PlayerRegen hook now passes ALL tuning slots (max_mod/regen_mod/rot_mod/limit_mod + the 6 per-health regen/rot/stable overrides) and reads them back — a mutator that RETUNES regen (not just disables) is now honored. The last residual gap is closed; row was already faithful."
    - "disconnect.client_disconnect: now also runs vehicle exit (VHEF_RELEASE), player_powerups_remove_all (poweroff sound), and the MUTATOR_CALLHOOK(ClientDisconnect) generic hook + the gametype MakePlayerObserver/RemovePlayer objective drop + status-effect clear. Row stays logic:partial (ignore-list / chatbubble / waypoint / ready-vote-recount cleanups still absent) but materially closer."
  drift_2026_06_25_reverify:
    - "frame.idle_kick + frame.spectator_kick: BOTH subsystems — previously all-missing — were ported since the last audit and are now LIVE in GameWorld.PlayerFrameIdleAll (:1701), run once per server frame from OnStartFrame, plus the parm_idlesince activity tracker in OnClientMove (:1971, the sys_phys_monitor port). idle_kick: sv_maxidle kick + sv_maxidle_playertospectator move-to-spec (with the WantsJoin join-queue distinction) + sv_maxidle_minplayers reset + the 30s alivetime AFK-gate (AdvanceAliveStart) + the per-second SND TALK2 countdown bang via SoundSystem.Play2 (2D, idle-client only) + CENTER_DISCONNECT_IDLING/MOVETOSPEC_IDLING + INFO_QUIT_KICK_IDLING/MOVETOSPEC_IDLING(_QUEUE). spectator_kick: sv_spectate==0 → SPECTATE_WARNING (MSG_MULTI) then INFO_QUIT_KICK_SPECTATING + ClientDisconnect after the g_maxplayers_spectator_blocktime (5s) grace. all dims missing->faithful, liveness na->live on both rows. The ONLY residual is the dedicated-server sv_maxidle_slots free-slot threshold (no engine maxclients in the headless core — cvars read, gate skipped)."
    - "frame.pressed_keys: the server-authoritative GetPressedKeys is NOW ported and LIVE — PlayerFrameLogic.GetPressedKeys (PlayerFrameLogic.cs:281) is called from OnPlayerPostThink (GameWorld.cs:1894) every server frame for a live player, with the IS_DUCKED held-crouch workaround; the observer branch clears PRESSED_KEYS via ClearPressedKeys (GameWorld.cs:1884); and SpectateCopy inherits the spectatee's bits (ClientManager.cs:631). logic partial->faithful, timing na->faithful, liveness partial->live. presentation STAYS partial: Player.PressedKeys is not in the owner-state net protocol and PressedKeysPanel.PressedKeysOverride is still never set, so a spectated player's keys don't reach the client HUD (the local-player panel already works from client bind state)."
    - "frame.drown_player: the surfaced-after-out-of-air gasp NOW plays playersound_gasp — DrownPlayer's surface branch calls SoundSystem.PlayPlayerSound(p, \"gasp\", ...) when AirFinished was set and < time (PlayerFrameLogic.cs:236-240), the same per-model voice resolution as the pain/teamkill voices; gasp is a real player-sound id. audio missing->faithful; the row is now fully faithful with no gaps."
    - "connect.fix_client_cvars_welcome: a PARTIAL welcome channel now exists on the live connect path (InfraClientConnect, GameWorld.cs:1192) — the campaign welcome level-num (SendCampaignWelcome, GameWorld.cs:1231/1288, QC SendWelcomeMessage campaign branch) and the grappling-hook BuildGameplayTipsString tip (GameWorld.cs:1239-1248) are surfaced to the connecting client. logic/presentation missing->partial, liveness na->partial. The bulk stays absent: FixClientCvars cvar push, clientstuff, cmd clientversion, set _teams_available, the MOTD/hostname/map/mutators message, ClientInit_misc, Send_NextMap_To_Player."
  drift_2026_06_27_reverify:
    - "frame.idle_kick (NEW-GAP, values regression): the port's idle cvar DEFAULTS diverge from Base. Base autocvar source defaults (server/client.qh:38-39): sv_maxidle_minplayers=2, sv_maxidle_playertospectator=60; the shipped xonotic-server.cfg further sets sv_maxidle_alsokickspectators 1 and sv_maxidle_playertospectator 60. The port (Cvars.cs:349-351) ships sv_maxidle_playertospectator=0, sv_maxidle_minplayers=0, sv_maxidle_alsokickspectators=0 — and they ARE read live (GameWorld.cs:1853-1856). So out-of-the-box the port NEVER moves an idle player to spectator (Base does after 60s), and the minplayers floor differs (Base needs >=2 humans before the idle kick arms; port arms at 0). The previous audit recorded { base:'0', port:'0', match:true } for both — WRONG. values faithful->partial. logic/timing/liveness stay faithful/live (the machinery is correct; only the numeric defaults are off)."
    - "frame.spectator_kick + observer.put_observer_in_server (NEW-GAP, values): g_maxplayers_spectator_blocktime — Base ships 10 (xonotic-server.cfg:33; source autocvar has no inline default = 0), the port ships 5 (Cvars.cs:355) and reads it live (GameWorld.cs:1856). The spectator_kick row claimed { base:'5 s grace', port:'5 s', match:true } — the Base value is 10, not 5, so port mismatches. spectator_kick values faithful->partial; the observer row's blocktime constant (was base:'used for SPECTATE_WARNING', match:false) is corrected to the concrete 10-vs-5 mismatch. The spectator-kick grace is therefore HALF the Base duration out of the box."
    - "frame.name_and_version: FIXED — previously all-missing, now FULLY ported and LIVE. PlayerFrameNameAndGodMode (GameWorld.cs:1985) is called once per server frame per real client from PlayerFrameIdleAll (:1877), a line-for-line port of client.qc:2900-2955: sv_name_maxlength (default 64, matches Base) visible-length truncation + ^7 append (TruncateVisible counts only non-color glyphs) + the 'name truncated' warning sprint; isInvisibleString → Player#<id> rename + 'invisible names not allowed' sprint; the :name: GameLog.NameChange line gated on the netname_previous assume-unchanged guard + sv_eventlog; and INFO_GODMODE_OFF (absorbed-damage report + max_armorvalue clear) when FL_GODMODE drops. The version-nag is ALSO ported and LIVE: version_nagtime armed at ClientConnect (ClientManager.cs:229 = Now+10+random()*10, the exact Base version_nagtime formula) and Commands.CheckClientVersion (Commands.cs:427) fired from PlayerPreThink (GameWorld.cs:2159-2166); it reads the client's replicated g_xonoticversion (sent via the internal `clientversion` command, Commands.cs:3248, fire-once), runs the git/autobuild beta branch + vercmp, and sends INFO_VERSION_BETA/OUTDATED/OLD. all dims missing->faithful, liveness na->live (4 fixes). Build verified (server project compiles clean). Only residual: the QC ignore_list_send interleave (a separate ignore-list feature)."
    - "connect.fix_client_cvars_welcome: the welcome channel EXPANDED again — the non-campaign branch is now wired (SendMutatorsWelcome, GameWorld.cs:1387, the LIVE consumer of MutatorActivation.BuildMutatorsPrettyString → 'Active modifications:' line), plus the g_mutatormsg server mutator message and the sv_motd MOTD (with \\n-escape expansion), and the offhand-blaster gameplay tip (GameWorld.cs:1314) alongside the existing campaign + grappling-hook tips. Dimension floor stays logic/presentation:partial, liveness:partial (no dimension flip — the row was already partial), but materially more of SendWelcomeMessage is now delivered. Still absent: FixClientCvars cvar-push stuffcmd, clientstuff, set _teams_available, ClientInit_misc per-client init entity, Send_NextMap_To_Player."
    - "connect.client_connect: the version_nagtime constant is now ported (ClientManager.cs:229) — constant match flips false->true. Row dimensions unchanged (values already faithful); the connect-side version-nag arming is now the live seed for the frame.name_and_version version-nag."
features:
  - id: sv-client-lifecycle.connect.client_connect
    name: "ClientConnect: accept a client as an observer"
    layer: [authority]
    base_refs:
      - "server/client.qc:ClientConnect"
    port_refs:
      - "src/XonoticGodot.Server/ClientManager.cs:ClientConnect"
      - "src/XonoticGodot.Server/GameWorld.cs:InfraClientConnect"
      - "game/net/ServerNet.cs:DriveConnect (admit ~1054)"
    constants:
      - { name: "MIN_SPEC_TIME", base: "1 s", port: "1 s (ClientManager.MinSpecTime)", match: true }
      - { name: "version_nagtime", base: "time + 10 + random()*10", port: "Now + 10 + random()*10 (ClientManager.cs:229)", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Connect-side server->client channel partly deferred (see connect.fix_client_cvars_welcome row): no clientstuff/FixClientCvars/_teams_available stuffcmds, no Handicap_Initialize-here/model_randomizer, no Send_NextMap. (The version_nagtime arming, the `clientversion` request handler, the MOTD/g_mutatormsg/mutators welcome lines, and playban/chatban ARE now wired.)"
      - "Player_DetermineForcedTeam / forced-team-otherwise spectator routing IS now wired (ClientManager.cs:220 DetermineForcedTeam), with team pre-assigned via AssignBestTeam for team games."
    verification:
      - { kind: code, ref: "game/net/ServerNet.cs:1054 ClientConnect admit; ClientManager.cs:149-222", result: pass }
    confidence: high
    notes: "Connect is LIVE and registers the client everywhere (entity table, sim, scores, roster); fires ban/event-log/stats/anticheat/timeout/CHAT_CONNECT and ends in the QC observer-on-connect invariant (IsObserver, FRAGS_SPECTATOR, MOVETYPE_NONE/SOLID_NOT). Bots auto-Join at connect."

