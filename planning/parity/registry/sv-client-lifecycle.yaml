      - "src/XonoticGodot.Server/GameWorld.cs:SendCampaignWelcome (~1288, campaign branch of SendWelcomeMessage)"
    constants: []
    status:
      logic: partial
      values: missing
      timing: missing
      presentation: partial
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
