last_audited: "2026-06-27"
summary:
  feature_count: 21
  worst_gaps:
    - "Intermediate/defrag checkpoints unimplemented (target_checkpoint/trigger_race_checkpoint are no-ops for CTS): no ordered progress, no 'went backwards' penalty, no per-cp splits. The Race port has per-checkpoint split records; CTS remains a single start->stop course."
    - "No CTS bot role (havocbot_role_cts): bots are not routed to race-checkpoint waypoints, so they do not run the CTS course."
    - "Per-player race bookkeeping is only partly ported: PlayerSpawn (run-clock reset + checkpoint=-1) and MakePlayerObserver (FRAGS_PLAYER_OUT_OF_GAME + checkpoint=-1) are now live, but there are still no ClientConnect/PutClientInServer/AbortSpeedrun hooks (race_SendAll, race_RetractPlayer respawn branch, g_allow_checkpoints practice mode)."
    - "FIXED since last audit (2026-06-27): cts.mode.register_latch values partial->faithful — the timelimit=20 gametype default (now asserted at GameWorld:3055-3056 when unset) and the MUTATOR_ONADD GameRules_limit_score(0)/limit_lead(0) clears (now fraglimit=0/leadlimit=0 at Cts.cs:218-219) are both modeled and match Base; only the non-gameplay 'cloaked'/m_generate_mapinfo menu+mapinfo-listing surface remains."
    - "FIXED earlier (2026-06-25): the .race_movetime per-frame run-clock accumulator is ported+live in OnPlayerPhysics and read at FinishStage (deterministic run clock; was wall-clock). independent_players=1 is an authoritative latch read live by the damage independent-block + score rules. MakePlayerObserver (FRAGS_PLAYER_OUT_OF_GAME) is ported+live."
