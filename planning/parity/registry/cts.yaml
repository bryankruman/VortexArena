summary:
  feature_count: 21
  worst_gaps:
    - "Race timer / split / PB-server-best HUD panel exists but is never fed for CTS — no running clock, no checkpoint split, no medal flash (racetimer still in StartHiddenIds, no feeder)."
    - "No finish/record notifications: Cts.LastRecord is computed but never consumed. The full INFO_RACE_* sender (Race.SendRecordNotification) is STILL a private method on Race — CTS got no equivalent, so the runner still never sees set/improved/broke-record or RACE_FINISHED."
    - "No forced keyboard-movement quantization; run clock is still wall-clock (Api.Clock.Time), not the QC per-frame .race_movetime accumulator (determinism + fairness)."
    - "Intermediate/defrag checkpoints unimplemented (target_checkpoint/trigger_race_checkpoint are no-ops for CTS): no ordered progress, no 'went backwards' penalty, no per-cp splits."
    - "No CTS race bookkeeping (race_PreparePlayer/RetractPlayer, FRAGS_PLAYER_OUT_OF_GAME, checkpoint=-1), no speedaward, no GetRecords listing, no CTS bot role."
