summary:
  feature_count: 21
  worst_gaps:
    - "Intermediate/defrag checkpoints unimplemented (target_checkpoint/trigger_race_checkpoint are no-ops for CTS): no ordered progress, no 'went backwards' penalty, no per-cp splits. The Race port has per-checkpoint split records; CTS remains a single start->stop course."
    - "Run clock is still wall-clock (Api.Clock.Time), not the QC per-frame .race_movetime accumulator (determinism). Forced keyboard-movement quantization IS now ported+live (PlayerPhysics hook), but cl_movecliptokeyboard 2 stuffcmd + .race_movetime as the run clock are still absent."
    - "No CTS race bookkeeping (race_PreparePlayer/RetractPlayer, FRAGS_PLAYER_OUT_OF_GAME, checkpoint=-1), no speedaward, no CTS bot role."
    - "FIXED since last audit (2026-06-25): forced keyboard-movement quantization (PlayerPhysics) is now live; reset_map_global handler (ResetMapGlobal) is wired live; the per-map records/rankings console reply (GetRankings) now reads the RaceRecords CTS table live. Shotgun-only is start-loadout only (no per-frame strip), and FilterItem uses the real ItemIsLoot flag."
