unit: cts
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 21
  worst_gaps:
    - "Race timer / split / PB-server-best HUD panel exists but is never fed for CTS — no running clock, no checkpoint split, no medal flash."
    - "No finish/record notifications: LastRecord is computed but never consumed; player never sees set/improved/broke-record or RACE_FINISHED."
    - "No CTS combat rules: self/fall damage not suppressed, players not restricted to the Shotgun, weapons throwable/droppable."
    - "No forced keyboard-movement quantization; run clock is wall-clock, not the QC per-frame .race_movetime accumulator (determinism + fairness)."
    - "Intermediate/defrag checkpoints unimplemented (target_checkpoint/trigger_race_checkpoint are no-ops for CTS): no ordered progress, no 'went backwards' penalty, no per-cp splits."
