    notes: "Wave-2 built TWO of the four missing layers (the alpha network channel and the player-model render apply) — genuine, verified infrastructure. But the end-to-end chain is still broken: (a) the server never lowers player.Alpha (spawn/death hardcode 1f, ignoring the seed), and (b) the client net→render bridge (ClientEntityView) never maps the networked alpha onto the render entity. Either gap alone defeats the effect; both are present. Net status improved from all-missing to logic/presentation partial, but liveness stays dead (no live path produces a translucent player). The single highest-leverage fix is the one-line ClientEntityView Alpha map PLUS routing DefaultPlayerAlpha into the spawn/death alpha."

