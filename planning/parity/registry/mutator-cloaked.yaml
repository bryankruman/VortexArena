  worst_gaps:
    - "HEADLINE EFFECT WORKING (unchanged since Wave-5): with g_cloaked 1 players render semi-transparent end-to-end. The alpha seed lives in Common (MutatorHooks.DefaultPlayerAlpha/DefaultWeaponAlpha, set by FireSetDefaultAlpha at GameWorld.cs:569 worldspawn), server consumers read it (SpawnSystem.cs:591, DamageSystem.cs:629), and the client net->render bridge decodes NetEntityState.Alpha onto Entity.Alpha (ClientEntityView.cs:134) -> PlayerModel.ApplyAlpha. 0.25 round-trips faithfully via QuantizeAlpha (0.25->64/255=0.251)."
    - "STILL OPEN — secondary alpha consumers: no exterior/held weapon-entity alpha-follow (Base weaponsystem.qc:116-117,170-171) and no vehicle-exit alpha restore (Base sv_vehicles.qc:814). These are minor relative to the now-working player body alpha."
