      - "src/XonoticGodot.Net/NetEntity.cs:96,132,177,231,272 EntityField.Alpha + NetEntityState.Alpha encode/decode — networking present"
      - "game/net/ClientEntityView.cs:135 e.Alpha = s.Alpha switch { 0=>1f, 255=>-1f, _=>s.Alpha/255f } — client net->render bridge WIRED"
      - "game/client/PlayerModel.cs:160,217 ApplyAlpha(e.Alpha) — render present + fed the decoded alpha"
    constants:
      - { name: "spawn: player.alpha = default_player_alpha", base: "client.qc:788", port: "p.Alpha = MutatorHooks.DefaultPlayerAlpha (SpawnSystem.cs:640)", match: true }
      - { name: "spawn: exteriorweapon.alpha = default_weapon_alpha", base: "client.qc:790", port: "none (no exterior-weapon entity alpha-follow)", match: false }
      - { name: "death/corpse: this.alpha = default_player_alpha", base: "player.qc:540", port: "victim.Alpha = MutatorHooks.DefaultPlayerAlpha (DamageSystem.cs:687)", match: true }
      - { name: "weapon entity follows owner alpha", base: "weaponsystem.qc:116-117,170-171", port: "none", match: false }
      - { name: "vehicle-exit restores player.alpha = default_player_alpha", base: "sv_vehicles.qc:814", port: "none", match: false }
      - { name: ".alpha networked to clients (wire channel)", base: "DP networked render field (entity state)", port: "PRESENT: ServerNet QuantizeAlpha + NetEntity EntityField.Alpha (byte, 0=opaque sentinel; 1..254 = alpha/255)", match: true }
      - { name: ".alpha decoded onto the render entity (net->render bridge)", base: "DP applies networked alpha to the rendered ent", port: "PRESENT: ClientEntityView.DriveEntity:135 copies NetEntityState.Alpha -> Entity.Alpha (0->1f, 255->-1f hidden, else byte/255)", match: true }
