summary:
  feature_count: 6
  worst_gaps:
    - "The cloaked effect STILL does not appear in-game, despite Wave-2 building most of the plumbing. The SetDefaultAlpha hook now fires live at worldspawn and seeds GameWorld.DefaultPlayerAlpha=0.25 (genuine fix), and a full alpha network channel + a PlayerModel render path were added — BUT the chain is broken in two places: (1) the spawn/death consumers STILL hardcode player.Alpha=1f and never read DefaultPlayerAlpha, so the server-side player alpha is never lowered; (2) the client net→render bridge (ClientEntityView.DriveEntity) does NOT copy the decoded NetEntityState.Alpha onto the render proxy Entity.Alpha, so even a correctly-set server alpha would render opaque. Result: players still render at full opacity with g_cloaked 1."
    - "Spawn/death do not consume the new seed: SpawnSystem.cs:524 sets p.Alpha=1f and DamageSystem.cs:618 sets victim.Alpha=1f — both still literal 1f, neither reads GameWorld.DefaultPlayerAlpha. (Cross-assembly: DefaultPlayerAlpha lives on the Server GameWorld while these run in Common — there is no seam wiring the seed down to the spawn/death code.)"
    - "Client bridge drops the alpha: ClientEntityView.DriveEntity (game/net/ClientEntityView.cs:117-159) maps Origin/Angles/Velocity/Frame/Skin/ModelIndex/Effects/Health/Team/Weapon/flags/StatusEffects onto the proxy Entity but has ZERO Alpha line. PlayerModel.ApplyAlpha(e.Alpha) is wired and real, but e.Alpha is always the default 1f."
    - "No BuildMutatorsPrettyString / MUT_CLOAKED contribution: the scoreboard/HUD active-mutators string still would not list 'Cloaked' (no mutator-pretty-string / active-mutators-bitmask mechanism in the port). UNCHANGED."
    - "No MENUQC metadata: still no describe text or create-game checkbox port for the cloaked mutator. UNCHANGED."
