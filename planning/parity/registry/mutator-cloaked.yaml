      - { kind: code, ref: "VERIFIED FIX (networking layer): NetEntity.cs adds EntityField.Alpha=1<<17 (line 89) + NetEntityState.Alpha (line 124) + diff/write/read (169/223/264); ServerNet.cs QuantizeAlpha(p.Alpha) at 1650 and QuantizeAlpha(e.Alpha) at 1730. The wire channel is real and live.", result: pass }
      - { kind: code, ref: "VERIFIED FAIL (client bridge): grep 'Alpha' in game/net/ClientEntityView.cs = NO matches. DriveEntity does not set e.Alpha from s.Alpha. So the decoded byte never renders.", result: fail }
      - { kind: code, ref: "VERIFIED (render path real but starved): PlayerModel.ApplyAlpha (PlayerModel.cs:217) maps Entity.Alpha → per-instance GeometryInstance3D.Transparency, called every frame from Pose (line 160). Correct and idempotent — but e.Alpha is always 1f (see bridge gap).", result: fail }
