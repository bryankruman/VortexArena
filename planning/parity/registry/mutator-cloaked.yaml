      - "STILL OPEN — server consumers ignore the seed: player spawn hardcodes p.Alpha=1f (SpawnSystem.cs:524) and PlayerDies hardcodes victim.Alpha=1f (DamageSystem.cs:618). Neither reads GameWorld.DefaultPlayerAlpha. (Structural barrier: DefaultPlayerAlpha is a Server-assembly GameWorld property; the spawn/death code lives in Common with no seam carrying the seed across.) So the server-side player alpha is never lowered to 0.25 — the cloaked value never enters the entity state at all."
      - "NEW BROKEN LINK — client bridge drops alpha: ClientEntityView.DriveEntity (ClientEntityView.cs:117-159) copies Origin/Angles/Velocity/Frame/Skin/ModelIndex/Effects/Health/Team/Weapon/flags/StatusEffects onto the render proxy Entity but has NO line for Alpha. The decoded NetEntityState.Alpha (real, on the wire) is stored on RemoteEntity.State and read by shownames/radar, but never reaches Entity.Alpha. PlayerModel.ApplyAlpha(e.Alpha) is therefore always fed the default 1f → opaque. This is the gating defect for the whole effect even if the server side were fixed."
