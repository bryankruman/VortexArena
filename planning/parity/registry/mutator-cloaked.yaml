    - "2026-06-25 DRIFT (FIX, full) — the create-game checkbox is ported AND now carries the VERBATIM cloaked.qc describe text as its tooltip (DialogMutators.cs:134-136). The earlier describe-text content gap is closed; only the presentation surface differs (tooltip vs a dedicated describe page — the port-wide infra pattern, no describe-page widget for any mutator)."
