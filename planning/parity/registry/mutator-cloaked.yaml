      - { kind: code, ref: "VERIFIED (networking layer present): NetEntity.cs has EntityField.Alpha=1<<17 (line 96) + NetEntityState.Alpha (line 132) + diff/write/read (177/231/272); ServerNet.cs QuantizeAlpha(p.Alpha) at 1830 and QuantizeAlpha(e.Alpha) at 1944. QuantizeAlpha (ServerNet.cs:2264) returns 0 for alpha>=1 (opaque sentinel), clamp(round(alpha*255),1,254) otherwise.", result: pass }
