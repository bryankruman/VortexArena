unit: mutator-cloaked
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 6
  worst_gaps:
    - "The cloaked effect is entirely DEAD: MutatorHooks.SetDefaultAlpha is a HookChain with two subscribers (CloakedMutator, RunningGunsMutator) but NOTHING anywhere calls SetDefaultAlpha.Call(...), so OnSetDefaultAlpha never runs. With g_cloaked 1 the port renders players at full opacity — the entire 'players mostly invisible' effect does not occur."
    - "No SetDefaultAlpha world-init driver: Base SetDefaultAlpha() (server/world.qc:105-112) is the free function that fires the hook at worldspawn and otherwise seeds default_player_alpha=g_player_alpha. The port's ApplyWorldspawn (GameWorld.cs) handles gravity/fog/cvars but never fires the alpha hook nor seeds a default alpha global."
    - "No consumer of the alpha: there is no default_player_alpha equivalent. OnSetDefaultAlpha writes a transient SetDefaultAlphaArgs struct whose PlayerAlpha/WeaponAlpha are read by no spawn/render code. Player spawn hardcodes p.Alpha = 1f (SpawnSystem.cs:524) and death hardcodes victim.Alpha = 1f (DamageSystem.cs:581)."
    - "No alpha networking/render for players: NetEntity (XonoticGodot.Net) has no per-entity alpha channel (only ModelIndex/Effects/StatusEffects/etc.) and PlayerModel.cs applies no transparency — there is no plumbing any player-opacity feature could ride on."
    - "No BuildMutatorsPrettyString / MUT_CLOAKED contribution: the scoreboard/HUD active-mutators string would not list 'Cloaked' (the port has no mutator-pretty-string / active-mutators-bitmask mechanism)."
    - "No MENUQC metadata: no describe text or create-game checkbox port for the cloaked mutator."
