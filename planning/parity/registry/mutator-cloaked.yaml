      - "src/XonoticGodot.Server/GameWorld.cs:511 MutatorActivation.Apply()"
    constants:
      - { name: "g_cloaked", base: "0 (mutators.cfg:563)", port: "0 (assets/.../mutators.cfg:563)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "VERIFIED: CloakedMutator.IsEnabled = Api.Cvars.GetFloat(\"g_cloaked\") != 0f (CloakedMutator.cs:22-23); MutatorActivation.Apply() called live at GameWorld.cs:511 (step 5b, before map entities spawn); Hook() Adds OnSetDefaultAlpha + reads g_balance_cloaked_alpha", result: pass }
      - { kind: value, ref: "VERIFIED: Base mutators.cfg:563 'set g_cloaked 0' == port assets mutators.cfg:563 (identical line+comment)", result: pass }
    confidence: high
    notes: "The mutator IS registered (auto-discovered via [Mutator]) and its handler IS subscribed on the live boot path when g_cloaked != 0. Only the effect downstream is dead (see set_default_alpha). Note: Base uses expr_evaluate(cvar_string) which parses expressions; port uses a simple != 0 float check — functionally equivalent for the stock '0'/'1' usage (campaign Stormkeep sets g_cloaked 1)."

  - id: mutator-cloaked.alpha.set_default_alpha
    name: "SetDefaultAlpha override — set player/weapon alpha from g_balance_cloaked_alpha"
    layer: [authority, presentation]
    base_refs:
      - "common/mutators/mutator/cloaked/sv_cloaked.qc:8-13 MUTATOR_HOOKFUNCTION(cloaked, SetDefaultAlpha)"
      - "server/world.qc:105-112 SetDefaultAlpha() (free fn that fires the hook / seeds default)"
      - "server/world.qh:72-73 default_player_alpha / default_weapon_alpha globals"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/CloakedMutator.cs:45 OnSetDefaultAlpha"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:394-403 SetDefaultAlphaArgs + SetDefaultAlpha chain"
    constants:
      - { name: "g_balance_cloaked_alpha", base: "0.25 (mutators.cfg:564)", port: "0.25 (CloakedMutator.Alpha default + read in Hook())", match: true }
      - { name: "default_player_alpha = alpha", base: "yes (world.qh global)", port: "writes args.PlayerAlpha (struct, unread)", match: false }
      - { name: "default_weapon_alpha = player alpha", base: "yes (world.qh global)", port: "writes args.WeaponAlpha (struct, unread)", match: false }
      - { name: "hook returns true (replaces default branch)", base: "true", port: "true (OnSetDefaultAlpha returns true)", match: true }
      - { name: "SetDefaultAlpha() world-init driver fires the hook", base: "world.qc:105-112, called at worldspawn", port: "no driver — chain never .Call'd", match: false }
    status:
      logic: stub
      values: faithful
      timing: missing
      presentation: missing
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEAD: MutatorHooks.SetDefaultAlpha.Call(...) is invoked nowhere in src/ or game/ (grep confirms only .Add/.Remove in CloakedMutator + RunningGunsMutator). The hook chain never fires, so OnSetDefaultAlpha never runs — with g_cloaked 1 the player/weapon opacity is unchanged (full)."
      - "ROOT CAUSE: the Base SetDefaultAlpha() free function (server/world.qc:105-112) — which fires the hook at worldspawn and, when no mutator handles it, seeds default_player_alpha = g_player_alpha (clamped to 1 if 0) and default_weapon_alpha = default_player_alpha — has no port equivalent. GameWorld.ApplyWorldspawn handles gravity/fog/map-cvars but never fires the alpha hook nor seeds a default alpha."
      - "Even if fired, the handler writes args.PlayerAlpha/args.WeaponAlpha into a transient SetDefaultAlphaArgs struct that no spawn/render/network code reads. There is no default_player_alpha global equivalent (see default_alpha_consumers)."
    verification:
      - { kind: code, ref: "VERIFIED: grep 'SetDefaultAlpha' across src/+game/ (excluding bin/obj) = only the struct/chain def (MutatorHooks.cs:391-403) + Add/Remove in CloakedMutator.cs:30/41 + RunningGunsMutator.cs:28/33 + the handler bodies. NO .Call site anywhere.", result: fail }
      - { kind: code, ref: "VERIFIED: GameWorld.cs grep for worldspawn/SetDefaultAlpha — ApplyWorldspawn (GameWorld.cs:2124+) sets gravity/fog/cvars only; no alpha hook fire, no default alpha seed.", result: fail }
      - { kind: value, ref: "VERIFIED: Base mutators.cfg:564 'g_balance_cloaked_alpha 0.25' == port; CloakedMutator.Alpha defaults 0.25f (line 17) and re-reads the cvar in Hook() (line 34, guarded a != 0)", result: pass }
    confidence: high
    notes: "The numeric value (0.25) is read correctly into CloakedMutator.Alpha, so values is faithful, but the logic is a stub (handler subscribed, chain never called) and the visible result is missing. liveness dead is the headline. The missing world-init driver is the structural root cause shared with running_guns and the g_player_alpha fallback."

  - id: mutator-cloaked.alpha.default_alpha_consumers
    name: "default_player_alpha / default_weapon_alpha applied at spawn, death, weapon entities, vehicle-exit; networked + rendered"
    layer: [authority, presentation]
    base_refs:
      - "server/client.qc:788,790 (PutClientInServer: player + exteriorweapon alpha)"
      - "server/player.qc:540 (PlayerDies: corpse alpha)"
      - "server/weapons/weaponsystem.qc:116-117,170-171 (weapon entity follows owner alpha)"
      - "common/vehicles/sv_vehicles.qc:814 (restore player.alpha on vehicle exit)"
      - "common/mutators/mutator/powerups/powerup/invisibility.qc:16-18 (Invisibility expiry restores default_player/weapon_alpha)"
    port_refs: []
    constants:
      - { name: "spawn: player.alpha = default_player_alpha", base: "client.qc:788", port: "p.Alpha = 1f hardcoded (SpawnSystem.cs:524)", match: false }
      - { name: "spawn: exteriorweapon.alpha = default_weapon_alpha", base: "client.qc:790", port: "none", match: false }
      - { name: "death/corpse: this.alpha = default_player_alpha", base: "player.qc:540", port: "victim.Alpha = 1f hardcoded (DamageSystem.cs:581)", match: false }
      - { name: "weapon entity follows owner alpha", base: "weaponsystem.qc:116-117,170-171", port: "none", match: false }
      - { name: "vehicle-exit restores player.alpha = default_player_alpha", base: "sv_vehicles.qc:814", port: "none", match: false }
      - { name: ".alpha networked to clients + rendered on model", base: "DP networked render field (entity state)", port: "NetEntity has no Alpha field; PlayerModel applies no transparency", match: false }
    status:
      logic: missing
      values: missing
      timing: missing
      presentation: missing
      audio: na
      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "There is no default_player_alpha/default_weapon_alpha equivalent. Player spawn hardcodes p.Alpha = 1f (SpawnSystem.cs:524) and PlayerDies hardcodes victim.Alpha = 1f (DamageSystem.cs:581) — neither reads a mutator-overridable default. The Invisibility-powerup expiry (PowerupsMutator.cs:170) also restores to hardcoded 1f, not default_player_alpha, so it would not compose with cloaked even if cloaked worked."
      - "No weapon-entity alpha-follow and no vehicle-exit alpha restore (Base weaponsystem.qc:116/170, sv_vehicles.qc:814) — no port equivalents."
      - "NetEntity (XonoticGodot.Net) has no per-entity alpha channel (confirmed: field list = EntNum/ModelIndex/Frame/Skin/Effects/Colormap/Health/Armor/Owner/Weapon/timers/StatusEffects, no Alpha) and PlayerModel.cs (game/client/PlayerModel.cs) applies no transparency/modulate, so even a correctly-set server-side player alpha would not reach or render on clients."
    verification:
      - { kind: code, ref: "VERIFIED: SpawnSystem.cs:524 'p.Alpha = 1f' (comment 'QC default_player_alpha'), DamageSystem.cs:581 'victim.Alpha = 1f' (both hardcoded, not mutator-overridable); Entity.Alpha exists (DamageEntityState.cs:123, default 1f) but is the only alpha state and is server-only.", result: fail }
      - { kind: code, ref: "VERIFIED: NetEntity.cs grep for alpha/opacity/transparent = no match; PlayerModel.cs grep for alpha/opacity/transparent/modulate = no match.", result: fail }
    confidence: high
    notes: "This is the missing infrastructure the cloaked (and running_guns, and Invisibility-powerup-render) effect depends on. The port's Entity.Alpha (DamageEntityState.cs:123, default 1f) exists server-side but is neither networked nor rendered for players."

