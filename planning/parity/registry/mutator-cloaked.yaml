summary:
  feature_count: 6
  worst_gaps:
    - "WAVE-5 CLOSED THE HEADLINE EFFECT: with g_cloaked 1 players now genuinely render semi-transparent end-to-end. Wave-5 (commit 023ba70) moved the alpha seed into Common (MutatorHooks.DefaultPlayerAlpha/DefaultWeaponAlpha, set by FireSetDefaultAlpha at GameWorld.cs:565 worldspawn), wired the server consumers (SpawnSystem.cs:575 and DamageSystem.cs:624 now read MutatorHooks.DefaultPlayerAlpha instead of hardcoding 1f), and — critically — wired the client net->render bridge that the prior audit flagged as the gating defect (ClientEntityView.cs:134 now decodes NetEntityState.Alpha onto Entity.Alpha; PlayerModel.Pose:160 calls ApplyAlpha(e.Alpha)). The 0.25 value round-trips faithfully through QuantizeAlpha (0.25->64/255=0.251)."
    - "STILL OPEN — secondary alpha consumers: no exterior/held weapon-entity alpha-follow (Base weaponsystem.qc:116-117,170-171) and no vehicle-exit alpha restore (Base sv_vehicles.qc:814). These are minor relative to the now-working player body alpha."
    - "STILL OPEN — Cloaked contributes nothing to the active-mutators pretty string. Wave-5 ADDED the general mechanism (MutatorBase.BuildMutatorsPrettyString virtual at GameplayBases.cs:206 + MutatorActivation.BuildMutatorsPrettyString chain runner at MutatorActivation.cs:101, used by MidairMutator), but CloakedMutator does NOT override it, no MUT_CLOAKED bit exists, AND the chain runner itself has no live caller (scoreboard/HUD never invokes it). So 'Cloaked' is still not displayed."
    - "STILL OPEN — no MENUQC metadata: still no describe text or create-game checkbox port for the cloaked mutator (general menu-mutator gap)."
