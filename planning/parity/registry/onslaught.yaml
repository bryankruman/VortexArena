unit: onslaught
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 17
  worst_gaps:
    - "onslaught_link map entities are never resolved into graph edges on the live BSP path: with no links every node stays shielded forever, so on a real map NO control point can be captured and NO generator damaged — the mode is non-functional in an actual match despite correct, live combat logic"
    - "No Onslaught notifications/sounds/particles are ever emitted (capture/build/under-attack/destroy/win cues registered as data but never called)"
    - "No CSQC presentation: no generator/control-point/icon models, no progressive damage models, no icon bob/spin/punch animation, no radar links, no objective death-cam"
    - "Stale hardcoded fallback values diverge from Base (gen 2000 vs 2500, cp 200 vs 1000, cp_regen 10 vs 20, round_timelimit fallback 0 vs 500) — masked only while the shipped cfg is loaded"
    - "CaptureShield (spinning shield model + push + blocked sound), proximity-decap, ons_Teleport / spawn_choose / spawn_at_* placement all NOT IMPLEMENTED"

