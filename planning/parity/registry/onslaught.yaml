  worst_gaps:
    - "No CSQC presentation: no generator/control-point/icon world models RENDERED on the client, no progressive damage-model swaps, no icon bob/spin/punch animation, no radar link lines, no objective death-cam (ons_camSetup), no generator explosion sequence, and no particle effects (EFFECT_SPARKS/CAP/RAGE/ROCKET_EXPLODE) or waypoint-sprite build/health bars. (Server-side the shield/icon/generator entities now carry a Model + EF_ADDITIVE + avelocity, but rendering them is still client-deferred.)"
    - "spawn_choose teleport-on-respawn is wired but DEAD: the OnPlayerSpawn hook teleports to player.GtOnsSpawnBy, but nothing ever SETS GtOnsSpawnBy (no click-radar HUD, no ons_spawn client command, no PlayerUseKey CP-to-CP teleport offer). The cvar-gated spawn_at_controlpoints / spawn_at_generator placement IS live (default OFF)."
    - "Bot Onslaught role filters by shield + team-neighbor off the live graph and skips CPs when a generator is attackable; residual: no waypoint-near-objective routing (navigation_routerating), no havocbot_attack_time throttle, no enemyplayers rating, no havocbot_ons_target teammate-cost balancing (timing partial)."
    - "FIXED this pass: (1) CaptureShield is now PORTED + LIVE (SpawnCaptureShield/ShieldTouchEntity) — the spinning push-shield entity, the enemy-push, ONS_DAMAGEBLOCKEDBYSHIELD play2, and the GENERATOR/CONTROLPOINT_SHIELDED center-print all fire on the live BSP path. (2) ons_Teleport + spawn_at_controlpoints/spawn_at_generator placement PORTED + wired via the live PlayerSpawn hook (teleport-on-respawn dead — see above). (3) icon-damaged spark sounds (ONS_SPARK1/2) now emit in IconThink (audio faithful)."

