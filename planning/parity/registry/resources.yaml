    divergence_rationale: null
    gaps:
      - "Base's SetResource hook reads back BOTH res_type (M_ARGV(8) entity) and amount (M_ARGV(9)) after the forbid check, so a mutator may rewrite the RESOURCE TYPE as well as the amount. The port's CallSetResource only rewrites the amount (ref float); res_type is fixed. No shipped mutator rewrites res_type, so latent. Unchanged by Wave-2."
