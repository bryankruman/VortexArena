summary:
  feature_count: 9
  worst_gaps:
    - "api.take: TakeResourceWithLimit STILL does NOT fire its own QC mutator hook (sv_resources.qc:211) — Resources.cs:175-181 reads `current`/clamps but never calls a ResourceHooks chain (only an explanatory comment). The plain TakeResource hook IS now wired (ResourceHooks.TakeResource + CallTakeResource at Resources.cs:163). No shipped mutator subscribes to any ResourceHooks chain, so the residual WithLimit-hook seam is latent."
