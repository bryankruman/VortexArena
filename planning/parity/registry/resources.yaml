unit: resources
category: item
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "regen.loop: PlayerRegen hook STILL carries only Player + the disable-bool — all 10 in/out tuning slots (max_mod/regen_mod/rot_mod/limit_mod + 6 health balance values) remain missing. max_mod scaling of the health regen/rot stable point is never applied; regen_mod/rot_mod speed scaling and limit_mod cap scaling are inert (limit_mod is not even a param of the port's RotRegen). Stock play unaffected (all mods=1); breaks any mutator that scales max HP or regen rate (handicap, BuffsMutator medic/buff regen). NOTE: the fuel/ITEM_FuelRegen/UNLIMITED_AMMO gating AND the vehicle-eject-before-DEATH_ROT gaps were CLOSED in Wave-2."
    - "api.take: TakeResource STILL omits the QC TakeResource mutator hook (sv_resources.qc:191); GiveResourceWithLimit STILL omits the QC GiveResourceWithLimit hook (sv_resources.qc:165). Wave-2 added only explanatory comments, no ResourceHooks chain. TakeResourceWithLimit is ported and formula-faithful (sv_resources.qc:205) and IS live — ItemPickupRules.GiveAmmoTo:246 calls it for the negative-amount drain branch, mirroring Base Item_GiveAmmoTo (items.qc:507). The three mutator-hook seams remain latent (no shipped mutator subscribes)."
    - "regen.pause_timers: warmup-countdown offset (game_starttime - time) STILL not added to the four primed spawn pause timers (SpawnSystem comment defers it: 'once the spawn path runs with a match-time handle'). Only observable if a player can regen/rot during the pre-match countdown."
features:
