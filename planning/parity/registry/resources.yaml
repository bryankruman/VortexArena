      - "common/resources/resources.qh:REGISTER_RESOURCE"
      - "common/resources/all.inc"
      - "common/resources/resources.qc:GetResourceType"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:ResourceType"
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:GetResource"
    constants:
      - { name: "resource order", base: "NONE,HEALTH,ARMOR,SHELLS,BULLETS,ROCKETS,CELLS,FUEL", port: "same enum order", match: true }
      - { name: "field mapping", base: ".health/.armorvalue/.ammo_shells/.ammo_nails/.ammo_rockets/.ammo_cells/.ammo_fuel", port: "Health/ArmorValue/AmmoShells/AmmoBullets/AmmoRockets/AmmoCells/AmmoFuel", match: true }
      - { name: "RES_AMOUNT_HARD_LIMIT", base: "999", port: "HardLimit 999", match: true }
      - { name: "RES_LIMIT_NONE", base: "-1", port: "LimitNone -1", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Resource metadata objects (ammo m_name/m_icon/m_color, fuel m_hidden) are not on a Resource object; ammo HUD coloring/labels are handled in the panel/items layer instead (cosmetic-equivalent)."
      - "Base networks ammo_fuel as a STAT (_STAT(FUEL)) and the others as legacy fields; the port networks all resources via Entity fields. Behaviorally equivalent for the HUD."
    verification:
      - { kind: code, ref: "Resources.cs enum + GetResource switch vs all.inc field map (verified against all.inc + resources.qh); untouched by Wave-2", result: pass }
    confidence: high
    notes: "QC field-pointer indirection (GetResourceField) replaced by a switch over typed Entity members. Verified the full REGISTER_RESOURCE order and field names match. Not changed by Wave-1/2."
