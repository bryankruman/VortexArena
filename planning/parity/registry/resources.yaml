      - "server/client.qc:661"
      - "common/resources/sv_resources.qc:138"
      - "common/physics/player.qc:837"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageEntityState.cs:PauseRegenFinished"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:317"
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:611"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:738"
    constants:
      - { name: "g_balance_pause_health_regen (on damage)", base: "5", port: "5", match: true }
      - { name: "g_balance_pause_health_regen_spawn", base: "0", port: "0", match: true }
      - { name: "g_balance_pause_health_rot_spawn", base: "5", port: "5", match: true }
      - { name: "g_balance_pause_armor_rot_spawn", base: "5", port: "5", match: true }
      - { name: "g_balance_pause_fuel_rot_spawn", base: "10", port: "10", match: true }
      - { name: "g_balance_pause_fuel_regen (jetpack/hook)", base: "2", port: "2", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "On spawn during the warmup countdown, Base extends each primed pause timer by (game_starttime - time) so timers don't elapse while frozen pre-match (client.qc:665-669). The port primes the four spawn pause timers (SpawnSystem.cs:611-614, defaults 0/5/5/10 verified) but does NOT add the countdown offset. Minor: only observable if a player can regen/rot during the pre-match countdown."
    verification:
      - { kind: test, ref: "PlayerLoopParityTests REGEN1 (damage pauses regen, shared storage)", result: pass }
      - { kind: code, ref: "spawn defaults SpawnSystem.cs:611-614 match client.qc:661-664; damage DamageSystem.cs:317/431 (max(.,now+5)); jetpack PlayerPhysics.cs:738 (max(.,now+2)); countdown offset client.qc:665-669 not ported", result: pass }
    confidence: high
    notes: "All producers and the regen tick read ONE storage on DamageEntityState (the REGEN1 fix that previously split damage/pickup writes from a dead ServerPlayerState copy). Logic downgraded to partial only for the missing warmup-countdown offset."
  - id: resources.cl.readout
    name: "Client resource readout for HUD (CSQC GetResource path)"
    layer: [presentation]
    base_refs:
      - "common/resources/cl_resources.qc:GetResource"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:GetResource"
      - "game/hud/HealthArmorPanel.cs"
      - "game/hud/AmmoPanel.cs"
    constants: []
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port does not run a separate CSQC resource module; the HUD reads the networked Entity values directly via Resources.GetResource (behaviorally equivalent for presentation). The CSQC-only SetResource/TakeResource/TakeResourceWithLimit forms (cl_resources.qc, including the known-odd CSQC TakeResourceWithLimit formula) are not ported (no need)."
    verification:
      - { kind: code, ref: "HealthArmorPanel.cs:110-112 reads GetResource(Health/Armor/Fuel)", result: pass }
    confidence: medium
    notes: "Functionally equivalent: the same Entity resource fields the server writes are networked and read by the HUD; no parallel client resource state. CSQC TakeResource short-circuits on amount==0 (negative=give); the port uses the SVQC <=0 no-op everywhere (single shared implementation)."
