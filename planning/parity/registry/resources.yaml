    constants:
      - { name: "g_balance_health_limit", base: "200", port: "200", match: true }
      - { name: "g_balance_armor_limit", base: "200", port: "200", match: true }
      - { name: "g_pickup_shells_max", base: "60", port: "60", match: true }
      - { name: "g_pickup_nails_max", base: "320", port: "320", match: true }
      - { name: "g_pickup_rockets_max", base: "160", port: "160", match: true }
      - { name: "g_pickup_cells_max", base: "180", port: "180", match: true }
      - { name: "g_balance_fuel_limit", base: "100", port: "100", match: true }
      - { name: "non-player limit", base: "RES_LIMIT_NONE", port: "LimitNone when !Client flag", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "QC IS_PLAYER(e) is approximated by EntFlags.Client; a non-player entity that happens to carry the Client flag (or vice-versa) would diverge on the limit. No known live case where this matters (only players run the regen tick / get resource caps)."
    verification:
      - { kind: code, ref: "Resources.GetResourceLimit cvar names+defaults vs sv_resources.qc:12-69; defaults seeded in Cvars.cs:146-165 verified against balance-xonotic.cfg", result: pass }
    confidence: high
    notes: "Fires GetResourceLimit hook then clamps to HardLimit(999), like QC. Order (cap -> hook -> clamp) matches."
  - id: resources.api.setresource
    name: "SetResource / SetResourceExplicit (clamp-to-limit + waste/changed hooks)"
    layer: [authority]
    base_refs:
      - "common/resources/sv_resources.qc:SetResource"
      - "common/resources/sv_resources.qc:SetResourceExplicit"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:SetResource"
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:SetResourceExplicit"
    constants:
      - { name: "waste behavior", base: "amount_wasted = amount-max; fire ResourceWasted", port: "same", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Base's SetResource hook reads back BOTH res_type (M_ARGV(8) entity) and amount (M_ARGV(9)) after the forbid check, so a mutator may rewrite the RESOURCE TYPE as well as the amount. The port's CallSetResource only rewrites the amount (ref float); res_type is fixed. No shipped mutator rewrites res_type, so latent."
    verification:
      - { kind: code, ref: "Resources.SetResource forbid/clamp/changed/wasted vs sv_resources.qc:87-113; ResourceHooks.CallSetResource only carries ref amount", result: pass }
    confidence: high
    notes: "SetResource hook may forbid or rewrite amount; ResourceAmountChanged fires only on a real change; ResourceWasted fires only when wasted>0 (matches QC's amount_wasted==0 early-return)."
