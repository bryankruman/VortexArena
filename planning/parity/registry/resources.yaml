      - { name: "g_balance_health_rotstable", base: "100", port: "100", match: true }
      - { name: "g_balance_armor_regen", base: "0", port: "0", match: true }
      - { name: "g_balance_armor_rot", base: "0.02", port: "0.02", match: true }
      - { name: "g_balance_armor_rotlinear", base: "1", port: "1", match: true }
      - { name: "g_balance_armor_regenstable/rotstable", base: "100/100", port: "100/100", match: true }
      - { name: "g_balance_fuel_regen", base: "0.1", port: "0.1", match: true }
      - { name: "g_balance_fuel_regenstable", base: "50", port: "50", match: true }
      - { name: "g_balance_fuel_rot", base: "0.05", port: "0.05", match: true }
      - { name: "g_balance_fuel_rotstable", base: "100", port: "100", match: true }
      - { name: "snap window (CalcRegen/CalcRot)", base: "0.25", port: "0.25", match: true }
      - { name: "fuel regen ITEM_FuelRegen gate", base: "regenframetime only if (items & ITEM_FuelRegen)", port: "now>PauseRegenFinished && (Items & ItemFlag.FuelRegen) — FIXED Wave-2", match: true }
      - { name: "fuel skipped under IT_UNLIMITED_AMMO", base: "yes (entire fuel block)", port: "if ((Items & UnlimitedAmmo) == 0) — FIXED Wave-2", match: true }
      - { name: "vehicle eject before DEATH_ROT", base: "vehicles_exit(this.vehicle, VHEF_RELEASE)", port: "if (p.Vehicle != null) VehicleBoarding.Exit(p) — FIXED Wave-2", match: true }
      - { name: "max_mod on health stable", base: "regenstable/rotstable *= max_mod", port: "not applied (max_mod arg missing)", match: false }
      - { name: "limit_mod on RotRegen clamp", base: "GetResourceLimit * limit_mod", port: "raw GetResourceLimit (limit_mod not a param)", match: false }
      - { name: "regen_mod/rot_mod on frametime", base: "regenframetime = regen_mod * frametime", port: "raw frametime (regen_mod/rot_mod missing)", match: false }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "PlayerRegen hook STILL carries only Player (MutatorHooks.cs:107-112 PlayerRegenArgs unchanged) — all 10 in/out tuning slots remain missing. Consequences: (a) max_mod scaling of the health regen/rot STABLE point (client.qc:1725-1726) is never applied; (b) regen_mod/rot_mod speed scaling (multiply the frametime) and limit_mod cap scaling are inert. limit_mod is not even a parameter of the port's RotRegen (Base RotRegen takes limit_mod and clamps to GetResourceLimit*limit_mod; the port clamps to raw GetResourceLimit). All four mods are 1 at stock, so default play is unaffected; the gap bites mutators that scale max-HP/regen (handicap; BuffsMutator's medic/regen buffs return false so they don't disable, but they cannot scale the rate via this hook). The only USED part of the hook today — the disable-regen bool (instagib/CA/LMS/Invasion/Mayhem) — is live and faithful."
    verification:
      - { kind: test, ref: "PlayerLoopParityTests (Regen_IsPaused_WhileDamagePauseTimerIsInFuture, regen-resume) + GameplaySystemsTests", result: pass }
      - { kind: code, ref: "PlayerFrameLogic.Regen vs client.qc:1700-1754; live caller GameWorld.cs:1183 (gated !gameStopped && !IsDead); fuel block PlayerFrameLogic.cs:92-102 now gates on UnlimitedAmmo + ItemFlag.FuelRegen (matches client.qc:1744-1753); vehicle eject PlayerFrameLogic.cs:82-83 via VehicleBoarding.Exit (matches client.qc:1738); MutatorHooks.cs:107-112 PlayerRegenArgs still Player-only", result: pass }
    confidence: high
    notes: "Wave-2 CLOSED two of the three baseline gaps: (1) fuel regen now gated on ITEM_FuelRegen ownership AND the whole fuel block skipped under IT_UNLIMITED_AMMO (bit-faithful to client.qc:1744-1753, UnlimitedAmmo/FuelRegen flags verified in ItemFlags.cs); (2) vehicle eject (VehicleBoarding.Exit) now runs before the DEATH_ROT damage. Regen math, snap, linear+exponential terms, rot-to-death, and per-resource pause gating remain faithful and live. Remaining gap = the PlayerRegen hook tuning slots (extension surface, no stock-play impact). logic stays partial only for that."
