    verification:
      - { kind: test, ref: "PlayerLoopParityTests.GiveResource_PausesRot_ForHealthAndArmor (REGEN2)", result: pass }
      - { kind: code, ref: "Resources.GiveResource/GiveResourceWithLimit vs sv_resources.qc:115-183; WithLimit hook absent in port. Many live callers (ItemPickupRules, NadeAmmoBoom/HealBoom, Mage, Arc, Bumblebee, Buffs/VampireHook, Triggers)", result: pass }
    confidence: high
    notes: "Many live callers cap the post-give total. The per-resource rot-pause push (health/armor/fuel) matches QC. Logic downgraded to partial only for the missing WithLimit mutator-hook seam."
  - id: resources.api.take
    name: "TakeResource / TakeResourceWithLimit"
    layer: [authority]
    base_refs:
      - "common/resources/sv_resources.qc:TakeResource"
      - "common/resources/sv_resources.qc:TakeResourceWithLimit"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:TakeResource"
    constants:
      - { name: "amount<=0 no-op (SVQC)", base: "yes", port: "yes", match: true }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port TakeResource omits the QC TakeResource mutator hook (sv_resources.qc:191 MUTATOR_CALLHOOK(TakeResource)) — it goes straight to SetResource(get - amount). A mutator can therefore not forbid/rewrite a resource drain. No shipped mutator subscribes, so latent."
      - "TakeResourceWithLimit is NOT ported (no live caller in the port; the Base CSQC form is the known-odd formula). The SVQC form clamps so the total can't go below -limit."
    verification:
      - { kind: code, ref: "Resources.TakeResource vs sv_resources.qc:185-203 (no MUTATOR_CALLHOOK(TakeResource)); grep found no TakeResourceWithLimit port code/callers", result: pass }
    confidence: high
    notes: "TakeResource(<=0 no-op) follows the SVQC semantics, not the CSQC amount==0 short-circuit (verified cl_resources.qc). Widely live via item/weapon ammo drains; logic partial for the two missing seams."
  - id: resources.regen.loop
    name: "player_regen + RotRegen + CalcRegen/CalcRot (health/armor/fuel regen and rot)"
    layer: [authority]
    base_refs:
      - "server/client.qc:player_regen"
      - "server/client.qc:RotRegen"
      - "server/client.qc:CalcRegen"
      - "server/client.qc:CalcRot"
    port_refs:
      - "src/XonoticGodot.Server/PlayerFrameLogic.cs:Regen"
      - "src/XonoticGodot.Server/PlayerFrameLogic.cs:RotRegen"
      - "src/XonoticGodot.Server/PlayerFrameLogic.cs:CalcRegen"
      - "src/XonoticGodot.Server/PlayerFrameLogic.cs:CalcRot"
      - "src/XonoticGodot.Server/GameWorld.cs:OnPlayerPostThink"
    constants:
      - { name: "g_balance_health_regen", base: "0.08", port: "0.08", match: true }
      - { name: "g_balance_health_regenlinear", base: "0.5", port: "0.5", match: true }
      - { name: "g_balance_health_regenstable", base: "100", port: "100", match: true }
      - { name: "g_balance_health_rot", base: "0.02", port: "0.02", match: true }
      - { name: "g_balance_health_rotlinear", base: "1", port: "1", match: true }
      - { name: "g_balance_health_rotstable", base: "100", port: "100", match: true }
      - { name: "g_balance_armor_regen", base: "0", port: "0", match: true }
      - { name: "g_balance_armor_rot", base: "0.02", port: "0.02", match: true }
      - { name: "g_balance_armor_rotlinear", base: "1", port: "1", match: true }
      - { name: "g_balance_armor_regenstable/rotstable", base: "100/100", port: "100/100", match: true }
      - { name: "g_balance_fuel_regen", base: "0.1", port: "0.1", match: true }
      - { name: "g_balance_fuel_regenstable", base: "50", port: "50", match: true }
      - { name: "g_balance_fuel_rot", base: "0.05", port: "0.05", match: true }
      - { name: "g_balance_fuel_rotstable", base: "100", port: "100", match: true }
      - { name: "snap window (CalcRegen/CalcRot)", base: "0.25", port: "0.25", match: true }
      - { name: "max_mod on health stable", base: "regenstable/rotstable *= max_mod", port: "not applied (max_mod arg missing)", match: false }
      - { name: "limit_mod on RotRegen clamp", base: "GetResourceLimit * limit_mod", port: "raw GetResourceLimit (limit_mod not a param)", match: false }
      - { name: "fuel regen ITEM_FuelRegen gate", base: "regenframetime only if items & ITEM_FuelRegen", port: "gated on now>PauseRegenFinished only", match: false }
      - { name: "fuel skipped under IT_UNLIMITED_AMMO", base: "yes (entire fuel block)", port: "no (always runs fuel regen+rot)", match: false }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "PlayerRegen hook is missing ALL 10 in/out tuning slots (max_mod/regen_mod/rot_mod/limit_mod + 6 health balance values); the port's PlayerRegenArgs carries only Player. Consequences: (a) max_mod scaling of the health regen/rot STABLE point (client.qc:1725-1726) is never applied; (b) regen_mod/rot_mod speed scaling and limit_mod cap scaling are inert. limit_mod is not even a parameter of the port's RotRegen (Base RotRegen takes limit_mod and clamps to GetResourceLimit*limit_mod; the port clamps to raw GetResourceLimit). All four mods are 1 at stock, so default play is unaffected; the gap bites mutators (handicap, max-HP buffs). The only USED part of the hook today — the disable-regen bool (instagib) — is live and faithful."
      - "Fuel regen/rot runs unconditionally. Base regenframetime for fuel is gated on (items & ITEM_FuelRegen.m_itemid) (client.qc:1748) AND the entire fuel block is skipped under IT_UNLIMITED_AMMO (client.qc:1744). The port gates fuel regen only on now>PauseRegenFinished — a PAUSE timer, not an ownership flag — and never checks UnlimitedAmmo. So a jetpack-less, undamaged player regenerates fuel toward stable=50 (Base would not), and an IT_UNLIMITED_AMMO player still rots fuel (Base would not). UnlimitedAmmo is already modeled on the player (PlayerPhysicsState.UnlimitedAmmo) so the data to gate exists but is unused."
      - "rot-to-death vehicle eject: Base ejects the player from any occupied vehicle (vehicles_exit) before applying the DEATH_ROT damage (client.qc:1738-1739). The port issues Combat.Damage(.,'rot',.) directly without a vehicle-eject step (vehicle occupancy of a rotting player is an edge case)."
    verification:
      - { kind: test, ref: "PlayerLoopParityTests (Regen_IsPaused_WhileDamagePauseTimerIsInFuture, regen-resume) + GameplaySystemsTests", result: pass }
      - { kind: code, ref: "PlayerFrameLogic.Regen vs client.qc:1637-1754; live caller GameWorld.cs:1134 (gated !gameStopped && !IsDead); MutatorHooks.cs:107-112 (PlayerRegenArgs = Player only); InstagibMutator.cs:173 disable path live; fuel gate PlayerFrameLogic.cs:85-91 (no UnlimitedAmmo / ITEM_FuelRegen check)", result: pass }
    confidence: high
    notes: "Regen math, snap, linear+exponential terms, rot-to-death (DEATH_ROT -> Combat.Damage 'rot'), and per-resource pause gating are faithful and live. The three gaps are extension-surface / item-gating omissions, not value drift; CalcRegen/CalcRot are bit-faithful (0.25 snap window confirmed)."
  - id: resources.regen.pause_timers
