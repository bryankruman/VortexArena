  - id: resources.api.take
    name: "TakeResource / TakeResourceWithLimit"
    layer: [authority]
    base_refs:
      - "common/resources/sv_resources.qc:TakeResource"
      - "common/resources/sv_resources.qc:TakeResourceWithLimit"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:TakeResource"
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:TakeResourceWithLimit"
    constants:
      - { name: "amount<=0 no-op (SVQC)", base: "yes", port: "yes", match: true }
      - { name: "TakeResourceWithLimit clamp", base: "if (current-amount < -limit) amount = -limit + current", port: "if (current-amount < -limit) amount = current - limit", match: true }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
