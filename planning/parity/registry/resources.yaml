    confidence: high
    notes: "TakeResource(<=0 no-op) follows the SVQC semantics. Widely live via item/weapon ammo drains. TakeResourceWithLimit (formula-faithful) is live on the item-pickup drain path (ItemPickupRules.GiveAmmoTo, QC Item_GiveAmmoTo items.qc:507). The two mutator-hook seams (TakeResource + TakeResourceWithLimit) remain unimplemented (latent). logic stays partial for those hooks; liveness is live."
  - id: resources.regen.loop
