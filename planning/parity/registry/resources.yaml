      - "TakeResourceWithLimit IS ported (Wave-2) and the SVQC clamp formula is bit-faithful (current-amount < -limit -> amount = current-limit, i.e. the total can't go below -limit). It IS live: ItemPickupRules.GiveAmmoTo:246 calls it for the negative-amount (drain) item branch, mirroring Base items.qc:507 (Item_GiveAmmoTo). Its own QC mutator hook (sv_resources.qc:211) is not fired (comment only; no shipped mutator subscribes, so latent)."
