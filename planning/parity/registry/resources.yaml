unit: resources
category: item
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "regen.loop: PlayerRegen hook is missing ALL 10 in/out tuning slots (max_mod/regen_mod/rot_mod/limit_mod + 6 health balance values); the port's PlayerRegenArgs carries only Player + the disable-bool. max_mod scaling of the health regen/rot stable point is never applied; regen_mod/rot_mod speed scaling and limit_mod cap scaling are inert. limit_mod is not even a parameter of the port's RotRegen (Base passes it; port clamps to a raw GetResourceLimit). Stock play unaffected (all mods=1); breaks any mutator that scales max HP or regen rate (handicap, certain buffs)."
    - "regen.loop: fuel regen/rot runs unconditionally. Base only REGENS fuel if the player owns ITEM_FuelRegen (jetpack) and skips ALL fuel regen/rot under IT_UNLIMITED_AMMO. The port gates fuel regen only on now>PauseRegenFinished (a pause timer, NOT an ownership flag) and never checks UnlimitedAmmo — so a jetpack-less, undamaged player still regenerates fuel toward stable=50, and an IT_UNLIMITED_AMMO player still rots fuel. UnlimitedAmmo IS modeled on the player, so the data to gate exists but is unused."
    - "api.take: TakeResource omits the QC TakeResource mutator hook (sv_resources.qc:191), and TakeResourceWithLimit is not ported at all. GiveResourceWithLimit likewise omits its own QC mutator hook (sv_resources.qc:165). No shipped mutator consumes these chains, so latent."
features:
  - id: resources.api.registry
    name: "RES_* resource registry + field indirection (health/armor/5 ammo)"
