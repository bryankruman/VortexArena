unit: sv-clientkill
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "No g_balance_kill_antispam penalty: a player can mash `kill` with no escalating delay (cvar still unregistered; clientkill_nexttime carry-forward absent)."
    - "selectteam/spectate still change team/observer instantly; the killindicator_teamchange deferral, 'already best team' early-out, and per-target countdown center-print are not routed through the (now live) kill machinery."
    - "Frozen freezetag/CA players CAN still self-kill: the ClientKill mutator hook (Base ft returns FROZEN to block it) is not invoked, and a frozen player is health=1 (MaxHealth=1f) but not IsDead so CmdKill's IsDead guard misses them — confirmed exploit, unchanged (now lands after the 2s delay rather than instantly)."
    - "CTS finish retract still respawns the runner (Clients.Spawn via GameWorld.cs:1906) instead of running a silent DEATH_KILL, so the finish self-kill produces no death/obituary/stats; -1/0 g_cts_finish_kill_delay still collapse to retract-now."
    - "Floating kill-indicator digit entity (setmodel MDL_NUM above the head + g_clones copies) is still not networked — only the announcer + center-print presentation subset is driven."
    - "Impulse-driven kill (race/cts personal-waypoint clear with g_allow_checkpoints) is still absent: CmdWaypointClear (Commands.cs:1393) only removes the sprite."
