  - id: sv-clientkill.silent.cts_finish
    name: "Silent finish kill (ClientKill_Silent, g_cts_finish_kill_delay)"
    layer: [authority]
    base_refs:
      - "server/clientkill.qc:212 ClientKill_Silent"
      - "common/gametypes/gametype/cts/sv_cts.qc:342 Race_FinalCheckpoint → ClientKill_Silent"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Cts.cs:265 ScheduleRetract"
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Cts.cs:272 RetractRunner"
      - "src/XonoticGodot.Server/GameWorld.cs:1376 (OnFinishRetract = Clients.Spawn)"
    constants:
      - { name: "g_cts_finish_kill_delay", base: "2 (s); -1 instant, 0 never", port: "read; positive duration honored, -1 mishandled", match: false }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "On delay expiry the port respawns the runner (Clients.Spawn) instead of running a DEATH_KILL, so the finish self-kill yields no death event / obituary / death stat — only a teleport-to-start. It does not use the kill machinery at all."
      - "The port does not handle the -1 = instant case: ScheduleRetract uses MathF.Max(0f, delay), so g_cts_finish_kill_delay -1 schedules at now+0 (≈instant) BUT 0 = never is NOT honored either — Base 0 means do not kill, while the port schedules a retract at now+0 (fires immediately). Both -1 and 0 collapse to 'retract this frame'."
    verification:
      - { kind: code, ref: "Cts.cs:268 ScheduleRetract uses MathF.Max(0,delay); GameWorld.cs:1376 wires OnFinishRetract=Clients.Spawn", result: fail }
    confidence: high
    notes: "Positive default (2s) duration matches Base; lethal mechanism differs (respawn vs silent DEATH_KILL). Re-examined the -1/0 semantics: Base -1=instant kill, 0=never kill; the port's Max(0,delay) makes BOTH fire a retract immediately (downgraded values to partial vs draft's 'faithful'). Base default verified gametypes-server.cfg:365 = 2."
