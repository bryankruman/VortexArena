      logic: partial
      values: na
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Kills instantly via Combat.Damage(p, null, null, 100000, DeathTypes.Kill); Base defers through ClientKill_TeamChange(this,0) with a countdown."
      - "Base bails on `this.player_blocked` (and game_stopped); the port only guards spectator/dead, not a player_blocked / game_stopped equivalent."
      - "Base passes Damage(this,this,this,...) (self as attacker/inflictor); port passes null attacker/inflictor — benign here because DEATH_KILL is special-cased as a self-death, but not literally faithful."
    verification:
