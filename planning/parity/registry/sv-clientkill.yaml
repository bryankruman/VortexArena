unit: sv-clientkill
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "`/kill` is still instant: no g_balance_kill_delay countdown, no kill-indicator entity, no spoken number announcer, no center-print. Wave-1/2/5 did NOT touch the clientkill machinery."
    - "No g_balance_kill_antispam penalty: a player can mash `kill` with no escalating delay (cvar still unregistered)."
    - "selectteam/spectate change team/observer instantly; the killindicator_teamchange deferral, 'already best team' early-out, and per-target countdown center-print are all still missing."
    - "Frozen freezetag/CA players CAN still self-kill: the ClientKill mutator hook (Base ft returns FROZEN to block it) is not invoked, and a frozen player is health=1 (MaxHealth=1f) but not IsDead so CmdKill's IsDead guard misses them — confirmed exploit, unchanged."
    - "CTS finish retract still respawns the runner (Clients.Spawn via GameWorld.cs:1755) instead of running a silent DEATH_KILL, so the finish self-kill produces no death/obituary/stats."
    - "Impulse-driven kill (race/cts personal-waypoint clear with g_allow_checkpoints) is still absent: CmdWaypointClear (Commands.cs:1389) only removes the sprite — the personal-checkpoint teleport-reset kill is explicitly not modeled."
