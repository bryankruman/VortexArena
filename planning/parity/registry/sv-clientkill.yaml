unit: sv-clientkill
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "`/kill` is instant: no g_balance_kill_delay countdown, no kill-indicator entity, no spoken number announcer, no center-print."
    - "No g_balance_kill_antispam penalty: a player can mash `kill` with no escalating delay (cvar unregistered)."
    - "selectteam/spectate change team/observer instantly; the killindicator_teamchange deferral, 'already best team' early-out, and per-target countdown center-print are all missing."
    - "Frozen freezetag/CA players CAN self-kill: the ClientKill mutator hook (Base ft returns FROZEN to block it) is not invoked, and a frozen player is health=1 but not IsDead so CmdKill's IsDead guard misses them — confirmed exploit."
    - "CTS finish retract respawns the runner (Clients.Spawn) instead of running a silent DEATH_KILL, so the finish self-kill produces no death/obituary/stats."
    - "Impulse-driven kill (race/cts personal-waypoint clear with g_allow_checkpoints) is absent: the waypoint_clear/wpeditor personal-checkpoint feature is unimplemented in the port."
