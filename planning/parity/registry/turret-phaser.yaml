    confidence: high
    notes: >-
      FIXED since baseline. The earlier audit recorded a single Api.Trace.Trace hitting only tr.Ent (the front
      target). The current BeamThink implements the full FireImoBeam penetration: it loops up to 64 times, making
      each hit entity Solid.Not and re-tracing until it hits a world brush (Solid.Bsp) or empty trace, restores
      solidity, then damages + slows every entity collected (Combat.Damage DEATH_TURRET_PHASER + velocity*=VelFactor).
      Players lined up behind one another are now all hit, matching Base. One minor nuance vs Base: the port uses the
      per-hit tr.EndPos as the damage location, whereas Base records railgunhitloc = end (wall endpoint) for all hits —
      a cosmetic damage-origin difference only, not a logic/values defect."

