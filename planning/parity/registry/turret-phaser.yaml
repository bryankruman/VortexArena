    notes: >-
      Death/respawn lifecycle itself is shared and faithful (TurretAI.Die/Respawn); only the per-unit
      respawntime value is wrong. The Wave-2/5 shared-turret edits made the death path strictly MORE
      faithful to Base — TurretAI.Die now omits the port-added ammo-scaled RadiusDamage blast (Base
      turret_die has it commented out, sv_turrets.qc:182) and TurretAI.Damage no longer adopts the
      attacker as an enemy (Base never reads TFL_DMG_RETALIATE) — and TurretSpawn.Init now wires
      e.GtEventDamage = TurretAI.EventDamage so the turret's own pre-damage gate + health subtract runs
      via DamageSystem.EventDamage instead of PlayerDamage. These were not tracked as gaps in this row's
