unit: turret-phaser
category: turret
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "Beam is single-hit in the port; Base FireImoBeam penetrates and damages/slows EVERY entity in the line"
    - "Phaser beam sound (SND_TUR_PHASER) never plays — only a single electro_fire; no 2s re-trigger, no impact (neximpact), no silence-on-end"
    - "No beam model visual (MDL_TUR_PHASER_BEAM) and no head charge/discharge frame animation (tr_think)"
    - "Aim uses shotTimeCompensate+zPredict lead flags that Base phaser does NOT set (aim_flags = TFL_AIM_LEAD only)"
    - "Respawn time defaults to 60 (shared Init default) instead of the cfg's 90"
    - "Beam never registers on g_bot_dodge (bot_dodge=true, bot_dodgerating=shot_dmg) — bots do not avoid the phaser beam; the port has no g_bot_dodge projectile-avoidance system at all"
