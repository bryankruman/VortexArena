    confidence: high
    notes: >-
      FIXED since baseline. The earlier audit recorded a single Api.Trace.Trace hitting only tr.Ent (the front
      target). The current BeamThink implements the full FireImoBeam penetration: it loops up to 64 times, making
      each hit entity Solid.Not and re-tracing until it hits a world brush (Solid.Bsp) or empty trace, restores
