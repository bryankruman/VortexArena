      - { name: "hunter_count_formula", base: "bound(1, cvar>=1?cvar:floor(live*cvar), live-1)", port: "same", match: true }
      - { name: "pick_order", base: "FOREACH_CLIENT_RANDOM (Fisher-Yates)", port: "seeded Prandom Fisher-Yates", match: true }
    status:
      logic: faithful
      values: faithful
      timing: unknown
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "VERIFIED LIVE: AssignRoles runs on the live path via surv.Tick() -> Handler.OnRoundStart (GameWorld.cs:1639). The desync risk is real but does NOT make assignment dead: GameWorld also calls EnableRounds() with NO args (GameWorld.cs:1366), spawning a SECOND, generic Server.RoundHandler (GameWorld.Rounds, DefaultCanRoundStart/End) that drives the live map-reset/respawn gate and never calls AssignRoles. The two handlers run on independent timers (warmup 5 vs the world default), so the secret-role moment and the map-reset/respawn-unlock moment are not guaranteed to coincide. Timing left unknown pending a runtime trace."
    verification:
      - { kind: test, ref: "SurvivalRolesTests (live-only count, bound formula, random pick, <2 guard) — 15 survival/status tests pass", result: pass }
      - { kind: code, ref: "GameWorld.DriveGametypeFrame Survival arm: surv.SetRoster + surv.Tick() drives Handler.OnRoundStart=AssignRoles (live)", result: pass }
    confidence: high
    notes: "Algorithm pinned by tests and confirmed live. Re-classified liveness partial->live (assignment IS reached); the dual-handler desync is a timing/logic risk, captured in survival.round.handler."

