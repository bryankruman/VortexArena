unit: survival
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "The mode's headline rule is dead: no round-timer/match-timeout resolution. EndRoundTimedOut has no caller AND the Common RoundHandler never tests RoundEndTime in its InProgress branch, so 'survive until time runs out' never fires — a hiding prey leaves the round unending. Side-wipe is the only way a round ends."
    - "No win/role notifications: SURVIVAL_HUNTER_WIN / SURVIVAL_SURVIVOR_WIN / ROUND_TIED / SURVIVAL_SURVIVOR / SURVIVAL_HUNTER are declared but never sent — the player never sees their role at round start nor the win banner at round end."
    - "No teamkill punishment (g_survival_punish_teamkill, default on): killing an ally does not auto-kill the killer nor dock frags."
    - "Bots attack allies (Bot_ForbidAttack not ported) and Survival is absent from GameWorld.MatchEnded, so the match never ends via this mode."

