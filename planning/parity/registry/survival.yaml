last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Notifications are now LIVE (Wave-5-finish, commits 965a42f/023ba70 added SurvivalNotifyHost + `surv.Notifications = new SurvivalNotifyHost()` at GameWorld.cs:1876). This was the single biggest dead-seam in the prior audit and is now closed: the host sink routes Role/RoundResult/Alone to NotificationSystem.Send, whose live server sink is NotificationNetSink (installed unconditionally at ServerNet.cs:291) which serializes+broadcasts to clients. All six templates (SURVIVAL_HUNTER/SURVIVAL_SURVIVOR center, SURVIVAL_HUNTER_WIN/SURVIVAL_SURVIVOR_WIN/ROUND_TIED center+info, ALONE center) resolve in NotificationsList.cs. The player now sees their secret role at round start, a win/tie banner at round end, and the last-of-side 'alone' prompt."
    - "Dual-handler architecture UNCHANGED: Survival still drives a second generic Server RoundHandler via EnableRounds() (DefaultCanRoundEnd is TEAM-based — GameWorld.cs:3153-3167 iterates Teams.Active(TeamCount); with TeamGame=false that yields 0 alive teams → ≤1 → always-true round-end) AND its own surv.Handler (ticked by surv.Tick). Unlike CA/FreezeTag, the Survival arm (GameWorld.cs:1861-1877) wires NEITHER _roundPrep NOR _roundSync (CA does at 1764-1765, FT at 1816-1817), so the live map-reset handler's round_endtime is never mirrored into surv.Handler — the timeout/role-assign timeline reads surv.Handler's OWN independent clock, not the map-reset clock."
    - "Survival is still absent from GameWorld.MatchEnded (the switch at GameWorld.cs:296-318 has no Survival arm → falls to `_ => false`) — Survival has no MatchEnded latch; the overall match-end / intermission path for Survival is unverified."
    - "No player-model/scoreboard green-prey/red-hunter colormap override (SURV_COLOR_PREY 51 / SURV_COLOR_HUNTER 68 not applied). Notifications are wired but the per-model role colormap is still missing."

