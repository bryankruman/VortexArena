      - "src/XonoticGodot.Common/Gameplay/GameTypes/Survival.cs:EndRoundTimedOut"
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Survival.cs:CheckWinningCondition"
    constants:
      - { name: "g_survival_round_timelimit", base: "120 (s)", port: "120 via cvar (RoundEndTime armed AND now checked)", match: true }
      - { name: "g_survival_round_enddelay == -1 gate", base: "timeout→survivors-win branch ONLY runs when enddelay==-1 (default 0, so OFF in stock)", port: "NOT modeled — port ends on timer unconditionally", match: false }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DIVERGENCE INTRODUCED: Wave-2 wired RoundTimedOut()→EndRoundTimedOut() into CheckWinningCondition (live path, GameWorld.cs:1745), so the round now ends + survivors win once g_survival_round_timelimit (120s) elapses with both sides alive. But it OMITS Base's `autocvar_g_survival_round_enddelay == -1` gate. In stock Base (enddelay defaults to 0, gametypes-server.cfg:704) Surv_CheckWinner returns 0 when both sides are alive at the timer — and round_handler_Think does NOT force-end on round_endtime — so stock Base does NOT auto-resolve a hiding-prey round on the timer. The port now ends a round stock Base would leave running."
      - "RoundTimedOut reads surv.Handler.RoundEndTime, which is armed by surv.Handler's OWN countdown→InProgress timeline (surv.Tick), NOT the live GameWorld.Rounds map-reset timeline (no _roundSync mirror for Survival). So the 120s clock is the owned handler's, which may desync from the map-reset handler."
    verification:
      - { kind: code, ref: "EndRoundTimedOut (Survival.cs:504) is now CALLED via RoundTimedOut (cs:408-409) from CheckWinningCondition — was dead. RoundTimedOut (cs:427-433) checks Handler.IsRoundStarted && Api.Clock.Time >= Handler.RoundEndTime, with NO enddelay==-1 gate (cf. Base sv_survival.qc:78-79).", result: fail }
      - { kind: code, ref: "Base Surv_CheckWinner timeout branch requires `autocvar_g_survival_round_enddelay == -1`; shipped default is 0 (gametypes-server.cfg:704) so the branch is OFF in stock", result: pass }
    confidence: high
    notes: "Liveness dead→live (EndRoundTimedOut now reached). But the FIX is NOT Base-faithful: it drops the enddelay==-1 stock gate, so the port resolves a timed-out round survivors-win where stock Base would not. Counted as a (logic) divergence/regression, not a clean fix. The baseline's framing ('the headline rule never fires') was itself partly mistaken — in stock Base it intentionally doesn't fire on the timer."

