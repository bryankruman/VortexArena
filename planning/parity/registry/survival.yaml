last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Win/role/alone notifications are STILL DEAD after Wave-5 (66e378f): Survival.cs raises Role / RoundResult / Alone via the ISurvivalNotifications sink, but NO host ever sets surv.Notifications. Re-grep over src/ + game/ for `ISurvivalNotifications` finds the type referenced ONLY in Survival.cs (declaration + call sites); unlike Invasion (which gets `inv.Notifications = new InvasionNotifyHost()` at GameWorld.cs:1738) there is NO SurvivalNotifyHost and NO `surv.Notifications =` assignment anywhere. The Survival arm in ActivateGameType (GameWorld.cs:1719-1730) calls `surv.Activate(); EnableRounds(); Bot.BotBrain.ForbidAttackHook = …` and never assigns Notifications. Every notify call is guarded `if (Notifications is not null)` → never fires. The player still never sees their role at round start nor a win/tie/alone banner."
    - "Dual-handler architecture UNCHANGED: Survival drives a second generic Server RoundHandler via EnableRounds() (DefaultCanRoundStart/End — DefaultCanRoundEnd is TEAM-based, wrong for FFA Survival; GameWorld.cs:2994 iterates Teams.Active so with TeamGame=false it counts 0 alive teams → ≤1 → always-true round-end) AND its own surv.Handler (ticked by surv.Tick). Unlike CA/FreezeTag, the Survival arm wires NEITHER _roundPrep NOR _roundSync (GameWorld.cs:1627-1628/1679-1680 do for CA/FT; the Survival case at 1719-1730 does not), so the live map-reset handler's round_endtime is never mirrored into surv.Handler — the timeout/role-assign timeline reads surv.Handler's OWN independent clock, not the map-reset clock."
    - "Survival is still absent from GameWorld.MatchEnded (the switch at GameWorld.cs:288-310 has no Survival arm → falls to `_ => false`) AND from the win-condition switch (GameWorld.cs default: return false at 2538-2539) — Survival has no MatchEnded latch; the overall match-end / intermission path for Survival is unverified."
    - "No player-model/scoreboard green-prey/red-hunter colormap override (SURV_COLOR_PREY 51 / SURV_COLOR_HUNTER 68 not applied)."

