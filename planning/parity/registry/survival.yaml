  - id: survival.scoring.bank_validkills
    name: "Kills bank into validkills during the round (no immediate score)"
    layer: [authority]
    base_refs:
      - "common/gametypes/gametype/survival/sv_survival.qc:MUTATOR_HOOKFUNCTION(surv, GiveFragsForKill)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Survival.cs:OnDeath"
    constants:
      - { name: "bank_amount", base: "M_ARGV(2,float) frag delta (=1 stock)", port: "+1 per valid kill (hardcoded)", match: false }
    status:
      logic: faithful
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Banks a fixed +1 per kill rather than the QC frag delta (M_ARGV(2,float) carries GiveFrags' value); matches stock 1-per-kill but diverges under any frag-value multiplier."
      - "TIMING: QC GiveFragsForKill banks ONLY when `!warmup_stage && round_handler_IsActive() && round_handler_IsRoundStarted()`; the port's OnDeath has NO round-started guard — it banks on any kill with a live attacker while !RoundOver, INCLUDING during the warmup grace period (players are alive + RoundOver is false in warmup). So a warmup-phase kill banks in the port but not in QC. Downgraded timing faithful->partial."
    verification:
      - { kind: test, ref: "SurvivalScoringTests.RoundEnd_AwardsBankedKillsAndSideBonuses (pass) — confirms award; no test covers the warmup-banking timing gap", result: pass }
      - { kind: code, ref: "Survival.OnDeath (Survival.cs:266) banks on `!RoundOver` only — no IsRoundStarted/warmup gate vs QC GiveFragsForKill", result: fail }
    confidence: high
    notes: "Frag value is 1-per-kill in the port; QC carries the delta. The QC round-started/warmup gate is absent, so warmup kills can bank — a real timing divergence, not just an implicit invariant."

