summary:
  feature_count: 16
  worst_gaps:
    - "DUAL-HANDLER DESYNC RESOLVED (verified 2026-06-26): the prior single biggest defect remains GONE. The Survival arm drives the ONE live GameWorld.Rounds handler off Survival's OWN predicates — EnableRounds(surv.HandlerCanRoundStart, ()=>{surv.CheckWinningCondition(); return surv.RoundOver;}, onRoundStart: surv.AssignRoles, endDelay 5, countdown g_survival_warmup, roundTimeLimit g_survival_round_timelimit) at GameWorld.cs:2411-2417 — AND wires _roundPrep (roster) + _roundSync = MirrorRoundTiming(survRounds, surv.Handler) at 2421-2422, exactly like CA/FreezeTag. The live handler fires AssignRoles at round start, uses CheckWinningCondition (not the degenerate team-based DefaultCanRoundEnd) for round-end, and mirrors RoundEndTime/RoundsPlayed/GameStartTime/IsRoundStarted into surv.Handler every frame (GameWorld.cs:4040-4051). DriveGametypeFrame's Survival arm no longer ticks surv.Handler (GameWorld.cs:2834-2843) — it only feeds the roster + runs an idempotent CheckWinningCondition safety net. The secret-role moment and the map-reset/respawn-unlock moment coincide."
    - "Notifications remain LIVE (verified 2026-06-26): surv.Notifications = new SurvivalNotifyHost() (GameWorld.cs:2436) routes Role/RoundResult/Alone to NotificationSystem.Send, whose live server sink is NotificationNetSink (installed unconditionally at ServerNet.cs:300). RoundResult sends BOTH Center AND Info (SurvivalNotifyHost.RoundResult, GameWorld.cs:4138-4139) matching Base's MSG_CENTER+MSG_INFO pairs. Player sees role at round start, win/tie banner (incl. INFO line) at round end, and the last-of-side 'alone' prompt."
    - "Survival is STILL absent from GameWorld.MatchEnded (the switch at GameWorld.cs:297-319 has no Survival arm → falls to `_ => false`) — Survival has no MatchEnded latch; the overall match-end / intermission path for Survival is unverified. The registration asserts the Base mapinfo defaults at activation (timelimit=20 at GameWorld.cs:2399-2400, fraglimit=12 at 2401-2402)."
    - "FIXED (2026-06-25→26 audit): the green-prey/red-hunter player-model/scoreboard COLORMAP override (SURV_COLOR_PREY 51 / SURV_COLOR_HUNTER 68, colormap = 1024 + plcolor, cl_survival.qc NET_HANDLE + ForcePlayercolors_Skip) is now PORTED + LIVE on the client appearance path — ClientWorld.ResolveForcedColormap (game/client/ClientWorld.cs:1359-1367) returns 1024+68 for a known hunter / 1024+51 otherwise, BEFORE the force-color resolution so it overrides cl_forceplayercolors (matching QC CBC_ORDER_LAST). Fed by NetGame.BuildAppearanceContext (game/net/NetGame.cs:5290-5298, ctx.SurvivalActive + ctx.SurvivalHunterIds = the disclosed-hunter set), so mid-round prey see all-green (no hunter ids leaked) and own-hunters see red, honoring the disclosure invariant. The prior single presentation gap is closed."
    - "Remaining minor gaps: (1) cl_surv DrawScoreboard_Force (force the scoreboard open while GAME_STOPPED so players see who the hunter was) is still not modeled; (2) the Survival mid-round late-join force-observe (Base ForbidSpawn + PutClientInServer: !allowed_to_spawn ⇒ TRANSMUTE Observer + INFO_CA_JOIN_LATE) is NOT wired for Survival — the generic GametypeJoinGate exists but is installed only for LMS — see new row survival.join.late_join_observe."

