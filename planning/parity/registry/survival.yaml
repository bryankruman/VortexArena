    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Two separate round handlers still exist for Survival: surv.Handler (Common RoundHandler, ticked by surv.Tick) and GameWorld.Rounds (Server RoundHandler, spawned by EnableRounds() with the generic Default predicates). Only the world handler resets the map / gates respawns / broadcasts the countdown; it never calls AssignRoles. The Survival arm (GameWorld.cs:1861-1877) wires NEITHER _roundPrep NOR _roundSync, so unlike CA (GameWorld.cs:1764-1765) and FreezeTag (1816-1817) the live handler's round_endtime is NOT mirrored into surv.Handler."
      - "DefaultCanRoundEnd (GameWorld.cs:3153-3167) is team-based (alive teams ≤ 1); for FFA Survival (TeamGame=false) Teams.Active yields no team buckets, so aliveTeams stays 0 → ≤1 → the predicate is effectively always true. The live GameWorld.Rounds round-end predicate is therefore NOT the survival CheckWinner and does not reflect the hunter/prey side-wipe. Live round-reset cadence for Survival is unverified."
