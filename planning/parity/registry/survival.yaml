unit: survival
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Win/role/alone notifications are still DEAD: Survival.cs now raises Role / RoundResult / Alone via the new ISurvivalNotifications sink, but NO host ever sets surv.Notifications (grep: only the interface declaration in Survival.cs; ActivateGameType's Survival arm is `surv.Activate(); EnableRounds();` with no Notifications assignment). Every notify call is guarded `if (Notifications is not null)` → never fires on the live match path. The player still never sees their role at round start nor a win/tie banner."
    - "Round-timer resolution is now LIVE but DIVERGES from stock Base. Wave-2 wired RoundTimedOut()→EndRoundTimedOut() (survivors win) into CheckWinningCondition on the live path, so a hiding-prey round DOES now end at g_survival_round_timelimit (120s). BUT it omits Base's gate `autocvar_g_survival_round_enddelay == -1`: in stock Base (enddelay defaults to 0, shipped cfg line 704) Surv_CheckWinner returns 0 when both sides are alive at the timer and the round does NOT auto-resolve. round_handler_Think never force-ends on round_endtime either. So the port ends+awards a round that stock Base would leave running. A real new behavioral divergence introduced by the fix."
    - "Dual-handler architecture UNCHANGED and now more consequential: Survival still drives a second generic Server RoundHandler via EnableRounds() (DefaultCanRoundStart/End, no AssignRoles) AND its own surv.Handler (ticked by surv.Tick). Unlike CA/FreezeTag, the Survival arm wires NEITHER _roundPrep NOR _roundSync (GameWorld.cs:1393/1445 do for CA/FT; the Survival case at :1468 does not), so the live map-reset handler's round_endtime is never mirrored into surv.Handler — the new timeout reads surv.Handler's OWN independent timeline, not the map-reset timeline."
    - "Bots still attack allies (Bot_ForbidAttack not ported), and Survival is still absent from GameWorld.MatchEnded."

