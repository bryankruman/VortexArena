      - { kind: code, ref: "Race.FinishRacer vs Base race_StartCompleting/race_AbandonRaceCheck (server/race.qc:1203-1218)", result: fail }
    confidence: high
    notes: "VERIFIER downgrade logic faithful->partial: n==c end + sudden-death latch are faithful, but the global completing/abandonment state machine (which is how a real multi-racer match ends after the leader finishes) is absent."

