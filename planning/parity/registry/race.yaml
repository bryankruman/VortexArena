summary:
  feature_count: 19
  worst_gaps:
    - "race_place START GRID ordering + trigger_race_checkpoint_verify map-load validation still missing. cl_movecliptokeyboard 2 stuffcmd (FixClientCvars) still absent."
    - "FIXED since 2026-06-27: the cl_allow_uid* consent gate on the record DB is now LIVE — Race.UidConsentProvider (Race.cs:269) is wired at activation (GameWorld.cs:3015-3017) to Commands.GetClientCvarFloat(cl_allow_uidtracking)==1 && (cl_allow_uid2name)==1 (uid2name default -1 = NOT consenting, exactly as Base). A record-worthy time without consent fires INFO_RACE_NEW_MISSING_NAME and is NOT stored (Race.cs:844-852, RaceRecords.WouldBeNewRecord gate). The 9th notification (RACE_NEW_MISSING_NAME) is now declared + wired. The baseline's record-DB / notifications consent gap is closed for the finish-time record; the SpeedAwardFrame all-time-best still keys on a non-empty PersistentId (no consent gate) — residual."
    - "FIXED since 2026-06-25: the Race force-keyboard movement quantization is now LIVE for Race itself — Race.Activate registers OnPlayerPhysics on MutatorHooks.PlayerPhysics (Race.cs:491-492), which runs all 3 QC rc PlayerPhysics slices every physics frame: (1) the deterministic .race_movetime lap-clock accumulator (frac/count split), (2) the race_penalty freeze, (3) the M_SQRT1_2 octant snap. Lap timing now reads the deterministic accumulator (RaceMoveTime) rather than the wall clock on the live path. Residual: cl_movecliptokeyboard 2 stuffcmd (FixClientCvars) is not sent; disableclientprediction=2 during freeze has no port mechanism."
    - "FIXED since 2026-06-25: the bot race role IS now ported + LIVE — BotObjectiveRoles.RoleRace (havocbot_role_race) routes the bot to its next expected trigger_race_checkpoint at QC's 1000000/5000 routerating, wired via BotRoles.ChooseRole (\"rc\"/\"race\" => RoleRace, BotRoles.cs:103). A bot-filled race now navigates the track."
    - "FIXED since 2026-06-22: speed awards (race_SpeedAwardFrame) are now fully ported + LIVE — Race.SpeedAwardFrame is driven each frame (GameWorld.cs:3421), round-best + persisted all-time-best planar speed are networked (ScoreboardBlock.SpeedAward) + rendered (ScoreboardPanel.DrawSpeedAward), and the RaceTimerPanel speed-at-CP readout is fed (NetGame.cs:3725 (RaceCheckpointSpeed))."
    - "FIXED since 2026-06-22: the HUD_Mod_Race MOD-ICON (floating PB + server-best + medal flash) IS now ported — ModIconsPanel has a Race case (DrawRace) fed via NetGame.cs:4075-4104; the rankings display cap now reads g_cts_send_rankings_cnt (Base default 15, capped at RANKINGS_CNT 99) instead of a hardcoded 15. Both the mod-icon and the split panels remain host-side feeds (no TE_CSQC_RACE net path), so they are listen-server only; the RANKINGS scoreboard column is the one genuinely-networked piece."
    - "Lap-limit default (port 7) differs from Base (-1 = consult mapinfo). cl_allow_uid* consent gate on the record DB still absent (RaceRecords only checks for a non-empty uid; the cvars exist in the menu but are not consulted)."
    - "Carried: the spawnflag-4 wrong-way kill AND spawnflag-8 timed-finish are both armed from the BSP lump (WireObjectiveSpawns GameWorld.cs:3032-3043); the wrong-way kill still uses DeathTypes.Void not Base DEATH_HURTTRIGGER (cosmetic deathtype only). The g_race_qualifying_timelimit SOURCE is wired at activation (GameWorld.cs:2960-2978) and respawn-at-last-checkpoint is LIVE (RespawnSpot/ApplyRespawnSpot via Clients.OnPreSpawn → SpawnSystem SpawnPointTarg)."
