    divergence_rationale: null
    gaps:
      - "VERIFIER: Base's global race_completing latch is not modeled. In Base, when the FIRST racer reaches the lap limit, race_StartCompleting() sets race_completing=1, marks every DEAD racer completed/abandoned, and thereafter any racer who respawns (PutClientInServer -> race_AbandonRaceCheck) is auto-marked completed+abandoned. The port's FinishRacer only sets Completed=true on the single crossing racer, so n==c can only be reached by every racer independently finishing; slow/dead racers are never auto-abandoned."
      - "INFO_RACE_ABANDONED side effect of race_completing never fires (see race.records.notifications)."
      - "Sudden-death is modeled as a Race-local latch (SuddenDeath); the shared OverTimeManager deliberately excludes the race/qualifying branch, so the standard overtime-window timer does not gate race end."
