  worst_gaps:
    - "Reloadable magazine + reload (clip 80, 2s, forced reload) dead on the live path: the clip IS seeded to 80 (driver seeds reloadable weapons) but FireBullets drains the raw bullet pool (TakeResource) so the clip never decrements, there is no forced-reload branch, and the secondary reload flag is ignored — the rifle never reloads"
    - "Secondary kills print WEAPON_RIFLE_MURDER not *_MURDER_HAIL: FireBullets passes deathType=RegistryId, and the int->string ApplyDamage path has NO channel to carry HITTYPE_SECONDARY at all (architectural, not just a missing OR)"
    - "Primary tracer trail (tr_rifle) never emitted — effect registered but dead; the rifle's signature visible tracer is missing"
    - "Accuracy FIRED credit never registered: SetupShot is called without wep/maxDamage, so the rifle never increments the accuracy% denominator (rifle-specific omission; MachineGun shares it)"
    - "Bullet-impact random ricochet sound (SND_RIC_RANDOM) never plays; brass casing ejection (g_casings>=2) not ported"
