summary:
  feature_count: 12
  worst_gaps:
    - "RM-explosion has no presentation effect: RocketMinstaExplosion deals the radius damage but never emits a Devastator-style explosion sprite/sound at the rail endpoint (WeaponSplash.RadiusDamage does NOT emit centrally — the caller must, and this one doesn't)."
    - "RM-laser bolts have no confirmed distinct CSQC visual: Vaporizer.cs tags netname 'rocketminsta' intending a RocketMinstaLaser/elaser descriptor, but no such client projectile descriptor exists in the port — the bolt likely renders as a generic plasma/laser; also skips W_CalculateProjectileVelocity's owner-velocity Newtonian inheritance (only g_weaponspeedfactor is modeled, which IS correct since Base forces forceAbsolute=true)."
    - "Primary rail beam is a generic networked trail (TE_TEI_G3/_HIT), not the bespoke team-colored cylindric VaporizerBeam (cl_vaporizerbeam_teamcolor/colorboost/lifetime CSQC path unmodeled)."
  verifier_notes: "Re-audit 2026-06-25 (drift check) on branch claude/parity-port-waves at/after Wave-6b (HEAD f86d947). The code has advanced WELL beyond the 2026-06-22 baseline: SEVEN dimensions across FOUR rows are now FIXED. (1) ACHIEVEMENTS — Announce() (Vaporizer.cs:257-285) now fully emits ACHIEVEMENT_YODA (shooter+victim flying, cross-team) and ACHIEVEMENT_IMPRESSIVE (every-2nd cross-team hit) via a vaporizer_lasthit ConditionalWeakTable side-table, with WrSetup/WrResetPlayer (Vaporizer.cs:165-166) resetting it; driver calls WrSetup at WeaponFireDriver.cs:284. Was missing/na -> faithful/live. (2) wr_aim BOT SUPPORT — BotWantsSecondary (Vaporizer.cs:174) ports the primary(has-ammo/unlimited)/secondary(out-of-ammo) pick; defined in GameplayBases.cs, invoked from BotBrain.cs. Was missing -> faithful/live. (3) RM-LASER RAPID LADDER — WrThink (Vaporizer.cs:128-146) now implements hagar_load + jump_interval2 (mode-0 fan first press, then mode-1 rapid bolts on g_rm_laser_rapid_refire). All rapid cvars match Base mutators.cfg (rapid 1 / delay 0.6 / refire 0.35). Was logic/timing partial -> faithful. (4) ELECTROBITCH — RocketMinstaLaserExplode (Vaporizer.cs:430-442) ports the airshot announce guard. (5) wr_reload — WrThink (Vaporizer.cs:80-91) ports the forced-reload branch via WrReload + hagar_load clear. (6) INSTAGIB hit-confirm + downgrade — InstagibMutator HitsoundDamageDealtTotal raised on attacker+target (lines 206-207/236) and INSTAGIB_DOWNGRADE centerprint emitted in AmmoCheck (line 321). Was presentation/audio partial -> faithful. All g_rm and g_rm_laser cvar fallbacks confirmed against mutators.cfg:442-460 (exact match). NO regressions. STILL OPEN: RM-explosion presentation effect, RM-laser distinct CSQC visual (descriptor absent) + Newtonian velocity (intentionally moot), primary cylindric VaporizerBeam team-color CSQC path, Instagib-hardcoded-true bare class default. wr_zoom/wr_init reticle (CSQC) unmapped."
