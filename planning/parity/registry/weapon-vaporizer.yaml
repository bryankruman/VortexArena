summary:
  feature_count: 12
  worst_gaps:
    - "No rail beam is drawn on fire — the weapon's signature visual is absent (no beam, no muzzle flash, no impact spark, no impact sound). The sister Vortex emits all of these from existing seams (EffectEmitter VORTEX_BEAM/IMPACT/MUZZLEFLASH + neximpact)."
    - "Rocket-Minsta explosion + laser-fan cvar fallbacks are ~half of Base (g_rm_damage 35 vs 70, radius 90 vs 140, laser_count 1 vs 3, laser_lifetime 0.3 vs 30…); RM-explosion tagged Vaporizer not WEP_DEVASTATOR|HITTYPE_SPLASH; RM-laser tagged Vaporizer not WEP_ELECTRO."
    - "Instagib flag is hardcoded true on the class: a non-instagib Vaporizer spends 1 cell/shot instead of primary_ammo 10; wr_aim missing so bots can't use it."
  verifier_notes: "Adversarial pass 2026-06-22: 3 dimension statuses changed from the draft (headshot audio unknown->faithful [announce verified wired]; secondary liveness unknown->partial [driver calls WrThink(Secondary), path reachable]; secondary presentation/audio unknown->na [belong to Blaster]). Added 1 feature the draft omitted (kill/suicide messages — ARE ported in DeathMessages.cs, draft wrongly listed as a gap). Added the RM-laser WEP_ELECTRO deathtype mismatch gap (draft missed it). Re-confirmed: primary rail logic/values faithful+live (constants 150/800/1/0.3/10 verified vs bal-wep-xonotic.cfg:488-496); InstaGib integration live (MutatorActivation gates on g_instagib, hooks subscribed); fire-sound volume 1.0 vs Base VOL_BASE*0.8 (confirmed default volume param); all presentation/achievement features genuinely missing (no emit call, comment-deferred)."
