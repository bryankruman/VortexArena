unit: sv-antilag
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "W_SetupShot trueaim + shotorg traces are NOT antilagged in the port: Base runs them through WarpZone_traceline_antilag/tracebox_antilag at g_antilag==2 (tracing.qc:46/85/97), so w_shotend/w_shotorg/w_shotdir are computed against REWOUND enemy positions for every weapon; the port's WeaponFiring.SetupShot uses plain present-position traces. Hitscan damage hit-reg is still rewound via the FireBullet bracket, but the trueaim point a projectile is launched toward (and the muzzle nudge) uses present positions."
    - "Vehicle occupants are never rewound: Base recurses antilag into a manned vehicle's body, the port has no vehicle recursion, so high-ping shots at a moving vehicle hit its present position only."
    - "g_antilag modes 1 (verified client-side) and 3 (prydon cursor hitscan) are unimplemented: a server set to either gets NO lag compensation at all (port treats anything != 2 as no-rewind)."
    - "Shotgun melee secondary is not lag-compensated: Base traces it through WarpZone_traceline_antilag (shotgun.qc:124); the port's Shotgun.Melee uses a plain trace."
