unit: mutator-physical_items
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 4
  worst_gaps:
    - "Whole mutator is DEAD: HasPhysicsEngine() is hard-false (no ODE rigid-body integrator wired to gameplay entities), so IsEnabled never returns true, the mutator never adds, Hook() never subscribes Item_Spawn, and no ghost is ever spawned. This faithfully reproduces Base's own MUTATOR_ONADD revert on a non-DP_PHYSICS_ODE build, but means physical items never function in a normal match."
    - "Even if the gate were opened, MoveType.Physics has no rigid-body integrator in the deterministic sim — ghosts would think/touch/damage-snap correctly but would NOT physically tumble/slide (the actual ODE physics is unported)."
features:
  - id: mutator-physical_items.registration.ode_gate
    name: "Mutator registration + ODE-engine availability gate (MUTATOR_ONADD revert)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/physical_items/sv_physical_items.qc:7 REGISTER_MUTATOR"
      - "common/mutators/mutator/physical_items/sv_physical_items.qc:10 MUTATOR_ONADD"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PhysicalItemsMutator.cs:47 IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PhysicalItemsMutator.cs:279 HasPhysicsEngine"
      - "src/XonoticGodot.Server/GameWorld.cs:563"
    constants:
      - { name: "physics_ode (engine cvar, required for activation)", base: "0 (off; needs DP_PHYSICS_ODE)", port: "no autocvar_physics_ode / no ODE engine", match: false }
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "HasPhysicsEngine() unconditionally returns false (after emitting the exact QC revert Log.Trace), so the mutator self-disables. This reproduces QC's own MUTATOR_ONADD revert path when DP_PHYSICS_ODE is unavailable — the port has no ODE rigid-body integrator wired to gameplay entities, so the only faithful behavior on a non-ODE engine is to revert to classic items, which is what stock DarkPlaces also does by default."
    gaps: []
    verification:
      - { kind: code, ref: "PhysicalItemsMutator.cs:47-48 IsEnabled = Api.Services!=null && g_physical_items!=0 && HasPhysicsEngine(); HasPhysicsEngine() (PhysicalItemsMutator.cs:279-289) returns false unconditionally after latched revert Log.Trace; revert string byte-identical to QC LOG_TRACE (sv_physical_items.qc:14)", result: pass }
      - { kind: code, ref: "Activation entry on live path: MutatorActivation.Apply() at GameWorld.cs:563 iterates Mutators.All + evaluates IsEnabled (MutatorActivation.cs:82-84) → gate predicate IS reached on the live boot path", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.PhysicalItems_Disabled_NoPhysicsEngine: Boot(g_physical_items=1) → IsEnabled==false && Added==false (the mutator never activates without a physics engine)", result: pass }
    confidence: high
    notes: "RE-VERIFIED 2026-06-25 (drift check): the gate predicate IS reached on the live boot path (liveness=live correct) but always evaluates false. The static `_revertLogged` latch (PhysicalItemsMutator.cs:277-289) fires the revert Log.Trace once-per-process, matching QC's single MUTATOR_ONADD evaluation. With g_physical_items default 0, IsEnabled short-circuits on the cvar==0 check; the revert Log.Trace only fires if an operator sets the cvar to non-zero. Either way the mutator never adds and never hooks anything, exactly as Base reverts on a non-ODE build."
