      - "common/mutators/mutator/physical_items/sv_physical_items.qc:10 MUTATOR_ONADD"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PhysicalItemsMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PhysicalItemsMutator.cs:HasPhysicsEngine"
      - "src/XonoticGodot.Server/GameWorld.cs:511"
    constants:
      - { name: "physics_ode (engine cvar, required for activation)", base: "0 (off; needs DP_PHYSICS_ODE)", port: "no autocvar_physics_ode / no ODE engine", match: false }
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "HasPhysicsEngine() unconditionally returns false (after emitting the exact QC revert Log.Trace), so the mutator self-disables. This reproduces QC's own MUTATOR_ONADD revert path when DP_PHYSICS_ODE is unavailable — the port has no ODE rigid-body integrator wired to gameplay entities, so the only faithful behavior on a non-ODE engine is to revert to classic items, which is what stock DarkPlaces also does by default."
    gaps: []
    verification:
      - { kind: code, ref: "PhysicalItemsMutator.cs:47-80 IsEnabled/HasPhysicsEngine vs sv_physical_items.qc:10-17; revert Log.Trace string matches QC LOG_TRACE verbatim", result: pass }
      - { kind: code, ref: "Activation entry on live path: MutatorActivation.Apply() at GameWorld.cs:511", result: pass }
    confidence: high
    notes: "VERIFIED 2026-06-22 (adversarial): MutatorActivation.Apply() iterates Mutators.All and evaluates IsEnabled (MutatorActivation.cs:60-64), so the gate predicate IS reached on the live boot path → liveness=live is correct. With g_physical_items default 0, IsEnabled short-circuits on the cvar==0 check and HasPhysicsEngine()/the revert Log.Trace never run; the trace only fires if an operator sets the cvar. Either way the mutator never hooks anything (hard-false gate), exactly as Base reverts on a non-ODE build. Revert string is byte-identical to QC LOG_TRACE (sv_physical_items.qc:14)."
