  - id: mutator-physical_items.item_spawn.ghost_entity
    name: "Item_Spawn: spawn physics ghost entity + hide real item"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/physical_items/sv_physical_items.qc:92 MUTATOR_HOOKFUNCTION(physical_items, Item_Spawn)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PhysicalItemsMutator.cs:79 OnItemSpawn"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:1089 ItemSpawn HookChain / 1097 FireItemSpawn"
      - "src/XonoticGodot.Common/Gameplay/Items/StartItem.cs:165 (FireItemSpawn call site)"
      - "src/XonoticGodot.Common/Gameplay/Items/EntityItemState.cs:187,193,201 (PhysSpawnOrigin/Angles/PhysIsDropped)"
    constants:
      - { name: "ghost solid", base: "SOLID_CORPSE", port: "Solid.Corpse (PhysicalItemsMutator.cs:107)", match: true }
      - { name: "ghost movetype", base: "MOVETYPE_PHYSICS", port: "MoveType.Physics (PhysicalItemsMutator.cs:108)", match: true }
      - { name: "ghost takedamage", base: "DAMAGE_AIM", port: "DamageMode.Aim (PhysicalItemsMutator.cs:109)", match: true }
      - { name: "ghost effects", base: "EF_NOMODELFLAGS (disable spin) = 8388608", port: "8388608 (PhysicalItemsMutator.cs:113)", match: true }
      - { name: "ghost.damageforcescale", base: "autocvar_g_physical_items_damageforcescale (3)", port: "DamageForceScale (PhysicalItemsMutator.cs:116)", match: true }
      - { name: "mode gate", base: "owner==NULL && g_physical_items<=1 -> skip; spawnflags&1 (floating) -> skip", port: "!isDropped && Mode<=1 -> skip; (SpawnFlags&1)!=0 -> skip (PhysicalItemsMutator.cs:88,91)", match: true }
      - { name: "real item hide", base: "EF_NODRAW + MOVETYPE_FOLLOW + aiment=ghost + setSendEntity func_null", port: "EffectFlags.NoDraw + MoveType.Follow + Aiment=wep (PhysicalItemsMutator.cs:141-145); setSendEntity has no port equivalent (visibility via EF_NODRAW only)", match: false }
      - { name: "settle", base: "DropToFloor_QC_DelayedInit when !cnt (map item)", port: "no explicit DropToFloor; relies on TOSS/Physics integrator settling next step (PhysicalItemsMutator.cs:132-134 comment)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: partial
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "setSendEntity(item, func_null) is not ported — the real item's net-send is not explicitly suppressed; the port relies on EF_NODRAW for client invisibility. Minor net-presentation divergence (item stays in the entity feed but draws nothing)."
      - "DropToFloor_QC_DelayedInit is not called for map-item ghosts; the port assumes the Physics/TOSS integrator settles the ghost on the next step. With no ODE integrator wired this never matters today (mutator is dead), but it is a settle-behavior divergence if the gate were ever opened."
      - "DEAD: the whole hook is unreachable because IsEnabled is hard-false, so OnItemSpawn is never subscribed and never fires in a normal match."
    verification:
      - { kind: code, ref: "RE-VERIFIED 2026-06-25 (drift check): OnItemSpawn (PhysicalItemsMutator.cs:79-151) fully ports the QC Item_Spawn body — spawns a ghost (Api.Entities.Spawn), copies model/size/origin/angles/velocity, sets Owner/Solid.Corpse/MoveType.Physics/DamageMode.Aim/EF_NOMODELFLAGS/DamageForceScale/DpHitContentsMask/PhysIsDropped, wires Think/Touch/event_damage, records PhysSpawnOrigin/Angles, hides the real item (NoDraw + Follow + Aiment). Subscribed in Hook() via MutatorHooks.ItemSpawn.Add (PhysicalItemsMutator.cs:62-63); HookChain + FireItemSpawn exist (MutatorHooks.cs:1089-1101); StartItem.cs:165 fires FireItemSpawn at the tail of every world-item spawn. The CHAIN is live, but the SUBSCRIBER never registers because the mutator never adds (gate hard-false)", result: pass }
    confidence: high
    notes: "MAJOR DRIFT FIX vs prior baseline: this feature was recorded as fully `missing` with empty port_refs and a verification note claiming 'STILL no Item_Spawn hook chain ... grep returns nothing'. That note was factually stale — the current code has a complete, faithful implementation (the Item_Spawn HookChain, FireItemSpawn, the StartItem call site, and the EntityItemState ghost fields all exist). All re-derivable constants match Base. The remaining defects are: presentation `partial` (no setSendEntity equivalent; relies on EF_NODRAW), the DropToFloor settle divergence, and liveness `dead` (the mutator never adds, so the hook is never subscribed). Reclassified missing->faithful on logic/values/timing, missing->partial on presentation, na->dead on liveness."
