unit: mapobject-target
category: mapobject
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "target_changelevel CHANGELEVEL_MULTIPLAYER spawnflag is mis-defined: Base = BIT(1)=2, port = 1<<0=1. The multiplayer-fraction branch is gated on the wrong bit, so a real map's CHANGELEVEL_MULTIPLAYER (bit 2) is never honored and an unrelated bit-1 flag would falsely take it."
    - "target_changelevel is doubly inert on the live path: (a) NextLevelHandler/ChangeLevelHandler/RealPlayerVoteCount seams are assigned ONLY in tests, and (b) the .chmap / .gametype entity keys are never bound from the BSP (ChMap/ChLevelGameType are declared but no field binder reads them), so even a wired seam could only ever hit the empty-chmap NextLevel branch."
    - "target_levelwarp is inert: CampaignLevelWarpHandler/IsCampaign seams assigned only in tests, unwired in src/game, so campaign level-warp triggers do nothing."
    - "target_spawn is a documented no-op: the $-templating reflection engine is cut AND SpawnEntityHandler is never assigned outside tests, so on-use and ON_MAPLOAD both do nothing."
    - "target_music/trigger_music override is listen-server only (TE_CSQC_TARGET_MUSIC / ENT_CLIENT_TRIGGER_MUSIC net paths not ported) — a remote/dedicated client gets no music override."
    - "target_music_use is a GLOBAL override, not QC's per-activator + spectators override; the per-round target_music_reset/target_music_kill resend and TargetMusic_RestoreGame are unimplemented."
    - "target_speaker ACTIVATOR (BIT3) plays to ALL players, not just the triggering client (no MSG_ONE), and the *-prefixed per-player voice-sample randomization is unimplemented; channel mapped to Body not CH_TRIGGER_SINGLE."

