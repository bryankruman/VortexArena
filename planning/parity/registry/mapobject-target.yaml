last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "target_changelevel is STILL doubly inert on the live path: (a) TargetUtilities.NextLevelHandler/ChangeLevelHandler/RealPlayerVoteCount are assigned ONLY in tests (the Server's Commands.ChangeLevelHandler — GameWorld.cs:2139, NetGame.cs:758/779 — is a SEPARATE field for the console `map` command, NOT TargetUtilities.ChangeLevelHandler), and (b) the .chmap / .gametype entity keys are still never bound from the BSP (ChMap/ChLevelGameType are declared+read only by TargetUtilities; no MapObjectFieldsExtra/GameWorld key binder reads \"chmap\"/\"gametype\"). The CHANGELEVEL_MULTIPLAYER spawnflag bit is faithful (1<<1 = BIT(1) = 2)."
    - "target_levelwarp is STILL inert: CampaignLevelWarpHandler/IsCampaign are never assigned outside tests (Assault.cs only CONSUMES IsCampaign), so campaign level-warp triggers do nothing and the campaign gate short-circuits."
    - "target_spawn is STILL a documented no-op: the $-templating reflection engine is cut AND SpawnEntityHandler is never assigned (zero assignments incl. tests), so on-use and ON_MAPLOAD both invoke a null seam."
    - "The Centerprint seam (MapObjectsCommon.CenterprintHandler) used by target_items is NEVER ASSIGNED anywhere (grep: zero assignments incl. tests) — centerprint text still never reaches the player. The audible-half hack (mis-playing misc/talk.wav) is gone, so target_items is now faithfully silent rather than wrongly noisy, but the message text does not render."
    - "target_music / trigger_music override is still listen-server only (TE_CSQC_TARGET_MUSIC / ENT_CLIENT_TRIGGER_MUSIC net paths not ported); the target_music_reset/trigger_music_reset hooks are assigned to e.Reset but GameWorld.ResetMapObjects fires NO entity .Reset hooks (it only removes projectiles), so the per-round reset plumbing is present-but-dead (trigger_music_reset's spawn-time call still runs)."
    - "target_speaker ACTIVATOR (BIT3) has a dedicated IS_REAL_CLIENT-gated handler on the correct CH_TRIGGER channel, but with no MSG_ONE per-client sound facade it still plays to ALL clients; the *-prefixed per-player voice-sample randomization resolves to silence (faithful not-found fallback) rather than the real per-player sample."

