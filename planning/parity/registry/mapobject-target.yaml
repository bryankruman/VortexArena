  - id: mapobject-target.music.target_music
    name: "target_music — triggered background-music override / map default"
    layer: [authority, presentation]
    base_refs:
      - "common/mapobjects/target/music.qc:target_music_use"
      - "common/mapobjects/target/music.qc:Net_TargetMusic / TargetMusic_Advance"
      - "common/mapobjects/target/music.qc:target_music_reset / target_music_kill / TargetMusic_RestoreGame"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/MapObjects/TargetMusic.cs:TargetMusicSetup"
      - "game/client/MusicPlayer.cs:EvaluateMusicSources"
    constants:
      - { name: "default_volume", base: "1", port: "1", match: true }
      - { name: "lifetime/fade_time/fade_rate", base: "seconds (fade 0 = instant)", port: "seconds (fade 0 -> 2s default)", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: faithful
      audio: faithful
      liveness: partial
    intended_divergence: true
    divergence_rationale: "The whole CSQC TargetMusic_Advance + TE_CSQC_TARGET_MUSIC net path is replaced by MusicPlayer.cs reading the live server entity state directly. On the listen-server (the primary play path) this is byte-for-byte the same audible result without a net round-trip; the priority stack (trigger > targeted target_music within lifetime > lifetime-0 default-slot claim > untargeted default > cdtrack) and lifetime/default-slot semantics are preserved. Fade default keeps the port's gentle 2s crossfade where QC's 0 means instant (no shipped map carries the fade keys)."
    gaps:
      - "Listen-server ONLY: a remote/dedicated client receives no target_music override (the TE_CSQC_TARGET_MUSIC net message is not ported)."
      - "target_music_use is GLOBAL, not QC's per-activator (IS_REAL_CLIENT actor) + spectator (IS_SPEC && enemy==actor) override — every client hears the override, not just the player who triggered it."
      - "QC fade 0 = instant; the port substitutes a 2s default crossfade."
      - "Per-round/restore plumbing absent: QC target_music_reset (untargeted resends default on round reset), target_music_kill (zero all volumes), and TargetMusic_RestoreGame (re-init on savegame load) have no port analogue."
    verification:
      - { kind: code, ref: "MusicPlayer.cs priority eval (trigger/lifetime-target/default-slot passes); MusicLifetime/fade fields bound in MapObjectFieldsExtra.cs:134-136; MusicActivationTime stamped in TargetMusicUse", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MusicSystemTests.cs", result: pass }
    confidence: medium
    notes: "MusicActivationTime stamped on use; lifetime>0 outranks default until expiry, lifetime 0 claims the default slot (latest activation wins) — faithful to Net_TargetMusic. Registered MapObjectsRegistry.cs:128."

