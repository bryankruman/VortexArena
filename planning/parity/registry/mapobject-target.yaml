  - id: mapobject-target.changelevel.use
    name: "target_changelevel — end / switch the level (multiplayer fraction)"
    layer: [authority]
    base_refs:
      - "common/mapobjects/target/changelevel.qc:target_changelevel_use"
      - "common/mapobjects/target/changelevel.qc:spawnfunc(target_changelevel)"
      - "common/mapobjects/target/changelevel.qh:CHANGELEVEL_MULTIPLAYER"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/MapObjects/TargetUtilities.cs:ChangeLevelUse"
      - "src/XonoticGodot.Common/Gameplay/MapObjects/TargetUtilities.cs:ChangeLevelSetup"
    constants:
      - { name: "count_default_fraction", base: "0.7", port: "0.7 (when Count==0)", match: true }
      - { name: "CHANGELEVEL_MULTIPLAYER", base: "BIT(1)=2", port: "1<<0=1", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "SPAWNFLAG BIT WRONG: changelevel.qh defines CHANGELEVEL_MULTIPLAYER = BIT(1) = 2, but the port hard-codes `ChangeLevelMultiplayer = 1 << 0` (=1). The multiplayer-fraction branch is gated on the wrong bit — a real map's MULTIPLAYER flag (value 2) is ignored, and an unrelated bit-1 flag would falsely engage the fraction vote."
      - "chmap / gametype entity keys are NEVER BOUND: ChMap and ChLevelGameType are declared (default \"\") in EntityMapObjectStateExtra.cs but no field binder (MapObjectFieldsExtra, Engine, or Server) reads the \"chmap\"/\"gametype\" keys. So .chmap is always empty at runtime — only the NextLevel (end-match) branch can ever be reached; changelevel(chmap) is unreachable even if the seam were wired."
      - "DEAD on the live path: NextLevelHandler / ChangeLevelHandler / RealPlayerVoteCount are assigned ONLY in tests (grep: no assignment in src/ or game/), so an end-of-level trigger neither ends the match nor switches maps — it is a silent no-op."
      - "The CHANGELEVEL_MULTIPLAYER fraction never sees a real client list at runtime (RealPlayerVoteCount unwired), so it falls back to treating the single triggering player as the whole vote."
      - "A FRACTIONAL map count (e.g. 0.5) can't survive the int-only Count binder; only integer counts or the 0.7 default reach the float fraction."
      - "The .gametype next-map gametype switch is explicitly not ported (logged, not applied) — and moot since the gametype key is never bound."
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/TargetUtilitiesTests.cs:TargetChangelevel_EmptyChmap_CallsNextLevel", result: pass }
      - { kind: grep, ref: "no TargetUtilities.NextLevelHandler/ChangeLevelHandler/RealPlayerVoteCount assignment outside tests/", result: fail }
      - { kind: grep, ref: "no 'chmap'/'gametype' key binder reads ChMap/ChLevelGameType (only TargetUtilities reads the fields)", result: fail }
      - { kind: code, ref: "changelevel.qh: CHANGELEVEL_MULTIPLAYER=BIT(1); port TargetUtilities.cs:272 = 1<<0 — off by one", result: fail }
    confidence: high
    notes: "GameWorld.NextLevel and Commands.ChangeLevelHandler (the console map command) both exist; only the target_changelevel->handler assignment + the chmap/gametype key binders + the spawnflag-bit fix are missing. Highest-value fix in this unit; the spawnflag-bit error is a one-line bug."

