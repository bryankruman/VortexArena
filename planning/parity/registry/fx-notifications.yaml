    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Notifications/NotificationTokens.cs (Resolve/ResolveOne)"
      - "src/XonoticGodot.Common/Gameplay/Notifications/NotificationSystem.cs:337 (FormatTokens), :351 (Sprintf)"
    constants:
      - { name: "KILL_SPREE_LIST milestones", base: "3/5/10/15/20/25/30", port: "3/5/10/15/20/25/30 (SpreeList)", match: true }
      - { name: "notification_show_sprees", base: "1 (default true)", port: "CvarBool fallback true", match: true }
      - { name: "notification_show_sprees_info", base: "3", port: "3 (CvarInt fallback)", match: true }
      - { name: "notification_show_location default", base: "0 (false)", port: "CvarBool(..., true) -> ON when unset", match: false }
      - { name: "notification_show_sprees_info_specialonly default", base: "1 (true)", port: "CvarBool(..., false) -> OFF when unset", match: false }
      - { name: "notification_show_sprees_center_specialonly default", base: "1 (true)", port: "CvarBool(..., false) -> OFF when unset", match: false }
      - { name: "item_wepammo ammo name", base: "ammo_type.m_name (cells/rockets/...)", port: "literal \"ammo\"", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: partial
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "CvarBool fallback-polarity defects: ShowLocation uses CvarBool(\"notification_show_location\", true) — Base default is 0/false, so an UNSET cvar makes the port force the location suffix ON (opposite of Base). Likewise both *_specialonly are read with fallback=false but Base defaults them to 1/true, so an unset cvar makes the port print generic 'N frag spree!' / 'N frags in a row!' lines that Base suppresses. Masked at runtime when notifications.cfg is exec'd (ConfigLoader.LoadServerConfig seeds location=0, specialonly=1), but wrong for headless/test paths and any code path that formats before config load."
      - "Tokens are resolved SERVER-side reading the SERVER's notification_show_location / _show_sprees* cvars; in Base these are CSQC-side per-client, so the port loses per-client control of location/spree display (all recipients get the server's preference). Direct consequence of server-side formatting (see fx-notifications.net.protocol intended divergence)."
      - "item_wepammo returns the literal \"ammo\" rather than the weapon's actual ammo type name (notif_arg_item_wepammo: ammo_type.m_name). Minor wording defect on weapon-drop info lines."
      - "frag_pos token is commented out in Base too; race tokens (f*race_time/race_diff/race_col) referenced in the spec but NotifTokens.ResolveOne does not implement race_col / f*race_time / race_diff (returns '' for those) — exercised only by race split notifs."
    verification:
      - { kind: code, ref: "NotifTokens.ResolveOne case table vs NOTIF_ARGUMENT_LIST: s1-4/s*loc/f*/spree/frag/location/ordinal/time formatting present and matches; race_col/f*race_time/race_diff NOT in the switch (fall to '')", result: partial }
      - { kind: code, ref: "CvarBool(name, fallback) returns v!=0||fallback: show_location fallback true (Base 0), both specialonly fallback false (Base 1) — polarity inverted vs Base defaults", result: fail }
      - { kind: test, ref: "NotificationPolishTests (token formatting), HeadshotTests", result: pass }
    confidence: high
    notes: "CORRECTED from draft: draft claimed notification_show_location base=0/port=0 match=true and faithful spree formatting. In fact the port's CvarBool fallbacks invert three default polarities; runtime-masked by notifications.cfg but a genuine default-correctness defect. CSQC-only tokens like frag_ping/frag_stats work because the server passes ping/health/armor as floats."

