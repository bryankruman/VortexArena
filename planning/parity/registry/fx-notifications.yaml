unit: fx-notifications
category: notification
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 16
  worst_gaps:
    - "Spectator-follow recipients are STILL not routed: ServerNet.NotificationReaches omits the QC `IS_SPEC(to) && to.enemy == other` clause (and the matching AllExcept/Team nuances), so spectators following a player miss that player's personal NOTIF_ONE/TEAM notifications. Unchanged this wave."
    - "Token expansion runs SERVER-side and reads the SERVER's notification_show_location / _show_sprees* cvars, so all clients get the server's preference (no per-client control); plus three CvarBool fallback-polarity defects (location defaults ON, both *_specialonly default OFF) that diverge from Base when the cvar is unset. NotificationTokens.cs untouched this wave; item_wepammo still returns literal \"ammo\"; race tokens (f*race_time/race_diff/race_col) still unimplemented."
    - "Gentle-mode is now LIVE but server-global: GameWorld mirrors sv_gentle onto NotificationSystem.GentleMode each tick, so per-CLIENT cl_gentle preference is lost (a deliberate consequence of server-side text formatting). Functionally correct for sv_gentle servers."
