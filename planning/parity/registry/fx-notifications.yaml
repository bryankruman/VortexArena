    status:
      logic: faithful
      values: partial
      timing: na
      presentation: partial
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "STILL OPEN (unchanged by Wave 5): CvarBool fallback-polarity defects: ShowLocation uses CvarBool(\"notification_show_location\", true) — Base default is 0/false, so an UNSET cvar makes the port force the location suffix ON. Likewise both *_specialonly are read with fallback=false but Base defaults them to 1/true, so an unset cvar makes the port print generic 'N frag spree!' / 'N frags in a row!' lines that Base suppresses. Masked at runtime when notifications.cfg is exec'd, but wrong for headless/test paths."
      - "Tokens are resolved SERVER-side reading the SERVER's notification_show_location / _show_sprees* cvars; in Base these are CSQC-side per-client, so the port loses per-client control of location/spree display (direct consequence of server-side formatting — see fx-notifications.net.protocol intended divergence)."
      - "item_wepammo returns the literal \"ammo\" (WeaponAmmoName is a stub) rather than the weapon's actual ammo type name (notif_arg_item_wepammo: ammo_type.m_name). Minor wording defect on weapon-drop info lines."
      - "race tokens (f*race_time/race_diff/race_col) referenced in the spec are NOT implemented in ResolveOne (return '') — exercised only by race split notifs."
    verification:
      - { kind: code, ref: "NotificationTokens.ResolveOne case table vs NOTIF_ARGUMENT_LIST: s1-4/s*loc/f*/spree/frag/location/ordinal/time formatting present and matches; race_col/f*race_time/race_diff NOT in the switch", result: partial }
      - { kind: code, ref: "CvarBool(name, fallback): show_location fallback true (Base 0), both specialonly fallback false (Base 1) — polarity inverted vs Base defaults", result: fail }
      - { kind: test, ref: "NotificationPolishTests (token formatting), HeadshotTests", result: pass }
    confidence: high
    notes: "Unchanged by Wave 5. The CvarBool fallbacks invert three default polarities; runtime-masked by notifications.cfg but a genuine default-correctness defect. CSQC-only tokens like frag_ping/frag_stats work because the server passes ping/health/armor as floats."

