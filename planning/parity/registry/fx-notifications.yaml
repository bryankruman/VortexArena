  - id: fx-notifications.net.protocol
    name: "ENT_CLIENT_NOTIFICATION wire protocol (server encode -> client decode)"
    layer: [authority, presentation]
    base_refs:
      - "common/notifications/all.qc:1449 (Net_Write_Notification)"
      - "common/notifications/all.qc:1362 (REGISTER_NET_LINKED ENT_CLIENT_NOTIFICATION)"
      - "common/notifications/all.qc:1365 (NET_HANDLE ENT_CLIENT_NOTIFICATION)"
    port_refs:
      - "game/net/ServerNet.cs:288 (NotificationSystem.Sink = NotificationNetSink)"
      - "game/net/ServerNet.cs:2370 (FlushNotifications), :2423 (WriteNotification — writes RegistryId + WireType + text + args)"
      - "game/net/ClientNet.cs:1140 (HandleReliableBundle decode -> Notifications.ById(:1155) -> NotificationReceived)"
      - "game/net/NetGame.cs (OnNotificationReceived -> HudNotifications.OnNotification)"
    constants:
      - { name: "wire payload", base: "byte type + short name + strings + longs (re-formatted CSQC-side)", port: "ushort RegistryId + byte type(=WireType) + server-FORMATTED text + str[] + float[]", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port sends the server-FORMATTED text plus the raw args and the notification's RegistryId (vs Base sending only id+args and re-formatting on CSQC). The RegistryId lets the client recover the Notification to read icon/cpid/queuetime/durcnt. This is a deliberate consequence of the port doing token expansion server-side (FormatTokens). One real residual consequence: the location/spree display cvars and gentle mode are read SERVER-side, so per-client control of those is lost (see fx-notifications.args.tokens, .gentle). The durcnt-encoded duration is NO LONGER dropped — it is recovered client-side from the notification's Durcnt field via the RegistryId (see fx-notifications.center.durcnt)."
    gaps:
      - "Per-client display cvars (notification_show_location / _show_sprees*) and gentle mode cannot vary per recipient — the server's value applies to everyone (see fx-notifications.args.tokens, fx-notifications.gentle.variants)."
    verification:
      - { kind: code, ref: "WriteNotification (:2423) writes RegistryId (:2425) + (byte)d.WireType (:2426) so the server-driven CenterKill/Title/DuelTitle/Raw type overrides survive the wire and the client can recover icon/cpid/durcnt; client HandleReliableBundle (:1143-1156) reads RegistryId back, resolves Notifications.ById, forwards via NotificationEvent", result: pass }
      - { kind: code, ref: "ServerNet.NotificationNetSink (:288) -> CaptureNotification -> FlushNotifications (:2370) -> WriteNotification (:2423) -> ClientNet decode (:1140) -> NetGame.OnNotificationReceived -> HudNotifications.OnNotification (traced)", result: pass }
      - { kind: test, ref: "ClientFeedbackTests, CountdownAnnouncerTests (end-to-end notify)", result: pass }
    confidence: high
    notes: "Reliable channel (matches QC linked-entity reliability). RegistryId resolves the Notification on the client to recover icon/cpid/queuetime AND durcnt; the four server-driven center variants round-trip via WireType. The common formatted-text divergence is intended."

  - id: fx-notifications.net.shouldsend
    name: "Per-recipient broadcast routing (Notification_ShouldSend)"
    layer: [authority]
    base_refs:
      - "common/notifications/all.qc:62 (Notification_ShouldSend)"
    port_refs:
      - "game/net/ServerNet.cs:2399 (NotificationReaches)"
    constants: []
    status:
      logic: partial
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "STILL OPEN (unchanged this wave): NotificationReaches (:2399-2417) omits the QC spectator-follow clause: NOTIF_ONE should also reach `IS_SPEC(to) && to.enemy == other`; NOTIF_TEAM the spec whose `enemy.team == other.team`; NOTIF_ALL_EXCEPT must also exclude `IS_SPEC(to) && to.enemy == other`; NOTIF_TEAM_EXCEPT has a parallel spec nuance. The port covers only the direct player match for each, so a spectator following a player will not receive that player's personal NOTIF_ONE/TEAM notifications."
      - "TEAM/TEAM_EXCEPT require `d.Target is Player`; a null-team or non-Player target silently reaches nobody (QC NOTIF_TEAM tolerates a missing/zero team)."
    verification:
      - { kind: code, ref: "ServerNet.NotificationReaches switch (:2401-2416) vs Notification_ShouldSend (all.qc:62-91): no IS_SPEC branch in any case; AllExcept and Team[Except] also lack the spec nuance", result: fail }
    confidence: high
    notes: "ALL/ALL_EXCEPT/ONE/ONE_ONLY direct-recipient routing is correct; the gap is the spectator-follow clauses (all four spec-aware cases) and the missing-team edge case. This wave did not touch this method."

