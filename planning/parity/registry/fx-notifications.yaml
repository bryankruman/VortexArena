unit: fx-notifications
category: notification
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 14
  worst_gaps:
    - "Per-notification centerprint duration (QC durcnt / notification_item_centerprinttime=1.5) is dropped entirely: every centerprint shows for a fixed 3s (CenterPrintPanel.DefaultDuration), regardless of the message's declared duration."
    - "Gentle-mode message variants are never selected — NotificationSystem.GentleMode has no live setter (no cl_gentle/sv_gentle read), so gentle players still get the violent text even though the gentle strings ARE stored per notification."
    - "Spectator-follow recipients are not routed: ServerNet.NotificationReaches omits the QC `IS_SPEC(to) && to.enemy == other` clause (and the matching AllExcept/Team nuances), so spectators following a player miss that player's personal NOTIF_ONE/TEAM notifications."
    - "Kill_Notification / MSG_CENTER_KILL is not networked: no server->client 'clear this cpid group' message exists, yet Base uses Kill_Notification at 19+ live sites (timeout/timein, idle/join-prevention, keyhunt, vehicles, instagib find-ammo, nades, campcheck). Only local replace-by-id is available."
    - "Token expansion runs SERVER-side and reads the SERVER's notification_show_location / _show_sprees* cvars, so all clients get the server's preference (no per-client control); plus two CvarBool fallback-polarity defects (location defaults ON, specialonly defaults OFF) that diverge from Base when the cvar is unset (e.g. headless/tests)."
