  - id: fx-notifications.net.protocol
    name: "ENT_CLIENT_NOTIFICATION wire protocol (server encode -> client decode)"
    layer: [authority, presentation]
    base_refs:
      - "common/notifications/all.qc:1449 (Net_Write_Notification)"
      - "common/notifications/all.qc:1362 (REGISTER_NET_LINKED ENT_CLIENT_NOTIFICATION)"
      - "common/notifications/all.qc:1365 (NET_HANDLE ENT_CLIENT_NOTIFICATION)"
    port_refs:
      - "game/net/ServerNet.cs:288 (NotificationSystem.Sink = NotificationNetSink)"
      - "game/net/ServerNet.cs:2309 (FlushNotifications), :2362 (WriteNotification — writes d.WireType as the type byte)"
      - "game/net/ClientNet.cs:1132 (HandleReliableBundle decode -> NotificationReceived)"
      - "game/net/NetGame.cs:4279 (OnNotificationReceived -> HudNotifications.OnNotification)"
    constants:
      - { name: "wire payload", base: "byte type + short name + strings + longs (re-formatted CSQC-side)", port: "ushort id + byte type(=WireType) + server-FORMATTED text + str[] + float[]", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port sends the server-FORMATTED text plus the raw args (vs Base sending only id+args and re-formatting on CSQC). This is a deliberate consequence of the port doing token expansion server-side (FormatTokens); the client still receives the raw args so it can re-derive attacker/victim and the ^COUNT count. Net effect on screen is equivalent for the common case, but it has two real consequences: (1) the durcnt-encoded duration and gentle selection are decided at send time and currently dropped; (2) the location/spree cvars are read SERVER-side, so all clients get the server's preference (see fx-notifications.args.tokens)."
    gaps:
      - "Because text is formatted server-side, the durcnt-encoded duration and gentle selection are decided at send time and the port currently drops both (see fx-notifications.center.durcnt, .gentle)."
      - "Per-client display cvars (notification_show_location / _show_sprees*) cannot vary per recipient — the server's value applies to everyone (see fx-notifications.args.tokens)."
    verification:
      - { kind: code, ref: "WriteNotification (:2362) now writes (byte)d.WireType (:2365) so the server-driven CenterKill/Title/DuelTitle/Raw type overrides survive the wire; client HandleReliableBundle (:1138) reads it back as MsgType and forwards via NotificationEvent.Type", result: pass }
      - { kind: code, ref: "ServerNet.NotificationNetSink (:288) -> CaptureNotification (:2158) -> FlushNotifications (:2309) -> WriteNotification (:2362) -> ClientNet decode (:1132) -> NetGame.OnNotificationReceived (:4279) -> HudNotifications.OnNotification (traced)", result: pass }
      - { kind: test, ref: "ClientFeedbackTests, CountdownAnnouncerTests (end-to-end notify)", result: pass }
    confidence: high
    notes: "Reliable channel (matches QC linked-entity reliability). RegistryId resolves the Notification on the client to recover icon/cpid/queuetime. Wave 5 added a WireType field to NotificationDispatch (defaults to Notification.Type) so the four server-driven center variants round-trip; the common formatted-text divergence is unchanged."

  - id: fx-notifications.net.shouldsend
    name: "Per-recipient broadcast routing (Notification_ShouldSend)"
    layer: [authority]
    base_refs:
      - "common/notifications/all.qc:62 (Notification_ShouldSend)"
    port_refs:
      - "game/net/ServerNet.cs:2338 (NotificationReaches)"
    constants: []
    status:
      logic: partial
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "STILL OPEN (unchanged by Wave 5): NotificationReaches omits the QC spectator-follow clause: NOTIF_ONE should also reach `IS_SPEC(to) && to.enemy == other`; NOTIF_TEAM the spec whose `enemy.team == other.team`; NOTIF_ALL_EXCEPT must also exclude `IS_SPEC(to) && to.enemy == other`; NOTIF_TEAM_EXCEPT has a parallel spec nuance. The port covers only the direct player match for each, so a spectator following a player will not receive that player's personal NOTIF_ONE/TEAM notifications."
      - "TEAM/TEAM_EXCEPT require `d.Target is Player`; a null-team or non-Player target silently reaches nobody (QC NOTIF_TEAM tolerates a missing/zero team)."
    verification:
      - { kind: code, ref: "ServerNet.NotificationReaches switch (:2338-2356) vs Notification_ShouldSend (all.qc:62-91): no IS_SPEC branch in any case; AllExcept and Team[Except] also lack the spec nuance", result: fail }
    confidence: high
    notes: "ALL/ALL_EXCEPT/ONE/ONE_ONLY direct-recipient routing is correct; the gap is the spectator-follow clauses (all four spec-aware cases) and the missing-team edge case. Wave 5 did not touch this method."

