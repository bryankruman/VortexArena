unit: fx-notifications
category: notification
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 16
  worst_gaps:
    - "Per-notification centerprint duration (QC durcnt / notification_item_centerprinttime=1.5) is STILL dropped: every centerprint shows for a fixed 3s (CenterPrintPanel.DefaultDuration), regardless of the message's declared duration. Unchanged by Wave 5."
    - "Gentle-mode message variants are STILL never selected — NotificationSystem.GentleMode now has a public setter but NO live assignment anywhere (no cl_gentle/sv_gentle read), so gentle players still get the violent text even though the gentle strings ARE stored per notification. Unchanged by Wave 5."
    - "Spectator-follow recipients are STILL not routed: ServerNet.NotificationReaches omits the QC `IS_SPEC(to) && to.enemy == other` clause (and the matching AllExcept/Team nuances), so spectators following a player miss that player's personal NOTIF_ONE/TEAM notifications. Unchanged by Wave 5."
    - "Token expansion runs SERVER-side and reads the SERVER's notification_show_location / _show_sprees* cvars, so all clients get the server's preference (no per-client control); plus three CvarBool fallback-polarity defects (location defaults ON, both *_specialonly default OFF) that diverge from Base when the cvar is unset. Unchanged by Wave 5; item_wepammo still returns literal \"ammo\"."
