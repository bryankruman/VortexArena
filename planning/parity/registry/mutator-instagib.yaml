summary:
  feature_count: 22
  worst_gaps:
    - "Item-flag ONADD/ONREMOVE unblocking (IL_EACH g_instagib_items + ITEM_FLAG_MUTATORBLOCKED toggling) is not literally ported; the port instead leaves VaporizerCells/ExtraLife un-blocked and lets FilterItemDefinition gate them per-match (documented deliberate mechanism, behaviorally equivalent for keep/delete)."
    - "MatchEnd is not a dedicated FOREACH_CLIENT(instagib_stop_countdown) sweep; the per-tick game_stopped branch in AmmoCheck (reads the real VehicleCommon.GameStopped) covers it within ~1 tick — behaviorally equivalent for the visible centerprint, but not the literal match-end shape."
    - "spawn.fullbright: EF_FULLBRIGHT flag is set on the live spawn path but whether the Godot renderer actually renders the model fullbright is still unverified (behavioral check pending)."
  audit_note: >-
    2026-06-27 drift re-audit. The unit is now essentially fully faithful and live. Single drift vs the
    2026-06-25 baseline: misc.strings_monsters — the three monster/random-items hooks the baseline recorded
    as MISSING (its three "worst gaps") are now all ported AND live. (1) MonsterDropItem (drop
    "vaporizer_cells") OnMonsterDropItem (InstagibMutator.cs:742) dispatched LIVE via FireMonsterDropItem at
    MonsterFramework.cs:219. (2) MonsterSpawn (Mage skin=1) OnMonsterSpawn (line 752) dispatched LIVE via
    FireMonsterSpawn at MonsterAI.cs:510. (3) RandomItems_GetRandomItemClassName -> the weighted instagib-item
    pool pick OnRandomItemsGetClassName (line 773) dispatched LIVE via FireRandomItemsGetClassName at
    RandomItemsMutator.cs:305. So misc.strings_monsters: logic partial->faithful, liveness partial->live.
    All other rows re-verified unchanged from the 2026-06-25 baseline (items.defs/filter/touch, damage.yoda,
    countdown, loadout, etc. remain faithful+live; constants re-confirmed against mutators.cfg:
    extralives 1 / ammo_start 10 / ammo_drop 5 / invis_time 30 / speed_time 30). No regressions; no new
    unmapped Base features. base_ref_rev unchanged.
