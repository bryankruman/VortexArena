unit: mutator-instagib
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 22
  worst_gaps:
    - "Item economy still absent: there are NO VaporizerCells/ExtraLife item definitions or spawnfuncs (mutator-instagib.items.defs). The ItemTouch handler is LIVE-WIRED (subscribed to the real MutatorHooks.ItemTouch chain dispatched at ItemPickupRules.cs), but in a normal instagib match nothing spawns that carries cells (FilterItem deletes all ammo packs) and no instagib extralife item exists, so the cells-full-heal / extra-life-grant branches have no input to act on. The seam is live; the economy that feeds it is missing. (g_instagib_ammo_drop is unused anywhere in src/.)"
    - "FilterItem random-powerup deck still not ported: instagib_replace_item_with_random_powerup (even distribution of Invisibility/ExtraLife/Speed for big powerups when g_powerups is on) and the Vaporizer loot cells-seed (RES_CELLS = g_instagib_ammo_drop, return false; sv_instagib.qc:349-355) + the generic cells>ammo_drop clamp (361-363) are absent. The port DELETES big powerups instead of replacing them (faithful only when g_powerups is off) and the ammo-convert-to-VaporizerCells replacement is a delete (no replace seam)."
    - "Yoda easter-egg (alpha 0<a<1 -> yoda=1) in Damage_Calculate still not ported (Vaporizer.cs:191 deferred-only); SetModname ('InstaGib') + MonsterDropItem(vaporizer_cells) + MonsterSpawn(Mage skin) + RandomItems_GetRandomInstagibItemClassName still missing. BuildMutatorsPrettyString IS ported but its chain (MutatorActivation.BuildMutatorsPrettyString) has NO live caller — only BuildMutatorsString is invoked (GameWorld.cs:876)."
    - "Item-economy-dependent FilterItem replace seams + items.defs are the remaining gating gap for a fully-faithful instagib loot loop."
  audit_note: >-
    2026-06-25 drift re-audit vs the 2026-06-22 baseline. The port file (InstagibMutator.cs) advanced further
    since the baseline; four features are now BETTER than recorded: (1) enable.predicate gained the
    g_weaponarena==0 guard (line 69) — the !m_weaponarena hole is now closed via cvar, not just the menu radio
    group (logic partial->faithful, constant match false->true); (2) countdown.announce StopCountdown now issues
    NotificationSystem.SendCenterKill(CPID_INSTAGIB_FINDAMMO) (line 340) — the lingering-centerprint gap is
    closed (presentation partial->faithful); (3) lifecycle.stop_countdown now ports MakePlayerObserver LIVE
    (subscribed line 118, dispatched ClientManager.cs:480) — the observer-demotion case is covered
    (logic missing->faithful, liveness na->live); (4) misc.strings_monsters now ports BuildMutatorsString LIVE
    (override line 516, dispatched GameWorld.cs:876) so the ':instagib' serverinfo token is emitted, plus
    BuildMutatorsPrettyString (override line 520) which is DEAD (no live caller). MatchEnd is still not a
    dedicated hook (per-tick game_stopped covers it). No regressions found.
