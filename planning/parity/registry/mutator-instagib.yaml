summary:
  feature_count: 22
  worst_gaps:
    - "PlayerDamage_SplitHealthArmor NOT subscribed: port armor absorbs 70% of non-Vaporizer/non-Blaster damage (g_balance_armor_blockpercent 0.7), so the no-ammo bleed and contents damage are blunted and the armor-as-lives model is corrupted (verified: GameHooks.PlayerDamageSplitHealthArmor dispatched DamageSystem.cs:401; instagib never subscribes it, unlike vampire/globalforces/buffs)."
    - "Item filtering missing: map weapons/powerups/ammo not converted/replaced/removed (instagib never subscribes the live FilterItemDefinition hook at StartItem.cs:90 that Mayhem/Hook/MeleeOnly/Duel do)."
    - "Cells-pickup full-heal and ExtraLife armor-grant are dead methods (OnCellsTouch/OnExtraLifeTouch have no caller; the port has no ItemTouch mutator chain at all)."
    - "VaporizerCells / ExtraLife items have no spawnfunc — instagib ammo/extra-life items never spawn on maps; ONADD item-flag unblocking + g_instagib_items list not ported."
    - "Friendly-fire (g_friendlyfire==0 + same team) damage nullification not ported."
    - "Countdown announcer ladder incomplete: no per-number Announcer_PickNumber, no >90hp MULTI (INSTAGIB_FINDAMMO_FIRST) variant, no rocketminsta DOWNGRADE branch, no Kill_Notification clear."
    - "g_instagib_damagedbycontents and g_instagib_friendlypush cvars ignored; MatchEnd/MakePlayerObserver stop-countdown, monster hooks, modname/serverinfo strings, and the yoda easter-egg branch missing."
