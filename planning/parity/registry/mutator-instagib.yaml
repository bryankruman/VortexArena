    status:
      logic: missing
      values: missing
      timing: na
      presentation: na
      audio: na
      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "InstagibMutator does NOT subscribe GameHooks.PlayerDamageSplitHealthArmor (the hook EXISTS and is dispatched at DamageSystem.cs:401; vampire/globalforces/buffs subscribe it, instagib does not). So the port falls through to HealthArmorApplyDamage (DamageSystem.cs:633): save = damage*0.7 clamped to armor. Any non-Vaporizer/non-Blaster damage in instagib (the DEATH_NOAMMO bleed, contents/telefrag/etc.) is 70%-absorbed by armor and decrements the armor 'lives' pool as collateral — corrupting the armor-as-lives model and blunting the bleed-out (a player with armor takes only ~3hp instead of 10hp per bleed tick)."
    verification:
      - { kind: code, ref: "no GameHooks.PlayerDamageSplitHealthArmor subscription in InstagibMutator; dispatch confirmed DamageSystem.cs:401; armor split HealthArmorApplyDamage DamageSystem.cs:633", result: fail }
    confidence: high
    notes: "Upgraded from draft's unknown/low to missing/high after reading the port damage-split path. This is the worst gap — it silently distorts core instagib combat math, not just an absent feature."
