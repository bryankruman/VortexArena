last_audited: "2026-06-22"
summary:
  feature_count: 22
  worst_gaps:
    - "FilterItem is LIVE but logic-partial (InstagibMutator.cs UNCHANGED since the post-Wave-2 baseline): under default cvars (g_instagib_ammo_convert_* 0) the port KEEPS cell/rocket/shell/bullet ammo packs on the map (Base sv_instagib.qc:326-341 ALWAYS deletes them via return true), and the final fallthrough (line 421 `return false`) KEEPS every other item/weapon (Base sv_instagib.qc:361-368 deletes all non-converted items by default). So a normal DM map under instagib still spawns its stock weapons + ammo — only big powerups/jetpacks/Vortex/Devastator are removed."
    - "Item economy still absent: OnCellsTouch/OnExtraLifeTouch remain DEAD. Wave-5 added a generic MutatorHooks.ItemTouch chain (MutatorHooks.cs:FireItemTouch, dispatched at ItemPickupRules.cs:372) and one subscriber (SuperSpecMutator), but INSTAGIB never subscribes to it and still has no VaporizerCells/ExtraLife spawnfuncs — so cells-pickup full-heal and ExtraLife armor-grant never fire, and instagib ammo/extra-life items never spawn."
    - "AmmoCheck game_stopped stop-condition reads a phantom cvar g_game_stopped (InstagibMutator.cs:276) which is NEVER set/registered anywhere in the port (grep: only 3 readers, 0 writers; Cvars.cs does not register it) — so GetFloat returns 0 and that branch is non-functional. Unlike VehicleCommon.cs:846 which ORs in the real GameStopped global, instagib reads ONLY the dead cvar. The UNLIMITED_AMMO + rocketminsta-downgrade additions ARE functional."
    - "Hitsound feedback still missing: the ++hitsound_damage_dealt increments on the vaporizer life-eat (both target+attacker) and the mirror self-hit are not ported."
    - "MatchEnd / MakePlayerObserver stop-countdown still missing (no lifecycle hook chains); stale FINDAMMO centerprint can linger, and StopCountdown still never Kill_Notification(CPID_INSTAGIB_FINDAMMO)."
    - "Yoda easter-egg (alpha 0<a<1 -> yoda=1) still not ported; modname/serverinfo strings + MonsterDrop/MonsterSpawn + RandomItems instagib pick still missing; ForbidRandomStartWeapons handler still dead (no dispatch)."
