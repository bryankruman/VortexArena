  - id: mutator-instagib.regen.split_health_armor
    name: "Armor never absorbs damage (PlayerDamage_SplitHealthArmor: take=damage, save=0)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/instagib/sv_instagib.qc:155-159 MUTATOR_HOOKFUNCTION(mutator_instagib, PlayerDamage_SplitHealthArmor)"
    port_refs: []
    constants:
