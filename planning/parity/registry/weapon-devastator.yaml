unit: weapon-devastator
category: weapon
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "Per-weapon bot aim/auto-detonation (wr_aim: guide-rate-scaled lead prediction, skill>=2 detonation decision from self/team/enemy predicted damage, skill>=7 self-kill veto) is STILL entirely unported — no WrAim override exists; bots fire via a generic brain (BotBrain.cs:335 still explicitly defers it). This is now the single largest remaining gap."
    - "Rocket-jump remote variant (remote_jump*, AllowRocketJumping hook, velocity bump, separate remote_jump RadiusDamage) is STILL unported; stock remote_jump 0 makes it inert by default but the rocketflying-boost damage path is incomplete."
    - "Ammo-refund auto-switch (cnt=m_id; ATTACK_FINISHED=time; m_switchweapon=w_getbestweapon when out of rockets after a blast) is STILL not ported on either contact or remote explode."
    - "wr_resetplayer (clear lastrocket + rl_release on all slots on death) is STILL not overridden for the Devastator; Unregister(self) on explode now clears lastrocket per-rocket, but a respawn/reset does not proactively clear a still-live rocket reference + rl_release."
    - "missile.damagedbycontents / IL_PUSH(g_damagedbycontents) (a rocket explodes when it enters lava/slime) is STILL not ported — the port's contents-damage loop iterates only the live player roster (GameWorld.cs), not projectiles."
