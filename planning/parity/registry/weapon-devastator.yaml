unit: weapon-devastator
category: weapon
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "Shoot-down is DEAD, not merely incomplete: a flying rocket installs a ProjectileDamage callback but the damage pipeline (DamageSystem.EventDamage) only dispatches GtEventDamage for non-players and otherwise falls to PlayerDamage. NOTHING invokes Entity.ProjectileDamage except BreakablehookMutator (hooks). So a rocket can never be shot down on the live path, its 30hp is never subtracted, and W_Devastator_Damage/W_CheckProjectileDamage/W_PrepareExplosionByDamage are all absent."
    - "Per-weapon bot aim/auto-detonation (wr_aim: guide-rate-scaled lead prediction, skill>=2 detonation decision from self/team/enemy predicted damage, skill>=7 self-kill veto) is entirely unported — no WrAim override exists; bots fire via a generic brain (BotBrain.cs:334 explicitly defers it)."
    - "Airshot achievement (ANNCE_ACHIEVEMENT_AIRSHOT) is never triggered: W_Devastator_Explode's DAMAGE_AIM/IS_PLAYER/DIFF_TEAM/!IS_DEAD/IsFlying direct-hit detection is not ported, so a mid-air rocket direct kill plays no airshot announce (the notification + sound exist but are dead for this weapon)."
    - "W_Devastator_Unregister (clear owner.lastrocket on explode) is not faithfully ported: contact Explode never clears st.LastRocket at all, and DoRemoteExplode clears only the HARDCODED slot-0 LastRocket (ignores the rocket's actual weaponentity slot). Combined with the missing wr_resetplayer this leaves stale lastrocket references."
    - "Rocket-jump remote variant (remote_jump*, AllowRocketJumping hook, velocity bump, separate remote_jump RadiusDamage) is entirely unported; stock remote_jump 0 makes it inert by default but the rocketflying-boost path is incomplete. deathtype HITTYPE_BOUNCE flag is never set, so the kill-message splash/direct split (wr_killmessage) cannot classify a timed-out/remote rocket and is itself unported."
