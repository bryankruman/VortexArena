    confidence: high
    notes: "Projectiles.MakeShootable installs the shoot-down on GtEventDamage (the channel DamageSystem.EventDamage dispatches for non-player damageables), wraps W_CheckProjectileDamage + incremental RES_HEALTH subtraction, and only detonates at hp<=0 with HITTYPE_BOUNCE. Under stock balance-xonotic g_projectiles_damage -2 no projectile is shootable at all — faithful to Base. Sole remaining gap: lava/slime damagedbycontents — and the contents-sweep infra now EXISTS (GameWorld.cs:2114; reclassified 2026-06-27), the rocket just isn't enrolled (missing missile.DamagedByContents=true). Logic/values/timing still faithful (shoot-down is the live primary path)."

