      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "missile.damagedbycontents / IL_PUSH(g_damagedbycontents) (rocket explodes when it enters lava/slime) is not ported. CORRECTED 2026-06-27: the prior reason (loop iterates only players) is STALE — GameWorld.CreatureFrameAll (GameWorld.cs:2114-2124) now sweeps any entity with Entity.DamagedByContents through PlayerFrameLogic.ProjectileContentsDamage->Combat.Damage (which would route through the rocket's MakeShootable HP/explode shim). The remaining defect is just that Devastator.Attack never sets missile.DamagedByContents=true, so the rocket is excluded; the supporting infra now exists (Electro orbs use it)."
    verification:
      - { kind: code, ref: "Devastator.Attack:223 calls Projectiles.MakeShootable(missile, exception:-1) which installs GtEventDamage; DamageSystem.EventDamage dispatches GtEventDamage for any non-player damageable victim -> LIVE shoot-down path", result: pass }
