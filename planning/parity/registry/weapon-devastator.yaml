summary:
  feature_count: 14
  worst_gaps:
    - "Ammo-refund auto-switch (cnt=m_id; ATTACK_FINISHED=time; m_switchweapon=w_getbestweapon when out of rockets after a blast) is STILL not ported on either contact (devastator.qc:47-56) or remote (devastator.qc:128-136) explode."
    - "wr_resetplayer (clear lastrocket + rl_release on all slots on death) is STILL not overridden for the Devastator; Unregister(self) on explode clears lastrocket per-rocket, but a respawn/reset does not proactively clear a still-live rocket reference or reset rl_release. (Confirmed 2026-06-27: Devastator.cs has no WrResetPlayer override; Hagar/Hook/Porto/Vortex/Vaporizer/Rifle/Arc do.)"
    - "missile.damagedbycontents / IL_PUSH(g_damagedbycontents) (a rocket explodes when it enters lava/slime) is STILL not ported — but the cause has SHIFTED: GameWorld.CreatureFrameAll (GameWorld.cs:2114-2124) NOW sweeps projectiles flagged Entity.DamagedByContents and routes them through PlayerFrameLogic.ProjectileContentsDamage->Combat.Damage (Electro orbs use this). The Devastator rocket simply never sets missile.DamagedByContents=true in Devastator.Attack, so it is excluded from the sweep. One-line gap, infra already present."
    - "wr_think secondary gate omits the QC `m_switchweapon == thiswep` precondition (you can only remote-detonate while the Devastator is the active weapon); RemoteDetonate flags any owned rocket regardless of active weapon. Minor."
