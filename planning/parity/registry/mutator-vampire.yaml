last_audited: "2026-06-22"
summary:
  feature_count: 5
  worst_gaps:
    - "Heal-on-damage omits the spawn-shield guard: an attacker heals when hitting a freshly-spawned (shielded) victim, which Base forbids. Port DOES track spawnshield (Entity.SpawnShieldExpire/HasSpawnShield; StatusEffectsCatalog.SpawnShield registered) — the code's 'not in the catalog yet' comment is stale. Hook fires (DamageSystem.cs:401) before the full shield block (line 423)."
    - "BuildMutatorsString/BuildMutatorsPrettyString not ported (hook chain absent): 'Vampire' never appears in any port mutator-list string (server browser / scoreboard / status)."
    - "Enable predicate misses the !instagib term: console/cfg `g_vampire 1; g_instagib 1` activates both (Base predicate excludes instagib). The menu Dependent.Bind hides it in normal use; systemic across NIX/OK/instagib ports."
    - "Heal cvars (g_vampire_factor / use_total_damage) read once at enable and g_vampire_factor 0 is swallowed by `if(f!=0f)`; Base reads them live per damage event."
