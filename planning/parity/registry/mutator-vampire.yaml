  - id: mutator-vampire.heal.on_damage
    name: "Heal attacker by damage dealt (PlayerDamage_SplitHealthArmor hook)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/vampire/sv_vampire.qc:9 (MUTATOR_HOOKFUNCTION vampire, PlayerDamage_SplitHealthArmor)"
      - "server/player.qc:322 (MUTATOR_CALLHOOK fired unconditionally per damage event)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/VampireMutator.cs:55 (OnPlayerDamage)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:401 (PlayerDamageSplitHealthArmor.Call)"
    constants:
      - { name: "g_vampire_factor (default)", base: "1.0", port: "1.0", match: true }
      - { name: "g_vampire_factor == 0 honored", base: "yes (heals 0)", port: "NO (if(f!=0f) keeps 1.0)", match: false }
      - { name: "g_vampire_use_total_damage", base: "0 (false)", port: "false", match: true }
      - { name: "guard: !spawnshield(target)", base: "present", port: "MISSING", match: false }
      - { name: "guard: attacker != target", base: "present", port: "present", match: true }
      - { name: "guard: IS_PLAYER(attacker)", base: "present", port: "EntFlags.Client", match: true }
      - { name: "guard: !IS_DEAD(target)", base: "present", port: "DeadFlag.No", match: true }
      - { name: "guard: !FROZEN(target)", base: "present", port: "present", match: true }
      - { name: "damage_take clamp bound(0,take,curHP)", base: "present", port: "present", match: true }
      - { name: "cvar read cadence", base: "autocvar read live each damage event", port: "read once in Hook() at enable", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Spawn-shield guard dropped: Base skips the heal when the target is spawn-shielded (!StatusEffects_active(STATUSEFFECT_SpawnShield, frag_target)). OnPlayerDamage (VampireMutator.cs:55) omits it. VERIFIED the port DOES track spawn-shield: Entity.SpawnShieldExpire (DamageEntityState.cs:111) + DamageSystem.HasSpawnShield (DamageSystem.cs:730), and StatusEffectsCatalog.SpawnShield is registered (StatusEffects.cs:79,99) — so the in-code comment 'that effect isn't in the catalog yet' (VampireMutator.cs:69) is STALE. VERIFIED the hook fires (DamageSystem.cs:401) BEFORE the full spawn-shield block (DamageSystem.cs:423), and with default g_spawnshield_blockdamage 1 the partial-block reduction at DamageSystem.cs:354 is skipped (its `shieldBlock < 1f` is false) — so at hook time DamageTake/DamageSave are the full unblocked amounts. An attacker hitting a freshly-spawned (shielded) victim heals in the port but not in Base."
      - "g_vampire_factor == 0 not honored (values): Hook() does `if (f != 0f) Factor = f;` (VampireMutator.cs:43), so setting g_vampire_factor 0 leaves Factor at the default 1.0; Base reads autocvar_g_vampire_factor directly so 0 means heal-for-nothing. Edge case (nonzero factors all work), but a real divergence from the Base read."
      - "Cvar read cadence (timing): Hook() snapshots g_vampire_factor / g_vampire_use_total_damage once at enable time (VampireMutator.cs:42-44); Base re-reads autocvar_g_vampire_factor / autocvar_g_vampire_use_total_damage on EVERY damage event, so a mid-match cvar change takes effect in Base but not in the port. Minor (these are rarely changed mid-match, and the active-mutator set is itself fixed at boot)."
    verification:
      - { kind: code, ref: "OnPlayerDamage (VampireMutator.cs:55-81) heal math + total-vs-health/alive/frozen/self/player guards vs sv_vampire.qc:9 — all match except spawnshield", result: pass }
      - { kind: code, ref: "spawnshield guard absent in OnPlayerDamage; HasSpawnShield (DamageSystem.cs:730) + StatusEffectsCatalog.SpawnShield (StatusEffects.cs:79) both exist; hook fires (line 401) before full block (line 423)", result: fail }
      - { kind: code, ref: "g_vampire_factor==0 swallowed by `if(f!=0f)` (VampireMutator.cs:43); cvars read once at enable not per-event", result: fail }
      - { kind: code, ref: "live: DamageSystem.cs:401 fires PlayerDamageSplitHealthArmor for every player-damage event; VampireMutator subscribes via Hook() (line 38)", result: pass }
    confidence: high
    notes: "Core heal (factor/total/clamp) and the alive/frozen/self/player guards are faithful. Three real divergences: missing spawn-shield guard (observable), g_vampire_factor 0 swallowed, and read-once-at-enable cvar cadence. No dedicated vampire unit test; the hook chain is exercised structurally by Mayhem/buffs/globalforces tests that drive PlayerDamageSplitHealthArmor."

