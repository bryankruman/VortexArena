      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "IsEnabled is `g_vampire != 0` only; QC predicate is `expr_evaluate(g_vampire) && !MUTATOR_IS_ENABLED(mutator_instagib)`. With direct cvar/cfg sets, vampire can activate alongside instagib. The menu's Dependent.Bind(vampire, g_instagib, 0, 0) greys the checkbox in normal use (DialogMutators.cs:143)."
    verification:
      - { kind: code, ref: "VampireMutator.IsEnabled (VampireMutator.cs:29) vs sv_vampire.qc:7 REGISTER_MUTATOR — !instagib term absent", result: fail }
