summary:
  feature_count: 9
  worst_gaps:
    - "Announcer voice-pack mutator override (AnnouncerOption MUTATOR_CALLHOOK, used by overkill) is unported: a mutator cannot swap the announcer voice (the user cvar cl_announcer IS now honored)."
    - "Duel title uses connection/join order for the top two players, not scoreboard sort order (QC players.sort_next): the two duelers can appear left/right-swapped vs Base."
    - "Title (gametype/duel) + ROUNDSTOP paths are wired live but have NO automated test — verified by full-chain code read only."
