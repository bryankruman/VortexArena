      - { name: "menu '5 min' value", base: "5 (addRange(1,5,4) -> values {1,5})", port: "5", match: true }
      - { name: "menu 'Disabled'/'1 min'/'Both'", base: "0 / 1 / 3", port: "0 / 1 / 3", match: true }
