      - "src/XonoticGodot.Server/AnnouncerController.cs:CheckMinute"
    constants:
      - { name: "arming window", base: "timeleft < m*60 && timeleft > m*60 - 1", port: "same", match: true }
      - { name: "warmup timeleft", base: "max(0, WARMUP_TIMELIMIT + start - time)", port: "same", match: true }
      - { name: "match timeleft", base: "max(0, TIMELIMIT*60 + start - time)", port: "same", match: true }
      - { name: "5-min gate", base: "cl_announcer_maptime >= 2", port: "mode >= 2", match: true }
      - { name: "1-min gate", base: "cl_announcer_maptime == 1 || == 3", port: "mode == 1 || == 3", match: true }
    status:
