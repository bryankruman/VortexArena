      liveness: live
    intended_divergence: true
    divergence_rationale: "The port has no CSQC announcer timer, so the decision/timing layer (Announcer_Time + the countdown picker) runs server-side and broadcasts via NotificationSystem. Documented in AnnouncerController class summary + GameWorld:616-625. The QC Announcer() gametype!=null gate and the gamestart-then-time call order map onto the server frame."
    gaps: []
    verification:
      - { kind: code, ref: "GameWorld.cs:949 Announcer.Tick() in OnStartFrame; countdown wired GameWorld.cs:614/826", result: pass }
