unit: invasion
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 25
  worst_gaps:
    - "Invasion notifications (ROUND_OVER, ROUND_PLAYER_WIN, INVASION_SUPERMONSTER) are now DECIDED live (CheckWinner/SpawnMonsterDef call Notifications?.*), but no host injects inv.Notifications on the real net path → the center/info prints still never reach players (send is dead)."
    - "HUD monsters_total/monsters_killed not published for ROUND: the scoreboard is fed from MonsterAI.MonstersTotal/Killed, which count only NATURAL map-placed monsters; Invasion's SPAWNED wave monsters are excluded, so ROUND shows no wave progress (Base SV_StartFrame sets monsters_total=inv_maxspawned)."
    - "STAGE win still ends on the FIRST player touch (TriggerRoundEnd sets RoundEndReached unconditionally); Base requires ceil(realplayers*0.7) distinct REAL players to have reached the end."
    - "Point limit tracks cumulative MonstersKilled across ALL players (port) vs Base's leading-player KILLS via GameRules_limit_score; the -1 sentinel mishandling is now FIXED."
    - "Scoreboard item-stats (weapon accuracy) panel not suppressed in Invasion (no DrawScoreboardItemStats/AccuracyTargetValid gate); MoveToRandomMapLocation spawn fallback still missing (monsters pile at origin when no spawnpoints)."
