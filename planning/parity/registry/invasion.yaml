summary:
  feature_count: 25
  worst_gaps:
    - "Round handler wired with default CA-style predicates (DefaultCanRoundStart needs >=2 players in a non-team game; DefaultCanRoundEnd iterates empty teams) — the Invasion round handler is wired but DEAD; Tick() is the sole live wave driver, so there is no Base round-over/warmup cadence."
    - "Per-round time limit (120s) and inter-round warmup (10s) not implemented — a wave that can't be cleared never times out."
    - "Port monsters ATTACK players (FindTarget acquires clients always) — Base Invasion monsters do not (monster_attack=false); plus no PvP-damage cancel, no-regen, 200/200 ROUND start items, or Bot_ForbidAttack."
    - "PickMonster ignores Base's monster-type filter (HIDDEN/PASSIVE/FLY/SWIM/QUAKE-size, super-once-one-alive) and g_invasion_zombies_only → wrong monster mix (e.g. flying Wyvern spawns)."
    - "Round-over / round-player-win / supermonster center-prints + HUD monsters_total/killed never sent (notifications exist in the catalog but are dead for this mode)."
