summary:
  feature_count: 25
  worst_gaps:
    - "STAGE win still ends on the FIRST player touch (TriggerRoundEnd sets RoundEndReached unconditionally; GameWorld.cs:1925 touch fires on any one Player); Base requires ceil(realplayers*0.7) distinct REAL players to have set inv_endreached."
    - "Point limit tracks cumulative MonstersKilled across ALL players (port) vs Base's leading-player KILLS via GameRules_limit_score; approximates but is not identical."
    - "HUNT win is derived from the port's own Wave.MaxSpawned/Killed + LiveMonsters counters, not Base's live g_monsters (map-placed-monster) list — fidelity unverified on a real HUNT map."
    - "Scoreboard item-stats (weapon accuracy) panel not suppressed in Invasion (no DrawScoreboardItemStats/AccuracyTargetValid gate); MoveToRandomMapLocation spawn fallback still missing (monsters pile at origin when no spawnpoints)."
    - "Wave-5 closed the notification sends: a live InvasionNotifyHost (GameWorld.cs:3017) now broadcasts ROUND_OVER / ROUND_PLAYER_WIN / INVASION_SUPERMONSTER via NotificationSystem→NotificationNetSink, and the ROUND HUD wave counters (monsters_total/killed) are published from inv.Wave — both formerly-dead seams are now LIVE."
