summary:
  feature_count: 28
  worst_gaps:
    - "HUNT win is derived from the port's own Wave.MaxSpawned/Killed + LiveMonsters counters PLUS the live world monster list (Invasion.cs LiveNonRespawnedMonsterCount), not exclusively Base's g_monsters; fidelity unverified on a real HUNT map."
    - "MoveToRandomMapLocation spawn fallback still missing (monsters pile at world origin when a map registers no invasion_spawnpoint — PickSpawnOrigin returns Vector3.Zero)."
    - "spawn_point.target_range/target2 copy not modeled (no spawn-point entity in the port — only the origin is carried into SpawnMonsterDef)."
    - "Console-command guards AllowMobSpawning / AllowMobButcher (block spawnmob/butcher during an invasion) are not ported (newly mapped: invasion.rules.mob_command_guards)."
    - "Wave-6a (commit e596bf0) CLOSED the two largest open gaps: STAGE now requires ceil(realplayers*0.7) distinct REAL players (TriggerRoundEnd threshold via _endReached + the GameWorld touch volume passing the player), and the point limit now ends on the LEADING player's KILLS (CheckPointLimit/TopKillsScore) not the cumulative total; the cl_invasion DrawScoreboardItemStats accuracy-panel hide is also now live."
