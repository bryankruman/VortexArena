      - { kind: code, ref: "VoteController.cs:116-162 CmdCall — no timeout_status / game_starttime branch (cf. vote.qc:1008-1027)", result: fail }
    confidence: high
    notes: "Downgraded logic faithful->partial: the timeout-active and game_starttime gates are both absent. Voteban check, sv_vote_call, already-called, spectator gate, wait cooldown, nasty-char + whitelist parse, caller auto-yes are present and live."

