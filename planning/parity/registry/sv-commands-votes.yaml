    gaps:
      - "timelimit vote bound is wrong unless the server cfg sets timelimit_min/max: the port reads them via FloatOr with fallbacks 0 and 9999, and never registers the Base defaults (5 / 60). With an un-set cvar store the votable range is 0..9999 vs Base 5..60."
      - "map/nextmap parse does not run ValidateMap/MapInfo_FixName nor the sv_vote_override_mostrecent recent-map block: an invalid or recently-played map name is accepted into the vote."
      - "No per-command arg restriction (VoteCommand_checkargs / sv_vote_command_restriction_<cmd> charlist + min-arg count) is applied."
