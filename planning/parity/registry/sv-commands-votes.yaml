    divergence_rationale: null
    gaps:
      - "MISSING the QC timeout_status guard: VoteCommand_call rejects calling any vote except literally 'timein' while a timeout is active; the port's CmdCall has no timeout check, so a player can open an arbitrary vote mid-timeout."
