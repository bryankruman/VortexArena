summary:
  feature_count: 16
  worst_gaps:
    - "radarmap / gettaginfo / animbench / bbox / trace / stuffto / adminmsg / anticheat(cmd) / delrec / database / effectindexdump / make_mapinfo / printstats: not registered as commands (missing)"
    - "Vote spectator-exclusion is dead: VoteController.IsPlayer never wired in GameWorld (defaults true), so sv_vote_nospectators 2 does not drop spectator ballots; also missing the QC IS_PLAYER||INGAME real-player union"
    - "vote call is missing the QC timeout_status guard: a vote (other than timein) can be called while a timeout is active, which Base forbids; sv_vote_gamestart pre-match gate also unchecked"
    - "Vote timelimit-vote bound diverges: port clamps to FloatOr(timelimit_min,0)..FloatOr(timelimit_max,9999) and never registers those cvars, so the effective range is 0..9999 not Base 5..60; map parse also skips ValidateMap/MapInfo_FixName/recent-map + per-command arg restriction (sv_vote_command_restriction_*); movetoX/allready special parsing absent"
    - "Timeout pause hard-freezes the sim instead of Base slowmo=0.0001 (no inching); no ANNCE_TIMEOUT/PREPARE + no per-second center-print countdown"
    - "cointoss result is deterministic off the clock LSB, not random() — predictable/biased"
