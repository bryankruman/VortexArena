summary:
  feature_count: 16
  worst_gaps:
    - "radarmap / gettaginfo / animbench / bbox / trace / stuffto / adminmsg / anticheat(cmd) / delrec / database / effectindexdump / make_mapinfo / printstats: still not registered as commands (missing)"
    - "vote-call guard chain DEAD: TimeoutActive / GameStartTime / IsClient are still NEVER wired in GameWorld (post-fixup commit 4be8357 wired WarmupStage/WarmupOrIntermission/Roster/FindPlayer/Broadcast ONLY). The CmdCall/CmdMaster guard branches compile but no-op (defaults TimeoutActive=()=>false, GameStartTime=()=>0, IsClient=_=>true), so the timeout-active and pre-match game_starttime vote bars never fire."
    - "Timeout slowmo + per-second CENTER_TIMEOUT countdown + ANNCE_PREPARE machinery exists in TimeoutController, but ApplySlowmo/CenterPrintBeginning/CenterPrintEnding/AnnouncePrepare sinks are STILL NOT wired in GameWorld (only VoteActive/Warmup/GameStartTime/IsPlayerOf/Broadcast are) — pause is still a hard freeze (GameStopped includes Timeout.IsPaused, GameWorld.cs:1061) with no inching, no countdown center-print, no announce."
    - "Vote spectator-exclusion remains dead: VoteController.IsPlayer + InGame are both still unwired (default true/false), so sv_vote_nospectators 2 still never drops spectator ballots."
    - "map/nextmap vote parse still skips ValidateMap/MapInfo_FixName/recent-map; per-command arg restriction (VoteCommand_checkargs / sv_vote_command_restriction_*) still absent."
    - "FIXED since baseline (commit 4be8357): the 'allready' warmup-gate regression — Voting.WarmupStage is now wired to the live Warmup.WarmupStage (GameWorld.cs:721), so an allready vote during warmup is no longer always rejected."
