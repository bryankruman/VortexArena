unit: keyhunt
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 21
  worst_gaps:
    - "KeyHunt.cs emits ZERO sounds/notifications/effects (verified: no Notify/Send_/PlaySound calls at all): no alarm siren, no capture jingle, no collect/drop/destroy cues, no center-prints (START/SCAN/ROUNDSTART/INTERFERE/MEET/HELP) or info lines (PICKUP/DROP/LOST/PUSHED/DESTROYED/CAPTURE). 36 KEYHUNT_* notifications + 5 KH_* sounds are registered but never invoked."
    - "maxdist default 4000 vs Base 150: carriers can capture spread across the whole map instead of needing a 150-unit huddle."
    - "kh_LoserTeam (push/destroy score split) NOT IMPLEMENTED; voluntary +use drop (kh_Key_DropOne) NOT IMPLEMENTED; carrier/noncarrier damage+force mutator NOT IMPLEMENTED; lava/trigger destroy (return_when_unreachable) NOT IMPLEMENTED."
    - "Bot role RoleKeyHunt is DEAD: FindByClass('keyhunt_key') but keys spawn as 'item_kh_key' (verified KeyHunt.cs:476), and reads key.Owner but the carrier is on Entity.GtCarrier (verified EntityGametypeState.AttachToCarrier sets GtCarrier, never Owner)."
    - "delay_return default 15 vs 60; score_collect 1 vs 3; score_carrierfrag 1 vs 2."
