summary:
  feature_count: 21
  worst_gaps:
    - "MAJOR FORWARD DRIFT since the 06-22 baseline: KeyHunt.cs (1441 lines) was substantially edited on Jun-25 (Wave-6a). SEVEN baseline gaps genuinely CLOSED: (1) carried-key orbit NOW IMPLEMENTED (OrbitCarriedKey: makevectors yaw = SpawnAngle + (now%360)*KeyXySpeed, origin = carrier + fwd*KeyXyDist + z*KeyZShift; constants KH_KEY_XYDIST 24 / XYSPEED 45 / ZSHIFT 22 all now match Base) — keyhunt.key.carried_orbit fixed missing/partial->faithful. (2) carrier/noncarrier 9-way damage+force matrix NOW IMPLEMENTED + LIVE (OnDamageCalculate subscribed to MutatorHooks.DamageCalculate, dispatched at DamageSystem.cs:256) — keyhunt.combat.carrier_damage_force missing->faithful/live. (3) lava/slime/trigger return_when_unreachable + force-reteam NOW IMPLEMENTED + LIVE (KeyDamage via GtEventDamage installed in SpawnKey, routed at DamageSystem.cs:331-333) — keyhunt.unreachable.damage_destroy missing->faithful/live."
    - "FORWARD DRIFT continued: (4) observe/disconnect drop NOW WIRED: OnPlayerRemoved override calls DropAllKeys(player, suicide:true), dispatched from ClientManager.cs:473/682 — keyhunt.drop.on_death liveness partial->live, timing partial->faithful (3 of 4 Base drop hooks now wired; only DropSpecialItems edge remains, but PlayerDies+observer+disconnect cover the player-visible cases). (5) per-carrier SP_SCORE + nades_GiveBonus NOW CREDITED on capture (WinnerTeam: each carrier c.ScoreFrags += chunk + Nades.NadeBonus.GiveBonus) — keyhunt.capture.scoring logic partial->faithful. (6) destroy distribution NOW full DistributeEvenly + destroyed_holdingkey ownfactor (LoserTeam destruction branch) — keyhunt.loss.loser_team_push_destroy logic/values partial->faithful. (7) per-team spawn angle 360*i/teamCount NOW set (SpawnKey: key.SpawnAngle) — keyhunt.round.spawn_keys spawn_angle constant now matches; delay_tracking now implemented + scheduled — keyhunt.controller.round_loop values partial->faithful."
    - "Bot role STILL only partial-logic (single collapsed freelancer-style rating vs Base's 4-role behavior tree with timeouts) but LIVE and correct (FindByClass('item_kh_key') + key.GtCarrier; BotRoles.cs:96 dispatch). Spawned classname item_kh_key matches the bot search."
    - "REMAINING gaps (now far fewer): waypoint sprites entirely unimplemented (keyhunt.waypoints.sprites — Run here / Key Carrier overhead + radar sprites, and the tracking-device visibility gating is moot without them); DropSpecialItems drop edge unwired (minor — covered by the other 3 hooks); the dead AssignKey method (harmless, routes to correct geometry); push/carrier-frag credited via ScoreFrags rather than the team-aware SCORE pipeline (mechanism divergence, magnitude faithful); capture customflash approximated by TE_EXPLOSION."
