summary:
  feature_count: 21
  worst_gaps:
    - "NEW DRIFT since the 06-25 baseline (Wave 12a/12b, commit 6da9e80): the LAST waypoint residual is CLOSED. CollectWaypoints (KeyHunt.cs:1337-1394) now uses the FULL 3-state SPRITERULE_TEAMPLAY model — SpriteName=team-colored (enemy/model1), SpriteNameOwn=KeyCarrierFriend ('Key carrier', green) flipped to KeyCarrierFinish ('Run here') on all-owned (own team/model2), SpriteNameSpec=team-colored (spectator/model3) — exactly mirroring Base WaypointSprite_UpdateSprites(first, FriendOrFinish, third) (sv_keyhunt.qc:361-410). At the baseline commit (c59134e) KeyCarrierFriend/SpriteNameOwn were UNUSED (0 occurrences); now 3. keyhunt.waypoints.sprites: the teammate-facing 'Key carrier'(Friend) gap is removed."
    - "Full waypoint system (landed pre-baseline, re-verified LIVE): WP_KeyDropped on each loose key + team-colored carrier markers, tracking-device gate + per-viewer visibility predicates (DroppedKeyWaypointVisibleFor/CarrierWaypointVisibleFor mirror kh_Key_/kh_KeyCarrier_waypointsprite_visible_for_player). All 7 defs in WaypointRegistry (Waypoints.cs:128-134). Consumed LIVE at game/net/ServerNet.cs:1060 (path moved from the baseline's ServerNet.cs:1022). The 3-state SpriteFor resolution is in Waypoints.cs:204-211."
    - "Carried from the 06-25 Wave-6a baseline (all still TRUE/verified): carried-key orbit (OrbitCarriedKey, KH_KEY_XYDIST 24/XYSPEED 45/ZSHIFT 22 match), 9-way carrier/noncarrier damage+force matrix (OnDamageCalculate, live via MutatorHooks.DamageCalculate), lava/slime return_when_unreachable (KeyDamage via GtEventDamage), observe/disconnect drop (OnPlayerRemoved->DropAllKeys), per-carrier SP_SCORE + nades_GiveBonus on capture, full DistributeEvenly destroy split, per-team spawn angle. All faithful + live."
    - "Bot role STILL only partial-logic (single collapsed freelancer-style rating vs Base's 4-role behavior tree carrier/defense/offense/freelancer with HavocBot_ChooseRole random pick + role timeouts) but LIVE and correct (FindByClass('item_kh_key') + key.GtCarrier; BotRoles.cs:96 dispatch)."
    - "REMAINING gaps (now minor): bot 4-role tree collapsed to one rating (keyhunt.bot.role logic/values partial); DropSpecialItems drop edge unwired (covered by PlayerDies+observer+disconnect); damageforcescale unread (no-op at stock 1); push/carrier-frag/capture credited via ScoreFrags rather than the team-aware SCORE float2int pipeline (mechanism divergence, magnitude faithful); capture customflash approximated by TE_EXPLOSION; the dead AssignKey method (harmless, routes to correct geometry); minor waypoint nuance — Base's 3-state WaypointSprite_UpdateSprites shows teammates 'Key carrier'(WP_KeyCarrierFriend) vs enemies the team-colored sprite, while the port shows one team-colored sprite to both (KeyCarrierFriend def registered but unused on the live path)."
