summary:
  feature_count: 21
  worst_gaps:
    - "Wave-2 added the full sound/notification/VFX layer (siren, capture jingle, collect/drop/destroy cues, START/SCAN/ROUNDSTART/INTERFERE/MEET/HELP center-prints, PICKUP/DROP/LOST/PUSHED/DESTROYED/CAPTURE info lines, NEXUIZPLASMA capture trail) AND fixed every wrong default (maxdist 4000->150, score_collect 1->3, score_carrierfrag 1->2, delay_return 15->60, key bbox -10..10 -> -25..25). These were the worst baseline gaps and are now closed on the live path."
    - "Carried key STILL does not orbit the carrier (fixed (0,0,20) offset vs KH_KEY_XYDIST 24 / XYSPEED 45 / ZSHIFT 22 makevectors circle) — only un-fixed cosmetic."
    - "Voluntary +use drop (DropOneKey) is now fully implemented but DEAD: no PlayerUseKey hook routes the +use key to it (WeaponImpulses routes +use only to VehicleBoarding.UseKey). The push branch of LoserTeam is also dead (no pusher/previous_owner tracking ever sets key.Pusher)."
    - "Bot role RoleKeyHunt is UNCHANGED and still DEAD: FindByClass('keyhunt_key') vs spawned 'item_kh_key', and reads key.Owner vs carrier on Entity.GtCarrier (BotObjectiveRoles.cs not touched by Wave-1/2)."
    - "Carrier/noncarrier damage+force matrix, lava/trigger return_when_unreachable destroy, and waypoint sprites remain entirely unimplemented; capture per-carrier SP_SCORE + nades_GiveBonus still absent (only team total + one carrier's KH_CAPS credited)."
