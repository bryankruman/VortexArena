  - id: doublejump.stat.per_player_doublejump
    name: "Per-player DOUBLEJUMP stat via Physics_ClientOption"
    layer: [shared]
    base_refs:
      - "common/stats.qh:REGISTER_STAT(DOUBLEJUMP, INT)"
      - "common/physics/player.qc:141 STAT(DOUBLEJUMP)=Physics_ClientOption(this,\"doublejump\",autocvar_sv_doublejump)"
      - "common/physics/player.qc:23 Physics_ClientOption"
      - "common/mutators/mutator/doublejump/doublejump.qc:22 PHYS_DOUBLEJUMP(player) gate inside the PlayerJump hook"
    port_refs:
      - "src/XonoticGodot.Common/Physics/PhysicsPreset.cs:66 OptionNames (\"doublejump\" -> \"sv_doublejump\")"
      - "src/XonoticGodot.Common/Physics/PhysicsPreset.cs:187 Resolve (g_physics_clientselect chain -> p.DoubleJump)"
      - "src/XonoticGodot.Common/Physics/MovementParameters.cs:62 DoubleJump (per-player resolved value)"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:874 new PlayerJumpArgs(..., mp.DoubleJump) carries the stat into the hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:286 PlayerJumpArgs.DoubleJump (in arg)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/DoublejumpMutator.cs:62 OnPlayerJump gates on args.DoubleJump (PHYS_DOUBLEJUMP)"
    constants:
      - { name: "g_physics_clientselect", base: "0 (off; enables per-client g_physics_<preset>_doublejump override)", port: "0 (implemented: PhysicsPreset.Resolve g_physics_clientselect chain)", match: true }
      - { name: "doublejump in clientselect option set", base: "Physics_ClientOption(this,\"doublejump\",...)", port: "registered PhysicsPreset.cs:66; resolved into MovementParameters.DoubleJump; consumed by the mutator via args.DoubleJump", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "PhysicsPreset.cs:66 registers doublejump; :187 Resolve returns sv_doublejump default when g_physics_clientselect==0", result: pass }
      - { kind: code-read, ref: "PlayerPhysics.cs:874 new PlayerJumpArgs(player, mjumpheight, doublejump, mp.DoubleJump) -> DoublejumpMutator.OnPlayerJump:62 bool perPlayerDoublejump = args.DoubleJump ?? sv_doublejump; gate at :63 — consumes PHYS_DOUBLEJUMP(player)", result: pass }
    confidence: high
    notes: "FIX since the 2026-06-22 baseline. Baseline recorded logic:partial / liveness:partial — the mutator ignored the per-player resolved value and gated OnPlayerJump on the raw sv_doublejump cvar. Current code closes that gap: PlayerPhysics.cs:874 constructs PlayerJumpArgs with the 4th arg = mp.DoubleJump (the Physics_ClientOption-resolved per-player DOUBLEJUMP stat), MutatorHooks.PlayerJumpArgs.DoubleJump carries it, and DoublejumpMutator.OnPlayerJump:62-63 gates the grant on `args.DoubleJump ?? sv_doublejump` — i.e. PHYS_DOUBLEJUMP(player) per Base doublejump.qc:22, falling back to the cvar only when unsupplied (unit tests). When g_physics_clientselect is on and a client picks a preset that flips doublejump, the per-player override is now honored inside the hook. The IsEnabled subscription gate keying on sv_doublejump is correct (Base's SVQC REGISTER_MUTATOR gate is also the cvar, not the stat). Full parity."

