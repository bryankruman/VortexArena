  - id: doublejump.stat.per_player_doublejump
    name: "Per-player DOUBLEJUMP stat via Physics_ClientOption"
    layer: [shared]
    base_refs:
      - "common/stats.qh:REGISTER_STAT(DOUBLEJUMP, INT)"
      - "common/physics/player.qc:141 STAT(DOUBLEJUMP)=Physics_ClientOption(this,\"doublejump\",autocvar_sv_doublejump)"
      - "common/physics/player.qc:23 Physics_ClientOption"
    port_refs:
      - "src/XonoticGodot.Common/Physics/PhysicsPreset.cs:66 OptionNames (\"doublejump\" -> \"sv_doublejump\")"
      - "src/XonoticGodot.Common/Physics/PhysicsPreset.cs:115 Resolve (g_physics_clientselect chain)"
      - "src/XonoticGodot.Common/Physics/MovementParameters.cs:187 p.DoubleJump (per-player resolved value)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/DoublejumpMutator.cs:34 IsEnabled (still reads sv_doublejump directly; does NOT consult mp.DoubleJump)"
    constants:
      - { name: "g_physics_clientselect", base: "0 (off; enables per-client g_physics_<preset>_doublejump override)", port: "0 (NOW IMPLEMENTED: PhysicsPreset.Resolve + Server/Cvars.cs:367 + ClientCommand_physics Commands.cs:1846)", match: true }
      - { name: "doublejump in clientselect option set", base: "Physics_ClientOption(this,\"doublejump\",...)", port: "registered PhysicsPreset.cs:66; resolved into MovementParameters.DoubleJump", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The per-player stat infrastructure (Physics_ClientOption / g_physics_clientselect) is now implemented and resolves the per-player doublejump value into MovementParameters.DoubleJump (PhysicsPreset.cs:66, MovementParameters.cs:187). BUT the DoublejumpMutator does NOT consume it: IsEnabled (hook subscription) and the OnPlayerJump body both key off sv_doublejump directly. When g_physics_clientselect is on and a client picks a preset that flips doublejump per-client, the mutator's subscription gate won't track that override. Stock play (g_physics_clientselect 0) is unaffected: mp.DoubleJump == sv_doublejump for every player."
    verification:
      - { kind: code-read, ref: "PhysicsPreset.cs:66 registers doublejump; :118 Resolve returns sv_doublejump default when g_physics_clientselect==0", result: pass }
      - { kind: code-read, ref: "DoublejumpMutator.OnPlayerJump has no PHYS_DOUBLEJUMP(player)/mp.DoubleJump check; gating is via IsEnabled on sv_doublejump", result: pass }
    confidence: high
    notes: "PARTIAL CLOSE (not a full fix, not a regression). Baseline recorded g_physics_clientselect as 'not implemented'; Wave 2 implemented the clientselect/Physics_ClientOption chain and registered doublejump as a resolvable option, so the stat plumbing now matches Base and MovementParameters.DoubleJump carries the per-player value. The residual gap is that the doublejump MUTATOR ignores that per-player value and still gates on the raw sv_doublejump cvar. Confined to the g_physics_clientselect=on edge case; no observable stock-play difference (mutator parity test still green)."

