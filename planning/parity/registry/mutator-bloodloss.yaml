summary:
  feature_count: 8
  worst_gaps:
    - "Active-mutators string/scoreboard signalling is entirely unported: SVQC BuildMutatorsString/PrettyString (:bloodloss / , Blood loss), util.qc GameType_GetMutatorByName row (MUT_BLOODLOSS, g_bloodloss>0), and the CSQC mut_set_active(MUT_BLOODLOSS) HUD active-mutator icon all have no port equivalent (the port has NO active-mutators string mechanism at all)."
    - "CSQC client-prediction hooks (PlayerCanCrouch/PlayerJump with the extra STAT(HEALTH)>0 guard, REGISTER_STAT(BLOODLOSS), REGISTER_MUTATOR(bloodloss,true)) are unported — acceptable because the port runs a headless server sim with no CSQC prediction, but it means crouch/jump are NOT locally predicted (server-round-trip latency vs Base)."
    - "MENUQC describe paragraph (stun + impaired movement + rapid health drain) is condensed to a one-line tooltip on the menu checkbox/slider."
