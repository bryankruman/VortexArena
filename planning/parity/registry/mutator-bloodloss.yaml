unit: mutator-bloodloss
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "Active-mutators string/scoreboard signalling is entirely unported: SVQC BuildMutatorsString/PrettyString (:bloodloss / , Blood loss), util.qc GameType_GetMutatorByName row (MUT_BLOODLOSS, g_bloodloss>0), and the CSQC mut_set_active(MUT_BLOODLOSS) HUD active-mutator icon all have no port equivalent."
    - "CSQC client-prediction hooks (PlayerCanCrouch/PlayerJump with the extra STAT(HEALTH)>0 guard, REGISTER_STAT(BLOODLOSS), REGISTER_MUTATOR(bloodloss,true)) are unported — acceptable because the port runs a headless server sim with no CSQC prediction, but it means crouch/jump are NOT locally predicted (server-round-trip latency vs Base)."
    - "Threshold cached at Hook() time, not re-read live — a mid-match g_bloodloss change is ignored until MutatorActivation.Apply() re-runs."
features:
  - id: mutator-bloodloss.enable.registration
    name: "Registration + enable cvar (g_bloodloss is both switch and threshold)"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/bloodloss/bloodloss.qc:5 REGISTER_MUTATOR(bloodloss, autocvar_g_bloodloss)"
      - "common/stats.qh:330-332 (autocvar_g_bloodloss + REGISTER_STAT(BLOODLOSS, FLOAT, autocvar_g_bloodloss))"
      - "xonotic-server.cfg:304 (set g_bloodloss 0)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/BloodlossMutator.cs:26-27 (IsEnabled => Cvars.GetFloat(\"g_bloodloss\") != 0f)"
      - "src/XonoticGodot.Server/GameWorld.cs:511 (MutatorActivation.Apply)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:60-69 (Apply → Add → Hook)"
    constants:
      - { name: "g_bloodloss default", base: "0 (disabled)", port: "0 via cvar; never reads the 25f field fallback on the live path", match: true }
      - { name: "enable predicate", base: "autocvar_g_bloodloss truthy (non-zero)", port: "GetFloat(\"g_bloodloss\") != 0f", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Base REGISTER_STAT(BLOODLOSS) networks the threshold to CSQC for crouch/jump prediction; the port has no STAT(BLOODLOSS) and no CSQC mutator registration. Faithful in effect (server-authoritative) but the prediction path is absent."
    verification:
      - { kind: code, ref: "[Mutator] BloodlossMutator in Mutators.All; MutatorActivation.Apply at GameWorld.cs:511 on the live server boot; IsEnabled reads g_bloodloss", result: pass }
    confidence: high
    notes: "The cvar value is simultaneously the enable switch AND the health threshold. Base has NO IsEnabled-side exclusion (unlike instagib/arena/nix) — REGISTER_MUTATOR keys directly on the cvar — so the port's bare != 0f is faithful (no missing-exclusion gap). Menu greys it out under g_instagib but that is UI-only."

