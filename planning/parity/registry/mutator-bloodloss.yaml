    verification:
      - { kind: code, ref: "[Mutator] BloodlossMutator in Mutators.All; MutatorActivation.Apply at GameWorld.cs:535 on the live server boot; IsEnabled reads g_bloodloss", result: pass }
    confidence: high
    notes: "The cvar value is simultaneously the enable switch AND the health threshold. Base has NO IsEnabled-side exclusion (unlike instagib/arena/nix) — REGISTER_MUTATOR keys directly on the cvar — so the port's bare != 0f is faithful (no missing-exclusion gap). Menu greys it out under g_instagib but that is UI-only. Wave-2 removed the dead 25f field; enable predicate unchanged."

