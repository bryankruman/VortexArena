      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Mid-match g_bloodloss cvar change is not re-read by the running mutator (cached threshold); only a re-run of MutatorActivation.Apply() refreshes it. Match-start value is always correct."
    confidence: high
    notes: "In normal play Apply() runs after the cfg loads, so the cached threshold is correct at match start; the divergence only manifests on a live cvar change without re-converge. The 25f field fallback is non-Base, but unreachable on the live path: IsEnabled gates on cvar != 0 before Hook() runs, and Hook() only overwrites Threshold when the cvar read is != 0, so on the live path Threshold always equals the real cvar value (never 25f)."

