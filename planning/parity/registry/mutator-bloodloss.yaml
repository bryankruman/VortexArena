      - { name: "damage src", base: "player,player,player force '0 0 0'", port: "(player,player,player) Vector3.Zero", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No runtime/automated test confirms the rot tick cadence or that the rot damage actually removes health in a live match (static + cross-file trace only; no bloodloss test in tests/)."
    confidence: medium
    notes: "Guards verified: game_stopped → VehicleCommon.GameStopped (BloodlossMutator.cs:66); IS_DEAD → DeadState==DeadFlag.No; IS_PLAYER → EntFlags.Client (the port-wide mutator IsPlayer convention). VERIFIED both Base and port multiply the 1-hp rot by g_balance_selfdamagepercent (0.65) because target==attacker — so the effective drain is ~0.65 hp/tick in BOTH; the draft's 'just removes 1 hp' note was imprecise but the dimension is still faithful (port matches Base). 'rot' is non-special-armor (armor applies in both)."

