    constants:
      - { name: "g_bloodloss default", base: "0 (disabled)", port: "0 via cvar; no static 25f field fallback any more (Threshold is now a live cvar read)", match: true }
      - { name: "enable predicate", base: "autocvar_g_bloodloss truthy (non-zero)", port: "GetFloat(\"g_bloodloss\") != 0f", match: true }
