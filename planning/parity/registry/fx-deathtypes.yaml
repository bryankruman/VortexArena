unit: fx-deathtypes
category: notification
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "SelectSpecial has no NADE-family branch: live nade kills (NadeNormalBoom/Ice/Heal/Darkness emit nade/nade_* deathtypes via NadeBlast.RadiusDamage→Combat.Damage) print the generic 'X died' / 'frag' obituary instead of the registered 'blown up by Y's Nade' line, even though the DEATH_*_NADE notification rows exist in the port. Observable whenever g_nades is enabled (mutator default OFF)."
    - "SelectSpecial omits the TEAMCHANGE/AUTOTEAMCHANGE self lines: a live auto-team-balance kill (Teamplay.cs:225 emits DeathTypes.AutoTeamChange through Combat.Damage) falls to DEATH_SELF_GENERIC instead of the registered DEATH_SELF_AUTOTEAMCHANGE, and EmitObituary never passes the death_team (f1) arg those rows expect. Base also special-cases this branch (suicide f1=targ.team, GiveFrags -1 SKIPPED for autoteamchange)."
    - "KILL (/kill, LIVE via Commands.cs:1135) maps to DEATH_SELF_GENERIC not Base's DEATH_SELF_SUICIDE, and MIRRORDAMAGE (LIVE via DamageSystem.cs:260 reflected teamdamage) maps to GENERIC not DEATH_SELF_BETRAYAL — both observable text mismatches, both target notif rows present but unused. Port also omits Base's CTS /kill obituary suppression (g_cts && DEATH_KILL → return)."
    - "HURTTRIGGER mapper-custom message (msg_from_ent → death_msg_ent_self/murder, DEATH_*_VOID_ENT) and DEATH_CUSTOM (deathmessage) are not wired into EmitObituary/SelectSpecial; mapper-authored obituary strings are ignored (void death always uses the fixed VOID line)."
    - "SelectSpecial omits cheat/camp/rot/shooting_star/touchexplode → all fall to DEATH_SELF_GENERIC/DEATH_MURDER_FRAG (low impact: no live emitter found in the port today; the registered notif rows go unused)."
features:
  - id: fx-deathtypes.registry.packing
    name: "Deathtype encoding: packed int (weaponmask + HITTYPE bits + DT_FIRST registry) vs string tag"
    layer: [shared]
    base_refs:
      - "common/deathtypes/all.qh:30-52 (DEATH_WEAPONMASK, HITTYPE_*, DT_FIRST, REGISTER_DEATHTYPE)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DeathTypes.cs:70 (DeathTypes string-tag scheme)"
    constants:
      - { name: "DEATH_WEAPONMASK", base: "BITS(8)=0xFF", port: "weapon NetName via 'weapon/' prefix", match: false }
      - { name: "DT_FIRST", base: "BIT(14)", port: "bare lowercase special tag (no numeric base)", match: false }
      - { name: "HITTYPE flags", base: "bits 8-13 (SECONDARY/SPLASH/BOUNCE/ARMORPIERCE/SOUND/SPAM)", port: "'|flag' suffix tokens (same 6)", match: false }
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port carries the deathtype as a string tag (DamageInfo.DeathType) end-to-end instead of a packed int; the bit math (weapon id, HITTYPE bits, special classification) is reproduced via HasHitType/BaseOf/IsWeapon. Behaviorally equivalent for routing; only the wire encoding differs. Documented in DeathTypes.cs:56-69."
    gaps: []
    verification:
      - { kind: code, ref: "DeathTypes.IsWeapon/WeaponNetNameOf/HasHitType/BaseOf vs all.qh DEATH_WEAPONOF/DEATH_ISSPECIAL macros; all 6 HITTYPE flags present as suffix tokens", result: pass }
    confidence: high
    notes: "Deliberate model change; the rest of this unit's parity is judged against the string scheme."

