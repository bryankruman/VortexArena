summary:
  feature_count: 11
  worst_gaps:
    - "SelectSpecial still has no NADE-family branch: live nade kills (NadeNormalBoom/Ice/Heal/Darkness emit nade/nade_* deathtypes via NadeBlast.RadiusDamage->Combat.Damage) print the generic 'X died' / 'frag' obituary instead of the registered 'blown up by Y's Nade' line, even though the DEATH_*_NADE notification rows exist in the port. Observable whenever g_nades is enabled (mutator default OFF). UNCHANGED by Wave-5 (the CAMP branch was added but not nade)."
    - "SelectSpecial still omits the TEAMCHANGE/AUTOTEAMCHANGE self lines: a live auto-team-balance kill (Teamplay.cs KillPlayerForTeamChange emits DeathTypes.AutoTeamChange through Combat.Damage) falls to DEATH_SELF_GENERIC instead of DEATH_SELF_AUTOTEAMCHANGE, and EmitObituary never passes the death_team (f1) arg those rows expect. UNCHANGED."
    - "KILL (/kill, LIVE via Commands.cs) still maps to DEATH_SELF_GENERIC not Base's DEATH_SELF_SUICIDE, and MIRRORDAMAGE (LIVE via DamageSystem.cs reflected teamdamage) maps to GENERIC not DEATH_SELF_BETRAYAL — both observable text mismatches, both target notif rows present but unused. Port also still omits Base's CTS /kill obituary suppression. UNCHANGED."
    - "DEATH_CUSTOM (mapper deathmessage, ACCIDENT branch) is still entirely unwired: no DeathTypes.Custom constant, no emitter, no SelectSpecial case. The DEATH_SELF_CUSTOM rows exist (Info 705, Center 917, Multi 1117) but are never sent. (Wave-5 DID wire the OTHER half of mapper_custom — HURTTRIGGER msg_from_ent / DEATH_*_VOID_ENT — now live; see fx-deathtypes.message.mapper_custom.)"
    - "ACCIDENT-path ANNCE_ACHIEVEMENT_BOTLIKE (score==-5 announce) is still not emitted by EmitObituary. Minor audio/notif gap. UNCHANGED."
features:
  - id: fx-deathtypes.registry.packing
    name: "Deathtype encoding: packed int (weaponmask + HITTYPE bits + DT_FIRST registry) vs string tag"
    layer: [shared]
    base_refs:
      - "common/deathtypes/all.qh:30-52 (DEATH_WEAPONMASK, HITTYPE_*, DT_FIRST, REGISTER_DEATHTYPE)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DeathTypes.cs (DeathTypes string-tag scheme)"
    constants:
      - { name: "DEATH_WEAPONMASK", base: "BITS(8)=0xFF", port: "weapon NetName via 'weapon/' prefix", match: false }
      - { name: "DT_FIRST", base: "BIT(14)", port: "bare lowercase special tag (no numeric base)", match: false }
      - { name: "HITTYPE flags", base: "bits 8-13 (SECONDARY/SPLASH/BOUNCE/ARMORPIERCE/SOUND/SPAM)", port: "'|flag' suffix tokens (same 6)", match: false }
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port carries the deathtype as a string tag (DamageInfo.DeathType) end-to-end instead of a packed int; the bit math (weapon id, HITTYPE bits, special classification) is reproduced via HasHitType/BaseOf/IsWeapon. Behaviorally equivalent for routing; only the wire encoding differs. Documented in DeathTypes.cs. Wave-1 added the DamageSystem.SplashDeathType seam (HITTYPE_SPLASH ORed onto indirect victims) consistent with this string scheme."
    gaps: []
    verification:
      - { kind: code, ref: "DeathTypes.IsWeapon/WeaponNetNameOf/HasHitType/BaseOf vs all.qh DEATH_WEAPONOF/DEATH_ISSPECIAL macros; all 6 HITTYPE flags present as suffix tokens; Wave-5 added only one new tag (DeathTypes.Camp) — no change to the encoding model", result: pass }
    confidence: high
    notes: "Deliberate model change; the rest of this unit's parity is judged against the string scheme. Wave-5 added DeathTypes.Camp ('camp') but left the encoding scheme intact."

