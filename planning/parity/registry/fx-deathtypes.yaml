features:
  - id: fx-deathtypes.registry.packing
    name: "Deathtype encoding: packed int (weaponmask + HITTYPE bits + DT_FIRST registry) vs string tag"
    layer: [shared]
    base_refs:
      - "common/deathtypes/all.qh:30-52 (DEATH_WEAPONMASK, HITTYPE_*, DT_FIRST, REGISTER_DEATHTYPE)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DeathTypes.cs (DeathTypes string-tag scheme)"
    constants:
      - { name: "DEATH_WEAPONMASK", base: "BITS(8)=0xFF", port: "weapon NetName via 'weapon/' prefix", match: false }
      - { name: "DT_FIRST", base: "BIT(14)", port: "bare lowercase special tag (no numeric base)", match: false }
      - { name: "HITTYPE flags", base: "bits 8-13 (SECONDARY/SPLASH/BOUNCE/ARMORPIERCE/SOUND/SPAM)", port: "'|flag' suffix tokens (same 6)", match: false }
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port carries the deathtype as a string tag (DamageInfo.DeathType) end-to-end instead of a packed int; the bit math (weapon id, HITTYPE bits, special classification) is reproduced via HasHitType/BaseOf/IsWeapon. Behaviorally equivalent for routing; only the wire encoding differs. Documented in DeathTypes.cs. The string scheme now carries the full special set (nade family, cheat, rot, shooting_star, custom, etc.) as named constants."
    gaps: []
    verification:
      - { kind: code, ref: "DeathTypes.IsWeapon/WeaponNetNameOf/HasHitType/BaseOf vs all.qh DEATH_WEAPONOF/DEATH_ISSPECIAL macros; all 6 HITTYPE flags present as suffix tokens; all special constants now present (Custom/Cheat/Rot/ShootingStar/Nade* added since baseline) with no change to the encoding model", result: pass }
