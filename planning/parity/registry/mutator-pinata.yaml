      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:552"
    constants:
      - { name: "weapon set scanned", base: "FOREACH(Weapons, it != WEP_Null) & STAT(WEAPONS,frag_target)", port: "foreach(target.OwnedWeaponSet.Weapons())", match: true }
      - { name: "exclude currently-held weapon", base: "frag_target.(weaponentity).m_weapon != it", port: "skip if ReferenceEquals(it, held) where held=Inventory.CurrentWeapon (=ActiveWeaponId = slot0 m_weapon)", match: true }
      - { name: "throwable gate", base: "W_IsWeaponThrowable(frag_target, it.m_id)", port: "WeaponThrowing.IsWeaponThrowable(target, it)", match: true }
      - { name: "doreduce", base: "false", port: "false", match: true }
      - { name: "hook return", base: "true (does not stop chain)", port: "true", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "OnPlayerDies iterates OwnedWeaponSet, excludes held (CurrentWeapon = slot0 active), IsWeaponThrowable-gated, ThrowNewWeapon(doreduce:false); fired from MutatorHooks.PlayerDies.Call at DamageSystem.cs:552 on the live kill path", result: pass }
      - { kind: code, ref: "held weapon dropped separately by WeaponThrowing.SpawnThrownWeapon at DamageSystem.cs:577 (after the PlayerDies hook ran) -> not double-thrown, matching QC m_weapon!=it exclusion + the separate player.qc death drop", result: pass }
    confidence: high
    notes: "Core behavior is faithful and live. The throw IMPULSE (origin + random vector) is split into its own rows below (spawn origin + impulse distribution) so the randomvec gap is isolated. The pinata burst correctly runs BEFORE the held-weapon SpawnThrownWeapon in DamageSystem.Killed, matching the QC ordering (hook then player.qc drop)."

