summary:
  feature_count: 8
  worst_gaps:
    - "Offhand (g_pinata_offhand) branch is inert: the port models a single weapon slot, so the QC slot>0 offhand loop has no extra weapons to scatter (intended divergence pending dual-wielding)."
    - "Menu describe text rides on the checkbox tooltip (no dedicated PAGE_TEXT describe-page widget) and the incompatibility binding is approximated as the dominant 'not InstaGib' gate rather than QC checkCompatibility_pinata's full set (instagib/nix/overkill/melee_only/weapon-arena)."
features:
  - id: mutator-pinata.enable.predicate
    name: "Enable predicate (g_pinata gate + InstaGib/Overkill suppression + registration/activation)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/pinata/sv_pinata.qc:5 REGISTER_MUTATOR(pinata, expr_evaluate(autocvar_g_pinata) && !MUTATOR_IS_ENABLED(mutator_instagib) && !MUTATOR_IS_ENABLED(ok))"
      - "lib/cvar.qh:48 bool expr_evaluate(string s)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:ExprEvaluate"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:ExprToken"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs"
    constants:
      - { name: "g_pinata", base: "0 (string, expr_evaluate; mutators.cfg:557)", port: "0 (read as string via Api.Cvars.GetString, evaluated by faithful ExprEvaluate)", match: true }
      - { name: "suppressed if instagib enabled", base: "!MUTATOR_IS_ENABLED(mutator_instagib)", port: "!OtherEnabled(\"instagib\") (reads instagib.IsEnabled)", match: true }
      - { name: "suppressed if overkill enabled", base: "!MUTATOR_IS_ENABLED(ok)", port: "!OtherEnabled(\"overkill\") (reads overkill.IsEnabled)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "PinataMutator.IsEnabled = Api.Services != null && ExprEvaluate(GetString(g_pinata)) && !OtherEnabled(instagib) && !OtherEnabled(overkill). ExprEvaluate is now a FULL faithful port of QC expr_evaluate (lib/cvar.qh:48): optional leading '+'/'-' (negate), whitespace-token AND chain via ExprToken with comparison operators (>= <= == != === !== > <) in QC's strstrofs source order, bare literal-number vs named-cvar truthiness (boolean((ftos(f)==k)?f:cvar(k))), '!' invert. OtherEnabled reads the other mutator's IsEnabled predicate (order-independent, matching MUTATOR_IS_ENABLED). [Mutator] auto-discovery -> Mutators.All -> MutatorActivation.Apply() calls Hook() when enabled", result: pass }
      - { kind: value, ref: "Base mutators.cfg:557 'set g_pinata 0' -> ExprEvaluate('0')=false matches port default off; mutators.cfg:558 g_pinata_offhand 0 matches; InstaGib/Overkill order-independent via the other mutator's IsEnabled predicate", result: pass }
      - { kind: value, ref: "Adversarial: Base lib/cvar.qh expr_evaluate('') = true (zero tokens, ret flips to true). Port ExprEvaluate(''): no '+'/'-', empty token list -> exprFail=false -> ret=!false=true. MATCHES Base now (the prior baseline's empty-string divergence is RESOLVED by the full port). g_pinata never defaults to '' in stock play (DP cvar() of an unset cvar is '0') so it is anyway unreachable", result: pass }
    confidence: high
    notes: "FIXED since the 2026-06-25 baseline: ExprEvaluate is no longer a simplified ''/'0'/'false' helper — it is now the full expr_evaluate grammar port (ExprEvaluate + ExprToken + CvarF/Cvar helpers), matching HookMutator/melee/instagib/nix. The two documented residual nits from the baseline (no operators/cvar-refs, and expr_evaluate('') returning false) are both gone. Registered (auto-discovered via [Mutator]); PlayerDies handler subscribed on the live boot path when g_pinata != 0 and neither InstaGib nor Overkill is on."

