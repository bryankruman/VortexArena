summary:
  feature_count: 8
  worst_gaps:
    - "BuildMutatorsPrettyString (', Piñata') is now PORTED (override on PinataMutator + a MutatorActivation.BuildMutatorsPrettyString chain runner), but the chain runner has NO external live caller (re-verified 2026-06-25: grep finds no consumer outside MutatorActivation.cs itself). The scoreboard/HUD/map-info 'modifications' active-mutators pretty line is never assembled, so the ', Piñata' token never surfaces. Logic/values faithful, liveness DEAD. (Contrast BuildMutatorsString below, which IS live.)"
    - "g_pinata expr-string read uses a simplified LOCAL ExprEvaluate (PinataMutator.ExprEvaluate) rather than the faithful full expr_evaluate port that exists in HookMutator/melee/instagib/nix. The pinata copy only handles ''/'0'/'false' (no operators, no +/- prefix, no named-cvar refs) and diverges from Base expr_evaluate('') which returns TRUE; faithful for the stock 0/1 values, immaterial in stock play."
    - "Offhand (g_pinata_offhand) branch is inert: the port models a single weapon slot, so the QC slot>0 offhand loop has no extra weapons to scatter (intended divergence pending dual-wielding)."
features:
  - id: mutator-pinata.enable.predicate
    name: "Enable predicate (g_pinata gate + InstaGib/Overkill suppression + registration/activation)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/pinata/sv_pinata.qc:5 REGISTER_MUTATOR(pinata, expr_evaluate(autocvar_g_pinata) && !MUTATOR_IS_ENABLED(mutator_instagib) && !MUTATOR_IS_ENABLED(ok))"
      - "lib/cvar.qh:48 bool expr_evaluate(string s)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:ExprEvaluate"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs"
    constants:
      - { name: "g_pinata", base: "0 (string, expr_evaluate; mutators.cfg:557)", port: "0 (read as string via Api.Cvars.GetString, evaluated by local ExprEvaluate)", match: true }
      - { name: "suppressed if instagib enabled", base: "!MUTATOR_IS_ENABLED(mutator_instagib)", port: "!OtherEnabled(\"instagib\") (reads instagib.IsEnabled)", match: true }
      - { name: "suppressed if overkill enabled", base: "!MUTATOR_IS_ENABLED(ok)", port: "!OtherEnabled(\"overkill\") (reads overkill.IsEnabled)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "pinata's local ExprEvaluate(string) is a SIMPLIFIED copy: it only special-cases ''/'0'/'false' (-> false) and returns true otherwise; it does NOT implement expr_evaluate's grammar (the +/- prefix, the >= <= > < == != === !== operators, or named-cvar truthiness). A faithful full port already exists in HookMutator.cs:ExprEvaluate (and melee/instagib/nix); pinata does not reuse it. It also diverges from Base for the empty-string case: QC expr_evaluate('') returns TRUE, whereas pinata's helper returns false. Immaterial for the stock default ('0' -> false in both) and for '1'."
    verification:
      - { kind: code, ref: "PinataMutator.IsEnabled = Api.Services != null && ExprEvaluate(GetString(g_pinata)) && !OtherEnabled(instagib) && !OtherEnabled(overkill). ExprEvaluate(s): false for null/empty/'0'/'false' (case-insensitive), true otherwise. OtherEnabled reads the other mutator's IsEnabled predicate (order-independent, matching MUTATOR_IS_ENABLED). [Mutator] auto-discovery -> Mutators.All -> MutatorActivation.Apply() calls Hook() when enabled", result: pass }
      - { kind: value, ref: "Base mutators.cfg:557 'set g_pinata 0' -> ExprEvaluate('0')=false matches port default off; mutators.cfg:558 g_pinata_offhand 0 matches; InstaGib/Overkill order-independent via the other mutator's IsEnabled predicate", result: pass }
      - { kind: value, ref: "Adversarial: Base lib/cvar.qh expr_evaluate('') = true (zero tokens), port ExprEvaluate('') = false — divergence, but g_pinata never defaults to '' (DP cvar() of an unset cvar is '0' not ''); not reachable in stock play", result: pass }
    confidence: high
    notes: "Registered (auto-discovered via [Mutator]) and the PlayerDies handler is subscribed on the live boot path when g_pinata != 0 and neither InstaGib nor Overkill is on. Residual fidelity nit (simplified local evaluator + empty-string divergence) only; the predicate is correct for all realistic values."

