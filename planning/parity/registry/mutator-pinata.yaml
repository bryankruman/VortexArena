unit: mutator-pinata
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 7
  worst_gaps:
    - "Throw spread distribution differs: QC randomvec() (engine builtin #91) is uniform inside the UNIT BALL (|v|<=1; the prandomvec QC fallback also rejection-samples via `while (v*v > 1)`), but the port's Prandom.Vec() is uniform in the CUBE [-1,1)^3 (|v| up to ~1.73, no rejection). With the *175 scale, port burst weapons can fly up to ~303 qu/s horizontally vs 175 in Base and are biased toward the 8 cube-corner diagonals — the loot fan-out is boxier/farther than Base. Shared Prandom.Vec() defect that also affects the normal held-weapon death drop (randomvec()*125 + '0 0 200')."
    - "Active-mutators string hooks unmapped: Base sv_pinata.qc has authority-side BuildMutatorsString (':Pinata') and BuildMutatorsPrettyString (', Piñata') hookfunctions; the port has NO BuildMutatorsString hook chain at all (confirmed: RocketFlyingMutator notes the chain was intentionally skipped 'by the batch'). The server-browser/HUD/scoreboard active-mutators report omits Pinata. Affects every mutator, not just pinata."
    - "g_pinata is a QC string evaluated via expr_evaluate (allows expression values); the port reads it as a float (GetFloat != 0) even though an ExprEvaluate(GetString(...)) helper already exists in the port (used by RocketFlyingMutator for the identical expr_evaluate(g_pinata)-style idiom). Immaterial for the stock 0/1 values but not literally faithful and inconsistent with the sibling mutator."
    - "No MENUQC describe text or create-game create-mutators checkbox for Pinata (general menu gap across the port, not unique to pinata)."
