      - { kind: code, ref: "held weapon dropped separately by WeaponThrowing.SpawnThrownWeapon at DamageSystem.cs:614 (after the PlayerDies hook ran at 589) -> not double-thrown, matching QC m_weapon!=it exclusion + the separate player.qc death drop", result: pass }
