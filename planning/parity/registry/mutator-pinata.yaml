unit: mutator-pinata
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 7
  worst_gaps:
    - "Throw spread distribution differs: QC randomvec() (engine builtin #91) is uniform inside the UNIT BALL (|v|<=1; the prandomvec QC fallback also rejection-samples via `while (v*v > 1)`), but the port's Prandom.Vec() is uniform in the CUBE [-1,1)^3 (|v| up to ~1.73, no rejection). UNCHANGED by Waves 1/2 — Prandom.cs:Vec was not touched. With the *175 scale, port burst weapons can fly up to ~303 qu/s horizontally vs 175 in Base and are biased toward the 8 cube-corner diagonals — the loot fan-out is boxier/farther than Base. Shared Prandom.Vec() defect that also affects the normal held-weapon death drop (randomvec()*125 + '0 0 200')."
    - "Active-mutators string hooks STILL unmapped: Base sv_pinata.qc has authority-side BuildMutatorsString (':Pinata') and BuildMutatorsPrettyString (', Piñata') hookfunctions; the port still has NO BuildMutatorsString hook chain at all (re-verified 2026-06-22: only doc-comment references in RocketFlyingMutator/CloakedMutator/PowerupsMutator/SuperSpecMutator; MutatorHooks.cs has no BuildMutators* HookChain). The server-browser/HUD/scoreboard active-mutators report omits Pinata. Affects every mutator, not just pinata."
    - "No MENUQC describe text or create-game create-mutators checkbox for Pinata (general menu gap across the port, not unique to pinata) — STILL missing after Waves 1/2."
    - "g_pinata expr-string read is now via a simplified local ExprEvaluate (Wave-2 fix) rather than the faithful full expr_evaluate port that already exists in HookMutator/melee/instagib/nix. The pinata copy only handles ''/'0'/'false' (no operators, no +/- prefix, no named-cvar refs) and diverges from Base expr_evaluate('') which returns TRUE; faithful for the stock 0/1 values."
features:
  - id: mutator-pinata.enable.predicate
    name: "Enable predicate (g_pinata gate + InstaGib/Overkill suppression + registration/activation)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/pinata/sv_pinata.qc:5 REGISTER_MUTATOR(pinata, expr_evaluate(autocvar_g_pinata) && !MUTATOR_IS_ENABLED(mutator_instagib) && !MUTATOR_IS_ENABLED(ok))"
      - "lib/cvar.qh:48 bool expr_evaluate(string s)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:ExprEvaluate"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs:535"
    constants:
      - { name: "g_pinata", base: "0 (string, expr_evaluate; mutators.cfg:557)", port: "0 (read as string via Api.Cvars.GetString, evaluated by local ExprEvaluate — Wave-2 change, was GetFloat!=0)", match: true }
      - { name: "suppressed if instagib enabled", base: "!MUTATOR_IS_ENABLED(mutator_instagib)", port: "!OtherEnabled(\"instagib\") (reads instagib.IsEnabled)", match: true }
      - { name: "suppressed if overkill enabled", base: "!MUTATOR_IS_ENABLED(ok)", port: "!OtherEnabled(\"overkill\") (reads overkill.IsEnabled)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Wave-2 replaced the float read (GetFloat(\"g_pinata\")!=0) with a string read evaluated by a LOCAL ExprEvaluate(string) — this closes the 'reads as float, not expr_evaluate' baseline gap for the realistic 0/1 values and matches the sibling expr_evaluate idiom in spirit. BUT pinata's local ExprEvaluate is a SIMPLIFIED copy: it only special-cases ''/'0'/'false' (-> false) and returns true otherwise; it does NOT implement expr_evaluate's grammar (the +/- prefix, the >= <= > < == != === !== operators, or named-cvar truthiness). A faithful full port already exists in HookMutator.cs:ExprEvaluate (and melee/instagib/nix); pinata does not reuse it. It also diverges from Base for the empty-string case: QC expr_evaluate('') returns TRUE (no tokens -> not expr_fail -> ret flips), whereas pinata's helper returns false. Immaterial for the stock default ('0' -> false in both) and for '1', but not a literal port and inconsistent with the sibling faithful evaluators."
    verification:
      - { kind: code, ref: "PinataMutator.IsEnabled = Api.Services != null && ExprEvaluate(GetString(g_pinata)) && !OtherEnabled(instagib) && !OtherEnabled(overkill). ExprEvaluate(s): false for null/empty/'0'/'false' (case-insensitive), true otherwise. OtherEnabled reads the other mutator's IsEnabled predicate (order-independent, matching MUTATOR_IS_ENABLED). [Mutator] auto-discovery -> Mutators.All -> MutatorActivation.Apply() at GameWorld.cs:535 calls Hook() when enabled", result: pass }
      - { kind: value, ref: "Base mutators.cfg:557 'set g_pinata 0' -> ExprEvaluate('0')=false matches port default off; mutators.cfg:558 g_pinata_offhand 0 matches; InstaGib/Overkill order-independent via the other mutator's IsEnabled predicate", result: pass }
      - { kind: value, ref: "Adversarial: Base lib/cvar.qh expr_evaluate('') = true (zero tokens), port ExprEvaluate('') = false — divergence, but g_pinata never defaults to '' (DP cvar() of an unset cvar is '0' not ''); not reachable in stock play", result: pass }
    confidence: high
    notes: "Registered (auto-discovered via [Mutator]) and the PlayerDies handler is subscribed on the live boot path when g_pinata != 0 and neither InstaGib nor Overkill is on. Wave-2 narrowed the prior float-vs-expr gap to a residual fidelity nit (simplified local evaluator + empty-string divergence); the predicate is correct for all realistic values."

