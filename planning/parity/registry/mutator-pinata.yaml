  - id: mutator-pinata.death.throw_impulse
    name: "Burst throw impulse — randomvec()*175 + '0 0 325'"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/pinata/sv_pinata.qc:25 randomvec() * 175 + '0 0 325'"
      - "lib/random.qh:34 randomvec resolution (USE_PRANDOM defined)"
      - "lib/random.qc:120-131 prandomvec rejection sampling"
      - "dpdefs/upstream/csprogsdefs.qc:411 vector() randomvec = #91 (engine builtin)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:OnPlayerDies"
      - "src/XonoticGodot.Common/Math/Prandom.cs:Vec"
    constants:
      - { name: "horizontal scale", base: "175 (* randomvec())", port: "175f (* Prandom.Vec())", match: true }
      - { name: "vertical offset", base: "'0 0 325'", port: "(0,0,325)", match: true }
      - { name: "random vector distribution", base: "randomvec() engine builtin #91 = uniform in UNIT BALL (|v|<=1; prandomvec fallback also rejection-samples while v*v>1)", port: "Prandom.Vec() = new(Signed(),Signed(),Signed()), uniform CUBE [-1,1)^3 (|v| up to ~1.73, NO rejection)", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Prandom.Vec() samples a uniform cube ([-1,1)^3, |v| up to ~1.73) with no rejection step, where QC randomvec() (the DarkPlaces engine builtin #91) samples uniformly inside the unit ball (|v|<=1). Even the QC prandomvec fallback (lib/random.qc:120, `while (v*v > 1)`) rejection-samples to the unit ball, so neither QC path matches the port. With the *175 scale, port burst weapons get up to ~303 qu/s horizontal kick vs <=175 in Base and the throw directions cluster toward the 8 cube-corner diagonals instead of being isotropic — visibly boxier/farther loot scatter."
    verification:
      - { kind: code, ref: "Prandom.Vec() = new(Signed(),Signed(),Signed()) with Signed()=Float()*2-1 in [-1,1); no rejection sampling. lib/random.qh:34 defines USE_PRANDOM so the `#define prandomvec randomvec` alias (in the #else) is NOT active; pinata calls randomvec() directly (engine builtin #91, csprogsdefs.qc:411 / dpextensions.qc:998), which is unit-ball. The QC prandomvec fallback (random.qc:129) also does `while (v*v > 1)`", result: fail }
    confidence: high
    notes: "Shared Prandom.Vec() defect: also affects the normal held-weapon death drop (WeaponThrowing.SpawnThrownWeapon, randomvec()*125 + '0 0 200') and every other randomvec() caller. A fix belongs in Prandom.Vec() (rejection-sample to the unit ball), not pinata-locally. Established by code inspection; no runtime observation. NOTE the port deliberately uses the deterministic Prandom (QC prandom family, ADR-0010) rather than the raw engine randomvec — acceptable for a server-side non-predicted death event; the distribution shape is the real gap, not the determinism choice."

  - id: mutator-pinata.death.offhand_slots
    name: "g_pinata_offhand — scatter off-hand (slot>0) weapons when dual-wielding"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/pinata/sv_pinata.qc:11-19 (per-slot loop + `if(slot > 0 && !autocvar_g_pinata_offhand) break`)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:Offhand"
    constants:
      - { name: "g_pinata_offhand", base: "0 (mutators.cfg:558)", port: "0 (read into Offhand in Hook(), inert)", match: true }
      - { name: "slots scanned", base: "0..MAX_WEAPONSLOTS-1 (=2), break after slot 0 unless offhand", port: "single WeaponSlot(0) only", match: false }
    status:
      logic: stub
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: true
    divergence_rationale: "The port models a single weapon slot (no dual-wielding in normal play; MaxWeaponSlots=2 exists but is not driven for the main game), so QC's slot>0 offhand loop has no extra weapons to scatter. g_pinata_offhand is read in Hook() for cvar parity but has no behavioral effect. Not player-observable in stock play; should be revisited only if/when dual-wielding is implemented."
    gaps:
      - "With g_pinata_offhand 1 and a dual-wield loadout, Base would also scatter the off-hand slot's non-held weapons; the port has no second slot to iterate (OnPlayerDies hardcodes WeaponSlot(0)), so this branch never does anything. Inert in stock play (no dual-wielding)."
    verification:
      - { kind: code, ref: "PinataMutator.Offhand read from g_pinata_offhand in Hook() but OnPlayerDies iterates a single WeaponSlot(0); no slot>0 loop. Class comment documents the single-slot divergence", result: pass }
    confidence: high
    notes: "Recorded as intended_divergence because it is a deliberate consequence of the port not implementing dual-wielding, not a bug in pinata. Cvar default (0) matches Base; the Offhand field is set but never read in OnPlayerDies."

