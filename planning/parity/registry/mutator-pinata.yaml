    base_refs:
      - "common/mutators/mutator/pinata/sv_pinata.qc:5 REGISTER_MUTATOR(pinata, expr_evaluate(autocvar_g_pinata) && !MUTATOR_IS_ENABLED(mutator_instagib) && !MUTATOR_IS_ENABLED(ok))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs:511"
    constants:
      - { name: "g_pinata", base: "0 (string, expr_evaluate; mutators.cfg:557)", port: "0 (read as float GetFloat != 0, NOT ExprEvaluate)", match: false }
      - { name: "suppressed if instagib enabled", base: "!MUTATOR_IS_ENABLED(mutator_instagib)", port: "!OtherEnabled(\"instagib\") (reads instagib.IsEnabled)", match: true }
      - { name: "suppressed if overkill enabled", base: "!MUTATOR_IS_ENABLED(ok)", port: "!OtherEnabled(\"overkill\") (reads overkill.IsEnabled)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "g_pinata is a QC string evaluated with expr_evaluate; the port reads it as a float (GetFloat != 0). Equivalent for the stock 0/1 values; not literally faithful for expression-string values. An ExprEvaluate(GetString(...)) helper already exists in the port (RocketFlyingMutator uses it for the same idiom) but pinata does not use it."
    verification:
      - { kind: code, ref: "PinataMutator.IsEnabled = Api.Services != null && GetFloat(g_pinata)!=0 && !OtherEnabled(instagib) && !OtherEnabled(overkill); OtherEnabled reads the other mutator's IsEnabled predicate (order-independent, matching MUTATOR_IS_ENABLED). [Mutator] auto-discovery -> Mutators.All -> MutatorActivation.Apply() at GameWorld.cs:511 calls Hook() when enabled", result: pass }
      - { kind: value, ref: "Base mutators.cfg:557 'set g_pinata 0' matches port default off; mutators.cfg:558 g_pinata_offhand 0 matches; InstaGib/Overkill order-independent via the other mutator's IsEnabled predicate", result: pass }
    confidence: high
    notes: "Registered (auto-discovered via [Mutator]) and the PlayerDies handler is subscribed on the live boot path when g_pinata != 0 and neither InstaGib nor Overkill is on. The string-vs-float read is the only logic nit and is immaterial for stock values, but is a real inconsistency vs the sibling RocketFlyingMutator which uses ExprEvaluate."

