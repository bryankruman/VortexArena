      - { kind: code, ref: "held weapon dropped separately by WeaponThrowing.SpawnThrownWeapon at DamageSystem.cs:689 (after the PlayerDies hook ran at 658) -> not double-thrown, matching QC m_weapon!=it exclusion + the separate player.qc death drop", result: pass }
