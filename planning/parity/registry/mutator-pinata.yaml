  - id: mutator-pinata.death.throw_impulse
    name: "Burst throw impulse — randomvec()*175 + '0 0 325'"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/pinata/sv_pinata.qc:25 randomvec() * 175 + '0 0 325'"
      - "lib/random.qh:34 randomvec resolution (USE_PRANDOM defined)"
      - "lib/random.qc:120-131 prandomvec rejection sampling"
      - "dpdefs/upstream/csprogsdefs.qc:411 vector() randomvec = #91 (engine builtin)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/PinataMutator.cs:OnPlayerDies"
      - "src/XonoticGodot.Common/Math/Prandom.cs:Vec"
    constants:
      - { name: "horizontal scale", base: "175 (* randomvec())", port: "175f (* Prandom.Vec())", match: true }
      - { name: "vertical offset", base: "'0 0 325'", port: "(0,0,325)", match: true }
      - { name: "random vector distribution", base: "randomvec() engine builtin #91 = uniform in UNIT BALL (|v|<=1; prandomvec fallback also rejection-samples while v*v>1)", port: "Prandom.Vec() = new(Signed(),Signed(),Signed()), uniform CUBE [-1,1)^3 (|v| up to ~1.73, NO rejection)", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "STILL OPEN after Waves 1/2 (Prandom.cs:Vec was not modified — re-verified unchanged 2026-06-22). Prandom.Vec() samples a uniform cube ([-1,1)^3, |v| up to ~1.73) with no rejection step, where QC randomvec() (the DarkPlaces engine builtin #91) samples uniformly inside the unit ball (|v|<=1). Even the QC prandomvec fallback (lib/random.qc:120, `while (v*v > 1)`) rejection-samples to the unit ball, so neither QC path matches the port. With the *175 scale, port burst weapons get up to ~303 qu/s horizontal kick vs <=175 in Base and the throw directions cluster toward the 8 cube-corner diagonals instead of being isotropic — visibly boxier/farther loot scatter."
    verification:
      - { kind: code, ref: "Prandom.Vec() (Prandom.cs:44) = new(Signed(),Signed(),Signed()) with Signed()=Float()*2-1 in [-1,1); no rejection sampling — UNCHANGED by Waves 1/2. lib/random.qh:34 defines USE_PRANDOM so the `#define prandomvec randomvec` alias (in the #else) is NOT active; pinata calls randomvec() directly (engine builtin #91, csprogsdefs.qc:411 / dpextensions.qc:998), which is unit-ball. The QC prandomvec fallback (random.qc:129) also does `while (v*v > 1)`", result: fail }
    confidence: high
    notes: "Shared Prandom.Vec() defect: also affects the normal held-weapon death drop (WeaponThrowing.SpawnThrownWeapon, randomvec()*125 + '0 0 200') and every other randomvec() caller. A fix belongs in Prandom.Vec() (rejection-sample to the unit ball), not pinata-locally. Established by code inspection; no runtime observation. NOTE the port deliberately uses the deterministic Prandom (QC prandom family, ADR-0010) rather than the raw engine randomvec — acceptable for a server-side non-predicted death event; the distribution shape is the real gap, not the determinism choice."

