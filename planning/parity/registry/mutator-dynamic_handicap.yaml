unit: mutator-dynamic_handicap
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "triggers.recompute: Handicap still recomputes on only 2 events (PlayerSpawn, PlayerDies) vs Base's 4 functional hooks. The AddedPlayerScore(SP_SCORE) POST-write hook has no port equivalent (GameScores only fires the PRE-write AddPlayerScoreHook for veto/rewrite, never a post-write event), so caps/objective/non-kill score gains do not re-handicap until the next spawn or death. STILL OPEN."
    - "triggers.recompute: ClientDisconnect and MakePlayerObserver do not trigger a recompute — no such hook chains exist in MutatorHooks (re-confirmed: still no AddedPlayerScore/ClientDisconnect/MakePlayerObserver chains), so the mean stays stale after a player leaves or switches to spectator. STILL OPEN."
    - "present.handicap_level: handicap_level is never computed/networked (no symbol anywhere in port), so the scoreboard player_handicap icon has no data. STILL OPEN (no scoreboard consumer either)."
    - "present.mutator_string: BuildMutatorsString/PrettyString entries (\":handicap\" / \", Dynamic handicap\") still absent; active dynamic_handicap is not advertised in the server mutator list. STILL OPEN."
    - "FIXED since baseline: enable.predicate CTS/RACE gate is now genuinely LIVE (wired via DynamicHandicapMutator.HandicapDisabledProvider at Commands.cs:359 = `GameType is Cts or Race`), and the damage pipeline now folds the voluntary cl_handicap layer (HandicapTotal = forced*voluntary, DamageSystem.VoluntaryHandicapProvider)."
features:
  - id: dynamic_handicap.compute.update_handicap
    name: "Per-player forced-handicap computation from mean SP_SCORE"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:DynamicHandicap_UpdateHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:UpdateHandicap (90-120)"
    constants:
      - { name: "g_dynamic_handicap_scale", base: "0.2", port: "0.2 (read from cvar in Hook; C# field initializer is 1 but overwritten)", match: true }
      - { name: "g_dynamic_handicap_exponent", base: "1", port: "1", match: true }
      - { name: "formula", base: "h=|(score-mean)*scale|^exp; sign by below-mean; >=0 -> +1 else 1/(|h|+1)", port: "identical", match: true }
      - { name: "mean_pool", base: "FOREACH_CLIENT(IS_PLAYER) for mean; FOREACH_CLIENT(true) for apply", port: "FindByClass(player)+Client flag for BOTH mean and apply", match: false }
      - { name: "score_type", base: "PlayerScore_Get -> float (stored in float field)", port: "GameScores.Get -> int", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Apply pass: Base sets a handicap on EVERY connected client (FOREACH_CLIENT(true), incl. observers); port iterates players only. Harmless functionally (observers take no damage) but a behavioral diff if an observer's stored handicap is ever read."
      - "Score representation: Base scores are float-typed (PlayerScore_Get), port GameScores.Get returns int. Equivalent in normal play (score deltas are integers), but a fractional Base score would differ."
    verification:
      - { kind: read, ref: "sv_dynamic_handicap.qc:32-67 vs DynamicHandicapMutator.cs:90-120 (formula/sign/fold line-by-line)", result: pass }
      - { kind: read, ref: "mean = float totalScore / int totalPlayers -> C# float division, matches QC", result: pass }
      - { kind: read, ref: "post-fixup git diff: UpdateHandicap body unchanged (only IsEnabled gate + provider + doc comment changed)", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests.DynamicHandicap_HandicapsAboveMeanPlayer (scale 0.1, strong score 100>weak 0 => strong give>1, weak give<1)", result: pass }
    confidence: high
    notes: "Formula, sign rule, fold and the +1 / 1/(|h|+1) branches all match Base exactly. Cvars read into fields in Hook() (the =1 initializers are overwritten). Test exercises UpdateHandicap() directly, not the live trigger path. UNCHANGED since baseline."

