  - id: dynamic_handicap.apply.damage_scaling
    name: "Forced handicap scales dealt/taken damage in the damage pipeline"
    layer: [authority]
    base_refs:
      - "server/player.qc:243-249"
      - "server/handicap.qc:Handicap_GetTotalHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:PlayerDamage handicap block(416-425)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:HandicapTotal(945-953)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:VoluntaryHandicapProvider"
      - "src/XonoticGodot.Server/Commands.cs:409-425 (VoluntaryHandicapProvider wiring)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageEntityState.cs:HandicapGive(56),HandicapTake(58)"
    constants:
      - { name: "gate", base: "!DEATH_ISSPECIAL(deathtype)", port: "!DeathTypes.IsSpecial(deathType)", match: true }
      - { name: "victim_scale", base: "damage *= GetTotalHandicap(this,true)", port: "damage *= HandicapTotal(targ,true)", match: true }
      - { name: "attacker_scale", base: "if (this != attacker && IS_PLAYER(attacker)) damage /= GetTotalHandicap(attacker,false)", port: "if (attacker!=null && !ref-eq && IsPlayer(attacker)) damage /= give (guarded give!=0)", match: true }
      - { name: "total_handicap", base: "GetForcedHandicap * GetVoluntaryHandicap", port: "forced * voluntary (HandicapTotal:906)", match: true }
      - { name: "voluntary_bound", base: "bound(1.0, value, 10.0); give:damage_given>1 else cl_handicap.x; take:damage_taken>1 else cl_handicap.y>0?.y:.x", port: "Clamp(value,1,10) with identical give/take vector-branch (Commands.cs:413-425)", match: true }
      - { name: "default_handicap", base: "1 (disabled / value<=0 guard)", port: "1 (v<=0 -> 1)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Base short-circuits Handicap_GetTotalHandicap entirely under HANDICAP_DISABLED() (returns 1); the port checks CTS/RACE inside VoluntaryHandicapProvider (returns 1) and relies on the mutator not activating in CTS/RACE so the forced fields stay 1. Equivalent in practice, but the FORCED part of HandicapTotal (DamageSystem.cs:899-906) has no explicit HANDICAP_DISABLED gate — if a forced handicap were ever set in a CTS/RACE match by some other path, the port would still apply it. Latent, not reachable today (Handicap.SetForcedHandicap itself early-returns when disabled)."
    verification:
      - { kind: read, ref: "DamageSystem.cs:416-425 vs player.qc:243-249 (gate !IsSpecial, victim *= HandicapTotal(targ,true), attacker /= HandicapTotal(attacker,false) guarded by attacker!=null && !ref-eq && IsPlayer && give!=0) — exact", result: pass }
      - { kind: read, ref: "HandicapTotal folds forced*voluntary (DamageSystem.cs:945-953); non-client -> 1; forced<=0 -> 1; voluntary via VoluntaryHandicapProvider null-safe ?? 1", result: pass }
      - { kind: read, ref: "VoluntaryHandicapProvider (Commands.cs:409-425) matches Base Handicap_GetVoluntaryHandicap vector-branch + bound[1,10] + HANDICAP_DISABLED->1", result: pass }
    confidence: high
    notes: "The port has the full Handicap_GetVoluntaryHandicap port (DamageSystem.VoluntaryHandicapProvider, wired in Commands.cs to the per-client REPLICATE'd cl_handicap*/damage_{given,taken} cvars) and HandicapTotal folds forced*voluntary exactly like Base. Line refs refreshed (HandicapTotal 899->945, PlayerDamage block 406->416). UNCHANGED in behavior."

