unit: mutator-dynamic_handicap
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "enable.predicate: Wave-2 ADDED a !HANDICAP_DISABLED (CTS/RACE) guard, but it reads the bare g_cts/g_race CVARS — which the port NEVER sets to 1 (config default 0; no Cvars.Set anywhere; the codebase detects CTS/RACE via `GameType is Cts/Race`, e.g. CompatRemaps.IsCtsActive). So the guard is DEAD: in an actual CTS/RACE match it stays false and the mutator still activates. The gap is NOT genuinely closed — the fix compiles but is unwired."
    - "Handicap recomputes on only 2 events (PlayerSpawn, PlayerDies) vs Base's 4 functional hooks; the AddedPlayerScore(SP_SCORE) post-write hook has no port equivalent (port only has the pre-write AddPlayerScoreHook), so caps/objective/non-kill score gains do not re-handicap until the next spawn or death. UNCHANGED by Wave-1/2."
    - "ClientDisconnect and MakePlayerObserver do not trigger a recompute (no such hooks exist in MutatorHooks), so the mean stays stale after a player leaves or switches to spectator. UNCHANGED by Wave-1/2."
    - "handicap_level is never computed/networked (no symbol anywhere in port), so the scoreboard player_handicap icon has no data (Base colors it by level). UNCHANGED."
    - "BuildMutatorsString/PrettyString entries (\":handicap\" / \", Dynamic handicap\") absent: active dynamic_handicap is not advertised in the server mutator list. UNCHANGED."
features:
  - id: dynamic_handicap.compute.update_handicap
    name: "Per-player forced-handicap computation from mean SP_SCORE"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:DynamicHandicap_UpdateHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:UpdateHandicap (84-114)"
    constants:
      - { name: "g_dynamic_handicap_scale", base: "0.2", port: "0.2 (read from cvar in Hook; C# field initializer is 1 but overwritten)", match: true }
      - { name: "g_dynamic_handicap_exponent", base: "1", port: "1", match: true }
      - { name: "formula", base: "h=|(score-mean)*scale|^exp; sign by below-mean; >=0 -> +1 else 1/(|h|+1)", port: "identical", match: true }
      - { name: "mean_pool", base: "FOREACH_CLIENT(IS_PLAYER) for mean; FOREACH_CLIENT(true) for apply", port: "FindByClass(player)+Client flag for BOTH mean and apply", match: false }
      - { name: "score_type", base: "PlayerScore_Get -> float (stored in float field)", port: "GameScores.Get -> int", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Apply pass: Base sets a handicap on EVERY connected client (FOREACH_CLIENT(true), incl. observers); port iterates players only. Harmless functionally (observers take no damage) but a behavioral diff if an observer's stored handicap is ever read."
      - "Score representation: Base scores are float-typed (PlayerScore_Get), port GameScores.Get returns int. Equivalent in normal play (score deltas are integers), but a fractional Base score would differ."
    verification:
      - { kind: read, ref: "sv_dynamic_handicap.qc:32-67 vs DynamicHandicapMutator.cs:84-114 (formula/sign/fold line-by-line)", result: pass }
      - { kind: read, ref: "mean = float totalScore / int totalPlayers -> C# float division, matches QC", result: pass }
      - { kind: read, ref: "Wave-1/2 git diff main..HEAD touched only the IsEnabled predicate + the doc comment; UpdateHandicap body unchanged", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests.DynamicHandicap_HandicapsAboveMeanPlayer (scale 0.1, strong score 100>weak 0 => strong give>1, weak give<1)", result: pass }
    confidence: high
    notes: "Formula, sign rule, fold and the +1 / 1/(|h|+1) branches all match Base exactly. Cvars read into fields in Hook() (the =1 initializers are overwritten). Test exercises UpdateHandicap() directly, not the live trigger path. UNCHANGED by Wave-1/2."

