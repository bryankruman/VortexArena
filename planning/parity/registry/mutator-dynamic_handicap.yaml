    constants:
      - { name: "on_value<=0", base: "error() — hard fault", port: "Log.Fatal('Handicap_SetForcedHandicap: Invalid handicap value.')", match: true }
      - { name: "HANDICAP_DISABLED early-return", base: "if (HANDICAP_DISABLED()) return", port: "if (Disabled) return (Handicap.cs:71)", match: true }
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Redundant tolerance on the READ path: Handicap.GetForcedHandicap (Handicap.cs:61) coerces a stored forced<=0 to 1 rather than faulting. The authoritative WRITE path (Handicap.SetForcedHandicap, Handicap.cs:72-73) matches Base's error() via Log.Fatal, so this read-path softness is latent only (the +1 / 1/(|h|+1) fold keeps written values strictly positive, so neither the guard nor the fallback is hit in normal play)."
    verification:
      - { kind: read, ref: "Handicap.cs:71-73 disabled early-return + value<=0 -> Log.Fatal, matching handicap.qc:83-86", result: pass }
    confidence: high
    notes: "The guard moved out of the mutator into the shared Handicap.cs (port of server/handicap.qc:81-94) with the exact value<=0 Log.Fatal == QC error(). The HandicapTotal/GetForcedHandicap read-path fallback is a separate, benign hardening difference. UNCHANGED in behavior; symbol relocated to Handicap.cs."

