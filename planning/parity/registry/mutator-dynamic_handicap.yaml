unit: mutator-dynamic_handicap
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 8
  worst_gaps:
    - "present.handicap_level: handicap_level is now COMPUTED authoritatively (UpdateHandicapLevel writes Entity.HandicapLevel, logic/values faithful), but it is still NOT networked to clients (no ent_cs handicap stat) and there is no scoreboard player_handicap-icon consumer in the port, so presentation stays missing end-to-end."
    - "present.mutator_string: the BuildMutatorsPrettyString override (', Dynamic handicap') exists but the port has NO live caller for the BuildMutatorsPrettyString hook chain (MutatorActivation.BuildMutatorsPrettyString is never invoked anywhere), so the human-readable scoreboard/votescreen mutator line never shows it. The machine-readable ':handicap' (BuildMutatorsString) IS live via GameWorld gamelog init."
    - "apply.invalid_value_guard: HandicapTotal's read-time forced<=0 -> 1 defensive fallback (DamageSystem.cs:846) is more tolerant than Base's hard error(); the authoritative SetForcedHandicap now does Log.Fatal like Base, so the divergence is now only the redundant read-path tolerance (latent, never reachable)."
    - "FIXED since baseline (Wave 6b, commit f86d947): all 4 Base recompute hooks now ported and LIVE (ClientDisconnect, MakePlayerObserver, AddedPlayerScore(SP_SCORE) added to the prior PlayerSpawn/PlayerDies); handicap_level computation ported; SetForcedHandicap value<=0 error guard ported; BuildMutatorsString/PrettyString tokens ported."
features:
  - id: dynamic_handicap.compute.update_handicap
    name: "Per-player forced-handicap computation from mean SP_SCORE"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:DynamicHandicap_UpdateHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:UpdateHandicap (128-159)"
    constants:
      - { name: "g_dynamic_handicap_scale", base: "0.2", port: "0.2 (read from cvar in Hook; C# field initializer is 1 but overwritten)", match: true }
      - { name: "g_dynamic_handicap_exponent", base: "1", port: "1", match: true }
      - { name: "formula", base: "h=|(score-mean)*scale|^exp; sign by below-mean; >=0 -> +1 else 1/(|h|+1)", port: "identical", match: true }
      - { name: "mean_pool", base: "FOREACH_CLIENT(IS_PLAYER) for mean; FOREACH_CLIENT(true) for apply", port: "FindByClass(player)+Client flag for BOTH mean and apply", match: false }
      - { name: "score_type", base: "PlayerScore_Get -> float (stored in float field)", port: "GameScores.Get -> int", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Apply pass: Base sets a handicap on EVERY connected client (FOREACH_CLIENT(true), incl. observers); port iterates players only. Harmless functionally (observers take no damage) but a behavioral diff if an observer's stored handicap is ever read."
      - "Score representation: Base scores are float-typed (PlayerScore_Get), port GameScores.Get returns int. Equivalent in normal play (score deltas are integers), but a fractional Base score would differ."
    verification:
      - { kind: read, ref: "sv_dynamic_handicap.qc:32-67 vs DynamicHandicapMutator.cs:128-159 (formula/sign/fold line-by-line)", result: pass }
      - { kind: read, ref: "mean = float totalScore / int totalPlayers -> C# float division, matches QC", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests.cs:495-499 (scale 0.1, strong 100>weak 0 => strong give>1, weak give<1)", result: pass }
    confidence: high
    notes: "Formula, sign rule, fold and the +1 / 1/(|h|+1) branches all match Base exactly. Cvars read into fields in Hook() (the =1 initializers are overwritten). UNCHANGED in behavior since baseline (lines shifted with the added handicap-level/string/error code)."

