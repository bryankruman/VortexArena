      - "server/handicap.qh:57 (HANDICAP_DISABLED == IS_GAMETYPE(CTS) || IS_GAMETYPE(RACE))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:IsEnabled (52-55)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:HandicapDisabled/HandicapDisabledProvider (47,59)"
      - "src/XonoticGodot.Server/Commands.cs:359 (HandicapDisabledProvider = () => GameType is Cts or Race)"
    constants:
      - { name: "g_dynamic_handicap", base: "0", port: "0", match: true }
      - { name: "HANDICAP_DISABLED gate", base: "IS_GAMETYPE(CTS) || IS_GAMETYPE(RACE)", port: "HandicapDisabledProvider() == (GameType is Cts or Race), wired in Commands ctor", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: read, ref: "DynamicHandicapMutator.cs:52-55 IsEnabled = Services!=null && g_dynamic_handicap!=0 && !HandicapDisabled; HandicapDisabled = HandicapDisabledProvider?.Invoke() ?? false (59)", result: pass }
      - { kind: grep, ref: "Commands.cs:359 DynamicHandicapMutator.HandicapDisabledProvider = () => _world.GameType is Cts or Race — the SAME provider-seam the codebase uses for CTS detection (ItemPickupRules.CtsActiveProvider:354, CompatRemaps.IsCtsActive)", result: pass }
      - { kind: read, ref: "provider wired in Commands ctor (Commands.cs:331), itself constructed at GameWorld.cs:649 on live server boot; mutator IsEnabled evaluated at MutatorActivation.cs:64 (mut.IsEnabled -> mut.Hook()) — provider is invoked lazily each call so wiring-before-activation ordering holds; null provider -> false (correct non-CTS/RACE default)", result: pass }
      - { kind: read, ref: "Base handicap.qh:57 HANDICAP_DISABLED == IS_GAMETYPE(CTS)||IS_GAMETYPE(RACE) (re-confirmed)", result: pass }
    confidence: high
    notes: "FIXED since baseline. The baseline recorded this as logic:partial / liveness:dead because the Wave-2 guard read the bare g_cts/g_race cvars the port never sets. The second-pass fix-up replaced that with a static HandicapDisabledProvider func-seam wired on the server side (Commands.cs:359) to `GameType is Cts or Race` — the identical pattern already used by ItemPickupRules.CtsActiveProvider and CompatRemaps.IsCtsActive. The gate is now genuinely live: in a real CTS/RACE match the mutator will not activate, matching Base. No g_cts/g_race cvar reliance remains in this unit."

  - id: dynamic_handicap.triggers.recompute
    name: "Recompute on roster/score change (4 functional hooks in Base)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:98-120 (ClientDisconnect, PutClientInServer, MakePlayerObserver, AddedPlayerScore)"
      - "server/scores.qc:377 (MUTATOR_CALLHOOK(AddedPlayerScore) — post-write event)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:OnPlayerSpawn,OnPlayerDies (86-87)"
      - "src/XonoticGodot.Server/ClientManager.cs:542 (PlayerSpawn.Call — live)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:552 (PlayerDies.Call — live)"
    constants:
      - { name: "trigger_count", base: "4 functional (ClientDisconnect, PutClientInServer, MakePlayerObserver, AddedPlayerScore=SP_SCORE)", port: "2 (PlayerSpawn, PlayerDies)", match: false }
    status:
      logic: partial
      values: na
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Missing AddedPlayerScore(SP_SCORE) recompute: Base fires the POST-write AddedPlayerScore hook (scores.qc:377) on every SP_SCORE delta; the port's GameScores.AddToPlayer fires only the PRE-write AddPlayerScoreHook (GameScores.cs:414, veto/rewrite) and NO post-write event — so caps, objective points, KH/Dom/CTF scoring and any non-death score change do not re-handicap until the player's next spawn or death. Re-confirmed post-fixup: GameScores still has only the pre-write hook."
      - "ClientDisconnect does not recompute: no ClientDisconnect hook chain exists in MutatorHooks (re-confirmed: chain list still has no ClientDisconnect), so the mean stays stale (still counting the departed player) until someone else spawns or dies."
      - "MakePlayerObserver does not recompute: no MakePlayerObserver hook chain exists, so switching to spectator does not re-balance the remaining players until the next spawn/death."
    verification:
      - { kind: read, ref: "MutatorHooks.cs HookChain inventory (re-listed) has no AddedPlayerScore/ClientDisconnect/MakePlayerObserver/PutClientInServer chain; mutator still subscribes only PlayerSpawn/PlayerDies (Hook() 64-78)", result: fail }
      - { kind: read, ref: "GameScores.cs:73,414 only AddPlayerScoreHook (pre-write); no post-write AddedPlayerScore recompute", result: fail }
      - { kind: read, ref: "PlayerSpawn.Call live ClientManager.cs:542; PlayerDies.Call live DamageSystem.cs:552", result: pass }
    confidence: high
    notes: "STILL OPEN. PlayerSpawn ~= PutClientInServer (faithful). PlayerDies partially covers frag scoring (a kill is a death). The other 2 Base roster hooks and the AddedPlayerScore score-delta hook still have no port hook chain. Base's AddedPlayerScore (post-write) is a DISTINCT event from AddPlayerScore (pre-write); the port only ported the latter. UNCHANGED since baseline."

  - id: dynamic_handicap.apply.invalid_value_guard
    name: "Handicap_SetForcedHandicap value<=0 error guard"
    layer: [authority]
    base_refs:
      - "server/handicap.qc:81-94 (Handicap_SetForcedHandicap: error() if value <= 0)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:HandicapTotal(840-841)"
    constants:
      - { name: "on_value<=0", base: "error() — hard fault", port: "treated as 1 (HandicapTotal: forced<=0 -> 1f)", match: false }
    status:
      logic: partial
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port does not error on a non-positive forced handicap; it silently treats forced<=0 as 1 at read time (HandicapTotal:840-841). Base would error() (server fault) on a <=0 SetForcedHandicap. Unreachable in practice: the +1 / 1/(|h|+1) fold keeps dynamic-handicap values strictly positive, and the default min clamp of 0 is never actually hit. Captured as a behavioral divergence, not a live bug."
    verification:
      - { kind: read, ref: "handicap.qc:85 error() vs DamageSystem.cs:841 forced<=0 -> 1f", result: fail }
    confidence: high
    notes: "Effectively a benign hardening difference — the port is MORE tolerant. UNCHANGED since baseline (line moved from 788 to 840 with the voluntary-layer addition, behavior identical)."

