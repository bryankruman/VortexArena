summary:
  feature_count: 8
  worst_gaps:
    - "NO open functional gaps. All 8 features faithful + live. The two previously-residual presentation items both closed by Wave 16/17: (1) present.handicap_level now draws the REAL gfx/scoreboard/player_handicap.tga texture (TextureCache.Get, ScoreboardPanel.cs:1172-1176; asset confirmed present in xonotic-data.pk3dir/gfx/scoreboard/), colored square is now only a resolver-miss fallback; (2) present.mutator_string gained a third, in-game live consumer (SendMutatorsWelcome, GameWorld.cs:1453, called on join GameWorld.cs:1338) that surfaces the 'modifications' line to the connecting client via the chat sink — the previously-unported in-game welcome line."
    - "Only latent/benign residuals remain: apply.invalid_value_guard read-path tolerance (Handicap.GetForcedHandicap forced<=0 -> 1, more tolerant than Base error() but unreachable in normal play, write path Log.Fatal matches Base); compute.update_handicap apply-pass iterates players not all clients (harmless, observers take no damage) and reads int scores not float (equal for integer deltas); apply.damage_scaling forced part has no explicit HANDICAP_DISABLED gate (latent, SetForcedHandicap early-returns when disabled)."
    - "RUNTIME-VISUAL CAVEAT: handicap_level icon presentation is code-faithful + asset-confirmed but not observed rendering this audit (read-level, same VfsResolver seam proven for all other HUD art). No live visual run performed."
    - "STRUCTURAL: forced-handicap helpers (SetForcedHandicap/UpdateHandicapLevel/GetForcedHandicap/Initialize) live in shared static Gameplay/Handicap.cs (port of server/handicap.qc); the mutator calls Handicap.SetForcedHandicap. handicap.qc owned by the sv-handicap registry unit."
features:
  - id: dynamic_handicap.compute.update_handicap
    name: "Per-player forced-handicap computation from mean SP_SCORE"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:DynamicHandicap_UpdateHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:UpdateHandicap (139-178)"
    constants:
      - { name: "g_dynamic_handicap_scale", base: "0.2", port: "0.2 (read from cvar in Hook; C# field initializer is 1 but overwritten)", match: true }
      - { name: "g_dynamic_handicap_exponent", base: "1", port: "1", match: true }
      - { name: "formula", base: "h=|(score-mean)*scale|^exp; sign by below-mean; >=0 -> +1 else 1/(|h|+1)", port: "identical", match: true }
      - { name: "mean_pool", base: "FOREACH_CLIENT(IS_PLAYER) for mean; FOREACH_CLIENT(true) for apply", port: "FindByClass(player)+Client flag, mean excludes IsObserver, apply iterates all clients", match: false }
      - { name: "score_type", base: "PlayerScore_Get -> float (stored in float field)", port: "GameScores.Get -> int", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Apply pass: Base sets a handicap on EVERY connected client (FOREACH_CLIENT(true), incl. observers); port iterates players only. Harmless functionally (observers take no damage) but a behavioral diff if an observer's stored handicap is ever read."
      - "Score representation: Base scores are float-typed (PlayerScore_Get), port GameScores.Get returns int. Equivalent in normal play (score deltas are integers), but a fractional Base score would differ."
    verification:
      - { kind: read, ref: "sv_dynamic_handicap.qc:32-67 vs DynamicHandicapMutator.cs:139-178 (formula/sign/fold line-by-line)", result: pass }
      - { kind: read, ref: "mean = float totalScore / int totalPlayers -> C# float division, matches QC; calls Handicap.SetForcedHandicap(it,h,false/true)", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests.cs (scale 0.1, strong 100>weak 0 => strong give>1, weak give<1)", result: pass }
    confidence: high
    notes: "Formula, sign rule, fold and the +1 / 1/(|h|+1) branches all match Base exactly. Cvars read into fields in Hook(). UNCHANGED in behavior since prior audit; the apply tail now goes through the shared Handicap.SetForcedHandicap (was the mutator's own SetForcedHandicap)."

