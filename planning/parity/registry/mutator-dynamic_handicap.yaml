      - { name: "g_dynamic_handicap_max", base: "0", port: "0", match: true }
      - { name: "min_active_when", base: "min >= 0", port: "min >= 0", match: true }
      - { name: "max_active_when", base: "max > 0", port: "max > 0", match: true }
