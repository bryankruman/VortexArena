  - id: dynamic_handicap.apply.invalid_value_guard
    name: "Handicap_SetForcedHandicap value<=0 error guard"
    layer: [authority]
    base_refs:
      - "server/handicap.qc:81-94 (Handicap_SetForcedHandicap: error() if value <= 0)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:SetForcedHandicap(165-173)"
    constants:
      - { name: "on_value<=0", base: "error() — hard fault", port: "Log.Fatal('Handicap_SetForcedHandicap: Invalid handicap value.')", match: true }
      - { name: "HANDICAP_DISABLED early-return", base: "if (HANDICAP_DISABLED()) return", port: "if (HandicapDisabled) return (DynamicHandicapMutator.cs:167)", match: true }
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Redundant tolerance on the READ path: DamageSystem.HandicapTotal (DamageSystem.cs:846) still coerces a stored forced<=0 to 1 rather than faulting. The authoritative WRITE path (SetForcedHandicap) now matches Base's error() via Log.Fatal, so this read-path softness is latent only (the +1 / 1/(|h|+1) fold keeps written values strictly positive, so neither the guard nor the fallback is ever hit in normal play)."
    verification:
      - { kind: read, ref: "DynamicHandicapMutator.cs:168-169 value<=0 -> Log.Fatal, matching handicap.qc:85 error(); plus HandicapDisabled early-return (167) matching handicap.qc:83", result: pass }
    confidence: high
    notes: "FIXED since baseline (Wave 6b). The baseline recorded logic:partial because the port 'silently treats forced<=0 as 1'. The port now has the SetForcedHandicap function with the exact value<=0 error guard (Log.Fatal == QC error()). The remaining HandicapTotal read-path fallback is a separate, benign hardening difference."

  - id: dynamic_handicap.present.handicap_level
    name: "handicap_level int networked to client for scoreboard icon color"
    layer: [authority, presentation]
    base_refs:
      - "server/handicap.qc:Handicap_UpdateHandicapLevel(104-115)"
      - "server/handicap.qh:60-66 (.handicap_level, HANDICAP_MAX_LEVEL_EQUIVALENT=2.0, range 0..16)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:UpdateHandicapLevel(180-189),MapBoundRanges(196-201),HandicapMaxLevelEquivalent(192)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageEntityState.cs:HandicapLevel(60)"
    constants:
      - { name: "HANDICAP_MAX_LEVEL_EQUIVALENT", base: "2.0", port: "2.0 (HandicapMaxLevelEquivalent)", match: true }
      - { name: "level_range", base: "0..16 via floor(map_bound_ranges((take+give)/2, 1, 2.0, 0, 16))", port: "(int)floor(MapBoundRanges((HandicapTake+HandicapGive)/2, 1, 2.0, 0, 16))", match: true }
      - { name: "disabled_level", base: "HANDICAP_DISABLED() -> handicap_level = 0", port: "HandicapDisabled -> HandicapLevel = 0 (184)", match: true }
      - { name: "network_to_client", base: ".handicap_level is an ent_cs field replicated to clients", port: "none — Entity.HandicapLevel is authoritative-only, never networked", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: missing
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "handicap_level is computed authoritatively (UpdateHandicapLevel, called from SetForcedHandicap) but NEVER networked to clients — Entity.HandicapLevel has no ent_cs stat and there is no scoreboard player_handicap-icon consumer in the port. Base replicates .handicap_level via ent_cs and the scoreboard colors the icon by it. So the value is correct server-side but invisible to clients."
    verification:
      - { kind: read, ref: "DynamicHandicapMutator.cs:180-189 vs handicap.qc:104-115 — both: HANDICAP_DISABLED->0; else floor(map_bound_ranges((take+give)/2,1,2.0,0,16)). map_bound_ranges (math.qh:377) matches MapBoundRanges (clamp-then-lerp)", result: pass }
      - { kind: read, ref: "HANDICAP_MAX_LEVEL_EQUIVALENT=2.0 (handicap.qh:66) == HandicapMaxLevelEquivalent (DynamicHandicapMutator.cs:192)", result: pass }
      - { kind: grep, ref: "HandicapLevel referenced only in DamageEntityState (field decl) and DynamicHandicapMutator (writer) — no networking/serializer/scoreboard reader anywhere in src/", result: pass }
    confidence: high
    notes: "PARTIAL FIX since baseline (Wave 6b). Baseline had logic/values/presentation all missing + liveness na ('handicap_level is never computed/networked, no symbol anywhere'). The port now computes it faithfully (logic+values faithful, liveness live — UpdateHandicapLevel runs on every SetForcedHandicap). Presentation stays missing: no client networking and no scoreboard consumer, so the icon-color end goal is still unreachable."

