  - id: dynamic_handicap.apply.damage_scaling
    name: "Forced handicap scales dealt/taken damage in the damage pipeline"
    layer: [authority]
    base_refs:
      - "server/player.qc:243-249"
      - "server/handicap.qc:Handicap_GetTotalHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:PlayerDamage(342-349)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:HandicapTotal(783-789)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageEntityState.cs:HandicapGive,HandicapTake"
    constants:
      - { name: "gate", base: "!DEATH_ISSPECIAL(deathtype)", port: "!DeathTypes.IsSpecial(deathType)", match: true }
      - { name: "victim_scale", base: "damage *= GetTotalHandicap(this,true)", port: "damage *= HandicapTotal(targ,true)", match: true }
      - { name: "attacker_scale", base: "if (this != attacker && IS_PLAYER(attacker)) damage /= GetTotalHandicap(attacker,false)", port: "if (attacker!=null && !ref-eq && IsPlayer(attacker)) damage /= give (guarded give!=0)", match: true }
      - { name: "default_handicap", base: "1 (disabled / value<=0 guard)", port: "1 (v<=0 -> 1)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port folds Base's forced x voluntary (cl_handicap) split into the single HandicapGive/HandicapTake fields; there is NO voluntary cl_handicap layer at all. Equivalent for THIS mutator (voluntary defaults to 1), but a separate gap for the broader handicap system."
    verification:
      - { kind: read, ref: "DamageSystem.cs:342-349 vs player.qc:243-249 (gate, victim *=, attacker /= with this!=attacker && IS_PLAYER) — exact", result: pass }
      - { kind: read, ref: "HandicapTotal: non-client -> 1; v<=0 -> 1 (DamageSystem.cs:783-789)", result: pass }
      - { kind: read, ref: "Wave-1/2 git diff on DamageSystem.cs grep 'handicap' returned no hits — handicap damage code untouched", result: pass }
    confidence: high
    notes: "Attacker-side branch matches Base verbatim including the IS_PLAYER(attacker) guard. The give!=0 guard in the port is dead in practice (HandicapTotal never returns 0). UNCHANGED by Wave-1/2."

  - id: dynamic_handicap.enable.predicate
    name: "Mutator enable: g_dynamic_handicap AND not CTS/RACE"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:86"
      - "server/handicap.qh:57 (HANDICAP_DISABLED == IS_GAMETYPE(CTS) || IS_GAMETYPE(RACE))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:IsEnabled (45-48)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:HandicapDisabled (51-53)"
    constants:
      - { name: "g_dynamic_handicap", base: "0", port: "0", match: true }
      - { name: "HANDICAP_DISABLED gate", base: "IS_GAMETYPE(CTS) || IS_GAMETYPE(RACE)", port: "g_cts!=0 || g_race!=0 — present in code but reads CVARS THE PORT NEVER SETS (default 0)", match: false }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Wave-2 ADDED a !HandicapDisabled guard (DynamicHandicapMutator.cs:48,51-53) intended to port HANDICAP_DISABLED(). But HandicapDisabled reads the bare `g_cts` / `g_race` CVARS, and the port NEVER sets those to 1: gametypes-server.cfg defaults them to 0 (lines 363/597 'script-ignore'), no Cvars.Set('g_cts'/'g_race') exists anywhere in src/ or game/, and the gametype is selected as a C# object (GameWorld.ResolveGameType) without stamping any select cvar. The rest of the codebase detects CTS/RACE via `GameType is Cts` / `GameType is Race` (e.g. GameWorld.cs:496 CompatRemaps.IsCtsActive = () => GameType is Cts; GameWorld.cs:2579 GameType is Race). So in a REAL CTS or RACE match HandicapDisabled stays false and the mutator still activates — exactly the Base divergence the guard was meant to remove. The guard IS correct (and inert/harmless) in the common non-CTS/RACE case, but it does NOT fix the gap. FIX: gate on the same provider the codebase already uses (`GameType is Cts/Race`), not on the unset g_cts/g_race cvars."
    verification:
      - { kind: read, ref: "DynamicHandicapMutator.cs:45-53 — IsEnabled now `&& !HandicapDisabled`; HandicapDisabled = g_cts!=0 || g_race!=0", result: pass }
      - { kind: grep, ref: "no `Cvars.Set(\"g_cts\"...)` / `Set(\"g_race\"...)` anywhere in src/ or game/ (grep returned nothing); gametypes-server.cfg sets both to 0", result: fail }
      - { kind: read, ref: "GameWorld.cs:496 CompatRemaps.IsCtsActive = () => GameType is Cts; GameWorld.cs:1476-1479 Cts/Race Activate() set no select cvar; ResolveGameType (2599) sets no cvar — the bare g_cts/g_race are never written", result: fail }
      - { kind: read, ref: "Base handicap.qh:57 HANDICAP_DISABLED == IS_GAMETYPE(CTS)||IS_GAMETYPE(RACE) (re-confirmed)", result: pass }
    confidence: high
    notes: "REGRESSION-ADJACENT but not a true behavioral regression: pre-Wave the gate was simply absent (mutator activated in CTS/RACE); post-Wave the gate is present-but-dead (still activates in CTS/RACE because the cvars it reads are never set). The Wave-2 comment correctly identifies HANDICAP_DISABLED as the CTS/RACE gate (the old 'sv_cheats lock' mislabel is fixed), and the common-case behavior is unchanged — so liveness drops to `dead` for the new guard rather than the row regressing. Practical impact remains low (handicap rarely run in race). PowerupsMutator.cs:233 has the same `g_cts` cvar reliance, but there 0 yields the correct non-CTS default, so it is latent there."

  - id: dynamic_handicap.triggers.recompute
    name: "Recompute on roster/score change (4 functional hooks in Base)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:98-120 (ClientDisconnect, PutClientInServer, MakePlayerObserver, AddedPlayerScore)"
      - "server/scores.qc:377 (MUTATOR_CALLHOOK(AddedPlayerScore) — post-write event)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:OnPlayerSpawn,OnPlayerDies (80-81)"
      - "src/XonoticGodot.Server/ClientManager.cs:542 (PlayerSpawn.Call — live)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:552 (PlayerDies.Call — live)"
    constants:
      - { name: "trigger_count", base: "4 functional (ClientDisconnect, PutClientInServer, MakePlayerObserver, AddedPlayerScore=SP_SCORE)", port: "2 (PlayerSpawn, PlayerDies)", match: false }
    status:
      logic: partial
      values: na
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Missing AddedPlayerScore(SP_SCORE) recompute: Base fires the POST-write AddedPlayerScore hook (scores.qc:377) on every SP_SCORE delta; the port's GameScores.AddToPlayer fires only the PRE-write AddPlayerScoreHook (veto/rewrite) and NO post-write event — so caps, objective points, KH/Dom/CTF scoring and any non-death score change do not re-handicap until the player's next spawn or death. Wave-1/2 added other GameScores helpers (ClearPlayerOnJoin, CountFragsRemaining) but NO AddedPlayerScore post-write hook."
      - "ClientDisconnect does not recompute: no ClientDisconnect hook exists in MutatorHooks (Wave-1/2 added SetWeaponArena/ForbidRandomStartWeapons/SetDefaultAlpha/Vehicle* hooks but not this), so the mean stays stale (still counting the departed player) until someone else spawns or dies."
      - "MakePlayerObserver does not recompute: no MakePlayerObserver hook exists, so switching to spectator does not re-balance the remaining players until the next spawn/death."
    verification:
      - { kind: read, ref: "MutatorHooks.cs wave diff added no AddedPlayerScore/ClientDisconnect/MakePlayerObserver/PutClientInServer chains; mutator still subscribes only PlayerSpawn/PlayerDies (Hook() 58-72)", result: fail }
      - { kind: read, ref: "GameScores.cs wave diff added no post-write AddedPlayerScore recompute; AddToPlayer still fires only the pre-write AddPlayerScoreHook", result: fail }
      - { kind: read, ref: "PlayerSpawn.Call live ClientManager.cs:542; PlayerDies.Call live DamageSystem.cs:552", result: pass }
    confidence: high
    notes: "UNCHANGED by Wave-1/2. PlayerSpawn ~= PutClientInServer (faithful). PlayerDies partially covers frag scoring (a kill is a death). The other 2 Base roster hooks and the AddedPlayerScore score-delta hook still have no port hook chain. Base's AddedPlayerScore (post-write) is a DISTINCT event from AddPlayerScore (pre-write); the port only ported the latter."

  - id: dynamic_handicap.apply.invalid_value_guard
    name: "Handicap_SetForcedHandicap value<=0 error guard"
    layer: [authority]
    base_refs:
      - "server/handicap.qc:81-94 (Handicap_SetForcedHandicap: error() if value <= 0)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:HandicapTotal(787-788)"
    constants:
      - { name: "on_value<=0", base: "error() — hard fault", port: "treated as 1 (HandicapTotal: v<=0 -> 1f)", match: false }
    status:
      logic: partial
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port does not error on a non-positive forced handicap; it silently treats v<=0 as 1 at read time (HandicapTotal). Base would error() (server fault) on a <=0 SetForcedHandicap. Unreachable in practice: the +1 / 1/(|h|+1) fold keeps dynamic-handicap values strictly positive, and the default min clamp of 0 is never actually hit. Captured as a behavioral divergence, not a live bug."
    verification:
      - { kind: read, ref: "handicap.qc:85 error() vs DamageSystem.cs:788 v<=0 -> 1f", result: fail }
    confidence: high
    notes: "Effectively a benign hardening difference — the port is MORE tolerant. UNCHANGED by Wave-1/2."

