unit: console-commands
category: misc
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-07-02"  # NEW unit (unmapped-area audit wave): the GENERIC/shared command surface (common/command/*), the CSQC client command surface (client/command/cl_cmd.qc), and the server reply builders (server/command/getreplies.qc). Boundaries: server vote/timeout/common-info/admin/ban commands are owned by sv-commands-votes; cheat commands by sv-cheats — NOT duplicated here (dispatch shells cited there too).
summary:
  feature_count: 24
  worst_gaps:
    - "cl_cmd hud group is half-dead: `hud save` (HUD_Panel_ExportCfg — export the HUD layout to a cfg) has NO handler (HudConfigEditor Ctrl+S emits the command into the interpreter and nothing consumes it), and `scoreboard_columns_set` is dead — ScoreboardPanel.ColumnSpec has a faithful Cmd_Scoreboard_SetFields parser but NO assignment site anywhere (always default columns)."
    - "handlevote is not ported: the QC vyes/vno binds (F1/F2 call-vote keys) and the uid2name dialog buttons emit commands nothing handles (DialogUid2Name.cs:61 comments them 'logged inert'); a call vote can only be answered by typing `vote yes|no` in the console."
    - "getreplies: getladder is a hardcoded 'No ladder on this server!' (no cross-map ladder computation), getrecords mutator-hook pages are always empty (records prints 'No records available' even in modes with records, e.g. CTF captime), and getlsmaps lists the rotation cvar instead of enumerating the map catalog (no new-map asterisks, no LSMAPS_MAX 250 cap)."
    - "maplist add's map-existence gate (QC fexists maps/<map>.bsp) and maplist cleanup's MapInfo_CheckMap filter are inert on BOTH live paths: the server CmdMaplist has no exist-check and cleanup is identity; the console ConsoleCommands has a MapExists hook but it is only wired in tests."
    - "A tail of generic/client verbs is missing outright: dumpcommands (file dump), qc_curl, restartnotifs, the `red`/markup chat easter eggs (markup.qc unported — &smiley chat markup never converted), localprint, mv_download, print_cptimes, boxparticles/debugmodel/create_scrshot_ent debug commands."
