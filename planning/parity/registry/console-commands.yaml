      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Scope deviation documented in Rpn.cs header (trap R3): the persistent-DB op family (put/get/dbpush/dbpop/dbget/dblen/dbclr/dbsave/dbload/dbins/dbext/dbread/dbat/dbmov/dbgoto) and localtime/gmtime/digest/fexists/fexists_assert/eval are NOT implemented — no QC hashtable-DB/file layer exists; they fall through to the bare-cvar default push (DP's documented unknown-token behavior) with a developer-mode 'unsupported rpn op' log. Every op the shipped cfgs/quickmenu actually use IS ported (arithmetic/stack/logic/compare/bound/when/def/defs/load/set-ops/shuffle/sprintf1s/crc16/rand/time)."
