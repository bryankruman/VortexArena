summary:
  feature_count: 11
  worst_gaps:
    - "TFL_DMG_HEADSHAKE jitter (tur_head.angles += (random-0.5)*damage on every hit) is NOT implemented anywhere in the port — the draft wrongly claimed it was handled in TurretAI.Damage. Head does not flinch when shot."
    - "Port Die() ACTIVELY does an ammo-scaled RadiusDamage death blast (boom up to 50 dmg, 250 radius, force*5); Base turret_die has this RadiusDamage COMMENTED OUT — a port-added blast that Base does not deal."
    - "Target-selection biases not wired: rangebias/samebias/anglebias default to 1/1/1 instead of Base 0.2/0.4/0.4 — MakeParams never passes them; changes target prioritization."
    - "Head-track motor constants not wired: track_accel_rot 0.5 (Base 0.7) + track_blendrate 0.35 (Base 0.2) — MakeParams omits them, so head inertia/responsiveness differs."
    - "target_range_optimal 500 (inherited single-plasma const) vs Base 1000 — MakeParams passes TargetRangeOptimal which DualPlasmaTurret never overrides; biases the distance score toward a closer killzone."
    - "shot_spread 0.0125 vs Base 0.015 — uses the QC global plasma default rather than the per-unit cfg value (~17% tighter cone)."
    - "Head-frame wheel animation (tr_think/tr_attack tur_head.frame 0..6) never implemented; all muzzle/projectile/beam effects are NOTE-only (not emitted)."
