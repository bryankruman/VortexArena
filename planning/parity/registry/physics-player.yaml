summary:
  feature_count: 19
  worst_gaps:
    - "2026-06-27 drift re-audit (post-Wave-13, commit 5427e74 'port 38 client+physics gaps live'): 0 regressions, 4 FIXES — Wave 13 closed several baseline-recorded sub-case gaps that the prior re-audit's row statuses had not yet caught up to. (1) physics-player.water.swim logic partial->faithful: the viewloc (1D-rail) water sub-cases are NOW ported — wishvel.z = -160 constant drift (PlayerPhysics.cs:760-761) + the separate plain-addspeed viewloc accel path with no QW pass (:793-801); the `viewloc drift speed -160` constant now matches (was match:false). (2) physics-player.ladder logic partial->faithful: the func_water waterlevel-from-volume override (PlayerPhysics.cs:833-852: clamp wish to ladder.speed, watertype=skin, compute waterlevel from origin.z+view_ofs.z vs maxs_z) AND the viewloc ladder sub-case (wishvel.z = movement_old.x, :828 via player.MovementForwardOld) are NOW ported. (3) physics-player.crouch logic partial->faithful: ALL three baseline sub-case gaps closed — viewloc force-crouch (:1265-1266), have_hook force-uncrouch (:1274-1278, walks the per-slot WeaponSlotState.Hook), in-vehicle force-uncrouch (:1279-1280, player.Vehicle), Q1BSP crouch-disable (:1293-1294, CrouchMaxs.Z == PlayerMaxs.Z). (4) physics-player.movement_sounds timing partial->faithful + the grappling-hook bail closed: the lastground+0.2 gate is NO LONGER inert (Move now captures priorLastGroundTime at :417 BEFORE updating LastGroundTime at :419 and passes it to Footsteps, read at :1956 — reproducing Base's one-tick-lagged gate), and PM_check_hitground's active-grappling-hook bail is NOW ported (CheckHitground :1927 walks the per-slot WeaponSlotState.Hook, live-set in Hook.cs:327). Core constants re-verified (maxspeed 360, jumpvelocity 260, friction 6/slick 0.5, accelerate 15, airaccelerate 2, airaccel_qw -0.8, airstrafeaccel_qw -0.95, airspeedlimit_nonqw 900, maxairstrafespeed 100, airstrafeaccelerate 18, aircontrol 100, airstopaccelerate 3, warsowbunny_turnaccel 0) — all match. PMAccelerate.cs (Accelerate/AirAccelerate/Aircontrol/AdjustAirAccelQW/GeomLerp/IsMoveInDirection) re-read and confirmed byte-1:1. PM_check_punch decay (10/30) + the g_jump_grunt-gated playersound_jump confirmed unchanged. NOT added as rows (out of scope for this physics unit): sys_phys_monitor's parm_idlesince idle-stamp + anticheat_physics (server idle-kick / anticheat layer), sys_phys_ai (bot_think — bot unit), WarpZone_PlayerPhysics_FixVAngle in sys_phys_fix (warpzone unit)."
    - "View-punch decay (PM_check_punch) was UNMAPPED in the baseline registry; now added as physics-player.punch_decay (ported as CheckPunch, faithful + live, server-authority only)."
    - "Jump audio FIXED 2026-06-25 re-audit (Wave-8e commit 412ca19): the port now gates the jump grunt on autocvar_g_jump_grunt (stock 0 = SILENT, matching Base) AND plays the per-model jump VOICE (PlayPlayerSound(player, \"jump\", ...) via the model .sounds manifest) instead of a fixed player/jump.wav — both baseline audio gaps closed, audio upgraded partial->faithful. RESIDUAL: the companion animdecide_setaction(ANIMACTION_JUMP) (player.qc:491) still has no anim-action seam in the port (same as the walljump port)."
    - "Movement-sound cadence is Base-faithful (g_footsteps gate + 0.3+random()*0.1 jitter + nextstep window + ladder bail all ported, re-confirmed live 2026-06-25); residuals: the lastground+0.2 gate is functionally inert because the port updates LastGroundTime BEFORE UpdateMovementSounds runs (so it reads now), and PM_check_hitground's active-grappling-hook bail is still unported (CheckHitground only does the ladder leg) — the ButtonHook input bit is now genuinely live (ServerNet.cs:1432 decodes InputButtons.Hook; WeaponFireDriver consumes it for the offhand-hook weapon), but there is still no shared per-weapon hook Entity field for CheckHitground to read, so the bail leg stays unported."
    - "func_water waterlevel-from-volume override (physics.qc:280-299) is NOT computed in LadderMove, and the viewloc 1D-rail sub-cases (ladder wishvel.z = movement_old.x; water wishvel.z = -160 + a separate viewloc accel path) are not ported — inert on stock Xonotic maps but real Base branches."
    - "sys_phys_fixspeed cl_*speed stuffcmd absent (replaced by client-side wishmove scaling -- intended)."
    - "g_physics_clientselect non-default presets (CPMA/Warsow/etc.) are wired (Resolve/FromValues/PresetProvider); the Warsow-bunny leg is now selectable+covered (Wave-5: added `warsow` to g_physics_clientselect_options + PhysicsPresetTests drive Move->AirBranch->AirAccelerate), but the OTHER presets (cpma/quake3/...) still lack full golden-trace coverage; only the stock Xonotic preset is golden-trace byte-exact."
    - "2026-06-25 drift re-audit: 0 regressions, 0 fixes — the baseline was already current with the live code (every dimension re-derived against Base player.qc/physics.qc/sv_physics.qc + the port PlayerPhysics.cs and confirmed). ONE registry coverage gap closed: added physics-player.pregame_hold (sys_phys_pregame_hold) — the pre-match/game-stopped movement freeze, which the port enforces faithfully+live but at the GameWorld.OnClientMove input-gating layer (preMatchFreeze -> canMove), not inside PlayerPhysics."
