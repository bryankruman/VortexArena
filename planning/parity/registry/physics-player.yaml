  - id: physics-player.movement_sounds
    name: "Footsteps + landing sounds (PM_Footsteps / PM_check_hitground)"
    layer: [authority]
    base_refs:
      - "common/physics/player.qc:PM_Footsteps"
      - "common/physics/player.qc:PM_check_hitground"
    port_refs:
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:Footsteps"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:CheckHitground"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:UpdateMovementSounds"
    constants:
      - { name: "autocvar_g_footsteps master gate", base: "1 (xonotic-server.cfg:306)", port: "GetString(\"g_footsteps\")==\"0\" => return; unset treated as on", match: true }
      - { name: "footstep speed threshold", base: "sv_maxspeed*0.6 (vdist 3D)", port: "MaxSpeed*0.6 (Vec2LenSq XY-only)", match: true }
      - { name: "footstep interval (nextstep)", base: "0.3 + random()*0.1", port: "FootstepIntervalBase 0.3f + FootstepJitter() (random*0.1f)", match: true }
      - { name: "footstep grounded-recency gate", base: "time < lastground + 0.2", port: "now < LastGroundTime + 0.2f (ported, but inert — see gaps)", match: true }
      - { name: "nextstep re-arm window", base: "(time > nextstep) || (time < nextstep-10)", port: "now > LastFootstepTime || now < LastFootstepTime-10f", match: true }
      - { name: "landing nextstep suppression", base: "nextstep = time + 0.3 + random()*0.1", port: "LastFootstepTime = now + 0.3f + FootstepJitter()", match: true }
      - { name: "ducked footsteps", base: "silent (IS_DUCKED return)", port: "silent", match: true }
      - { name: "muffled landing while ducked", base: "VOL_MUFFLED", port: "VolMuffled", match: true }
      - { name: "NOSTEPS/METALSTEPS surface select", base: "Q3SURFACEFLAG_*", port: "Q3SurfaceFlag*", match: true }
    status:
      logic: faithful
      values: faithful
      timing: partial
      presentation: na
      audio: faithful
      liveness: live
    intended_divergence: true
    divergence_rationale: "The cosmetic random()*0.1 footstep-cadence jitter is drawn from a dedicated server-local System.Random (FootstepJitterRng), NOT the shared deterministic Prandom stream. Base's jitter is under #ifdef SVQC (server-only), so reproducing it from the shared Prandom would advance a stream the predicting client also consumes (spread/effects) and desync the seed. The value distribution (uniform 0..0.1 added to 0.3) is identical to Base; only the RNG SOURCE differs."
    gaps:
      - "lastground+0.2 gate is FUNCTIONALLY INERT due to update ordering: the port sets player.LastGroundTime = Now() at PlayerPhysics.cs:333-334 (sys_phys_postupdate) BEFORE calling UpdateMovementSounds at :338, so when Footsteps reads it LastGroundTime == now and `now >= LastGroundTime + 0.2` is always false. Base sets lastground in sys_phys_postupdate AFTER PM_Footsteps (physics.qc:91 vs :188), so its lastground lags one tick and the gate genuinely suppresses the first grounded frame after a >0.2s fall. The port's landing frame is instead covered by CheckHitground setting LastFootstepTime to a future time, so the audible result matches on continuous ground and on normal landings — but the gate itself is not a 1:1 reproduction of Base's intent."
      - "PM_check_hitground's active-grappling-hook bail (player.qc:671-676: any weaponentity.hook held => return) is still unported — the hook is not yet a shared Entity field. The ladder bail (player.qc:670) IS now reproduced via player.LadderEntity."
      - "Minor: Base's speed gate is vdist(this.velocity, <=, ...) over the FULL 3D velocity; the port uses Vec2LenSq (XY only) and a strict `<` (vs Base `<=`). On ground velocity.z is ~0 (NOGRAVITYONGROUND), so the difference is negligible, but it is not byte-identical at the threshold."
    verification:
      - { kind: code, ref: "Footsteps (PlayerPhysics.cs:1663-1688) vs player.qc:689-708: g_footsteps gate (=='0' return), IS_DUCKED, lastground+0.2, maxspeed*0.6, nextstep window (time>nextstep||time<nextstep-10), nextstep=time+0.3+random()*0.1, NOSTEPS/METALSTEPS", result: pass }
      - { kind: code, ref: "CheckHitground (PlayerPhysics.cs:1639-1658) vs player.qc:664-687: wasFlying latch, swimming bail, ladder bail (LadderEntity), nextstep jitter, FALL/FALL_METAL + VOL_MUFFLED while ducked", result: pass }
      - { kind: value, ref: "g_footsteps default 1 (xonotic-server.cfg:306); port treats unset as on so default matches", result: pass }
      - { kind: code, ref: "lastground update ORDER: PlayerPhysics.cs:333-334 (set) precedes :338 (UpdateMovementSounds) — gate reads now, inert; Base order is reversed (physics.qc:91 then :188)", result: fail }
    confidence: high
    notes: "Wave-2 closed 3 of the 4 baseline gaps: the autocvar_g_footsteps master gate, the 0.3+random()*0.1 jittered cadence (server-local RNG so the shared Prandom stream is untouched — a correct deliberate divergence), the nextstep re-arm window, and the ladder leg of the PM_check_hitground bail are all now ported and live on the server tick (UpdateMovementSounds, prediction-gated). logic+values+audio upgraded to faithful. timing kept at partial for ONE residual: the lastground+0.2 gate is inert because LastGroundTime is updated before Footsteps runs (the audible behavior still matches Base on continuous ground / normal landings via the nextstep future-time). Still open: the grappling-hook bail in CheckHitground (needs a shared hook Entity field), and the 2D-vs-3D speed-gate micro-difference. No golden-trace/test coverage for footsteps (code-verified only)."

