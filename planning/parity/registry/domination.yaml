    - "Control point has no frame animation: the QC AnimateDomPoint loop (t_width 0.02 / t_length 239, ++frame per 0.1s think) is not ported — the point body model is now set + placed (+20/DropToFloor) and visible, but its frames never advance."
    - "WaypointSprite_Ping one-shot radar flash on capture is not emitted; the port rebuilds the sprite set each tick (pull model) so ownership/color flow, but the explicit ping is absent."
