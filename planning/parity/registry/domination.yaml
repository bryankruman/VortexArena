summary:
  feature_count: 12
  worst_gaps:
    - "Domination mod-icons pps HUD is dead end-to-end: server never computes DOM_PPS_*, no wire field, no NetGame case, SetDominationPps has zero callers — panel never shows."
    - "Capture plays no sound (DOM_CLAIM) and sends no INFO_DOMINATION_CAPTURE_TIME notification — both registered but never fired."
    - "Roundbased caplimit (g_domination_roundbased_point_limit=5) is never enforced; roundbased match never latches a win at 5 caps."
    - "Control point has no model/frame-animation/team-colored waypoint sprite update on capture — points are invisible/static state-only."
