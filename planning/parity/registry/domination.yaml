unit: domination
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "Round-not-started capture gate is dead: Domination.RoundStartedSource is never assigned by the host (GameWorld wires RoundEndTimeSource but NOT RoundStartedSource), so the QC `round_handler_IsActive && !IsRoundStarted` block never fires."
    - "pps HUD numerator uses GLOBAL g_domination_point_amt/_rate (default 1/2) for every point instead of each point's own .frags/.wait (default 1/5), so default-config pps bars read ~2.5x high vs Base."
    - "Tick scoring's game_stopped half is dead: PointThink reads GameScores.GameStopped, which the host never sets — only the game_starttime (warmup) half is wired, so a Timeout-paused match still ticks points."
    - "Control point has no entity model/frame-animation and no +20/DropToFloor placement (waypoint sprite IS now spawned, but the point body itself is still invisible/static)."
