  - id: mutator-invincibleproj.core.editprojectile_zero_health
    name: "EditProjectile: zero a fired projectile's health so it can't be shot down"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/invincibleproj/sv_invincibleproj.qc:6-15 MUTATOR_HOOKFUNCTION(invincibleprojectiles, EditProjectile)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/InvincibleProjectilesMutator.cs:35 OnEditProjectile"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:389-395 EditProjectileArgs + EditProjectile chain"
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:42-70 GetResource/SetResourceExplicit (Health -> Entity.Health)"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Projectiles.cs:71-99 MakeShootable/ShootDown (the now-live shoot-down path)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:331-335 EventDamage -> GtEventDamage dispatch"
    constants:
      - { name: "projectile RES_HEALTH set value", base: "0", port: "0", match: true }
      - { name: "guard: only projectiles with health", base: "if(GetResource(proj,RES_HEALTH))", port: "if(proj.GetResource(Health) != 0f)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "OnEditProjectile: if (proj.GetResource(Health) != 0f) proj.SetResourceExplicit(Health, 0f) == QC if(GetResource(proj,RES_HEALTH)) SetResourceExplicit(proj,RES_HEALTH,0). GetResource(Health)/SetResourceExplicit map to Entity.Health (Resources.cs:44,60) — the same field weapons seed AND the same field ShootDown reads.", result: pass }
      - { kind: code, ref: "LIVENESS NOW WIRED (was partial): Wave-1 added Projectiles.MakeShootable (Projectiles.cs:71), which installs e.GtEventDamage = ShootDown. The pre-existing DamageSystem.EventDamage (DamageSystem.cs:331-335) routes a non-player victim with GtEventDamage!=null through that closure on the live damage path. ShootDown's first line is `if (self.Health <= 0f) return;` (Projectiles.cs:85) — so a projectile whose Health the mutator zeroed never even reaches the g_projectiles_damage gate or detonation. Result: enabling g_invincible_projectiles now produces the real observable effect (projectiles cannot be shot down).", result: pass }
      - { kind: code, ref: "Live callers of MakeShootable confirmed on weapon-fire: Devastator.cs:209, Electro.cs:358, Hagar.cs:167/196/255, Mortar.cs:207, Minelayer.cs:188, Seeker.cs:237/442, Arc.cs:406 — each fires from the weapon's projectile-spawn path. EditProjectile.Call also fired per-projectile in the same spawn paths (Devastator:202, Electro:363, Mortar:215, etc.). Ordering of MakeShootable vs EditProjectile is irrelevant: ShootDown reads self.Health lazily at hit time, after EditProjectile has zeroed it.", result: pass }
    confidence: high
    notes: "FIX vs baseline: previously liveness:partial because the projectile shoot-down subsystem was dead on the live path (EventDamage routed non-player victims only through GtEventDamage, and no weapon installed a shoot-down GtEventDamage, so per-projectile ProjectileDamage callbacks were never invoked). Wave-1's Projectiles.MakeShootable closes that: it installs a GtEventDamage shoot-down shim that EventDamage already dispatches, so the mechanic the mutator defends is now genuinely produced. With Health=0, ShootDown's recursion guard short-circuits before the damage subtract/detonate, matching QC's W_*_Damage first-line GetResource(this,RES_HEALTH)<=0 return. Mutator handler is faithful AND now fully live."

