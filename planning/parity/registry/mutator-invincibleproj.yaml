  - id: mutator-invincibleproj.core.editprojectile_zero_health
    name: "EditProjectile: zero a fired projectile's health so it can't be shot down"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/invincibleproj/sv_invincibleproj.qc:6-15 MUTATOR_HOOKFUNCTION(invincibleprojectiles, EditProjectile)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/InvincibleProjectilesMutator.cs:35 OnEditProjectile"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:363-369 EditProjectile chain + EditProjectileArgs"
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:42-70 GetResource/SetResourceExplicit"
    constants:
      - { name: "projectile RES_HEALTH set value", base: "0", port: "0", match: true }
      - { name: "guard: only projectiles with health", base: "if(GetResource(proj,RES_HEALTH))", port: "if(proj.GetResource(Health) != 0f)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Enabling g_invincible_projectiles produces no observable behavioral change: shootable projectiles already cannot be shot down on the live path. Weapons install per-projectile shoot-down callbacks (Entity.ProjectileDamage: Devastator.cs:185, Electro.cs:321, Hagar/Mortar/Minelayer/Seeker/Arc/Fireball/OkRpc/Hook), but DamageSystem.EventDamage (DamageSystem.cs:294-298) routes a non-player target ONLY through targ.GtEventDamage and returns — it NEVER invokes targ.ProjectileDamage. The QC g_projectiles_damage / W_CheckProjectileDamage gate is absent (0 hits). So the mutator's health-zeroing defends a mechanic that does not fire on the live path."
    verification:
      - { kind: code, ref: "OnEditProjectile: if (proj.GetResource(Health) != 0f) proj.SetResourceExplicit(Health, 0f) == QC if(GetResource(proj,RES_HEALTH)) SetResourceExplicit(proj,RES_HEALTH,0). GetResource(Health)/SetResourceExplicit -> Entity.Health (Resources.cs:44,60), the same field weapons seed (Devastator missile.Health at :162, Electro orb.Health at :308). EditProjectile.Call fired AFTER the health seed (Devastator seeds :162 calls :191; Electro orb seeds :308 calls :334; Electro primary bolt sets no health so the guard skips it, matching QC).", result: pass }
      - { kind: code, ref: "Liveness of shoot-down: only live ProjectileDamage?.Invoke across src/ is BreakablehookMutator.cs:79 (grapple chain). DamageSystem.EventDamage has no projectile branch (DamageSystem.cs:287-304). grep g_projectiles_damage/W_CheckProjectileDamage in port = 0 hits.", result: fail }
    confidence: high
    notes: "Mutator handler itself is faithful AND live (its EditProjectile handler runs and zeroes health). liveness:partial because the subsystem it modifies (projectile shoot-down) is dead on the live path, so the net player-observable effect is nil. Cross-cutting weapons/damage port gap, not a defect in the mutator's own logic — it would become correct the moment ProjectileDamage is dispatched from the damage pipeline. (Adversarially re-verified: the draft's 'EventDamage never invokes ProjectileDamage' claim is correct.)"

