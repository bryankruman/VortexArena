summary:
  feature_count: 5
  worst_gaps:
    - "Enabling g_invincible_projectiles has no observable effect: projectiles cannot be shot down on the live port damage path (DamageSystem.EventDamage routes non-player targets only through GtEventDamage and returns — it NEVER invokes the per-projectile ProjectileDamage callback the weapons install), so there is nothing for the mutator to prevent. The only live ProjectileDamage caller is BreakablehookMutator.cs:79 (grapple chain)."
    - "Active-mutators string never gains 'Invincible Projectiles' / ':InvincibleProjectiles' (BuildMutatorsString + BuildMutatorsPrettyString hooks not ported); scoreboard/server-browser won't advertise the mutator."
    - "Client-side active-mutator detection (MUT_INVINCIBLE_PROJECTILES, util.qc:300 / util.qh:60) not ported — the port has no active_mutators / mut_set_active surface at all (zero hits for active_mutators/mut_set_active), so the menu/server-browser 'active mutators' list can never light up this mutator."
