  - id: mutator-invincibleproj.core.editprojectile_zero_health
    name: "EditProjectile: zero a fired projectile's health so it can't be shot down"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/invincibleproj/sv_invincibleproj.qc:6-15 MUTATOR_HOOKFUNCTION(invincibleprojectiles, EditProjectile)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/InvincibleProjectilesMutator.cs:35 OnEditProjectile"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:389-395 EditProjectileArgs + EditProjectile chain"
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs:42-70 GetResource/SetResourceExplicit (Health -> Entity.Health)"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Projectiles.cs:85 MakeShootable / :98 ShootDown (the now-live shoot-down path)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:331-335 EventDamage -> GtEventDamage dispatch"
    constants:
      - { name: "projectile RES_HEALTH set value", base: "0", port: "0", match: true }
      - { name: "guard: only projectiles with health", base: "if(GetResource(proj,RES_HEALTH))", port: "if(proj.GetResource(Health) != 0f)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "OnEditProjectile: if (proj.GetResource(Health) != 0f) proj.SetResourceExplicit(Health, 0f) == QC if(GetResource(proj,RES_HEALTH)) SetResourceExplicit(proj,RES_HEALTH,0). GetResource(Health)/SetResourceExplicit map to Entity.Health (Resources.cs:44,60) — the same field weapons seed AND the same field ShootDown reads.", result: pass }
      - { kind: code, ref: "Projectiles.MakeShootable (Projectiles.cs:85) installs e.GtEventDamage = ShootDown. DamageSystem.EventDamage (DamageSystem.cs:331-335) routes a non-player victim with GtEventDamage!=null through that closure on the live damage path. ShootDown's first line checks self.Health<=0 and returns — so a projectile whose Health the mutator zeroed never reaches the g_projectiles_damage gate or detonation. Enabling g_invincible_projectiles produces the real observable effect (projectiles cannot be shot down).", result: pass }
      - { kind: code, ref: "Live callers of MakeShootable confirmed on weapon-fire (Devastator/Electro/Hagar/Mortar/Minelayer/Seeker/Arc projectile-spawn paths); EditProjectile.Call fires per-projectile in the same spawn paths. Ordering of MakeShootable vs EditProjectile is irrelevant: ShootDown reads self.Health lazily at hit time, after EditProjectile has zeroed it.", result: pass }
    confidence: high
    notes: "Mutator handler is faithful AND fully live. With Health=0, ShootDown's recursion/dead guard short-circuits before the damage subtract/detonate, matching QC's W_*_Damage first-line GetResource(this,RES_HEALTH)<=0 return. Port_refs line numbers drifted slightly (MakeShootable :80->:85, ShootDown :92/:96->:98); behavior unchanged."

