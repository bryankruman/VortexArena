  - id: mutator-invincibleproj.core.editprojectile_zero_health
    name: "EditProjectile: zero a fired projectile's health so it can't be shot down"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/invincibleproj/sv_invincibleproj.qc:6-15 MUTATOR_HOOKFUNCTION(invincibleprojectiles, EditProjectile)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/InvincibleProjectilesMutator.cs:35 OnEditProjectile"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs EditProjectileArgs + EditProjectile chain"
      - "src/XonoticGodot.Common/Gameplay/Items/Resources.cs GetResource/SetResourceExplicit (Health -> Entity.Health)"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Projectiles.cs:91 MakeShootable / :106 ShootDown (the now-live shoot-down path)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:369-372 EventDamage -> GtEventDamage dispatch"
    constants:
      - { name: "projectile RES_HEALTH set value", base: "0", port: "0", match: true }
      - { name: "guard: only projectiles with health", base: "if(GetResource(proj,RES_HEALTH))", port: "if(proj.GetResource(Health) != 0f)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "OnEditProjectile: if (proj.GetResource(Health) != 0f) proj.SetResourceExplicit(Health, 0f) == QC if(GetResource(proj,RES_HEALTH)) SetResourceExplicit(proj,RES_HEALTH,0). GetResource(Health)/SetResourceExplicit map to Entity.Health — the same field weapons seed AND the field ShootDown reads.", result: pass }
      - { kind: code, ref: "Projectiles.MakeShootable (Projectiles.cs:91) installs e.GtEventDamage = ShootDown (Projectiles.cs:96-99). DamageSystem.EventDamage (DamageSystem.cs:369-372) routes a non-player victim with GtEventDamage!=null through that closure on the live damage path. ShootDown's first line (Projectiles.cs:111) checks self.Health<=0 and returns — so a projectile whose Health the mutator zeroed never reaches the g_projectiles_damage gate or detonation. MakeShootable confirmed live in 9 weapons (Arc/Devastator/Electro/Fireball/Hagar/Minelayer/Mortar/OkRpc/Seeker).", result: pass }
      - { kind: code, ref: "Live callers of MakeShootable confirmed on weapon-fire projectile-spawn paths; EditProjectile.Call fires per-projectile in the same spawn paths. Ordering of MakeShootable vs EditProjectile is irrelevant: ShootDown reads self.Health lazily at hit time, after EditProjectile has zeroed it.", result: pass }
    confidence: high
    notes: "Re-verified 2026-06-27. Mutator handler is faithful AND fully live. With Health=0, ShootDown's recursion/dead guard short-circuits before the damage subtract/detonate, matching QC's W_*_Damage first-line GetResource(this,RES_HEALTH)<=0 return. The shoot-down premise — which the original spec.md flagged as dead — is now genuinely wired: DamageSystem.EventDamage dispatches GtEventDamage for non-player victims, MakeShootable installs the ShootDown shim in 9 weapons. DamageSystem GtEventDamage dispatch line drifted to :369-372 (was :356-360); behavior unchanged."

