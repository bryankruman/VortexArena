unit: cl-strafehud
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-07-02"
# Fine-grained supersession of registry/cl-hud.yaml row cl-hud.panel.strafehud ("faithful-to-stock
# detail unverified", confidence low). This unit resolves that uncertainty per-feature. The movement
# math the panel VISUALIZES (friction/accel/aircontrol themselves) is owned by physics-player.yaml —
# rows here only score how the HUD *reads* those inputs, not the movement simulation.
summary:
  feature_count: 18
  worst_gaps:
    - "Strafe sonar (audible strafe-quality feedback: interval/volume/pitch ramps + sound7 call, extra.qc StrafeHUD_Sonar) is entirely missing — no port code, none of the 13 hud_panel_strafehud_sonar_* cvars registered."
    - "Live feed is Player-only (NetGame.cs:4382): WishDir/JumpHeld/OnSlick/FovX/RaceCheckpointTime/SpeedUnit are never fed, so the live panel permanently runs the QC non-local fallback (wishangle fixed 45°, movespeed=maxspeed, no jump-held anti-flicker, no slick, start-speed text never latches); on a pure network client LocalServerPlayer is null and the panel never draws at all."
    - "Ground friction-replica constant wrong: port dtR = 1/60 vs Base PHYS_FRICTION_REPLICA_DT = 0.00390625 (1/256) — on-ground strafespeed/frictionspeed and thus ground zone angles are computed with the wrong geometric base."
    - "PHYS_* mappings: PhysSlickAccelerate reads sv_airaccelerate (stock 2) instead of sv_slickaccelerate (stock 15); PhysAirStopAccelerateFull reads sv_aircontrol==0 instead of sv_airstopaccelerate_full; raw global cvars mean per-player stat modifiers (haste, crouch 0.5 maxspeed_mod) never reach the HUD."
    - "DetermineFrameTime always returns ticrate — the Base prediction path (weighted arithmetic mean of input_timelength with the 50 ms DarkPlaces frame-split, refreshed every fps_update=0.5 s) is not ported, so bestspeed/maxaccel-per-tick and every zone width assume server tick length instead of real client frame dt."
