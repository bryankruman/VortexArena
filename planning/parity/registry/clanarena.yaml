    - "damage2score is WIRED LIVE but FUNCTIONALLY DEAD: its QC gate reads ca.Handler.IsRoundStarted, but ca.Handler (the owned Common RoundHandler) is NEVER ticked (ClanArena.Tick has no caller), so IsRoundStarted is permanently false and the accrual always returns early — the SCORE column still stays 0"
