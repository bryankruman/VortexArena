  - id: clanarena.scoring.damage2score
    name: "Damage dealt accrues to scoreboard SCORE (g_ca_damage2score)"
    layer: [authority]
    base_refs:
      - "common/gametypes/gametype/clanarena/sv_clanarena.qc:MUTATOR_HOOKFUNCTION(ca, PlayerDamage_SplitHealthArmor)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/GameTypes/ClanArena.cs:OnSplitHealthArmor (ClanArena.cs:293)"
      - "src/XonoticGodot.Common/Gameplay/GameTypes/ClanArena.cs:AddScoreFloat2Int (decimal carry)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:438 (GameHooks.PlayerDamageSplitHealthArmor.Call)"
    constants:
      - { name: "g_ca_damage2score", base: "100 (dmg per point)", port: "100 (Damage2Score; live cvar from gametypes-server.cfg:264)", match: true }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "FUNCTIONALLY DEAD despite being wired: OnSplitHealthArmor returns early whenever !Handler.IsRoundStarted, but Handler is ca's OWN Common RoundHandler whose Phase never advances — ClanArena.Tick() (which would call Handler.Tick()) has NO caller, and MirrorRoundTiming only copies RoundEndTime/RoundsPlayed, not the phase. So Handler.IsRoundStarted is permanently false and the accrual ALWAYS returns at ClanArena.cs:299 — the SCORE column stays 0 in every match."
      - "Handler.GameStartTime is also never set on the owned handler (defaults 0), so the `now < Handler.GameStartTime` half of the gate is harmless, but the IsRoundStarted half is the killer."
    verification:
      - { kind: trace, ref: "DamageSystem.cs:438 fires PlayerDamageSplitHealthArmor.Call unconditionally; ClanArena subscribes OnSplitHealthArmor (ClanArena.cs:222-223). BUT OnSplitHealthArmor:299 gates on !Handler.IsRoundStarted; ca.Handler is the owned Common RoundHandler (ClanArena.cs:66,183) whose Tick() is never invoked (grep ca.Tick / Handler.Tick on CA -> ClanArena.Tick at line 253 has zero callers), so Phase stays WaitingToStart and IsRoundStarted is always false", result: fail }
    confidence: high
    notes: "Logic + decimal-carry (AddScoreFloat2Int, excess subtraction, friendly-fire debit, environmental self-penalty) are all correctly IMPLEMENTED and the hook IS subscribed on the live damage path — but the round-phase gate reads an un-driven handler, so nothing ever accrues. STILL OPEN (was dead in baseline for a different reason: no caller; now has a caller but the gate is permanently closed). The fix is to either tick ca.Handler, mirror IsRoundStarted/GameStartTime in MirrorRoundTiming, or read the live GameWorld.Rounds phase instead of ca.Handler."

