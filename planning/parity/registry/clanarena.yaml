summary:
  feature_count: 28
  worst_gaps:
    - "Still missing (unchanged): cl_ca DrawInfoMessages spectator-scoreboard gate (InfoMessagesPanel only ports the LMS variant), m_isAlwaysSupported map heuristic, dedicated round-win announcer cue, RESPAWN_SILENT/FORCE flag detail."
    - "clanarena.matchend.restore_status: hook now fires live AND its upstream state (_prevTeam, _joiningMidRound) is now populated, so the joining-flag drop is meaningful — BUT OnMatchEndBeforeScores still only CLEARS those sets; it never reads _prevTeam back to RESTORE each player's pre-CA team/observer status (QC MatchEnd_RestoreSpectatorAndTeamStatus). Stays partial."
  fixed_since_baseline:
    - "THIS WAVE (2026-06-28 working tree) wired the three previously-DEAD CA INGAME_JOINING seams to the live path — the handlers existed since Wave-16/17 but had no live caller; this wave added the callers (GameWorld.cs +26, ClientManager.cs +15, Commands.cs +5): (1) clanarena.join.late_join_observer — OnJoinLate is now reachable via the NEW Clients.GametypeOnJoinRefused side-channel: GameWorld wires GametypeOnJoinRefused = p => {if(Rounds.IsRoundStarted) ca.OnJoinLate(p);} (GameWorld.cs:2863) and JoinAllowed invokes GametypeOnJoinRefused?.Invoke(p) on the refusal branch (ClientManager.cs:360), which fires EXACTLY when a mid-round join is refused. So _joiningMidRound IS now populated and INFO_CA_JOIN_LATE IS sent → the INGAME_JOINING tracking half is now live. (2) clanarena.lifecycle.reset_map — `case ClanArena ca: ca.ResetMapPlayers(Clients.Players)` was added to GameWorld.ResetMap (GameWorld.cs:4642), so ResetMapPlayers runs live each round reset (clears _joiningMidRound, zeroes killcount, snapshots _prevTeam). (3) clanarena.spectate.force_spectate_cmd — GametypeSpectateCommand now has a live caller: CmdSpectate (the registered `spectate` command, Commands.cs:808/1561) calls _world.Clients.GametypeSpectateCommand(p) (Commands.cs:1594) → ca.OnSpectateCommand, which sends INFO_CA_LEAVE."
    - "DOWNSTREAM of the three seams above: clanarena.hud.eliminated_greyout's IsEliminatedPlayer `_joiningMidRound.Contains(p)` branch is now LIVE (the set is populated), so a mid-round joiner waiting out the round IS now greyed (logic partial→faithful). clanarena.spawn.ingame_status_decimal_reset's _joiningMidRound.Remove (the INGAME_STATUS_SET(JOINED) flip) is now meaningful on spawn (logic partial→faithful). clanarena.matchend.restore_status's hook now clears REAL populated state (liveness partial→live) but stays logic:partial because it only drops the joining flags and never restores prev_team team assignments."
    - "shuffleteams round-defer (clanarena.cmd.shuffleteams_reset) LIVE+faithful (carried from Wave-16/17): CmdShuffleTeams (Commands.cs:1401) defers a mid-round shuffle to the next round reset when `Rounds.IsRoundStarted && GameType is ClanArena`, consumed in ResetMap and wired to Rounds.OnRoundReset. This is the QC shuffleteams_on_reset_map = !allowed_to_spawn behavior."
    - "PlayerSpawn damage2score decimal reset (clanarena.spawn.ingame_status_decimal_reset) is now LIVE+faithful for the modeled (decimal-reset) half: ClanArena.Activate subscribes OnPlayerSpawn to MutatorHooks.PlayerSpawn (ClanArena.cs:242-243); the hook fires live in ClientManager.PutPlayerInServer (ClientManager.cs:749); OnPlayerSpawn (ClanArena.cs:506-514) removes the player's _scoreDecimal entry when now <= Handler.GameStartTime, matching QC `if (time <= game_starttime) player.float2int_decimal_fld = 0`. At the prior baseline this handler did not exist and the decimal was only cleared at the Activate/Deactivate match boundary (logic/timing/liveness = partial). Only the QC INGAME_STATUS_SET(JOINED) half remains unmodeled (no INGAME state)."
    - "'You are now alone!' on teammate disconnect / make-observer (clanarena.notify.alone_on_leave) is now LIVE+faithful: ClanArena.Activate subscribes OnMakePlayerObserver to MutatorHooks.MakePlayerObserver (ClanArena.cs:229-230) and OnClientDisconnect to MutatorHooks.ClientDisconnect (ClanArena.cs:234-235). Both hooks fire on the real server paths: MakePlayerObserver.Call in ClientManager.PutObserverInServer (ClientManager.cs:524, BEFORE DeadState is reset at :531 so !IsDead identifies a formerly-live player) and ClientDisconnect.Call in ClientManager.ClientDisconnect (ClientManager.cs:788). Each calls NotifyLastPlayerForTeam(leaving,_roster). Was fully missing at the prior baseline."
    - "'You are now alone!' on the death path (carried from prior baseline): OnDeath (ClanArena.cs:307) subscribed to Combat.Death (ClanArena.cs:195-196) calls NotifyLastPlayerForTeam; Combat.Death.Call fires on the live player-death path (DamageSystem)."
    - "Per-player ROUNDS_PL award LIVE+faithful (carried): GameWorld CA branch sets caRounds.OnRoundCounted = ca.AwardRoundStartScore (GameWorld.cs:2244); _roundPrep sets the live roster (GameWorld.cs:2247) before Rounds.Think fires OnRoundCounted at cnt==0."
    - "Inter-round grace fire-block LIVE+faithful (carried): WeaponFireDriver.RoundFireForbidden = _ => Rounds is {IsRoundStarted:false} wired in EnableRounds (GameWorld.cs:1476, which CA calls)."
