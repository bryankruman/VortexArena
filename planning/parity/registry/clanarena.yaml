  fixed_since_baseline:
    - "'You are now alone!' (CENTER_ALONE) now LIVE+faithful: OnDeath (ClanArena.cs:301, subscribed to Combat.Death in Activate, ClanArena.cs:193-194) calls NotifyLastPlayerForTeam(victim, _roster); Combat.Death.Call fires on the live player-death path (DamageSystem.cs:576). The IsRoundStarted gate reads the mirrored owned handler. Was dead (zero callers) at the prior baseline."
    - "Per-player ROUNDS_PL award LIVE+faithful (carried from prior wave): GameWorld CA branch sets caRounds.OnRoundCounted = ca.AwardRoundStartScore (GameWorld.cs:1768); _roundPrep sets the live roster (GameWorld.cs:1771) before Rounds.Think fires OnRoundCounted at cnt==0 (RoundHandler.cs:242)."
    - "Inter-round grace fire-block LIVE+faithful (carried): WeaponFireDriver.RoundFireForbidden = _ => Rounds is {IsRoundStarted:false} wired in EnableRounds (GameWorld.cs:1120, which CA calls); WeaponUseForbidden (WeaponFireDriver.cs:328) invokes it on the live per-tick fire path."
