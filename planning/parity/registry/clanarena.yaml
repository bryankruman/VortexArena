unit: clanarena
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 20
  worst_gaps:
    - "CA start loadout (200/200 + full ammo) never applied: players spawn at generic ~100hp/0 armor/0 ammo (ApplyStartItems dead, SetStartItems hook not subscribed)"
    - "CA weapon arena (g_ca_weaponarena 'most') not wired: players don't spawn with the full arsenal"
    - "Round time limit + stalemate prevention not evaluated on the live path (CheckWinner/PreventStalemate dead; live DefaultCanRoundEnd ignores RoundEndTime)"
    - "Round-win/tied/over (ROUND_TEAM_WIN/TIED/OVER) + 'You are now alone' notifications never sent on the CA path"
    - "Round-start grace countdown runs 5s not CA's 10s (g_ca_warmup never reaches the live RoundHandler), and weapons are NOT blocked during it (WeaponUseForbidden stub)"
    - "damage2score scoreboard accrual is dead (AddDamageScore no caller) and truncates the decimal remainder QC carries"
    - "No-pickups item filter (FilterItem) not implemented; per-round per-player ROUNDS_PL award not wired; late joiners not forced to Observer (no INGAME_JOINING state)"
features:
  - id: clanarena.round.lifecycle
    name: "Round wait/countdown/live/end-delay state machine"
    layer: [authority]
    base_refs:
      - "server/round_handler.qc:round_handler_Think"
      - "server/round_handler.qc:round_handler_Init"
      - "common/gametypes/gametype/clanarena/sv_clanarena.qh:REGISTER_MUTATOR(ca)"
    port_refs:
      - "src/XonoticGodot.Server/RoundHandler.cs:Think"
      - "src/XonoticGodot.Server/GameWorld.cs:EnableRounds (CA: bare EnableRounds(), no callbacks)"
      - "src/XonoticGodot.Server/GameWorld.cs:ActivateGameType (case ClanArena)"
    constants:
      - { name: "countdown_count_s", base: "10 (g_ca_warmup, verified gametypes-server.cfg:263)", port: "5 (RoundHandler.DefaultCountdown; g_ca_warmup never read by live handler)", match: false }
      - { name: "end_delay_s", base: "5 (round_handler_Init delay)", port: "5 (RoundHandler.DefaultEndDelay)", match: true }
      - { name: "round_timelimit_s", base: "180 (g_ca_round_timelimit)", port: "180 (RoundHandler.DefaultRoundTimeLimit, not the CA cvar)", match: true }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Round-start grace countdown is 5s, not CA's 10s: the live RoundHandler is spawned by a bare EnableRounds() and uses DefaultCountdown=5; g_ca_warmup is never passed to it."
      - "round_timelimit matching 180 is coincidental: the live handler uses RoundHandler.DefaultRoundTimeLimit, not the CA cvar g_ca_round_timelimit."
      - "Live lifecycle omits the QC time-limit-elapsed -> round-end branch (RoundEndTime is computed but DefaultCanRoundEnd only checks alive-team count) and the per-player ROUNDS_PL award at round start (OnRoundCounted not wired for CA) -- logic downgraded from the draft's 'faithful'."
    verification:
      - { kind: trace, ref: "GameWorld.ActivateGameType case ClanArena -> ca.Activate() + bare EnableRounds() (GameWorld.cs:1309-1312); RoundHandler.Spawn -> Init(5,5,180); Think() uses _canRoundEnd, never RoundEndTime", result: pass }
    confidence: high
    notes: "Two RoundHandlers exist; the LIVE one is Server/RoundHandler (GameWorld.Rounds) wired with NO CA callbacks. ClanArena.Handler (Common) is created in Activate but its Tick()/Think() is never called by GameWorld."

