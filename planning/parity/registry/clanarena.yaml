summary:
  feature_count: 26
  worst_gaps:
    - "Late-joiner forced-Observer / INGAME_JOINING state still missing; eliminated-greyout still approximates eliminated == dead"
    - "Cosmetic: no dedicated round-win announcer cue; RESPAWN_SILENT/FORCE flags + respawn_time = time+2 not explicitly modeled"
    - "Newly-mapped Base hooks with no port impl: MatchEnd_BeforeScores (restore spectator/team status), ClientCommand_Spectate (CA force-spectate + LEAVE notice), SV_ParseServerCommand shuffleteams, reset_map_players/global (CA round re-transmute + allowed_to_spawn), PlayerSpawn INGAME_STATUS + float2int reset, Scores_CountFragsRemaining"
  fixed_since_baseline:
    - "'You are now alone!' on teammate disconnect / make-observer (clanarena.notify.alone_on_leave) is now LIVE+faithful: ClanArena.Activate subscribes OnMakePlayerObserver to MutatorHooks.MakePlayerObserver (ClanArena.cs:229-230) and OnClientDisconnect to MutatorHooks.ClientDisconnect (ClanArena.cs:234-235). Both hooks fire on the real server paths: MakePlayerObserver.Call in ClientManager.PutObserverInServer (ClientManager.cs:524, BEFORE DeadState is reset at :531 so !IsDead identifies a formerly-live player) and ClientDisconnect.Call in ClientManager.ClientDisconnect (ClientManager.cs:788). Each calls NotifyLastPlayerForTeam(leaving,_roster). Was fully missing at the prior baseline."
    - "'You are now alone!' on the death path (carried from prior baseline): OnDeath (ClanArena.cs:307) subscribed to Combat.Death (ClanArena.cs:195-196) calls NotifyLastPlayerForTeam; Combat.Death.Call fires on the live player-death path (DamageSystem)."
    - "Per-player ROUNDS_PL award LIVE+faithful (carried): GameWorld CA branch sets caRounds.OnRoundCounted = ca.AwardRoundStartScore (GameWorld.cs:2244); _roundPrep sets the live roster (GameWorld.cs:2247) before Rounds.Think fires OnRoundCounted at cnt==0."
    - "Inter-round grace fire-block LIVE+faithful (carried): WeaponFireDriver.RoundFireForbidden = _ => Rounds is {IsRoundStarted:false} wired in EnableRounds (GameWorld.cs:1476, which CA calls)."
