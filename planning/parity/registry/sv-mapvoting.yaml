      - "src/XonoticGodot.Server/MapVoting.cs:Tick"
    constants:
      - { name: "think_cadence_s", base: "0.5", port: "every frame (none)", match: false }
      - { name: "winner_to_changelevel_delay_s", base: "1", port: "0 (applied immediately)", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No 0.5s think throttle; the vote ticks every frame."
      - "No 1s delay between winner reveal and changelevel; the port changes the map as soon as Finish picks a winner."
    verification:
      - { kind: code, ref: "GameWorld.cs:1996-2024 drives MapVote.Start/Tick/Finish on the live intermission path", result: pass }
    confidence: high
    notes: "Server lifecycle IS on the live path (gated on g_maplist_votable>0, PlayerCount>0, ballot>1, PlayerStats.DelayMapVote)."

