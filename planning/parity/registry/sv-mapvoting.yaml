last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Vote screen now appears + counts/winner update — but ONLY on a listen server: NetGame.UpdateMapVotePanel feeds the panel from the in-process GameWorld.MapVote. There is still NO ENT_CLIENT_MAPVOTE net entity, so a dedicated-server / remote client sees nothing."
    - "Still no client vote INPUT: the MapVotePanel has no _Input/_GuiInput handler and nothing writes Selection or emits an `impulse N` from a cell. A player sees the ballot but cannot click/key to cast — only raw console `impulse N` (which on a listen server the local player IS, so it works from console)."
    - "No server-side gametype vote at all (GameTypeVote_*): no ballot, no MapInfo_SwitchGameType, no maplist reset; sv_vote_gametype_options still ships 'dm tdm ctf' vs Base 'dm tdm ca ctf' (missing ca) and the 5 gametype reduce/detail/default_current/maplist_reset cvars are unregistered."
    - "During-vote client state (2342 sentinel health + SVC_FINALE scoreboard-hide + per-tick impulse zeroing) is still entirely unmodeled."
    - "Suggester NAME is dropped end-to-end (Commands.MapSuggestions is names-only; GameWorld passes Suggester \"\"), so g_maplist_votable_show_suggester (=1) and the panel 'Suggested by:' line can never populate."
