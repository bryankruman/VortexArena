last_audited: "2026-06-27"
summary:
  feature_count: 15
  worst_gaps:
    - "Still no ENT_CLIENT_MAPVOTE net entity: the whole vote (ballot/mask/tallies/own-vote/winner) is fed to the panel from the in-process GameWorld.MapVote (NetGame.UpdateMapVotePanel). This is correct for a listen server but a dedicated-server / remote client (_serverWorld == null) still sees nothing — no ballot, counts, winner, and cannot cast."
    - "Gametype vote is LIVE + faithful (StartGametype/ApplyGametypeSwitch, panel draws gametype icons/names/desc/detail) and the sv_vote_gametype_hook_all/_<name> localcmd hooks NOW FIRE (Commands.GameTypeVoteHookHandler wired at NetGame.cs:825 → LoadedConfig.ExecuteLine). Two residual logic gaps remain: GameTypeVote_AvailabilityStatus' MapInfo next-map availability filter is absent (a resolvable type is always GTV_AVAILABLE); and the maplist-reset MapInfo_ListAllowedMaps enumerate fallback is absent (keeps the current g_maplist when no per-gametype list is set)."
    - "During-vote logic state (2342 sentinel health on every client incl. bots + per-tick CS(it).impulse zeroing + SVC_FINALE) is still unmodeled; the scoreboard-hide EFFECT is achieved a different way (the scoreboard hides while the MapVote panel is Visible) but Base's 2342/SVC_FINALE mechanism is absent."
    - "FixClientCvars-on-finish is unported. (The vote event-log lines :vote:reduce / :vote:finished / :vote:suggestion_accepted / :vote:suggested ARE now emitted via wired EventLogEcho/GameLog seams, gated on sv_eventlog — previously gaps.)"
