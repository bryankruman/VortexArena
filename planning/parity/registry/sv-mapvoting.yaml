unit: sv-mapvoting
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Players cannot vote: CastVote/Abstain have no caller and DispatchImpulse drops all impulses during intermission, so the vote always finishes with zero votes."
    - "Client vote screen never appears: MapVotePanel is registered but never fed (no SetVote/SetVotes/SetWinner caller anywhere in the repo) and there is no ENT_CLIENT_MAPVOTE net sync."
    - "No mapvote net entity: the ballot, mask, live tallies, own-vote and winner are never sent to clients."
    - "Ballot reduce/keep-two (g_maplist_votable_reduce_time/_reduce_count) is not implemented; the reduce cvar is misnamed g_maplist_votable_keeptwotime and never read."
    - "No server-side gametype vote at all: no gametype ballot, no custom gametypes, no hook execution, no MapInfo_SwitchGameType, no maplist reset."
    - "Suggestions are stored (existence + dedup + suggestions==0 disable) but never seeded into the ballot (MapVoting.Start ignores _mapSuggestions)."
    - "hud_panel_mapvote_highlight_border default is 2 in the port vs 1 in every shipped Base HUD skin."
