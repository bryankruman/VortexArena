    gaps:
      - "Unbeatable-leader formula differs from Base: Base uses (voters_real - running_total) < votes_recent i.e. voters_real < 2*leader (and folds into the reduce loop's running total); the port uses (best - second) > (ExpectedVoters - ballotsCast). Same intent (no remaining vote can overturn the leader) but not bit-faithful."
      - "Base's 'all abstained' branch is voters_real == 0; the port has no abstain accounting on the live path (Abstain is dead), so abstainers don't subtract from the real-voter count."
      - "With no votes ever cast (CastVote dead) the only branch that fires in a real match is the 30s timeout."
    verification:
