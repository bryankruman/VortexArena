summary:
  feature_count: 15
  worst_gaps:
    - "Still no ENT_CLIENT_MAPVOTE net entity: the whole vote (ballot/mask/tallies/own-vote/winner) is fed to the panel from the in-process GameWorld.MapVote (NetGame.UpdateMapVotePanel). This is correct for a listen server but a dedicated-server / remote client (_serverWorld == null) still sees nothing — no ballot, counts, winner, and cannot cast."
    - "Gametype vote is now LIVE + faithful (StartGametype/ApplyGametypeSwitch, panel draws gametype icons/names/desc/detail), BUT three residual gaps remain: the sv_vote_gametype_hook_all/_<name> localcmd hooks don't run (Commands.GameTypeVoteHookHandler is never assigned — a no-op, though stock hooks are empty aliases anyway); GameTypeVote_AvailabilityStatus' MapInfo next-map availability filter is absent (a resolvable type is always GTV_AVAILABLE); and the maplist-reset MapInfo_ListAllowedMaps enumerate fallback is absent (keeps the current g_maplist when no per-gametype list is set)."
    - "During-vote logic state (2342 sentinel health on every client incl. bots + per-tick CS(it).impulse zeroing) is still unmodeled; the scoreboard-hide EFFECT is achieved a different way (the scoreboard hides while the MapVote panel is Visible) but Base's 2342/SVC_FINALE mechanism is absent."
    - "The :vote:reduce / :vote:finished / :vote:suggested event-log lines and FixClientCvars-on-finish are unported. (The mid-vote top-2 reduce-FADE animation IS now driven — NetGame.SetAvailability stamps mv_top2_alpha's _top2Time on first reduce.)"
