unit: sv-mapvoting
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 15
  worst_gaps:
    - "Still no ENT_CLIENT_MAPVOTE net entity: the whole vote (ballot/mask/tallies/own-vote/winner) is fed to the panel from the in-process GameWorld.MapVote (NetGame.UpdateMapVotePanel). This is correct for a listen server but a dedicated-server / remote client (_serverWorld == null) still sees nothing — no ballot, counts, winner, and cannot cast."
    - "No server-side gametype vote at all (GameTypeVote_Start/_Finished/_SetGametype/_AddVotable): no ballot, no MapInfo_SwitchGameType, no maplist reset, no hook execution. The 8 sv_vote_gametype_* cvars are now all REGISTERED with Base-faithful values (incl. options 'dm tdm ca ctf'), but nothing reads them."
    - "During-vote logic state (2342 sentinel health on every client incl. bots + per-tick CS(it).impulse zeroing) is still unmodeled; the scoreboard-hide EFFECT is achieved a different way (the scoreboard hides while the MapVote panel is Visible) but Base's 2342/SVC_FINALE mechanism is absent."
    - "The mid-vote top-2 reduce-FADE animation (SetReduce/SetAvailability → mv_top2_alpha _top2Time) still has no caller; availability is fed via SetVotes(-1) which dims options but does not run the fade. The :vote:reduce / :vote:finished event-log lines and FixClientCvars-on-finish are also unported."
