summary:
  feature_count: 15
  worst_gaps:
    - "Client vote screen STILL never appears: there is no ENT_CLIENT_MAPVOTE net sync and the present-but-complete MapVotePanel (SetVote/SetVotes/SetWinner/SetReduce/SetAvailability) has ZERO callers anywhere in src/ or game/, so a real player never sees the ballot, counts or winner reveal."
    - "No mapvote net entity: ballot, mask, live tallies, own-vote, winner and screenshot transfer are never sent to clients (NetGame has no mapvote sync; the Wave-2 NetGame edits were sandbox/superspec only)."
    - "No client vote input: the panel has no _Input/_GuiInput handler and there is no MapVote_SendChoice equivalent — so even server-side casting is only reachable by typing raw `impulse N` in the console, not via any vote UI."
    - "No server-side gametype vote at all (GameTypeVote_*): no ballot, no MapInfo_SwitchGameType, no maplist reset; sv_vote_gametype_options still ships 'dm tdm ctf' vs Base 'dm tdm ca ctf' (missing ca) and the 5 gametype-reduce/detail/default_current/maplist_reset cvars are unregistered."
    - "During-vote client state (2342 sentinel health + SVC_FINALE scoreboard-hide + per-tick impulse zeroing) is still entirely unmodeled."
