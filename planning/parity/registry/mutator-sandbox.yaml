summary:
  feature_count: 14
  worst_gaps:
    - "Re-audit (current branch claude/parity-port-waves, post Wave-5 commit 023ba70): the command surface + host seams remain GENUINELY LIVE. `g_sandbox` is a client-callable command (Commands.cs:660 Register), the `sandbox` cfg alias emits `cmd g_sandbox …`, routed Commands.CmdSandbox (Commands.cs:1780, gated on sandbox.Added) → SandboxMutator.HandleCommand. NetGame.WireSandbox() (NetGame.cs:840, called on the live setup path at NetGame.cs:793) injects PrintTo (SendChatToPlayer), Trace (SandboxTraceProvider — real eye+forward TraceService resolving the hit object by edict match), CryptoIdfp(=PersistentId)/NetName/ViewYaw providers, RealClientsProvider (live non-bot roster), and Store (SandboxObjectStore — real System.IO.File IO at ~/XonData/sandbox/storage_<name>_<map>.txt). With g_sandbox 1 a player CAN spawn/edit/attach/remove/claim/info/paste, and per-map storage save/autosave/autoload genuinely persist."
    - "NEW FIX this audit: object touch material FX is now WIRED — ObjectSpawn assigns e.Edict.Touch = (self,other)=>ObjectTouch(e, other.Velocity) (SandboxMutator.cs:204), reproducing Base settouch(e, sandbox_ObjectFunction_Touch) (sv_sandbox.qc:180). The engine physics loop (SimulationLoop.cs:243 RunEntity over _entities.All → MoveTypePhysics.RunEntity → FlyMove.Impact:107 e1.Touch(e1,e2)) dispatches it for the object's MOVETYPE_TOSS edict on collision, so the velocity-scaled impact SOUND (object/impact_<mat>_N.wav, CH_TRIGGER, VOL_BASE*intensity) now fires on the live path. Touch averaging + 0.1s rate-limit + intensity offset/clamp all bit-faithful. STILL MISSING on this row: the impact_<material> PARTICLE — OnMaterialEffect delegate still has NO `=` assignment anywhere (only def SandboxMutator.cs:397 + invoke :393), and the effect is unregistered in the port EffectSystem → presentation:missing."
    - "STILL DEAD/MISSING: drag/grab (+button8) is entirely absent (no Drag/Drag_Begin/Drag_Finish; .Grab is computed by the think tick but nothing consumes it). object_duplicate COPY clipboard is inert (SandboxObjectStore.SetClipboard is an empty body, NetGame.cs:984 — no svc_stufftext transport; paste from a manually-set cvar works). CSQC object→client networking (CSQCMODEL_AUTOINIT/AUTOUPDATE) has no port seam, so client-side render of spawned objects is unverified."
    - "STILL OPEN: the three Sandbox_* veto hooks (DragAllowed/SaveAllowed/EditAllowed) have no port hook-chain (TODOs at SandboxMutator.cs:345/534/610); gating is approximated on g_sandbox_readonly only. physics-2 movetype maps to MoveType.Push(7) but Base MOVETYPE_PHYSICS=32 (serialized value diverges, behaviorally moot). object_info mesh tag enumeration is stubbed (SandboxMutator.cs:867). ModelExists is permissive (no fexists)."
