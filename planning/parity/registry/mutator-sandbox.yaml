    port_refs: []
    constants:
      - { name: "g_sandbox", base: "0", port: "0 (cfg ships, never read)", match: true }
      - { name: "g_sandbox_storage_autoload", base: "1", port: "1 (cfg ships, never read)", match: true }
      - { name: "g_sandbox_storage_autosave", base: "5", port: "5 (cfg ships, never read)", match: true }
    status:
      logic: missing
      values: missing
      timing: missing
      presentation: na
      audio: na
      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No SandboxMutator in the port mutator registry; g_sandbox does nothing when set."
    verification:
      - { kind: grep, ref: "ls src/.../Gameplay/Mutators/ = no SandboxMutator.cs (57 mutators listed, none sandbox); grep sandbox in src/ = only 2 unrelated doc-comments (ServerHooks.cs, GameLog.cs)", result: fail }
      - { kind: code, ref: "all 16 g_sandbox* + cl_sandbox_clipboard defaults in port assets/data/.../mutators.cfg are byte-identical to Base mutators.cfg:95-110", result: pass }
    confidence: high
    notes: "g_sandbox* defaults ship in assets/data/.../mutators.cfg IDENTICAL to Base (verified line-by-line), and commands.cfg ships `alias sandbox \"cmd g_sandbox ${* ?}\"` — but no gameplay code reads any of them. REGISTER_MUTATOR(sandbox, expr_evaluate(autocvar_g_sandbox)) + MUTATOR_ONADD (IL_NEW, autosave_time seed, autoload) have no port counterpart."

