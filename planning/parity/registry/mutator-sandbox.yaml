summary:
  feature_count: 14
  worst_gaps:
    - "Wave-4 fix-up WIRED the command surface + host seams: `g_sandbox` is now a client-callable command (ClientCommandRegistry) routed by Commands.CmdSandbox → SandboxMutator.HandleCommand (the client `sandbox` alias emits `cmd g_sandbox …`). NetGame.WireSandbox injects PrintTo (sprint), Trace (crosshair forward trace resolving hit objects by edict), CryptoIdfp/NetName/ViewYaw providers, RealClientsProvider (FOREACH_CLIENT roster), and a file-IO Store (sandbox/storage_<name>_<map>.txt under ~/XonData). So with g_sandbox 1 a player CAN now spawn/edit/attach/remove/claim/info objects, and per-map storage save/autosave/autoload genuinely persist."
    - "Remaining dead: object_duplicate COPY clipboard (Store.SetClipboard is inert — the port has no svc_stufftext channel to set a remote client's cvar; paste from a manually-set cvar still works). +button8 drag/grab is still entirely absent. CSQC object→client networking (CSQCMODEL_AUTOINIT/AUTOUPDATE) + the impact_<material> particle effect have no port seam, so spawned objects don't yet render on clients and touch FX play sound but no particles. The three Sandbox_* veto hooks (DragAllowed/SaveAllowed/EditAllowed) still have no port hook-chain (gated on readonly only)."
    - "Drag/grab (+button8) integration is still entirely absent (no Drag/Drag_Begin/Drag_Finish; .grab is computed by the think tick but nothing consumes it)."
    - "The three Sandbox_* mutator hooks (DragAllowed/SaveAllowed/EditAllowed) have no port hook-chain; gating is approximated on g_sandbox_readonly only (TODOs in source)."
