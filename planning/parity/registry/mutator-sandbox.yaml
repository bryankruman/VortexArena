unit: mutator-sandbox
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 14
  worst_gaps:
    - "Entire server-side sandbox mutator is unimplemented: no object can be spawned, edited, dragged, or persisted with g_sandbox 1."
    - "No `sandbox` console command / object_* subcommand handler exists on the server (the data alias reaches no backend)."
    - "Sandbox Tools menu opens and its controls move, but every action button is a no-op (commands logged inert, no server backend)."
    - "Object material impact particles + impact sounds never play (no object touch handler)."
    - "Per-map object storage (auto-save every 5s / auto-load at map start) is missing — builds never persist."
