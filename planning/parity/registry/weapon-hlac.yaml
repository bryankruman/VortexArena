    intended_divergence: true
    divergence_rationale: "VERIFIED 2026-06-22 against tracing.qc:184-213 (re-confirmed post-Wave-2; ProjectileVelocity body unchanged — WeaponFiring.cs:702-704 still `QMath.Normalize(dir)*speed` -> |v|==speed exactly). QC `W_SetupProjVelocity_Explicit` calls `W_CalculateSpread(dir, spread, style, false)` (NOT normalized) then `proj.velocity = W_CalculateProjectileVelocity(owner, owner.velocity, pSpeed*dir, false)`; with g_projectiles_newton_style 0 that returns `pSpeed*dir` unchanged, so |velocity| = pSpeed*|normalize(dir_folded)+randomvec*spread|, i.e. Base bolts gain a small speed bump. Magnitude: at spread_max 0.03125 the per-axis randomvec()*spread is in [-0.03125,0.03125), so |v| is within ~1-3% of speed in typical draws (worst case ~5% on a fully axis-aligned draw). Aim DIRECTION is effectively identical (port normalizes the same vector QC builds). Flagged so it is not re-reported; fix only if exact projectile-speed parity is required."
