      - { name: "primary_damage", base: "10", port: "10", match: true }
      - { name: "primary_edgedamage", base: "5", port: "5", match: true }
      - { name: "primary_force", base: "15", port: "15", match: true }
      - { name: "primary_radius", base: "60", port: "60", match: true }
