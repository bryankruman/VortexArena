  - id: weapon-hlac.projectile.velocity
    name: "Shared projectile-velocity setup (W_SetupProjVelocity_Basic)"
    layer: [shared]
    base_refs:
      - "server/weapons/tracing.qc:W_SetupProjVelocity_Explicit"
      - "common/weapons/calculations.qc:W_CalculateSpread"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/WeaponFiring.cs:ProjectileVelocity"
      - "src/XonoticGodot.Common/Gameplay/Weapons/WeaponFiring.cs:CalculateSpread"
    constants:
      - { name: "g_projectiles_newton_style", base: "0", port: "0 (inheritance omitted)", match: true }
      - { name: "g_projectiles_spread_style", base: "0", port: "0 (dir + randomvec*spread)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "VERIFIED 2026-06-22 against tracing.qc:184-213. Port re-normalizes after spread and scales by speed (`QMath.Normalize(dir)*speed`, WeaponFiring.cs:580-581 -> |v|==speed exactly). QC `W_SetupProjVelocity_Explicit` calls `W_CalculateSpread(dir, spread, style, false)` (NOT normalized) then `proj.velocity = W_CalculateProjectileVelocity(owner, owner.velocity, pSpeed*dir, false)`; with g_projectiles_newton_style 0 that returns `pSpeed*dir` unchanged, so |velocity| = pSpeed*|normalize(dir_folded)+randomvec*spread|, i.e. Base bolts gain a small speed bump. Magnitude: at spread_max 0.03125 the per-axis randomvec()*spread is in [-0.03125,0.03125), so |v| is within ~1-3% of speed in typical draws (worst case ~5% on a fully axis-aligned draw). Aim DIRECTION is effectively identical (port normalizes the same vector QC builds). Flagged so it is not re-reported; fix only if exact projectile-speed parity is required."
    gaps: []
    verification:
      - { kind: read, ref: "WeaponFiring.ProjectileVelocity vs tracing.qc:185-213", result: pass }
    confidence: medium
    notes: "Newton-style velocity inheritance defaults off in Base and is omitted in the port (correct at default). The renormalize-after-spread is the only math divergence."

