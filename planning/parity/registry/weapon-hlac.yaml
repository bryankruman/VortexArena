      - { name: "primary_animtime", base: "0.03125", port: "0.03125", match: true }
      - { name: "primary_spread_min", base: "0", port: "0", match: true }
      - { name: "primary_spread_add", base: "0.001953125", port: "0.001953125", match: true }
      - { name: "primary_spread_max", base: "0.03125", port: "0.03125", match: true }
      - { name: "misc_bulletcounter reset on fresh primary press", base: "= 0 in wr_think fire&1 first-press (hlac.qc:173)", port: "never reset on primary (only on secondary press / weapon raise)", match: false }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "VERIFIER (2026-06-22): primary spread does NOT recover on a fresh trigger pull. QC W_HLAC_Attack_Frame's loop runs ONLY while ATCK is held; on release the loop ends, and the NEXT first press hits wr_think's `weapon_prepareattack` -> `misc_bulletcounter = 0` (hlac.qc:173), so spread restarts at spread_min (dead-accurate first shot). The port drives every tick via WrThink(Primary)+PrepareAttack and NEVER resets MiscBulletCounter on primary (Hlac.cs:121-125) — it only resets on a secondary press (Hlac.cs:131) or on weapon raise (BeginRaise resets the DIFFERENT BulletCounter field). So once spread caps it stays maxed; releasing and re-tapping primary does not restore accuracy. This is the weapon's signature mechanic (the in-game describe text: 'releasing primary fire every now and then is important to restore accuracy') — broken in the port. Compare OkMachinegun.cs:97, which DOES reset MiscBulletCounter=0 in its WrThink primary branch."
    verification:
      - { kind: read, ref: "Hlac.cs:121-125 (no reset) vs hlac.qc:169-176 (wr_think resets misc_bulletcounter=0 on first press)", result: fail }
      - { kind: test, ref: "tests/XonoticGodot.Tests/HlacCrouchSpreadTests.cs — pins ONLY the crouchmod gate (single WrThink call); does NOT cover the held-fire counter reset", result: partial }
      - { kind: value-diff, ref: "Configure() vs bal-wep-xonotic.cfg:537-548", result: pass }
      - { kind: trace, ref: "WeaponFireDriver.Frame -> Hlac.WrThink -> Attack", result: pass }
    confidence: high
    notes: "Per-shot cadence, ammo drain, spread-add growth (capped at spread_max), and the crouchmod gate are faithful and live. The DEFECT is the missing per-press counter reset: the draft claimed 'misc_bulletcounter resets on first press' but the code never does so for primary. The HlacCrouchSpreadTests give a false sense of coverage — they fire exactly one WrThink per case and never exercise the cross-press reset."

