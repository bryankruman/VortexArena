summary:
  feature_count: 9
  worst_gaps:
    - "PRIMARY SPREAD NEVER RECOVERS: misc_bulletcounter is not reset on a fresh primary trigger pull (only on a secondary press / weapon raise), so once spread caps, release+re-tap does NOT restore accuracy — defeats the weapon's signature feather-the-trigger mechanic (QC resets it in wr_think fire&1, hlac.qc:173)"
    - "punchangle recoil kick ignores g_norecoil (still twitches with g_norecoil 1)"
    - "secondary bolts do not carry HITTYPE_SECONDARY in the deathtype (port uses RegistryId for both modes); damage resolves correctly via per-mode captured values, but the bit is absent (benign at present — single kill message, no HITTYPE stats)"
    - "wr_checkammo is reserve-only (no clip-OR term); no observable effect at default reload_ammo 0"
    - "HLAC-specific bot aim (projectile lead) not implemented"
    - "muzzle/impact green->blaster compat fallback not ported (cosmetic)"
    - "bolt client render (PROJECTILE_HLAC model/trail) unverified on live path"
