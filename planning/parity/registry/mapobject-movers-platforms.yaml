unit: mapobject-movers-platforms
category: mapobject
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "q3compat plat defaults not ported (speed 200/lip 8/dmg 2, medplat sounds, CPMA sound_start/sound_end): the port has NO q3compat flag at all (CompatRemaps.cs:17), so imported Q3/Q3DF func_plats move at 150 with the wrong lip, take no default bite damage, and play the light plat1/plat2 sound."
    - "plat_target_use is missing: a Q3COMPAT targeted ground plat installs PlatUse (one-shot send-down) instead of the re-raise/refresh handler, so its trigger does the wrong thing."
    - "'sounds' field (1=plat1/plat2, 2=medplat) and the legacy sound1/sound2 overrides are not read: a map authored with custom plat sounds gets the plat1/plat2 default."
    - "message2 ('was squished by') default is never applied in PlatSetup (only the map's explicit message2 key survives), so a default crush obituary uses the wrong attacker phrasing."
    - "plat sounds play on SoundChannel.Voice (=2) but Base uses CH_TRIGGER_SINGLE (=3); Voice maps to the commented-out CH_VOICE_SINGLE, not CH_TRIGGER_SINGLE — a channel-number divergence (low impact)."
    - "plat_outside_touch handler not implemented (mapper-wired outside trigger to send a topped plat down)."
