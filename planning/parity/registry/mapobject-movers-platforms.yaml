      - { name: "move speedtype", base: "TSPEED_LINEAR", port: "SpeedType.Linear", match: true }
      - { name: "sound channel", base: "CH_TRIGGER_SINGLE = 3", port: "SoundChannel.Voice = 2 (== commented-out CH_VOICE_SINGLE)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: partial
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Plat go/hit sounds play on SoundChannel.Voice (=2) but Base _sound uses CH_TRIGGER_SINGLE (=3). Voice (=2) corresponds to the COMMENTED-OUT CH_VOICE_SINGLE in Base sound.qh, not CH_TRIGGER_SINGLE. The cue sample is right (noise/noise1) but the channel number diverges, so plat move/stop sounds won't stop/replace each other the way a true CH_TRIGGER_SINGLE plat would (low audible impact; single-shot either way)."
    verification:
      - { kind: code, ref: "PlatGoUp/Down/HitTop/HitBottom vs platforms.qc:61-88 — state, SUB_CalcMove targets, 3s dwell all match", result: pass }
      - { kind: code, ref: "Base sound.qh:10-13 CH_VOICE=-2, CH_VOICE_SINGLE=2(commented), CH_TRIGGER=-3, CH_TRIGGER_SINGLE=3; port Services.cs:113-118 Voice=2; plat uses SoundChannel.Voice", result: fail }
    confidence: high
    notes: "go_up/go_down play noise, hit_top/hit_bottom play noise1; top dwell sets Think=PlatGoDown at LTime+3 — bit-faithful. The ONLY divergence is the sound channel constant (2 vs 3); the draft's note 'SoundChannel.Voice (CH_TRIGGER_SINGLE)' was factually wrong — Voice=2 is CH_VOICE_SINGLE, CH_TRIGGER_SINGLE=3."

