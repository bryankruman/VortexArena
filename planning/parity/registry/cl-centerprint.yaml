  - id: cl-centerprint.countdown.count_token
    name: "^COUNT countdown decrement"
    layer: [presentation]
    base_refs:
      - "client/hud/panel/centerprint.qc:HUD_CenterPrint (countdown decrement, lines 349-360)"
      - "client/announcer.qc:Announcer_Countdown"
    port_refs:
      - "game/hud/CenterPrintPanel.cs:_Process"
      - "game/hud/CenterPrintPanel.cs:MessageAlpha"
      - "game/hud/HudNotifications.cs:ShowCenter"
      - "src/XonoticGodot.Server/GameWorld.cs:BroadcastGameStartCountdown"
      - "src/XonoticGodot.Server/GameWorld.cs:BroadcastRoundStartCountdown"
    constants:
      - { name: "countdown forces fade_in/out=0", base: "yes", port: "yes (MessageAlpha countdown branch)", match: true }
      - { name: "always-laid-out at ~0 alpha", base: "yes (hold position)", port: "yes (isCountdown skip-guard)", match: true }
      - { name: "durcnt COUNTDOWN_GAMESTART", base: "\"1 f1\" → dur=1s/step, count=f1(seconds)", port: "dur=3 (DefaultDuration), count=flts[0]=f1(seconds)", match: false }
      - { name: "durcnt COUNTDOWN_ROUNDSTART", base: "\"1 f2\" → dur=1s/step, count=f2(seconds), %s=f1(round)", port: "dur=3, count=flts[0]=f1(ROUND#), %s=f1", match: false }
      - { name: "per-step duration", base: "1s (durcnt first token)", port: "DefaultDuration=3 always", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "STILL OPEN (unchanged by Wave-2/5): ShowCenter (HudNotifications.cs:181) hardcodes the ^COUNT value to flts[0] regardless of which float the notification's durcnt selects. COUNTDOWN_ROUNDSTART's durcnt is \"1 f2\" (count=f2=seconds, f1=round# feeding the %s in 'Round %s starts in'), but GameWorld.cs:1494 broadcasts Send(...,round+1,secondsLeft) so flts[0]=round# — the ^COUNT shows the ROUND NUMBER instead of the seconds in round-based modes (GAMESTART's flts[0]=seconds is correct). Latent risk for any future ^COUNT notification whose count is not the first float."
      - "STILL OPEN: the Base durcnt per-step DURATION (1s) is ignored: ShowCenter always uses CenterPrintPanel.DefaultDuration=3, so the panel's own decrement window is 3s, not 1s. The per-second server re-broadcast masks this for GAMESTART/ROUNDSTART (each second refreshes the slot), but the panel-local ^COUNT decrement (CenterPrintPanel._Process) ticks on the wrong (3s) cadence between broadcasts."
    verification:
      - { kind: value_diff, ref: "all.inc:568 COUNTDOWN_ROUNDSTART durcnt \"1 f2\"; NotificationsList.cs:413 args=\"f1\" + format 'Round %s starts in'; GameWorld.cs:1494 Send(...,round+1,secondsLeft); HudNotifications.cs:181 count=(int)flts[0]=round+1", result: fail }
      - { kind: code, ref: "Base Announcer_Countdown emits the center ONCE (this.skin latch) then lets ^COUNT tick locally; port GameWorld re-broadcasts every countdown tick (BroadcastGameStartCountdown/BroadcastRoundStartCountdown called per second)", result: fail }
    confidence: high
    notes: "INTENDED part: the port has no CSQC Announcer_Countdown think loop, so the countdown is server-driven — GameWorld re-broadcasts COUNTDOWN_GAMESTART/_ROUNDSTART once per second (each replacing the CPID_ROUND slot) instead of Base's once-then-local-^COUNT. That cadence is a deliberate consequence of the no-CSQC architecture. The wrong-^COUNT-arg in ROUNDSTART and the ignored per-step duration are NOT intended (hence intended_divergence=false) and are UNCHANGED by the Wave work. End-of-countdown via MSG_MULTI \"BEGIN\" → CENTER_COUNTDOWN_BEGIN (CPID_ROUND) matches; the new title-clear on BEGIN/abort (SendCenterTitle '') is correct."

