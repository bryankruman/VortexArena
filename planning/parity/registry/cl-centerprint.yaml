      - { name: "per-step duration", base: "1s (durcnt first token)", port: "1s (ResolveDurcnt token0; Push duration=1 → _Process decrement window = m.Duration=1)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: value_diff, ref: "all.inc:567-568 COUNTDOWN_GAMESTART durcnt \"1 f1\" / ROUNDSTART \"1 f2\"; NotificationsList.cs:82-83 CenterDurcnt stamps the same specs onto Notification.Durcnt; HudNotifications.cs:183 ResolveDurcnt selects token0=duration, token1=count via fN ref; GameWorld.cs:1885 Send(...,secondsLeft), 1892 Send(...,round+1,secondsLeft) → f2=flts[1]=secondsLeft is correctly selected", result: pass }
      - { kind: code, ref: "Push(text,duration=1,cpid,count) → Message.Duration=1; _Process decrements Count each m.Duration (=1s) window (CenterPrintPanel.cs:343-352). Server still re-broadcasts each second (intended no-CSQC cadence) but the panel-local ^COUNT now ticks at the correct 1s window", result: pass }
    confidence: high
    notes: "BOTH baseline countdown gaps FIXED (partial→faithful). HudNotifications now models the QC durcnt arg-selection: ResolveDurcnt/ResolveDurcntToken (HudNotifications.cs:208-244) splits durcnt into token0=display-duration, token1=^COUNT-count, each resolved as a literal, an fN float-arg reference (1-based), or item_centime. NotificationsList.CenterDurcnt stamps the Base durcnt specs (\"1 f2\" for ROUNDSTART) onto Notification.Durcnt, so ROUNDSTART's count now correctly reads f2=flts[1]=secondsLeft (not flts[0]=round#), and the per-step duration is 1s (not the old DefaultDuration=3). INTENDED, unchanged: the server-driven once-per-second re-broadcast (no CSQC Announcer_Countdown think loop) — a deliberate no-CSQC consequence, but now numerically/timing-faithful. End-of-countdown via MSG_MULTI \"BEGIN\" + title-clear on BEGIN/abort still correct."

