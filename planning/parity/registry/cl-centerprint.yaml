unit: cl-centerprint
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Raw engine centerprint() builtin feed is systematically dead: door/trigger/target `.message`, item pickup hints, target_print, locked-door key messages — the port plays only the audible half and explicitly drops the centerprint TEXT (MapObjectsCommon/TargetUtilities/CompatRemaps). Panel never shows any map/trigger centerprint."
    - "Gametype/duel title never shown: SetTitle/SetDuelTitle/ClearTitle present but DEAD (no Announcer driver port)."
    - "COUNTDOWN_ROUNDSTART ^COUNT reads flts[0]=round# instead of f2=seconds (durcnt arg-selection not modeled) — shows the round number where the seconds should count down."
    - "MSG_CENTER_KILL remote group/all-kill not implemented (no wire msg, no handler); Kill/ClearAll dead — no event-driven retraction of a centerprint group."
    - "Server `tell`/private-message centerprint (Chat.CenterPrint → DeliveredCenter) is recorded server-side but never networked to the panel."
    - "hud_panel_centerprint_fade_in default is 0 in port vs 0.15 in Base — messages pop in with no fade-in ramp."
