      - { name: "countdown forces fade_in/out=0", base: "yes", port: "yes (MessageAlpha countdown branch)", match: true }
      - { name: "always-laid-out at ~0 alpha", base: "yes (hold position)", port: "yes (isCountdown skip-guard)", match: true }
