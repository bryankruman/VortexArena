unit: mutator-random_items
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Map-item replacement (g_random_items 1) is still inert: the port has no entity-level FilterItem mutator hook (StartItem.SpawnInternal only calls the definition-level FilterItemDefinition, which cannot swap one classname for another) and no ItemTouch mutator-hook chain (ItemPickupRules.ItemTouch:364 still notes 'the port has no ItemTouch hook chain yet'). So neither spawn-time replacement nor per-respawn re-randomization happens."
    - "The RandomItems_GetRandomItemClassName mod-injection hook is still not modeled, so Overkill/Instagib cannot substitute their item pools (okhmg/okrpc, vaporizer_cells) and randomitems-overkill.cfg's overkill-specific probabilities are never consulted."
    - "Spawn-mechanics safety/flagging is still absent: no random_items_is_spawning recursion guard, no ITEM_IS_LOOT skip in a (missing) FilterItem, and no ok_item flag on spawned/replaced/loot items (so under Overkill the dropped loot is not tagged as an Overkill item)."
    - "Active-mutators string hooks (BuildMutatorsString ':random_items' / BuildMutatorsPrettyString ', Random items') are still not ported; the port has no NetName-based active-mutators string builder, so this mutator is omitted from the net string and the scoreboard label."
