unit: mutator-random_items
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Map items are never replaced under g_random_items 1: the port has no entity-level FilterItem mutator hook. The only item filter hook is FilterItemDefinition (definition-level powerup/item blocking, used by Duel/Mayhem) — a DIFFERENT hook that cannot replace an item with a different classname."
    - "Picked-up map items never re-randomize: there is no ItemTouch mutator-hook chain in the port. ItemPickupRules.ItemTouch:279 explicitly notes 'the port has no ItemTouch hook chain yet', so a respawning item keeps its original identity."
    - "Dropped loot is not pickup-able: SpawnLootItem creates a bare entity (classname, MoveType.Toss, NextThink remove) instead of calling StartItem.SpawnLoot(item, Pickup, lifetime) (which EXISTS at StartItem.cs:58 and installs ItemPickupRules.ItemTouch); it has no Pickup def and no touch handler, so players can't collect it."
    - "Probability cvar name is wrong: port reads g_random_items_vortex_probability, but Base (sprintf with m_canonical_spawnfunc='weapon_vortex') and the shipped cfg use g_random_items_weapon_vortex_probability. Every shipped weapon-prob cvar misses -> all weights 0 -> chosenWep stays null -> the engine returns empty."
    - "Not implemented: the mutator never enumerates the item registry, so health/armor/resource/powerup picks always resolve to empty. These are the dominant Base categories, so random replacement/loot is non-functional even ignoring the weapon-cvar bug."
