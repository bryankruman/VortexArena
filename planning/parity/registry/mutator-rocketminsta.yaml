last_audited: "2026-06-22"
summary:
  feature_count: 9
  worst_gaps:
    - "Mutator hooks match 'devastator'/'electro' deathtypes, but the port tags the RM explosion and laser bolts with the VAPORIZER weapon id (RegistryId) instead of WEP_DEVASTATOR/WEP_ELECTRO — so neither the no-self-damage nor the force-gib hook ever fires against real RM damage. Verified: RadiusDamage(deathType=RegistryId) → ApplyDamage → FromWeapon(Registry<Weapon>.ById(id).NetName) = 'weapon-vaporizer'; hooks test WeaponNetNameOf=='devastator'/'electro' → no match. The mutator is live but inert for its core purpose: rocket-jumping with the RM explosion hurts/kills you, and RM kills do not force-gib."
    - "Laser barrage has no rapid-fire ramp (Base hold-to-stream via hagar_load/jump_interval2 + g_rm_laser_rapid/_rapid_delay 0.6/_rapid_refire 0.35 + mode-1 single bolt) — port only fires the mode-0 fan every g_rm_laser_refire 0.7s; the port Vaporizer has no hagar_load/JumpInterval2 state at all."
    - "RM laser bolts are not networked/rendered as projectiles: no CSQCProjectile, no models/elaser.mdl, no EFFECT_ROCKETMINSTA_LASER trail attached, no team-color colormod. They deal radius damage but are visually absent (only the trail effect string is registered at EffectsList.cs:241, with no emitter)."
    - "Instagib out-of-cells RM-laser downgrade branch is MISSING: port instagib_ammocheck (InstagibMutator.cs:206) has no g_rm&&g_rm_laser branch, so a cell-less RM-laser player gets the normal death countdown instead of the no-countdown downgrade + CENTER_INSTAGIB_DOWNGRADE centerprint."
    - "Mode-0 barrage plays the wrong sound (electro_fire2 instead of Base SND_CRYLINK_FIRE)."
