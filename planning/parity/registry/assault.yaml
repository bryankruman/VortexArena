last_audited: "2026-06-25"
# Re-audited 2026-06-25 (drift check): no status/liveness drift on any of 18 rows; all Wave-6a
# ports remain live and faithful. port_ref/verification line numbers refreshed (GameWorld.cs grew
# ~400 lines since the prior audit). The three unmapped hooks (OnEntityPreSpawn / VehicleInit /
# PlayHitsound) still have no port equivalent (tracked in worst_gaps / new_unmapped).
summary:
  feature_count: 18
  worst_gaps:
    - "Wave 6a closed most of the round-flow + UX-logic gaps; all still LIVE this re-audit (line numbers drifted, symbols intact). Spawn-point team swap (AssaultSwapSpawnTeams, GameWorld.cs:3953), roundstart turret team-swap + unteamed-turret seeding (AssaultTurretRoundstart, GameWorld.cs:3919), the objective waypoint-sprite server state (SpawnObjectiveSprite + WaypointSprites.Think GameWorld.cs:2030), the destructible heal path (HealDestructible + GtEventHeal GameWorld.cs:2621), the objective-aware spawn evalfunc (ShouldRejectSpawnSpot wired at SpawnSystem.cs:448), the warmup-incompatible ReadLevelCvars override (g_warmup=0 + sv_ready_restart_after_countdown=0, GameWorld.cs:2329-2330), and the timelimit=20 mapinfo default (GameWorld.cs:2336-2337) are all LIVE. The bot Assault role rates the QC active-objective filter + correct radii (650/3000) and ratingscale (20000)."
    - "Residual round machinery (UNCHANGED): (1) the 5s AS_ROUND_DELAY freeze still does NOT actually freeze the game — GameStopped (GameWorld.cs:1678 = Intermission.Running||MatchEnded) ignores SecondRoundPending, so players keep moving/firing/respawning during the inter-round window (QC sets game_stopped=true). DriveFrame still correctly awards no win while pending. (2) bprint('Starting second round...') chat line is not emitted (cosmetic; the centerprint IS sent)."
    - "Presentation: the waypoint sprites + health bars are spawned/updated/ticked SERVER-SIDE (and the net layer is structured to read WaypointSprites.Active per peer) but there is NO client render/networking path yet — no on-screen objective marker, health bar, or radar icon actually reaches the player. The destructible-heal sprite update is likewise server-only. So the underlying objective-marker LOGIC is now faithful+live, but the visible presentation is still absent."
    - "Bot fidelity residual: RoleAssault now rates only active-objective destructibles with Base radii/ratingscale, but still omits the 120s havocbot_role_timeout, the PVS-best-waypoint pick around each target, and the havocbot_attack_time 2s commitment window. Behaviorally faithful; the commitment/timeout nuance is approximate."
    - "Unmapped Base hooks (registry coverage gaps): MUTATOR_HOOKFUNCTION(as, OnEntityPreSpawn) deletes info_player_team1-4 (foreign team spawns); MUTATOR_HOOKFUNCTION(as, VehicleInit) sets veh.nextthink=time+0.5; MUTATOR_HOOKFUNCTION(as, PlayHitsound) returns true for a func_assault_destructible victim. None have a port equivalent and none had a registry row."
