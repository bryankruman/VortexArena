    - "STILL the worst gap: the match never ENDS via Assault on any live path. DestroyFinalObjective IS reached live (damage chain), but its only caller passes isFinalRound=State.Round>=1 (always false in round 1), round 2 is dead (StartSecondRound has ZERO callers), and the new campaign branch is dead because TargetUtilities.IsCampaign is declared but NEVER assigned anywhere. So destroying the core still leaves WinningTeam set but MatchEnded=false — won-but-not-ended limbo, even in single-round campaign."
