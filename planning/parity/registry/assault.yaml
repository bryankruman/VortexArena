# OPUS re-audit 2026-06-27 (post Wave 16/17, commit 2f0bfdb): TWO real drifts, both UNDER-stated by the prior
# audit — the prior pass grepped `src/XonoticGodot.Net` (which holds NO net code; the net layer lives in
# `game/net/`) and so wrongly recorded the Assault waypoint sprites + the round freeze as missing/non-enforced.
# Re-read the CURRENT port end-to-end; both gaps actually CLOSED in Wave 17 ("presentation consumers", 2f0bfdb):
#
# DRIFT 1 (FIX) — Objective waypoint sprite presentation: missing -> faithful, and the activate/heal sprite rows
#   partial -> faithful. There IS now a full client render + per-peer networking path:
#     - ServerNet.SendWaypoints (game/net/ServerNet.cs:1192, CALLED live at game/net/ServerNet.cs:493) iterates
#       WaypointSprites.Active (the same manager Assault.SpawnObjectiveSprite writes into), gates per-peer via
#       WaypointVisible (game/net/ServerNet.cs:1294 — honors VisibleForPlayer + SPRITERULE_TEAMPLAY), and writes
#       per-viewer SpriteFor (Defend/Destroy image, line 1229), the RADARICON_OBJECTIVE byte (1233), the orange
#       color, AND wp.Health (the objective HEALTH BAR, line 1240) + fade/helpme/maxdist.
#     - NetProtocol v9 added NetControl.Waypoints; ClientNet.HandleWaypoints (game/net/ClientNet.cs:542) decodes
#       into ClientNet.Waypoints (line 695).
#     - WaypointSpriteLayer (game/client/WaypointSpriteLayer.cs) draws the floating marker, the edge arrow, AND
#       the health bar (its header explicitly lists "Assault objectives" health bar). Wired in NetGame.cs:1618
#       (constructed, camera set) with Source = () => _client.Waypoints (NetGame.cs:1628).
#   So the attacker now gets an on-screen objective marker (Destroy/Defend), a health/progress bar, and a radar
#   icon. Drift attributed to Wave 17 (2f0bfdb added ServerNet/WaypointSpriteLayer). presentation: code_read at
#   BOTH ends confirms the full pipeline is wired + live; the visible pixels were not runtime-OBSERVED this audit
#   (no game launched), so verification stays code_read, confidence high on existence (a visual check would be
#   the only upgrade left).
#
# DRIFT 2 (FIX) — 5s AS_ROUND_DELAY inter-round FREEZE now enforced: the prior audit's residual gap on
#   assault.win.attacker_round + assault.round.second_round ("GameStopped = Intermission.Running||MatchEnded
#   ignores SecondRoundPending, so players keep moving during the window") is STALE. GameStopped is now
#   `Intermission.Running || MatchEnded || IsAssaultRoundFreeze` (GameWorld.cs:2159) and IsAssaultRoundFreeze
#   (GameWorld.cs:2170) = `GameType is Assault { SecondRoundPending: true }`. So movement/firing/regen/respawns
#   all halt for the 5s window exactly as QC's game_stopped=true. Added in Wave 17 (2f0bfdb). The only residual
#   round-flow gap left is the cosmetic bprint("Starting second round...") — which the port DOES emit via
#   aslt.BPrint (GameWorld.cs:2970 -> Commands.ChatBroadcast) — so even THAT is closed; the round half is now
#   fully faithful + live with no behavioral residual.
#
# No-drift rows (re-verified by reading the current code): mode.registration, objective.graph_spawn,
#   inactive_sentinel (1000f exact), decrease_and_score, advance_chain, win.attacker_round (logic),
#   round.second_round (logic), win.defender_timelimit, spawns.attacker_defender (AssaultSwapSpawnTeams
#   GameWorld.cs:4763), turret.roundstart_teamswap (AssaultTurretRoundstart GameWorld.cs:4729),
#   spawns.objective_evalfunc, config.warmup_incompatible (GameWorld.cs:2945-2955), notify.role_and_destroyed,
#   notify.play_hitsound (still live), mapobject.assault_wall (timing partial: per-frame vs 0.2s, parity-neutral).
# Bot Assault role (assault.bot.objective_role) stays timing-FAITHFUL: RoleAssault now BotObjectiveRoles.cs:774
#   (was :731), 120s AssaultRoleTimeout (line 791), 2s AssaultAttackTime window (set line 871), shell 500..1500.
# Port line numbers refreshed: RoleAssault 731->774; MutatorHooks.FirePlayHitsound 635->667; DamageSystem call
#   stays :352; GameWorld GameStopped 2159 (now includes IsAssaultRoundFreeze @2170); DriveGametypeFrame Assault
#   arm 3458; AssaultTurretRoundstart 4729; AssaultSwapSpawnTeams 4763; OnSecondRoundRestart 2971; Assault
#   Activate arm 2936; ReadLevelCvars override 2945-2955; WireObjectiveSpawns Assault arm 3223.
# Two unmapped hooks NOW MAPPED since the prior audit: OnEntityPreSpawn (Assault.OnEntityPreSpawn @Assault.cs:733
#   deletes info_player_team1-4, registered Assault.cs:637) and VehicleInit (Assault.OnVehicleInit @Assault.cs:745
#   nextthink+0.5, registered Assault.cs:642). The prior "still new_unmapped" note is stale.
summary:
  feature_count: 19
  worst_gaps:
    - "FIX (Wave 17, 2f0bfdb): the objective WAYPOINT SPRITES are now fully presented to the player. The prior audit recorded presentation:missing because it grepped src/XonoticGodot.Net (empty) — the net layer is in game/net/. The real pipeline: Assault.SpawnObjectiveSprite -> WaypointSprites.Active -> ServerNet.SendWaypoints (game/net/ServerNet.cs:1192, called live @493) serializes per-peer SpriteFor (Defend/Destroy) + RADARICON_OBJECTIVE + orange color + wp.Health (the health BAR) -> ClientNet.HandleWaypoints (game/net/ClientNet.cs:542) -> WaypointSpriteLayer (game/client/WaypointSpriteLayer.cs, drawn; health bar listed in its header) wired in NetGame.cs:1618/1628. The attacker now sees the objective marker, health/progress bar, and radar icon. presentation missing->faithful (waypoint_sprite); activate + destructible_heal sprite rows partial->faithful."
    - "FIX (Wave 17, 2f0bfdb): the 5s AS_ROUND_DELAY inter-round FREEZE is now enforced. GameStopped (GameWorld.cs:2159) = Intermission.Running || MatchEnded || IsAssaultRoundFreeze, and IsAssaultRoundFreeze (GameWorld.cs:2170) = Assault{SecondRoundPending:true} — so movement/firing/regen/respawns halt for the window exactly as QC's game_stopped=true. The prior 'does NOT actually freeze' residual on win.attacker_round + round.second_round is CLOSED. bprint('Starting second round...') IS emitted (Assault.cs:856 via aslt.BPrint=Commands.ChatBroadcast, GameWorld.cs:2970), so the round half has NO behavioral residual left."
    - "Round-flow logic all LIVE (no drift): spawn-point team swap (AssaultSwapSpawnTeams GameWorld.cs:4763), roundstart turret team-swap + unteamed seeding (AssaultTurretRoundstart GameWorld.cs:4729), destructible heal (HealDestructible + GtEventHeal), objective-aware spawn evalfunc (ShouldRejectSpawnSpot in SpawnSystem.ScoreSpot), warmup-incompatible ReadLevelCvars override (g_warmup=0 + sv_ready_restart_after_countdown=0, GameWorld.cs:2945-2949) + timelimit=20 mapinfo default (GameWorld.cs:2954)."
    - "PlayHitsound (assault.notify.play_hitsound) stays LIVE (no drift): MutatorHooks.FirePlayHitsound (MutatorHooks.cs:667, was 635) called from DamageSystem.Apply (DamageSystem.cs:352) for every non-player victim hit by a player attacker; the registered Assault.OnPlayHitsound handler is reached on the live damage path. liveness live, audio faithful."
    - "Bot Assault role stays timing-FAITHFUL (no drift). RoleAssault (now BotObjectiveRoles.cs:774, was :731): 120s AssaultRoleTimeout (line 791), 2s AssaultAttackTime window (set line 871), PVS-best-waypoint shell 500->1500, RatingGenerator 20000, radii 650/3000, items 30000/10000."
    - "Two previously-unmapped Base hooks NOW MAPPED (since the prior audit): OnEntityPreSpawn (Assault.OnEntityPreSpawn @Assault.cs:733 deletes info_player_team1-4, registered :637) and VehicleInit (Assault.OnVehicleInit @Assault.cs:745 nextthink+0.5, registered :642). Prior 'still new_unmapped' note is stale."
    - "Residual (cosmetic only): mapobject.assault_wall re-evaluates per-frame vs QC's 0.2s nextthink (parity-neutral, transition-gated); QC's func_breakable_colormod color tint on a healed wall is not modeled. No behavioral gaps remain."
