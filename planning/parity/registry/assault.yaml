last_audited: "2026-06-22"
summary:
  feature_count: 18
  worst_gaps:
    - "Match-end now works in CAMPAIGN but NOT in a normal multiplayer match. The per-frame WinningCondition_Assault is now genuinely LIVE (DriveGametypeFrame:1817 calls aslt.DriveFrame(Time) every tick, and TargetUtilities.IsCampaign is now ASSIGNED at GameWorld.cs:567, live via NetGame.Boot). So with g_campaign=1 a single-round Assault ENDS correctly on both the attacker-destroys-core path (DestroyFinalObjective campaign branch) and the defender-timelimit path (DriveFrame -> TimeLimitReached(isFinalRound:true)). BUT in a normal (non-campaign) match, round 1 destruction/timeout sets WinningTeam yet leaves MatchEnded=false because the second round never begins (StartSecondRound still has ZERO callers) — the QC `ent.cnt==1` second-round-end half is unmodeled. Won-but-not-ended limbo persists for non-campaign play."
    - "No second round: StartSecondRound() still has ZERO live callers (only doc-comment refs in Assault.cs). Roles never swap; the faster-destroyer overall winner is never decided; the 5s AS_ROUND_DELAY freeze + ReadyRestart_force map reset + 'Starting second round' are unimplemented. EnableRounds() is deliberately NOT called for Assault (GameWorld.cs:1519 comment); Assault runs entirely off the per-frame DriveFrame — which is correct architecture, but the round-2 swap that DriveFrame's design depends on has no driver."
    - "Default timelimit=20 (QC mapinfo default args 'timelimit=20') still not represented in the port's Assault mapinfo defaults; DriveFrame reads the live 'timelimit' cvar, so the defender-timelimit win only fires if a timelimit is actually configured. If timelimit=0 the round is undecidable except by objective destruction."
    - "Presentation/UX still absent: no objective waypoint sprites, health bars, or radar icons; func_assault_wall consumed as a no-op (geometry never toggles with objective health); roundstart turret team-swap unimplemented; destructible heal/event_heal absent; objective .message centerprint absent; objective-aware spawn evalfunc absent; warmup-incompatible ReadLevelCvars override absent."
