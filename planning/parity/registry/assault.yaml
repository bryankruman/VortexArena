last_audited: "2026-06-25"
# Re-audited 2026-06-25 (drift check): ONE real drift since the prior same-day audit — the QC
# MUTATOR_HOOKFUNCTION(as, PlayHitsound) hook now HAS a port equivalent (Assault.OnPlayHitsound,
# registered into MutatorHooks.PlayHitsound in Activate). It is no longer a registry coverage gap, so
# it graduates from new_unmapped to its OWN feature row (assault.notify.play_hitsound). BUT the hook
# chain is DEAD: MutatorHooks.FirePlayHitsound (MutatorHooks.cs:535) has ZERO callers — the port's
# hitsound is driven entirely by the STAT(HITSOUND_DAMAGE_DEALT_TOTAL) accumulator (DamageSystem.cs:337-343,
# player-victims only) and never consults the PlayHitsound mutator hook. So the handler is registered but
# unreachable (liveness: dead). Behaviorally parity-neutral (a func_assault_destructible victim isn't a
# player so neither path fires a hitsound for it), but the code now exists and is dead.
# All other 18 rows: no status/liveness drift. Port line numbers refreshed — GameWorld.cs grew ~300-400
# lines since the prior audit (AssaultTurretRoundstart 3919->4248, AssaultSwapSpawnTeams 3953->4282,
# Assault Activate arm 2327-2331->2560-2562, OnSecondRoundRestart 2350->2581, GameStopped 1678->1878,
# DriveFrame drive 2814->3045, WireObjectiveSpawns 2573->2746). Two unmapped hooks remain with no port
# equivalent (OnEntityPreSpawn delete info_player_team1-4; VehicleInit nextthink+0.5) — still new_unmapped.
summary:
  feature_count: 19
  worst_gaps:
    - "Wave 6a closed most of the round-flow + UX-logic gaps; all still LIVE this re-audit (line numbers drifted, symbols intact). Spawn-point team swap (AssaultSwapSpawnTeams, GameWorld.cs:4282), roundstart turret team-swap + unteamed-turret seeding (AssaultTurretRoundstart, GameWorld.cs:4248), the objective waypoint-sprite server state (SpawnObjectiveSprite + WaypointSprites.Think), the destructible heal path (HealDestructible + GtEventHeal), the objective-aware spawn evalfunc (ShouldRejectSpawnSpot wired in SpawnSystem.ScoreSpot), the warmup-incompatible ReadLevelCvars override (g_warmup=0 + sv_ready_restart_after_countdown=0, GameWorld.cs:2560-2561) and the timelimit=20 mapinfo default (GameWorld.cs:2567-2568) are all LIVE. The bot Assault role rates the QC active-objective filter + correct radii (650/3000) and ratingscale (20000)."
    - "NEW (this audit): the QC PlayHitsound hook is now ported (Assault.OnPlayHitsound, registered in Activate) but DEAD — MutatorHooks.FirePlayHitsound has no callers; the hitsound pipeline uses STAT(HITSOUND_DAMAGE_DEALT_TOTAL) and never fires the hook. Registered handler, unreachable. Parity-neutral."
    - "Residual round machinery (UNCHANGED): (1) the 5s AS_ROUND_DELAY freeze still does NOT actually freeze the game — GameStopped (GameWorld.cs:1878 = Intermission.Running||MatchEnded) ignores SecondRoundPending, so players keep moving/firing/respawning during the inter-round window (QC sets game_stopped=true). DriveFrame still correctly awards no win while pending. (2) bprint('Starting second round...') chat line is not emitted (cosmetic; the centerprint IS sent)."
    - "Presentation: the waypoint sprites + health bars are spawned/updated/ticked SERVER-SIDE (WaypointSprites.Active exists, Waypoints.cs:244) but there is NO client render/networking path yet — nothing in src/XonoticGodot.Net reads WaypointSprites, so no on-screen objective marker, health bar, or radar icon reaches the player. The destructible-heal sprite update is likewise server-only. The objective-marker LOGIC is faithful+live; the visible presentation is still absent."
    - "Bot fidelity residual: RoleAssault now rates only active-objective destructibles with Base radii/ratingscale, but still omits the 120s havocbot_role_timeout, the PVS-best-waypoint pick around each target, and the havocbot_attack_time 2s commitment window. Behaviorally faithful; the commitment/timeout nuance is approximate."
    - "Unmapped Base hooks (registry coverage gaps): MUTATOR_HOOKFUNCTION(as, OnEntityPreSpawn) deletes info_player_team1-4 (foreign team spawns) — the OnEntityPreSpawn hook chain now exists (MutatorHooks.cs:680, used by NixMutator) but Assault registers no handler on it; MUTATOR_HOOKFUNCTION(as, VehicleInit) sets veh.nextthink=time+0.5. Neither has a port equivalent. (PlayHitsound is no longer here — it graduated to a feature row.)"
