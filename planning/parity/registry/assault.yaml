    - "Timelimit never resolves the match for the defenders: DriveFrame has no caller and DriveGametypeFrame still has no Assault arm, so a defended objective past the time limit declares no winner. Default timelimit=20 still not represented."
    - "No objective waypoint sprites, health bars, or radar icons (unchanged). func_assault_wall still consumed as a no-op; turret roundstart team-swap still unimplemented; destructible heal still absent."
