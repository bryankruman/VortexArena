unit: assault
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 18
  worst_gaps:
    - "The match never ENDS via Assault on any live path: DestroyFinalObjective's only caller can never pass isFinalRound=true (round 2 is dead, campaign is not detected), so destroying the core leaves WinningTeam set but MatchEnded=false — won-but-not-ended limbo even in single-round campaign."
    - "No second round: roles never swap, round 2 never starts (StartSecondRound/FirstRoundDestroyTime have ZERO callers); EnableRounds() runs for Assault but with no round callbacks."
    - "Timelimit never resolves the match for the defenders: TimeLimitReached has no caller and DriveGametypeFrame has no Assault arm, so a defended objective past the time limit declares no winner. Default timelimit=20 also not represented."
    - "All three assault notifications (attacking/defending/objective-destroyed) are registered (Base-exact text) but never sent — Assault subscribes only to Combat.Death, not the existing MutatorHooks.PlayerSpawn."
    - "No objective waypoint sprites at all: attackers get no on-screen marker, health bar, or radar icon for objectives. func_assault_wall consumed as a no-op; turret roundstart team-swap unimplemented."
