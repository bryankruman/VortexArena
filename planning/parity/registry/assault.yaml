summary:
  feature_count: 18
  worst_gaps:
    - "Second round is now GENUINELY LIVE (the big fix this wave). DestroyFinalObjective's round-1 non-campaign branch sets SecondRoundPending + _secondRoundDueAt = now + RoundDelay(5s); DriveFrame (live per-tick via OnEndFrame->DriveGametypeFrame:2034) fires StartSecondRound once the delay elapses, swapping AttackerTeam, re-arming the objective chain, and invoking OnSecondRoundRestart (assigned at GameWorld.cs:1707 to ResetMap(fakeRoundStart:true)). Roles swap, round-2 timelimit is set from FirstRoundDestroyTime, and the faster-destroyer overall winner is decided. Won-but-not-ended limbo is GONE for both attacker-win and defender-timelimit non-campaign paths. Verified by AssaultSpawnTests.AttackerWin_SchedulesSecondRound_ThenSwapsRolesAfterTheDelay."
    - "Residual round machinery gaps: (1) the 5s AS_ROUND_DELAY freeze does NOT actually freeze the game — GameStopped is a computed property (Intermission||MatchEnded||Timeout) that ignores SecondRoundPending, so players keep moving/firing/respawning during the inter-round window (QC sets game_stopped=true). DriveFrame still correctly awards no win while pending. (2) info_player_attacker/defender spawn points keep their fixed red/blue team stamps and never swap with the roles (QC swaps g_saved_team.team_saved each round), so on round 2 the blue attackers spawn at the geographically-defender location. (3) roundstart turret team-swap still unimplemented."
    - "Default timelimit=20 (QC mapinfo default args 'timelimit=20') still not represented in the port's Assault mapinfo defaults; DriveFrame reads the live 'timelimit' cvar, so the defender-timelimit win only fires if a timelimit is actually configured. If timelimit=0 the round is undecidable except by objective destruction."
    - "Presentation/UX still absent: no objective waypoint sprites, health bars, or radar icons; destructible heal/event_heal absent; objective .message centerprint absent; objective-aware spawn evalfunc absent; warmup-incompatible ReadLevelCvars override absent. (func_assault_wall is now FIXED — DriveWalls toggles its solid/model with objective health.)"
