      - "No two-sample cos/sin crossfade: Base's in-range branch plays the floor sample at cos(pi/2 m/step) AND the upper neighbour at sin(...) for a smooth timbre blend; the port plays only the floor neighbour at full volume (residual PITCH is shifted via 2^(m/12), but the upper-neighbour timbre blend needs a second emitter and is unported)."
