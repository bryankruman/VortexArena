unit: weapon-tuba
category: weapon
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "Tuba blast carries NO HITTYPE bits: the int-deathtype path (Tuba.NoteOn -> WeaponSplash.RadiusDamage -> WeaponFiring.ApplyDamage) maps a weapon id to 'weapon/tuba' with no suffix, so HITTYPE_SOUND, HITTYPE_SECONDARY and HITTYPE_BOUNCE are all structurally unrepresentable"
    - "Missing HITTYPE_SOUND => tuba damages TEAMMATES in team modes; Base flags the blast HITTYPE_SOUND so DamageSystem's same-team sound rule makes it never hurt teammates"
    - "Obituary is permanently WEAPON_TUBA_*: secondary fire never reads ACCORDEON (the secondary bit is dropped) and instrument bits never set; reload to switch instruments is dead anyway"
    - "Reload never cycles instruments (Tuba.Reload has no caller; base WrReload no-ops without Reloadable flag) — Accordion/Klein Bottle are unreachable"
    - "No sustained/pitched/fading tuba note sound; the stub plays 'weapons/tuba_loopnote.wav' which does NOT exist in port data (real samples are per-pitch .ogg) -> likely silent"
    - "Per-note smoke ring effect never emitted; melody recognition + magic-ear chat not ported; wr_aim (bot fire) and wr_setup (instrument reset) not ported"
