summary:
  feature_count: 10
  worst_gaps:
    - "Note sound is still largely silent: NoteSample now builds the real per-pitch/instrument name (closing the flat 'tuba_loopnote.wav' dead-asset), BUT it does a raw ftos(note) lookup with NO pitch-step rounding, and most GetNote outputs (2,3,4,5,1,7,9,10,11,-1,-5,-4) are NOT multiples of 6 so they have NO asset on disk (only -18/-12/-6/0/6/12/18/24 exist). Base's CSQC tubasound rounds note to the nearest multiple of cl_tuba_pitchstep and pitch-shifts via sound7; that crossfade/fade/sustain/ENT_CLIENT_TUBANOTE networking is unported."
    - "Melody recognition + magic-ear chat (W_Tuba_HasPlayed / tuba_lastnotes) still entirely missing — maps that gate logic on a played tune cannot work."
    - "wr_aim (bot fire) still missing — bots won't use the tuba."
    - "Sustained note entity has no NoteThink: no self-expiry on teleport_time, no per-listener re-origin/SendFlags, no tuba_lastnotes record on NoteOff."
    - "GetNote still derives movestate from velocity (intended divergence) and omits crouch/jump/team pitch shifts — inaudible while the note sound is unported."
