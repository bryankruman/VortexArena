    constants:
      - { name: "asset name scheme", base: "TUBA_STARTNOTE: 'tuba'+(i?ftos(i):'')+'_loopnote'+ftos(n)", port: "'weapons/tuba'+(i!=0?i:'')+'_loopnote'+note+'.wav' (Tuba.cs:371-376)", match: true }
      - { name: "available samples on disk", base: "only notes at cl_tuba_pitchstep=6 multiples in TUBA_MIN..MAX per 3 instruments", port: "PitchStepBaseNote returns the on-disk floor/upper neighbour (multiple of 6) so the lookup hits a REAL file", match: true }
      - { name: "cl_tuba_pitchstep rounding", base: "6; tubasound takes m=pymod(note,step), plays the floor neighbour", port: "honored — PitchStepBaseNote (Tuba.cs:286-323) reads cl_tuba_pitchstep (default 6), m=pymod, floor/upper neighbour branches match tuba.qc:449-477, exact-pitch when step<=0", match: true }
      - { name: "sound7 residual pitch shift 2^(m/12)", base: "speed1 = 2^(m/12) (or 2^((m-step)/12) at the low edge)", port: "honored — PitchStepBaseNote returns speed=2^(m/12) / 2^((m-step)/12), passed as engine pitch to Api.Sound.Play (Tuba.cs:207-210)", match: true }
      - { name: "cl_tuba_pitchstep crossfade (vol1/vol2 cos/sin)", base: "in-range branch plays BOTH neighbours: vol1=cos(pi/2 m/step) on floor + vol2=sin(...) on upper for a timbre blend", port: "not honored — plays the floor neighbour only at full volume, no upper-neighbour blend (needs a second emitter)", match: false }
      - { name: "cl_tuba_volume", base: "1", port: "honored — vol = clamp(VOL_BASE * cl_tuba_volume, 0, 1) (Tuba.cs:208, TubaVolumeCvar)", match: true }
      - { name: "cl_tuba_attenuation", base: "0.5", port: "honored — attenuation = cl_tuba_attenuation (Tuba.cs:210, TubaAttenuationCvar)", match: true }
      - { name: "cl_tuba_fadetime", base: "0.25 (Ent_TubaNote_Think ramps volume down on release)", port: "not honored — NoteOff Stops the loop cleanly, no fade-out ramp", match: false }
      - { name: "sustained loop vs one-shot", base: "held tuba_note entity = one persistent loop on CH_TUBA_SINGLE", port: "honored — Api.Sound.Play(loop:true) on CH_TUBA, replaced on pitch/instrument change, Stopped by NoteOff (Tuba.cs:209-210,255)", match: true }
    status:
      logic: faithful
      values: partial
      timing: partial
      presentation: partial
      audio: faithful
      liveness: live
    intended_divergence: false
    divergence_rationale: null
