      - "src/XonoticGodot.Common/Gameplay/Notifications/DeathMessages.cs:168"
    constants:
      - { name: "HITTYPE_SECONDARY on secondary fire", base: "wr_think OR's HITTYPE_SECONDARY (tuba.qc:345)", port: "never set (int path drops it)", match: false }
      - { name: "HITTYPE_SECONDARY when instrument&1", base: "OR'd in W_Tuba_NoteOn (tuba.qc:268)", port: "never set", match: false }
      - { name: "HITTYPE_BOUNCE when instrument&2", base: "OR'd in W_Tuba_NoteOn (tuba.qc:270)", port: "never set", match: false }
    status:
      logic: partial
      values: missing
      timing: na
      presentation: missing
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "ROOT CAUSE is structural, not a one-line bug: Tuba.NoteOn passes deathType = RegistryId (an int), and WeaponSplash.RadiusDamage -> WeaponFiring.ApplyDamage maps that id to the bare string 'weapon/tuba' with NO HITTYPE suffix. The string deathtype scheme (DeathTypes) can carry sound/secondary/bounce, but the int weapon-id call path used by the tuba blast cannot encode any of them."
      - "Consequently the obituary is ALWAYS WEAPON_TUBA_MURDER/_SUICIDE. Even SECONDARY fire (which in Base reads ACCORDEON regardless of instrument, because wr_think OR's HITTYPE_SECONDARY) reads TUBA — the draft framed this as only an instrument-bit issue, but the secondary-fire distinction is also lost."
      - "Accordion/Klein Bottle obituary branches are doubly unreachable: instrument bits are never emitted AND the instrument cycle (weapon-tuba.reload.instrument_cycle) is dead."
    verification:
      - { kind: read, ref: "Tuba.NoteOn deathType=RegistryId; WeaponFiring.ApplyDamage -> FromWeapon(NetName) drops HITTYPE bits", result: fail }
      - { kind: read, ref: "DeathMessages.SelectKill/SuicideMessage read sec/bounce via DeathTypes.HasHitType; tuba tag never carries them", result: fail }
    confidence: high
    notes: "The DeathMessages mapping (BOUNCE->KLEINBOTTLE, SECONDARY->ACCORDEON, else TUBA) is faithful and all 6 notifications are registered; it simply never receives any HITTYPE bit. values downgraded to missing (no bit is ever produced); presentation downgraded to missing (no instrument/secondary obituary can ever fire)."

