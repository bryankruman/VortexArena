    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "MISSING HITTYPE_SOUND: Base sets hittype = HITTYPE_SOUND before W_SetupShot/RadiusDamage so the blast is a sound attack that NEVER hits teammates (DamageSystem.Apply honors this exact same-team rule, DamageSystem.cs:94-97). Tuba.NoteOn passes deathType = RegistryId with no sound bit, so in team modes the tuba blast inflicts friendly fire that Base suppresses — a real gameplay-logic divergence."
      - "The blast damage/force/radius and refire gating are otherwise bit-faithful and live (WeaponFireDriver -> WrThink(Primary) -> NoteOn -> WeaponSplash.RadiusDamage every tick)."
      - "Blast centered on actor.Origin (Base inflictor=actor with the actor's origin) — equivalent, no observable difference."
    verification:
      - { kind: value-diff, ref: "Tuba.Configure() vs bal-wep-xonotic.cfg:572-578", result: pass }
      - { kind: trace, ref: "WeaponFireDriver.Frame -> Tuba.WrThink(Primary) -> NoteOn -> WeaponSplash.RadiusDamage", result: pass }
      - { kind: read, ref: "WeaponFiring.ApplyDamage maps int id -> FromWeapon(NetName) = 'weapon/tuba' (no HITTYPE suffix); DamageSystem.cs:94-97 same-team sound rule never triggers", result: fail }
    confidence: high
    notes: "Downgraded from the draft's logic:faithful. The continuous note is restructured into every-tick WrThink(Primary) + a refire gate, which is fine; the defect is that the port's int-deathtype channel cannot carry HITTYPE_SOUND, so the tuba's defining 'never hurts teammates' rule is lost in team play."

