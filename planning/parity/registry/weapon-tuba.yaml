summary:
  feature_count: 11
  worst_gaps:
    - "Note SOUND is now a SUSTAINED pitched loop: NoteOn plays Api.Sound.Play(loop:true) on CH_TUBA with the on-disk floor-neighbour sample (PitchStepBaseNote) AND the 2^(m/12) residual pitch-shift passed as the engine pitch, at VOL_BASE*cl_tuba_volume / cl_tuba_attenuation; NoteOff Stops it. Remaining residuals: the two-sample cos/sin crossfade (upper-neighbour timbre blend) and the cl_tuba_fadetime release ramp are unported, and there is no ENT_CLIENT_TUBANOTE networking (remote players' notes still not driven by a dedicated note entity)."
    - "GetNote still derives movestate from velocity (intended divergence) and omits crouch/jump/team pitch shifts — now AUDIBLE since the note loop plays, but only changes which sample/pitch is heard, not whether a sound plays."
    - "Per-instrument view models (h_akordeon/h_kleinbottle via CSQC weaponname/wr_viewmodel) still unwired (render-only)."
    - "Melody recognition is LIVE+faithful (HasPlayed wired into the magic-ear pipeline); only the cosmetic 'NAME played on the @!#%'n Tuba: ...' bprint chat line on a recognised melody is still unwired."
    - "MENUQC weapon-guide describe text is now PORTED (Tuba.GuideDescription, live via DialogMediaGuide); only the dynamic Keybinds/DPS trailing paragraphs are omitted (by design, matching the Electro guide)."
