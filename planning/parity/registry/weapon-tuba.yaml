      - { kind: read, ref: "vol=clamp(VOL_BASE*cl_tuba_volume,0,1), attenuation=cl_tuba_attenuation (TubaVolumeCvar/TubaAttenuationCvar, Tuba.cs:208-210,325-337) — matches tubasound _sound args", result: pass }
      - { kind: read, ref: "NoteOff (Tuba.cs:255) calls Api.Sound.Stop(actor, CH_TUBA) to end the held loop; SoundChannel.Tuba=5 single-channel (Services.cs:121) so re-emitting REPLACES rather than stacks", result: pass }
