summary:
  feature_count: 11
  worst_gaps:
    - "Note SOUND has no sustain/fade/pitch-shift: the port now snaps the requested note to the nearest on-disk multiple-of-6 sample (PitchStepNote) so the lookup resolves to a REAL file (closing the baseline's raw-note miss), but it still fires one static one-shot per ~0.05s blast tick rather than Base's held loop that crossfades between two neighbour samples (sound7 speed shift) and fades on release (cl_tuba_fadetime). No ENT_CLIENT_TUBANOTE networking / cl_tuba_volume/attenuation."
    - "GetNote still derives movestate from velocity (intended divergence) and omits crouch/jump/team pitch shifts — inaudible while the sustained note sound is unported."
    - "Per-instrument view models (h_akordeon/h_kleinbottle via CSQC weaponname/wr_viewmodel) still unwired (render-only)."
    - "Melody recognition is now LIVE+faithful (HasPlayed wired into the magic-ear pipeline); only the cosmetic 'NAME played on the @!#%'n Tuba: ...' bprint chat line on a recognised melody is still unwired."
