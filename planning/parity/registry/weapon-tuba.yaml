      - { name: "damage", base: "5", port: "5", match: true }
      - { name: "edgedamage", base: "0", port: "0", match: true }
      - { name: "force", base: "40", port: "40", match: true }
      - { name: "radius", base: "200", port: "200", match: true }
      - { name: "refire", base: "0.05", port: "0.05", match: true }
