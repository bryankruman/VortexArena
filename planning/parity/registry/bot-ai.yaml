summary:
  feature_count: 29
  worst_gaps:
    - "Teamplay item-sharing missing: no friends-aware pickup check (bot_ai_friends_aware_pickup_radius) and no cross-bot per-item ratingscale dedup — team bots race teammates (and each other) for the same pickup. (NEW 2026-07-02 coverage fold.)"
    - "Bot scripting entirely missing: the bot_cmd command queue does nothing, so map/console bot scripts, cutscene-driven bots, and g_waypointeditor bot driving are inert. (UNCHANGED.)"
    - "Jetpack NAVIGATION (cross jetpack-only gaps) is still missing; the trigger_hurt jetpack/rocketjump ESCAPE half is live (skill>6). (UNCHANGED 2026-06-28 fourth pass.)"
    - "wr_aim has no MAX_WEAPONSLOTS per-slot loop — only the ChosenWeapon's wr_aim is consulted each think; Base runs wr_aim for every owned slot. (Per-weapon coverage is faithful for the 18 headline weapons.) (UNCHANGED.)"
    - "havocbot_dodge is ported (SUPERBOT-gated projectile flight-path evade, live) and 15 port files flag Entity.BotDodge (all weapon projectiles + OkRpc + PhaserTurret beam) vs Base's 20 producers — missing: monsters (golem/spider), the napalm nade, the grappling hook, the generic sv_turrets producer. Non-SUPERBOT bots still only strafe via the generic CombatMovement. (UNCHANGED.)"
    - "Ballistic aim is a closed-form gravity-drop approximation, not QC's 10-trace tracetoss search; lobbed-weapon aim (mortar/nade) is less accurate and never traces the world to confirm the toss lands. (UNCHANGED.)"
    - "Goal rating route-cost is NOW WIRED (multi-seed Dijkstra via SeedRoute, live) — residual: the generic DM role still passes a flat rangebias=2000 for items/enemies/roam (objective roles like CTS vary it), and there is no separate _movingtarget (5.5 s) strategy interval. (NARROWED 2026-06-28 fourth pass.)"
    - "Weapon picking reads the QC far/mid/close priority lists + combo-hold (faithful) but still omits bot_rangepreference (per-bot sniper/spammer range shift). (UNCHANGED.)"

