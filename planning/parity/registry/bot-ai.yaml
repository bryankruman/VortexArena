unit: bot-ai
category: bot
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 21
  worst_gaps:
    - "Only the primary attack is ever driven (ButtonAttack2 is hardcoded false): the per-weapon wr_aim that QC calls each think — which decides SECONDARY fire, charge-up/release, projectile detonation and weapon combos (mortar airburst, electro combo, devastator detonate, hagar burst, vortex charge) — is never invoked, so bots never use alt-fire or detonate/combo."
    - "Combat movement is invented (periodic strafe-direction flip + health-advantage close/flee bias), not QC havocbot_dodge which sidesteps specific incoming projectiles by their flight path; bots don't specifically dodge a rocket the way stock bots do."
    - "Bot scripting entirely missing: the bot_cmd command queue (PAUSE/CONTINUE/WAIT/TURN/MOVETO/AIM/PRESSKEY/RELEASEKEY/SELECTWEAPON/IMPULSE/IF/ELSE/FI/BARRIER/SOUND/CC/CONSOLE) does nothing, so map/console bot scripts, cutscene-driven bots, and g_waypointeditor bot driving are inert."
    - "Weapon picking is a hitscan-at-range / splash-up-close bucket choosing the highest-impulse owned weapon, not the QC ordered far/mid/close priority lists; bots mis-prioritize weapons vs stock (e.g. won't reliably prefer Vortex at long range, Shotgun point-blank)."
    - "No weapon-combo behaviour (bot_ai_weapon_combo): bots don't hold a weapon for a follow-up combo shot."
    - "Keyboard-movement emulation missing: port bots emit a fully analog wish-move at all skills, so they strafe/turn more precisely than stock bots below skill 10 (a feel difference; stock low-skill bots have quantized, jerkier movement)."
    - "Goal rating uses straight-line inverse distance (f*rangebias/(rangebias+dist)) instead of the QC waypoint-cost (Dijkstra) field; bots can prefer a goal near in a straight line but far by path (across a gap/wall), picking worse objectives than stock."
    - "Idle-reload logic missing: port bots never reload between fights, so reloadable weapons run dry mid-combat more than stock; the skill>=2 held-reload and skill>=5 inventory pre-reload behaviours are absent."
    - "Jetpack navigation (take off / fly to point / brake-land) is missing: bots can't cross jetpack-only gaps even with bot_ai_navigation_jetpack on."

