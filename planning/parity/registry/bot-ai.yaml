unit: bot-ai
category: bot
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 21
  worst_gaps:
    - "Only the primary attack is ever driven (ButtonAttack2 is hardcoded false): the per-weapon wr_aim that QC calls each think — which decides SECONDARY fire, charge-up/release, projectile detonation and weapon combos (mortar airburst, electro combo, devastator detonate, hagar burst, vortex charge) — is never invoked, so bots never use alt-fire or detonate/combo. (UNCHANGED by Waves 1-2.)"
    - "Combat movement is invented (periodic strafe-direction flip + health-advantage close/flee bias), not QC havocbot_dodge which sidesteps specific incoming projectiles by their flight path; bots don't specifically dodge a rocket the way stock bots do. (UNCHANGED.)"
    - "Bot scripting entirely missing: the bot_cmd command queue (PAUSE/CONTINUE/WAIT/TURN/MOVETO/AIM/PRESSKEY/RELEASEKEY/SELECTWEAPON/IMPULSE/IF/ELSE/FI/BARRIER/SOUND/CC/CONSOLE) does nothing, so map/console bot scripts, cutscene-driven bots, and g_waypointeditor bot driving are inert. (UNCHANGED.)"
    - "Weapon picking is a hitscan-at-range / splash-up-close bucket choosing the highest-impulse owned weapon, not the QC ordered far/mid/close priority lists; bots mis-prioritize weapons vs stock. No weapon-combo behaviour. (UNCHANGED.)"
    - "Goal rating still uses straight-line inverse distance (f*rangebias/(rangebias+vlen(dist))) instead of the QC waypoint-cost (Dijkstra) field, and rangebias is still hardcoded 2000 at every call; bots can prefer a goal near in a straight line but far by path. (Wave-2 added the powerup time-item lead + roam-shell + enemy water/speed filters, but the headline distance metric is UNCHANGED.)"
    - "Per-waypoint danger-cost ROUTING is still inert: Wave-2 added a Waypoint.Danger field and made A* add it (cost + nb.Danger), but NOTHING sets Danger (no botframe_updatedangerousobjects producer), so it is always 0 — the consumer is dead. Routing still doesn't detour around chronically dangerous waypoints."
    - "Keyboard-movement emulation, jetpack navigation, and rocketjump/trigger_hurt escape are all still missing. (UNCHANGED.)"

