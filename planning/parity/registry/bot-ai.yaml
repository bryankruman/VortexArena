last_audited: "2026-06-27"
# Drift re-audit (2026-06-27) on branch claude/parity-port-waves. The previous 2026-06-25 baseline was STALE
# relative to the current code (BotBrain/BotAim/BotPopulation edited 2026-06-26). All drift this pass is FIXES;
# NO regressions, NO newly-unmapped Base features. Concrete improvements found:
#   (1) bot-ai.combat.dodge: havocbot_dodge is NOW PORTED (BotBrain.HavocbotDodge, called live from ThinkProduce):
#       a faithful port of havocbot.qc:1773 — SUPERBOT-gated (skill>100) flight-path scan over bot_dodge-flagged
#       edicts, returning a world-space evade vector folded into the wish-move (skill-scaled, checkdanger-vetoed,
#       upward-dodge jump). The previous "havocbot_dodge not ported / deferred" gap is closed for the consumer;
#       the generic CombatMovement strafe still runs for all skills as the non-SUPERBOT stand-in. Residual: only
#       3 port projectiles set Entity.BotDodge (Blaster/Porto + PhaserTurret beam) vs Base's ~20+ producers.
#   (2) bot-ai.weapon.wr_aim: coverage 8 -> 12 of Base's 18 wr_aim weapons (added Electro, Crylink, Arc, Porto).
#       The ELECTRO combo (electromooth primary/secondary toggle) is now a faithful port; Porto's wr_aim fire-veto
#       (BotForbidsFire in secondary mode) and CTS _independent_players fire-suppress are wired. Still missing:
#       mortar airburst, hagar burst, vortex charge, seeker, hlac, blaster wr_aim; still no MAX_WEAPONSLOTS loop.
#   (3) bot-ai.aim.fire: the long-range fire-hesitation chance + fire-timer now include the bot_aggresskill term
#       (BotAim aggr = skill + AggresSkill); the previous "omits bot_aggresskill" gap is CLOSED -> values faithful.
#   (4) bot-ai.aim.aimdir: the fire-cone factor now folds bot_aimskill (MaxFireDeviation f += (10-(skill+AimSkill))).
#   (5) bot-ai.population.namemodel: shirt/pants color columns (argv3/4) are NOW parsed -> packed 16*shirt+pants,
#       applied via Teamplay.SetColor in FFA + re-stamped after respawn (random-nibble fallback). logic -> faithful.
#   (6) bot-ai.skill.modifiers: the per-bot modifier set now carries FOUR facets (single knob + MoveSkill +
#       AggresSkill (argv11) + AimSkill (argv13)), not 1-2; bots.txt's two fire-relevant skill columns are read.
#   (7) bot-ai.aim.lead: the per-weapon BotAimShotSpeed override is now used by Crylink + Fireball too (not only
#       Devastator), narrowing the per-weaponentity-speed gap further.
# Still-OPEN worst-gaps (unchanged): straight-line goal rating (not Dijkstra) + flat rangebias=2000, dead
# danger-ROUTING producer, weapon-priority lists in weapon.choose, the 4 remaining headline combos
# (mortar/hagar/vortex/seeker), jetpack/rocketjump, bot scripting.
summary:
  feature_count: 21
  worst_gaps:
    - "Goal rating still uses straight-line inverse distance (f*rangebias/(rangebias+vlen(dist))) instead of the QC waypoint-cost (Dijkstra) field, and rangebias is still hardcoded 2000 at every call; bots can prefer a goal near in a straight line but far by path. (UNCHANGED.)"
    - "Per-waypoint danger-cost ROUTING is still inert: a Waypoint.Danger field exists and A* adds it, but NOTHING sets Danger (no botframe_updatedangerousobjects producer), so it is always 0 — the consumer is dead. (UNCHANGED.)"
    - "Weapon picking is a hitscan-at-range / splash-up-close bucket choosing the highest-impulse owned weapon, not the QC ordered far/mid/close priority lists; bots mis-prioritize weapons vs stock. No weapon-combo holding behaviour. (UNCHANGED.)"
    - "wr_aim is ported on 12 of Base's 18 weapons (up from 8) and there is still no MAX_WEAPONSLOTS per-slot loop; the remaining headline combos — mortar airburst, hagar burst, vortex charge (electro combo is now ported) — are NOT implemented. (NARROWED 2026-06-27.)"
    - "Bot scripting entirely missing: the bot_cmd command queue does nothing, so map/console bot scripts, cutscene-driven bots, and g_waypointeditor bot driving are inert. (UNCHANGED.)"
    - "havocbot_dodge is now ported (SUPERBOT-gated projectile flight-path evade, live), but only 3 port projectiles flag Entity.BotDodge (Blaster/Porto + PhaserTurret) vs Base's ~20+ producers, so most incoming projectiles still aren't dodged; non-SUPERBOT bots still only strafe via the generic CombatMovement. (IMPROVED 2026-06-27.)"
    - "Jetpack navigation and rocketjump/trigger_hurt escape are still missing. (UNCHANGED.)"

