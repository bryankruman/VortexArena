# Drift RE-AUDIT (2026-06-27, THIRD pass) on branch claude/parity-port-waves, after Waves 16-17. Wave 17 made NO bot
# changes; Wave 16 (b3a9c06) edited 5 bot files (BotBrain/BotNavigation/BotRoles/BotObjectiveRoles/Waypoint) + ~12
# weapon files. Build green, 46 bot tests pass (BotLiveLoopTests incl.). Each Wave-16 edit was re-read for LIVENESS:
#   FIXES that actually LANDED LIVE (verified caller chain):
#   (1) weapon.choose: priority lists now WIRED. PickFromPriority reads the real bot_ai_custom_weapon_priority_
#       {far,mid,close} ordered lists (loaded from xonotic-server.cfg via ConfigLoader over the empty C# defaults)
#       and returns the first OWNED weapon by NetName; called live from ChooseWeapon. Plus a weapon-combo HOLD
#       (bot_ai_weapon_combo / _threshold 0.4) keeps a splash weapon for the follow-up shot. logic+values
#       partial -> faithful. Only bot_rangepreference still missing.
#   (2) weapon.wr_aim: HLAC now has a real BotWantsSecondary (10% secondary burst). VORTEX/SEEKER/BLASTER got the
#       correct primary-only / hitscan-lead wr_aim (their stock wr_aim IS primary-only — "vortex charge" was never
#       a bot behaviour in vortex.qc:wr_aim, so the prior "missing" framing was wrong). 18/18 headline weapons now
#       faithfully model what Base wr_aim drives. logic partial -> faithful. STILL missing: the MAX_WEAPONSLOTS
#       per-slot loop (only ChosenWeapon's wr_aim is consulted).
#   (3) move.danger: lateral evadedanger now LIVE — the danger handler probes left/right of the flight path and
#       peels along the safe edge, falling back to the reverse brake only on a dead-end. The brake-ONLY gap is
#       CLOSED. logic partial -> faithful. (The per-waypoint danger-ROUTING consumer is STILL dead — see below.)
#   (4) special.jetpack_rocketjump: the trigger_hurt ESCAPE half is now LIVE (skill>6: jetpack-up if owned, else
#       Devastator rocketjump when HP+armor>80; ButtonJetpack is consumed by PlayerPhysics:1012-1017). missing ->
#       partial. Jetpack NAVIGATION (cross jetpack-only gaps) is STILL missing.
#   (5) combat.dodge: producer coverage 14 -> 15 (OkRpc now flags BotDodge). Monsters/napalm/hook/generic-turret
#       still missing. move.steer: SetGoal now forces a teleporter/jumppad box's wp00 exit onto the route (live).
#   (6) NEW ROW bot-ai.roles.freezetag: a FreezeTag bot role (rate frozen teammates 20000 to thaw) is dispatched
#       live by gametype NetName "freezetag"; reads ft.IsFrozen live. faithful/live. feature_count 21 -> 22.
#   DEAD-ON-ARRIVAL (coded in Wave 16 but UNWIRED — the recurring port failure mode, NOT counted as closed):
#   (7) roles.goalrating: a full Dijkstra route-cost field (GoalRater.SeedRoute / WaypointNetwork.ComputeRouteCosts
#       / RouteCostTo, and a multi-seed NearestSeeds + FindPath(seeds) A*) was ADDED — but SeedRoute and
#       NearestSeeds have ZERO callers (grep-verified across all of src/). The brain never calls SeedRoute before
#       running the role, so GoalRater._routeSeeded is ALWAYS false and Rate ALWAYS falls through to straight-line;
#       SetGoal still calls the single-nearest FindPath(from,to). The headline goalrating gap is therefore NOT
#       closed — the Dijkstra implementation exists but is dead code. Recorded explicitly so a future wire-up pass
#       finds it.
#   (8) population.namemodel / skill.modifiers / aim.* / move.bunnyhop / move.keyboard / target.* / weapon.reload /
#       think.throttle / population.* : unchanged vs the prior pass (still faithful where they were).
# DRIFT RE-AUDIT (2026-06-28, FOURTH pass) on branch claude/parity-port-waves. This wave WIRED the two top
# dead-on-arrival features the third pass flagged. Build green, 46 bot tests pass. Verified caller chains:
#   (A) roles.goalrating: SeedRoute is NOW LIVE — BotBrain.ThinkProduce:335 calls _rater.SeedRoute(Network,
#       bot.Origin) inside the strategy-token block immediately BEFORE Role():336. _routeSeeded now true, so
#       GoalRater.Rate uses the multi-seed Dijkstra path cost (RouteCostTo / ComputeRouteCosts), straight-line
#       only on the unreachable fallback; SetGoal (BotBrain:346, 5-arg onGround) routes via NearestSeeds +
#       FindPath(seeds). The headline 'straight-line not Dijkstra' gap CLOSES. logic partial->faithful.
#   (B) move.danger: the botframe_updatedangerousobjects PRODUCER is NOW LIVE — BotPopulation.ServerFrame:208-219
#       calls Network.UpdateDangerousObjects(all, 64) on the 0.25 s bot_ai_dangerdetectioninterval clock;
#       UpdateDangerousObjects sets wp.Danger (faithful navigation.qc:1874-1903 math) and the live A*/
#       ComputeRouteCosts fold it in. wp.Danger is no longer always 0 — the dead danger-ROUTING consumer CLOSES.
#   Both fixes are verified by caller-chain code-read + build/tests; NO dedicated route-cost behavioral test
#   exists, so the 'does the route choice feel like stock' judgment is still code-confidence, not in-game.
# Still-OPEN worst-gaps: generic-DM-role flat rangebias=2000 (objective roles now vary it), wr_aim per-slot
# loop, jetpack NAVIGATION, bot scripting, non-weapon bot_dodge producers (monsters/napalm/hook/turret).
