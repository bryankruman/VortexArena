unit: bot-ai
category: bot
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
# Re-audited after Waves 9-11 (commit ff8a699) on branch claude/parity-port-waves. Wave 10 landed three
# concrete bot-ai improvements over the 2026-06-22 baseline:
#   (1) bot-ai.move.keyboard: havocbot_keyboard_movement is now PORTED & LIVE (was fully missing) —
#       BotNavigation.KeyboardMovement/BlendKeyboard quantize the analog wish-move onto keyboard dirs with
#       the skill-tiered direction gating + distance blend, driven from Steer when skill<10.
#   (2) bot-ai.weapon.wr_aim (top worst-gap): ButtonAttack2 is NO LONGER hardcoded false — the brain now
#       drives SECONDARY fire and projectile DETONATION via per-weapon wr_aim hooks (Weapon.BotWantsSecondary /
#       BotWantsDetonate). Implemented on 8 of Base's 18 wr_aim weapons (Devastator full detonate heuristic,
#       MachineGun long-range burst, Rifle, Vaporizer, Minelayer, Fireball, Tuba, Shotgun). Still missing the
#       MAX_WEAPONSLOTS per-slot loop and the headline combos (mortar airburst / electro combo / hagar burst /
#       vortex charge), so the row is improved but still partial.
#   (3) bot-ai.move.steer: the brain's danger-check JumpStepHeight is now JumpStepHeightLive
#       (StepHeightLive + JumpHeightApex*0.85 ≈ 70 @ stock), matching Base jumpstepheightvec — the hardcoded-48
#       const divergence in the BRAIN path is closed (the public const + BotTracewalk still use 48).
#   (4) bot-ai.population.namemodel: the bots.txt skin column (argv2) is now parsed & re-applied after spawn
#       (_preferredSkin). shirt/pants (argv3/4) + the 12 skill columns are still unparsed.
# Minor: bot-ai.aim.lead gained a per-weapon BotAimShotSpeed lead-speed override hook (Devastator leads as if
# guided), narrowing — but not closing — the lead gap (the 10-trace tracetoss vs closed-form arc is unchanged).
# Still-OPEN worst-gaps: havocbot_dodge projectile dodge, weapon-priority lists / combos in weapon.choose,
# straight-line goal rating (not Dijkstra) + flat rangebias, dead danger-ROUTING producer, jetpack/rocketjump,
# bot scripting. No regressions. No newly-unmapped Base features.
summary:
  feature_count: 21
  worst_gaps:
    - "wr_aim secondary/detonate is now LIVE but partial: ButtonAttack2 is driven and 8 of Base's 18 wr_aim weapons have a port hook (incl. the full Devastator detonate heuristic), but there is still no MAX_WEAPONSLOTS per-slot loop and the headline weapon combos — mortar airburst, electro combo, hagar burst, vortex charge — are NOT ported, so bots still don't do those alt-fire combos. (IMPROVED by Wave 10.)"
    - "Combat movement is invented (periodic strafe-direction flip + health-advantage close/flee bias), not QC havocbot_dodge which sidesteps specific incoming projectiles by their flight path; bots don't specifically dodge a rocket the way stock bots do. (UNCHANGED — Wave 10 honestly deferred havocbot_dodge.)"
    - "Bot scripting entirely missing: the bot_cmd command queue (PAUSE/CONTINUE/WAIT/TURN/MOVETO/AIM/PRESSKEY/RELEASEKEY/SELECTWEAPON/IMPULSE/IF/ELSE/FI/BARRIER/SOUND/CC/CONSOLE) does nothing, so map/console bot scripts, cutscene-driven bots, and g_waypointeditor bot driving are inert. (UNCHANGED.)"
    - "Weapon picking is a hitscan-at-range / splash-up-close bucket choosing the highest-impulse owned weapon, not the QC ordered far/mid/close priority lists; bots mis-prioritize weapons vs stock. No weapon-combo holding behaviour. (UNCHANGED — Wave 10 honestly deferred weapon-priority lists.)"
    - "Goal rating still uses straight-line inverse distance (f*rangebias/(rangebias+vlen(dist))) instead of the QC waypoint-cost (Dijkstra) field, and rangebias is still hardcoded 2000 at every call; bots can prefer a goal near in a straight line but far by path. (UNCHANGED.)"
    - "Per-waypoint danger-cost ROUTING is still inert: a Waypoint.Danger field exists and A* adds it (cost + nb.Danger), but NOTHING sets Danger (no botframe_updatedangerousobjects producer), so it is always 0 — the consumer is dead. Routing still doesn't detour around chronically dangerous waypoints. (UNCHANGED.)"
    - "Jetpack navigation and rocketjump/trigger_hurt escape are still missing. (UNCHANGED — Wave 10 deferred. Keyboard-movement emulation, previously listed here, is now PORTED.)"

