    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/KickTeamkillerMutator.cs:37 IsEnabled"
      - "src/XonoticGodot.Server/GameWorld.cs:511 MutatorActivation.Apply()"
    constants:
      - { name: "g_kick_teamkiller_rate (enable when >0)", base: "0", port: "0 (assets/data/xonotic-data.pk3dir/mutators.cfg:536)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "IsEnabled = Api.Services!=null && Cvars.GetFloat(\"g_kick_teamkiller_rate\")>0; mirrors REGISTER_MUTATOR predicate", result: pass }
      - { kind: code, ref: "MutatorActivation.Apply() called at GameWorld.cs:511 on server boot (the STATIC_INIT_LATE(Mutators) FOREACH(enabled) equivalent); subscribes Hook() only when IsEnabled", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:103 asserts Mutators.ByName(\"kick_teamkiller\") not null (registration only)", result: pass }
