    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/KickTeamkillerMutator.cs:65 OnPlayerDies"
    constants: []
    status:
      logic: partial
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "warmup_stage gate is missing: Base does `if (warmup_stage) return;` (the 2nd gate, before the real-client check) but the port omits it — teamkills accrued during warmup count toward the threshold and can trip a punishment. NotificationSystem.WarmupStage (Common) and Cvars.WarmupStage (Server) exist, so the gate is omittable but available."
    verification:
      - { kind: code, ref: "port checks `!GameScores.Teamplay` (=> !teamplay) and `(attacker.Flags & EntFlags.Client)==0 || attacker is Player{IsBot:true}` (=> approximates IS_REAL_CLIENT/CLIENTTYPE_REAL); NO warmup check present", result: fail }
    confidence: high
    notes: "teamplay gate is faithful. The real-client gate is a faithful approximation: Base IS_REAL_CLIENT = clienttype==CLIENTTYPE_REAL (a connected non-bot client); the port's `Client flag set AND not a bot Player` rejects bots/world identically for the matchplay case. Only the warmup gate is dropped — a logic gap, hence logic:partial."

