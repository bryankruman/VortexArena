  - id: mutator-kick_teamkiller.action.punish
    name: "Punishment switch: kick (1) / IP-ban (2) / play-ban+observe (default)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/kick_teamkiller/sv_kick_teamkiller.qc:37-74 switch(autocvar_g_kick_teamkiller_severity)"
      - "common/mutators/mutator/kick_teamkiller/sv_kick_teamkiller.qc:41 dropclient_schedule(attacker) / :48 Ban_KickBanClient / :63-70 PutObserverInServer + cvar_set g_playban_list + TRANSMUTE(Observer)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/KickTeamkillerMutator.cs:87 LastAction = (attacker, Severity)"
      - "src/XonoticGodot.Server/Bans.cs:78 DropClient (host-wired kick pipeline)"
      - "src/XonoticGodot.Server/Bans.cs:273 KickBanClient"
      - "src/XonoticGodot.Server/Bans.cs:413 AddToList (g_playban_list)"
    constants:
      - { name: "g_kick_teamkiller_severity", base: "0 (unset->0; default=play-ban)", port: "read into Severity field but action never enforced", match: false }
      - { name: "g_kick_teamkiller_bantime", base: "0 (unset->0)", port: "not read/used (KickBanClient never called)", match: false }
      - { name: "g_ban_default_masksize", base: "3 (xonotic-server.cfg:425)", port: "3 (Cvars.cs:337) but not consumed by the mutator", match: false }
      - { name: "RESPAWN_SILENT on attacker (sev 2 + default)", base: "set", port: "not set", match: false }
    status:
      logic: stub
      values: stub
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No punishment is ever enforced: every severity branch collapses to setting LastAction + sending one notification. No client is kicked (dropclient_schedule), IP-banned (Ban_KickBanClient), force-spectated (PutObserverInServer), added to g_playban_list, or TRANSMUTE'd to Observer — the teamkiller keeps playing. The switch over severity is gone entirely (the port never branches on Severity)."
      - "The mutator's doc-comment claims this substrate 'doesn't exist here', but that is stale: Server/Bans.cs implements DropClient (:78, wired to the host kick pipeline), KickBanClient (:273), and playban list add/remove (:413/:432), and Commands.cs registers playban/unplayban; the actions are unwired, not un-buildable. (Bans.cs lives in the Server layer; the mutator is in Common and never reaches it.)"
      - "attacker.respawn_flags = RESPAWN_SILENT is never set (cosmetic; relevant once an action is wired). No RESPAWN_SILENT equivalent found in the port mutator."
    verification:
      - { kind: code, ref: "OnPlayerDies has NO switch on Severity; it sets LastAction=(attacker,Severity) + one NotificationSystem.Send; Bans.DropClient/KickBanClient/AddToList exist but have zero callers from the mutator (grep)", result: fail }
    confidence: high
    notes: "LastAction is a test/host observation hook, not enforcement. Severity is read into the field at Hook() but only its value is recorded, never acted on. liveness:dead — the action code path does not exist."

  - id: mutator-kick_teamkiller.notify.broadcast
    name: "Broadcast + center-print notifications on punishment (severity-dependent)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/kick_teamkiller/sv_kick_teamkiller.qc:42,49 INFO_QUIT_KICK_TEAMKILL (sev 1 & 2)"
      - "common/mutators/mutator/kick_teamkiller/sv_kick_teamkiller.qc:66 INFO_QUIT_PLAYBAN_TEAMKILL (default, NOTIF_ALL)"
      - "common/mutators/mutator/kick_teamkiller/sv_kick_teamkiller.qc:67 CENTER_QUIT_PLAYBAN_TEAMKILL (default, NOTIF_ONE to offender)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/KickTeamkillerMutator.cs:88 NotificationSystem.Send(All, null, Info, \"QUIT_KICK_TEAMKILL\", attacker.NetName)"
      - "src/XonoticGodot.Common/Gameplay/Notifications/NotificationsList.cs:739 QUIT_KICK_TEAMKILL (Info)"
      - "src/XonoticGodot.Common/Gameplay/Notifications/NotificationsList.cs:740 QUIT_PLAYBAN_TEAMKILL (Info, defined but never sent)"
      - "src/XonoticGodot.Common/Gameplay/Notifications/NotificationsList.cs:977 QUIT_PLAYBAN_TEAMKILL (Center, defined but never sent)"
    constants:
      - { name: "info notif (severity 1 & 2)", base: "INFO_QUIT_KICK_TEAMKILL", port: "QUIT_KICK_TEAMKILL", match: true }
      - { name: "info notif (default/play-ban)", base: "INFO_QUIT_PLAYBAN_TEAMKILL", port: "QUIT_KICK_TEAMKILL (wrong; QUIT_PLAYBAN_TEAMKILL exists at NotificationsList.cs:740 but is never sent)", match: false }
      - { name: "center notif (default/play-ban, to offender)", base: "CENTER_QUIT_PLAYBAN_TEAMKILL via NOTIF_ONE", port: "none (Center notif exists at NotificationsList.cs:977 but is never sent)", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: partial
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port always sends QUIT_KICK_TEAMKILL regardless of severity. The default (play-ban) path — the stock severity-0 path — should send QUIT_PLAYBAN_TEAMKILL (broadcast) instead, so with default cvars the kill-feed shows the wrong text ('was kicked' vs 'was forced to spectate'). The correct notification (QUIT_PLAYBAN_TEAMKILL) is already defined in the port (NotificationsList.cs:740) but never invoked."
      - "The offender center-print CENTER_QUIT_PLAYBAN_TEAMKILL (NOTIF_ONE, MSG_CENTER) on the play-ban path is not sent at all. It is defined in the port (NotificationsList.cs:977) but no Send call targets it."
      - "The broadcast notification fires unconditionally once the threshold trips; Base's severity-1 path only broadcasts if dropclient_schedule succeeded (minor, since the kick itself is unwired)."
    verification:
      - { kind: code, ref: "single NotificationSystem.Send(All, null, Info, \"QUIT_KICK_TEAMKILL\", attacker.NetName) with no severity branch; both QUIT_PLAYBAN_TEAMKILL (Info :740) and CENTER QUIT_PLAYBAN_TEAMKILL (:977) exist in NotificationsList.cs but have zero Send callers (grep)", result: fail }
    confidence: high
    notes: "liveness:partial — the broadcast notification does fire when the threshold trips (and the threshold is live), but it is the wrong notification on the default path and the center-print is absent. The port already has the right message strings, so this is a wiring/branching gap, not a missing asset."
