unit: mutator-kick_teamkiller
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 7
  worst_gaps:
    - "No punishment is ever enforced: all three severity branches (kick/ban/play-ban) only record LastAction + send one notification; no client is kicked, IP-banned, force-spectated, added to g_playban_list, or TRANSMUTE'd to Observer, so a teamkiller keeps playing. The Server-layer Bans.cs substrate (DropClient + KickBanClient + playban add/remove) exists and is wired to the host kick pipeline, but the Common-layer mutator never calls it."
    - "warmup_stage gate is missing: Base does `if (warmup_stage) return;` second in the chain, but the port omits it (comment: 'treat the match as live') — teamkills accrued during warmup count toward the threshold. NotificationSystem.WarmupStage / Cvars.WarmupStage exist in the port, so the gate is omittable but available."
    - "Port has no per-client startplaytime; it uses the absolute sim clock since level start (Api.Clock.Time), so mid-match joiners get a larger denominator and cross the rate condition later than in Base (or escape the gate). Coincides with Base only for players present since level start."
    - "Port always sends INFO QUIT_KICK_TEAMKILL regardless of severity; the stock severity-0 (play-ban) path should send INFO QUIT_PLAYBAN_TEAMKILL (broadcast) + CENTER QUIT_PLAYBAN_TEAMKILL (NOTIF_ONE to the offender). Both notifications already exist in the port's NotificationsList.cs but are never sent, so with default cvars the kill-feed shows 'kicked' instead of 'forced to spectate' and the offender gets no center-print."
