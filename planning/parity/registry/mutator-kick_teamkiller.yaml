  - id: mutator-kick_teamkiller.detect.playtime
    name: "Player playtime used as the rate denominator"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/kick_teamkiller/sv_kick_teamkiller.qc:32 playtime = time - CS(attacker).startplaytime"
      - "server/client.qc:780 startplaytime set on spectator->player switch"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/KickTeamkillerMutator.cs:80 float playtime = Api.Clock.Time"
    constants:
      - { name: "playtime source", base: "time - CS(attacker).startplaytime (seconds since spectator->player switch)", port: "Api.Clock.Time (sim clock since level start)", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port has no per-client startplaytime; it uses the absolute sim clock since level start (Api.Clock.Time). For a player who joins mid-match the denominator is larger, so the same teamkill count yields a lower computed rate -> the player is punished later than in Base (or escapes the gate). Coincides with Base only for players present since level start. No spectator->player transition timestamp was found anywhere in the port (grep startplaytime: only the mutator's own comment)."
    verification:
      - { kind: code, ref: "`float playtime = Api.Clock.Time;` vs QC `time - CS(attacker).startplaytime`; grep for startplaytime/StartPlayTime across src/ finds no per-client timestamp", result: fail }
    confidence: high
    notes: "Sim clock is a documented stand-in. Divergence is real (not intended) and skews the threshold for mid-match joiners."

