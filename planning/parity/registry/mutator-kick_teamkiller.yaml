unit: mutator-kick_teamkiller
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 7
  worst_gaps:
    - "Play-ban force-spectate is INCOMPLETE: the default branch sets `attacker.IsObserver = true` directly instead of going through ClientManager.PutObserverInServer (ClientManager.cs:400). PutObserverInServer is what resets MoveType.None/Solid.Not/TakeDamage.No/FragsSpectator; a bare IsObserver=true on a live, spawned player leaves it MoveType.Walk + Solid.SlideBox + DamageMode.Aim + FragsPlayer — so the teamkiller's body stays solid, damageable, and effectively still in the match. The QC PutObserverInServer(attacker,true,true) genuinely benches the player."
    - "g_playban_list is written by the mutator but NEVER enforced at join. ClientManager.cs:274 explicitly defers the playban gate ('playban / g_maxping / queue-balance gates are deferred — those subsystems aren't modeled on this path'), and Bans.IsPlayBanned has only one caller (MinigameSessionManager). So a play-banned offender can press fire / autojoin (ObserverOrSpectatorThink) and rejoin freely; the list entry is inert for the rejoin block."
    - "Severity 1 (kick) and 2 (IP-ban) are still NOT enforced. Both branches set RESPAWN_SILENT + LastAction + broadcast, but LastAction has ZERO source-code observers (grep src/**/*.cs: no non-self reader; Bans.DropClient/KickBanClient are never reached from the mutator or from any LastAction subscriber). The host-side 'observe LastAction and drop/ban' wiring promised in the doc-comment does not exist, so sev1/sev2 offenders keep playing."
    - "Port still has no per-client startplaytime; playtime denominator is the absolute sim clock (Api.Clock.Time) since level start, so mid-match joiners cross the rate condition later than Base (or escape it). Coincides with Base only for players present since level start. Unchanged from baseline."
