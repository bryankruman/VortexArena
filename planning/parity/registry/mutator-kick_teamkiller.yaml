    notes: "Disabled by default in both Base and port (rate=0 via bundled mutators.cfg). When an admin sets rate>0 the hook subscribes at boot — detection is genuinely live. rate/lower_limit ship in mutators.cfg; severity/bantime have no `set` in either Base or port and resolve to autocvar/GetFloat 0."

