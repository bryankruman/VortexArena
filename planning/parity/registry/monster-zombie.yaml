summary:
  feature_count: 11
  reaudit_note: "Re-audited 2026-06-25 against branch claude/parity-port-waves HEAD. SECOND animation FIX wave since the prior baseline (2026-06-22). The MonsterAnimPhase enum (EntityClasses.cs:79) and the internal MonsterAnim enum (MonsterAI.cs:194) BOTH gained Spawn/Block/BlockEnd/Shoot slots, and the zombie now declares + DRIVES every one of them: Zombie.AnimFrame (Zombie.cs:194) maps spawn->30, block->8, blockend->7, shoot->0 (plus the previously-mapped idle 19/walk-run 27/melee 4/pain 20/die1 9). Zombie.Spawn sets st.Anim=Spawn (Zombie.cs:79) and RunThink stamps it during the spawn window (MonsterAI.cs:1144-1147); DefendBlock sets Block then BlockEnd via the delayed end (Zombie.cs:177,182); Leap is called with MonsterAnim.Shoot (Zombie.cs:132) and Leap sets st.Anim=leapAnim (MonsterAI.cs:1347). So the spawn (30), block (8/7) and leap-shoot (0) poses that the prior baseline recorded as 'folds into Idle/Attack' ARE NOW PLAYED. Live chain unchanged + re-verified: RunThink->DriveAnimFrame->AnimFrame->self.Frame; ServerNet networks Frame for the Generic kind (ServerNet.cs:1808, Classify:2125); ClientEntityView (now game/net/ClientEntityView.cs:196-203) feeds Generic->OnEntityUpdate(frameDriven:true); ClientWorld sets anim.FollowEntityFrame (ClientWorld.cs:1622). NET vs 2026-06-22 baseline: 4 fixes (setup spawn-anim partial->faithful; block partial->faithful; leap partial->faithful; presentation.animation values/timing/presentation partial->faithful). 0 regressions. Residual presentation gaps now reduced to just TWO: pain2 '22 1 2' is dropped (port always plays pain1=20) and die2 '12 1 0.5' is unreachable for the zombie (DriveAnimFrame's die2 is gated on st.DeathLanded, which only the wyvern sets — the zombie installs no dead-think). Audio gate (SoundCues={death,sight,idle}) + all constants/liveness unchanged."
  worst_gaps:
    - "Animation is now LIVE and broadly FAITHFUL: spawn (30), idle (19), walk/run (27), melee (4), block/blockend (8/7), leap-shoot (0), pain1 (20) and die1 (9) are all stamped onto the networked Entity.Frame by DriveAnimFrame and played by the client ModelAnimator (FollowEntityFrame). The MonsterAnimPhase enum now has dedicated Spawn/Block/BlockEnd/Shoot slots, so the zombie's spawn pose, block stance, and leap pose play their OWN frames (not the folded Idle/melee they used at the prior baseline)."
    - "Two residual presentation gaps remain (random ANIM VARIANT loss only): (a) pain2 '22 1 2' and the random pain1/pain2 alternation are dropped — the port always plays pain1 (frame 20); (b) die2 '12 1 0.5' is unreachable for the zombie because DriveAnimFrame's die2 is gated on st.DeathLanded, which only a per-monster dead-think sets (the wyvern's land flag); the zombie installs no dead-think, so it always plays die1 (frame 9) where Base alternates die1/die2 at random."
    - "Sound DELIVERY still diverges from Base's GlobalSound .sounds-file table: the port plays a literal monsters/zombie/<cue>.ogg (SoundExt='.ogg') while the table machinery (random sample, skin-keyed Monster_Sounds_Update) is unported. Moot for the zombie's three audible cues (the SoundCues gate fires exactly {death,sight,idle}, and death.ogg is a real shipped asset so death is audible in effect) but the sample-table machinery remains latent/cosmetic."
    - "Spawn no-think/no-push window is still hardcoded to 1/3s rather than derived from anim_spawn '30 1 3' via animfixfps/animstate_endtime (close approximation, not model-exact). The spawn POSE itself (frame 30) is now played — only the per-frame fps/duration of the group is approximate."
