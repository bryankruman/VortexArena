unit: monster-zombie
category: monster
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Zombie animation never plays: the 14 mr_anim frame groups are collapsed to a logical phase enum that never sets Entity.Frame; monsters always network Frame=0 (the client frame-drive path exists but is fed a constant 0), so the model is pinned to its static pose (no visible spawn/walk/attack/block/pain/death anim)."
    - "Pain sound played where Base zombie is silent (zombie.dpm_0.sounds has 'pain' commented out)."
    - "Block plays a monsters/zombie_melee.wav sound that Base's block never plays (and zombie 'melee' sound is commented out)."
    - "Sound delivery diverges from Base: literal monsters/zombie_*.wav paths instead of the GlobalSound .sounds-file table (no random sample, no g_monsters_sounds gate, no msound_delay throttle)."
    - "Block armor-restore fallback is 0.6 vs Base g_monsters_armor_blockpercent default 0.5 (matters only when cvar unset)."
