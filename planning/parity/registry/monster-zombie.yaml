last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Zombie animation is still fully dead: the 14 mr_anim frame groups are collapsed to a 6-value logical phase enum that never assigns Entity.Frame; monsters network Frame=0, so the model is pinned to its static pose. Re-verified post-fixup: still no `.Frame =` anywhere under src/**/Monsters/**; MonsterAI.cs:1064 still carries the explicit 'CSQC monster animation frame playback' named no-op. No visible spawn/walk/run/melee(x3)/leap/block/pain(x2)/death(x2) anim."
    - "FIXED (Wave-4 fixup 4be8357): the Wave-2 audio regressions are GONE. A per-monster SoundCues set was added (Zombie.cs:41 = {death,sight,idle}) and MonsterSound (MonsterAI.cs:670) now gates emission on cueDefined — so the zombie no longer ATTEMPTS spawn/melee/pain/ranged sounds Base leaves silent. The SoundCues set matches zombie.dpm_0.sounds EXACTLY (death/sight/idle defined; ranged/melee/pain/spawn commented out)."
    - "Sound DELIVERY still diverges from Base's GlobalSound .sounds-file table: the port plays a literal monsters/<name>_<cue>.wav while the shipped asset is sound/monsters/zombie/<cue>.ogg, with no random sample and no skin-keyed Monster_Sounds_Update. This is now moot for the zombie's three audible cues (the gate fires exactly the defined cues) but the path-form + sample-table machinery remains unported (latent/cosmetic; death is audible in effect)."
    - "Spawn no-think/no-push window is still hardcoded to 1/3s rather than derived from anim_spawn '30 1 3' via animfixfps/animstate_endtime (close approximation, not model-exact)."
