unit: monster-zombie
category: monster
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Zombie animation never plays: the 14 mr_anim frame groups are collapsed to a logical phase enum that never sets Entity.Frame; monsters always network Frame=0 (the client frame-drive path exists but is fed a constant 0), so the model is pinned to its static pose. UNCHANGED by Wave-2 (still no `.Frame =`, CSQC monster anim still a named no-op)."
    - "Wave-2 routed ALL monster voice cues through Monster_Sound but the port plays a literal monsters/<name>_<cue>.wav for EVERY cue, ignoring whether the cue is DEFINED in the model's .sounds file. The zombie has pain/melee/spawn/ranged COMMENTED OUT (silent in Base), so the port now ATTEMPTS pain/spawn/melee sounds Base never plays — and the assets don't even exist (only death/idle/sight .ogg shipped)."
    - "REGRESSION: Wave-2 ADDED a spawn-cue sound (Setup:312) and a melee-connect sound (MeleeAttack:1165). For the zombie both cues are commented-out/silent in Base, so two new audio divergences were introduced on rows that were previously audio:na."
    - "Sound delivery still diverges from Base's GlobalSound .sounds-file table: literal monsters/<name>_<cue>.wav paths, no random sample, no skin-keyed Monster_Sounds_Update. (Wave-2 DID add the g_monsters_sounds master gate + the msound_delay throttle — that sub-gap is now closed.)"
    - "FIXED by Wave-2: block armor-restore fallback corrected 0.6 -> 0.5 (matches g_monsters_armor_blockpercent), and the bogus block sound (monsters/zombie_melee.wav) removed (Base block is silent)."
