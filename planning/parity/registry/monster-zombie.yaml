summary:
  feature_count: 11
  reaudit_note: "Re-audited 2026-06-22 against branch claude/parity-port-waves HEAD (023ba70 Wave-5 finish), which is TWO commits past the prior baseline (66e378f). The new post-baseline change is a genuine ANIMATION wiring: Zombie.AnimFrame override (Zombie.cs:180) + MonsterAI.DriveAnimFrame (MonsterAI.cs:1084) now translate the logical MonsterAnim phase into the descriptor's concrete MD3 frame-group start index and STAMP it onto Entity.Frame each think. Verified the full live chain: RunThink (Zombie.Think:86, ticked by SV_RunThink) -> DriveAnimFrame -> AnimFrame -> self.Frame; ServerNet networks Frame for the monster's Generic kind (ServerNet.cs:1752, Classify:2009); ClientEntityView applies e.Frame=s.Frame AND calls OnEntityUpdate(frameDriven:true) for Generic (ClientEntityView.cs:200-203); ClientWorld sets anim.FollowEntityFrame=true (ClientWorld.cs:1595) so the ModelAnimator follows the networked frame. Frame VALUES match Base mr_anim EXACTLY (idle 19 / walk-run 27 / melee 4 / pain1 20 / die1 9 / die2 12). So the formerly-DEAD animation row is now LIVE and mostly faithful. Residual presentation divergences: spawn anim '30 1 3' (frame 30) is never played (spawn folds into Idle 19), pain2 (22) / die2 (12 unreachable: zombie sets no DeathLanded) variety is dropped, and the block frames (blockstart 8 / blockend 7) are not played (DefendBlock uses the Attack phase -> frame 4) — and the leap phase also maps to the melee frame 4 rather than anim_shoot '0 1 5' (frame 0). NET: 4 gaps_closed (animation dead->live; melee/pain/death presentation missing->faithful-or-partial), 0 regressions. Audio gate (SoundCues={death,sight,idle}) and all constants/liveness unchanged."
  worst_gaps:
    - "FIXED (Wave-5 finish 023ba70): zombie animation is now LIVE. Zombie.AnimFrame + MonsterAI.DriveAnimFrame stamp the per-phase MD3 frame onto the networked Entity.Frame (idle 19 / walk-run 27 / melee 4 / pain1 20 / die1 9, all matching Base mr_anim), the monster networks as Generic with frameDriven:true, and the client ModelAnimator FollowEntityFrame plays it. Idle/walk/run/melee/pain/death are now visible. Was fully dead at baseline."
    - "Animation presentation is now PARTIAL, not complete: (a) spawn anim '30 1 3' (frame 30) is never played — Zombie.Spawn folds spawn into Idle (frame 19) during the spawn-shield window; (b) pain2 '22 1 2' and the random pain1/pain2 alternation are dropped (port always plays pain1=20); (c) die2 '12 1 0.5' is unreachable for the zombie (DriveAnimFrame's die2 is gated on st.DeathLanded which the zombie never sets — no zombie dead-think), so the zombie always plays die1=9 instead of Base's random die1/die2; (d) blockstart/blockend ('8 1 1'/'7 1 1') and the leap anim_shoot ('0 1 5', frame 0) are not played — DefendBlock and Leap both set the Attack phase -> frame 4 (melee), so block and leap show the melee pose rather than their own."
    - "Sound DELIVERY still diverges from Base's GlobalSound .sounds-file table: the port plays a literal monsters/<name>_<cue>.wav while the shipped asset is sound/monsters/zombie/<cue>.ogg, with no random sample and no skin-keyed Monster_Sounds_Update. Moot for the zombie's three audible cues (the SoundCues gate fires exactly {death,sight,idle}, and death.ogg is a real shipped asset so death is audible in effect) but the path-form + sample-table machinery remains unported (latent/cosmetic)."
    - "Spawn no-think/no-push window is still hardcoded to 1/3s rather than derived from anim_spawn '30 1 3' via animfixfps/animstate_endtime (close approximation, not model-exact); and the spawn frame itself is not shown (see animation gap)."
