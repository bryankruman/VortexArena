    gaps:
      - "None of the 14 mr_anim frame groups are mapped to Entity.Frame; the port keeps a 6-value logical MonsterAnim enum used only for server timing and never assigns Entity.Frame. Entity.Frame is NEVER written for any monster (verified: the only server-side Frame writes are damage-reset/buttons/minelayer/tuba), so a monster always networks Frame=0. The client view (ClientEntityView) DOES frame-drive Player/Generic/Gib/monster nodes from the networked NetEntityState.Frame, but for monsters that wire value is a constant 0 — the model is pinned to its static frame-0 pose. CSQC monster frame selection is an explicit named no-op in RunThink (lines 982-983). No visible spawn/walk/run/melee(x3)/leap/block/pain(x2)/death(x2) animation."
