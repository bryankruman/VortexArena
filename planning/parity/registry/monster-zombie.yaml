    notes: "Whole monster family shares this reduction; the spec's per-frame anim table is fully unmapped. The networked-Frame plumbing exists (players play their frame) but monsters never compute one, so monsters always send 0. Server timing (attack/pain/death windows) is faithful via the enum, but presentation is dead."
