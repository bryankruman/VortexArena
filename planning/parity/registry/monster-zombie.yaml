summary:
  feature_count: 12
  reaudit_note: "Re-audited 2026-06-27 (Waves 16-17 drift re-check) against branch claude/parity-port-waves HEAD (b3a9c06). All 12 rows re-verified line-by-line against the CURRENT port. Wave 17 touched NO monster files. Wave 16 (b3a9c06) made exactly TWO monster-file edits, both fidelity IMPROVEMENTS, ZERO regressions: (1) Zombie.Spawn now seeds e.ViewOfs = (0,0,0.35*maxs.z)=16.45 (Zombie.cs:89) — QC Monster_Spawn_Setup view_ofs '0 0 0.35'*maxs.z, the eye height every LOS/aim/danger trace reads; previously the eye sat at the origin. (2) MonsterAI.TraceToss is now warpzone-aware (TraceBoxWarpzone per segment, MonsterAI.cs:1652) so the leap arc continues through a seamless portal; identity-collapses to a plain trace on a non-warpzone map (byte-unchanged common case). Neither edit touches the anim wiring, sound cues, variant rolls, or describe. ALL prior-baseline closed gaps re-confirmed against current line numbers: MarkPain rolls AnimVariant=Next()>=0.5?1:0 (MonsterAI.cs:1861) -> Zombie.AnimFrame Pain variant==1?20:22 (Zombie.cs:269); MarkDead calls st.DeathLanded=st.Def.RollDeathVariant() (MonsterAI.cs:1956), Zombie.RollDeathVariant()=!(Next()>0.5) (Zombie.cs:237), AnimFrame(Death) die2?12:9 (Zombie.cs:270) so die1/die2 alternate; DriveAnimFrame stamps Entity.Frame in spawn-window (MonsterAI.cs:1424), dead (1406) and live (1455) branches, passing BOTH DeathLanded and AnimVariant (1466); Leap sets st.Anim=leapAnim (MonsterAI.cs:1625), Zombie passes Shoot->frame 0; Block(8)/BlockEnd(7) silent; spawn pose frame 30 via st.Anim=Spawn (Zombie.cs:114) + AnimDurSpawn=61/30s window. PainWindow inherits Monster default 0.34 (EntityClasses.cs:63, no Zombie override) == Base time+0.34. SoundCues={death,sight,idle}; structured path monsters/zombie/<cue>.ogg (MonsterAI.cs:934). menu.describe still ported verbatim (Zombie.cs:241-247) AND live as the DialogMonsterTools radio tooltip (DialogMonsterTools.cs:27-33,101). No new_unmapped features. NET (Waves 16-17): 0 regressions, 0 new-gaps, 2 fidelity improvements (view_ofs eye-height seed touches setup/think targeting; warpzone TraceToss touches the leap arc — both pre-existing rows, no status change but confidence on leap arc unchanged-medium)."
  worst_gaps:
    - "Animation is now LIVE and FULLY FAITHFUL on frame selection: spawn (30), idle (19), walk/run (27), melee (4), block/blockend (8/7), leap-shoot (0), pain1/pain2 (20/22 alternating) and die1/die2 (9/12 alternating) are all stamped onto the networked Entity.Frame by DriveAnimFrame and played by the client ModelAnimator (FollowEntityFrame). The prior baseline's two residual random-variant losses (pain2 dropped, die2 unreachable) are CLOSED: MarkPain rolls AnimVariant and MarkDead rolls RollDeathVariant, both wired to the zombie's AnimFrame."
    - "Only residual presentation/timing gap: per-frame fps/duration (the second/third animfixfps components, e.g. die1 '9 1 0.5' = 2s) is not modeled by the phase enum — frame VALUES are byte-exact, the per-group PLAYBACK RATE is approximate (timing)."
    - "Sound DELIVERY still diverges from Base's GlobalSound .sounds-file table: the port plays a literal monsters/zombie/<cue>.ogg (SoundExt='.ogg') while the table machinery (random sample, skin-keyed Monster_Sounds_Update) is unported. Moot for the zombie's three audible cues (the SoundCues gate fires exactly {death,sight,idle}, and death.ogg is a real shipped asset so death is audible in effect) but the sample-table machinery remains latent/cosmetic."
    - "Spawn no-think/no-push window = AnimDurSpawn=61/30s (~2.033s), a constant BAKED from the zombie.dpm group-30 framegroup at compile time rather than a live animstate_endtime/frameduration() call (close approximation, not a runtime model query). The spawn POSE itself (frame 30) is played — only the per-frame fps source is baked-vs-live. (No longer the old hardcoded 1/3s.)"
