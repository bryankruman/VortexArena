  - id: fx-effectinfo.parser.keywords
    name: "Keyword parsing (type/color/size/alpha/jitter/light/stain/water/...)"
    layer: [presentation]
    base_refs:
      - "common/effects/effectinfo.qc:EFFECTINFO_PARSER"
      - "darkplaces/cl_particles.c:CL_Particles_ParseEffectInfo"
    port_refs:
      - "game/client/EffectInfo.cs:ApplyKeyword"
      - "game/client/EffectInfo.cs:DefaultsFor"
    constants:
      - { name: "type->blend/orientation table", base: "DP particletype[]", port: "DefaultsFor", match: true }
      - { name: "blood gravity forced to 1", base: "pt_blood gravity=1", port: "info.Gravity=1f on type==Blood", match: true }
      - { name: "trailspacing -> count = 1/spacing", base: "DP derives countmultiplier", port: "CountMultiplier = 1/TrailSpacing", match: true }
      - { name: "tex range second-index-exclusive", base: "tex 0 8 = 0..7", port: "Tex0/Tex1 ints", match: true }
      - { name: "color/staincolor hex (0xRRGGBB)", base: "readints strtol base 0", port: "H() 0x or decimal", match: true }
      - { name: "`stainless` semantics", base: "staintex[0/1]=-2; reset staincolor/alpha/size (DISABLES stains)", port: "EffectInfo.cs:271-280 stamps StainTex0/1=-2 + resets staincolor(0xFFFFFFFF)/alpha(1)/size(2)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Engine-only render keywords (lightshadow, lightcubemapnum, lightcorona, forcenearest) are parsed-and-ignored: Godot has no analogue for particle coronas, per-light cubemaps, or nearest-filtering. Unknown keywords are silently ignored rather than warned (DP prints a warning). These are deliberate, cosmetic-only omissions."
    gaps:
      - "Engine-only keywords (lightcorona/lightcubemapnum/lightshadow/forcenearest) unmodelled — cosmetic dlight/decal detail lost (intended divergence, not a defect)."
    verification:
      - { kind: code, ref: "ApplyKeyword switch (EffectInfo.cs:175-292) vs EFFECTINFO_PARSER + DP parser (cl_particles.c:398-472); all gameplay keywords present, type table matches; stainless now mirrors DP's disable (staintex=-2 + stain-field reset, EffectInfo.cs:271-280) — confirmed against cl_particles.c:468", result: pass }
    confidence: high
    notes: "FIXED in Wave 17 (2f0bfdb): `stainless` moved out of the parsed-and-ignored group into a DP-faithful disable (StainTex0/1=-2, staincolor/alpha/size reset to baseline) — the 2026-06-22 'no-op latent logic bug' is RESOLVED, so logic/presentation upgraded partial->faithful. Field consumption confirmed in FaithfulParticleBackend (count/jitter/bounce/friction/gravity/water/stretch/stain/velmult). 0 stainless occurrences in the shipped file so no observable runtime change, but the keyword is now bit-faithful. The only remaining divergence is the intended engine-only-keyword omission."

