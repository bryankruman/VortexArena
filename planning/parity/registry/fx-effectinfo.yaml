      - "common/effects/all.qc:net_effect (NET_HANDLE)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Effects/EffectEmitter.cs:EffectNetProtocol.Encode"
      - "game/net/ServerNet.cs:WriteEffect"
      - "game/net/ClientNet.cs:DecodeEffect"
      - "game/net/NetGame.cs:OnEffectReceived"
    constants:
      - { name: "EFF_NET_VELOCITY/COLOR_MIN/COLOR_MAX/COLOR_SAME", base: "BIT(0..3)", port: "1<<0..1<<3", match: true }
      - { name: "extraflags ordering (vel; colmin; same-vs-max)", base: "vel|colmin|(colmin&&min==max?same:max)", port: "identical in ExtraFlags()", match: true }
      - { name: "colour quantise", base: "rint(bound(0, 16*c, 255))", port: "round(clamp(16*c,0,255))", match: true }
      - { name: "colour decode", base: "/16 client read", port: "ClientNet.ReadColor = byte/16f", match: true }
      - { name: "count byte (point effects only)", base: "WriteByte(eent_net_count)", port: "bytes.Add(count & 0xFF); trail => none", match: true }
      - { name: "registered effect id framing", base: "WriteRegistered(Effects)", port: "ServerNet writes Effect.RegistryId (ushort) before body", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No encode/decode round-trip unit test; the byte-exact match is established by code read only."
    verification:
      - { kind: code, ref: "ServerNet.WriteEffect calls EffectNetProtocol.Encode (live sink, ServerNet.cs:2210); ClientNet.DecodeEffect is the exact inverse (ClientNet.cs:1041) -> EffectReceived -> NetGame.OnEffectReceived -> _render.OnEffect; byte layout diffed vs Net_Write_Effect", result: pass }
    confidence: high
    notes: "CORRECTED from the draft's liveness:unknown. The wire protocol is fully live and bidirectional on the real networked path. The draft's gap 'decode side not located/confirmed wired' is RESOLVED: ClientNet.DecodeEffect + ReadColor implement the net_effect NET_HANDLE. Only the test gap remains."

