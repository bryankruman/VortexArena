unit: fx-effectinfo
category: effect
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-28"
summary:
  feature_count: 18
  worst_gaps:
    - "CTF capture burst never renders: Ctf.cs:787 emits the effectinfo name '<team>_cap' through the RegistryName-keyed Emit(string) overload -> Effects.ByName returns null -> request silently dropped (registry names are CAP_RED/...)"
    - "Whole catalog families are present-but-never-requested: nade_* trail/burn/explode (NadeBoom substitutes generic EXPLOSION_*), gentle/happy/morphed/particlegibs damage_* (no gentle gib-splash selection ported), vehicle impact/explode blocks (no client damageeffects DamageInfo handler), onslaught generator gib, CTF flag_touch/pass"
    - "No unit test covers the effectinfo.txt parser / keyword table / baseline defaults, nor a wire-protocol encode/decode round-trip; verified by code read only (confirmed: only ParticleParityTests/ParticleAnalyticTrace exist, neither hits EffectInfo.Parse/ApplyKeyword/EffectNetProtocol)"
    - "Heuristic fallback BuildFromInfo clamps derived life to [0.05,6]s + midpoint (intended; only when faithful/modern backend un-routed)"
    - "te_* helper -> registry-name mapping is a port convention; caller coverage of these specific wrappers not exhaustively traced (beam/arc temp-effects route to BeamRenderer, not the particle catalog)"
    - "by-name engine-fallback (Send_Effect_) records unregistered names but the null-Effect request does not network/render unless the name also resolves in effectinfo.txt — used only by beam/arc temp-effects that BeamRenderer draws"
