      - { kind: code, ref: "EffectEmitter guards match Send_Effect_Except; the live sink is ServerNet.EffectNetSink (set ServerNet.cs:300) -> CaptureEffect -> FlushEffects with Except exclusion", result: pass }
    confidence: high
    notes: "Server gameplay (damage/ctf/items/weapons) calls EffectEmitter.Emit; ServerNet's EffectNetSink captures into _effectQueue and FlushEffects networks per recipient. On a listen server ClientWorld.RenderSink ALSO mirrors emissions in-process to the local renderer (wraps the inner net sink)."

  - id: fx-effectinfo.emit.by_name_fallback
    name: "Emit by effectinfo name (Send_Effect_) — registry scan + engine fallback"
    layer: [authority]
    base_refs:
      - "common/effects/all.qc:Send_Effect_"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Effects/EffectEmitter.cs:EmitByEffectInfoName"
      - "src/XonoticGodot.Common/Gameplay/Effects/Effect.cs:Effects.ByEffectInfoName"
    constants:
      - { name: "registry name scan", base: "linear scan of registered effectinfo names", port: "Effects.ByEffectInfoName", match: true }
      - { name: "engine fallback when name not registered", base: "__pointparticles(_particleeffectnum(name), ...)", port: "queues EffectRequest with Effect=null + EffectName", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: partial
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The Effect=null engine-fallback request (unregistered effectinfo name) records the name but there is no DP-engine __pointparticles equivalent client-side; only names that also resolve in the effectinfo.txt catalog render. Used by te_csqc_lightningarc/te_beam (arc_lightning/heal_beam) which are handled by the beam renderer rather than the registry."
    verification:
      - { kind: code, ref: "EmitByEffectInfoName resolves via Effects.ByEffectInfoName then falls back to a null-Effect request; matches Send_Effect_ structure", result: pass }
    confidence: medium
    notes: "Lightning-arc/beam temp-effects ride this path (TeCsqcLightningArc/TeBeam) and are drawn by BeamRenderer, not the particle catalog. A null-Effect non-beam name would record but not network (WriteEffect returns false on null Effect)."

  - id: fx-effectinfo.net.wire_protocol
    name: "EFF_NET_* wire encoding/decoding (Net_Write_Effect / net_effect)"
    layer: [shared]
    base_refs:
      - "common/effects/all.qc:Net_Write_Effect"
      - "common/effects/all.qc:net_effect (NET_HANDLE)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Effects/EffectEmitter.cs:EffectNetProtocol.Encode"
      - "game/net/ServerNet.cs:WriteEffect"
      - "game/net/ClientNet.cs:DecodeEffect"
      - "game/net/NetGame.cs:OnEffectReceived"
    constants:
      - { name: "EFF_NET_VELOCITY/COLOR_MIN/COLOR_MAX/COLOR_SAME", base: "BIT(0..3)", port: "1<<0..1<<3", match: true }
      - { name: "extraflags ordering (vel; colmin; same-vs-max)", base: "vel|colmin|(colmin&&min==max?same:max)", port: "identical in ExtraFlags()", match: true }
      - { name: "colour quantise", base: "rint(bound(0, 16*c, 255))", port: "round(clamp(16*c,0,255))", match: true }
      - { name: "colour decode", base: "/16 client read", port: "ClientNet.ReadColor = byte/16f", match: true }
      - { name: "count byte (point effects only)", base: "WriteByte(eent_net_count)", port: "bytes.Add(count & 0xFF); trail => none", match: true }
      - { name: "registered effect id framing", base: "WriteRegistered(Effects)", port: "ServerNet writes Effect.RegistryId (ushort) before body", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No encode/decode round-trip unit test; the byte-exact match is established by code read only."
    verification:
      - { kind: code, ref: "ServerNet.WriteEffect calls EffectNetProtocol.Encode (live sink, ServerNet.cs:2210); ClientNet.DecodeEffect is the exact inverse (ClientNet.cs:1041) -> EffectReceived -> NetGame.OnEffectReceived -> _render.OnEffect; byte layout diffed vs Net_Write_Effect", result: pass }
    confidence: high
    notes: "CORRECTED from the draft's liveness:unknown. The wire protocol is fully live and bidirectional on the real networked path. The draft's gap 'decode side not located/confirmed wired' is RESOLVED: ClientNet.DecodeEffect + ReadColor implement the net_effect NET_HANDLE. Only the test gap remains."

