    constants:
      - { name: "null-effect guard", base: "if(!eff) return", port: "if (effect is null) return", match: true }
      - { name: "point-effect count-0 guard", base: "if(!trail && !cnt) return", port: "if (!IsTrail && count==0) return", match: true }
      - { name: "per-recipient exclusion (ignore)", base: "FOREACH_CLIENT(... && it != ignore ...)", port: "ServerNet.FlushEffects skips ce.Except == st.Player", match: true }
    status:
