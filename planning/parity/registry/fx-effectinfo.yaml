      - { name: "same-named blocks layer into one effect", base: "yes (DP reuses by effectnameindex)", port: "Dictionary<name, List<block>>", match: true }
      - { name: "case-insensitive name lookup", base: "n/a (engine exact strcmp)", port: "OrdinalIgnoreCase", match: true }
      - { name: "color/tex/stain ints via strtol base 0", base: "readints = strtol(.,.,0)", port: "H(): 0x hex or decimal (no octal)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
