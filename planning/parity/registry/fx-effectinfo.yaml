      - "No unit test covers the parser / keyword table / baseline defaults; verified by code read only. (Proposed extraction to an Engine-namespace EffectInfoParser.cs + EffectInfoParserTests.cs has NOT landed in this tree as of 2026-06-28; parse core still lives in game/client/EffectInfo.cs.)"
