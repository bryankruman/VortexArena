    constants:
      - { name: "applies under start_weapons_defaultmask", base: "newdefault &= start_weapons_defaultmask", port: "operates on StartLoadout.Weapons (no defaultmask concept)", match: false }
      - { name: "warmup_start_weapons rearrange", base: "yes (warmup_newdefault & warmup_start_weapons_defaultmask)", port: "none — ApplyWarmupLoadout (SpawnSystem.cs:742) builds warmup arsenal directly, never fires SetStartItems", match: false }
      - { name: "RANDOM mode result", base: "OR BOTH core+newtoy bits (player gets BOTH)", port: "pick ONE token at random (Prandom.RangeInt, cs:140)", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "RANDOM (autoreplace=2) start-items semantics diverge: Base ORs BOTH the core and new-toy weapon bits into the start loadout so the player receives BOTH; the port picks exactly ONE token at random (NewToysMutator.cs:140 Prandom.RangeInt). With the stock blaster-only DefaultLoadout (no mapping) this is unobservable, but a modified start set under autoreplace=2 yields different loadouts."
      - "No start_weapons_defaultmask: the port rewrites the whole StartLoadout.Weapons set unconditionally rather than only the bits in the default mask."
      - "No warmup-loadout rearrange: SpawnSystem.ApplyWarmupLoadout (cs:742) builds the warmup arsenal directly from g_warmup_allguns / DefaultLoadout and never fires MutatorHooks.SetStartItems, so the NewToys ALWAYS/RANDOM swap never applies to the warmup loadout (Base rearranges warmup_start_weapons too). (g_warmup_allguns DOES include the now-unblocked new toys since it filters on the cleared MutatorBlocked flag — but it does not perform the per-weapon replacement.)"
