unit: mutator-new_toys
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 9
  worst_gaps:
    - "Map weapon-entity replacement is STILL entirely unported (the mutator's PRIMARY gameplay function). ItemSpawnFuncs.WeaponSpawn -> StartItem.Spawn spawns the literal map weapon and never fires a SetWeaponreplace hook (no such chain exists in MutatorHooks — only FilterItemDefinition/SetStartItems/SetWeaponArena), never calls a W_Apply_Weaponreplace equivalent, never reads the per-entity \"new_toys\" BSP map key, and has no random_items early-out. With g_new_toys_autoreplace 1/2 a map's weapon_vortex still spawns a Vortex; a weapon_vortex with '\"new_toys\" \"rifle\"' is ignored. Wave-2 only added a doc note clarifying the missing seams — no implementation."
    - "Warmup loadout STILL bypasses the NewToys SetStartItems swap. Wave-2 wired SetWeaponArena into ApplyWarmupLoadout (SpawnSystem.cs:~889) but NOT SetStartItems, so the ALWAYS/RANDOM new-toy rearrange never reaches the warmup arsenal (Base rearranges warmup_start_weapons via the same hook). Masked in stock play (autoreplace default 0)."
    - "The 'New toys, new toys!' roflsound STILL never plays on new-toy weapon pickup: SND_WEAPONPICKUP_NEW_TOYS is registered in SoundsList but assigned to no pickup, and g_new_toys_use_pickupsound is read NOWHERE in src/ or game/. No FilterItem-for-weapon-pickup wiring was added. (Default cvar 0 so off by default; low impact.)"
