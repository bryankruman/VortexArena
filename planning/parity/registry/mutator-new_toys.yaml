unit: mutator-new_toys
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 9
  worst_gaps:
    - "Map weapon-entity replacement is entirely unported. ItemSpawnFuncs.WeaponSpawn -> StartItem.Spawn spawns the literal map weapon and never fires a SetWeaponreplace hook (no such chain in MutatorHooks; only FilterItemDefinition), never calls a W_Apply_Weaponreplace equivalent, and never reads the per-entity \"new_toys\" map key. With g_new_toys_autoreplace 1/2 a map's weapon_vortex still spawns a Vortex; a weapon_vortex with '\"new_toys\" \"rifle\"' is ignored. This is the mutator's PRIMARY gameplay function."
    - "RANDOM (autoreplace=2) start-items semantics diverge: Base ORs BOTH the core and new-toy weapon bits into the start loadout so the player receives BOTH; the port picks exactly ONE token at random (Prandom.RangeInt). Also the port has no start_weapons_defaultmask and no warmup-loadout rearrange (ApplyWarmupLoadout builds the warmup arsenal directly and never fires SetStartItems). Masked in stock play (blaster-only default has no mapping)."
    - "The 'New toys, new toys!' roflsound never plays on new-toy weapon pickup: SND_WEAPONPICKUP_NEW_TOYS is registered in SoundsList (SoundsList.cs:73) but assigned to no pickup, and g_new_toys_use_pickupsound is read NOWHERE in src/ or game/. New-toy weapons use the normal WEAPONPICKUP sound. (Default cvar 0 so off by default; low impact.)"
