  - id: mutator-new_toys.startitems.rearrange
    name: "SetStartItems — rearrange the default start-weapon set through the replacement mapping"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/new_toys/sv_new_toys.qc:141 MUTATOR_HOOKFUNCTION(nt, SetStartItems)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/NewToysMutator.cs:133 OnSetStartItems"
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:797 ComputeStartItems (fires SetStartItems.Call)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:313 SetStartItems"
    constants:
      - { name: "RANDOM mode result", base: "OR BOTH core+newtoy bits (player gets BOTH)", port: "OR BOTH tokens into the resolved set (NewToysMutator.cs:146-152)", match: true }
      - { name: "ALWAYS mode result", base: "newtoy bit only (core dropped)", port: "newtoy token only (resolved set drops core)", match: true }
      - { name: "applies under start_weapons_defaultmask", base: "newdefault &= start_weapons_defaultmask", port: "operates on whole StartLoadout.Weapons (no defaultmask concept)", match: false }
      - { name: "warmup_start_weapons rearrange", base: "yes (warmup_newdefault & warmup_start_weapons_defaultmask)", port: "none — ApplyWarmupLoadout (SpawnSystem.cs:962) builds the warmup weapon set from the arena/allguns split, never applies the NewToys swap", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No start_weapons_defaultmask: the port rewrites the whole StartLoadout.Weapons set (l.Weapons.Clear() + union rebuild) rather than only the bits in the default mask. Unobservable with the stock blaster-only default; would diverge if a server set a partial start_weapons_defaultmask."
      - "No warmup-loadout rearrange: ApplyWarmupLoadout (SpawnSystem.cs:962) calls ComputeStartItems() only to read the warmup fuel value, then builds the warmup weapon set from the arena/allguns/normal split (SetWeaponArena seam) — the NewToys ALWAYS/RANDOM core->new-toy swap never applies to warmup_start_weapons (Base rearranges it via the same SetStartItems hook). g_warmup_allguns DOES include the now-unblocked new toys (it filters on the cleared MutatorBlocked flag) but does NOT perform the per-weapon core->new-toy replacement."
    verification:
      - { kind: code, ref: "OnSetStartItems (cs:133-158) ORs EVERY token of nt_GetReplacement into a HashSet then rebuilds Weapons from the union — matches QC's bit-OR-both (RANDOM keeps core+newtoy, ALWAYS drops core). SetStartItems.Call fired live in SpawnSystem.ComputeStartItems (cs:797). Warmup uses ApplyWarmupLoadout (cs:962) which calls ComputeStartItems only for fuel + fires SetWeaponArena but does NOT apply the SetStartItems weapon swap to the warmup arsenal", result: pass }
      - { kind: behavioral, ref: "default DefaultLoadout={blaster} has no replacement so the hook is a no-op in stock play (matches Base); autoreplace default 0 (NEVER) so even configured maps don't swap unless explicitly set", result: pass }
    confidence: high
    notes: "Unchanged this audit. RANDOM-mode is bit-faithful (ORs BOTH core+newtoy, not a coin-flip). Two gaps remain, both masked in stock play: (1) no start_weapons_defaultmask, (2) the warmup loadout path still bypasses the SetStartItems weapon rearrange (it only reads the seam's fuel value)."

