  - id: mutator-new_toys.startitems.rearrange
    name: "SetStartItems — rearrange the default start-weapon set through the replacement mapping"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/new_toys/sv_new_toys.qc:141 MUTATOR_HOOKFUNCTION(nt, SetStartItems)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/NewToysMutator.cs:127 OnSetStartItems"
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:662 ComputeStartItems (fires SetStartItems.Call:711)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:313 SetStartItems"
    constants:
      - { name: "RANDOM mode result", base: "OR BOTH core+newtoy bits (player gets BOTH)", port: "OR BOTH tokens into the resolved set (NewToysMutator.cs:140-150)", match: true }
      - { name: "ALWAYS mode result", base: "newtoy bit only (core dropped)", port: "newtoy token only (resolved set drops core)", match: true }
      - { name: "applies under start_weapons_defaultmask", base: "newdefault &= start_weapons_defaultmask", port: "operates on whole StartLoadout.Weapons (no defaultmask concept)", match: false }
      - { name: "warmup_start_weapons rearrange", base: "yes (warmup_newdefault & warmup_start_weapons_defaultmask)", port: "none — ApplyWarmupLoadout (SpawnSystem.cs:~872) fires SetWeaponArena but NOT SetStartItems", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No start_weapons_defaultmask: the port rewrites the whole StartLoadout.Weapons set (l.Weapons.Clear() + union rebuild) rather than only the bits in the default mask. Unobservable with the stock blaster-only default; would diverge if a server set a partial start_weapons_defaultmask."
      - "No warmup-loadout rearrange: Wave-2 wired SetWeaponArena into SpawnSystem.ApplyWarmupLoadout (cs:~872) but NOT SetStartItems, so the NewToys ALWAYS/RANDOM swap still never applies to the warmup loadout (Base rearranges warmup_start_weapons via the same hook). g_warmup_allguns DOES include the now-unblocked new toys (it filters on the cleared MutatorBlocked flag) but does NOT perform the per-weapon core->new-toy replacement."
    verification:
      - { kind: code, ref: "OnSetStartItems (cs:127-152) now ORs EVERY token of nt_GetReplacement into a HashSet then rebuilds Weapons from the union — matches QC's bit-OR-both (RANDOM keeps core+newtoy, ALWAYS drops core). Prandom coin-flip REMOVED (using XonoticGodot.Common.Math import deleted). SetStartItems.Call fired live in SpawnSystem.ComputeStartItems:711; ComputeStartItems reached from ApplyStartLoadout (SpawnSystem.cs:806, called at cs:544 on the live spawn path). Warmup uses ApplyWarmupLoadout which fires SetWeaponArena but NOT SetStartItems", result: pass }
      - { kind: behavioral, ref: "default DefaultLoadout={blaster} has no replacement so the hook is a no-op in stock play (matches Base); autoreplace default 0 (NEVER) so even configured maps don't swap unless explicitly set", result: pass }
    confidence: high
    notes: "FIXED in Wave-2: the RANDOM-mode divergence (port previously picked ONE token via Prandom.RangeInt; now ORs BOTH core+newtoy bits, bit-faithful to QC). logic/values upgraded partial->faithful for the main spawn path. Two gaps remain, both masked in stock play: (1) no start_weapons_defaultmask, (2) the warmup loadout path still bypasses SetStartItems entirely (SetWeaponArena was wired in but SetStartItems was not)."

