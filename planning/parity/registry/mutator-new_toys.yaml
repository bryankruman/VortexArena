summary:
  feature_count: 9
  worst_gaps:
    - "SetStartItems has no start_weapons_defaultmask: the port rewrites the WHOLE StartLoadout.Weapons set rather than only the default-mask bits. Unobservable with the stock blaster-only default; would diverge if a server set a partial start_weapons_defaultmask."
    - "Warmup loadout STILL bypasses the NewToys SetStartItems weapon swap: ApplyWarmupLoadout (SpawnSystem.cs:962) calls ComputeStartItems() only to read the warmup fuel value, then builds the warmup weapon set from the arena/allguns/normal split — it never applies the ALWAYS/RANDOM core->new-toy rearrange to warmup_start_weapons (Base rearranges warmup_start_weapons via the same hook). Masked in stock play (autoreplace default 0)."
    - "weapon_defaultspawnfunc's WEP_FLAG_MUTATORBLOCKED map-spawn rejection is intentionally NOT enforced in WeaponSpawn (ItemSpawnFuncs.cs:235 NOTE): a blocked weapon placed directly on a map still spawns. Deferred as a separate broad-impact parity item; orthogonal to New Toys' own replacement chain (which is now ported)."
