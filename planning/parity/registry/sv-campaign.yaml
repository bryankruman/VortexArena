unit: sv-campaign
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 14
  worst_gaps:
    - "target_levelwarp does nothing in a campaign: CampaignLevelWarpHandler/IsCampaign seams are never wired by the host (dead)."
    - "target_changelevel campaign win-credit is dead: NextLevelHandler unassigned + the QC `campaign_forcewin = true` (real-client-touched stage win) line has no port equivalent, so a map that ends a stage via target_changelevel never registers the win."
    - "g_campaign_forceteam is registered but never read: a campaign team-mode level cannot force the player onto a given team."
    - "Campaign_Invalid (checks current gametype + mapname match the loaded level, else CampaignBailout) is not ported: a level whose actual map/gametype diverges from the file is not detected or aborted server-side. Base calls it at the end of both CampaignPreInit and the start of CampaignPostInit."
    - "Confirmed wired ONLY into bot MOVEMENT (BotPopulation.MovementHeld + BotBrain pre-game hold). The round-handler campaign gate (Base round_handler.qc:38) is EXPLICITLY DEFERRED in the port (RoundHandler.cs comment: 'Deferred: ... campaign bot gating')."
features:
  - id: sv-campaign.file.parse
    name: "Campaign .txt quoted-CSV parse (CampaignFile_Load)"
    layer: [shared]
    base_refs:
      - "common/campaign_file.qc:CampaignFile_Load"
      - "common/campaign_common.qh"
    port_refs:
      - "src/XonoticGodot.Server/Campaign.cs:Load"
      - "src/XonoticGodot.Server/Campaign.cs:ParseCsvLine"
      - "src/XonoticGodot.Server/CampaignCatalog.cs:Parse"
    constants:
      - { name: "CAMPAIGN_MAX_ENTRIES (server)", base: "2", port: "2", match: true }
      - { name: "comment/blank line classification", base: "// and \"// skip but advance lineno; blank transparent (no lineno++)", port: "same", match: true }
      - { name: "field order", base: "gametype,mapname,bots,botskill,fraglimit,timelimit,mutators[,shortdesc,longdesc]", port: "same", match: true }
      - { name: "filename localization", base: "language_filename(maps/campaign<name>.txt)", port: "maps/campaign<name>.txt (no language_filename prefix)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Too-few-fields row is logged + the index slot consumed (parity with QC index advance) rather than QC's error()/abort — benign."
      - "Base wraps the campaign filename in language_filename() (localized campaign briefings, e.g. campaignxonoticbeta.de.txt); the port reads the un-localized base name only. Cosmetic for English; non-English campaign text falls back to the base file."
    verification:
      - { kind: unit_test, ref: "CampaignFlowTests.Load_ParsesGameplayColumns / Load_AtOffsetIsCurrentLevelPlusNext / Load_MissingFileLoadsNothing", result: pass }
      - { kind: unit_test, ref: "CampaignCatalogTests (menu all-levels parse)", result: pass }
      - { kind: code, ref: "real maps/campaignxonoticbeta.txt: ,, empty fields + single-mutator entries (g_instagib 1) parse correctly under ParseCsvLine", result: pass }
    confidence: high
    notes: "Index parity between menu (all levels) and server (current+next) is maintained because both classify comment lines identically. Real file uses ,, for empty fields and the 9-column form; port handles both."

