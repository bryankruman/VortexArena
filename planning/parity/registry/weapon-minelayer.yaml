  - id: minelayer.mine.shootdown
    name: "Mine shoot-down: knock loose / destroy when shot"
    layer: [authority]
    base_refs:
      - "common/weapons/weapon/minelayer.qc:W_MineLayer_Damage"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Minelayer.cs:OnMineDamage"
    constants:
      - { name: "health", base: "15", port: "15", match: true }
      - { name: "damageforcescale", base: "1.25", port: "1.25", match: true }
    status:
      logic: stub
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "OnMineDamage is installed only as Entity.ProjectileDamage, but DamageSystem.EventDamage (DamageSystem.cs:294) routes a non-player damageable target to GtEventDamage if present, ELSE to PlayerDamage/PlayerCorpseDamage — it NEVER invokes ProjectileDamage. The only caller of ProjectileDamage is BreakablehookMutator.cs:79. So a mine's HP is never subtracted by OnMineDamage and it cannot be shot loose or destroyed."
      - "Worse: with TakeDamage=Yes and GtEventDamage null, a shot mine actually falls into PlayerDamage/PlayerCorpseDamage (treated as a player corpse), so the shoot-down path is not just absent but mis-routed."
      - "W_CheckProjectileDamage (g_projectiles_damage) gate, vectoangles re-facing, avelocity spin, and the W_PrepareExplosionByDamage delayed-explode are all consequently unreachable."
    verification:
      - { kind: code, ref: "Grep ProjectileDamage?.Invoke -> only BreakablehookMutator.cs:79; DamageSystem.EventDamage (DamageSystem.cs:287-304) routes non-player to GtEventDamage else PlayerDamage", result: fail }
    confidence: high
    notes: "Shared pipeline gap — Mortar/Devastator/Arc/Hagar/Seeker/Electro/Fireball/OkRpc shoot-down callbacks are dead the same way (all install ProjectileDamage that nothing invokes). Mine still receives knockback (ApplyKnockback runs) but never dies/loosens. Worth flagging to the owner as a cross-weapon fix."

