summary:
  feature_count: 13
  worst_gaps:
    - "Whole weapon is WEP_FLAG_MUTATORBLOCKED: never in a normal-match loadout (GiveItems.cs:340), only reachable via weaponarena/NewToys/impulse-give → fire-path liveness stays partial, not live (unchanged this wave)."
    - "Mine shoot-down is now LIVE (MakeShootable installs GtEventDamage, which DamageSystem.EventDamage:331 dispatches) and a depleted mine detonates — BUT the W_MineLayer_Damage knock-loose branch (damageforcescale bounce/re-stick while hp>0) is unreachable: the shim only invokes the ProjectileDamage callback at hp<=0, so OnMineDamage's hp>0 knock-loose path never runs."
    - "Remote-detonate sound semantics still diverge: Base plays SND_MINE_DET as soon as PlacedMines flags ANY mine; port plays mine_det only if at least one mine actually passes the spawnshield+team-safety gate and detonates."
    - "Surface-normal facing (angles = vectoangles(-trace_plane_normal)) is approximated from -velocity, not the real trace plane; SetMovetypeFollow (stick to a moving platform) still not modeled."
    - "Airshot achievement + out-of-ammo forced weapon switch (W_MineLayer_Explode tail) still not implemented."
    - "Bot wr_aim (mine-detonation AI) still not ported — bots lay but never remote-detonate."
