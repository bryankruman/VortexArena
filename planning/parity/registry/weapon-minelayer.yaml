    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: faithful
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "TEAM-FILTER IS DEAD (real bug): the proximity trigger excludes teammates with `self.Team != 0 && head.Team == self.Team`, but the mine's Team is NEVER assigned in Attack (only Owner is). So in team modes self.Team==0, the exclusion never fires, and a placed mine arms/detonates on a TEAMMATE walking near it. Base uses DIFF_TEAM(head, this.realowner) keyed on the OWNER's team and correctly skips teammates. The port should compare head.Team against self.Owner.Team."
      - "CORRECTION of draft: the draft claimed the port is 'MORE protective than Base' because it omits the `protection` cvar in ProximityExplode. That is wrong twice over: (a) the ProximityExplode team-safety block is itself dead (gated on self.Team==0, never true), so it never holds; (b) Base's block is gated on WEP_CVAR(protection) which defaults to 0, so Base never holds either. Net ProximityExplode behavior matches Base-default by accident, not by being more protective."
      - "Base proximity loop also skips IS_INDEPENDENT_PLAYER(head) and STAT(FROZEN, head); port skips neither (FROZEN head not modeled, independent-player mode not modeled)."
      - "Liveness partial: MUTATORBLOCKED weapon (see minelayer.fire.lay_mine)."
    verification:
      - { kind: code, ref: "OnThink earliest-time interpolation matches QC; team exclusion uses self.Team (never set in Attack) instead of self.Owner.Team; ProximityExplode block gated on self.Team==0 -> dead", result: fail }
    confidence: high
    notes: "mine_trigger sound on first arm; earliest mine_time selection and edge->core distance scaling are exact. self.MaxHealth doubles as QC .mine_time. The arm-on-teammate bug is the material finding the draft missed."

