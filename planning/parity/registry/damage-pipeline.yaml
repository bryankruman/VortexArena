    - "No central Heal() dispatcher (QC server/damage.qc:948 — game_stopped/frozen/dead gating + .event_heal route + limit cap) still does not exist in the port; healing remains ad-hoc per entity/item with no shared gate. Unchanged from baseline."
    - "Damage() front gate still omits the QC game_stopped check (damage.qc:46) AND the spectator killcount==FRAGS_SPECTATOR early-out (damage.qc:485) inside DamageSystem.Apply — both still gated at the gametype/caller layer. Unchanged from baseline."
