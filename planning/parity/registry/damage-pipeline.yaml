unit: damage-pipeline
category: damage
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 9
  worst_gaps:
    - "RadiusDamage never sets HITTYPE_SPLASH on blast victims (QC damage.qc:920 ORs it for every non-direct-hit / non-special target): WeaponSplash.RadiusDamage passes the plain weapon deathtype (or deathTag) with no DeathTypes.AddHitType(Splash) call — even though the Splash constant + AddHitType helper exist and the comment claims it is 'set automatically by RadiusDamage'. Splash kills cannot be distinguished from direct hits for kill-message/effect classification, and any HITTYPE_SPLASH-gated downstream logic is dead."
    - "Fire damage-over-time strength convention is INCONSISTENT and tick-rate dependent: the three live ignition sites disagree — MonsterFramework.AddFireDamage (wyvern) frametime-corrects (dps/0.05*FrameTime) but Fireball.cs:240 and NadeNapalmBoom.cs:190 pass the RAW dps as Strength, so StatusEffects.Tick deals Strength*0.05 per call. Total burn damage diverges from QC's fire_damagepersec*frametime accrual and differs between fire sources; the QC LEMMA merge of overlapping ignitions and the Fire_ApplyDamage FIRE TRANSFER (g_balance_firetransfer_damage 0.8 / _time 0.9 to adjacent g_damagedbycontents entities) are entirely missing."
    - "No central Heal() dispatcher (QC server/damage.qc:948 — game_stopped/frozen/dead gating + .event_heal route + limit cap) exists in the port damage pipeline; healing is ad-hoc per entity/item with no shared gate."
    - "Damage() front gate omits the QC game_stopped check (damage.qc:46) AND the spectator killcount==FRAGS_SPECTATOR early-out (damage.qc:485) — both are relied upon at the gametype/caller layer, not inside DamageSystem.Apply, so a stray damage call outside that gating would still apply."
    - "Hit-sound / combat-feedback bookkeeping partial: only HitsoundDamageDealtTotal is accumulated; the team-kill complaint sound timer (teamkill_soundtime/teamkill_complain), ++impressive_hits, the yoda airshot flag, the typehitsound/IsTypeFrag detection (PHYS_INPUT_BUTTON_CHAT unwired), and g_teamdamage_resetspeed decay of dmg_team are not wired."
