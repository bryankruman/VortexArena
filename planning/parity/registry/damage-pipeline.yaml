      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "HITTYPE_SPLASH is NEVER OR'd onto the deathtype for indirect (victim != directHit / non-special) targets (QC damage.qc:917-920). WeaponSplash.RadiusDamage:196-200 passes the plain weapon int deathType (via WeaponFiring.ApplyDamage) or the raw deathTag string, never calling DeathTypes.AddHitType(Splash) — the helper and Splash constant exist and are even documented as 'set automatically by RadiusDamage', but are not used. Splash-vs-direct kill classification is lost and any HITTYPE_SPLASH-gated downstream logic is dead."
      - "MIN_DAMAGEEXTRARADIUS/damageextraradius per-target shrink (QC damage.qc:767 bound(0.1, damageextraradius, 16) subtracted from dist) is not applied — targets with a custom damageextraradius (rare) hit at a slightly different range."
      - "RadiusDamage_running recursion guard (damage.qc:715-724) is replaced by per-call method-local target buffers (safe re-entry), so the explicit backtrace-on-recursion warning is gone."
    verification:
      - { kind: code, ref: "WeaponSplash.RadiusDamage:49-207 — falloff, force ref point gated by g_player_damageplayercenter, adaptive multi-sample through-floor LOS, warpzone find+trace, Prandom box sampling", result: pass }
      - { kind: code, ref: "damage.qc:917-920 confirms HITTYPE_SPLASH OR'd for non-direct/non-special; port omits it", result: fail }
      - { kind: test, ref: "SplashDamageSingleApplicationTests.OneBlast_AppliesDamageAndKnockbackExactlyOnce; DevastatorForceXyScaleTests", result: pass }
    confidence: high
    notes: "Adaptive multi-sample through-floor LOS (replaces a binary single-ray check), warpzone-aware find+trace, deterministic Prandom box sampling. The HITTYPE_SPLASH omission is the one logic gap and blocks the kill-message splash/direct split. Damage_DamageInfo blast broadcast is a deliberate headless no-op (DamageInfoNetwork) — host renders the blast."

