base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 9
  worst_gaps:
    - "REGRESSION (Wave-2 fire rewrite): the new frametime-based burn tick (StatusEffects.FireApplyDamage deals dps*min(frametime,remaining)) is correct for fireball (now routes through FireAddDamage which sets .FireDamagePerSec=raw dps) and napalm (raw Apply passes raw dps as Strength -> tick fallback treats Strength as dps), BUT MonsterFramework.AddFireDamage STILL pre-scales Strength as `dps/0.05*FrameTime` (MonsterFramework.cs:96) and the new tick then multiplies that by frametime AGAIN -> wyvern (Wyvern.cs:164) and the Inferno buff (BuffsMutator.cs:437) now deal ~dps*FrameTime^2/0.05 ≈ 0.4% of intended fire damage. The old tick (Strength*0.05) matched the pre-scaled convention; the rewrite broke it for the two AddFireDamage callers."
    - "No central Heal() dispatcher (QC server/damage.qc:948 — game_stopped/frozen/dead gating + .event_heal route + limit cap) still does not exist in the port; healing remains ad-hoc per entity/item with no shared gate. Unchanged from baseline."
    - "Damage() front gate still omits the QC game_stopped check (damage.qc:46) AND the spectator killcount==FRAGS_SPECTATOR early-out (damage.qc:485) inside DamageSystem.Apply — both still gated at the gametype/caller layer. Unchanged from baseline."
    - "Teamplay: complainTeamDamage now drives the mode-4 mirror multiplier (DamageSystem.Apply:202-203) but the team-kill complaint SOUND (teamkill_soundtime/teamkill_complain) is still NOT played, and g_teamdamage_resetspeed decay of dmg_team is still not applied. In-code fallbacks still 2/0 vs stock 4/1 (correct only when xonotic-server.cfg is loaded)."
    - "Fire TRANSFER (g_balance_firetransfer_damage 0.8 / _time 0.9 to adjacent g_damagedbycontents entities) is still entirely missing — left as a documented host-loop TODO in FireApplyDamage; burning never chains between bunched-up players."
