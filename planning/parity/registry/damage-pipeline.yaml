      - "Spectator killcount==FRAGS_SPECTATOR early-out (damage.qc:485) is still gated at the gametype layer, not in Apply; functionally covered but not at this seam."
    verification:
      - { kind: code, ref: "DamageSystem.Apply — IsFreed/TakeDamage gate, soundOrHook same-team return, IsAlwaysLethal block clears SpawnShield + GodMode then sets damage 100000 (unchanged by Wave-2)", result: pass }
