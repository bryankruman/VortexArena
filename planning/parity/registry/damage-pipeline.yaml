    - "Napalm ignition (NadeNapalmBoom.cs:190) still uses the raw StatusEffectsCatalog.Apply(strength=dps) path instead of FireAddDamage: correct dps via the FireApplyDamage Strength fallback, but no overlap LEMMA merge and no FireDeathType attribution (its burn ticks fall back to generic DeathTypes.Fire). Lava-contents ignition feeder still not wired."
