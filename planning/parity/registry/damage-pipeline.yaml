    constants:
      - { name: "kill/teamchange damage", base: "100000 (lethal)", port: "100000", match: true }
      - { name: "teamchange pre-set health", base: "0.9 (<1)", port: "0.9", match: true }
      - { name: "teamchange pre-set armor", base: "0", port: "0", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "QC game_stopped early-out (damage.qc:46) is NOT checked inside Apply — gating lives at the gametype/caller layer; a damage call made while game_stopped would still apply."
      - "Spectator killcount==FRAGS_SPECTATOR early-out (damage.qc:485) is gated at the gametype layer, not in Apply; functionally covered but not at this seam."
    verification:
      - { kind: code, ref: "DamageSystem.Apply:89-118 — IsFreed/TakeDamage gate, soundOrHook same-team return, IsAlwaysLethal block clears SpawnShield + GodMode then sets damage 100000", result: pass }
      - { kind: code, ref: "GameInit.cs:20 installs Combat.System = new DamageSystem(); ~30 live Combat.Damage / WeaponSplash.RadiusDamage call sites across map objects, monsters, mutators, weapons", result: pass }
    confidence: high
    notes: "Hook/sound same-team rule modeled via HITTYPE_SOUND flag + 'hook' weapon-name tag (QC checks WEP_HOOK || HITTYPE_SOUND). Live: installed Combat.System in GameInit.cs:20, confirmed broad live caller fan-out."

