      - { name: "distance metric", base: "nearest-point bbox to (portal-shifted) blast origin", port: "Vector3.Clamp nearest-point to bbox", match: true }
      - { name: "MAX_DAMAGEEXTRARADIUS broadphase pad", base: "16", port: "16", match: true }
      - { name: "knockback magnitude", base: "(finaldmg/max(core,edge))*force", port: "same", match: true }
      - { name: "g_player_damageplayercenter", base: "1 (bbox center others, eye self)", port: "1 (read live)", match: true }
      - { name: "force_xyzscale per-axis (0 = unscaled)", base: "yes", port: "yes", match: true }
      - { name: "g_throughfloor_damage / _force", base: "0.75 / 0.75", port: "0.75 / 0.75", match: true }
      - { name: "throughfloor max_stddev dmg/force", base: "2 / 10", port: "2 / 10", match: true }
      - { name: "throughfloor steps player/other", base: "1..100 / 1..10", port: "1..100 / 1..10", match: true }
      - { name: "MIN_DAMAGEEXTRARADIUS per-target dist shrink", base: "bound(0.1, damageextraradius, 16) (damage.qc:767)", port: "not applied", match: false }
    status:
