    notes: "Enable cvar IS the scale (QC damage_force * autocvar_g_globalforces; port Scale = Cvars.GetFloat(\"g_globalforces\")). Base is a PLAIN REGISTER_MUTATOR with NO instagib/arena exclusion predicate (unlike NIX), so the port's bare `g_globalforces != 0` predicate is faithful — verified against the full 31-line sv_globalforces.qc. Activation loop confirmed live (MutatorActivation.Apply reconciles IsEnabled -> Add -> Hook). UNCHANGED by Wave-2 (diff touched only the spread filter)."

  - id: mutator-globalforces.spread.hook
    name: "Knockback spread on PlayerDamage_SplitHealthArmor: push every other in-range player by the damage force"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/globalforces/sv_globalforces.qc:17 (MUTATOR_HOOKFUNCTION(mutator_globalforces, PlayerDamage_SplitHealthArmor))"
      - "common/mutators/mutator/globalforces/sv_globalforces.qc:22 (FOREACH_CLIENT(IS_PLAYER(it) && it != frag_target))"
