      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:60 (Apply loop: IsEnabled -> Add -> Hook)"
      - "src/XonoticGodot.Server/GameWorld.cs:511 (MutatorActivation.Apply)"
    constants:
      - { name: "g_globalforces", base: "0 (off; doubles as force scale, mutators.cfg:495)", port: "0 default; Scale read from g_globalforces cvar (GlobalForcesMutator.cs:51)", match: true }
    status:
