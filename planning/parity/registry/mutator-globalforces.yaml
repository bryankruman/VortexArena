  - id: mutator-globalforces.spread.selfscale_calcpush
    name: "Per-player push: attacker self-scale + damageforcescale + momentum-clamped calcpush"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/globalforces/sv_globalforces.qc:28-29 (f = (it==frag_attacker)?self:1; it.velocity += damage_explosion_calcpush(f*it.damageforcescale*damage_force, it.velocity, speedfactor))"
      - "common/weapons/calculations.qc:39 (damage_explosion_calcpush)"
      - "common/weapons/calculations.qc:7 (explosion_calcpush_getmultiplier)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:94-96 (f selfscale, it.Velocity += DamageExplosionCalcPush)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:106 (DamageExplosionCalcPush)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:116 (ExplosionCalcPushGetMultiplier)"
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:532 (player DamageForceScale = g_player_damageforcescale default 2)"
    constants:
      - { name: "g_globalforces_self", base: "1 (attacker-only scale, mutators.cfg:497)", port: "1 (SelfScale default)", match: true }
      - { name: "g_balance_damagepush_speedfactor", base: "2.5 (balance-xonotic.cfg:215; 0 on balance-nexuiz25.cfg:119)", port: "read live from cvar each hit (GlobalForcesMutator.cs:83)", match: true }
      - { name: "g_player_damageforcescale (it.damageforcescale for live players)", base: "2 (default)", port: "2 (SpawnSystem.cs:532)", match: true }
      - { name: "calcpush: speedfactor<1 -> raw force", base: "if (speedfactor < 1) return explosion_f (calculations.qc:42)", port: "if (speedFactor < 1f) return explosionForce (GlobalForcesMutator.cs:108)", match: true }
      - { name: "multiplier: a = v.(v-tv); a<=0 -> 0 else a/(v.v)", base: "explosion_calcpush_getmultiplier (calculations.qc:7-18)", port: "ExplosionCalcPushGetMultiplier (GlobalForcesMutator.cs:116-121)", match: true }
    status:
