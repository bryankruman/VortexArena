  - id: mutator-globalforces.spread.hook
    name: "Knockback spread on PlayerDamage_SplitHealthArmor: push every other in-range player by the damage force"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/globalforces/sv_globalforces.qc:17 (MUTATOR_HOOKFUNCTION(mutator_globalforces, PlayerDamage_SplitHealthArmor))"
      - "common/mutators/mutator/globalforces/sv_globalforces.qc:22 (FOREACH_CLIENT(IS_PLAYER(it) && it != frag_target))"
      - "server/utils.qh:9 (IS_PLAYER(v) := (v).classname == STR_PLAYER — server-side, classname-only, NO dead test)"
      - "server/mutators/events.qh (EV_PlayerDamage_SplitHealthArmor argv: force = M_ARGV(3))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:80 (OnPlayerDamage)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:76 (IsPlayer = Client flag ONLY, no DeadState test)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:97-99 (FindByClass(\"player\") minus target, gated on IsPlayer)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:468 (PlayerDamageSplitHealthArmor.Call with force)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GameHooks.cs:41 (PlayerDamageArgs.Force = M_ARGV(3))"
    constants:
      - { name: "damage_force = M_ARGV(3) * g_globalforces", base: "force * autocvar_g_globalforces", port: "args.Force * Scale (GlobalForcesMutator.cs:91)", match: true }
      - { name: "loop_set", base: "FOREACH_CLIENT(IS_PLAYER(it) && it != frag_target) [server IS_PLAYER = classname=='player', NO dead test]", port: "FindByClass(\"player\") minus target, gated on IsPlayer (Client flag only)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: trace, ref: "DamageSystem.cs:468 fires PlayerDamageSplitHealthArmor with force (info.Force through Damage_Calculate); OnPlayerDamage iterates FindByClass(player) excluding only the target", result: pass }
      - { kind: trace, ref: "On death the port leaves the corpse with EntFlags.Client set and ClassName unchanged (still \"player\"); FindByClass(\"player\") still returns it AND IsPlayer (Client-flag only) still accepts it — corpses are shoved, matching Base's classname-only IS_PLAYER. Observers excluded (classname != \"player\").", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.cs:256 GlobalForces_PushesNearbyPlayer_OnDamage — Combat.Damage on target with force shoves an in-range bystander (Velocity becomes non-zero) end-to-end through the live hook", result: pass }
    confidence: high
    notes: "IsPlayer = Client-flag only (no DeadState filter), so just-killed corpses (still classed \"player\", EntFlags.Client retained — DamageSystem death path does not reclass) are shoved, mirroring Base's classname-only IS_PLAYER (utils.qh:9). Observers/spectators do not carry classname \"player\" so over-inclusion is ruled out. Hook fires once per player-damage application (DamageSystem.cs:468), matching Base cadence. The zero-force early-out (GlobalForcesMutator.cs:92) is behaviorally identical to Base's no-op loop."

