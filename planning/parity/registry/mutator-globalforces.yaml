      - "server/mutators/events.qh (EV_PlayerDamage_SplitHealthArmor argv: force = M_ARGV(3))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:72 (OnPlayerDamage)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:68 (IsPlayer = Client flag ONLY, no DeadState test — Wave-2 change)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:89-91 (FindByClass(\"player\") minus target, gated on IsPlayer)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:401 (PlayerDamageSplitHealthArmor.Call with force)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GameHooks.cs:41 (PlayerDamageArgs.Force = M_ARGV(3))"
    constants:
      - { name: "damage_force = M_ARGV(3) * g_globalforces", base: "force * autocvar_g_globalforces", port: "args.Force * Scale (GlobalForcesMutator.cs:83)", match: true }
      - { name: "loop_set", base: "FOREACH_CLIENT(IS_PLAYER(it) && it != frag_target) [server IS_PLAYER = classname=='player', NO dead test]", port: "FindByClass(\"player\") minus target, gated on IsPlayer (Client flag only — DeadState filter removed in Wave-2)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: trace, ref: "DamageSystem.cs:387-404 fires PlayerDamageSplitHealthArmor with force (info.Force through Damage_Calculate); OnPlayerDamage iterates FindByClass(player) excluding only the target", result: pass }
      - { kind: trace, ref: "Death path DamageSystem.cs:628-632 leaves the corpse with EntFlags.Client set and ClassName unchanged (still \"player\"); it only gains IsCorpse/Solid.Corpse/DeadState=Dying. So FindByClass(\"player\") still returns it AND IsPlayer (Client-flag only) still accepts it — corpses are now shoved, matching Base's classname-only IS_PLAYER. Observers excluded (classname != \"player\").", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.cs:248 GlobalForces_PushesNearbyPlayer_OnDamage — Combat.Damage on target with force (0,0,600) shoves an in-range bystander (Velocity becomes non-zero) end-to-end through the live hook", result: pass }
    confidence: high
    notes: "FIXED in Wave-2 (commit ec788f7): the prior DeadState==No filter (IsLivePlayer) was a port divergence that froze just-killed corpses; it has been removed (GlobalForcesMutator.cs:68 IsPlayer = Client-flag only). VERIFIED ADVERSARIALLY: on death the port does NOT reclass the entity nor clear EntFlags.Client (DamageSystem.cs:628-632), and ClassName is set once at Player.cs:35 and never changed — so the corpse satisfies both FindByClass(\"player\") and the Client-flag IsPlayer, exactly mirroring Base's classname-only IS_PLAYER (utils.qh:9). Over-inclusion ruled out: observers/spectators do not carry classname \"player\". Hook fires once per player-damage application (DamageSystem.cs:401), matching Base cadence. The zero-force early-out (GlobalForcesMutator.cs:84) is behaviorally identical to Base's no-op loop. The two unit tests are unchanged by Wave-2 and still pass."

