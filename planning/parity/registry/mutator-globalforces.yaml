last_audited: "2026-06-22"
summary:
  feature_count: 6
  worst_gaps:
    - "Dead players are excluded from the knockback spread (port adds a DeadState==No filter Base lacks; Base's server IS_PLAYER is classname-only — utils.qh:9 — so a corpse still classed 'player' gets shoved in Base but not in the port)"
    - "Mutator-list advertisement (BuildMutatorsString ':GlobalForces' + BuildMutatorsPrettyString ', Global forces') not implemented — the port has NO BuildMutatorsString hook chain at all, so the mutator never announces itself in server-info / scoreboard"
features:
  - id: mutator-globalforces.register.enable
    name: "Mutator registration + enable/scale cvar (g_globalforces doubles as force multiplier)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/globalforces/sv_globalforces.qc:7 (REGISTER_MUTATOR(mutator_globalforces, autocvar_g_globalforces))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:39 (IsEnabled => Cvars.GetFloat(\"g_globalforces\") != 0)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:44 (Hook)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:60 (Apply loop: IsEnabled -> Add -> Hook)"
      - "src/XonoticGodot.Server/GameWorld.cs:511 (MutatorActivation.Apply)"
    constants:
      - { name: "g_globalforces", base: "0 (off; doubles as force scale, mutators.cfg:495)", port: "0 default; Scale read from g_globalforces cvar (GlobalForcesMutator.cs:51)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: trace, ref: "[Mutator] source-gen -> Mutators.All -> MutatorActivation.Apply (GameWorld.cs:511, gated on IsEnabled) -> Add() -> Hook() subscribes OnPlayerDamage to PlayerDamageSplitHealthArmor chain", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.cs:101 Assert.NotNull(Mutators.ByName(\"globalforces\")); Boot(g_globalforces=1) activates it", result: pass }
    confidence: high
    notes: "Enable cvar IS the scale (QC damage_force * autocvar_g_globalforces; port Scale = Cvars.GetFloat(\"g_globalforces\")). Base is a PLAIN REGISTER_MUTATOR with NO instagib/arena exclusion predicate (unlike NIX), so the port's bare `g_globalforces != 0` predicate is faithful — verified against the full 31-line sv_globalforces.qc. Activation loop confirmed live (MutatorActivation.Apply reconciles IsEnabled -> Add -> Hook)."

  - id: mutator-globalforces.spread.hook
    name: "Knockback spread on PlayerDamage_SplitHealthArmor: push every other in-range player by the damage force"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/globalforces/sv_globalforces.qc:17 (MUTATOR_HOOKFUNCTION(mutator_globalforces, PlayerDamage_SplitHealthArmor))"
      - "server/utils.qh:9 (IS_PLAYER(v) := (v).classname == STR_PLAYER — server-side, classname-only, NO dead test)"
      - "server/mutators/events.qh (EV_PlayerDamage_SplitHealthArmor argv: force = M_ARGV(3))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:69 (OnPlayerDamage)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GlobalForcesMutator.cs:65 (IsLivePlayer = Client flag AND DeadState==No)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:401 (PlayerDamageSplitHealthArmor.Call with force)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/GameHooks.cs:41 (PlayerDamageArgs.Force = M_ARGV(3))"
    constants:
      - { name: "damage_force = M_ARGV(3) * g_globalforces", base: "force * autocvar_g_globalforces", port: "args.Force * Scale (GlobalForcesMutator.cs:80)", match: true }
      - { name: "loop_set", base: "FOREACH_CLIENT(IS_PLAYER(it) && it != frag_target) [server IS_PLAYER = classname=='player', NO dead test]", port: "FindByClass(\"player\") minus target, minus !IsLivePlayer (Client flag AND DeadState==No)", match: false }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Dead players are excluded from the knockback spread: IsLivePlayer (GlobalForcesMutator.cs:65) requires DeadState==DeadFlag.No, but Base's server-side IS_PLAYER (utils.qh:9) is classname-only and would still push a corpse still classed 'player'. Observable: a just-killed body near a blast is shoved in Base, stays put in the port."
    verification:
      - { kind: trace, ref: "DamageSystem.cs:387-404 fires PlayerDamageSplitHealthArmor with force (info.Force through Damage_Calculate); OnPlayerDamage iterates FindByClass(player) excluding target+dead", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.cs:248 GlobalForces_PushesNearbyPlayer_OnDamage — Combat.Damage on target with force (0,0,600) shoves an in-range bystander (Velocity becomes non-zero) end-to-end through the live hook", result: pass }
    confidence: high
    notes: "Hook fires once per player-damage application (DamageSystem.cs:401), matching Base cadence. Force provenance verified: PlayerDamageArgs.Force = M_ARGV(3) = damage_force vector. The zero-force early-out (GlobalForcesMutator.cs:81, return on damageForce==0) is behaviorally identical to Base's no-op loop (each calcpush of a zero vector returns zero), NOT a gap. Runtime test confirms the spread is LIVE end-to-end through Combat.Damage."

