unit: sv-impulse
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-27"
summary:
  feature_count: 13
  worst_gaps:
    - "minigame impulses are ROUTED in the QC order (DispatchImpulse calls Minigames.Impulse before the timeout gate), but the P0 games have NO impulse->token table — an impulse merely re-runs the player's pending Move; the per-game discrete-token mapping QC's minigame_event('cmd') performs is not modeled, so most weapon-key impulses are consumed but produce no real minigame move."
    - "the clone cheats CLONE_MOVING(140) and CLONE_STANDING(142) remain unported (need an engine CopyBody entity-clone service). GIVE_ALL(99), SPEEDRUN_INIT(30), SPEEDRUN(141), TELEPORT(143) and R00T(148) are now all routed and live."
    - "custom-priority impulses (200-229) cycle the per-group cl_weaponpriority0..9 lists, but an unset group list falls back to the MAIN cl_weaponpriority instead of QC's empty-category no-op (minor divergence)."
    - "SPEEDRUN's start-solid tracebox guard ('Cannot move there, cheater') and the AbortSpeedrun mutator hook (race timing) are not modeled; the CTS/race waypoint-clear self-kill does not check for / delete the .personal checkpoint (QC wraps it in `if(this.personal)`)."
