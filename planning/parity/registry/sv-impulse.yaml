      - { name: "give_all_impulse", base: "99 (CHIMPULSE_GIVE_ALL)", port: "99", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Minigame impulses are routed in the QC order (Minigames.Impulse at Commands.cs:2034 precedes the Timeout.IsPaused gate at 2035), but MinigameSessionManager.Impulse has no impulse->discrete-token table — for the P0 games it just re-runs the player's pending Move (returns Invalid otherwise). So a player in a session has the impulse CONSUMED but no meaningful move is produced from a raw weapon-key impulse. The per-game token mapping QC's minigame_event('cmd',...) performs is not modeled. (Detail belongs to a minigames unit; recorded here because the dispatch order/gate now matches.)"
    verification:
      - { kind: code_read, ref: "ServerNet -> Commands.Execute(\"impulse N\") -> CmdImpulse:1999 -> DispatchImpulse:2013: MapVote.Running vote-route (2019), Intermission.Running gate (2029), Minigames.Impulse:2034 (BEFORE Timeout.IsPaused:2035 — matches QC MinigameImpulse-before-timeout), round-not-started gate:2043, VehicleBoarding.Impulse:2050, imp==99 GiveAll, imp==148 R00t, imp==143 Teleport, waypoint 30-48 switch, imp==21 use, then WeaponImpulses.Handle.", result: pass }
      - { kind: code_read, ref: "round gate: `_world.Rounds is { IsRoundStarted: false } && (imp==17||imp==20||imp==21)` (Commands.cs:2043). Rounds set ONLY by EnableRounds on the live ActivateGameType path for CA/Dom/KH/FreezeTag/Onslaught/Assault/LMS/Survival/Invasion. LIVE.", result: pass }
      - { kind: code_read, ref: "Minigames.Impulse (MinigameSessionManager.cs:389): no-op (returns false) when caller not in an active session; otherwise re-runs Session.Move(pointer, impulse.ToString()) with no token table. Route is live but token-incomplete.", result: pass }
    confidence: high
    notes: "Line numbers re-pinned (CmdImpulse 1736->1999, DispatchImpulse 1750->2013) — file grew. Dispatch order/gating unchanged and faithful: MapVote->Intermission->Minigames->Timeout->round-gate->vehicle->cheats(99/143/148)->waypoints->use(21)->weapons. Residual is inside MinigameSessionManager (no impulse->token mapping), a minigames-unit concern."

