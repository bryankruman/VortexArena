summary:
  feature_count: 13
  worst_gaps:
    - "minigame impulses are now ROUTED (DispatchImpulse calls Minigames.Impulse before the timeout gate, matching QC order), but the P0 games have NO impulse->token table — an impulse merely re-runs the player's pending Move; the per-game discrete-token mapping QC's minigame_event('cmd') performs is not modeled, so most weapon-key impulses are consumed but produce no real minigame move."
    - "custom-priority impulses (200-229) NOW cycle the per-group cl_weaponpriority0..9 lists (CycleWeaponGroup -> WeaponPriorityForGroup), but only via the per-client sentcvar-replicated provider or the server cvar facade; an unset group list falls back to the MAIN cl_weaponpriority instead of QC's empty-category no-op (minor divergence)."
    - "waypoint impulses 30-48 are now implemented+routed, but the _crosshair (31/35/38) and _death (32/36/39) variants reuse the player's ORIGIN (no server-side crosshair trace / death_origin on this path); the .personal checkpoint ENTITY is unmodeled so the CTS/race clear self-kill resets to the normal spawn, not a stored origin."
    - "cheat impulses 140-147 (clone/speedrun/fixed-clone/teleport/drag) remain unported (need engine services); only GIVE_ALL (99) and R00T (148) are routed."
