unit: sv-impulse
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "custom-priority impulses (200-229) cycle the MAIN cl_weaponpriority list, not the per-group cl_weaponpriority0..9 lists QC uses (PriorityProvider only replicates cl_weaponpriority; PriorityHandle ignores the group number entirely)"
    - "minigame impulses are not routed from the impulse dispatcher (MinigameSessionManager.Impulse exists but has no caller from DispatchImpulse; a player in a minigame drives weapon selection instead of a minigame move)"
    - "use impulse (21) is not routed and the PlayerUseKey mutator hook (door/objective/button use) is never fired (only the +use button edge boards/exits vehicles)"
    - "round-not-started gate missing: drop/reload/use are allowed during the pre-round (CA/freezetag) warmup (RoundHandler.IsRoundStarted exists but DispatchImpulse never consults it)"
    - "waypoint-sprite impulses (30-48) are entirely unimplemented"
features:
  - id: sv-impulse.dispatch.commands_gate
    name: "ImpulseCommands dispatch + match-state gating"
    layer: [authority]
    base_refs:
      - "server/impulse.qc:ImpulseCommands"
      - "common/impulses/all.qh:REGISTRY(IMPULSES, 255)"
      - "server/client.qc:846 (PlayerPreThink calls ImpulseCommands)"
    port_refs:
      - "src/XonoticGodot.Server/Commands.cs:1298 (CmdImpulse)"
      - "src/XonoticGodot.Server/Commands.cs:1312 (DispatchImpulse)"
      - "game/net/ServerNet.cs:1228 (ProvideInput dispatches `impulse N`)"
      - "game/net/ServerNet.cs:1312 (ProvideInputPerFrame dispatches `impulse N`)"
    constants: []
    status:
      logic: partial
      values: na
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "minigame impulses are not routed: QC runs MinigameImpulse(this, imp) BEFORE weapon impulses (impulse.qc:379); the port has MinigameSessionManager.Impulse (MinigameSessionManager.cs:389) but DispatchImpulse never calls it (verified: no caller of .Impulse outside the manager). A player inside a minigame pressing a weapon key drives weapon selection instead of a minigame move."
      - "round-not-started gate missing: QC blocks weapon_drop/weapon_reload/use while round_handler_IsActive() && !round_handler_IsRoundStarted() (impulse.qc:383-395, CA/freezetag pre-round warmup); DispatchImpulse only gates intermission (Intermission.Running) + active timeout (Timeout.IsPaused), so a player can drop/reload during the round-start countdown. RoundHandler.IsRoundStarted (RoundHandler.cs:85) exists but is not consulted here."
      - "CheatImpulse branch absent (cheat impulses 99/140-148 not dispatched) — see sv-impulse.cheat.impulses."
    verification:
      - { kind: code_read, ref: "ServerNet.cs:1228/1312 -> Commands.Execute(\"impulse N\") -> CmdImpulse:1298 -> DispatchImpulse:1312 (gates Intermission.Running + Timeout.IsPaused + VehicleBoarding.Impulse, then WeaponImpulses.Handle)", result: pass }
      - { kind: code_read, ref: "grep `.MinigameImpulse`/`.Impulse(` callers from Commands/ServerNet = none; round-start predicate RoundHandler.IsRoundStarted exists but unwired", result: fail }
    confidence: high
    notes: "The client input byte (InputCommand.Impulse) is dispatched once-per-command on the live server tick via the gated `impulse` command path, then zeroed (st.Last.Impulse=0, matching QC CS(this).impulse=0 at impulse.qc:377). Vehicle-impulse gate IS present (DispatchImpulse:1324, runs before weapon impulses like QC vehicle_impulse). Order/gating is the partial part: minigame + round-start gates are absent and the cheat dispatch is absent."

