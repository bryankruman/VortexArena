  - id: mutator-bugrigs.player_physics.prevangles
    name: "PlayerPhysics hook stashes prevangles (+ disableclientprediction)"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/bugrigs/bugrigs.qc:326-335 MUTATOR_HOOKFUNCTION(bugrigs, PlayerPhysics)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/BugrigsMutator.cs:150 OnPlayerPhysics"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:260 MutatorHooks.PlayerPhysics.Call"
    constants:
      - { name: "disableclientprediction", base: "2", port: "not set (verified inert)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "player.disableclientprediction = 2 is intentionally NOT written. In Base it is a DP server->client engine flag (dpextensions) that tells the native DarkPlaces client to skip its built-in movement prediction for the rig; no QC reads it. VERIFIED inert in the port: the client-prediction carrier (game/net EntityMovementStep -> PlayerPhysics.Move -> CallPmPhysics) runs the SAME RaceCarPhysics through the shared static MutatorHooks.PMPhysics chain on the shared Api collision world (PlayerPhysics.cs:364/446-449), so the predicted rig is already in lockstep with authority — there is nothing for a prediction-disable flag to suppress. Writing to a field nothing reads would be dead code. Same stance as Race's freeze."
    gaps: []
    verification:
      - { kind: code, ref: "OnPlayerPhysics (:150-161) vs bugrigs.qc:326-335: g_bugrigs gate + BugrigsPrevAngles = Angles present and live (fired at PlayerPhysics.cs:260-261). disableclientprediction write intentionally omitted per divergence_rationale", result: pass }
      - { kind: code, ref: "Inertness verified: EntityMovementStep (client predictor, game/net) drives PlayerPhysics.Move which calls MutatorHooks.PMPhysics.Call -> RaceCarPhysics (PlayerPhysics.cs:364,446-449) — same shared sim as authority, so client prediction already matches the rig move", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests Bugrigs_PlayerPhysics_StashesPrevAngles (:217) (per suite green)", result: pass }
    confidence: high
    notes: "RECLASSIFIED 2026-06-25: was logic/values=partial with an unverified disableclientprediction gap. The omission is now a VERIFIED intended no-op (the shared PMPhysics chain runs RaceCarPhysics in the client predictor too, giving the same lockstep the DP flag would protect). Prevangles stash is faithful and live."
  - id: mutator-bugrigs.racecar.drive_model
    name: "RaceCarPhysics drive model (steer/accel/friction, planar surface-align vs FLY, body pitch/roll, smoothing) + racecar_angle"
    layer: [shared]
    base_refs:
      - "common/mutators/mutator/bugrigs/bugrigs.qc:104-306 RaceCarPhysics"
      - "common/mutators/mutator/bugrigs/bugrigs.qc:86-102 racecar_angle"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/BugrigsMutator.cs:198 RaceCarPhysics"
      - "src/XonoticGodot.Common/Gameplay/Mutators/BugrigsMutator.cs:183 RacecarAngle"
    constants:
      - { name: "responsiveness f = 1/(1+(|v|/speed_ref)^speed_pow)", base: "speed_ref=400, speed_pow=2", port: "400, 2", match: true }
      - { name: "racecar_angle angle_mult = forward/(800+forward)", base: "800", port: "800", match: true }
      - { name: "trace up height", base: "1024", port: "1024", match: true }
      - { name: "body-pitch down trace", base: "4 units", port: "4", match: true }
      - { name: "planar cancel threshold trace_fraction", base: "0.5", port: "0.5", match: true }
      - { name: "gravity term", base: "dt * PHYS_GRAVITY (sv_gravity)", port: "dt * Gravity (sv_gravity * entity gravity scale)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: unknown
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Planar branch adds an explicit Api.Entities.SetOrigin(self, neworigin) because the port engine does not auto-integrate a NOCLIP entity's trace-derived origin the way DarkPlaces MOVETYPE_NOCLIP does; this reproduces the same net displacement Base gets from the engine push. Pitch-convention is per-call-site: FixedVecToAngles for the planar surface-align (bugrigs.qc:242-248 vectoangles), plain VecToAngles2 for the final body pitch/roll (bugrigs.qc:271-278) and the smoothing pass (bugrigs.qc:303), matching the QC vectoangles/vectoangles2 originals (the intermediate body angle is re-vectored by the smoothing pass, so the un-negated form is faithful)."
    gaps: []
    verification:
      - { kind: code, ref: "Line-by-line RaceCarPhysics (:198-388) vs bugrigs.qc:104-306: reverse-speeding digital-brake, f responsiveness, steerfactor/accelfactor reverse_spinning/speeding branches, accel<0 vs >=0 friction_floor/brake branches incl reverse_stopping, planar 3-tracebox align (up 1024, xy move, down-to-surface) + <0.5 cancel + SET/UNSET_ONGROUND + NOCLIP, FLY fallback, 4u body-pitch trace, racecar_angle (:183 vs :86-102) all match", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests asserts rig movetype becomes Noclip/Fly after the hook (per suite green)", result: pass }
    confidence: medium
    notes: "Algorithm and all 6 numeric constants match Base line-for-line (MathF vs QC float math). presentation downgraded faithful->unknown: the drive model's whole purpose is the rendered rig orientation (surface-snap + body lean + smoothing writes to self.Angles), but there is NO in-game/visual verification of the integrated rig feel or rendered body fidelity, and the forced chase camera that makes it observable is itself missing (see chase_camera row). Per SCHEMA rule 5, unverified visible fidelity is 'unknown', not 'faithful'."
