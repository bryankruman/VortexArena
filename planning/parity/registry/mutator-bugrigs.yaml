    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base stuffcmds 'cl_cmd settemp chase_active 1' to the connecting client; the in-process listen server has no networked stuffcmd channel, so the faithful analogue is a direct Api.Cvars.Set('chase_active','1') (the client view reads chase_active each frame via NetGame CameraMode). The caller is gated to !p.IsBot because bots have no view (matches the human-only observable effect of the QC stuffcmd) and to bugrigsConnect.Added (mirrors QC ClientConnect only firing while the mutator is active)."
    gaps: []
    verification:
      - { kind: code, ref: "OnClientConnect (:126-130) sets chase_active=1; dispatched at GameWorld.cs:1336-1337 in InfraClientConnect (live connect tail, alongside superspec's connect), gated on !p.IsBot && Mutators.ByName('bugrigs').Added", result: pass }
    confidence: high
    notes: "FIXED since 2026-06-22 baseline: the mutator now drives the forced chase camera on connect. The port has no generic MutatorHooks.ClientConnect chain, so this is hand-dispatched from GameWorld.InfraClientConnect (same pattern as superspec). settemp/temporariness is not modelled but the observable effect (3rd-person view for the bugrigs client) is faithful."
