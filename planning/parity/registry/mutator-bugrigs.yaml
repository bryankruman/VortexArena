summary:
  feature_count: 7
  worst_gaps:
    - "No forced 3rd-person chase camera on join: a bugrigs player spawns in 1st person (Base stuffcmds chase_active 1 on ClientConnect), which is the wrong/unplayable view for a ground-hugging rig — and the rendered body fidelity of the rig (the whole point of the drive model's angle math) is therefore unverifiable."
    - "Mutator not advertised in the active-mutator strings (Base appends ':bugrigs' / ', Bug rigs'): the mode is invisible in the server browser mutator field and scoreboard/endmatch mutator list."
    - "player.disableclientprediction = 2 is not set (Base force-disables prediction per-tick); port treats bugrigs as server-authoritative so likely inert, but this is UNVERIFIED under the port's net smoothing/error-compensation layer."
