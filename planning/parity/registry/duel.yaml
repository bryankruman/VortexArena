  - id: duel.rules.player_limit_2
    name: "Hard 1v1 player limit (GetPlayerLimit -> 2)"
    layer: [authority]
    base_refs:
      - "common/gametypes/gametype/duel/sv_duel.qc:MUTATOR_HOOKFUNCTION(duel, GetPlayerLimit)"
      - "server/client.qc:2155:GetPlayerLimit (if(g_duel) return 2 short-circuit)"
      - "server/client.qc:2192:nJoinAllowed (free_slots = max(0, player_limit - currentlyPlaying))"
      - "server/client.qc:1105:status advert; server/bot/scripting bot-fill uses GetPlayerLimit()"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Duel.cs:45:PlayerLimit"
    constants:
      - { name: "player_limit", base: "2", port: "2 (const, unenforced)", match: false }
    status:
      logic: stub
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "A 3rd (or more) client can +jump-join a duel and play simultaneously: duel is not actually 1v1. ClientManager.JoinAllowed (ClientManager.cs:256) has NO free-slot/player-limit gate at all (its own doc-comment says the maxplayers/queue gates are 'deferred'); the Base free-slot cap (nJoinAllowed, client.qc:2192-2194) is unported, and Duel.PlayerLimit (=2) has no caller."
      - "Bot-fill is ALSO uncapped in duel: Base GetPlayerLimit() short-circuits to 2 for g_duel and that value feeds bot_fixcount; the port's BotPopulation.TargetBotCount reads g_maxplayers directly (BotPopulation.cs:240) with no duel->2 override, so bot fill ignores the duel cap. The free-slot status advert (client.qc:1105) is likewise not duel-aware."
    verification:
      - { kind: code_read, ref: "Duel.PlayerLimit refs are self-only (Duel.cs:12/19/44/45); ClientManager.JoinAllowed (ClientManager.cs:256-265) body has no player_limit/free_slots check; BotPopulation.cs:240 reads g_maxplayers not the duel cap", result: fail }
    confidence: high
    notes: "The const holds the correct value (2) but nothing reads it. Both player-facing enforcement points (join gate AND bot fill) bypass it. Single most impactful gap — duel's defining rule is not enforced."

