    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "STILL OPEN after Wave 5. A new gametype join gate was added — ClientManager.GametypeJoinGate, consumed in JoinAllowed (ClientManager.cs:301-302) — but it is wired ONLY for LMS: GameWorld.cs:874 sets `Clients.GametypeJoinGate = p => GameType is not LastManStanding lms || lms.CanJoin(...)`, which returns true for every non-LMS gametype, so duel gets NO free-slot cap. The rest of JoinAllowed (ClientManager.cs:287-303) still has only the MIN_SPEC_TIME / lockteams / play-ban gates. The Base free-slot cap (nJoinAllowed, client.qc:2192-2194: free_slots = max(0, player_limit - currentlyPlaying)) is unported, and Duel.PlayerLimit (=2) has NO external caller (all refs are self/doc, Duel.cs:12/19/28/49/50/73). A 3rd+ client can still +jump-join a duel and play simultaneously."
      - "Bot-fill is STILL uncapped in duel: BotPopulation.FixCount passes playerLimit: Cvars.Int(\"g_maxplayers\") (BotPopulation.cs:252) into TargetBotCount with NO duel->2 override. (TargetBotCount itself correctly clamps to playerLimit at BotPopulation.cs:293-294 — only the value fed in is wrong.) The free-slot status advert (client.qc:1105) is likewise not duel-aware. Duel.cs:28-31 still records this as deferred. UNCHANGED by Wave 5."
