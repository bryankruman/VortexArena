unit: mutator-damagetext
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 9
  worst_gaps:
    - "2D fallback mode is effectively absent: the port never applies the close-range (cl_damagetext_2d_close_range 125), out-of-view (cl_damagetext_2d_out_of_view), or spectating (spectatee_status) heuristics, the 2d_overlap_offset stagger, or the separate 2D fade(1.3s)/shrink(3s) lifetimes — it only drops to a screen-center number when the camera is null/behind. Numbers for very close or just-off-screen hits behave differently from Base, and 2D numbers never shrink."
    - "World drift reduced to a vertical world-Z rise: QC offsets the number along the view basis (velocity_world/offset_world along forward/right/up) before projecting; the port keeps only the Z component as a world-up rise (hardcoded 0.0254 inch->meter scale) and drops the forward/right offsets, so the number doesn't track the view-relative placement Base uses."
    - "Color codes not rendered: the draw uses Godot DrawString (plain) instead of drawcolorcodedstring2, so ^x color codes in cl_damagetext_format render literally; font is the Godot fallback font (no drawfontscale crisp-scaling), not the Xonotic HUD font."
    - "Server visibility tiers collapsed: no Net_LinkEntity; DrainPending is a host-local queue consumed only on the host path (NetGame.cs:2260 'if (_server is not null)'), so sv_damagetext 1/3 (spectators-only, all-players) and spectator/observer filtering are not modeled and a pure remote client sees no damage text (intended host-only divergence)."
    - "ClientDisconnect dent_attackers clear is missing (no ClientDisconnect mutator hook exists in MutatorHooks), and the ui_damagetext settings menu tab has no port counterpart. (2026-06-22 re-audit post Wave-1/2: the only damagetext edit on claude/parity-port-waves is a doc comment acknowledging the ClientDisconnect gap — no fix, no hook added.)"
