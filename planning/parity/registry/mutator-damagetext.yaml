summary:
  feature_count: 9
  worst_gaps:
    - "Server visibility tiers collapsed (INTENDED host divergence): no Net_LinkEntity; DrainPending is a host-local queue consumed only on the host path (NetGame.cs 'if (_server is not null)'), so sv_damagetext 1/3 (spectators-only, all-players) and spectator/observer filtering are not modeled and a pure remote client sees no damage text."
    - "Minor presentation residual on the world-number draw: the label uses a direct integer pixel size instead of QC's drawfontscale crisp-cell scaling (size/size_max cell rendered at size_max), so glyph metrics differ slightly. Color codes, the Xonotic HUD font, the full view-basis world drift, and horizontal centering are now all faithful."
    - "FIXED post Wave-6: ClientDisconnect dent_attackers clear — the MutatorHooks.ClientDisconnect hook now exists (MutatorHooks.cs:61), is fired live (ClientManager.cs:788), and DamagetextMutator.OnClientDisconnect (DamagetextMutator.cs:214-224) removes the leaver from every live player's DentAttackers set."
    - "FIXED post Wave-6: the Damage Text settings menu tab is now ported (DialogSettingsGameDamageText, DialogSettingsGame.cs:802) and wired live (DialogSettingsGame.cs:42) — faithful to ui_damagetext.qc (all widgets, cvar bindings, ranges, dependencies)."
    - "FIXED post Wave-6: the world-number drift is now placed along the full view basis (forward/right/up via velocity_world+offset_world, DamageTextLayer.cs:277-291) and the label is drawn with color codes (HudText.Parse) in the Xonotic HUD font (HudPanel.HudFont, DamageTextLayer.cs:301-318) — both baseline worst-gaps closed."
