summary:
  feature_count: 9
  worst_gaps:
    - "World drift reduced to a vertical world-Z rise: QC offsets the number along the view basis (velocity_world/offset_world along forward/right/up) before projecting; the port keeps only the Z component as a world-up rise (hardcoded 0.0254 inch->meter scale) and drops the forward/right offsets, so the number doesn't track the view-relative placement Base uses. (STILL OPEN post Wave-5 — DamageTextLayer.cs:277-278 unchanged.)"
    - "Color codes not rendered: the draw uses Godot DrawString (plain) instead of drawcolorcodedstring2, so ^x color codes in cl_damagetext_format render literally; font is the Godot fallback font (no drawfontscale crisp-scaling), not the Xonotic HUD font. (STILL OPEN post Wave-5 — DamageTextLayer.cs:291-294 unchanged.)"
    - "Server visibility tiers collapsed: no Net_LinkEntity; DrainPending is a host-local queue consumed only on the host path (NetGame.cs:2260 'if (_server is not null)'), so sv_damagetext 1/3 (spectators-only, all-players) and spectator/observer filtering are not modeled and a pure remote client sees no damage text (intended host-only divergence)."
    - "ClientDisconnect dent_attackers clear is missing (no ClientDisconnect mutator hook exists in MutatorHooks), and the ui_damagetext settings menu tab has no port counterpart. (Wave-5 added only a doc comment in DamagetextMutator.cs:73-82 acknowledging the ClientDisconnect gap — no fix, no hook added.)"
    - "FIXED post Wave-5: the 2D placement heuristics (close-range cl_damagetext_2d_close_range 125, out-of-view cl_damagetext_2d_out_of_view, spectatee_status gate, 2d_overlap_offset stagger, and the separate 2D fade(1.3s)/shrink(3s) lifetimes) are now implemented and live in DamageTextLayer.Add (canUse2d fed from NetGame.cs:2269 !IsObserving == QC spectatee_status != -1)."
