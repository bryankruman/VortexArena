summary:
  feature_count: 14
  worst_gaps:
    - "Fire gate does no fire-time trace: Base's AIMDIST firecheck rides a tracebox in turret_do_updates (tur_dist_impact_to_aimpos), which makes a wall between muzzle and aimpos block the shot (de-facto LOS); the port's OnTarget (TurretAI.cs:801) is still a pure geometric barrel-line check, so the port fires THROUGH walls."
    - "FIXED: the Wave-2 retaliation regression (TurretAI.Damage set `turret.Enemy = attacker` on every hit) is removed — Base never adopts the attacker as an enemy through the damage path (TFL_DMG_RETALIATE is set on the machinegun but NEVER READ by any Base code), so the port no longer turns to face whoever shot it. Acquisition is scan/score-only, matching Base."
    - "Die() still does a RadiusDamage death blast that Base has COMMENTED OUT (sv_turrets.qc:182) — a stock machinegun turret should do zero death explosion damage. (NOT fixed in Wave-2.)"
    - "validate_target still omits checkpvs (Base validate_target:688 rejects targets outside the turret PVS, independent of the LOS flag); headshake (tur_head jitter on hit) still absent (no tur_head sub-entity)."
    - "All client presentation still missing: head sub-entity/model at tag_head, muzzle flash, EFFECT_BULLET tracer, head-bone animation, low-health sparks/smoke, team glow, waypoint sprite/healthbar, death gibs."
