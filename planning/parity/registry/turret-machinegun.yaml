last_audited: "2026-06-22"
summary:
  feature_count: 14
  worst_gaps:
    - "Fire sound diverges: on the TURRET path Base plays NO fire sound (W_SetupShot_Dir, which emits SND_MachineGunTurretAttack_FIRE=electro_fire, is gated behind `if (isPlayer)` and a turret actor is not a player); the port unconditionally plays `weapons/uzi_fire.wav` — an audible cue Base never produces for the turret."
    - "TurretAI.Damage (inactive-immunity, friendly-fire scaling, TFL_DMG_HEADSHAKE; note: machinegun does NOT set TFL_DMG_RETALIATE) is DEAD on the live path — no damage-router caller; live damage goes through the generic DamageSystem instead, so inactive turrets aren't immune, friendly-fire uses generic rules, and the head never shakes."
    - "Die() does a RadiusDamage death blast that Base has commented out (sv_turrets.qc:182) — a stock machinegun turret should do zero death explosion damage."
    - "Fire gate does no fire-time trace: Base's AIMDIST firecheck rides a tracebox in turret_do_updates (tur_dist_impact_to_aimpos), which makes a wall between muzzle and aimpos block the shot (de-facto LOS); the port's OnTarget is a pure geometric barrel-line check, so the port fires THROUGH walls."
    - "Acquisition gating diverges: port adds SelectAngleLimits (Base machinegun has none) and omits checkpvs (Base rejects targets outside the turret PVS); aim adds z-predict Base doesn't request."
    - "All client presentation missing: head sub-entity/model at tag_head, muzzle flash, EFFECT_BULLET tracer, head-bone animation, low-health sparks/smoke, team glow, waypoint sprite/healthbar, death gibs."
