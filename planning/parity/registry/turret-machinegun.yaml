summary:
  feature_count: 14
  worst_gaps:
    - "FIXED (re-verified 2026-06-27): the muzzle flash + EFFECT_BULLET tracer ARE emitted on the live turret Attack path (MachinegunTurret.cs:95-102 — TurretCombat.FireBullet tracerEffect:\"BULLET\" sweeps EFFECT_BULLET via EffectEmitter.EmitTrail >16u, and EffectEmitter.Emit(\"MACHINEGUN_MUZZLEFLASH\") fires the muzzleflash). Both effects are registered (EffectsList.cs:78 uzi_muzzleflash, :246 tr_bullet isTrail) and networked via the standard EffectRequest sink."
    - "FIXED since the 2026-06-25 row-write (stale registry corrected): the NORMAL-respawn-path death FX, impact sound, and gib toss are now LIVE. TurretAI.Die:1102-1107 emits EFFECT_ROCKET_EXPLODE + plays weapons/rocket_impact.wav AND calls TossDeathGibs on EVERY death (not just NORESPAWN); TossDeathGibs/TossGib/GibBoom (:1199-1307) spawn the base-gib + head_model debris as server-side physics entities that render via the entity feed (the vehicle-wreckage pattern). The 2026-06-25 die_respawn row still recorded presentation/audio MISSING — that was stale (these landed in Wave 15, 322fc26)."
    - "FIXED since the 2026-06-25 row-write: low-health sparks/smoke ARE emitted. TurretAI.DrawFx:1319-1337 (called every think from RunCombat:686) throws te_spark <127hp, SMOKE_LARGE <85hp, SMOKE_SMALL <32hp from one shared random roll, faithful to cl_turrets.qc:39-53. The summary previously listed this as still-missing."
    - "Residual CLIENT presentation still missing (the true dominant residual): no tur_head sub-entity / machinegun.md3 HEAD MODEL at tag_head (head is angle-state only, so the head model never renders or frame-animates and the muzzle flash anchors at the muzzle ORIGIN not a tag_fire bone), no team glowmod/colormap, and no waypoint sprite / 2D healthbar (turret_draw2d). Sparks/smoke + death gibs + muzzleflash/tracer are now DONE; the head-model render, team glow, and waypoint/healthbar are what remain."
    - "NEW REGRESSION this wave (2026-06-28, uncommitted): turret_respawn no longer restores the full volley. The wave rewrote Respawn (TurretAI.cs:1205) to `VollyCounter = ShotVollyMax > 0 ? ShotVollyMax : 1`, but ShotVollyMax (TurretAI.cs:98) is NEVER ASSIGNED anywhere — TurretSpawn.Init sets VollyCounter, not ShotVollyMax (grep: zero `ShotVollyMax =` sites). It defaults to 0, so a respawned machinegun (shot_volly=5) resets VollyCounter to 1 instead of 5. Net effect: the FIRST burst after respawn is a single shot then the 0.5s volley pause (self-corrects to 5 on the next burst, since Fire resets VollyCounter to p.ShotVolly). Minor but a real Base divergence (Base turret_respawn sv_turrets.qc:282 resets to shot_volly). The comment claims Init clamps it — false. Fix: set st.ShotVollyMax = shotVolly>1?shotVolly:1 in TurretSpawn.Init."
    - "FIXED: checkpvs is in ValidTarget (TurretAI.cs:333, Api.Trace.CheckPvs before alpha/team/range, no-op on unvised maps like DarkPlaces); the fire-time AIMDIST on-target test rides a REAL tracebox (UpdateImpact:837, RunCombat:808-818 tests st.DistImpactToAimPos when engine services exist, geometric OnTarget only headless) so the port no longer fires through walls; TFL_DMG_HEADSHAKE is applied (EventDamage:1056-1060); and turret_firecheck is fully ported (target-of-opportunity :777, AFF :801 flag-gated, volley pre-ammo :823)."
