unit: minigames
category: misc
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-07-02"
summary:
  feature_count: 31
  worst_gaps:
    - "NMM + Bulldozer session state lives in Session.Extra (NmmState/BdState) which MinigameNetState never encodes -> a remote client sees an EMPTY board for both games (renderer has no nmm/bd draw path either); only Pong gets a bespoke encode"
    - "Bulldozer is unplayable on the live path: LoadLevel() has no live caller, the shipped minigames/bulldozer/storage_level*.txt files are never read, sv_minigames_bulldozer_startlevel is not a cvar, and the menu verbs (next/restart/edit/save) are misparsed by Bulldozer.Move as direction moves"
    - "Invite never notifies the target: Commands.CmdMinigame discards the session name (out _) and no Send_Notification(INFO_MINIGAME_INVITE) is dispatched (the notif template EXISTS in NotificationsList.cs:839); the in-game menu also has no Invite submenu"
    - "The 'It's your turn' prompt (minigame_prompt -> HUD_Notify_Push with the game icon) is not ported at all — opponents get no nudge when it's their move"
    - "Per-game keyboard board control (arrows/enter/space navigation in every *_client_event) is not ported for the GRID games — only Pong's paddle key-drive is wired (HudManager.DrivePongKeys -> PongMoveSink); Bulldozer, whose ONLY play input is arrow keys, therefore has no client input path at all"
