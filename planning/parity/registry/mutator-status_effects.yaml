unit: mutator-status_effects
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Burn damage is wrong AND frame-rate-dependent: Tick deals strength*0.05 per server frame; at TicRate 1/72 that is ~3.6x the intended DPS per second (Base = fire_damagepersec*frametime summed to dps/s). Base's Fire_AddDamage dps/time stacking + fire hitsound + fire_owner attribution + DEATH_FIRE deathtype are all absent (port passes the unregistered string \"burning\")."
    - "Per-effect m_tick mechanics collapsed: no EF_FLAME/EF_SHOCK/EF_ADDITIVE|EF_FULLBRIGHT .effects flags, no water/frozen self-extinguish for burning, no SpawnShield post-game_starttime shimmer, no Stunned shock aura — the generic port Tick has no per-effect dispatch."
    - "m_persistent / SetPersistent mechanism is DEAD (no caller, no per-frame PERSISTENT recompute). Unlimited-superweapon persistence is faked by re-applying a 999s timer, so the networked PERSISTENT bit is never set (HUD infinity for unlimited SW comes from the items-flag path, not the effect flag)."
    - "Frozen ice block (MDL_ICE follow entity) + RemoveGrapplingHooks-on-freeze unimplemented; Base's local full-screen blue CSQC drawfill self-flash replaced by a per-model colormod (intended)."
    - "No status-effect mass-clear hooks on PlayerDies/MonsterDies/ClientDisconnect/MakePlayerObserver/reset_map_global/PutClientInServer (Base removeall+clearall); stale timers can survive death/respawn/map reset, and SpectateCopy effect-aliasing is absent."
    - "Removal sounds (m_sound_rm: Burning steam_burst, Stunned ons_spark1, Superweapon POWEROFF) and the superweapon play_countdown beep are never emitted on removal/expiry."
