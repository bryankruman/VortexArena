      - "src/XonoticGodot.Common/GameInit.cs:26"
    constants:
      - { name: "REGISTRY size", base: "32", port: "Registry<StatusEffectDef> (unbounded; sized by count)", match: true }
      - { name: "m_lifetime default", base: "30", port: "0 on def (HUD falls back to StatusEffectLifetime=30)", match: true }
      - { name: "m_color/m_icon/m_name/m_sound/m_sound_rm/m_persistent on def", base: "present", port: "dropped (HUD uses PowerupMeta table; no sound/persistent methods)", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
