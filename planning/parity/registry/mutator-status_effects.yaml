      - "common/mutators/mutator/status_effects/sv_status_effects.qc:m_apply"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/StatusEffects.cs:StatusEffectsCatalog.Apply"
    constants:
      - { name: "guard eff_time<=time => no-op", base: "yes", port: "no (Apply always applies; duration<=0 stored as ExpireTime=0 = permanent)", match: false }
      - { name: "auto-set ACTIVE flag", base: "yes", port: "yes (Flags|=Active)", match: true }
      - { name: "replace (not add) timer", base: "replace", port: "replace", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Apply lacks Base's eff_time<=time early-return guard. Base no-ops a non-future apply; the port instead treats duration<=0 as ExpireTime=0 which the Tick reads as PERMANENT (never times out) — a semantic divergence at the duration<=0 boundary, exploited intentionally by SuperweaponTimeout (999s) and by FreezeTag/NadeIce passing 0 for until-thawed."
    verification:
      - { kind: code, ref: "live Apply sites confirmed: DamageSystem.ApplyFrozen/ApplyBurning, GiveItems(superweapon/powerup/buff), ItemPickupRules, BuffsMutator(buff+stunned), NadeIceBoom, NadeNapalmBoom, Fireball x2, MonsterFramework, PhaserTurret, SpawnSystem(superweapon), FreezeTag", result: pass }
    confidence: high
    notes: "Refresh-if-present path matches Base replace semantics and is widely live. The duration<=0 => permanent behavior is load-bearing for the bespoke superweapon persistence."

