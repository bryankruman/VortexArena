unit: mutator-status_effects
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Lifecycle mass-clear is still DEAD: RemoveAll/ClearAll now exist (with per-effect m_remove + sound) but NO host caller wires them to PlayerDies/MonsterDies/ClientDisconnect/MakePlayerObserver/reset_map_global/PutClientInServer. Stale burning/stunned/superweapon timers can still survive death/respawn/map reset; SpectateCopy effect-aliasing still absent."
    - "Removal sounds are wired but two of three resolve to NULL: Remove() now plays def.RemovalSound via Sounds.ByName on a NORMAL removal, but ByName is StringComparer.Ordinal (case-sensitive) and the burning sound 'steam_burst' is not registered at all while stunned's 'ons_spark1' mismatches the registered key 'ONS_SPARK1' — both silently no-op. Only superweapon 'POWEROFF' resolves and actually plays."
    - "Per-effect presentation (.effects flags) still missing: SpawnShield EF_ADDITIVE|EF_FULLBRIGHT post-game_starttime shimmer and Stunned EF_SHOCK aura have no port mechanism (no per-entity .effects field). Burning EF_FLAME is a client particle burst (not the .effects flag) — visual present, mechanism divergent."
    - "Frozen status effect still has no MDL_ICE block entity, no RemoveGrapplingHooks-on-freeze, and no SVQC lava/STAT_FROZEN per-effect extinguish; the blue self-flash is replaced by an intended per-model colormod. (UNCHANGED from baseline.)"
    - "Player spawnshield is still NOT the spawnshield status effect — it remains the bespoke Entity.SpawnShieldExpire timer (SpawnSystem:605); only monsters use the registered spawnshield def. SuperweaponTimeout still re-applies a 999s timer (the PERSISTENT bit is now set independently by the per-tick m_persistent recompute, so the fake timer is now belt-and-suspenders, not the persistence source)."
