summary:
  feature_count: 13
  worst_gaps:
    - "Per-effect .effects-flag presentation is still missing: SpawnShield EF_ADDITIVE|EF_FULLBRIGHT post-game_starttime shimmer and Stunned EF_SHOCK aura have no port mechanism (no per-entity .effects field; SpawnShieldTick is a documented no-op). Burning EF_FLAME is a client particle burst (not the .effects flag) — visual present, mechanism divergent."
    - "Frozen status effect still has no MDL_ICE block entity, no RemoveGrapplingHooks-on-freeze, no SVQC lava/STAT_FROZEN per-effect extinguish for the frozen def itself, and no local full-screen blue CSQC drawfill self-flash; the blue self-flash is replaced by an intended per-model colormod. (UNCHANGED from baseline.)"
    - "Player spawnshield is still NOT the spawnshield status effect — it remains the bespoke Entity.SpawnShieldExpire timer (SpawnSystem:605); only monsters use the registered spawnshield def (with a no-op tick). Superweapon per-second play_countdown beep (last 6s) is absent (only the Remove-time POWEROFF plays). (UNCHANGED.)"
    - "HUD infinity glyph is still inferred from ExpireTime<=0 (permanent timer) rather than the now-networked PERSISTENT flag (PowerupsPanel:220); behaviorally close but flag-derivation diverges. m_color/m_icon/m_name still dropped from the def (HUD reconstructs from PowerupMeta). (UNCHANGED.)"
    - "SpectateCopy effect-aliasing (client.statuseffects = spectatee.statuseffects) has no port analogue — intentional N/A (no statuseffects_store entity; remote viewing covered by the per-entity NetEntity blob). (UNCHANGED.)"
