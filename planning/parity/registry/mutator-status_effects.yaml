      - { name: "PERSISTENT recompute per tick (BITSET via m_persistent)", base: "yes", port: "no (no per-effect dispatch)", match: false }
      - { name: "per-effect m_tick dispatch", base: "FOREACH active -> it.m_tick", port: "single hardcoded burning branch; no other effect ticks", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: missing
      audio: missing
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Tick has no per-effect dispatch: it expires timers + applies a hardcoded burn hit, but never recomputes PERSISTENT, never runs per-effect m_tick (EF_FLAME/EF_SHOCK/EF_ADDITIVE|FULLBRIGHT), and never self-extinguishes burning in water/while frozen."
      - "Tick scope is live players only (skips observers/dead via the GameWorld.cs:1131 guard), not all damagedbycontents entities — monsters tick burning via their own MonsterFramework path; a non-player non-monster ignite would not tick at all."
      - "Burn damage in Tick is strength*0.05 per server FRAME (not per second, not *frametime), so it is frame-rate-dependent: at TicRate 1/72 it deals ~3.6x the intended dps/s; only at a 20tps frame would it coincidentally equal dps*frametime."
    verification:
