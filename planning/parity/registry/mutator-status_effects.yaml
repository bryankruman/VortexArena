      - "StatusEffectDef drops m_color/m_icon/m_name/m_sound/m_sound_rm and the m_persistent/m_tick/m_remove methods; def is data-poor (HUD reconstructs label/icon/color from a separate PowerupMeta table in PowerupsPanel)."
    verification:
      - { kind: code, ref: "RegisterAll seeds frozen/burning/spawnshield(10)/stunned(10)/superweapon + webbed + strength/shield/speed/invisibility + 13 buffs; called at GameInit.cs:26", result: pass }
