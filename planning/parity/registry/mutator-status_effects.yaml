unit: mutator-status_effects
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 13
  worst_gaps:
    - "Player spawnshield is STILL not the spawnshield status effect — it remains the bespoke Entity.SpawnShieldExpire timer (SpawnSystem:687). The registered spawnshield def is applied only to monsters (MonsterAI:298 via MonsterFramework.ApplyFor), so the EF_ADDITIVE|EF_FULLBRIGHT post-game_starttime shimmer is produced for monsters but never for players. Liveness for the spawnshield effect is partial."
    - "Frozen status effect still has no MDL_ICE block entity (Frozen_ice_create/think/remove), no RemoveGrapplingHooks-on-first-apply, no SVQC lava/STAT_FROZEN per-effect extinguish for the frozen def itself (it carries no OnTick), and no local full-screen blue CSQC drawfill self-flash; the blue self-flash is replaced by an intended per-model colormod. (UNCHANGED.)"
    - "Burning EF_FLAME is still a client particle burst (ClientWorld.cs:1158), not the networked .effects flag — Base burning.qc:21 sets actor.effects |= EF_FLAME and m_remove clears it; the port's BurningTick deliberately leaves .effects alone and the client emits an EF_FLAME particle each frame on burning entities. Visual present, mechanism divergent. Fire TRANSFER to overlapping entities still a host-loop todo."
    - "HUD infinity glyph is still inferred from ExpireTime<=0 (permanent timer) rather than the now-networked PERSISTENT flag (PowerupsPanel:220); behaviorally close but flag-derivation diverges. m_color/m_icon/m_name still dropped from the def (HUD reconstructs from PowerupMeta). (UNCHANGED.)"
    - "Superweapon per-second play_countdown beep (last 6s, server/client.qc) is still absent (only the Remove-time POWEROFF plays). SpectateCopy effect-aliasing (client.statuseffects = spectatee.statuseffects) has no port analogue — intentional N/A. (UNCHANGED.)"
