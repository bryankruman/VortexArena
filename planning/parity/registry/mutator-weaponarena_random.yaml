unit: mutator-weaponarena_random
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 6
  worst_gaps:
    - "g_weaponarena -> map-weapon intersection unmodeled: the '*_available' arena keywords (all_available / most_available / devall_available) can't intersect with the weapons actually present on the map (no weaponsInMapAll in the port), so they fall back to the full all/most/devall set. Intended divergence; only differs when a map carries a weapon subset."
features:
