    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WeaponArenaRandomMutator.cs:OnGiveFragsForKill"
      - "src/XonoticGodot.Server/Scores.cs:520"
    constants:
      - { name: "suicide skip", base: "if(targ==attacker) return", port: "ReferenceEquals(targ,attacker) return", match: true }
      - { name: "culprit detection", base: "DEATH_WEAPONOF(deathtype) else held; not-owned fallback to held", port: "DeathTypes.WeaponNetNameOf else held; same fallback", match: true }
      - { name: "with_blaster no-swap", base: "if(with_blaster && culprit==WEP_BLASTER) skip", port: "same", match: true }
      - { name: "no-pick guard", base: "if(scratch) add+drop else keep culprit", port: "if(!pick.IsEmpty) add+drop", match: true }
      - { name: "swap pool", base: "warmup ? WARMUP_START_WEAPONS : start_weapons, minus owned, minus culprit", port: "ArenaWepSet() (no warmup branch), minus owned, minus culprit", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Swap pool starved: ArenaWepSet() = ComputeStartItems() = {blaster}; after removing owned+culprit nothing remains, so no weapon is ever added on a frag in a real match (same root cause as the spawn gap: missing g_weaponarena->start_weapons expansion)."
      - "GiveFragsForKill omits the warmup branch (Base: scratch = warmup_stage ? WARMUP_START_WEAPONS : start_weapons; port always uses ArenaWepSet() with no WarmupStage consult). WarmupStage exists in the port (NotificationSystem.cs:181) and WARMUP_START_WEAPONS = weapons_all() under g_warmup_allguns is absent, so this is a real omission, not just starvation."
    verification:
      - { kind: code, ref: "MutatorHooks.GiveFragsForKill.Call at Scores.cs:520 with weaponEntity=null — handler IS invoked on every enemy frag; culprit fallback maps QC wep_ent.m_weapon to Inventory.CurrentWeapon(attacker)", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.WeaponArenaRandom_GiveFragsForKill_SwapsCulpritWeapon (seeded owned set, drop verified)", result: pass }
      - { kind: code, ref: "ArenaWepSet()->ComputeStartItems() yields {blaster} (no g_weaponarena expansion); no warmup_start_weapons distinction; WarmupStage not consulted", result: fail }
