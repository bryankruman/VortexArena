    base_refs:
      - "common/mutators/mutator/weaponarena_random/sv_weaponarena_random.qc:16"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WeaponArenaRandomMutator.cs:OnPlayerSpawn"
      - "src/XonoticGodot.Server/ClientManager.cs:542"
    constants:
      - { name: "with_blaster set-aside/re-add", base: "&= ~WEPSET(BLASTER) then |= WEPSET(BLASTER)", port: "Remove(blaster) then Add(blaster)", match: true }
      - { name: "draw_count", base: "g_weaponarena_random", port: "RandomCount", match: true }
      - { name: "owned_set_replaced (not OR'd)", base: "STAT(WEAPONS)=W_RandomWeapons(...)", port: "OwnedWeaponSet = chosen", match: true }
    status:
      logic: faithful
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Arena weapon set never populated on the live path: port lacks the base g_weaponarena -> start_weapons expansion, so on spawn player.OwnedWeaponSet is the DefaultLoadout {blaster}; drawing N from {blaster} yields only the blaster. Logic is correct but starved of input (the base-arena dependency is missing). Tests mask this by manually seeding a wide owned set (MutatorBatchT19Tests.cs:589)."
    verification:
      - { kind: code, ref: "MutatorHooks.PlayerSpawn.Call at ClientManager.cs:542, after PutPlayerInServer set the loadout — handler IS invoked on the real spawn path", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.WeaponArenaRandom_PlayerSpawn_GivesRandomSubset / _WithBlaster_AlwaysKeepsBlaster (seeded pool)", result: pass }
      - { kind: code, ref: "SpawnSystem.DefaultLoadout = {blaster}; ComputeStartItems starts from {blaster} and no SetStartItems mutator adds arena weapons; no g_weaponarena string->weaponset expansion anywhere in port", result: fail }
    confidence: high
    notes: "Liveness corrected partial->live (baseline conflated 'effectively no-op' with 'not wired'): the handler IS invoked on every real spawn — the defect is the starved pool, captured as a values gap (subset is degenerate). Verified player.OwnedWeaponSet is a public FIELD on Entity (EntityGameplayState.cs:13), so attacker.OwnedWeaponSet.Add()/Remove() mutate in place; the by-value WepSet struct copies inside RandomWeapons don't alias the field — no silent-no-op bug. Blaster set-aside (have.Remove on a value copy) then re-add then assign-back is correct."

  - id: mutator-weaponarena_random.givefragsforkill
    name: "GiveFragsForKill: swap culprit weapon for a new random one"
