      - "src/XonoticGodot.Server/Bot/Waypoint.cs:LinearCost"
    constants:
      - { name: "sv_maxspeed", base: "320", port: "320 (MaxSpeed)", match: true }
      - { name: "sv_gravity", base: "800", port: "800 (Gravity)", match: true }
      - { name: "jumpheight_vec.z", base: "~130 (from sv_jumpvelocity 270)", port: "130 (JumpHeight)", match: true }
      - { name: "bunnyhop speed factor", base: "1.25 if skill>=bot_ai_bunnyhop_skilloffset(7)", port: "always 1.0 (base speed)", match: false }
      - { name: "underwater speed factor", base: "0.7", port: "0.7 (approximated as whole-segment scale)", match: false }
      - { name: "crouch speed factor", base: "0.5", port: "0.5 (approximated as whole-segment scale)", match: false }
      - { name: "JUMP-source fall cost", base: "jumpheight_time + sqrt((height+jh)/(g/2))", port: "plain sqrt(height/(g/2)) (fromIsJump unused)", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Cost is not skill-dependent: Base divides distance by sv_maxspeed*1.25 for skill>=bot_ai_bunnyhop_skilloffset (7); the port always uses base speed, so high-skill path costs differ and can change tie-break route choices."
      - "JUMP-source fall-cost variant NOT implemented: Base uses jumpheight_time + sqrt((height+jumpheight_vec.z)/(g/2)) when the source has WAYPOINTFLAG_JUMP; the port's TravelCost takes a fromIsJump arg but never uses it in the fall term — it always computes the non-jump sqrt(height/(g/2)). (The draft incorrectly claimed the jump-source variant matched.)"
      - "Water/crouch endpoints applied as a whole-segment speed multiplier rather than Base's (c + slowcost)/2 half-path average; both-endpoints-submerged/crouched should be the pure underwater/crouched linear cost (Base early-returns it), which the multiplier approximates but does not equal."
    verification:
      - { kind: code, ref: "side-by-side TravelCost vs waypoint_gettravelcost:1028-1063 + waypoint_getlinearcost:1010-1026", result: partial }
    confidence: high
    notes: "Non-jump fall-time term sqrt(height/(g/2)) with max(flatcost,fallcost) matches. Three real divergences: skill speedup, the unused JUMP-source variant, and the half-path water/crouch math (whole-segment scale, not Base's averaging/early-return)."

