    constants:
      - { name: "nearest_seed_increment_onground", base: "750 (max 50000)", port: "n/a (A* from single Nearest node)", match: false }
      - { name: "nearest_seed_increment_air", base: "500 (max 1500)", port: "n/a", match: false }
      - { name: "per_waypoint_danger_bias", base: "+ wp.dmg added to wpcost per node", port: "none (pure link cost)", match: false }
      - { name: "unwalkable_link_cost", base: "999 sentinel skipped", port: "999 sentinel skipped (link.Cost >= 999)", match: true }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port uses A* between the two nearest nodes (start, goal) instead of Base's single-source Dijkstra flood with per-edict scratch state. Both yield an optimal least-cost path over the cost terms both implement; the port re-plans per goal so it doesn't need Base's all-pairs flood, and keeping cost/back-pointer state out of the immutable node lets one WaypointNetwork be shared across all bots. The algorithm-shape change is intentional; the missing .dmg danger term and skill-cost term (gaps) are NOT part of the intended divergence and must be re-added on top."
    gaps:
      - "No per-waypoint danger bias: Base adds each waypoint's .dmg (set by botframe_updatedangerousobjects, navigation.qc:1134-1165 cost2 = cost + wp.dmg) so routes statically detour around lava/rockets; the port's A* uses pure link cost and routes through danger-marked waypoints. (Mitigated at runtime by the live per-frame BotDanger brake — see bot-waypoints.steer.checkdanger — but the bot still picks the dangerous route then brakes/aborts rather than routing around it.)"
      - "No expanding multi-seed nearest search (Base seeds several near waypoints with radius growth on-ground 750/max 50000, air 500/max 1500); the port routes from the single Nearest node."
    verification:
      - { kind: code, ref: "FindPath A* vs navigation_markroutes:1080-1167 (wp.dmg per-node bias) + nearestwaypoints:1106-1120 seed growth", result: partial }
    confidence: high
    notes: "The A* shape is an intended-equivalent design change; the missing .dmg danger term and the single-seed start are genuine gaps layered on top. .dmg is purely runtime (botframe_updatedangerousobjects), so the gap affects live-combat detours, not static authored routing."

