unit: bot-waypoints
category: bot
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 18
  worst_gaps:
    - "Static per-waypoint danger bias (.dmg) absent from routing: Base adds each waypoint's dmg to its A*/Dijkstra cost so routes pre-emptively detour around lava/rocket zones; the port routes on pure link cost and only reacts to danger at the last moment via the live per-frame brake (BotDanger)."
    - "Link travel-cost is not skill-dependent: Base waypoint_getlinearcost divides by sv_maxspeed*1.25 for skill>=bot_ai_bunnyhop_skilloffset (7); the port always uses base speed, so high-skill route costs differ and can change tie-break routes."
    - "JUMP-source fall-cost variant is NOT implemented in the port's TravelCost: Base adds jumpheight_time + sqrt((height+jumpheight)/(g/2)) for a WAYPOINTFLAG_JUMP source, but the port computes plain sqrt(height/(g/2)) regardless of the fromIsJump flag (the parameter is threaded through but unused in the cost)."
    - "Runtime auto-waypointing/pruning toward players (botframe_autowaypoints / botframe_deleteuselesswaypoints) and runtime item/teleporter waypoint injection on shipped (.waypoints-bearing) maps are absent: the graph is static after load."
    - "No steerlib library and no waypoint editor / .waypoints/.cache/.hardwired writers: flocking/swarm/traceavoid/beamsteer primitives are missing and the port is a read-only graph consumer (cannot author or re-save graphs)."
