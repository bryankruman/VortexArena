summary:
  feature_count: 17
  worst_gaps:
    - "Per-waypoint static danger bias (.dmg) is scaffolded but DEAD and out-of-scope to wire: Waypoint.Danger + the A* term (gScore + link.Cost + nb.Danger) exist, but NOTHING writes Danger. The faithful producer (botframe_updatedangerousobjects, BotPopulation.cs:203-205 'unported') needs the g_bot_dodge hazard summation. Producer-side tagging has GROWN (Blaster.cs:156, Porto.cs:192, PhaserTurret.cs:147 all set .BotDodge/.BotDodgeRating) but the consumer (havocbot_dodge danger-list AND the per-waypoint .dmg producer) is still absent — a cross-cutting subsystem. Routes still ignore lava/rocket zones at plan time and only react via the live per-frame BotDanger brake."
    - "Runtime auto-waypointing/pruning toward players (botframe_autowaypoints / botframe_deleteuselesswaypoints) and runtime item/teleporter waypoint injection on shipped (.waypoints-bearing) maps are absent: the graph is static after load."
    - "No steerlib library and no waypoint editor: flocking/swarm/traceavoid/beamsteer primitives are missing and there is no in-game graph authoring (spawn/remove/hardwire/mirror/autowaypoint). .waypoints/.cache/.hardwired WRITERS exist (Waypoint.cs:SaveToText/SaveLinksToText/SaveHardwiredLinksToText) but are DEAD — zero callers (no editor or save command invokes them)."
    - "Two AutoLink subtleties remain: the it.SUPPORT_WP incoming-direction forbid (no port back-pointer field, omitted) and the jumppad-fallback nearest-waypoint search (navigation_findnearestwaypoint's IL_EACH(g_jumppads) tail) are not ported. PVS cull, the crouch<->normal 100qu short-link cap, the box/JUMP/SUPPORT outgoing forbid, and walkfromwp direction are now all FAITHFUL (drift fixes)."
