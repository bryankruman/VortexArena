summary:
  feature_count: 17
  worst_gaps:
    - "Per-waypoint static danger bias (.dmg) is scaffolded but DEAD and out-of-scope to wire: Waypoint.Danger + the A* term (gScore + link.Cost + nb.Danger) exist, but NOTHING writes Danger. The faithful producer (botframe_updatedangerousobjects, BotPopulation.cs:203 'unported') needs the g_bot_dodge hazard summation. Producer-side tagging is now partial (Blaster.cs:152 sets .bot_dodge/.bot_dodgerating, Entity.cs has the fields) but the consumer (havocbot_dodge danger-list AND the per-waypoint .dmg producer) is still absent — a cross-cutting subsystem. Routes still ignore lava/rocket zones at plan time and only react via the live per-frame BotDanger brake."
    - "Runtime auto-waypointing/pruning toward players (botframe_autowaypoints / botframe_deleteuselesswaypoints) and runtime item/teleporter waypoint injection on shipped (.waypoints-bearing) maps are absent: the graph is static after load."
    - "No steerlib library and no waypoint editor: flocking/swarm/traceavoid/beamsteer primitives are missing and there is no in-game graph authoring (spawn/remove/hardwire/mirror/autowaypoint). NOTE 2026-06-25: .waypoints/.cache/.hardwired WRITERS now exist (Waypoint.cs:SaveToText/SaveLinksToText/SaveHardwiredLinksToText) but are DEAD — zero callers (no editor or save command invokes them), so the port still cannot in practice re-save graphs on the live path."
    - "AutoLink still skips PVS cull, the crouch<->normal 100qu short-link cap, and per-direction box/JUMP/SUPPORT link forbidding (wholesale skip of teleport/jump/ladder/custom/support sources instead)."
