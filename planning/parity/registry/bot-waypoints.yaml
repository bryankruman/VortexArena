      - { name: "WAYPOINTFLAG_SUPPORT", base: "BIT(11)", port: "1<<11", match: true }
      - { name: "max_links_per_wp", base: "32 (wp00..wp31)", port: "32 (AutoLink cap; uncapped on file load)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "File-load link path (LoadLinks/LoadHardwiredLinks) appends unsorted with no 32-link cap; Base keeps wp00..wp31 sorted by cost and drops the furthest when full. A* tolerates this; route results unaffected unless a node exceeds 32 cache links."
      - "Box move_out_of_solid / setsize-to-zero collapse of point waypoints (waypoint_spawn) not replicated; the port keeps the parsed mins/maxs verbatim (m1==m2 -> IsBox false). Behaviorally equivalent for navigation."
    verification:
      - { kind: code, ref: "Waypoint.cs:WaypointFlags vs api.qh BIT() values (all 8 navigation bits re-read, match)", result: pass }
    confidence: high
