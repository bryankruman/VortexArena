    gaps:
      - "Smart world-avoidance (missile_smart=1, default ON): missing. Port homing steers straight at the target (0.5*(absmin+absmax)) and never traces/avoids geometry (missile_smart_mindist/_trace_min/_trace_max + the trace_plane_normal blend), so missiles clip walls and corners that Base would curve around. This is the dominant observable divergence and is even documented in Base's own describe() text ('the missiles can hit an object or a corner')."
      - "Proxy detonation (missile_proxy/_delay/_maxrange) not ported — default OFF, so no observable divergence at stock balance (dormant)."
    verification:
      - { kind: code, ref: "VERIFIED 2026-06-22: MissileThink bound(spd-decel*ft, speed_max, spd+accel*ft) + normalize(olddir+desireddir*turnrate)*spd matches Base; eorg=0.5*(AbsMin+AbsMax) matches; the missile_smart traceline/this.wait adaptive-trace block (seeker.qc:66-79) has NO port counterpart", result: pass }
    confidence: high
    notes: "frametime-based accel/decel uses Api.Clock.FrameTime, matching Base frametime. NOTE on the dead-enemy branch: Base seeker.qc:111-117 (re-arm cnt=time+1+random()*4 when IS_DEAD(this.enemy)) operates on this.enemy which was ALREADY nulled at seeker.qc:53-55 in the same think, so in Base it is effectively unreachable dead code; the port's 'null the enemy and coast on the fixed lifetime' is therefore NOT a meaningful behavioral divergence (the earlier draft overstated this as a gap)."

