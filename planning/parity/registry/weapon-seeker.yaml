unit: weapon-seeker
category: weapon
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Shoot-down is dead: a player cannot destroy a seeker missile or tag dart by shooting it — Entity.ProjectileDamage is never invoked by the damage pipeline (only BreakablehookMutator calls it; DamageSystem.EventDamage routes non-players via GtEventDamage else PlayerDamage). Cross-weapon root cause shared with Hagar/Mortar/Mine/Devastator/Arc/Electro/Fireball/Hook/OkRpc."
    - "Missile smart world-avoidance (missile_smart=1, default ON) is not ported: missiles steer straight at the target and clip walls/corners far more than Base."
    - "Missile AND FLAC explosions play tag_impact.wav instead of Base's random seekerexp1/2/3 (wr_impacteffect's no-bounce branch); the tag-dart strike emits no tag_impact cue or te_knightspike spark at all."
    - "Volley controller self-destruct DIVERGES: the port omits Base's out-of-ammo and switched-away gates (and adds a target-dead gate Base lacks), so a port volley keeps firing after the owner is out of rockets / has switched weapons."
    - "Re-tagging the same target spawns an extra volley controller (no W_Seeker_Tagged_Info dedupe), doubling the barrage instead of refreshing the tracker; type-1 RADARICON_TAGGED waypoint sprite also absent."
