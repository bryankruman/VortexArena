    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Self-destruct conditions DIVERGE (CORRECTS the earlier draft's 'conditions match' claim). Base W_Seeker_Vollycontroller_Think self-destructs on: out-of-ammo (GetResource < missile_ammo, unless IT_UNLIMITED_AMMO) OR count<=-1 OR owner dead OR owner switched away from the seeker (m_switchweapon != WEP_SEEKER). The port (Seeker.cs:429-430) checks owner-dead / Count<0 / enemy-null / enemy-dead only — it OMITS the ammo gate AND the switch-away gate, and ADDS an enemy-dead/enemy-null gate Base does not have. Net: a port volley keeps firing after the owner runs out of rockets or switches weapons (the FireMissile TakeResource will drive ammo negative), and a Base volley keeps firing even if the tagged target dies mid-barrage while the port stops."
