# Re-audited 2026-06-25 (drift check vs 2026-06-22 baseline; branch claude/parity-port-waves @ f86d947).
# The baseline predated a substantial round of edits to BuffsMutator.cs (Wave-6 era) that closed several
# previously-recorded gaps. Independent adversarial re-verification of every row found 0 regressions and a
# cluster of FIXES, all live-traced:
#   - buffs.drop: a PlayerUseKey handler now exists (OnPlayerUseKey) and is LIVE via
#     MutatorHooks.FirePlayerUseKey (VehicleBoarding.cs:106, the real +use seam). Gated on g_buffs_drop,
#     emits ITEM_BUFF_DROP + INFO_ITEM_BUFF_LOST, strips the buff, arms the pickup-shield, plays SND_BUFF_LOST.
#   - buffs.notifications: ITEM_BUFF_GOT centerprint + INFO_ITEM_BUFF (others) on pickup, INFO_ITEM_BUFF_LOST
#     on replace/drop, SND_BUFF_LOST on drop are now emitted (BuffTouch / OnPlayerUseKey). Tokens all exist.
#   - buffs.mutator_string: BuildMutatorsString/PrettyString overrides added (':Buffs' / ', Buffs' when
#     g_buffs>0), live via MutatorActivation.BuildMutatorsString (GameWorld.cs:876).
#   - buffs.item.touch_pickup: cl_buffs_autoreplace now honored (CvarBool), team_forced + vehicle + lifetime-
#     zero checks added; INFO_ITEM_BUFF/INFO_ITEM_BUFF_LOST now emitted.
#   - buffs.ammo: clip_load handling added (FillSlotClip / RestoreAmmoClips on apply/tick/remove), closing the
#     reload-weapon gap.
#   - buffs.item.available: the start_items IT_UNLIMITED_AMMO exclusion is now modelled (StartItemsHasUnlimitedAmmo
#     via g_use_ammunition).
# The two PRIMARY liveness blockers persist UNCHANGED: still no item_buff map spawnfunc (buffs.item.spawnfunc)
# and no FilterItem powerup-replace (buffs.replace_powerups), so buffs remain unobtainable on stock maps unless
# g_buffs_spawn_count>0 is explicitly set. All perk rows (resistance/medic/vampire/jump/bash/disability/
# vengeance/luck/inferno/swapper/...) re-verified live and faithful, unchanged. Presentation rows
# (carrier_model/buff_effect/waypoint) + observer_cleanup remain missing.
summary:
  feature_count: 34
  worst_gaps:
    - "Map buff items (item_buff_* + Q3/QL/WOP compat classnames) still never spawn: no spawnfunc exists, so buffs are unobtainable on stock maps even with g_buffs=-1 (on) — the only obtain path is the explicit g_buffs_spawn_count>0 auto-seed (default 0)."
    - "FilterItem powerup-replacement (g_buffs>0 mode) is still not implemented, so the second obtain path is also dead."
    - "Disability buff fire-rate slow is LIVE (WeaponRateFactor x1.5), but projectile-speed (WeaponSpeedFactor x0.7) and monster run/walk (MonsterMove x0.7) slows are still absent."
    - "No carrier buff_model glow, no buff_Effect particle trail, and no WP_Buff radar/HUD waypoint on buff items; no observer/disconnect cleanup."
