unit: mutator-buffs
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 34
  worst_gaps:
    - "Map buff items (item_buff_* + Q3/QL/WOP compat classnames) never spawn: no spawnfunc exists, so buffs are unobtainable on stock maps even with g_buffs=-1 (on)."
    - "FilterItem powerup-replacement (g_buffs=1 mode) is not implemented, so the second obtain path is also dead."
    - "Jump buff velocity is dead: JumpVelocityOverride is written by the mutator but read by no physics code (PlayerPhysics.cs:815 uses mp.JumpVelocity/JumpVelocityCrouch), so a Jump-buffed player jumps at normal height."
    - "Inferno buff entirely missing: no burn-on-hit damage, no log-curve burn time, no fire-immunity / half-lava resistance, no DEATH_BUFF_INFERNO."
    - "Swapper buff entirely missing: no drop-weapon swap-places teleport with nearest enemy."
    - "Disability buff only slows movement; weapon fire-rate (x1.5), projectile-speed (x0.7) and monster run/walk slows are absent."
    - "No carrier buff_model glow, no buff_Effect particle trail, and no WP_Buff radar/HUD waypoint on buff items."
