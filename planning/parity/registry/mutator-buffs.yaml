# (BuffsMutator.cs:584) spawns the registered "Buff" radar/HUD sprite (Waypoints.cs:164 Add("Buff",...,Orange)) tinted
# by BuffColor with a VisibleForPlayer hide-if-already-held filter; the filter is CONSUMED on the live per-peer send
# path (ServerNet.WaypointVisible:1297). Pinged + re-tinted on respawn (BuffRespawn:559-561), killed on pickup
# (BuffTouch:425), re-attached on respawn (ScheduleRespawn:480-482); the WaypointSprites.Spawn overload + Ping/Kill/
# UpdateTeamRadar all exist and match the call. logic/values/timing/presentation missing->faithful, liveness na->live.
# (2) buffs.item.spawnfunc per-buff SKIN is now applied — ConfigureBuffEntity:318 e.Skin = buff.Skin (relic.md3 ships
# one skin per buff so the pickup renders in its own colour); StatusEffectDef.Skin populated for all 13 buffs
# (StatusEffects.cs:240+). Residual presentation gap on that row is now only the world-item color/glowmod TINT (Color
# is read only for the waypoint, never networked to the item) + dynamic light + bot pickup value — still presentation:
# partial, but the skin sub-gap closed and the item now also carries a waypoint. Everything else re-confirmed against
# the current port code (per-perk hooks, FilterItem, drop, medic regen, ammo clip, swapper, inferno) — unchanged.
# (Prior 2026-06-27 OPUS re-verify note retained below.)
# --- 2026-06-27 history ---
# Re-audited 2026-06-27 (OPUS consolidated re-verify post Waves 16/17; branch claude/parity-port-waves). NO STATUS
# DRIFT: every row's status/liveness re-confirmed by reading the CURRENT port code, not assumed. Liveness spot-checks
# this pass (all PASS): map item_buff_* spawnfuncs LIVE (ItemSpawnFuncs.RegisterBuffSpawnFuncs:207 -> SpawnFuncs.Register
# -> BuffsMutator.SpawnMapBuff:356); FilterItem powerup-replace LIVE (StartItem.cs:119 MutatorHooks.FireFilterItem ->
# OnFilterItem:906); medic PlayerRegen mods CONSUMED on the live path (XonoticGodot.Server/PlayerFrameLogic.cs:56-62 reads
# RotMod/RegenMod/MaxMod/LimitMod back from the hook); jump-velocity override is genuinely LIVE+READ (PlayerPhysics.cs:1079-1080
# mjumpheight = player.JumpVelocityOverride — the historical DEAD gap is closed); disability fire-rate slow LIVE
# (WeaponFireGate.cs:489 WeaponRateFactor.Call); +use drop LIVE (VehicleBoarding.cs:106 FirePlayerUseKey). StatusEffects
# catalog (StatusEffects.cs:240-252) registers EXACTLY the 13 QC buffs (buff_ammo..buff_vengeance); 'speed'/'invisibility'
# are POWERUP defs (no buff_ prefix, :234-235), so the port-extra speed/invisible branches remain inert dead code. NOTE:
# some verification-ref line numbers below have minor drift vs the current file (e.g. OnDamageCalculate now :627, OnFilterItem
# :906, OnPlayerUseKey :877, RandomBuff :225, resistance clamp :642) — symbols/behavior unchanged, only offsets moved.
# (Prior 2026-06-27 drift-check note retained below.)
# every row re-verified against current Base + port code and the recorded statuses/constants/liveness all still
# hold. All 13 REGISTER_BUFF types still mapped; all MUTATOR_HOOKFUNCTION(buffs,...) hooks accounted for
# (PlayerPhysics_UpdateStats/MonsterMove/WeaponSpeedFactor under buffs.disability gaps; MakePlayerObserver/
# ClientDisconnect under buffs.observer_cleanup). Base cvar defaults unchanged (resistance 0.5, medic rot/max/
# regen 0.2/1.5/1.7, vampire 0.4, jump 600, vengeance 0.4, bash 2, inferno 0.3, swapper 1500, luck 0.15,
# disability speed/attack 0.7/1.5, weaponspeed still un-ported). Confirmed-live wiring intact: FilterItem via
# StartItem.cs:119 FireFilterItem; map spawnfuncs via ItemSpawnFuncs.cs:84 RegisterBuffSpawnFuncs -> SpawnMapBuff;
# medic PlayerRegen mods consumed in XonoticGodot.Server/PlayerFrameLogic.cs (port_ref path corrected from the
# stale PlayerFrameLogic.cs:56-89 note — the file lives under XonoticGodot.Server, behavior unchanged). The
# detailed 2026-06-25 history below is retained as-is.
# --- 2026-06-25 history ---
# TWO MAJOR FIXES since the prior write — 0 regressions:
#   - buffs.replace_powerups (a recorded worst-gap; was missing/empty port_refs): the FilterItem powerup-replace
#     obtain path is now FULLY IMPLEMENTED and LIVE. BuffsMutator subscribes MutatorHooks.FilterItem (Hook():107)
