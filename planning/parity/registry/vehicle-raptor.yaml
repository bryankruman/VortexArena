last_audited: "2026-06-22"
summary:
  feature_count: 14
  worst_gaps:
    - "No presentation at all: no rotor spinners/anglefix, no takeoff/land model animation frame, no cosmetic bomb/tail models, no muzzle/explosion/CSQC-projectile FX, no flare flame glow."
    - "No CSQC HUD/crosshair: missing the dual reticle + the dropmark bomb-impact marker (a real aiming aid the pilot loses) + the aux lock crosshair color feedback."
    - "Engine fly sound (SND_VEH_RAPTOR_SPEED every ~7.96s) and death tumble SND_ROCKET_IMPACT not played."
    - "bomblet_alt (750) immediate clear-fall burst test unported — bombs always fall bomblet_time (0.5s) before bursting unless they touch."
    - "Bomblet touch detonation is INSTANT — QC delays it by random()*bomblet_explode_delay (0.4s); the explode-delay constant is effectively unported."
    - "vr_impact / bouncepain '1 4 1000' entirely unported — the raptor takes no occupant shake/damage when it slams into terrain while bouncing."
