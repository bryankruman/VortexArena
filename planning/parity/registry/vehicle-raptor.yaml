  worst_gaps:
    - "RE-AUDIT 2026-06-28b (post Phase-3a world-model LOGIC wave, HEAD def9a43, commit 825ec91): Phase-3a DID touch raptor-relevant shared logic (the prior baseline's 'NOTHING touched the raptor' row described the EARLIER Phase-2 wave at HEAD cb7102c and is now stale). Two changes land for the raptor: (1) VehicleDef.FlagCarryOffset + Ctf.Tick:1859-1875 make the carried-CTF-flag-rides-the-craft behavior LIVE on the raptor every tick (raptor.enter: 'flag not modeled at all' -> modeled+live), BUT the raptor inherits the shared default '0 0 96' instead of its QC '-20 0 96' (Racer got its '-190 0 96' override this same wave; the raptor's '-20' was missed) -> raptor.enter values faithful->partial, a NEW value gap. (2) VehicleCommon.SpawnVehicle now stamps the vehicle_initialize base DpHitContentsMask (SOLID|BODY +PLAYERCLIP when g_playerclip_collisions) BEFORE the descriptor's per-vehicle LIQUIDSMASK |= — the liquids-sink mask raptor.spawn.setup already tracked stays live, the playerclip base is robustness only (no raptor-specific tracked constant changes). No presentation/render gap closed (Phase-3a explicitly deferred the world-MODEL render half to Phase-3b). Net: 0 dimensions fully CLOSED, 1 newly-OPENED (raptor.enter values:partial)."
    - "DRIFT FIX (2026-06-27 re-audit, Waves 15/17): the prior 2026-06-27 baseline was written from a STALE read — it still recorded the cannon muzzleflash + the entire CSQC HUD as NOT done, but both had since landed. Wave-17 (2f0bfdb) added the live RAPTOR_MUZZLEFLASH emit (Raptor.cs:573) + the full client VehicleHud (game/hud/VehicleHud.cs) fed live by NetGame.UpdateVehicleHud/FeedRaptorReticle; Wave-15 (5958904) fixed the cannon spread RNG to the QC normalize(fwd+randomvec()*spread). Verified by code trace + Common/test build green + 34 vehicle tests pass."
    - "raptor.hud_crosshair: NOW LIVE (was port_refs:[] / all-missing). game/hud/VehicleHud.cs + NetGame.UpdateVehicleHud (NetGame.cs:2650 live each render frame) draw the per-mode reticle (vCROSS_BURST bomb / vCROSS_RAIN flare), the ammo/reload bars, the aux lock crosshair colored by VehLockStrength, AND the signature bomb dropmark with a real tracetoss predictor (VehiclePhysics.BombDropPredict) + green-live/red-linger (dropmark.cnt=time+5) states. Pilot path is the host/listen-server local Player; the cross-client VEHICLESTAT_* networking for a PURE remote client is the documented follow-up."
    - "raptor.impact: CONFIRMED LIVE (fixup commit 4be8357) — Spawn() no longer nulls vehicle.Touch, Think() snapshots OldVelocity, Spawn seeds PlayTime; full dispatch chain MoveTypePhysics(BounceMissile)->PushEntity(doTouch)->FlyMove->VehicleCommon.Touch->VehicleDef.Impact->vehicles_impact. Symmetric with Racer."
    - "raptor.painframe: NOW FULLY FAITHFUL (2026-06-27b) — the EFFECT_SMOKE_SMALL low-health puff is now emitted (VehicleCommon.PainFrame:760), closing the last presentation gap; the <=50%-health shake/roll jitter was already live (Raptor.Think calls VehicleCommon.PainFrame)."
    - "raptor.cb_shellfrag_gib: NOW LIVE (2026-06-27b, was port_refs:[]) — the cluster-bomb burst tosses the 3 cosmetic shell-fragment gibs client-side (Raptor.cs:631 emit -> EffectSystem.cs:477 -> ModelGibs.TossShellfrags) with the QC gravity/lifetime/fade/avelocity constants."
    - "VehicleVisuals (game/client/VehicleVisuals.cs, Wave-17) renders a live vehicle body + SPINNING rotors + engine-sound crossfade + death gibs/explosion for the raptor, fed each frame by ClientWorld.DriveVehicles->Apply. BUT the rotors are PLACEHOLDER primitives (not the real rotor model + raptor_rotor_anglefix), and the takeoff/land VehAnimFrame still drives NO model frame (raptor is not FrameDrivenBody — only the spiderbot legs are). So these presentation rows are partial, not faithful."
    - "Remaining unported presentation: rotor/cosmetic models are placeholders; no takeoff/land model-frame animation; no CSQCProjectile in-flight bolt/bomb/bomblet trails; no flare EF_FLAME glow/model; the cluster-bomb shell-fragment gibs (raptor.cb_shellfrag_gib) are still port_refs:[]."
    - "mass=1 is set on the entity but is INERT — the port's MoveTypePhysics never reads .Mass, so the bounce-missile mass tuning has no behavioral effect (bouncefactor IS live, verified MoveTypePhysics.cs:190-193)."
