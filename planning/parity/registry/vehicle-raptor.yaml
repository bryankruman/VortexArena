summary:
  feature_count: 17
  worst_gaps:
    - "raptor.impact: CONFIRMED LIVE (fixup commit 4be8357) — Spawn() no longer nulls vehicle.Touch, Think() snapshots OldVelocity, Spawn seeds PlayTime; verified full dispatch chain MoveTypePhysics(BounceMissile)->PushEntity(doTouch)->FlyMove->VehicleCommon.Touch->VehicleDef.Impact->vehicles_impact. Wiring is symmetric with Racer."
    - "raptor.painframe: WIRED LIVE — Raptor.Think calls VehicleCommon.PainFrame; faithful port of vehicles_painframe (<=50%-health shake/roll jitter live; only EFFECT_SMOKE_SMALL puff deferred — the headless Common layer has no particle emitter)."
    - "DRIFT FIX (2026-06-25, post-Wave-12a): server-side audio + FX emission is now LIVE for several rows the prior baseline still recorded as missing — engine fly sound (SND_VEH_RAPTOR_SPEED, both Takeoff+Frame), death-tumble SND_ROCKET_IMPACT + EXPLOSION_MEDIUM/SMALL, and the cluster-bomb RAPTOR_BOMB_SPREAD puff are all emitted via Api.Sound.Play / EffectEmitter (Send_Effect equivalent). Audio upgraded missing->faithful (takeoff, flight, death); presentation upgraded missing->partial/faithful (bombs, death)."
    - "Remaining presentation is client-render only: no rotor spinners/anglefix, no takeoff/land model animation frame, no cosmetic bomb/tail/cockpit models, no CSQCProjectile bolt/bomb trails, no RAPTOR_MUZZLEFLASH on the cannon (still TODO — racer got its muzzleflash, raptor did NOT), no flare flame glow/model, no low-health smoke."
    - "No CSQC HUD/crosshair: missing the dual reticle + the dropmark bomb-impact marker + the aux lock crosshair color feedback (the reload2/ammo2 stats the HUD reads ARE now fed by Think — Wave-12a)."
    - "mass=1 is set on the entity but is INERT — the port's MoveTypePhysics never reads .Mass, so the bounce-missile mass tuning has no behavioral effect (bouncefactor IS live, verified MoveTypePhysics.cs:163-164)."
