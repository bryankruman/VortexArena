summary:
  feature_count: 14
  worst_gaps:
    - "raptor.impact: FIXED in Wave-2 fixup — Spawn() no longer nulls vehicle.Touch and Think() now snapshots OldVelocity (+ Spawn seeds PlayTime), so the vr_impact ram/crash self-damage fires live with the correct speed-change delta (now matches Racer's live wiring)."
    - "Still no presentation at all: no rotor spinners/anglefix, no takeoff/land model animation frame, no cosmetic bomb/tail models, no muzzle/explosion/CSQC-projectile FX, no flare flame glow."
    - "No CSQC HUD/crosshair: missing the dual reticle + the dropmark bomb-impact marker + the aux lock crosshair color feedback."
    - "Engine fly sound (SND_VEH_RAPTOR_SPEED every ~7.96s) and death tumble SND_ROCKET_IMPACT not played."
    - "mass=1 is set on the entity but is INERT — the port's MoveTypePhysics never reads .Mass, so the bounce-missile mass tuning has no behavioral effect (bouncefactor IS now live)."
