unit: cl-viewmodel
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "No brass/shell casings ever eject from any weapon: ShellCasings.cs sim is complete but DEAD (EffectSystem.SpawnCasing has zero callers, no server-side casings emit). Base shows tumbling/bouncing/fading casings on every machinegun/shotgun/rifle/vortex shot."
    - "View-model ignores player team colormap and per-weapon glowmod: the gun never tints to your team color or glows (e.g. Vortex charge glow), unlike Base viewmodel_draw."
    - "View-model has no EF_NODEPTHTEST: the gun can clip into / be occluded by nearby world geometry instead of always drawing on top of the scene."
    - "Weapon-switch animation is a slide-down, not Base's barrel-tip (this.angles_x = -90*f*f), and is not keyed to per-weapon switchdelay_raise/drop or weapon_nextthink (port does not network wframe)."
    - "No networked weapon fire/idle/reload animation (the QC wframe temp entity is not networked); the gun never visibly cycles or reloads."
    - "No muzzle-flash MODEL (the spinning flash md3 for Devastator + Machinegun, m_muzzlemodel) — only the particle burst is emitted."
    - "Viewmodel sway/align toggles (cl_followmodel / cl_leanmodel / cl_bobmodel / cl_gunalign / cl_viewmodel_alpha / cl_gunoffset) are baked [Export] defaults, not read from cvars — the menu checkboxes/sliders do not affect the live gun."
