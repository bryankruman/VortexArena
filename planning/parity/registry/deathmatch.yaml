    notes: "Scoring is split: Deathmatch owns SP_SCORE (the sort/fraglimit key), Scores fills aux KILLS/DEATHS/SUICIDES read-through to avoid double-counting. Teamkill branch is present but unreachable in FFA (SameTeam guarded false when TeamGame=false)."

