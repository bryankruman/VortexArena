      - { name: "display_name", base: "Deathmatch", port: "Deathmatch", match: true }
      - { name: "teamplay", base: "false (FFA)", port: "TeamGame=false", match: true }
      - { name: "flags", base: "USEPOINTS|PREFERRED", port: "implicit (frag-based, default mode)", match: true }
