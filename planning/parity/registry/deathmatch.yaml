      - "src/XonoticGodot.Server/GameWorld.cs:RunCheckRulesWorld"
    constants:
      - { name: "pointlimit_default", base: "30 (fraglimit)", port: "30 (DefaultFragLimit)", match: true }
      - { name: "limit==0 means unlimited", base: "yes", port: "yes (limit>0 guard)", match: true }
      - { name: "g_dmlimit cvar", base: "does not exist in Base", port: "checked before fraglimit", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "The port reads a non-Base convenience cvar g_dmlimit before falling back to the engine fraglimit. Base has no g_dmlimit (only TDM has g_tdm_point_limit). With g_dmlimit unset the behavior is identical to Base; it only diverges if an operator sets the invented cvar."
    gaps: []
    verification:
