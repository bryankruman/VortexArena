      - { name: "enemy_frag", base: "+1", port: "+1", match: true }
      - { name: "suicide", base: "-1", port: "-1", match: true }
      - { name: "world_accident_death", base: "-1 (GiveFrags(targ,targ,-1))", port: "-1", match: true }
      - { name: "game_stopped_gate", base: "GiveFrags bails if game_stopped", port: "OnDeath bails if MatchEnded", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "OnDeath writes victim.GtDeaths/GtSuicides which have no readers (dead writes); the scoreboard's Deaths/Suicides come from Scores.GiveFrags read-through. Harmless, not player-visible."
    verification:
