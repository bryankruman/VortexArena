      - { name: "respawn_delay_max", base: "g_dm_respawn_delay_max 0 → g_respawn_delay_max 5", port: "g_respawn_delay_max (fallback 5)", match: true }
      - { name: "small_count (FFA)", base: "g_respawn_delay_small_count 0 → 2 in FFA", port: "smallCount<=0 → 2 (non-teamplay)", match: true }
      - { name: "large_count", base: "g_respawn_delay_large_count 8", port: "fallback 8", match: true }
      - { name: "player_count_scaling", base: "interpolate small..large by pcount between counts", port: "implemented (same lerp formula)", match: true }
      - { name: "respawn_waves", base: "g_respawn_waves 0 → ceil((time+sdelay)/waves)*waves", port: "implemented (same ceil-quantize)", match: true }
      - { name: "respawn_countdown_arm", base: "10-count when sdelay+waves>=5 and wait>1.75s", port: "RespawnCountdown=10 (same condition)", match: true }
      - { name: "forced_respawn", base: "g_forced_respawn → RESPAWN_FORCE flag", port: "g_forced_respawn → RespawnFlag.Force", match: true }
      - { name: "GAMETYPE_DEFAULTED_SETTING dm-prefix", base: "reads g_dm_respawn_delay_* first, then g_respawn_delay_*; honors g_respawn_delay_forced", port: "reads only generic g_respawn_delay_*", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: missing
      audio: missing
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "RespawnTiming.Calculate reads only the generic g_respawn_delay_* cvars, not the GAMETYPE_DEFAULTED_SETTING gametype-prefixed g_dm_respawn_delay_* (nor g_respawn_delay_forced). Identical at DM defaults (g_dm_*=0 → generic), but a server setting g_dm_respawn_delay_small (or the forced-default flag) would be ignored."
      - "Respawn 10-9-8 countdown announcer is not presented: Player.RespawnCountdown is computed by RespawnTiming.Calculate but has NO reader/announcer (only SpawnSystem resets it). The respawn-time STAT is networked (RespawnTimeStat) but the spoken 10..1 countdown is absent."
