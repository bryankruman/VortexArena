    confidence: high
    notes: "CORRECTS the first-pass claim of a flat-2s respawn with no scaling/waves/countdown/forced-respawn. The live path is GameWorld.DeadPlayerThink → RespawnTiming.Calculate (a faithful port of calculate_player_respawn_time with player-count interpolation, wave quantization, respawn_time_max, countdown arming, and the RESPAWN_FORCE flag). Deathmatch.ScheduleRespawn/RespawnDelay (the flat 2s) is DEAD CODE — explicitly overridden at GameWorld.cs:1713. Remaining real gaps are narrow: the gametype-prefixed delay cvars are not consulted (defaults match), and the 10-count respawn announcer is unspoken."
