  - id: menu-core.vm.lifecycle_toggle
    name: "Menu VM lifecycle: init, draw loop, toggle/display/hide, disconnect reset, m_goto"
    layer: [presentation]
    base_refs:
      - "menu/menu.qc:m_init (61)"
      - "menu/menu.qc:m_draw (753)"
      - "menu/menu.qc:m_toggle (981)"
      - "menu/menu.qc:m_display (954)"
      - "menu/menu.qc:m_hide (969)"
      - "menu/menu.qc:m_goto (1056)"
    port_refs:
      - "game/menu/MenuRoot.cs:ShowScreen/Push/Pop"
      - "game/Shell.cs:HandleToggleMenu (MenuCommand.ToggleMenu)"
      - "game/Shell.cs:OpenMenuDialog (m_goto true/false split)"
    constants:
      - { name: "MIN_DISCONNECTION_TIME", base: "1 s (disconnect reset debounce)", port: "none", match: false }
      - { name: "menuAlpha fade rate", base: "5/s in, 5/s out; logo 2/s", port: "no menu fade", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: partial
      audio: missing
      liveness: live
    intended_divergence: true
    divergence_rationale: "The QC menu is an immediate-mode VM redrawn every frame (m_draw); the port is a Godot Control scene graph (MenuRoot screen stack). The architecture swap is deliberate; behavior-level flows (toggle semantics, m_goto hide-on-close vs keep-open, escape handling) are ported on top of it."
    gaps:
      - "On disconnect Base reopens the menu and runs 'menu_cmd directmenu Welcome RESET' after 1 s (m_draw); the port returns to the main menu via Shell.ReturnToMainMenu but never routes through a Welcome reset, and the g_campaign-reset+m_sync on disconnect is handled elsewhere (LEAVEMATCH_CMD analogue)."
      - "No menu fade-in/out (menuAlpha 5/s, _menu_alpha cvar export for engine dimming) and no intro logo fade (menuLogoAlpha)."
      - "menu_slowmo, cl_capturevideo frametime override, and menu_mouse_absolute/menu_mouse_speed handling are absent (Godot supplies OS mouse handling — partially intended)."
    verification:
      - { kind: code, ref: "Shell.cs:139-143 builds MenuRoot on boot; WireCommandHooks wires ToggleMenu/OpenDialog/OpenDialogOverlay/CloseDialog", result: pass }
    confidence: high
    notes: "Escape-at-root closes only when a match is live (QC m_keydown unhandled-ESC gating on GAME_ISSERVER|GAME_CONNECTED) — reproduced by Shell's resume path. m_sync/loadAllCvars equivalent is the cvar-store Changed events feeding live widgets."

