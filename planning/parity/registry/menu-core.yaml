unit: menu-core
category: menu
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-07-02"
# Scope: menu VM lifecycle (menu/menu.qc, draw.qc, command/menu_cmd.qc), the QC widget toolkit
# (menu/item/*.qc + menu/anim/*.qc — one intended-divergence row), and menu/xonotic/*.qc EXCEPT
# dialog_settings_* and dialog_multiplayer_* (those belong to the menu-dialogs unit).
# Boundaries: sv-campaign owns campaign FILE/logic (this unit owns the campaign SCREEN);
# cl-hud owns the in-game HUD editor (hud_config.qc) — this unit owns the menu-side
# dialog_hudpanel_* config dialogs; sv-mapvoting owns the in-match vote screen (no overlap).
summary:
  feature_count: 35
  worst_gaps:
    - "Server/event-triggered dialogs are ALL dead: Welcome/MOTD on connect, Team-select, uid2name stats-consent, first-run+ToS, campaign Winner — the ported UI exists (DialogWelcome/DialogTeamSelect/DialogUid2Name/DialogFirstRun/DialogTermsOfService/DialogWinner) but nothing on the live path ever opens them (only the dev --menu-screen flag)."
    - "The update-notification system (util.qc updateCheck: update.xonotic.org checkupdate.txt, version banner, banned/promoted/recommended server lists, ToS-version push, hotfix pk3 auto-download) is entirely missing."
    - "Menu audio is entirely missing: no menu music (m_draw 'cd loop $menu_cdtrack') and no click/focus sounds (m_play_click_sound/m_play_focus_sound, menu_sounds cvar is bound in the Audio dialog but nothing plays)."
    - "Demo browser is a stub (no *.dem enumeration, no playdemo/timedemo backend, no disconnect-confirm dialogs) and the player-stats list (statslist.qc) is missing outright."
    - "Server browser gaps vs serverlist.qc: no category headings/recommended/promoted rows, no banned-server masks, favorites stored in a port-private favorites.cfg by plain address instead of net_slist_favorites with crypto-id keys, no per-row mod/AES/stats icons, no gametype-prefix text filter."
