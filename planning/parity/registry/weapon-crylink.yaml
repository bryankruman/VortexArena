summary:
  feature_count: 12
  worst_gaps:
    - "LinkJoin head-dangle edge case: port keys the group on the C# group[0] list head and cannot re-head the ring to a live spike the way QC's queuenext/queueprev does. If the head spike dies before release the survivors don't converge (WrThink still clears wait-release so the player isn't stranded). Edge case, no stock-balance impact."
    - "WarpZone reference-frame transforms (WarpZone_RefSys_Transform*) in W_Crylink_LinkJoin omitted — no-op without warpzones."
    - "Bot aim (wr_aim) not ported for Crylink — bots never fire the weapon via the QC bot_aim path (no per-weapon WrAim override; see crylink.bot.wr_aim). Same gap shape as other un-ported weapon bot-aim methods."
