summary:
  feature_count: 10
  worst_gaps:
    - "Chain-detonate gate is approximate, not exact: QC gates W_Crylink_LinkExplode on RadiusDamage's totaldamage RETURN (actual damage dealt). Port's WeaponSplash.RadiusDamage is still void, so OnTouch substitutes `couldDamage = f*damage>0 || f*edge>0` (Crylink.cs:408). Reachable divergence: a secondary spike hitting a WALL with no damageable target nearby chain-detonates the group in the port (couldDamage true, WouldHitFriendly false) where Base would NOT (totaldamage 0). Needs a RadiusDamage signature change to close exactly."
    - "SetupShot for crylink still omits wep/maxDamage args (Crylink.cs:203 `WeaponFiring.SetupShot(actor, forward, recoil:2f)`), so crylink never seeds the accuracy 'fired/max' denominator. Splash HITS now credit accuracy (RadiusDamage passes accuracyWeapon:this), but the fired-shot denominator is unseeded. Shared projectile-weapon gap (Mortar/Hagar same)."
    - "LinkJoin head-dangle edge case: port keys the group on the C# group[0] list head and cannot re-head the ring to a live spike the way QC's queuenext/queueprev does. If the head spike dies before release the survivors don't converge (WrThink still clears wait-release so the player isn't stranded). Edge case, no stock-balance impact."
    - "WarpZone reference-frame transforms (WarpZone_RefSys_Transform*) in W_Crylink_LinkJoin omitted — no-op without warpzones."
