summary:
  feature_count: 10
  worst_gaps:
    - "Primary spike impacts play the WRONG impact sound: OnTouch + LinkExplode hardcode weapons/crylink_impact2.wav (the small secondary sample) for BOTH modes; Base wr_impacteffect plays SND_CRYLINK_IMPACT (big) on primary, SND_CRYLINK_IMPACT2 (small) on secondary. (Verified Crylink.cs:319 and :343.)"
    - "Link-explode (W_Crylink_LinkExplode) trigger logic diverges: QC chain-detonates on ANY touch that dealt damage (totaldamage>0), including a non-final bounce; the port only enters the linkExplode branch inside finalHit and cannot gate on damage-dealt (WeaponSplash.RadiusDamage returns void). Unreachable at stock balance (primary linkexplode 0, secondary bounces 0 = always final) but a real logic reorder."
    - "Convergence join-explode (W_Crylink_LinkJoinEffect_Think) absent: LinkJoin spawns no meeting-time think, so EFFECT_CRYLINK_JOINEXPLODE convergence sparkle + joinexplode bonus RadiusDamage never fire; the port instead emits CRYLINK_JOINEXPLODE from chain-detonation (a trigger Base never uses for that particle)."
    - "Secondary deathtype does NOT carry HITTYPE_SECONDARY (port uses RegistryId for both modes; QC ORs HITTYPE_SECONDARY). Impact-fx selection is preserved via a separate `secondary` bool, so cosmetically equivalent for crylink (no secondary-specific kill message), but the carried deathtype bit is lost."
    - "Bounce path omits QC's `owner = NULL` (a bounced spike can damage its firer in Base) and the `deathtype |= HITTYPE_BOUNCE` tag; only --cnt + re-angle are done (Crylink.cs:327-328)."
