summary:
  feature_count: 10
  worst_gaps:
    - "Chain-detonate gate is approximate, not exact: QC gates W_Crylink_Touch on RadiusDamage's totaldamage RETURN (actual damage dealt). Port's WeaponSplash.RadiusDamage is still VOID (verified: signature returns void, WeaponSplash.cs:49), so OnTouch substitutes `couldDamage = f*damage>0 || f*edge>0` (Crylink.cs:408). Reachable divergence: a secondary spike (linkexplode 1) hitting a WALL with no damageable target nearby chain-detonates the group in the port (couldDamage true, WouldHitFriendly false) where Base would NOT (totaldamage 0). Needs a RadiusDamage signature change to close exactly."
    - "SetupShot for crylink still omits wep/maxDamage args (Crylink.cs:203 `WeaponFiring.SetupShot(actor, forward, recoil:2f)`), so crylink never seeds the accuracy 'fired/max' denominator. QC W_Crylink_Attack/Attack2 pass `maxdmg = damage*shots*(1+bouncefactor*bounces)(+joinexplode_damage)` (crylink.qc:288-291,384-387). Splash HITS now credit accuracy (RadiusDamage passes accuracyWeapon:this), but the fired-shot denominator is unseeded. Shared projectile-weapon gap (Mortar/Hagar same)."
    - "LinkJoin head-dangle edge case: port keys the group on the C# group[0] list head and cannot re-head the ring to a live spike the way QC's queuenext/queueprev does. If the head spike dies before release the survivors don't converge (WrThink still clears wait-release so the player isn't stranded). Edge case, no stock-balance impact."
    - "WarpZone reference-frame transforms (WarpZone_RefSys_Transform*) in W_Crylink_LinkJoin omitted — no-op without warpzones."
