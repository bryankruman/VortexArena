summary:
  feature_count: 12
  worst_gaps:
    - "No hook ROPE line is ever drawn: there is still no GrapplingHookSend/ENT_CLIENT_HOOK rope stream and no Draw_CylindricLine renderer. The chain HEAD is networked as a generic projectile and rendered as a red Hookbomb spike WHILE IN FLIGHT, but the connecting rope between player and latch point is absent."
    - "Latched hook still goes INVISIBLE: GrapplingHook_Stop sets MoveType.None, which is not a projectile movetype, so ServerNet.Classify (IsProjectileMoveType, ServerNet.cs:2095/2115) drops the model-less chain from the snapshot (Generic with no alias model) — the spike vanishes the moment the hook latches. Base keeps the latched hook + rope drawn via CSQC."
    - "No central RemoveGrapplingHooks reset on freezetag-freeze / teleport / vehicle-enter / wr_resetplayer; the hook is cleared only via the weapon's own state machine."
    - "FIXED since the 2026-06-22 audit: hook fire now emits the W_MuzzleFlash effect (HOOK_MUZZLEFLASH), honours g_balance_grapplehook_gravity TOSS-mode movetype, applies W_WeaponRateFactor on refire, sets the 1s pauseregen inhibit + IT_UNLIMITED_AMMO drain guard, restores the owner FLY->WALK on RemoveHook, and credits the shoot-down pusher/pushltime. The offhand +hook button remains wired end-to-end (Wave 5)."
