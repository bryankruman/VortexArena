unit: weapon-hook
category: weapon
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "No hook ROPE line is ever drawn: there is no GrapplingHookSend/ENT_CLIENT_HOOK rope stream and no Draw_CylindricLine renderer. (The chain HEAD is networked as a generic projectile and rendered as a red Hookbomb spike while in flight — so the player sees a floating spike, not a chain — but the connecting rope between player and latch point is absent.)"
    - "Reel uses the wrong variant: Base default g_grappling_hook_tarzan=2 (elastic rubber-band rope, can pull players/nades/vehicles); the port implements only the tarzan-0 straight constant-speed reel, so pull feel, swing, player-pull, and vampirehook are all absent/wrong."
    - "Latched hook goes INVISIBLE: GrapplingHook_Stop sets MoveType.None, which makes ServerNet.Classify drop it from the snapshot (no projectile movetype, no model) — so even the spike vanishes the moment the hook latches. Base keeps the latched hook + rope rendering."
    - "Offhand hook is dead: the +hook offhand-fire button never reaches the server — InputButtons has no hook bit and OffhandFirePressed is never assigned by the input sampler, so the instahook/campaign offhand hook can't fire."
    - "Grapple cvars (force_rubber, stretch, airfriction, overstretch, speed_pull, length_min, tarzan, gravity, refire, crouchslide, nade_time, pull_frozen) are hardcoded or absent — not read from g_balance_grapplehook_*."
