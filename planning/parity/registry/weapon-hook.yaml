summary:
  feature_count: 12
  worst_gaps:
    - "Hook ROPE line is NOW DRAWN on the listen-host/demo path: this wave added HookRopeRenderer (game/client/HookRopeRenderer.cs, the Draw_GrapplingHook successor) + the shared CylindricLine cross-ribbon primitive (game/client/CylindricLine.cs), hosted LIVE by ClientWorld (ClientWorld.cs:427, injected with the shared CylindricLines pool). It is an ambient-entity-facade scanner (FindByClass(\"grapplinghook\")) like LaserRenderer/PortoPreview, so it draws a team-tinted muzzle->hook line both in flight AND after the latch — closing the long-standing 'never a rope' gap on the listen/demo path. RESIDUAL: idles on a pure --connect client (no entity facade, liveness:partial); the team colour is a ModelTint stand-in tint, NOT the real particles/hook_<team> texture set; no dedicated GrapplingHookSend/ENT_CLIENT_HOOK net stream; not runtime-verified."
    - "Latched hook still goes INVISIBLE *as a snapshot entity*: GrapplingHook_Stop sets MoveType.None (Hook.cs:340), so the server entity classifier drops the model-less chain head from the projectile snapshot. The in-flight Hookbomb SPIKE still vanishes on latch — but the ROPE LINE now persists across the latch (HookRopeRenderer reads the chain off the listen-host's live entity facade, not the snapshot), so the player no longer sees 'nothing' once latched on the listen/demo path."
    - "A central RemoveGrapplingHooks(pl) reset EXISTS (Hook.cs:516) and is wired LIVE into observer/disconnect (ClientManager.cs:571/828), freezetag/status-effect Frozen apply (StatusEffects.cs:164 OnApply=Hook.RemoveGrapplingHooks), teleport (Teleporters.cs:251/273), vehicle-enter (VehicleBoarding.cs:229), and wr_resetplayer (Hook.cs:627, dispatched per slot by SpawnSystem.cs:960 + NixMutator.cs:296). The offhand +hook is SAME-TICK (published in OnClientMove before PlayerPreThink, GameWorld.cs:2218-2227) with a vehicle gate. The weaponLocked/vehicle top guard in FireGrapplingHook is now also ported (Hook.cs:278)."
