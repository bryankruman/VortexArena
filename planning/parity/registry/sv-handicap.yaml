features:
  - id: sv-handicap.damage.give_take_scaling
    name: "Damage scaling by give/take handicap in PlayerDamage"
    layer: [authority]
    base_refs:
      - "server/player.qc:PlayerDamage"
      - "server/handicap.qc:Handicap_GetTotalHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:Apply"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:HandicapTotal"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageEntityState.cs:HandicapGive"
    constants:
      - { name: "victim multiply (take)", base: "damage *= total(take)", port: "damage *= HandicapTotal(targ,true)", match: true }
      - { name: "attacker divide (give)", base: "damage /= total(give) if this!=attacker && IS_PLAYER", port: "damage /= HandicapTotal(attacker,false) if give!=0 (same this!=attacker && IsPlayer guards)", match: true }
      - { name: "special-deathtype gate", base: "!DEATH_ISSPECIAL", port: "!DeathTypes.IsSpecial", match: true }
      - { name: "HANDICAP_DISABLED() CTS/Race gate on read", base: "Handicap_GetTotalHandicap returns 1 in CTS/Race", port: "HandicapTotal has no own gametype gate, but both layers it reads are now gated (voluntary provider returns 1 in CTS/Race; forced setter — dynamic mutator — is disabled in CTS/Race)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "HandicapTotal still has no explicit HANDICAP_DISABLED() gate of its own, but the residual is now moot: the voluntary provider returns 1 in CTS/Race and the only forced setter (the dynamic_handicap mutator) is now itself disabled in CTS/Race, so the product stays 1 there. A future non-mutator forced setter that bypassed the gate could still diverge."
    verification:
      - { kind: code, ref: "DamageSystem.cs:376-387 (apply) + 836-844 (HandicapTotal = forced*voluntary) vs server/player.qc + handicap.qc:Handicap_GetTotalHandicap", result: pass }
    confidence: high
    notes: "Live: weapons -> ApplyDamage/RadiusDamage -> DamageSystem.Apply. Apply formula (take-multiply, give-divide, this!=attacker && IsPlayer guard, !IsSpecial gate) is exact. HandicapTotal now multiplies forced (entity field) by voluntary (VoluntaryHandicapProvider) per direction; both layers honor CTS/Race, so the missing in-function gate is observationally covered."

