      - { kind: code, ref: "ScoreboardBlock.cs:84 captures p.HandicapLevel, :107 WriteByte, :151 ReadByte — full server->client round-trip, mirroring ent_cs.qc:180 ENTCS_PROP HANDICAP_LEVEL", result: pass }
