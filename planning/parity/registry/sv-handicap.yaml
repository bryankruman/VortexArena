unit: sv-handicap
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "Voluntary handicap (cl_handicap / cl_handicap_damage_given/taken cvars) has no effect in the port: a player setting cl_handicap 2 takes no extra and deals no less damage."
    - "handicap_level (0-16) is never computed or networked, and the scoreboard player_handicap icon is absent: handicapped players are visually indistinguishable."
    - "Xonstat handicapgiven/handicaptaken events are registered but never populated (no damage-weighted avg-sum accumulation)."
    - "Dynamic Handicap mutator omits the HANDICAP_DISABLED() CTS/Race gate, so if enabled it would run in modes where Base disables it."
features:
  - id: sv-handicap.damage.give_take_scaling
    name: "Damage scaling by give/take handicap in PlayerDamage"
    layer: [authority]
    base_refs:
      - "server/player.qc:PlayerDamage"
      - "server/handicap.qc:Handicap_GetTotalHandicap"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:PlayerDamage"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:HandicapTotal"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageEntityState.cs:HandicapGive"
    constants:
      - { name: "victim multiply (take)", base: "damage *= total(take)", port: "damage *= HandicapTotal(targ,true)", match: true }
      - { name: "attacker divide (give)", base: "damage /= total(give) if this!=attacker && IS_PLAYER", port: "damage /= HandicapTotal(attacker,false) if give!=0 (same this!=attacker && IsPlayer guards)", match: true }
      - { name: "special-deathtype gate", base: "!DEATH_ISSPECIAL", port: "!DeathTypes.IsSpecial", match: true }
      - { name: "HANDICAP_DISABLED() CTS/Race gate on read", base: "Handicap_GetTotalHandicap returns 1 in CTS/Race", port: "HandicapTotal has no gametype gate (returns the field)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "HandicapTotal omits the HANDICAP_DISABLED() (CTS/Race) gate that Base applies on EVERY read; in Base, handicap is forced to 1 in CTS/Race. Moot at default (fields=1) but would diverge if a mutator set forced handicap in CTS/Race."
    verification:
      - { kind: code, ref: "DamageSystem.cs:341-350 (apply) + 783-789 (HandicapTotal, no CTS/Race gate) vs server/player.qc:243-250 + handicap.qc:96-102", result: partial }
    confidence: high
    notes: "Live: weapons -> ApplyDamage/RadiusDamage -> DamageSystem.Damage -> PlayerDamage. Apply formula (take-multiply, give-divide, this!=attacker && IsPlayer guard, !IsSpecial gate) is exact. Two minor read-side divergences: missing CTS/Race gate, and an extra `give != 0f` safety guard (harmless — Base total is always >=1 via bound/SetForcedHandicap error). Observable default behavior matches because fields default to 1 and nothing on the live default path changes them."

