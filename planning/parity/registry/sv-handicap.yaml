    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port collapses forced x voluntary into one HandicapGive/HandicapTake field instead of multiplying the two layers at read time; only sound because voluntary is unimplemented. A changing cl_handicap would not be reflected the way Base recomputes it fresh each read."
    verification:
      - { kind: code, ref: "DamageSystem.cs:783-789 (reads field directly) vs handicap.qc:100-101 (product)", result: fail }
    confidence: high
    notes: "Disabled-state result (1*1=1) matches; the structural divergence matters once voluntary handicap is added."

