  - id: sv-handicap.voluntary.cl_handicap_cvars
    name: "Voluntary handicap from cl_handicap / cl_handicap_damage_given/taken"
    layer: [authority, shared]
    base_refs:
      - "server/handicap.qc:Handicap_GetVoluntaryHandicap"
      - "common/replicate.qh:19-21"
      - "server/client.qh:210-211"
    port_refs:
      - "src/XonoticGodot.Server/Commands.cs:VoluntaryHandicapProvider (ctor wiring ~374-392)"
      - "src/XonoticGodot.Server/Commands.cs:RegisterClientCommandCvars (cl_handicap* allowlist ~201)"
      - "src/XonoticGodot.Server/Commands.cs:ParseHandicapVectorXY"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:VoluntaryHandicapProvider"
    constants:
      - { name: "bound floor", base: "1.0", port: "1f (Math.Clamp(value,1f,10f))", match: true }
      - { name: "bound ceil", base: "10.0", port: "10f", match: true }
      - { name: "receiving select", base: "taken>1 ? taken : (cl_handicap.y>0 ? .y : .x)", port: "taken>1f ? taken : (hy>0f ? hy : hx)", match: true }
      - { name: "giving select", base: "given>1 ? given : cl_handicap.x", port: "given>1f ? given : hx", match: true }
      - { name: "CTS/Race gate", base: "HANDICAP_DISABLED() -> return 1", base_note: "", port: "GameType is Cts or Race -> return 1f", match: true }
      - { name: "int truncation of handicap_value", base: "int handicap_value (cvar value truncated to int before bound)", port: "float (no truncation; e.g. cl_handicap_damage_taken 2.5 -> 2.5 not 2)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Base stores handicap_value as int (truncates a fractional cvar like 2.5 to 2 before bound); the port keeps the float, so fractional voluntary handicaps differ slightly. Negligible (cvars are practically integers) but not bit-exact."
    verification:
      - { kind: code, ref: "Commands.cs:374-392 (forwards-compat vector branch + bound[1,10] + CTS/Race gate) vs handicap.qc:Handicap_GetVoluntaryHandicap", result: pass }
      - { kind: code, ref: "Commands.cs:201 cl_handicap/cl_handicap_damage_given/taken in REPLICATE allowlist; Commands ctor invoked from GameWorld.cs:691 (live server)", result: pass }
    confidence: high
    notes: "FIXED in Wave-5: the three cl_handicap* cvars are now REPLICATE-allowlisted + stored per-client, and VoluntaryHandicapProvider (wired in the live Commands ctor) reproduces Base's exact forwards-compat selection (new scalar cvar preferred, legacy '.y/.x' vector fallback), bound to [1,10], with the CTS/Race gate. Multiplied into damage via HandicapTotal. Only residual is the int-truncation nuance."

