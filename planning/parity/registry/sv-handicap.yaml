    notes: "FIXED since Wave-6: all four Base recompute triggers are now ported live (ClientDisconnect, PlayerSpawn≈PutClientInServer, MakePlayerObserver, AddedPlayerScore filtered to SP_SCORE), the application path now routes through the shared Handicap.SetForcedHandicap (so it tails into Handicap_UpdateHandicapLevel like Base), and the iteration scope matches (mean over live players, apply over all client-edicts — observers keep player class). The CTS/Race gate is wired live. Core compute/clamp math is bit-faithful. Live + default-off."
