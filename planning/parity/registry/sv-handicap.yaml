  - id: sv-handicap.xonstat.avg_sums
    name: "Per-player damage-weighted handicap avg for the game report"
    layer: [authority]
    base_refs:
      - "server/client.qc:2863-2874 (PlayerFrame)"
      - "common/playerstats.qc:261-265"
      - "server/handicap.qh:71-72"
    port_refs:
      - "src/XonoticGodot.Server/PlayerStats.cs:107 (AddEvent handicapgiven/handicaptaken)"
      - "src/XonoticGodot.Server/PlayerStats.cs:243-248 (FinalizePlayer emits the report events)"
      - "src/XonoticGodot.Server/PlayerStats.cs:76 (HandicapReportProvider seam)"
      - "src/XonoticGodot.Server/Scores.cs:97-98,157-158 (HandicapAvgGivenSum/TakenSum row fields)"
      - "src/XonoticGodot.Server/Scores.cs:991-1009 (OnDamageDealtScored/OnDamageTakenScored accumulation)"
      - "src/XonoticGodot.Server/Scores.cs:821-829 (HandicapReportAverages division)"
      - "src/XonoticGodot.Server/GameWorld.cs:876 (HandicapReportProvider wired live)"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:851 (GetTotalHandicap public alias)"
    constants:
      - { name: "given accumulation", base: "avg_given_sum += score_frame_dmg * total(give)", port: "HandicapAvgGivenSum += realdmg * GetTotalHandicap(p,false), summed per damage event (handicap constant within a frame → identical to score_frame_dmg*h)", match: true }
      - { name: "taken accumulation", base: "avg_taken_sum += score_frame_dmgtaken * total(take)", port: "HandicapAvgTakenSum += realdmg * GetTotalHandicap(p,true)", match: true }
      - { name: "reported value", base: "given<=0 ? 1 : avg_given_sum/given (given/taken = the DMG/DMGTAKEN score cols)", port: "given<=0 ? 1f : HandicapAvgGivenSum/row.DamageDealt (taken likewise / row.DamageTaken)", match: true }
      - { name: "accumulate-before-column-add order", base: "avg-sum += ... BEFORE GameRules_scoring_add(DMG/DMGTAKEN)", port: "HandicapAvgGivenSum += ... then AddDamageDealt (same order)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "Scores.cs:991-1009 accumulates realdmg*GetTotalHandicap on WeaponAccuracyEvents.DamageDealtScored/TakenScored (subscribed at SubscribeToDeaths, GameWorld.cs:540); fired live from DamageSystem.cs:525/528 on the PlayerDamage path", result: pass }
      - { kind: code, ref: "PlayerStats.cs:243-248 FinalizePlayer emits handicapgiven/handicaptaken via HandicapReportProvider -> Scores.HandicapReportAverages (GameWorld.cs:876); division by DMG/DMGTAKEN cols matches playerstats.qc:262-265", result: pass }
    confidence: high
    notes: >-
      FIXED in Wave-5: the events are no longer a dead stub. Per-frame damage now accumulates the
      damage-weighted handicap sums (HandicapAvgGivenSum/TakenSum) on the live score bus, and FinalizePlayer
      divides them by the DMG/DMGTAKEN score columns exactly like playerstats.qc, emitting both events through
      the host-wired HandicapReportProvider. The per-event accumulation is algebraically identical to Base's
      per-frame score_frame_dmg*h (handicap is constant within a player-frame). Like Base, this only actually
      ships when XonStat reporting is enabled (PlayerStats.Enabled / g_playerstats_gamereport_uri) — that
      gating is faithful, not a gap.

  - id: sv-handicap.dynamic.mutator
    name: "Dynamic Handicap mutator (auto-balance by score)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:DynamicHandicap_UpdateHandicap"
      - "mutators.cfg:527-531"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:UpdateHandicap"
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:HandicapDisabledProvider"
      - "src/XonoticGodot.Server/Commands.cs:367 (HandicapDisabledProvider wiring)"
    constants:
      - { name: "g_dynamic_handicap", base: "0", port: "0 (mutators.cfg)", match: true }
      - { name: "g_dynamic_handicap_scale", base: "0.2", port: "0.2 (mutators.cfg; C# field init 1f overwritten by cvar)", match: true }
      - { name: "g_dynamic_handicap_exponent", base: "1", port: "1", match: true }
      - { name: "g_dynamic_handicap_min", base: "0", port: "0", match: true }
      - { name: "g_dynamic_handicap_max", base: "0", port: "0", match: true }
      - { name: "handicap formula", base: "|(score-mean)*scale|^exp, signed, fold +1 / 1/(|h|+1), clamp", port: "identical", match: true }
      - { name: "HANDICAP_DISABLED() CTS/Race gate", base: "in REGISTER_MUTATOR condition", port: "IsEnabled checks g_dynamic_handicap && !HandicapDisabled (GameType is Cts or Race) via server-wired HandicapDisabledProvider", match: true }
      - { name: "recompute triggers", base: "ClientDisconnect/PutClientInServer/MakePlayerObserver/AddedPlayerScore(SP_SCORE)", port: "PlayerSpawn/PlayerDies", match: false }
      - { name: "iteration scope", base: "FOREACH_CLIENT(true) (all clients incl. spectators)", port: "FindByClass(player) + Client flag", match: false }
    status:
      logic: partial
      values: faithful
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Recompute cadence differs (PlayerSpawn/PlayerDies vs Base's ClientDisconnect/PutClientInServer/MakePlayerObserver/AddedPlayerScore(SP_SCORE)); roster shrink (leave/observe) and non-death score deltas (caps/objective points) leave the mean stale until the next spawn/death."
      - "Application iterates players-with-Client-flag, not Base's FOREACH_CLIENT(true) which also clamps spectators' forced handicap."
      - "Sets HandicapGive/Take directly rather than via Handicap_SetForcedHandicap, so it never triggers Handicap_UpdateHandicapLevel (moot until handicap_level exists)."
    verification:
      - { kind: code, ref: "DynamicHandicapMutator.cs:42-59 (IsEnabled + HandicapDisabled gate) + 90-128 (UpdateHandicap) vs sv_dynamic_handicap.qc", result: partial }
      - { kind: code, ref: "Commands.cs:367 HandicapDisabledProvider = () => GameType is Cts or Race (live ctor); IsEnabled consulted by MutatorActivation.Apply (GameWorld.cs:539)", result: pass }
      - { kind: config, ref: "assets/data/xonotic-data.pk3dir/mutators.cfg:527-531 matches Base defaults", result: pass }
    confidence: high
    notes: "FIXED in Wave-5: the HANDICAP_DISABLED() CTS/Race gate is now wired live (HandicapDisabledProvider -> GameType is Cts or Race), so the mutator is hard-disabled in CTS/Race like Base. Core compute/clamp math remains bit-faithful. Live + default-off. Remaining gaps are the recompute cadence and iteration-scope (spectator inclusion)."
