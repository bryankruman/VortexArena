      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:HandicapDisabledProvider (alias of Handicap.DisabledProvider)"
      - "src/XonoticGodot.Server/Commands.cs:393 (DynamicHandicapMutator.HandicapDisabledProvider wiring)"
