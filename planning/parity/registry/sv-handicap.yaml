    verification:
      - { kind: code, ref: "DynamicHandicapMutator.cs:134-173 (mean over IS_PLAYER, apply over all client-edicts via Handicap.SetForcedHandicap) vs sv_dynamic_handicap.qc:32-67", result: pass }
      - { kind: code, ref: "DynamicHandicapMutator.cs:79-124 hooks ClientDisconnect/PlayerSpawn/MakePlayerObserver/AddedPlayerScoreHook(SP_SCORE) — all dispatched live (ClientManager.cs:520/779, GameScores.cs:438)", result: pass }
