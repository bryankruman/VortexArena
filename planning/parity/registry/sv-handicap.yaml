  - id: sv-handicap.dynamic.mutator
    name: "Dynamic Handicap mutator (auto-balance by score)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/dynamic_handicap/sv_dynamic_handicap.qc:DynamicHandicap_UpdateHandicap"
      - "mutators.cfg:527-531"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DynamicHandicapMutator.cs:UpdateHandicap"
    constants:
      - { name: "g_dynamic_handicap", base: "0", port: "0 (mutators.cfg)", match: true }
      - { name: "g_dynamic_handicap_scale", base: "0.2", port: "0.2 (mutators.cfg; C# field init 1f overwritten by cvar)", match: true }
      - { name: "g_dynamic_handicap_exponent", base: "1", port: "1", match: true }
      - { name: "g_dynamic_handicap_min", base: "0", port: "0", match: true }
      - { name: "g_dynamic_handicap_max", base: "0", port: "0", match: true }
      - { name: "handicap formula", base: "|(score-mean)*scale|^exp, signed, fold +1 / 1/(|h|+1), clamp", port: "identical", match: true }
      - { name: "recompute triggers", base: "ClientDisconnect/PutClientInServer/MakePlayerObserver/AddedPlayerScore(SP_SCORE)", port: "PlayerSpawn/PlayerDies", match: false }
      - { name: "iteration scope", base: "FOREACH_CLIENT(true) (all clients incl. spectators)", port: "FindByClass(player) + Client flag", match: false }
      - { name: "HANDICAP_DISABLED() CTS/Race gate", base: "in REGISTER_MUTATOR condition", port: "omitted (IsEnabled only checks g_dynamic_handicap)", match: false }
    status:
      logic: partial
      values: faithful
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Dynamic Handicap mutator omits the HANDICAP_DISABLED() CTS/Race gate, so if enabled it would run in modes where Base disables it."
      - "Recompute cadence differs (PlayerSpawn/PlayerDies vs Base's ClientDisconnect/PutClientInServer/MakePlayerObserver/AddedPlayerScore(SP_SCORE)); finer per-point AddedPlayerScore granularity is not reproduced."
      - "Application iterates players-with-Client-flag, not Base's FOREACH_CLIENT(true) which also clamps spectators' forced handicap."
    verification:
      - { kind: code, ref: "DynamicHandicapMutator.cs:74-112 vs sv_dynamic_handicap.qc:32-82", result: partial }
      - { kind: config, ref: "assets/data/xonotic-data.pk3dir/mutators.cfg:527-531 matches Base defaults", result: pass }
    confidence: high
    notes: "Core compute/clamp math is bit-faithful. Live + default-off like Base (MutatorActivation.Apply hooks it when g_dynamic_handicap!=0). The C# field initializers are overwritten by cvar reads in Hook(), so effective defaults come from mutators.cfg."
