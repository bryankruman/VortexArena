summary:
  feature_count: 8
  worst_gaps:
    - "handicap_level (0-16) is still never computed or networked, and the scoreboard player_handicap icon is absent: handicapped players are visually indistinguishable."
    - "No explicit Handicap_Initialize on (re)connect/spawn; forced fields rely on the 1f construction default and handicap_level is never (re)set."
    - "Dynamic Handicap recompute cadence (PlayerSpawn/PlayerDies) and iteration scope (players only, not FOREACH_CLIENT(true) incl. spectators) still diverge from Base."
