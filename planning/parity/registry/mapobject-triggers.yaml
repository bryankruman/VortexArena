unit: mapobject-triggers
category: mapobject
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 25
  worst_gaps:
    - "slowdown is DEAD: SwampThink stamps it.SwampSlug + the 0.5 swamp_slowdown, but NO code in PlayerPhysics/MovementParameters reads SwampSlug.SwampSlowdown (Base player.qc:50 maxspd_mod) — players are damaged but move at full speed (the whole point of a swamp)"
    - "MultiTouch is MISSING the team-gate (this.team / INVERT_TEAMS) AND the pressedkeys gate — a team-restricted or key-gated trigger_multiple fires for the wrong team / without the key held"
    - "swamp obituary uses DeathTypes.Void instead of DeathTypes.Swamp (which exists, unused) — a swamp kill prints the void death message"
    - "counter/keylock 'sequence' notifications: port hardcodes a misc/talk.wav play that Base does NOT emit for MSG_CENTER notifications (CENTER_SEQUENCE_*, CENTER_DOOR_LOCKED_*) — the center-print countdown TEXT ('N more..'/'sequence complete'/keylist) is dropped and a wrong sound is added"
    - "no client 2.5D side-scroller camera consumer: the server stamps player.ViewLoc each frame but the view is never locked to the start->end line, so the camera region has no visible effect"
    - "trigger_magicear ported but UNWIRED: no say/chat pipeline calls MagicEarProcessAllEars, so the chat-trigger ears are dead on the live path"
