      - { kind: codetrace, ref: "StatusEffectsCatalog.Tick: Damage(e, s.Strength*0.05, 'burning'); no frametime; Apply overwrites", result: fail }
    confidence: medium
    notes: "Both the laser scorch and the firemine ignite route through this model, so the divergence affects the actual fire damage dealt by the whole weapon. Needs a DOT measurement to quantify."

