summary:
  feature_count: 13
  worst_gaps:
    - "Primary CHARGE-UP missing entirely: no 5-frame windup, no prefire delay, no SND_FIREBALL_PREFIRE2, no EFFECT_FIREBALL_PRE_MUZZLEFLASH — the fireball launches instantly instead of supercharging."
    - "Burn damage-over-time uses a different model (Strength*0.05/frame, no frametime scaling, no Fire_AddDamage combine math) vs Base fire_damagepersec*frametime — burn totals/duration diverge and are frame-rate coupled."
    - "BFG sweep gates broken/missing: no !this.cnt gate (timed-out fireball still sweeps), can hit same-team players (no DIFF_TEAM/DAMAGE_AIM/!independent), and the owner-survived gate is read BEFORE the blast (never suppresses self-kill) vs Base's after-blast health+armor compare."
    - "Per-victim BFG/laser/sphere effects (FIREBALL_BFGDAMAGE, FIREBALL_LASER, sphere modeleffect) and flight sounds are not emitted; firemine impact is non-silent + uses GRENADE_EXPLODE where Base is silent."
