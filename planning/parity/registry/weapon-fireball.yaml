  - id: weapon-fireball.primary.bfg
    name: "BFG secondary blast: damage every visible enemy within bfgradius (distance-scaled, LOS-gated)"
    layer: [authority]
    base_refs:
      - "common/weapons/weapon/fireball.qc:W_Fireball_Explode (findradius bfgradius loop)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Fireball.cs:Explode (BFG loop)"
    constants:
      - { name: "bfgdamage/bfgforce/bfgradius", base: "100/0/1000", port: "100/0/1000", match: true }
      - { name: "points falloff", base: "1 - sqrt(dist/bfgradius)", port: "1 - sqrt(dist/bfgradius)", match: true }
      - { name: "owner-survived gate", base: "owner.health+armor >= pre-blast", port: "owner.DeadState==No", match: false }
      - { name: "cnt gate", base: "!this.cnt (skip if shot-down/timed-out)", port: "none", match: false }
      - { name: "target filter", base: "DAMAGE_AIM && !independent && DIFF_TEAM", port: "TakeDamage!=No && !=owner", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: missing
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No !this.cnt gate: a fireball that timed out (or, if it were shootable, was shot down) still does the full BFG sweep — extra AoE damage Base suppresses."
      - "Team filter too loose: port can BFG-damage SAME-team players (no DIFF_TEAM check) and lacks the DAMAGE_AIM/!IS_INDEPENDENT_PLAYER filters."
      - "Owner-survived gate is BROKEN, not just approximated: port snapshots `ownerSurvived = owner.DeadState==No` BEFORE calling RadiusDamage and never re-reads, so it measures alive-before-own-blast (almost always true) rather than QC's 'health+armor AFTER blast >= before' — the gate effectively never suppresses the BFG even when the owner kills himself."
      - "Only ONE LOS trace (fireball->target); Base also requires the SHOOTER be visible to the target (second traceline)."
      - "EFFECT_FIREBALL_BFGDAMAGE per-victim effect not emitted; no accuracy_add hit credit for the BFG damage."
    verification:
      - { kind: codetrace, ref: "Explode BFG loop: FindInRadius(bfgradius), points=1-sqrt(dist/bfgradius), single LOS trace, ApplyDamage", result: fail }
    confidence: high
    notes: "Core falloff math + radius + LOS-gating idea are faithful; the gates/filters and per-victim fx are the divergences. bfgforce 0 default means the force omission is invisible."

