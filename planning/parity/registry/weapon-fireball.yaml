  - id: weapon-fireball.burn.model
    name: "Fire damage-over-time (Fire_AddDamage / Fire_ApplyDamage) backing both projectiles' burns"
    layer: [authority]
    base_refs:
      - "server/damage.qc:Fire_AddDamage"
      - "server/damage.qc:Fire_ApplyDamage"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/StatusEffects.cs:Apply"
      - "src/XonoticGodot.Common/Gameplay/StatusEffects.cs:Tick"
      - "src/XonoticGodot.Server/GameWorld.cs:1138"
    constants:
      - { name: "per-frame burn", base: "fire_damagepersec * frametime", port: "Strength * 0.05 (no frametime)", match: false }
      - { name: "dps", base: "d / max(t,0.1)", port: "Strength passed raw (scorch rate / 40)", match: false }
      - { name: "combine-burns math", base: "totaldamage/totaltime cap so dps<=max(old,new)", port: "Apply just overwrites expiry+strength", match: false }
      - { name: "fire transfer", base: "g_balance_firetransfer_* to nearby g_damagedbycontents", port: "none", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Burn tick applies Strength*0.05 per server frame with NO frametime scaling -> frame-rate-coupled and tickrate-dependent (≈Strength*3/s at 60Hz), unlike Base's exact fire_damagepersec*frametime."
      - "No Fire_AddDamage combine semantics: re-igniting an already-burning target just overwrites duration/strength instead of merging burns under the dps cap, so total burn damage and duration do not match Base's d-over-t."
      - "Burn ticks only on players (GameWorld player loop); no fire-transfer to nearby damageable entities (g_balance_firetransfer_*)."
      - "Fire_AddDamage's return-value contract (>=0 added damage, -1 if d<=0/dead) — used by FiremineTouch to decide delete-vs-bounce — is not modeled."
