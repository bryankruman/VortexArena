summary:
  feature_count: 19
  worst_gaps:
    - "RandomSeed shared-RNG broadcast entity and RedirectionThink server-redirect are still absent (no shared client RNG seed; no mass-reconnect command). PingPLReport is now PARTIAL (FIX 2026-06-27): the packet-loss column IS networked via the scoreboard block + consumed by the HUD PL column, but the ping column and the playerstats latency feed are still missing."
    - "DumpStats (:scores:/:status: console+eventlog scores dump) is now PORTED and LIVE (FIX 2026-06-27): Commands.DumpStats(final) is called at NextLevel (final=true) + via the `printstats` server command (final=false); the per-call score-LOG-FILE open/append (sv_logscores_file path) is the only residual (the eventlog-file sink covers structured logging)."
    - "GameWorld.Shutdown does slowmo-reset + ban-save + unfinished PlayerStats_GameReport(false), but ServerProgsDB persistence, bot_endgame, CheatShutdown and WeaponStats_Shutdown on teardown are still absent."
    - "World-layer leadlimit / leadlimit_and_fraglimit WIN semantics and the CheckRules_World mutator hook are still not evaluated in the checkrules cascade (leadlimit math only feeds the frags-remaining announcer). WinningCondition_RanOutOfSpawns is PORTED."
    - "serverflags + animated-lightstyle CLIENT consumers are now PARTIAL (FIX 2026-06-27): the HUD pickup-timer gate reads SERVERFLAG_FORBID_PICKUPTIMER (PickupPanel) and a styled dynlight animates via LightStyles.Sample (DynamicLightRenderer). STILL OPEN: no fullbright player-render gate reads SERVERFLAG_ALLOW_FULLBRIGHT, and world-brush lightmap animation for named styles is unported (styled geometry renders steady; only the dynlight node flickers)."
