last_audited: "2026-06-22"
summary:
  feature_count: 18
  worst_gaps:
    - "Post-warmup/restart countdown is 5s, not Base's RESTART_COUNTDOWN=10s."
    - "g_start_delay pre-match join window missing: dedicated servers lose the 15s 'everyone joins first' delay; match starts immediately."
    - "Ready-majority counts bots and the whole roster (ceil) instead of humans only (rint, min factor 0.5) — warmup may never end on a bot-filled server."
    - "No minplayers / sv_teamnagger gate on ending warmup; COUNTDOWN_STOP_MINPLAYERS/BADTEAMS never sent."
    - "sv_ready_restart_after_countdown unimplemented and default inverted (port 1, Base 0): map always resets at countdown start."
    - "g_warmup_limit default is -1 in the port but 180 in Base xonotic-server.cfg: default-config warmup never times out."
    - "serverflags (SERVERFLAG_ALLOW_FULLBRIGHT / SERVERFLAG_FORBID_PICKUPTIMER) from readlevelcvars not ported: sv_allow_fullbright / sv_forbid_pickuptimer have no server feed."
