summary:
  feature_count: 17
  worst_gaps:
    - "serverflags (SERVERFLAG_ALLOW_FULLBRIGHT / SERVERFLAG_FORBID_PICKUPTIMER) from readlevelcvars still not ported: sv_allow_fullbright / sv_forbid_pickuptimer have no server feed and there is no serverflags global at all."
    - "sv_ready_restart_after_countdown still unimplemented (default now corrected to 0): reset_map always runs immediately at countdown start, never deferred to a restart_timer think at game_starttime."
    - "reset_map entity .reset/.reset2 callback pass is still projectile-only-delete: movers/items are not returned to spawn via the FOREACH_ENTITY_FLOAT_ORDERED reset list, and no per-client accuracy_reset / Inventory_clear."
    - "RandomSeed / PingPLReport / animated-lightstyle worldspawn entities, max_shot_distance per-map recompute, RedirectionThink, and the QC <counter>.<unixtime>.<rand6> matchid are still absent."
    - "GameWorld.Shutdown is still a near-no-op: no slowmo-reset-on-active-timeout, no unfinished-match PlayerStats_GameReport(false), no bot_endgame on world teardown."
    - "World-layer leadlimit / leadlimit_and_fraglimit WIN semantics and WinningCondition_RanOutOfSpawns are still not evaluated in the checkrules cascade (the leadlimit math now exists but only feeds the frags-remaining announcer)."
