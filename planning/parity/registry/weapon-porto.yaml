summary:
  feature_count: 13
  worst_gaps:
    - "Death/respawn cleanup is now IMPLEMENTED + WIRED but only PARTIALLY live: WrPlayerDeath (Porto.cs:441, PortalClearAll + hard-fail the in-flight porto) is dispatched from DamageSystem.cs:614 and WrResetPlayer (Porto.cs:430, clears porto_current) from SpawnSystem.cs:814 — BUT both dispatch ONLY for the player's CURRENT weapon (Inventory.CurrentWeapon, slot 0). Base runs W_Porto_Remove/Portal_ClearAll on death regardless of held weapon and wr_resetplayer for EVERY owned weapon; in the port, if the player isn't holding porto at death/respawn the porto cleanup never runs, so a placed portal/in-flight porto can still outlive a death where porto wasn't the active weapon."
    - "No portal-aim trajectory preview (Porto_Draw): Base draws a reflecting red/blue Draw_CylindricLine polyline with the CheckWireframeBox 96^3 size gate showing where the in/out portals would land while you hold porto. The port renders nothing. Still entirely missing."
    - "Projectile blue reclassification suspect: client classifier (ProjectileCatalog.cs:267) STILL returns PortoRed unconditionally for classname 'porto'; the red->blue swap on a combined shot flips EF_RED/EF_BLUE on the server entity but the client never re-renders the blue variant mid-flight (classifier keys on classname only, never reads the effect flags)."
    - "No center-print notifications wired to a real sink (CENTER_PORTO_CREATED_IN/OUT/FAILED are called via NotificationSystem.Center but headless has no sink) and no throwable-drop (W_ThrowNewWeapon) on soft fail."
    - "CheckWireframeBox 96^3 surface-size gate still missing; combined out-portal branch (blue) places unconditionally with no portal_in id check; ProbeImpact re-trace is an approximation of the true contact face."
