      - { name: "death: clear ALL owner portals", base: "Portal_ClearAll (server/portals.qc, via MakePlayerObserver/ClientDisconnect)", port: "PortalClearAll?.Invoke(actor) -> Warpzones.ClearAllPortoPortals (Porto.cs:444)", match: true }
