last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Strength launch-speed boost is DEAD: Attack queries StatusEffectsCatalog.ByName(\"buff_strength\"), but the powerup is registered as \"strength\" (buffs use the buff_ prefix, the Strength powerup does not), so the lookup returns null and the speed multiply never runs — a porto fired under Strength flies at base speed, not Base's 3x. (The hardcoded StrengthForce=4 vs balance default 3 is moot while the branch is dead.)"
    - "No portal-aim trajectory preview: Base draws a reflecting red/blue Draw_CylindricLine polyline (Porto_Draw) showing where the in/out portals would land while you hold porto — the port renders nothing, the most visible porto-specific view feature is absent."
    - "W_Porto_Touch decision tree is incomplete AND its audio is wrong: no slick/clip reflect-and-continue (SND_PORTO_BOUNCE never plays, portals get placed where Base bounces off), no noimpact fail, no creature-hit ignore, no not-owner delete, no CheckWireframeBox surface-size gate; and the port plays porto/create on EVERY world touch (twice on success: once in OnTouch, again in PlacePortal) instead of create-on-success / unsupported-on-fail / bounce-on-slick."
    - "porto_forbidden is dead (read in WrThink but never set or decremented — no porto_ticker SV_StartFrame mutator, no race respawn setter), and there is no W_Porto_Remove / wr_resetplayer death-or-respawn cleanup of porto_current or the live projectile (a porto in flight or a placed portal can outlive its owner's death)."
    - "Non-secondary aim-hold (porto_v_angle) is broken-by-construction: WrThink(Primary) runs every tick and unconditionally clears PortoVAngleHeld, so the held angle captured on a secondary tick is wiped before the next primary fire can use it. Dormant in stock play (secondary defaults on)."
