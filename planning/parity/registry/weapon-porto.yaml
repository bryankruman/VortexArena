    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Dispatch is current-weapon-scoped: WrPlayerDeath is invoked from DamageSystem.cs:610-614 only for Inventory.CurrentWeapon(victim) at slot 0, and WrResetPlayer from SpawnSystem.cs:805-816 only for the current weapon at slot 0. In Base, Portal_ClearAll on death runs regardless of which weapon the player holds, and wr_resetplayer runs for EVERY owned weapon. So in the port, if the player is NOT holding porto at the moment of death/respawn, the porto death/reset cleanup does not run — a placed portal or in-flight porto can survive a death where porto wasn't the active weapon. (Single-slot port mitigates the resetplayer half; the death half is the real exposure.)"
