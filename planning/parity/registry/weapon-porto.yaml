  - id: weapon-porto.fire.strength_boost
    name: "Strength powerup launch-speed boost"
    layer: [authority]
    base_refs:
      - "common/weapons/weapon/porto.qc:W_Porto_Attack (StatusEffects_active(STATUSEFFECT_Strength))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Porto.cs:Attack"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Porto.cs:StrengthForce"
    constants:
      - { name: "strength status-effect name", base: "STATUSEFFECT_Strength (netname \"strength\")", port: "queried as \"buff_strength\" -> ByName returns null", match: false }
      - { name: "g_balance_powerup_strength_force", base: "3 (balance-xonotic.cfg:237)", port: "4 (hardcoded StrengthForce, and never applied)", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEAD: Attack does `StatusEffectsCatalog.ByName(\"buff_strength\")`, but the Strength powerup is registered as \"strength\" (StatusEffects.cs:109); only buffs carry the buff_ prefix and there is no buff_strength. The lookup returns null, the `is { } str` pattern fails, and the `speed *= StrengthForce` line never runs. A porto fired under Strength launches at base speed. Every other Strength consumer (e.g. Ctf.cs:801) correctly uses ByName(\"strength\")."
      - "Even if the name were fixed, StrengthForce is hardcoded to 4 (nexuiz25 balance), not read from g_balance_powerup_strength_force (xonotic default 3); it also won't track a runtime balance/ruleset change."
    verification:
      - { kind: code, ref: "Porto.cs:140 ByName(\"buff_strength\") vs StatusEffects.cs:109 R(new StatusEffectDef(\"strength\")) and Ctf.cs:801 ByName(\"strength\")", result: fail }
      - { kind: value, ref: "balance-xonotic.cfg:237 (=3) vs Porto.cs:275 StrengthForce=4f", result: fail }
    confidence: high
    notes: "Two compounding defects: wrong status-effect name (boost never applies = dead) AND wrong constant (4 vs 3). Draft claimed logic:faithful/liveness:live — both downgraded. The =4 matches the nexuiz25 balance, not the default xonotic balance."
