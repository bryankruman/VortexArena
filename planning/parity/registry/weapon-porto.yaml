summary:
  feature_count: 11
  worst_gaps:
    - "Surface-flag branches are inert: the slick/clip-reflect and noimpact-fail branches now EXIST in OnTouch (with correct per-branch sounds), but IsSlickOrClip/IsNoImpact are hardcoded `return false` (Porto.cs:288,293) because the headless touch carries no per-contact Q3 surface flags. So a porto still places a portal on a slick or sky/noimpact face that Base rejects, SND_PORTO_BOUNCE never plays, and the portal normal is approximated from -velocity instead of the impact plane."
    - "No portal-aim trajectory preview: Base draws a reflecting red/blue Draw_CylindricLine polyline (Porto_Draw) with the CheckWireframeBox 96^3 size gate showing where the in/out portals would land while you hold porto — the port renders nothing. Still entirely missing."
    - "porto_forbidden is still dead (read in WrThink:89 but never set or decremented — no porto_ticker SV_StartFrame mutator, no race respawn setter), and there is STILL no W_Porto_Remove / wr_resetplayer death-or-respawn cleanup of porto_current or the live projectile (a porto in flight or a placed portal can outlive its owner's death)."
    - "Projectile blue reclassification suspect: ProjectileCatalog classifier (line 261) returns PortoRed unconditionally for classname 'porto'; the red->blue type swap on a combined shot is modelled by flipping EF_RED/EF_BLUE on the entity, but the client likely never re-renders the blue variant mid-flight."
    - "Non-secondary aim-hold (porto_v_angle) reworked so a Primary tick no longer wipes the held angle, but the 'ATCK2 released' edge can't be observed from a Primary-only tick, so the hold is approximate; dormant anyway (secondary defaults on)."
