      - { name: "create sound timing", base: "SND_PORTO_CREATE only inside success branch (once)", port: "porto/create played once per success branch in OnTouch; PlacePortal no longer plays it", match: true }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: partial
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Surface-flag branches are structurally present but DEAD: IsSlickOrClip and IsNoImpact are hardcoded `return false` (Porto.cs:288,293) because the headless touch carries no per-contact Q3 surface flags / hit contents. So porto still places a portal on a slick/clip or sky/noimpact face that Base rejects, and SND_PORTO_BOUNCE is never played in practice."
      - "No CheckWireframeBox surface-size gate: a hit on a wall too small for a 96^3 portal is accepted (Base rejects via the preview-side wireframe check)."
