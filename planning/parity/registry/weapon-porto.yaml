  - id: weapon-porto.touch.placement_tree
    name: "On-touch portal placement decision tree (in/out/combined red->blue)"
    layer: [authority]
    base_refs:
      - "common/weapons/weapon/porto.qc:W_Porto_Touch"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Porto.cs:OnTouch"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Porto.cs:ProbeImpact"
    constants:
      - { name: "type 0 -> in-portal only", base: "Portal_SpawnInPortalAtTrace", port: "PlacePortal(isIn=true)+Success", match: true }
      - { name: "type 1 -> out-portal only", base: "Portal_SpawnOutPortalAtTrace", port: "PlacePortal(isIn=false)+Success", match: true }
      - { name: "type -1 -> red in, flip blue, then out", base: "EF_RED->EF_BLUE chaining", port: "EffectRed->EffectBlue chaining (Porto.cs:262-279)", match: true }
      - { name: "slick/clip reflect-and-continue", base: "yes (SND_PORTO_BOUNCE + reflect right_vector/angles)", port: "branch present + now REACHABLE via ProbeImpact surface-flag re-trace (Q3SURFACEFLAG_SLICK|DPCONTENTS_PLAYERCLIP), Porto.cs:231-238", match: true }
      - { name: "noimpact fail", base: "yes (SND_PORTO_UNSUPPORTED + Fail + Portal_ClearAll if cnt<0)", port: "branch present + now REACHABLE via ProbeImpact (Q3SURFACEFLAG_NOIMPACT); calls PortalClearWithId if cnt<0, Porto.cs:242-248", match: true }
      - { name: "creature-hit ignore", base: "yes (downtrace test)", port: "yes (ignore if TakeDamage!=No or Client, Porto.cs:211-218)", match: true }
      - { name: "not-owner delete", base: "yes (playerid mismatch + SND_PORTO_UNSUPPORTED)", port: "yes (owner null/freed -> unsupported + cleanup, Porto.cs:222-227)", match: true }
      - { name: "combined cnt<0 noimpact portal clear", base: "Portal_ClearAll_PortalsOnly (ALL owner portals)", port: "PortalClearWithId(owner,id) (just this shot's portals)", match: false }
      - { name: "CheckWireframeBox 96x96x96 surface-size gate", base: "yes (in Porto_Draw preview)", port: "missing (no headless surface-size trace)", match: false }
      - { name: "create sound timing", base: "SND_PORTO_CREATE only inside success branch (once)", port: "porto/create played once per success branch in OnTouch; PlacePortal no longer plays it", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: faithful
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Surface-flag gating logic differs from Base in WHERE the flags come from: Base reads trace_dphit* off the ORIGINAL bouncemissile collision trace; the port re-probes with a short worldonly traceline (ProbeImpact, Porto.cs:302-320) because the engine touch carries no per-contact flags. The TraceService genuinely fills DpHitQ3SurfaceFlags/DpHitContents from the BSP surface (TraceService.cs:626-627), so the slick/clip + noimpact branches are now reachable and play the right cues — but the re-trace can disagree with the true contact face (e.g. on a glancing bounce the probe ray may miss or hit an adjacent face), so the branch selection is approximate rather than exact."
      - "Combined cnt<0 noimpact fail clears only THIS shot's portals (PortalClearWithId) whereas Base clears ALL of the owner's portals (Portal_ClearAll_PortalsOnly) — a mild logic divergence."
      - "No CheckWireframeBox surface-size gate: a hit on a wall too small for a 96^3 portal is accepted (Base rejects via the preview-side wireframe check)."
      - "Base's final 'else' branch verifies realowner.portal_in.portal_id == this.portal_id before placing the out-portal of a combined shot; the port's blue-shot branch (Porto.cs:273-279) places unconditionally and has no portal_in id check or the mismatch->ClearAll fail path."
    verification:
      - { kind: code, ref: "Porto.cs:OnTouch (198-280) + ProbeImpact (302-320) vs porto.qc:W_Porto_Touch (166-286); TraceService.cs:626-627 fills surface flags", result: partial }
    confidence: high
    notes: "SECOND-PASS FIX: the surface-flag branches are no longer hardcoded `return false` — ProbeImpact re-traces the impact face and reads real Q3 surface flags + the true plane normal, so slick/clip reflect (porto/bounce) and noimpact fail (porto/unsupported) are genuinely reachable on the live path, and the portal normal is the real wall plane (falling back to -velocity only on a probe miss). The PortalClearWithId host hook is now WIRED (GameWorld.cs:416), so the cnt<0 in-portal cleanup is a real call. Remaining divergences: re-trace approximation, ClearAll-vs-ClearWithID scope, missing wireframe size gate, missing portal_in id check on the final out-portal branch."

