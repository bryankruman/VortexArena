      - { name: "type 1 -> out-portal only", base: "Portal_SpawnOutPortalAtTrace", port: "PlacePortal(isIn=false)+Success", match: true }
      - { name: "type -1 -> red in, flip blue, then out", base: "EF_RED->EF_BLUE chaining", port: "EffectRed->EffectBlue chaining", match: true }
      - { name: "slick/clip reflect-and-continue", base: "yes (SND_PORTO_BOUNCE + reflect right_vector/angles)", port: "missing", match: false }
      - { name: "noimpact fail", base: "yes (SND_PORTO_UNSUPPORTED + Fail)", port: "missing", match: false }
      - { name: "creature-hit ignore", base: "yes (downtrace test)", port: "missing", match: false }
      - { name: "not-owner delete", base: "yes (playerid mismatch + SND_PORTO_UNSUPPORTED)", port: "missing", match: false }
      - { name: "CheckWireframeBox 96x96x96 surface-size gate", base: "yes (in Porto_Draw preview; placement relies on Portal_Spawn* size checks)", port: "missing", match: false }
      - { name: "create sound timing", base: "SND_PORTO_CREATE only inside success branch (once)", port: "porto/create played on every touch + again in PlacePortal (twice on success)", match: false }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: partial
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No slick/clip branch: porto does not reflect-and-keep-flying off slick/clip surfaces, and SND_PORTO_BOUNCE is never played."
      - "No noimpact-surface fail: a hit on a sky/noimpact face that Base rejects places a portal in the port."
      - "No creature-hit ignore and no not-owner delete branch."
      - "Audio is wrong: OnTouch plays porto/create unconditionally on every world hit (before deciding success/fail), and PlacePortal plays it AGAIN — so a successful single-portal placement plays create twice, and a (would-be) fail still plays create instead of unsupported. Base plays SND_PORTO_CREATE once on success, SND_PORTO_UNSUPPORTED on fail, SND_PORTO_BOUNCE on slick."
      - "OnTouch treats any world-brush hit as a valid flat surface and always places; uses negated velocity (not the impact plane normal) as the portal normal — orientation is approximate."
    verification:
      - { kind: code, ref: "Porto.cs:OnTouch (lines 190,197,211,246) vs porto.qc:W_Porto_Touch (sounds gated per-branch)", result: fail }
    confidence: high
    notes: "Headless touch lacks per-contact surface flags / plane normal; the port acknowledges this in comments. In/out/combined branching itself is structurally present and live, but the surface-flag-dependent branches and the per-branch sounds are absent/wrong."

