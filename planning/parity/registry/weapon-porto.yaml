      - { name: "noimpact fail", base: "yes (SND_PORTO_UNSUPPORTED + Fail + Portal_ClearAll if cnt<0)", port: "branch present + REACHABLE via ProbeImpact (Q3SURFACEFLAG_NOIMPACT); calls PortalClearAll if cnt<0 (Porto.cs:249) — now matches Base's Portal_ClearAll_PortalsOnly", match: true }
      - { name: "creature-hit ignore", base: "yes (downtrace test)", port: "yes (ignore if TakeDamage!=No or Client, Porto.cs:211-218)", match: true }
      - { name: "not-owner delete", base: "yes (playerid mismatch + SND_PORTO_UNSUPPORTED)", port: "yes (owner null/freed -> unsupported + cleanup, Porto.cs:222-227)", match: true }
      - { name: "combined cnt<0 noimpact portal clear", base: "Portal_ClearAll_PortalsOnly (ALL owner portals, porto.qc:204)", port: "PortalClearAll(owner) (Porto.cs:249, wired GameWorld.cs:427 -> Warpzones.ClearAllPortoPortals) — clears ALL owner portals, matches Base", match: true }
      - { name: "CheckWireframeBox 96x96x96 surface-size gate", base: "yes (in Porto_Draw preview)", port: "missing (no headless surface-size trace)", match: false }
      - { name: "create sound timing", base: "SND_PORTO_CREATE only inside success branch (once)", port: "porto/create played once per success branch in OnTouch; PlacePortal no longer plays it", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: faithful
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Surface-flag gating logic differs from Base in WHERE the flags come from: Base reads trace_dphit* off the ORIGINAL bouncemissile collision trace; the port re-probes with a short worldonly traceline (ProbeImpact, Porto.cs:302-320) because the engine touch carries no per-contact flags. The TraceService genuinely fills DpHitQ3SurfaceFlags/DpHitContents from the BSP surface (TraceService.cs:627), so the slick/clip + noimpact branches are now reachable and play the right cues — but the re-trace can disagree with the true contact face (e.g. on a glancing bounce the probe ray may miss or hit an adjacent face), so the branch selection is approximate rather than exact."
      - "No CheckWireframeBox surface-size gate: a hit on a wall too small for a 96^3 portal is accepted (Base rejects via the preview-side wireframe check)."
      - "Base's final 'else' branch verifies realowner.portal_in.portal_id == this.portal_id before placing the out-portal of a combined shot; the port's blue-shot branch (Porto.cs:273-279) places unconditionally and has no portal_in id check or the mismatch->ClearAll fail path."
    verification:
      - { kind: code, ref: "Porto.cs:OnTouch (198-280) + ProbeImpact (302-320) vs porto.qc:W_Porto_Touch (166-286); TraceService.cs:627 fills surface flags", result: partial }
    confidence: high
    notes: "Surface-flag branches re-trace the impact face (ProbeImpact) and read real Q3 surface flags + the true plane normal, so slick/clip reflect (porto/bounce) and noimpact fail (porto/unsupported) are genuinely reachable on the live path, and the portal normal is the real wall plane (falling back to -velocity only on a probe miss). The combined-shot noimpact clear is now PortalClearAll (Porto.cs:249, wired GameWorld.cs:427) matching Base's Portal_ClearAll_PortalsOnly — FIXED since the 2026-06-22 baseline (was PortalClearWithId, this-shot-only). Remaining divergences: re-trace approximation, missing wireframe size gate, missing portal_in id check on the final out-portal branch. Re-audited 2026-06-25."

