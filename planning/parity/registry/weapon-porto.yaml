      - { name: "creature-hit ignore", base: "yes (downtrace test)", port: "yes (approx: ignore contact if TakeDamage!=No or Client, Porto.cs:208)", match: true }
      - { name: "not-owner delete", base: "yes (playerid mismatch + SND_PORTO_UNSUPPORTED)", port: "yes (owner null/freed -> unsupported + cleanup, Porto.cs:220)", match: true }
