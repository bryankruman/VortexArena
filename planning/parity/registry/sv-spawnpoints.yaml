summary:
  feature_count: 14
  reaudit_note: "2026-06-22 post-Wave-5 re-audit (branch claude/parity-port-waves, HEAD 023ba70). Two baseline dead/missing rows are now genuinely CLOSED on the live path: (1) target_spawnpoint forced-spawn redirection — SelectSpawnPoint now short-circuits to forPlayer.SpawnPointTarg (SpawnSystem.cs:332) and PutPlayerInServer clears it (SpawnSystem.cs:603); setter live (TargetUtilities.cs:238) + tested (TargetUtilitiesTests TargetSpawnpoint_SetsActorForcedSpawn) + driven on a real mode via Race.ApplyRespawnSpot through ClientManager.OnPreSpawn (GameWorld.cs:1895 → ClientManager.cs:616, runs before SelectSpawnPoint). (2) move-out-of-solid relocation — RelocateSpawnOutOfSolid (SpawnSystem.cs:521) is now called from ScoreSpot (SpawnSystem.cs:417), gated by g_spawnpoints_auto_move_out_of_solid (default 1), so an in-solid spot is nudged up and kept instead of dropped. 2 FIXES, 0 regressions, 0 new-unmapped. STILL OPEN: spawn_evalfunc race/assault scoring veto, EF teleport/restartanim bits, SND_SPAWN audio + team-tint network, the spawnpoint use/setactive state machine, and the emergency-refilter/anypoint/cnt-multiplier margins."
  worst_gaps:
    - "race/assault spawn_evalfunc target chain + race_spawns requirement are unported (no Spawn_Score target-graph biasing/veto inside ScoreSpot; inline NOTE at SpawnSystem.cs:422). Inert on plain DM (targetCheck-gated). NOTE: Race's respawn-at-last-checkpoint IS now live, but via the spawnpoint_targ one-shot redirect (OnPreSpawn → SpawnPointTarg), NOT via the in-scoring evalfunc — the scoring veto/bias is still missing. STILL OPEN."
    - "Spawn sound SND_SPAWN (cl_spawn_event_sound, half of g_spawn_alloweffects 3) is never played: the port emits the EFFECT_SPAWN particle burst on spawn but no audio cue. STILL OPEN."
    - "The spawned player model gets no EF_TELEPORT_BIT | EF_RESTARTANIM_BIT: Base sets the teleport sparkle + anim-restart effect bits on respawn (server/client.qc:630); the port relies on an origin particle burst instead. Bit constants exist (CsqcModelEffectFlags.cs:43-44) but are never SET on the player on respawn. STILL OPEN."
    - "spawnpoint use/setactive/reset + some_spawn_has_been_used state machine has no live writer on the port path (SomeSpawnHasBeenUsed only ever reset to false; no spawnpoint_setactive caller). Inert on stock DM/CTF; only relevant to Onslaught/Assault control-point capture. STILL OPEN."
