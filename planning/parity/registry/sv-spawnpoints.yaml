    divergence_rationale: null
    gaps:
      - "The port splits Base's single vector-returning spawn_evalfunc into TWO delegates: SpotEvalReject (bool veto, used by assault) + SpotEvalScore (additive prio delta, used by race). Both real Base users are covered (assault only vetoes; race only adds +50 to prio.x), but an evalfunc that rewrites the WEIGHT component or returns a fully arbitrary score vector isn't representable. No real Base user does this — minor. STILL OPEN."
    verification:
      - { kind: code, ref: "Assault: ShouldRejectSpawnSpot follows spot.Target -> objective, returns true (reject) when Health<0 or >=ObjectiveInactive (mirrors sv_assault.qc:28-33); wired in Assault.Activate (Assault.cs:608), cleared in Deactivate (:646); consulted at SpawnSystem.cs:506 on targetCheck", result: pass }
