      - { name: "priority", base: "(score.y >= lower)*0.5 + score.x", port: "(weight >= lower ? 0.5 : 0) + prio", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "SpawnSystem.cs:518-551 vs server/spawnpoints.qc:Spawn_WeightedPoint + lib/random.qc:RandomSelection_AddEnt; cnt multiplier present (SpawnSystem.cs:529-530: `int cnt = spot.Cnt != 0 ? spot.Cnt : 1; w = pow(...) * cnt`)", result: pass }
    confidence: high
    notes: "Reservoir: strictly-higher priority resets; equal priority accumulates weight and keeps with prob w/total (NextDouble()*total <= w). The spot.cnt multiplier IS now applied (SpawnSystem.cs:530), defaulting a Cnt-0 spot to 1 exactly like QC relocate_spawnpoint's `if(!this.cnt) this.cnt=1` — the previously-noted missing-cnt values gap is closed; mapper cnt-weighted clusters now weight correctly. Bit-faithful to the RandomSelection reservoir."

