unit: sv-spawnpoints
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 14
  worst_gaps:
    - "target_spawnpoint forced-spawn redirection is dead: target_spawnpoint_use sets Entity.SpawnPointTarg (TargetUtilities.cs:238) but SelectSpawnPoint never reads it (Base returns this.spawnpoint_targ before any scoring), so a map scripting a player's next spawn location has no effect. STILL OPEN (not touched by the second-pass fix-up)."
    - "No move-out-of-solid relocation (g_spawnpoints_auto_move_out_of_solid, default 1): Base nudges an in-solid spawnpoint out at link time; the port only traces startsolid at selection time and drops the spot, so a map with all spots embedded can have every spot filtered out (then falls back to placing the player in solid). STILL OPEN (MoveOutOfSolid helpers exist for nade/conveyor nudges but none is wired into spawnpoint relocation)."
    - "Spawn sound SND_SPAWN (cl_spawn_event_sound, half of g_spawn_alloweffects 3) is never played: the port emits the EFFECT_SPAWN particle burst on spawn but no audio cue. STILL OPEN."
    - "The spawned player model gets no EF_TELEPORT_BIT | EF_RESTARTANIM_BIT: Base sets the teleport sparkle + anim-restart effect bits on respawn (server/client.qc:630); the port relies on an origin particle burst instead. The bit constants exist (CsqcModelEffectFlags.cs:43-44) but are never SET on the player on respawn. STILL OPEN."
    - "race/assault spawn_evalfunc target chain + race_spawns requirement are unported (no Spawn_Score target-graph biasing/veto). STILL OPEN; cross-boundary (owned by race/assault), inert on plain DM (targetCheck-gated)."
features:
  - id: sv-spawnpoints.select.select_spawn_point
    name: "SelectSpawnPoint: gather, filter, weighted 50/50 pick"
    layer: [authority]
    base_refs:
      - "server/spawnpoints.qc:SelectSpawnPoint"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:SelectSpawnPoint"
      - "src/XonoticGodot.Server/ClientManager.cs:Spawn"
    constants:
      - { name: "g_spawn_furthest", base: "0.5", port: "0.5", match: true }
      - { name: "near_pick (lower,upper,exponent)", base: "1,1,1", port: "1,1,1", match: true }
      - { name: "far_pick (lower,upper,exponent)", base: "1,5000,5", port: "1,5000,5", match: true }
      - { name: "mindist (Spawn_FilterOutBadSpots)", base: "100 qu", port: "100 qu (SpawnMinDist)", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Emergency fallback differs: Base, when Spawn_FilterOutBadSpots returns empty, RE-FILTERS the spot list once with targetcheck=false (server/spawnpoints.qc:421-435) before giving up. The port skips that re-filter and instead seeds every spot at (prio 0, weight 0), so the assault/active gate is never relaxed and the player may be placed in solid via the prio-0 fallback. UNCHANGED."
      - "anypoint / g_spawn_useallspawns path: Base skips Spawn_FilterOutBadSpots entirely and does Spawn_WeightedPoint(1,1,1) over ALL spots (spawnpoints.qc:413-416). The port still runs ScoreSpot (startsolid veto + restriction + active filters) on the anyPoint path, so a few spots a Base anypoint pick would keep can be dropped. UNCHANGED."
      - "testplayerstart debug edict (spawnpoints.qc:363-370) — Base returns a 'testplayerstart' classname spot before any other logic; not ported (debug-only). UNCHANGED."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:324-367 vs server/spawnpoints.qc:400-461; random()>g_spawn_furthest near/far split confirmed; caller ClientManager.cs:558 Spawn (targetCheck:true), BotController.cs:166, MatchController.cs:88", result: pass }
    confidence: high
    notes: "Live via ClientManager.Spawn (every join/respawn, targetCheck=true), BotController.cs:166, and MatchController.cs:88. The 50/50 furthest split (random()>g_spawn_furthest ⇒ near 1,1,1; else far 1,5000,5), the team-spawn ladder, and the survivor-prio>=0 filter all match. The two emergency/anypoint branches and the testplayerstart edict are the logic gaps (all low-severity on stock maps). Unchanged by the second-pass fix-up. Runtime distribution shape unverified."

