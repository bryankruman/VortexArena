    confidence: high
    notes: "FIXED vs baseline (race half was missing: logic/values partial, liveness partial). Both halves are now ported and wired live. ASSAULT: SpotEvalReject vetoes a spot targeting an inactive/destroyed objective. RACE: the race_spawns gate (RaceSpawnsActive — a race spot MUST have a target) and SPAWN_PRIO_RACE_PREVIOUS_SPAWN=50 biasing (SpotEvalScore, last-checkpoint preference) are both implemented and installed by Race.Activate. The +50 path is a secondary fallback to the spawnpoint_targ one-shot redirect that ApplyRespawnSpot already drives (see select.spawnpoint_targ). Only residual: the evalfunc is two narrow delegates rather than a general vector-rewriting function — covers every real Base user."

