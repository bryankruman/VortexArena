  - id: sv-spawnpoints.relocate.move_out_of_solid
    name: "relocate_spawnpoint move-out-of-solid"
    layer: [authority]
    base_refs:
      - "server/spawnpoints.qc:relocate_spawnpoint (move_out_of_solid branch, lines 117-148)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:521 (RelocateSpawnOutOfSolid)"
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:414-419 (ScoreSpot calls it on trace_startsolid)"
    constants:
      - { name: "g_spawnpoints_auto_move_out_of_solid", base: "1 (on)", port: "1 (CvarBool default true)", match: true }
      - { name: "relocation search direction", base: "move_out_of_solid (omni-directional generic helper)", port: "straight-up step (rest-in-floor approximation)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base relocates an in-solid spot OUT of solid once at link time via the generic omni-directional move_out_of_solid helper, then keeps it permanently. The port has no link-time relocation pass, so it does the equivalent at SELECT time (ScoreSpot, when the placement-box trace reports startsolid): RelocateSpawnOutOfSolid steps the spot's origin straight UP in 2qu increments up to the player-box height + 16qu margin and commits the new origin onto the spot entity via SetOrigin, so the nudge persists across selections (GatherSpawnPoints re-reads the same live spot). The straight-up search (vs Base's omni-directional) is a deliberate simplification covering the common rest-in-floor case; the gate cvar, the keep-on-success, and the drop-on-failure (Base's objerror 'could not get out of solid at all!') semantics all match."
    gaps:
      - "Direction of the nudge differs from Base: the port searches only straight up, whereas Base's move_out_of_solid is omni-directional. A spot embedded in a wall/ceiling that Base would push sideways out, the port will fail to clear (and drop the spot) if a clear position isn't found by rising the box height. Low severity (the dominant embed case is a spot resting in/just below the floor). NEW, intended divergence."
    verification:
      - { kind: code, ref: "RelocateSpawnOutOfSolid (SpawnSystem.cs:521-546) iterates dz 2..(boxHeight+16) stepping origin up, traceboxes the player hull at origin+zNudge, commits SetOrigin on the first clear, returns false → spot dropped if none found; called at SpawnSystem.cs:416-419 only when CvarBool('g_spawnpoints_auto_move_out_of_solid', true) is on", result: pass }
      - { kind: code, ref: "Live: ScoreSpot is on the real select path (ClientManager.Spawn targetCheck:true); the trace is the actual PutPlayerInServer placement box so success guarantees the player lands clear", result: pass }
    confidence: high
    notes: "FIXED vs baseline (dead/missing → live/faithful, intended divergence on direction). The baseline had NO relocation: an in-solid spot was simply vetoed (return -1) at select time, so an all-embedded map filtered every spot out then placed the player in solid via the prio-0 fallback. Wave-5 added RelocateSpawnOutOfSolid + the g_spawnpoints_auto_move_out_of_solid gate, so a slightly-embedded spot Base would nudge-and-keep is now nudged-and-kept by the port too. The only residual divergence is the straight-up-only search direction (logged as an intended simplification)."

