unit: sv-spawnpoints
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 14
  worst_gaps:
    - "target_spawnpoint forced-spawn redirection is dead: target_spawnpoint_use sets Entity.SpawnPointTarg (EntityMapObjectStateExtra.cs:61) but SelectSpawnPoint never reads it (Base returns this.spawnpoint_targ before any scoring), so a map scripting a player's next spawn location has no effect. UNCHANGED by Wave-1/2."
    - "No move-out-of-solid relocation (g_spawnpoints_auto_move_out_of_solid, default 1): Base nudges an in-solid spawnpoint out at link time; the port only traces startsolid at selection time and drops the spot, so a map with all spots embedded can have every spot filtered out (then falls back to placing the player in solid). UNCHANGED by Wave-1/2 (a MapVolumes.MoveOutOfSolid helper exists for conveyor nudges but is NOT wired into spawnpoint relocation)."
    - "Spawn sound SND_SPAWN (cl_spawn_event_sound, half of g_spawn_alloweffects 3) is never played: the port emits the EFFECT_SPAWN particle burst on spawn but no audio cue. UNCHANGED."
    - "The spawned player model gets no EF_TELEPORT_BIT | EF_RESTARTANIM_BIT: Base sets the teleport sparkle + anim-restart effect bits on respawn (server/client.qc:630); the port relies on an origin particle burst instead. UNCHANGED."
    - "NEW DEFECT (Wave-2): the idle spawn-point glow's per-team tint is mis-mapped. SpawnPointParticles.TeamColorRgb switches on team 1/2/3/4, but a spawnpoint's e.Team carries the port's CSQC team encoding Teams.Red/Blue/Yellow/Pink = 4/13/12/9 — so a RED spot is tinted PINK (case 4) and blue/yellow/pink spots fall through to white/untinted. The baseline gap (untinted) is replaced, not fixed; the correct table (cf. Ctf.TeamRadarColor) switches on Teams.Red etc."
features:
  - id: sv-spawnpoints.select.select_spawn_point
    name: "SelectSpawnPoint: gather, filter, weighted 50/50 pick"
