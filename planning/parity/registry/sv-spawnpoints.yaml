    base_refs:
      - "server/spawnpoints.qc:SelectSpawnPoint"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:SelectSpawnPoint"
      - "src/XonoticGodot.Server/ClientManager.cs:Spawn"
    constants:
      - { name: "g_spawn_furthest", base: "0.5", port: "0.5", match: true }
      - { name: "near_pick (lower,upper,exponent)", base: "1,1,1", port: "1,1,1", match: true }
      - { name: "far_pick (lower,upper,exponent)", base: "1,5000,5", port: "1,5000,5", match: true }
      - { name: "mindist (Spawn_FilterOutBadSpots)", base: "100 qu", port: "100 qu (SpawnMinDist)", match: true }
      - { name: "spawn classnames", base: "info_player_deathmatch / info_player_survivor / info_player_start / info_player_team1..4", port: "SpawnClassNames (SpawnSystem.cs:66-75) — all 7 incl. info_player_survivor", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Emergency fallback differs: Base, when Spawn_FilterOutBadSpots returns empty, RE-FILTERS the spot list once with targetcheck=false (server/spawnpoints.qc:421-435) before giving up. The port runs the targetcheck=false re-filter (SpawnSystem.cs:435-436), then returns null if even that comes back empty (SpawnSystem.cs:445-446) so the ClientManager caller can retry/log — rather than seeding all spots at prio-0. Faithful in shape; the only divergence is the post-re-filter NULL handling vs Base's error()/GotoNextMap branch. Low severity. UNCHANGED."
      - "anypoint / g_spawn_useallspawns path: Base skips Spawn_FilterOutBadSpots and does Spawn_WeightedPoint(1,1,1) over ALL spots (spawnpoints.qc:413-416). The port mirrors this (SpawnSystem.cs:415-421: seeds all spots at prio0/weight0, NO startsolid/team/active/restriction filtering) — matches Base. UNCHANGED (faithful)."
      - "testplayerstart debug edict (spawnpoints.qc:363-370) — Base returns a 'testplayerstart' classname spot before any other logic; not ported (debug-only). UNCHANGED."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:384-456 vs server/spawnpoints.qc:358-461; spawnpoint_targ short-circuit (392) precedes gather, mirroring QC:372-373; random()>g_spawn_furthest near/far split confirmed (451-453); caller ClientManager.Spawn (targetCheck:true)", result: pass }
      - { kind: code, ref: "info_player_survivor now in SpawnClassNames (SpawnSystem.cs:69) — GatherSpawnPoints finds Survival-mode spots; the 2026-06-25 gap is closed", result: pass }
    confidence: high
    notes: "Live via ClientManager.Spawn (every join/respawn, targetCheck=true). FIXED vs baseline: info_player_survivor was MISSING from SpawnClassNames at the 2026-06-25 baseline; it is now registered (SpawnSystem.cs:69), so a Survival-mode map's info_player_survivor spots are no longer silently dropped. The 50/50 furthest split, team-spawn ladder, survivor-prio>=0 filter, spawnpoint_targ short-circuit (SpawnSystem.cs:392), and the anyPoint no-filter branch all match Base. Residual logic gaps: the post-re-filter NULL handling and the testplayerstart edict (both low-severity on stock maps)."

