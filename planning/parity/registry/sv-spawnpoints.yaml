    base_refs:
      - "server/spawnpoints.qc:SelectSpawnPoint"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:SelectSpawnPoint"
      - "src/XonoticGodot.Server/ClientManager.cs:Spawn"
    constants:
      - { name: "g_spawn_furthest", base: "0.5", port: "0.5", match: true }
      - { name: "near_pick (lower,upper,exponent)", base: "1,1,1", port: "1,1,1", match: true }
      - { name: "far_pick (lower,upper,exponent)", base: "1,5000,5", port: "1,5000,5", match: true }
      - { name: "mindist (Spawn_FilterOutBadSpots)", base: "100 qu", port: "100 qu (SpawnMinDist)", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Emergency fallback differs: Base, when Spawn_FilterOutBadSpots returns empty, RE-FILTERS the spot list once with targetcheck=false (server/spawnpoints.qc:421-435) before giving up. The port skips that re-filter and instead seeds every spot at (prio 0, weight 0), so the assault/active gate is never relaxed and the player may be placed in solid via the prio-0 fallback. UNCHANGED."
      - "anypoint / g_spawn_useallspawns path: Base skips Spawn_FilterOutBadSpots entirely and does Spawn_WeightedPoint(1,1,1) over ALL spots (spawnpoints.qc:413-416). The port still runs ScoreSpot (startsolid veto + restriction + active filters) on the anyPoint path, so a few spots a Base anypoint pick would keep can be dropped. UNCHANGED."
      - "testplayerstart debug edict (spawnpoints.qc:363-370) — Base returns a 'testplayerstart' classname spot before any other logic; not ported (debug-only). UNCHANGED."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:327-374 vs server/spawnpoints.qc:358-461; spawnpoint_targ short-circuit (332) precedes gather, mirroring QC:372-373; random()>g_spawn_furthest near/far split confirmed; caller ClientManager.cs:617 Spawn (targetCheck:true), BotController.cs, MatchController.cs", result: pass }
    confidence: high
    notes: "Live via ClientManager.Spawn (every join/respawn, targetCheck=true), BotController, and MatchController. The 50/50 furthest split, team-spawn ladder, and survivor-prio>=0 filter all match. Wave-5 ADDED the spawnpoint_targ short-circuit at the head (SpawnSystem.cs:332) — see select.spawnpoint_targ. The two emergency/anypoint branches and the testplayerstart edict remain the logic gaps (all low-severity on stock maps). Runtime distribution shape unverified."

  - id: sv-spawnpoints.select.spawn_score
    name: "Spawn_Score: nearest-player distance scoring + good-distance prio"
    layer: [authority]
    base_refs:
      - "server/spawnpoints.qc:Spawn_Score"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:ScoreSpot"
    constants:
      - { name: "SPAWN_PRIO_GOOD_DISTANCE", base: "10", port: "10 (PrioGoodDistance)", match: true }
      - { name: "mindist threshold", base: "100", port: "100 (SpawnMinDist)", match: true }
      - { name: "shortest seed", base: "vlen(world.maxs - world.mins) (world diagonal)", port: "1_000_000 (fixed)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "shortest is seeded with a fixed 1e6 instead of the world diagonal; benign because the prio threshold (>100) and the weight upper-clamp (5000) both swamp it, so the pick is statistically identical. UNCHANGED."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:383-453 vs server/spawnpoints.qc:Spawn_Score", result: pass }
    confidence: high
    notes: "Distance to nearest live non-dead OTHER player (excludes self/dead/observers, matching QC IS_PLAYER && !IS_DEAD && it!=this); prio = 10 when that exceeds 100. Fires the Spawn_Score mutator hook to bias prio/weight (read back from the args). The race_spawns target requirement and the assault spawn_evalfunc target chain are NOT ported on this path — see sv-spawnpoints.select.spawn_evalfunc. Wave-5 added the move-out-of-solid relocation call inside this function (see relocate.move_out_of_solid) but did not change the distance-scoring logic."

  - id: sv-spawnpoints.select.weighted_point
    name: "Spawn_WeightedPoint / RandomSelection reservoir pick"
    layer: [authority]
    base_refs:
      - "server/spawnpoints.qc:Spawn_WeightedPoint"
      - "lib/random.qc:RandomSelection_AddEnt"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:WeightedPick"
    constants:
      - { name: "weight", base: "bound(lower,score.y,upper) ** exponent * spot.cnt", port: "pow(bound(lower,weight,upper), exponent) (cnt NOT multiplied)", match: false }
      - { name: "priority", base: "(score.y >= lower)*0.5 + score.x", port: "(weight >= lower ? 0.5 : 0) + prio", match: true }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "spot.cnt is not multiplied into the weight: a mapper distributing several spawnpoints in a small area with cnt>1 (to weight that cluster more) gets uniform weighting in the port. Default cnt is 1 so stock maps are unaffected. UNCHANGED."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:463-492 vs server/spawnpoints.qc:Spawn_WeightedPoint + lib/random.qc:RandomSelection_AddEnt", result: pass }
    confidence: high
    notes: "Reservoir: strictly-higher priority resets; equal priority accumulates weight and keeps with prob w/total (NextDouble()*total <= w). Faithful to the RandomSelection reservoir except the missing cnt multiplier. Unchanged by Wave 5."

