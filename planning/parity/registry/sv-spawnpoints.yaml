summary:
  feature_count: 15
  reaudit_note: "2026-06-25 drift re-audit (branch claude/parity-port-waves, HEAD post-Wave-6c ba3ae47). Wave 6c (ba3ae47, after the 2026-06-22 baseline HEAD 023ba70) closed several previously-open gaps on the LIVE path: (1) SND_SPAWN audio — PutPlayerInServer now plays Sounds.ByName('SPAWN') ('misc/spawn') on CH_TRIGGER, gated by g_spawn_alloweffects bit1 (SpawnSystem.cs:735); the two fx/put audio rows go missing->faithful. (2) EF_TELEPORT_BIT | EF_RESTARTANIM_BIT — the server now SETS p.Effects |= EffectFlags.Teleport|RestartAnim on (re)spawn (SpawnSystem.cs:743, bits 1<<21/1<<20 in EntityMutatorState.cs:195-196, networked via EntityField.Effects); authority half is now faithful, but no CLIENT consumer reads the bits yet so the visible flash/anim-restart still relies on the particle burst (presentation stays partial). (3) countdown shield/pause extension + rot/regen pause primers — both were NOTE-only at baseline, now implemented (SpawnSystem.cs:752-782); put_player timing partial->faithful. (4) assault spawn_evalfunc REJECT — SpawnSystem.SpotEvalReject is consulted in ScoreSpot (SpawnSystem.cs:447) and WIRED LIVE by Assault.Activate/Deactivate (Assault.cs:597/631); the spawn_evalfunc row's assault half goes missing->partial/live (race_spawns gate + SPAWN_PRIO_RACE_PREVIOUS_SPAWN=50 biasing still missing). NEW-UNMAPPED found+ADDED: PutPlayerInServer fires the spawn spot's .target on spawn (QC client.qc:814-822 SUB_UseTargets with the assault/race suppression hack) — ported live at ClientManager.cs:709-716 (put.spawn_target_fire). 5 fixes, 0 regressions, 1 new row. STILL OPEN: race/assault in-scoring race_spawns gate + prio-50 biasing, the EF-bit CLIENT consumer, team-tint network on the spawn burst, the spawnpoint use/setactive/some_spawn_has_been_used state machine, and the emergency-refilter/anypoint/cnt-multiplier margins."
  worst_gaps:
    - "race/assault in-scoring path: the race_spawns gate (a race spot MUST have a target, else -1) and the SPAWN_PRIO_RACE_PREVIOUS_SPAWN=50 checkpoint biasing are still unported inside ScoreSpot (inline NOTE at SpawnSystem.cs:477). The assault spawn_evalfunc REJECT half is now live (Assault wires SpotEvalReject), and Race's respawn-at-last-checkpoint is covered via the spawnpoint_targ redirect, but the race score-biasing/race_spawns requirement remains missing. STILL OPEN."
    - "EF_TELEPORT_BIT | EF_RESTARTANIM_BIT are now SET on the (re)spawned player server-side (SpawnSystem.cs:743) and networked through Entity.Effects, but NO client csqcmodel consumer reads them to play the teleport flash / restart the animation — the visible spawn flash still relies on the EFFECT_SPAWN particle burst. The authority half is fixed; the client presentation consumer is the residual gap. STILL OPEN (presentation)."
    - "Team-coloring of the spawn burst (Team_ColorRGB(teamnum) / entcs_GetColor, client/spawnpoints.qc:58-60) is not networked through a SpawnEvent entity — the port emits an untinted EffectEmitter.Emit('SPAWN', origin). (Distinct from the idle-glow tint, which IS team-colored — see spawnpoint_idle_glow.) STILL OPEN."
    - "spawnpoint use/setactive/reset + some_spawn_has_been_used state machine has no live writer on the port path (SomeSpawnHasBeenUsed only ever reset to false; no spawnpoint_setactive caller). Inert on stock DM/CTF; only relevant to Onslaught/Assault control-point capture. STILL OPEN."
