  - id: sv-spawnpoints.select.weighted_point
    name: "Spawn_WeightedPoint / RandomSelection reservoir pick"
    layer: [authority]
    base_refs:
      - "server/spawnpoints.qc:Spawn_WeightedPoint"
      - "lib/random.qc:RandomSelection_AddEnt"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:WeightedPick"
    constants:
      - { name: "weight", base: "bound(lower,score.y,upper) ** exponent * spot.cnt", port: "pow(bound(lower,weight,upper), exponent) (cnt NOT multiplied)", match: false }
      - { name: "priority", base: "(score.y >= lower)*0.5 + score.x", port: "(weight >= lower ? 0.5 : 0) + prio", match: true }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "spot.cnt is not multiplied into the weight: a mapper distributing several spawnpoints in a small area with cnt>1 (to weight that cluster more) gets uniform weighting in the port. Default cnt is 1 so stock maps are unaffected."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:448-477 vs server/spawnpoints.qc:336-347 + lib/random.qc:RandomSelection_AddEnt", result: pass }
    confidence: high
    notes: "Reservoir: strictly-higher priority resets; equal priority accumulates weight and keeps with prob w/total (NextDouble()*total <= w). Faithful to the RandomSelection reservoir except the missing cnt multiplier."

