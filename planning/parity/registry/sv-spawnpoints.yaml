      - { name: "mindist threshold", base: "100", port: "100 (SpawnMinDist)", match: true }
      - { name: "shortest seed", base: "vlen(world.maxs - world.mins) (world diagonal)", port: "1_000_000 (fixed)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "shortest is seeded with a fixed 1e6 instead of the world diagonal; benign because the prio threshold (>100) and the weight upper-clamp (5000) both swamp it, so the pick is statistically identical. UNCHANGED."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:433-509 vs server/spawnpoints.qc:Spawn_Score", result: pass }
    confidence: high
    notes: "Distance to nearest live non-dead OTHER player (excludes self/dead/observers, matching QC IS_PLAYER && !IS_DEAD && it!=this); prio = 10 when that exceeds 100. Fires the Spawn_Score mutator hook to bias prio/weight (read back from the args). The assault spawn_evalfunc REJECT is now consulted here (SpawnSystem.cs:447, see spawn_evalfunc) but the race_spawns target requirement + prio-50 biasing are NOT ported on this path. The move-out-of-solid relocation call inside this function (see relocate.move_out_of_solid) doesn't change the distance-scoring logic."

