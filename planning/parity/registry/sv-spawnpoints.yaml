    base_refs:
      - "server/spawnpoints.qc:SelectSpawnPoint"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Player/SpawnSystem.cs:SelectSpawnPoint"
      - "src/XonoticGodot.Server/ClientManager.cs:Spawn"
    constants:
      - { name: "g_spawn_furthest", base: "0.5", port: "0.5", match: true }
      - { name: "near_pick (lower,upper,exponent)", base: "1,1,1", port: "1,1,1", match: true }
      - { name: "far_pick (lower,upper,exponent)", base: "1,5000,5", port: "1,5000,5", match: true }
      - { name: "mindist (Spawn_FilterOutBadSpots)", base: "100 qu", port: "100 qu (SpawnMinDist)", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Emergency fallback differs: Base, when Spawn_FilterOutBadSpots returns empty, RE-FILTERS the spot list once with targetcheck=false (server/spawnpoints.qc:421-435) before giving up. The port skips that re-filter and instead seeds every spot at (prio 0, weight 0), so the assault/active gate is never relaxed and the player may be placed in solid via the prio-0 fallback."
      - "anypoint / g_spawn_useallspawns path: Base skips Spawn_FilterOutBadSpots entirely and does Spawn_WeightedPoint(1,1,1) over ALL spots (spawnpoints.qc:413-416). The port still runs ScoreSpot (startsolid veto + restriction + active filters) on the anyPoint path, so a few spots a Base anypoint pick would keep can be dropped."
      - "testplayerstart debug edict (spawnpoints.qc:363-370) — Base returns a 'testplayerstart' classname spot before any other logic; not ported (debug-only)."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:324-367 vs server/spawnpoints.qc:358-460; caller ClientManager.cs:515/522 Spawn", result: pass }
    confidence: high
    notes: "Live via ClientManager.Spawn (every join/respawn, targetCheck=true), BotController.cs:166, and MatchController.cs:88. The 50/50 furthest split, the team-spawn ladder, and the survivor-prio>=0 filter all match. The two emergency/anypoint branches and the testplayerstart edict are the logic gaps (all low-severity on stock maps). Runtime distribution shape unverified."

