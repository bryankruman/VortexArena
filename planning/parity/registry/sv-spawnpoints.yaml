summary:
  feature_count: 15
  reaudit_note: "2026-06-27 drift re-audit (branch claude/parity-port-waves). ONE MATERIAL FIX since the 2026-06-27 prior pass: the spawnpoint use/setactive/some_spawn_has_been_used STATE MACHINE — the long-standing top worst_gap recorded as 'no live writer' — is now WIRED. GatherSpawnPoints installs e.Use ??= SpawnPointUse + e.SetActive ??= SpawnPointSetActive on every gathered spawnpoint (SpawnSystem.cs:637-638); SpawnPointUse (652-660) retags the claimed spot to the activator's team + latches SomeSpawnHasBeenUsed=true; SpawnPointSetActive (670-680) flips SpawnActive on an ACTIVE_TOGGLE/set and latches SomeSpawnHasBeenUsed on a real state change. Both handlers are REACHABLE on live generic map-object dispatch: MapMover.UseTargets fires t.Use(t,actor) for any target matched by targetname (MapObjectsCommon.cs:468), and the relay_(de)activate path fires trg.SetActive(trg,self.Cnt) (LogicGates.cs:417-418) — so a map wiring a button/trigger/relay onto a spawnpoint's targetname now drives the team-retag + active-toggle + some_spawn_has_been_used lockout. The reader (GameWorld.cs:3857, the g_spawn_useallspawns count gate in WinningCondition_RanOutOfSpawns) is therefore now satisfiable, and SelectSpawnPoint's 'team can't spawn any more (return null)' branch reachable. net.spawnpoint_link_send: logic partial (writer no longer absent, but the team-locked-out NULL-return branch still isn't modeled in SelectSpawnPoint), values stays missing (no spawnpoint_think 0.1s resend — static-edict divergence), liveness partial->live (writers now reachable on the generic dispatch path). CAVEAT: no ported gametype (Onslaught/Assault) drives a control-point capture chain onto spawnpoints — the machinery is reachable via generic targeting but not exercised by a gametype control-point — so it remains a partial/medium-confidence story, but the recorded 'no live writer' worst_gap is CLOSED. Also a SECOND target_spawnpoint .Use setter exists (TargetUtilities.cs:227, the forced-spawn redirect setter, distinct from the team-retag SpawnPointUse). All prior fixes intact: RACE in-scoring (RaceSpawnsActive gate SpawnSystem.cs:502, SpotEvalScore +50 SpawnSystem.cs:561-562; Race wires at Race.cs:509/517-518, const 50 at Race.cs:553, cleared Race.cs:603-605 — lines shifted), info_player_survivor in SpawnClassNames (SpawnSystem.cs:69), EF_TELEPORT no-interp half consumed (ServerNet.cs:~1921 NetEntityFlags.Teleported), SpawnEventTint (SpawnSystem.cs:1354), SND_SPAWN (SpawnSystem.cs:860-861), countdown shield/pause primers (SpawnSystem.cs:875-905), assault SpotEvalReject (Assault.cs:608/646->SpawnSystem.cs:509), spawn_target_fire (ClientManager.cs:780-784), spawnpoint_targ redirect (SpawnSystem.cs:392/794). 1 fix, 0 regressions, 0 new_unmapped (cl_spawnzoom/unpress-zoom-on-spawn live behaviors are mapped under cl-view, not this unit). 2026-06-27 OPUS RE-VERIFY PASS (post-Wave-16/17): re-read SpawnSystem.cs end-to-end + every dispatch/wiring site against current code — ClientManager.Spawn (SelectSpawnPoint:727 targetCheck:true, PutPlayerInServer:745, spawn-target fire+suppress:780-784), MapObjectsCommon.cs:468 (t.Use generic dispatch -> SpawnPointUse), LogicGates.cs:417-418 (trg.SetActive -> SpawnPointSetActive), Race.cs:552/561/596/682-684 (RaceSpawnsActive + SpotEvalScore +50 wired/cleared), GameWorld.cs:3857 (SomeSpawnHasBeenUsed reader), Onslaught.cs (NO spawnpoint capture — confirms the medium-confidence caveat), SpawnNearTeammate/SpawnUnique mutators ([Mutator] + live SpawnScore/PlayerSpawn hooks). EVERY prior-pass status claim HOLDS against current code; the only inaccuracy was stale line numbers (the prior pass cited a slightly-earlier file revision — SND_SPAWN/EF/particle/tint/reader lines all shifted ~50-90 lines down). Corrected those refs in place. Zero status changes, zero regressions. STILL OPEN: the team-locked-out NULL-return branch (some_spawn_has_been_used path in SelectSpawnPoint not modeled — caller retries on null instead); the static-spawnpoint networking (SpawnPoint_Send/spawnpoint_think — intended divergence); the spawn_evalfunc score-REWRITE generality (Race additive-only, assault veto-only); the emergency-refilter prio-0 margin; the move-out-of-solid straight-up-only direction; spawn_near_teammate residual relocation defers; the visible teleport SPARKLE (covered by EFFECT_SPAWN, no dedicated csqcmodel flash)."
  worst_gaps:
    - "EF_RESTARTANIM_BIT + the visible teleport-sparkle half of EF_TELEPORT_BIT have no dedicated csqcmodel consumer — the no-interp half IS consumed (ServerNet.cs:~1921 NetEntityFlags.Teleported), anim-restart is an intended no-op (procedural locomotion), and the spawn flash is delivered by the EFFECT_SPAWN particle burst rather than a separate model sparkle. Residual presentation gap is narrow. STILL OPEN (presentation only)."
    - "The team-locked-out NULL-return branch (Base: if(some_spawn_has_been_used) return NULL when zero spots survive) is not explicitly modeled in the port's SelectSpawnPoint — it returns null whenever zero spots survive (any cause) and the ClientManager caller retries, which subsumes the behavior but doesn't distinguish the lockout case. The some_spawn_has_been_used LATCH is now driven (SpawnPointUse/SpawnPointSetActive), so the GameWorld.cs:3857 useallspawns count gate is satisfiable. STILL OPEN (branch not modeled)."
    - "spawn_evalfunc is modeled as TWO separate delegates — SpotEvalReject (bool veto, assault) + SpotEvalScore (additive prio delta, race) — rather than Base's single vector-rewriting spawn_evalfunc. Both real Base users (assault veto, race +50) are covered, but a hypothetical evalfunc that rewrites WEIGHT or returns a fully arbitrary vector isn't representable. Minor / no real Base user. STILL OPEN."
features:
  - id: sv-spawnpoints.select.select_spawn_point
    name: "SelectSpawnPoint: gather, filter, weighted 50/50 pick"
