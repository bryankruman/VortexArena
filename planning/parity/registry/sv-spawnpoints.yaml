    constants:
      - { name: "g_spawn_furthest", base: "0.5", port: "0.5", match: true }
      - { name: "near_pick (lower,upper,exponent)", base: "1,1,1", port: "1,1,1", match: true }
      - { name: "far_pick (lower,upper,exponent)", base: "1,5000,5", port: "1,5000,5", match: true }
      - { name: "mindist (Spawn_FilterOutBadSpots)", base: "100 qu", port: "100 qu (SpawnMinDist)", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Emergency fallback differs: Base, when Spawn_FilterOutBadSpots returns empty, RE-FILTERS the spot list once with targetcheck=false (server/spawnpoints.qc:421-435) before giving up. The port does run a targetcheck=false re-filter (SpawnSystem.cs:386-387), but then seeds every spot at (prio 0, weight 0) if even that comes back empty (SpawnSystem.cs:392-396), so the assault/active gate is relaxed once but a wrong-team / all-embedded list still falls through to a prio-0 fallback. UNCHANGED."
      - "anypoint / g_spawn_useallspawns path: Base skips Spawn_FilterOutBadSpots entirely and does Spawn_WeightedPoint(1,1,1) over ALL spots (spawnpoints.qc:413-416). The port mirrors this (SpawnSystem.cs:366-372: seeds all spots at prio0/weight0, NO startsolid/team/active/restriction filtering), so this matches Base — the earlier note that the port still ran ScoreSpot on the anyPoint path is now obsolete. UNCHANGED (faithful)."
      - "testplayerstart debug edict (spawnpoints.qc:363-370) — Base returns a 'testplayerstart' classname spot before any other logic; not ported (debug-only). UNCHANGED."
    verification:
      - { kind: code, ref: "SpawnSystem.cs:335-405 vs server/spawnpoints.qc:358-461; spawnpoint_targ short-circuit (343) precedes gather, mirroring QC:372-373; random()>g_spawn_furthest near/far split confirmed; caller ClientManager.cs:664 Spawn (targetCheck:true), plus bot/match paths", result: pass }
    confidence: high
    notes: "Live via ClientManager.Spawn (every join/respawn, targetCheck=true). The 50/50 furthest split, team-spawn ladder, and survivor-prio>=0 filter all match. The spawnpoint_targ short-circuit at the head (SpawnSystem.cs:343 — see select.spawnpoint_targ). The anyPoint branch now matches Base (no filtering). Residual logic gaps: the (post-re-filter) prio-0 fallback and the testplayerstart edict (both low-severity on stock maps). Runtime distribution shape unverified."

