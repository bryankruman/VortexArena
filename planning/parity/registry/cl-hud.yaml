      - { name: "padding clamp", base: "min(min(size)*0.5-5, padding)", port: "same", match: true }
    status: { logic: faithful, values: faithful, timing: faithful, presentation: faithful, audio: na, liveness: live }
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "HudPanel.Resolve mirrors QC '' / '0' inherit rules; Wave 17 (2f0bfdb) added the QC HUD_Panel_GetColor 'shirt'/'pants'/'team' bg_color literals: HudManager._Process resolves the local player's colormap shirt/pants (CsqcModelAppearance.ColormapPaletteColor on cp.ClientColors nibbles) + team color once per frame into HudPanel.LocalShirtColor/LocalPantsColor/LocalTeamColor, and HudPanel.Resolve maps bgColStr shirt/pants/team to them (inherit fallback when there is no local player).", result: pass }
