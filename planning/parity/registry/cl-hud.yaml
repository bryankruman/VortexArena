unit: cl-hud
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-27"
summary:
  feature_count: 60
  worst_gaps:
    - "Powerups bar colors diverge: Base feeds addPowerupItem the hud_progressbar_strength/shield/superweapons_color cvars (1 0.39 0 / 0.36 1 0.07 / 0.77 0.67 0) but PowerupsPanel hardcodes the QC m_color colormods (strength blue '0 0 1', shield magenta '1 0 1', superweapons white) — the registered cvars are dead. (2026-07-02 coverage fold.)"
    - "drawpic_tiled has no port primitive (scoreboard table's tiled scoreboard_bg backing is absent; configure-mode's tiled highlight border is a flat 2px frame); hud_panel_weapons_orderbyimpulse defaults 0 (Base ships 1) and is unconsumed; the per-panel hud_panel_*_dynamichud gate is unconsumed (whole-CanvasLayer shake/sway applies to every panel, incl. infomessages which Base ships with dynamichud 0). (2026-07-02 coverage fold.)"
    - "Radar maximized clickable mode (ons spawn / teleport select) is still unported; the discovered radar panel stays force-hidden and the live one is the standalone _radar. (Onslaught radar links + the minimapname=='' gate were added by Wave 17; the BSP _mini minimap + bigsize/normalsize math by Wave 8c.)"
    - "Pure --connect (remote) clients still have no vote / mapvote net channel; those panels stay blank there (listen-server only). (Map-vote casting now rides the C2S impulse byte on a remote client — Wave 16 — but the candidate-grid feed is still listen-server only.)"
    - "Race timer / checkpoints fed from host-side Race state, not the TE_CSQC_RACE wire — no splits on a pure --connect client."
    - "Scoreboard still ignores hud_panel_scoreboard_pos/_size (manual Configure rect, intended divergence); the accuracy show-DELAY timer is unwired (only the binary warmup gate is). Per-row ping IS now networked (Wave 17)."
    - "HUD dock still punts on the hud_dock_color shirt/pants colormap literals (the 'team' literal + rgb + team-factor ARE wired; Wave 17 added the 'team' literal). The panels' bg_color shirt/pants/team literals ARE now resolved (Wave 17)."
features:
  - id: cl-hud.engine.registry_and_order
    name: "Panel registry, z-order, panel-order cvar"
    layer: [presentation]
    base_refs:
      - "client/hud/hud.qh:REGISTER_HUD_PANEL"
      - "client/hud/hud.qc:HUD_Main"
    port_refs:
      - "game/hud/HudRegistry.cs:PanelTypes"
      - "game/hud/HudLayoutDefaults.cs:Table"
      - "game/hud/HudManager.cs:_Ready"
    constants:
      - { name: "panel_count", base: "28 panels (REGISTER_HUD_PANEL WEAPONS..CHECKPOINTS, hud.qh:250-277; +4 minigame panels = 32 total registrations)", port: "discovered set (incl. port extras: Fps/Ping/Position/Shownames)", match: false }
      - { name: "_hud_panelorder reverse draw", base: "order[0] on top", port: "Godot child z-order", match: false }
    status: { logic: faithful, values: faithful, timing: na, presentation: partial, audio: na, liveness: live }
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Draw order follows Godot child order, not the QC _hud_panelorder reverse-walk; relative panel layering may differ but panels don't overlap in luma."
    verification:
      - { kind: code, ref: "HudRegistry reflection + HudLayoutDefaults table; Hud._Ready adds Dock first then the discovered panels", result: pass }
    confidence: high
    notes: "Reflection-discovered registry replaces the hand list; per-panel ids/showflags/config match REGISTER_HUD_PANEL. HudDock is now added FIRST (lowest z) before the panel walk."

