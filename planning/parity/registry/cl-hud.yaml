summary:
  feature_count: 35
  worst_gaps:
    - "Directional skin border variants render as the full 9-slice frame, not the engine's edge-masked crops (cl-hud.engine.skin_border)."
    - "Radar maximized clickable mode (ons spawn / teleport select) is still unported; the discovered radar panel stays force-hidden and the live one is the standalone _radar. (The BSP _mini minimap texture + bigsize/normalsize math ARE now ported — fixed since baseline by Wave 8c.)"
    - "Pure --connect (remote) clients still have no vote / mapvote net channel; those panels stay blank there (listen-server only)."
    - "Race timer / checkpoints fed from host-side Race state, not the TE_CSQC_RACE wire — no splits on a pure --connect client."
    - "Scoreboard still ignores hud_panel_scoreboard_pos/_size (manual Configure rect, intended divergence); spectator-row ping not networked per-row."
