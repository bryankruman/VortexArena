      - { name: "_hud_panelorder reverse draw", base: "order[0] on top", port: "Godot child z-order", match: false }
    status: { logic: faithful, values: faithful, timing: na, presentation: partial, audio: na, liveness: live }
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Draw order follows Godot child order, not the QC _hud_panelorder reverse-walk; relative panel layering may differ but panels don't overlap in luma."
