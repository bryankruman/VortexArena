    notes: "FIXED since baseline (Wave 17 2f0bfdb): the _bg_color shirt/pants/team-blend literals are now resolved from the local player's colormap (ColormapPaletteColor) + team color, fed each frame by HudManager — closing the prior 'inherits global bg color' gap on the listen-server path. Live cvar reads via MenuState.Cvars so console set / menu dialogs move panels live; reload on cvar Changed + viewport resize. HudPanel.TryParseRgbColor exposed publicly so HudDock can share the parser. (On a pure --connect client with no local Player the literals fall back to inherit — same as Base when no colormap is known.)"

  - id: cl-hud.engine.skin_border
    name: "9-slice skin border (draw_BorderPicture)"
    layer: [presentation]
    base_refs:
