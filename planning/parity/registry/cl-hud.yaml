summary:
  feature_count: 35
  worst_gaps:
    - "CheckpointsPanel still dead: race_checkpoint_splits need per-checkpoint race-record storage the server doesn't keep; honest unresolved (Wave 5)."
    - "RaceTimer split-vs-record deltas not fed (count-up lap clock IS live now): same per-checkpoint record-net blocker as checkpoints."
    - "Vote + MapVote panels are now live on a listen server (fed from VoteController / MapVoting); a pure --connect client still has no vote net channel."
    - "Progress bars are flat fills, not the skin progressbar 9-slice with baralign 0/1/2/3 semantics."
