  feature_count: 22
  worst_gaps:
    - "Frozen players take full damage (no frag_damage=0 / g_frozen_force) — HP=1 frozen body is re-killed by chip damage. Verified: DamageSystem.cs:424-429 subtracts health with no frozen guard."
    - "revive_auto_reducible missing: shooting a frozen enemy never speeds their thaw (core FT tactic gone)."
    - "Time-to-score revive model (revive_time_to_score=1.5, speed_t2s=0.25, no clear) absent; port uses +1-per-revive at 0.4."
    - "No ice (MDL_ICE) entity model, no Frozen/Reviving waypoint sprites, no freeze/revive notifications, no full-screen frozen overlay — AND the crosshair thaw ring is unfed (decoded NetEntity.ReviveProgress has no client consumer), so NO frozen-state HUD feedback exists at all."
    - "FT start loadout (g_ft_start_*) never applied (ApplyStartItems dead); round flow uses generic predicates that ignore frozen-elimination."
