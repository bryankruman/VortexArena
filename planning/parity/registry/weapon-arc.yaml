summary:
  feature_count: 13
  worst_gaps:
    - "Visible beam is a SPARK-PARTICLE TRAIL (effectinfo arc_beam = `type spark` trailspacing 10), NOT a cylindric beam: the BeamRenderer route is DEAD for arc (arc_beam is registered isTrail:true so it classifies as Trail, never EiOrientation.Beam) — no Draw_ArcBeam bezier sweep, muzzle flash, per-beam_type thickness/color, or hit/muzzle lights."
    - "Beam can't start with 1-5 cells (CheckAmmoPrimary uses `cells >= beam_ammo (6)`) where Base wr_checkammo1 needs only `cells > 0`; weapon auto-switches away. Confirmed bug, live via WeaponAmmo.Check."
    - "Bolt secondary fires the whole bolt_count burst in one WrThink call (no bolt_refire spacing, no bolt_refire2 tail, no ammo-fraction scaling) — dormant at stock bolt_count 1."
    - "Arc_Smoke (overheat smoke/fire particles + SND_ARC_LOOP_OVERHEAT) entirely missing; overheat jam duration is fixed time+overheat_max not time+heat/cooldown_speed; heat-% HUD stat + drop/pickup heat migration unported."
