      - "Wave-2 added a LagComp.Begin/End bracket around the damage trace (Arc.cs:301-307) to mirror Base WarpZone_traceline_antilag, BUT LagComp.Provider is never installed anywhere (no ILagCompensation implementation is registered — Net/AntilagBuffer.cs:147 LagCompensation does NOT implement the Common interface), so the bracket is a no-op on every path: NO actual antilag take-back/restore occurs. The seam exists but produces no behavior; the underlying plain trace (no warpzone transform either) is what still runs. Identical to Base only when no warpzones/antilag would have mattered."
