    notes: "coefficient = min(frametime, curr_ammo/rootammo) and SetResource(max(0, curr - rootammo*frametime)) match Base exactly (Arc.cs:254-261). Wave-2 antilag bracket is a non-functional seam (Provider null); not counted as a fix and not a regression (Base behavior was already identical sans antilag)."

