summary:
  feature_count: 14
  worst_gaps:
    - "No ball exists in a live match: SpawnBall has no caller, so the mode is unplayable (you cannot pick up or carry anything)."
    - "Because there is never a carrier, NO Keepaway scoring ever fires (time points, kill bonuses, pickups, bctime all stay 0)."
    - "No Keepaway HUD mod-icon, carrier waypoint, or radar tracking (presentation entirely missing)."
    - "No pickup/drop/respawn/touch sounds, no respawn/spark particles, no center/info notifications."
    - "Possession damage/force matrix and carrier highspeed multiplier are dead/missing — combat plays like plain DM."
