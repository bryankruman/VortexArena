unit: monster-spider
category: monster
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 17
  worst_gaps:
    - "No monster client frame animation: the DPM frame-group map (mr_anim: walk/run/shoot/melee/pain1-2/die1-2/idle) is still not driven for monsters. The Wave-2 CsqcModelAppearance/CsqcModelEffectFlags are PLAYER-model appearance (force-model/colors/glow/death-fade) — they do NOT consume the server's MonsterAnim phase. MonsterAI.cs:1058-1059 still explicitly defers CSQC monster frame playback, so the spider renders static (no visible walk/bite/web/pain/die animation). Shared monster-presentation gap, all five monsters."
    - "Spider mr_pain/mr_death specialisation absent: QC picks random pain1/pain2 (pain_finished = animstate_endtime) and random die1/die2; the port still uses the generic MarkPain (fixed 0.34s window, generic Pain phase) and generic MarkDead (generic Death phase). Decoupled from the (unported) anim length."
    - "Pain/death/melee/sight/idle/spawn voice cues are port-invented: the Base spider has NO .sounds file (verified: only golem.dpm_0.sounds and zombie.dpm_0.sounds exist, no spider.dpm_*.sounds), so QC Monster_Sound resolves sample=\"\" and sound7 plays an EMPTY sample (silence) for these cues. The port's MonsterSound hardcodes monsters/spider_<cue>.wav whenever the def has a model, so it emits voice sounds the Base spider is silent for. Faithful in throttle/gate/structure to Monster_Sound, divergent in the actual cue source."
    - "Player-wielded SpiderAttack weapon (impulse 9, IS_PLAYER path: attack_range 60, weapon_prepareattack, Monster_FindTarget) still unported — reachable only via MON_FLAG_RIDE monster-riding (no riding mode) or dev tooling; low gameplay impact."
