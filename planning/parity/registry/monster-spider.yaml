unit: monster-spider
category: monster
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 17
  worst_gaps:
    - "Webbed status does NOT slow a hit PLAYER: the spiderweb PlayerPhysics_UpdateStats hook (STAT(MOVEVARS_HIGHSPEED) *= 0.5 while webbed) is not ported (no Webbed read anywhere in PlayerPhysics.cs), so the spider's signature crowd-control has no effect on players."
    - "Web projectile renders with the WRONG visual: QC nets it as CSQCProjectile PROJECTILE_ELECTRO (ebomb orb model + TR_NEXUIZPLASMA plasma trail + electro_fly LOOP sound). Port spawns it as a Bounce projectile with NetName='spider'/ClassName='monster_projectile' which ProjectileCatalog.Resolve maps to the GENERIC fallback (no electro orb, no plasma trail, no electro_fly loop) — not invisible, but wrong."
    - "Web explosion emits no EFFECT_ELECTRO_IMPACT particle: QC M_Spider_Attack_Web_Explode fires Send_Effect(EFFECT_ELECTRO_IMPACT); the port onExplode lambda omits it (the ELECTRO_IMPACT effect id IS registered + reachable — Electro/Arc use it)."
    - "No monster client frame animation: the DPM frame-group map (mr_anim: walk/run/shoot/melee/pain1-2/die1-2/idle) is not driven for monsters — no client anim decider consumes the server's logical MonsterAnim phase, so the spider renders static (does not visibly walk/bite/web/pain/die-animate). Shared monster-presentation gap."
    - "Spider mr_pain/mr_death specialisation absent: QC picks a random pain1/pain2 (with pain_finished = animstate_endtime) and random die1/die2; the port uses the generic MarkPain (fixed 0.34s pain window, generic Pain phase) and generic MarkDead (generic Death phase). Decoupled from the (unported) anim length."
