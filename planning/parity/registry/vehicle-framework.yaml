last_audited: "2026-06-22"
# Re-audited adversarially after Wave 5 (HEAD 023ba70). CORRECTION to the prior note: Wave 5 DID touch vehicle
# files — git diff 2eea096..HEAD shows real changes in VehicleCommon.cs (+vehic.GtEventHeal = HealVehicle at
# spawn) and Bumblebee.cs (pilot-side 0..100 stat mirror + aux-lock target), plus a NEW live client feeder
# NetGame.UpdateVehicleHud (NetGame.cs:2949, called every frame from the host HUD path at :2323). TWO baseline
# gaps genuinely closed this pass:
#   (1) combat.heal dead->live: SpawnVehicle now installs vehic.GtEventHeal = HealVehicle (VehicleCommon.cs:379);
#       the generic Combat.Heal dispatch (DamageContracts.Heal -> target.GtEventHeal) is invoked LIVE from the Arc
#       heal-beam's non-player friendly branch (Arc.cs:333) — a friendly Arc beam onto a damaged vehicle now tops
#       up its health (limit fallback to max_health, dead/at-limit refusal, owner % mirror). Sink is reachable.
#   (2) presentation.hud_camera_xhair dead->live (partial): UpdateVehicleHud feeds the VehicleHud panel every
#       frame on the host path — ConfigureForVehicle (art set), the 0..100 stat mirror -> bars/icons, and the
#       homing-lock target -> SetAuxiliaryXhairLock. Racer+Bumblebee mirror all stats onto the pilot; Raptor/
#       Spiderbot mirror only health (via RegenResource), so their HUD shows correct health but stale shield/
#       energy/ammo. The cockpit/chase camera (SVC_SETVIEWPORT) and the low-health alarm remain dead.
# Also closes the spawn.respawn event_heal sub-gap (event_heal now installed). 0 regressions. Everything else
# re-verified STILL OPEN against Base: steal default=1 (vehicles.cfg:5 + sv_vehicles.qh:11), locktarget IS_VEHICLE/
# IS_TURRET+alpha gate (VehiclePhysicsHelpers.cs:285 still only SameTeam+IsDead), projectile_damage (no
# GtEventDamage on the projectile), SetReturn-from-Exit (no match in VehicleBoarding), init drop-to-floor/
# delayspawn/targetname (none in VehicleSpawnFuncs), W2MODE owner-mirror (never written).
summary:
  feature_count: 21
  worst_gaps:
    - "g_vehicles_steal (Base default ON, vehicles.cfg g_vehicles_steal 1 + sv_vehicles.qh:11 default true) is STILL unported: a different-team player cannot board; only the refuse path exists (VehicleBoarding.cs:212 falls back to g_vehicles_steal=0). Untouched by Wave 5."
    - "vehicles_locktarget validity gate is STILL incomplete: the homing lock can still acquire a player/any-live-entity because the IS_VEHICLE||IS_TURRET and alpha<=0.5 rejections present in QC are still missing (VehiclePhysicsHelpers.cs:285 checks only SameTeam+IsDead). The :284 comment claims it but the code does not implement it."
    - "In-vehicle cockpit/chase camera remains dead and the low-health alarm never plays: no client reads p.Vehicle to apply SVC_SETVIEWPORT (vehicle_viewport), and SND_VEH_ALARM is never triggered. (The HUD panel itself is now LIVE — see hud_camera_xhair.)"
    - "An abandoned LIVING vehicle is STILL never returned: SetReturn is only called from the death tail of DamageVehicle, never from vehicles_exit (grep: no SetReturn in VehicleBoarding). The destroyed-vehicle return SCHEDULE is live; the living-vehicle return + the WP_Vehicle return waypoint are missing."
    - "vehicles_projectile_damage (shootable vehicle-projectile event_damage) is STILL not ported: SpawnProjectile sets TakeDamage=Aim when health>0 (VehicleCommon.cs:610) but installs no GtEventDamage, so a shootable vehicle projectile cannot be shot down."
    - "init.initialize STILL omits the drop-to-floor downward tracebox, delayspawn jitter, and the targetname/ACTIVE map-scripted controller (VehicleSpawnFuncs untouched on those)."
    - "Raptor/Spiderbot in-vehicle HUD shows only correct HEALTH: they mirror health onto the pilot (RegenResource -> Owner.VehicleHealth) but do not set player.VehicleShield/Energy/Ammo1/2, so those bars read stale/zero. Racer + Bumblebee mirror all five stats. (HUD itself live.)"
  fixes_landed_wave5:
    - "combat.heal dead->live: SpawnVehicle installs vehic.GtEventHeal = HealVehicle (VehicleCommon.cs:379); the generic Combat.Heal dispatch reaches it from the live Arc heal-beam non-player branch (Arc.cs:333), so a friendly Arc beam onto a damaged vehicle now genuinely tops up its health."
    - "presentation.hud_camera_xhair dead->live (partial): NetGame.UpdateVehicleHud (NetGame.cs:2949) is called every frame on the host HUD path (NetGame.cs:2323) — it calls ConfigureForVehicle, mirrors the 0..100 vehicle stats onto the panel, and projects the homing-lock target into an aux lock crosshair. The VehicleHud panel fully draws (silhouette/bars/icons/aux xhair). Cockpit camera + alarm still dead."
    - "spawn.respawn event_heal sub-gap closed: vehic.event_heal (GtEventHeal) is now installed at spawn (was the one remaining unmatched constant on that row)."
