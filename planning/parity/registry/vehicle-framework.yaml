unit: vehicle-framework
category: vehicle
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
# Re-audited adversarially after Wave 7 (HEAD 8cb57e3). Wave 7 made SUBSTANTIAL changes to every vehicle file
# (git diff dfcab20..HEAD: VehicleSpawnFuncs +25, VehicleBoarding +29, VehiclePhysicsHelpers +34, Racer +127,
# Spiderbot +36, Raptor +7, Bumblebee +61, VehicleCommon +10, NetGame +73). SIX baseline gaps genuinely closed
# this pass — 0 regressions:
#   (1) enter.steal partial->faithful + dead->live: the teamplay enemy-board branch is now ported
#       (VehicleBoarding.cs:212-225) — a different-team player CAN now board a team vehicle when g_vehicles_steal
#       is on (default 1), zeroing the shield, backing up old_vehicle_flags, and stripping VHF_SHIELDREGEN
#       (restored on exit by ExitVehicle:297). Only the WP_VehicleIntruder waypoint + steal centerprints remain
#       (CSQC/notify). This was the #1 worst-gap.
#   (2) aim.locktarget logic partial->faithful: the target-validity gate now matches QC bit-for-bit
#       (VehiclePhysicsHelpers.cs:288-291 + the new IsVehicleOrTurret helper :354) — the homing lock now rejects
#       same-team / dead / non-(IS_VEHICLE||IS_TURRET) / near-invisible (alpha<=0.5 && !=0) targets, so it can no
#       longer acquire a player or any other live entity. This was the #2 worst-gap.
#   (3) exit.handshake: VehicleCommon.SetReturn(vehicle) is now called from VehicleBoarding.Exit (:307) — an
#       abandoned LIVING vehicle is now scheduled to return.
#   (4) respawn.return_waypoint logic/values/timing partial->faithful, liveness partial->live: the living-vehicle
#       return is now wired (Exit->SetReturn) AND the return-delay constant now matches Base exactly
#       (respawntime-5 dead / respawntime-1 alive, VehicleCommon.cs:829). Only the WP_Vehicle return waypoint
#       (CSQC radar icon) remains deferred.
#   (5) init.initialize: the drop-to-floor downward tracebox is now ported (VehicleSpawnFuncs.cs:56-69, the QC
#       origin+'0 0 100' down 10000 MOVE_WORLDONLY box trace, updating both live origin AND SpawnPos). delayspawn
#       jitter, the targetname/ACTIVE controller, and the g_vehicles_teams clear-branch remain missing, so the
#       dimensions stay partial.
#   (6) combat.regen + presentation.hud_camera_xhair: Raptor AND Spiderbot now mirror the FULL stat set onto the
#       pilot (Raptor.cs:264-265 shield+energy; Spiderbot.cs:276-277 shield+ammo1), so all four vehicles' in-veh
#       HUD now shows correct shield/energy/ammo — the "Raptor/Spiderbot show only health" gap is closed.
# STILL OPEN against Base (re-verified): projectile_damage (no GtEventDamage on the shootable projectile,
# VehicleCommon.cs:608-612 — Base sets proj.event_damage=vehicles_projectile_damage at :255), W2MODE owner-mirror
# (never written; grep), the in-vehicle cockpit/chase camera (no SVC_SETVIEWPORT client reader), the framework
# low-health/shield HUD alarm (SND_VEH_ALARM, cl_vehicles.qc:230-264, default cl_vehicles_alarm 0 — unfed),
# delayspawn/controller/teams-clear init branches, the steal/return CSQC waypoints, and the painframe smoke.
summary:
  feature_count: 21
  worst_gaps:
    - "vehicles_projectile_damage (shootable vehicle-projectile event_damage) is STILL not ported: SpawnProjectile sets TakeDamage=Aim + Health when health>0 (VehicleCommon.cs:608-612) but installs no GtEventDamage, whereas Base sets proj.event_damage=vehicles_projectile_damage (sv_vehicles.qc:255) — so a shootable vehicle projectile cannot be shot down."
    - "In-vehicle cockpit/chase camera remains dead: no client reads p.Vehicle to apply SVC_SETVIEWPORT (vehicle_viewport), so the pilot keeps the normal player view. The framework low-health/shield HUD alarm (SND_VEH_ALARM / SND_VEH_ALARM_SHIELD, cl_vehicles.qc, gated cl_vehicles_alarm default 0) is also still unfed. (The HUD panel + aux crosshair are LIVE; the Raptor's separate incoming-missile alarm is live.)"
    - "VEHICLESTAT_W2MODE is STILL never mirrored to the owner: descriptors only write vehicle.VehW2Mode (grep), there is no owner.VehW2Mode = step. Harmless — the live VehicleHud does not read W2Mode."
    - "init.initialize STILL omits delayspawn jitter, the targetname/ACTIVE map-scripted controller (vehicle_use), and the g_vehicles_teams clear-branch (sv_vehicles.qc:1203-1204). (The drop-to-floor tracebox IS now ported.)"
    - "Presentation deferrals persist (all CSQC): steal WP_VehicleIntruder waypoint + steal centerprints, the WP_Vehicle return-waypoint/radar icon, the painframe EFFECT_SMOKE_SMALL, the vehicle_shieldent hit flash, and the death gibs (vehicle_tossgib / vehicles_gib_*)."
  fixes_landed_wave7:
    - "enter.steal partial->faithful + dead->live: the teamplay enemy-board branch is ported (VehicleBoarding.cs:212-225) — shield zero, old_vehicle_flags backup, ~VHF_SHIELDREGEN (restored on exit), default g_vehicles_steal 1. Only the CSQC steal waypoint/centerprints remain."
    - "aim.locktarget logic partial->faithful: the validity gate now rejects same-team/dead/non-(vehicle||turret)/near-invisible targets (VehiclePhysicsHelpers.cs:288-291 + IsVehicleOrTurret:354), bit-faithful to sv_vehicles.qc:120-125."
    - "respawn.return_waypoint partial->faithful (logic/values/timing) + partial->live: the abandoned-living return is now called from Exit->SetReturn (VehicleBoarding.cs:307) and the return delay constant now matches Base (respawntime-5 dead / -1 alive). WP_Vehicle radar waypoint still CSQC-deferred."
    - "init.initialize: drop-to-floor tracebox now ported (VehicleSpawnFuncs.cs:56-69), settling a loosely-placed vehicle onto the floor and persisting the dropped position as the return point."
    - "combat.regen + hud_camera_xhair: Raptor (shield+energy) and Spiderbot (shield+ammo1) now mirror the full stat set onto the pilot — all four vehicles' in-vehicle HUD shows correct shield/energy/ammo."
