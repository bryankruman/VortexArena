unit: vehicle-framework
category: vehicle
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 21
  worst_gaps:
    - "vehicles_damage is DEAD on the live path: DamageVehicle has NO caller except a unit test — no vehicle entity installs a damage handler (GtEventDamage is never set), so DamageSystem.EventDamage falls through to PlayerDamage and a shot vehicle takes ARMOR/HEALTH-split PLAYER damage with no per-weapon damagerate, no shield-then-health split, no force-scale, and no death-eject/respawn. The whole vehicles_damage rule set is dead in a real match."
    - "vehicles_heal framework helper is NOT ported: no shared heal function, no .event_heal, and no owner vehicle_health percentage mirror — only the Bumblebee healray does its OWN inline GiveResourceWithLimit; func_heal / heal nades cannot heal a vehicle."
    - "In-vehicle HUD + aux lock crosshairs + cockpit/chase camera are all dead: VehicleHud is registered but nothing on the live path feeds it (TE_CSQC_VEHICLESETUP / VEHICLESTAT_* / SVC_SETVIEWPORT networking unwired); the VEHICLESTAT_W2MODE owner-mirror is also never written — a pilot has no vehicle HUD and no cockpit view."
    - "vehicles_touch crush damage (crush_dmg 70 / minspeed 100) is NOT implemented: vehicles never run players or monsters over."
    - "vehicles_impact fall/collision self-damage (DEATH_FALL) is NOT implemented: vehicles take no landing or ramming damage."
    - "vehicles_painframe is NOT implemented: no low-health smoke and no VHF_DMGSHAKE/DMGROLL/DMGHEADROLL jitter — vehicles show no damage state."
    - "vehicles_setreturn / vehicles_showwp is NOT implemented: no WP_Vehicle return waypoint and an abandoned LIVING vehicle is never returned to its spawn."
    - "vehicle_use targetname controller + ACTIVE gating + delayspawn jitter + drop-to-floor from vehicle_initialize is NOT implemented: map-scripted vehicle activation is absent."
    - "VehicleInit and VehicleTouch mutator hooks are defined but never dispatched (.Call) — a mutator cannot abort vehicle init or suppress a vehicle touch."
