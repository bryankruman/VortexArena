summary:
  feature_count: 21
  worst_gaps:
    - "vehicles_painframe is STILL DEAD: the body (low-health smoke + VHF_DMGSHAKE/DMGROLL/DMGHEADROLL jitter) was ported to VehicleCommon.PainFrame but has ZERO callers — no descriptor Think invokes it (grep PainFrame( = only the definition). A damaged vehicle still neither smokes nor shudders."
    - "In-vehicle HUD + aux lock crosshairs + cockpit/chase camera remain dead: VehicleHud has no live feeder (ConfigureForVehicle / SetAuxiliaryXhair have no caller), TE_CSQC_VEHICLESETUP / VEHICLESTAT_* / SVC_SETVIEWPORT networking is still unwired, and the VEHICLESTAT_W2MODE owner-mirror is still never written. A pilot has no vehicle HUD and no cockpit view."
    - "g_vehicles_steal (Base default ON) is STILL unported: a different-team player cannot board; only the refuse path exists. Untouched by Wave-1/2."
    - "vehicles_locktarget validity gate is STILL incomplete: the homing lock can still acquire a player/any-live-entity because the IS_VEHICLE||IS_TURRET and alpha<=0.5 rejections present in QC are still missing (VehiclePhysicsHelpers untouched)."
    - "init.initialize: drop-to-floor tracebox, delayspawn jitter, targetname/ACTIVE controller, and the VehicleInit mutator hook are STILL missing — InitVehicle() was added but has ZERO callers (VehicleSpawnFuncs untouched), so the VehicleInit abort hook is still dead."
    - "NEW PARTIAL DEFECT — Spiderbot.Spawn sets `vehicle.Touch = null` AFTER SpawnVehicle installs the crush/touch handler, nulling it; Base spiderbot vr_spawn does NOT reset touch (settouch func_null is only in vr_death). So the ground walker most likely to run a player over never crushes."
    - "NEW PARTIAL DEFECT — vehicles_impact is wired live only for the Racer (it snapshots .oldvelocity in its Think); the Raptor has a vr_impact override (1/4/1000) but its Think never snapshots OldVelocity, so its ram delta is computed against a stale/zero baseline."
  fixes_landed_wave12:
    - "combat.damage is now LIVE: SpawnVehicle installs vehic.GtEventDamage = EventDamage and DamageSystem.EventDamage routes a non-player victim with a GtEventDamage to it, so DamageVehicle (per-weapon rate / shield-then-health / force / death-eject + SetReturn) runs on the real damage path."
    - "combat.regen owner-% mirror now LIVE for the health pool (RegenResource writes owner.VehicleHealth)."
    - "combat.crush is implemented + installed live (Touch/Crushable via SpawnVehicle, dispatched by MoveTypePhysics.PushEntity) for Racer/Raptor/Bumblebee (NOT Spiderbot — see defect)."
    - "hooks: VehicleTouch is now dispatched live (FireVehicleTouch from VehicleCommon.Touch). VehicleInit is still dead."
