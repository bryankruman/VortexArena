summary:
  feature_count: 15
  worst_gaps:
    - "No turret networking: none of the TNSF_* send/parse / CSQC turret edict exists (port runs turrets directly in the shared sim) — so all the visible/audible turret feedback is server-side temp-entity/point-particle emit, not a turret edict sync."
    - "Client presentation PARTIAL: muzzle flashes/tracers/beams/projectile trails/head-frame anims + death FX (Wave-8e/Wave-7) AND the framework-wide low-HP spark + SMOKE_LARGE/SMOKE_SMALL tiers (now via TurretAI.DrawFx, FIXED 06-25) are emitted server-side; still missing the tur_head MODEL rotation render, the draw2d waypoint sprite/healthbar, the changeteam team recolor, and the client gib toss (all need a CSQC turret edict)."
    - "Per-unit cvar table unported (load_unit_settings / TR_PROPS_COMMON / turret_scale_* / turret_initparams clamping / dumpturrets / turrets_manager_think reloadcvars) — per-unit balance is hardcoded C# const, mappers can't retune. (Framework-level g_turrets_* cvars ARE read live; per-unit g_turrets_unit_<name>_<field> are not.)"
    - "turret_targettrigger (RECIEVETARGETS externally-fed targets, 0.5s debounce) is the only acquisition path still absent: the AddTarget reception hook now EXISTS on the turrets (HkTurret) but the turret_targettrigger map entity is not registered, so the hook is dead. (The turret_checkpoint/walker_checkpoint waypoint chains AND the turret_findtarget defendpoint wiring are now ported + live.)"
    - "turret_heal / event_heal (repairable turrets) not ported — port turrets cannot be healed. (Death two-step turret_hide 0.2s + respawntime-0.2 IS now ported, FIXED 06-25; round-restart .reset hook IS now wired + live, FIXED 06-25.)"
    - "Per-shot firecheck LOS + TEAMCHECK branches not modeled — but Base itself marks TFL_FIRECHECK_LOS/TEAMCECK as un-implemented (the '-' rows in the firecheck legend), so the port matches Base; acquisition-time LOS/team gating is the only LOS/team test in both."
