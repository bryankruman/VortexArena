summary:
  feature_count: 14
  worst_gaps:
    - "TurretAI.Damage (inactive-immunity + friendly-fire gate + MOVE knockback shove + retaliate) is DEAD: no live caller — DamageSystem.EventDamage routes a non-player target through targ.GtEventDamage (DamageSystem.cs:294), but turrets never set GtEventDamage, so their damage falls through to PlayerDamage/PlayerCorpseDamage and the gate never runs."
    - "No client presentation at all: cl_turrets.qc unported (no head model/rotation, team recolor, low-HP sparks, death rocket+gib FX, waypoint sprite/healthbar)."
    - "No turret networking: none of the TNSF_* send/parse / CSQC turret edict exists."
    - "Per-unit cvar table unported (load_unit_settings / TR_PROPS_COMMON / turret_scale_* / turret_initparams clamping / dumpturrets) — balance is hardcoded C# const, mappers can't retune, value drift uncaught."
    - "g_turrets_targetscan_maxdelay hardcoded 0.6 vs Base 1 — every turret rescans targets too often."
    - "g_turrets_nofire master fire-disable + TurretFire/Turret_CheckFire mutator hooks not modeled."
    - "Waypoint path entities unported: turret_checkpoint/walker_checkpoint chains + turret_targettrigger (RECIEVETARGETS)."
    - "Death two-step (turret_hide 0.2s + respawntime-0.2), turret_heal, and HEADSHAKE damage-jitter not ported."
