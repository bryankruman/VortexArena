summary:
  feature_count: 17
  worst_gaps:
    - "Beam is STILL not charge-scaled (sqrt(charge) alpha/fade/trail-spacing): a barely-charged shot and a full shot look identical. The team-color tint (vortex_glowcolor) and the cl_particles_oldvortexbeam legacy-beam switch are BOTH ported (EmitBeam in Vortex.cs), but the effect-emission path carries no per-emission alpha (no EffectRequest.Alpha field exists), so the sqrt(charge) brightness modulation has no port-side hook. THIS IS NOW THE ONLY remaining defect on the unit's presentation."
  notable_fixes_this_audit:
    - "RE-AUDIT 2026-06-28 (waves wave) CLOSED the cross-client charge delivery on weapon-vortex.hud.charge_ring (liveness partial -> live): the W16 producer is no longer dead-on-arrival. ClientNet.HandleSnapshot now READS the owner block PressedKeys short (ClientNet.cs:1023) AND the 9 ring floats via OwnerWeaponRings.Read (ClientNet.cs:1055) in lockstep with ServerNet.WriteOwnerState's symmetric OwnerWeaponRings.Write (ServerNet.cs:2818-2831). NetGame.UpdateCrosshairWeaponRings's pure-client branch (NetGame.cs:3394-3403) now feeds the panel from _client.LocalWeaponRings, and a spectatee branch (NetGame.cs:3375-3388) feeds it from the per-player WepentView. Wire layout is a single Write/Read struct, test-guarded (OwnerWeaponRingsTests, WepentViewStateTests). The prior wire-misalignment + dead-on-arrival baseline is STALE — a pure remote client now draws the charge ring."
    - "RE-AUDIT 2026-06-28 (waves wave) CLOSED the exterior-carrier glow + cross-client glow on weapon-vortex.fx.charge_glow (logic partial -> faithful, liveness partial -> live): the EXTERIOR carrier-weapon charge glow is now ported (ViewEntityRenderer.UpdateChargeGlow, ViewEntityRenderer.cs:177-217) as a per-instance StandardMaterial3D emission override driven by Entity.WepentView.VortexCharge off the LIVE entity feed (live-called from ViewEntityRenderer.Update:162-163 <- ClientEntityView.Update:217/227). So EVERY observer now sees the carrier brighten with charge — the QC wr_glow -> weaponentity_glowmod behaviour the baseline said was first-person-only. The first-person view-model glow also now reads the networked WepentView.VortexCharge for a pure-client / spectatee (NetGame.cs:1856-1862), so it lights on a remote client too. vortex_glowcolor ramp duplicated bit-faithfully (ViewEntityRenderer.VortexGlowColor == NetGame.VortexGlowColor). Both baseline gaps (first-person-only target, host-only charge) are STALE."
    - "RE-AUDIT 2026-06-27 CLOSED weapon-vortex.charge.rot_decay (missing/na -> faithful/live): the per-frame charge-DECAY loop is now a faithful, live host-path port. Vortex.RotCharge (Vortex.cs:269-285) decays VortexCharge down toward charge_limit (equipped) / charge_rot_unequipped_limit (stowed), dt-scaled by frametime/W_TICSPERFRAME, gated by the rot pause (VortexChargeRotTime, previously a dead write — now consumed); all four rot cvars read with correct Base-0 defaults (Vortex.cs:106-109). Live-called once/frame from GameWorld.cs:2501-2505 (player-postthink, after WeaponThink). Stock-inert (rot_rate 0) but mechanically complete. Baseline 'no decay consumer / rot cvars never read / port_refs []' is now STALE."
    - "RE-AUDIT 2026-06-27 CLOSED the charge_always gap on weapon-vortex.charge.regen_passive (gap -> []): Vortex.ChargeAlwaysRegen (Vortex.cs:293-297) now re-implements QC's always-on PlayerPreThink regen (full frametime), live-called for the held vortex from GameWorld.cs:2490-2495 BEFORE WeaponThink, matching QC order. WrThink's `if (!Cvars.ChargeAlways)` gate hands off cleanly. Stock charge_always 0 so inert, but the previously-flagged 'with charge_always 1 the port never charges' divergence is closed."
    - "RE-AUDIT 2026-06-27 confirmed-not-fixed weapon-vortex.hud.charge_ring stays partial-live: W16's ServerNet ResolveOwnerWeaponRings producer (ServerNet.cs:2773-2780) is DEAD-ON-ARRIVAL — ClientNet.HandleSnapshot never reads the 9 ring floats (nor the W16 PressedKeys short), so the snapshot owner block is wire-misaligned and the pure-client charge ring still never draws. Recorded as a residual gap on the row; the wire-alignment bug itself belongs to net-entity-state. fx.charge_glow line refs refreshed (NetGame.cs:1815/1857/1739)."
