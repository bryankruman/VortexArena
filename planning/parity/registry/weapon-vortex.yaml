summary:
  feature_count: 17
  worst_gaps:
    - "Beam is STILL not charge-scaled (sqrt(charge) alpha/fade/trail-spacing): a barely-charged shot and a full shot look identical. The team-color tint (vortex_glowcolor) and the cl_particles_oldvortexbeam legacy-beam switch are BOTH ported (EmitBeam in Vortex.cs), but EffectRequest carries no per-emission alpha so the sqrt(charge) brightness modulation has no port-side hook."
    - "Cross-client charge delivery is still broken: vortex_charge is read only on the listen-server HOST path (NetGame.UpdateCrosshairWeaponRings + UpdateViewModelTeamGlow read LocalServerPlayer's slot state) for the HUD ring AND the view-model glow. W16 added a server-side producer (ServerNet.ResolveOwnerWeaponRings writes vortex_charge/chargepool into the owner block), but ClientNet.HandleSnapshot has NO matching reader — the value is dead-on-arrival, so a PURE remote client still has no charge ring/glow, and the unread owner-block fields (9 ring floats + PressedKeys short) leave the wire MISALIGNED (a net-entity-state concern, flagged below)."
    - "Charge glow targets the FIRST-PERSON view model (the local player's own gun), not the EXTERIOR carrier/player model QC's wr_glow brightens for other players to see. The local player's gun brightens with charge (host path), but a remote observer still sees the carrier identical regardless of charge."
  notable_fixes_this_audit:
    - "RE-AUDIT 2026-06-27 CLOSED weapon-vortex.charge.rot_decay (missing/na -> faithful/live): the per-frame charge-DECAY loop is now a faithful, live host-path port. Vortex.RotCharge (Vortex.cs:269-285) decays VortexCharge down toward charge_limit (equipped) / charge_rot_unequipped_limit (stowed), dt-scaled by frametime/W_TICSPERFRAME, gated by the rot pause (VortexChargeRotTime, previously a dead write — now consumed); all four rot cvars read with correct Base-0 defaults (Vortex.cs:106-109). Live-called once/frame from GameWorld.cs:2501-2505 (player-postthink, after WeaponThink). Stock-inert (rot_rate 0) but mechanically complete. Baseline 'no decay consumer / rot cvars never read / port_refs []' is now STALE."
    - "RE-AUDIT 2026-06-27 CLOSED the charge_always gap on weapon-vortex.charge.regen_passive (gap -> []): Vortex.ChargeAlwaysRegen (Vortex.cs:293-297) now re-implements QC's always-on PlayerPreThink regen (full frametime), live-called for the held vortex from GameWorld.cs:2490-2495 BEFORE WeaponThink, matching QC order. WrThink's `if (!Cvars.ChargeAlways)` gate hands off cleanly. Stock charge_always 0 so inert, but the previously-flagged 'with charge_always 1 the port never charges' divergence is closed."
    - "RE-AUDIT 2026-06-27 confirmed-not-fixed weapon-vortex.hud.charge_ring stays partial-live: W16's ServerNet ResolveOwnerWeaponRings producer (ServerNet.cs:2773-2780) is DEAD-ON-ARRIVAL — ClientNet.HandleSnapshot never reads the 9 ring floats (nor the W16 PressedKeys short), so the snapshot owner block is wire-misaligned and the pure-client charge ring still never draws. Recorded as a residual gap on the row; the wire-alignment bug itself belongs to net-entity-state. fx.charge_glow line refs refreshed (NetGame.cs:1815/1857/1739)."
