last_audited: "2026-06-27"
summary:
  feature_count: 17
  worst_gaps:
    - "Beam is STILL not charge-scaled (sqrt(charge) alpha/fade/trail-spacing): a barely-charged shot and a full shot look identical. The team-color tint (vortex_glowcolor) and the cl_particles_oldvortexbeam legacy-beam switch are now BOTH ported (EmitBeam in Vortex.cs), but EffectRequest carries no per-emission alpha so the sqrt(charge) brightness modulation has no port-side hook."
    - "Charge ring + view-model charge glow still partly blocked: vortex_charge is read only on the listen-server HOST path (NetGame reads LocalServerPlayer's slot state for both the HUD ring AND the new view-model glow); a PURE remote client has no charge stat. The beam team-tint is computed server-side from the firer's charge+team so it broadcasts to all clients, but the per-recipient cl_tracers_teamcolor nuance is collapsed to a single broadcast emit."
    - "Charge glow targets the FIRST-PERSON view model (the local player's own gun), not the EXTERIOR carrier/player model QC's wr_glow brightens for other players to see. The local player's gun now brightens with charge (host path), but a remote observer still sees the carrier identical regardless of charge."
  notable_fixes_this_audit:
    - "FIXED weapon-vortex.fx.charge_glow (missing -> partial / dead -> partial-live): a charge-driven wr_glow port now EXISTS and is LIVE on the host path. NetGame.UpdateViewModelTeamGlow (NetGame.cs:1734-1768, called every frame from EquipNetworkedWeapon NetGame.cs:1687) reads the local player's VortexCharge (max(0.25,charge)), runs a port of vortex_glowcolor (NetGame.VortexGlowColor NetGame.cs:1773 — f*color*0.3 below animlimit 0.5, +f*color*0.7 above) and pushes it to the first-person view model via SetTeamGlow, with the '0 0 0' -> team-color fallback. Baseline recorded this row as fully missing with empty port_refs; that is now stale. Residual gaps: (1) applied to the first-person VIEW model, not the exterior player/carrier model other players see; (2) host-only (no cross-client charge stat). Reclassified from missing/na to partial/partial-live."
