summary:
  feature_count: 16
  worst_gaps:
    - "Beam is STILL not charge-scaled (sqrt(charge) alpha/fade/trail-spacing): a barely-charged shot and a full shot look identical. The team-color tint (vortex_glowcolor) and the cl_particles_oldvortexbeam legacy-beam switch are now BOTH ported (EmitBeam in Vortex.cs), but EffectRequest carries no per-emission alpha so the sqrt(charge) brightness modulation has no port-side hook."
    - "Charge ring + beam tint still partly blocked: vortex_charge is networked to the local HUD only on the listen-server HOST path (NetGame.UpdateCrosshairWeaponRings reads LocalServerPlayer's slot state); a PURE remote client has no charge stat. The beam team-tint is now computed server-side from the firer's charge+team so it broadcasts to all clients, but the per-recipient cl_tracers_teamcolor nuance is collapsed to a single broadcast emit."
    - "Player-model charge glow (wr_glow / vortex_glowcolor) STILL not ported — VortexGlowColor exists in Vortex.cs but is only consumed by the beam tint; no player-model glow feeder. Carrier model does not brighten as charge builds."
  notable_fixes_this_audit:
    - "FIXED weapon-vortex.attack.railgun_pierce (audio partial -> faithful): the nexwhoosh beam fly-by sound is now fully implemented in FireRailgunBullet (WeaponFiring.cs:492-517). It iterates every real client (skipping the shooter and bots), computes the nearest point on the beam to each (start + dir*bound(0,(it.origin-start)*dir,length)), and plays a random nexwhoosh sample (NexWhooshSample -> SoundVariantGroups.NexWhoosh, SND_NEXWHOOSH_RANDOM) via Api.Sound.PlayAt at that point with VOL_BASEVOICE / ATTEN_IDLE on CH_SHOTS — bit-faithful to QC tracing.qc:293-312. The previously-recorded 'whoosh still deferred' gap and its `fail` verification are now stale. ONLY nuance not reproduced: the QC `IS_SPEC(it) && it.enemy == this` (don't whoosh a spectator following the shooter) skip, because spectator-follow data isn't available in the Common layer."
