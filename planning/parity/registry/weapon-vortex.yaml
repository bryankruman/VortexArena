  notable_fixes_this_audit:
    - "FIXED weapon-vortex.achievements: yoda (mid-air rail kill) + impressive (every-other cross-team hit) are now genuinely implemented and LIVE (Vortex.Announce, called from Attack on the WrThink path). flying captured before the trace; per-actor vortex_lasthit tracked in a ConditionalWeakTable; team/player/airborne gating faithful to QC vortex.qc:141-162 + damage.qc:646-651."
    - "FIXED weapon-vortex.attack.overcharge_sound audio: the overcharge zap now plays at the charge-proportional VOL_BASE*(charge-0.5*animlimit)/(1-0.5*animlimit) volume (VOL_BASE=0.7), matching QC vortex.qc:139 — was a flat-volume defect."
