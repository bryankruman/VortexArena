summary:
  feature_count: 14
  worst_gaps:
    - "Charge ring on the crosshair is DEAD: the HUD render path exists and is correct, but CrosshairPanel.ChargeFraction/ChargePool have ZERO writers in the repo (verified: only match is the unrelated _useChargePool field) and vortex_charge is server-only state, never networked — so the player gets NO on-screen feedback while charging (the core skill mechanic is invisible)."
    - "Beam is not charge-scaled (sqrt(charge) alpha/spacing) and not team-color-tinted (vortex_glowcolor) — looks identical at every charge level and ignores team colors. (Also blocked by charge not being networked.)"
    - "No yoda (mid-air rail kill) or impressive (consecutive long-range hit) announcements; the cues are registered in NotificationsList but never fired, and FireRailgunBullet never sets the yoda/impressive_hits flags."
    - "Player-model charge glow (wr_glow / vortex_glowcolor) not ported — carrier model does not brighten as charge builds. (Added as weapon-vortex.fx.charge_glow.)"
    - "No nexwhoosh beam fly-by sound to nearby players; overcharge zap sound plays at flat volume (no charge-proportional VOL_BASE ramp)."
