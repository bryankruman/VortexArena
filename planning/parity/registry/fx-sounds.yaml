  - id: fx-sounds.voice.persounds_manifest
    name: "LoadPlayerSounds .sounds manifest parse + per-model/skin reload"
    layer: [shared]
    base_refs:
      - "common/effects/qc/globalsound.qc:LoadPlayerSounds"
      - "common/effects/qc/globalsound.qc:UpdatePlayerSounds"
      - "common/effects/qc/globalsound.qc:ClearPlayerSounds"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Sounds/GameSound.cs:PlayerSoundSample"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:ModelSoundDir"
    constants:
      - { name: "default_path", base: "key->file from sound/player/default.sounds (e.g. pain50 -> sound/player/espeak/player/pain50)", port: "sound/player/default.sounds/<id> (manifest file treated as a dir)", match: false }
      - { name: "model_dir_resolve", base: "get_model_datafilename(model,skin,'sounds') parse", port: "ModelSoundDir always returns null", match: false }
    status:
      logic: missing
      values: missing
      timing: na
      presentation: na
      audio: missing
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The .sounds manifest is never parsed: PlayerSoundSample builds sound/player/default.sounds/<id> by string concat instead of reading the key->file mapping in sound/player/default.sounds (which maps e.g. pain50 -> sound/player/espeak/player/pain50). The result is a path that does not exist on disk, so EVERY PlayerSound/VoiceMessage body sound is silent."
      - "ModelSoundDir() always returns null -> there is no per-model or per-skin sound pack resolution (QC get_model_datafilename + UpdatePlayerSounds reload-on-model-change). Custom-model voices never load."
      - "GlobalSound_pitch model-scale pitch shift (a=1.5 max, b=0.75 min, c=100 std gradient applied when this.scale != 1) is not ported: scaled-model voices don't squeak/deepen; the wire carries a flat pitch byte."
    verification:
      - { kind: code, ref: "PlayerSoundSample(null,id) string-build vs LoadPlayerSounds key->file parse; default.sounds is a FILE not a directory; sound/player/espeak/player/pain50.ogg exists, sound/player/default.sounds/pain50.* does not", result: fail }
      - { kind: code, ref: "no GlobalSound_pitch equivalent; pitch field flat", result: fail }
    confidence: high
    notes: "This is the ROOT CAUSE of the silent body/voice sounds. It is not 'low-impact for stock models' (the draft's claim) — it breaks the STOCK default pack too, because the manifest indirection (key->file) is exactly what makes default sounds resolvable. Footsteps survive only because they are GlobalSounds with a literal base path, not manifest-keyed PlayerSounds."

