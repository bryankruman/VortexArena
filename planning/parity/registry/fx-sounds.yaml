      values: faithful
      timing: na
      presentation: na
      audio: faithful
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "GlobalSound_pitch model-scale pitch shift (a=1.5 max, b=0.75 min, c=100 std gradient applied when this.scale != 1) is still not ported: scaled-model voices don't squeak/deepen; the wire carries a flat pitch byte."
      - "Per-skin fallback chain partially simplified: QC tries skin N, then skin 0; the port resolves a single ModelSoundsFile(model,skin) and the default pack (a missing per-skin manifest falls through to default rather than to skin-0). Negligible for stock models, which ship one pack."
    verification:
      - { kind: code, ref: "PlayerSoundResolver.Resolve: model pack (Lookup(modelSoundsFile,id)) overrides, else default.sounds; ModelSounds.ParseEntries(id/path/variant, //comments skipped, last-wins) matches LoadPlayerSounds tokenize_console; default.sounds on disk maps pain50->sound/player/espeak/player/pain50, taunt->sound/player/espeak/coms/taunt", result: pass }
      - { kind: code, ref: "LIVE: PlayerSoundResolver.Install(_vfs) at NetGame.cs:398 in _Ready when a VFS is mounted (normal listen-server play path) installs Sounds.ModelSoundResolver=Resolve; Sounds.Reset clears it (test-clean). Without a VFS (headless/tests) it falls back to PlayerSoundSampleRaw (the old concat) gracefully.", result: pass }
