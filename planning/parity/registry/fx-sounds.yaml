      - "common/sounds/all.qc:play2team"
      - "common/sounds/all.qc:play2all"
      - "common/sounds/all.qc:spamsound"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Sounds/SoundSystem.cs:PlayGlobal"
      - "src/XonoticGodot.Common/Gameplay/Sounds/SoundSystem.cs:SpamSound"
      - "src/XonoticGodot.Common/Framework/Entity.cs:SpamTime"
    constants:
      - { name: "play2", base: "soundtoat(MSG_ONE, NULL, '0 0 0', CH_INFO, file, VOL_BASE, ATTEN_NONE)", port: "Play2: Api.Sound.Play(recipient, Auto, sample, VolBase, AttenNone)", match: true }
      - { name: "play2team", base: "if(monopoly)return; FOREACH_CLIENT(IS_PLAYER&&IS_REAL_CLIENT&&team==t) play2", port: "Play2Team: monopoly early-return + per-team roster filter -> Play2", match: true }
      - { name: "play2all", base: "if(autocvar_bot_sound_monopoly) return; _sound(NULL,CH_INFO,samp,VOL_BASE,ATTEN_NONE)", port: "PlayGlobal (shared emitter, ATTEN_NONE) — NO monopoly gate", match: false }
      - { name: "spamsound_gate", base: "if(time > e.spamtime){ e.spamtime=time; sound(...) }", port: "SpamSound: if(now > emitter.SpamTime){ SpamTime=now; Play(...) }", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: faithful
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "play2team (Play2Team) is ported but DEAD — zero live callers. Base calls play2team for ONS_CONTROLPOINT_UNDERATTACK / ONS_GENERATOR_UNDERATTACK (sv_onslaught.qc:386/943); the port emits those via PlayGlobal instead (OnslaughtControlPoint.cs:249), a per-team -> global broadcast divergence."
      - "play2all port (PlayGlobal) omits QC play2all's `if(autocvar_bot_sound_monopoly) return;` gate, so global cues still play when bot_sound_monopoly=1."
      - "Many Base play2 call sites remain unwired in the port: weapon UNAVAILABLE (selection.qc/weaponsystem.qc/minelayer.qc), func_door / door_secret noises, keylock/keys, vehicle lock/locking (sv_vehicles.qc:114-139), trigger TALK, target_voicescript. Only TALK2 idle-kick + ONS shield-block are wired."
    verification:
      - { kind: code, ref: "SpamSound/SpamSoundRaw mirror QC spamsound (sound_allowed gate + time>spamtime + set spamtime); Entity.SpamTime added; Play2/Play2Raw/Play2Team/Play2TeamRaw mirror play2/play2team (CH_INFO/VOL_BASE/ATTEN_NONE; play2team monopoly+team filter)", result: pass }
      - { kind: grep, ref: "Play2 LIVE: GameWorld.cs:1867 (idle-kick TALK2), OnslaughtControlPoint.cs:817 (ONS shield-block ONS_DAMAGEBLOCKEDBYSHIELD). spamsound LIVE: NadeProjectile.cs:154 + VehicleCommon.cs:503/512/523. play2all -> PlayGlobal (live, gametype callers). Play2Team: ZERO callers (dead)", result: pass }
      - { kind: code, ref: "PlayGlobal (SoundSystem.cs:288-306) has no bot_sound_monopoly check, unlike QC play2all (all.qc:143-145)", result: fail }
    confidence: high
    notes: "FIX since baseline (Play2 added in commit ff8a699, after the prior audit): play2 is now ported (SoundSystem.Play2 + raw/name overloads) AND live on 2 paths (idle-kick countdown TALK2, ONS shield-block), so logic/values/audio go partial->faithful. play2team is also ported (Play2Team with monopoly+team filter) but DEAD (no caller; ONS underattack cues use PlayGlobal). spamsound + play2all stay live. liveness stays partial: play2team dead + many Base play2 sites unwired. NEW gap: PlayGlobal misses play2all's monopoly gate."

