summary:
  feature_count: 16
  worst_gaps:
    - "Per-model player/voice sample path is BROKEN: PlayerSoundSample builds sound/player/default.sounds/<id> (the manifest file treated as a directory) instead of the manifest-mapped sound/player/espeak/player/<id> -> ALL pain/death/drown/voice body sounds are SILENT on the live path."
    - "client hit-confirmation sound loads misc/hitconfirm (nonexistent) instead of the registered misc/hit -> hitsound silent"
    - "LoadPlayerSounds .sounds manifest parse (key->file mapping) + GlobalSound_pitch model-scale pitch shift not ported -> root cause of the broken body-sound paths"
    - "sound_allowed owner-walk + bot_sound_monopoly gate not implemented (dead cvar; corpse/projectile sounds not re-homed to owner)"
    - "play2 / play2team (per-client / per-team 2D sends) and spamsound rate-limit have no port equivalent"
    - "per-recipient cl_voice_directional / cl_autotaunt reads stubbed to defaults (directional uses ATTEN_MIN; autotaunt roll omitted)"
