  - id: fx-sounds.voice.live_body_callers
    name: "PlayerSound/GlobalSound call sites (footstep/fall/pain/death/jump)"
    layer: [authority]
    base_refs:
      - "common/physics/player.qc:PM_Footsteps"
      - "common/physics/player.qc:PM_check_hitground"
      - "server/player.qc:374"
    port_refs:
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:Footsteps"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:610"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:946"
    constants:
      - { name: "footstep_interval", base: "nextstep = time + 0.3 + random*0.1", port: "now + 0.3 + FootstepJitter (random*0.1, server-local RNG)", match: true }
      - { name: "footstep_speed_gate", base: "vdist > 0.6*sv_maxspeed", port: "0.6*MaxSpeed", match: true }
      - { name: "lastground_window", base: "time < lastground + 0.2", port: "now < LastGroundTime + 0.2", match: true }
      - { name: "nextstep_window", base: "(time > nextstep) || (time < nextstep - 10)", port: "(now > LastFootstepTime) || (now < LastFootstepTime - 10)", match: true }
      - { name: "ducked_landing_vol", base: "VOL_MUFFLED 0.35", port: "VolMuffled 0.35", match: true }
      - { name: "g_footsteps_gate", base: "autocvar_g_footsteps (default 1)", port: "Cvars.GetString('g_footsteps')==0 early-return (unset treated as 1)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: faithful
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Minor: the speed gate uses 2D horizontal velocity (Vec2LenSq) while QC vdist uses 3D velocity — negligible in practice (grounded motion is near-horizontal), but not byte-identical when moving up/down a slope."
    verification:
      - { kind: code, ref: "PlayerPhysics.Footsteps now mirrors PM_Footsteps fully: g_footsteps early-return, IS_DUCKED, lastground+0.2 window, 0.6*maxspeed gate, nextstep (time>nextstep)||(time<nextstep-10) window, nextstep=time+0.3+random*0.1 jitter; PM_check_hitground sets a jittered suppression window + ladder bail", result: pass }
      - { kind: code, ref: "DamageSystem pain/death -> PlayPlayerSound(victim,id,ModelSoundDir(victim)) -> ModelSoundDir = Sounds.ModelSoundsFile(e.Model,(int)e.Skin) -> resolver -> sound/player/espeak/player/<id> (REAL, e.g. pain50.ogg ships)", result: pass }
      - { kind: code, ref: "real files: sound/player/espeak/player/pain50.ogg + jump.ogg + misc/footstep0N.wav all present on disk", result: pass }
    confidence: high
    notes: "FIX (large): at baseline this row was split-audio (footsteps audible, pain/death/drown voice SILENT due to the broken default.sounds path) AND had no footstep jitter and no g_footsteps gate. Wave-1/2 (a) wired the host PlayerSoundResolver so pain/death/drown body voices now resolve to real espeak samples, (b) added the random*0.1 cadence jitter via a dedicated server-local RNG (no Prandom desync), and (c) added the g_footsteps master gate plus the lastground+0.2 and nextstep-window semantics. All five dimensions now faithful. Remaining nit: 2D vs 3D speed gate."

