    confidence: high
    notes: "WAVE-5 FIX (the worst baseline gap, dead->live + logic partial->faithful). InputButtons.Hook (BIT(6)) was added and the whole bind->net->driver->mutator chain wired, so OffhandFirePressed is now produced from real +hook input and the grapple is castable on the live path (instahook ruleset / campaign offhand hook). The deep grapple state machine/reel was already faithful (weapon-hook.yaml). Residuals downgraded from missing-input to (a) a 1-tick publish/read latency and (b) the absent vehicle/forbidden key gate. Same input wire revives offhand_blaster and nade offhand-throw."

