    verification:
      - { kind: code, ref: "Full input chain traced LIVE: BindInput.cs:46 (\"hook\"->\"+hook\") -> BindTable.cs:131 (_hook) -> BindTable.HookHeld -> NetGame.cs:3984 (buttons|=InputButtons.Hook) -> InputCommand.cs:20 (Hook=BIT(6), serialized in the button byte) -> ServerNet.cs:1415 (ButtonHook) -> WeaponFireDriver.cs:66 (OffhandFirePressed=ButtonHook) -> HookMutator.cs:103 (st.ButtonAttack=OffhandFirePressed) -> Hook.WrThink fires FireGrapplingHook", result: pass }
