unit: mutator-hook
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "The +hook button STILL never reaches the server (Wave-2 did NOT fix this): InputButtons (InputCommand.cs:11-20) has no hook bit (only Attack/Jump/Attack2/Zoom/Crouch/Use) and Entity.OffhandFirePressed (EntityMutatorState.cs:62) is never ASSIGNED anywhere in the codebase — it is READ by HookMutator(:103)/OffhandBlasterMutator(:57)/NadesMutator(:129) but written by nothing. No +hook bind exists."
    - "Because OffhandFirePressed is always false, OnPlayerPreThink mirrors false onto the offhand slot's ButtonAttack every tick, so Hook.WrThink only ever runs the 'primary released' branch — FireGrapplingHook is never reached and the grapple can never be cast. The instahook ruleset / campaign offhand hook is inert."
    - "No ':grappling_hook' server-info token and no ', Hook' pretty token are appended (BuildMutatorsString / BuildMutatorsPrettyString still unported), so server browsers / the votescreen won't show that the grappling-hook mutator is active. (The g_grappling_hook in CommandReplies.cs:252 is the cvar_changes BADCVAR suppression list, not the mutator-string emission.)"
    - "No client gameplay tip is shown when the hook mutator is active (no GameplayTips system in the port at all); Base cl_hook appends 'grappling hook is enabled, press <+hook key> to use it'."
    - "SetStartItems still omits warmup_start_ammo_fuel = max(.., rotstable) (only the non-warmup start fuel is set); minor, only matters in warmup with useammo on."
features:
  - id: mutator-hook.enable.predicate
    name: "Enable predicate (string g_grappling_hook via expr_evaluate)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/hook/sv_hook.qc:REGISTER_MUTATOR"
      - "lib/cvar.qh:48:expr_evaluate"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:ExprEvaluate"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:ExprToken"
    constants:
      - { name: "g_grappling_hook", base: "\"0\" (string, mutators.cfg:418)", port: "GetString(g_grappling_hook) via ExprEvaluate", match: true }
      - { name: "expr_evaluate grammar", base: "+/- prefix + var>=x/var<=x/var>/var</var==/var!=/var===/var!== over tokenize_console (lib/cvar.qh:48-100)", port: "full grammar ported (ExprEvaluate +/- prefix; ExprToken all 8 BINOP tokens + bare literal/cvar with '!' invert)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Theoretical-only ordering divergence: the port's ExprToken tests >= <= == != === !== then > <, whereas Base's BINOP macro order is >= <= > < == != === !==. strstrofs/IndexOf both find the FIRST occurrence, so for every realistic token (a bare var, a single comparison like 'var>=1', the instahook literal '1') the two orders return identical results. They diverge only for a contrived token containing BOTH a > or < AND an == (e.g. 'a>b==c'), which never occurs in cvar expressions. Not a real gap; flagged for completeness."
    verification:
      - { kind: code, ref: "ExprEvaluate (HookMutator.cs:146-160) + ExprToken (163-194) vs lib/cvar.qh:48 expr_evaluate — +/- prefix, AND-chain, all 8 BINOPs, ftos-literal-or-cvar bare token, '!' invert all ported", result: pass }
      - { kind: code, ref: "MutatorActivation.Apply() walks Mutators.All and subscribes hooks; IsEnabled read live", result: pass }
    confidence: high
    notes: "WAVE-2 FIX: the truthiness-only ExprEvaluate was replaced with a faithful port of QC expr_evaluate (lib/cvar.qh:48) — full expression grammar now handled, closing the baseline logic:partial gap. g_grappling_hook is a string cvar (cvar_string + expr_evaluate, not an autocvar 'because it doesn't work in the campaign'). LIVE + correct for literals 0/1 and ruleset-instahook 'g_grappling_hook 1'. Auto-discovered via [Mutator] (NetName='grappling_hook')."

  - id: mutator-hook.onadd.free_reel
    name: "MUTATOR_ONADD / ONROLLBACK_OR_REMOVE: free reeling when useammo off (WEP_HOOK.ammo_factor 0<->1)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/hook/sv_hook.qc:REGISTER_MUTATOR"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:UseAmmo"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:OnPlayerPreThink"
    constants:
      - { name: "g_grappling_hook_useammo", base: "false (bool, mutators.cfg:419)", port: "GetFloat(g_grappling_hook_useammo)!=0", match: true }
      - { name: "WEP_HOOK.ammo_factor", base: "1 -> 0 on add, restored to 1 on rollback/remove", port: "no ammo_factor; fuel topped to Primary.Ammo+1 each think", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: true
    divergence_rationale: "The port has no per-weapon ammo_factor; instead OnPlayerPreThink (line 107-108) tops the player's fuel up to Primary.Ammo+1 before each WrThink so the hooked-fuel TakeResource (Hook.cs) is a no-op. Functionally equivalent for the offhand path; the ONROLLBACK_OR_REMOVE ammo_factor=1 restore is moot because there is no ammo_factor to restore (Unhook just unsubscribes the handlers). NOTE liveness=dead: the top-up sits inside OnPlayerPreThink, whose grapple-driving body is itself unreachable (see mutator-hook.offhand.think_driver)."
    gaps:
      - "The free-reel top-up runs inside the dead offhand-think; with useammo on, the start-fuel grant (mutator-hook.startitems.fuel) is the only useammo behavior that is actually live."
    verification:
      - { kind: code, ref: "HookMutator.UseAmmo read (line 69) + PreThink fuel top-up (line 107-108) vs MUTATOR_ONADD ammo_factor=0; Unhook (line 75-81) is the rollback analogue", result: pass }
    confidence: high
    notes: "Unchanged by Wave-2. Equivalence holds only because the offhand path is gated on NOT carrying the real WEP_HOOK; if the same Hook were main-hand the top-up would also free its primary fire (edge case that doesn't arise here). ONADD and ONROLLBACK_OR_REMOVE folded into one port row (Hook()/Unhook())."

