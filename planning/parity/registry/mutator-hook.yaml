unit: mutator-hook
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "The +hook button never reaches the server: InputButtons (InputCommand.cs:11-19) has no hook bit (only Attack/Jump/Attack2/Zoom/Crouch/Use) and Entity.OffhandFirePressed (EntityMutatorState.cs:62) is never ASSIGNED anywhere in the codebase — it is READ by HookMutator/OffhandBlasterMutator/NadesMutator but written by nothing."
    - "Because OffhandFirePressed is always false, OnPlayerPreThink mirrors false onto the offhand slot's ButtonAttack every tick, so Hook.WrThink only ever runs the 'primary released' branch — FireGrapplingHook is never reached and the grapple can never be cast. The instahook ruleset / campaign offhand hook is inert."
    - "Enable predicate is truthiness-only: HookMutator.ExprEvaluate handles \"\"/\"0\"/\"false\" but NOT Base expr_evaluate's full grammar (+/- prefix, var>=x / var<=x / var> / var< / var== / var!= / var=== / var!== tokens across tokenize_console). Diverges if g_grappling_hook is set to an expression rather than a literal 0/1."
    - "No ':grappling_hook' server-info token and no ', Hook' pretty token are appended (BuildMutatorsString / BuildMutatorsPrettyString unported), so server browsers / the votescreen won't show that the grappling-hook mutator is active."
    - "No client gameplay tip is shown when the hook mutator is active (no GameplayTips system in the port at all); Base cl_hook appends 'grappling hook is enabled, press <+hook key> to use it'."
features:
  - id: mutator-hook.enable.predicate
    name: "Enable predicate (string g_grappling_hook via expr_evaluate)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/hook/sv_hook.qc:REGISTER_MUTATOR"
      - "lib/cvar.qh:48:expr_evaluate"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:ExprEvaluate"
    constants:
      - { name: "g_grappling_hook", base: "\"0\" (string, mutators.cfg:418)", port: "GetString(g_grappling_hook) via ExprEvaluate", match: true }
      - { name: "expr_evaluate grammar", base: "+/- prefix + var>=x/var<=x/var>/var</var==/var!=/var===/var!== over tokenize_console (lib/cvar.qh:48-100)", port: "truthiness only: false for \"\"/\"0\"/\"false\", true otherwise", match: false }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "ExprEvaluate is a truthiness check, not Base's expr_evaluate expression interpreter. For the literal defaults 0 / 1 (and ruleset-instahook.cfg:9 'g_grappling_hook 1') it is correct, but any expression value (e.g. a '+'/'-' prefix or a 'cvar>=x' comparison token) is mis-evaluated. Same simplification appears across the port's mutator enable predicates."
    verification:
      - { kind: code, ref: "HookMutator.IsEnabled + ExprEvaluate (lines 35-36, 126-132) vs lib/cvar.qh:48 expr_evaluate", result: fail }
      - { kind: code, ref: "MutatorActivation.Apply() (GameWorld.cs:511) walks enabled mutators and subscribes hooks; reads IsEnabled live", result: pass }
    confidence: high
    notes: "g_grappling_hook is a string cvar (Base uses cvar_string + expr_evaluate, not an autocvar, 'because it doesn't work in the campaign'). The predicate is LIVE and correct for the realistic 0/1 case; the gap is the missing expression grammar. Auto-discovered via [Mutator] attribute (NetName='grappling_hook')."

  - id: mutator-hook.onadd.free_reel
    name: "MUTATOR_ONADD / ONROLLBACK_OR_REMOVE: free reeling when useammo off (WEP_HOOK.ammo_factor 0<->1)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/hook/sv_hook.qc:REGISTER_MUTATOR"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:UseAmmo"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:OnPlayerPreThink"
    constants:
      - { name: "g_grappling_hook_useammo", base: "false (bool, mutators.cfg:419)", port: "GetFloat(g_grappling_hook_useammo)!=0", match: true }
      - { name: "WEP_HOOK.ammo_factor", base: "1 -> 0 on add, restored to 1 on rollback/remove", port: "no ammo_factor; fuel topped to Primary.Ammo+1 each think", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: true
    divergence_rationale: "The port has no per-weapon ammo_factor; instead OnPlayerPreThink (line 97-98) tops the player's fuel up to Primary.Ammo+1 before each WrThink so the hooked-fuel TakeResource (Hook.cs:137) is a no-op. Functionally equivalent for the offhand path; the ONROLLBACK_OR_REMOVE ammo_factor=1 restore is moot because there is no ammo_factor to restore (Unhook just unsubscribes the handlers). NOTE liveness=dead: the top-up sits inside OnPlayerPreThink, whose grapple-driving body is itself unreachable (see mutator-hook.offhand.think_driver)."
    gaps:
      - "The free-reel top-up runs inside the dead offhand-think; with useammo on, the start-fuel grant (mutator-hook.startitems.fuel) is the only useammo behavior that is actually live."
    verification:
      - { kind: code, ref: "HookMutator.UseAmmo read (line 59) + PreThink fuel top-up (line 97-98) vs MUTATOR_ONADD ammo_factor=0; Unhook (line 65-71) is the rollback analogue", result: pass }
    confidence: high
    notes: "Equivalence holds only because the offhand path is gated on NOT carrying the real WEP_HOOK; if the same Hook were main-hand the top-up would also free its primary fire (edge case that doesn't arise here). The ONADD and ONROLLBACK_OR_REMOVE Base branches are folded into one port row (Hook()/Unhook())."

