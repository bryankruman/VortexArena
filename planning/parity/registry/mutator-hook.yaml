last_audited: "2026-06-25"
summary:
  feature_count: 10
  worst_gaps:
    - "WAVE-5 FIX (major): the +hook offhand-fire button now reaches the server end-to-end, so the grapple is castable on the live path. Chain: binds-xonotic.cfg (`bind e +hook` / `bind MOUSE5 +hook`) -> BindInput map (\"hook\"->\"+hook\") -> BindTable._hook/HookHeld -> NetGame.SampleInput (`if (BindTable.HookHeld) buttons |= InputButtons.Hook`, NetGame.cs:3984) -> wire (InputButtons.Hook = BIT(6), InputCommand.cs:20) -> ServerNet.ToMovementInput (`ButtonHook = (b & InputButtons.Hook)!=0`, ServerNet.cs:1415) -> WeaponFireDriver.Frame (`player.OffhandFirePressed = input.ButtonHook`, WeaponFireDriver.cs:66) -> HookMutator.OnPlayerPreThink reads OffhandFirePressed -> Hook.WrThink fires FireGrapplingHook. The whole offhand path (think_driver, free-reel top-up, blaster precedence) is now LIVE."
    - "WAVE-6b FIX: the ':grappling_hook' server-info token IS now emitted — HookMutator.BuildMutatorsString (HookMutator.cs:115) appends ':grappling_hook' and the aggregator MutatorActivation.BuildMutatorsString is called LIVE from the gamelog server-info init (GameWorld.cs:876, gated on sv_eventlog). The ', Hook' pretty token is also ported (HookMutator.cs:118) but its aggregator (MutatorActivation.BuildMutatorsPrettyString) has NO live caller — the QC votescreen path (server/client.qc:1107) is unwired, so the pretty/votescreen surfacing is dead."
    - "WAVE-6b FIX: SetStartItems now sets warmup_start_ammo_fuel = max(.., rotstable) — StartLoadout gained a WarmupAmmoFuel field (MutatorHooks.cs:1006); HookMutator.OnSetStartItems (HookMutator.cs:130) maxes it, and the warmup spawn reads it from the deterministic ComputeStartItems seam (SpawnSystem.cs:979). The earlier warmup-fuel value gap is resolved."
    - "Residual timing wrinkle on the offhand think: the port publishes OffhandFirePressed in PlayerPostThink (WeaponFireDriver.Frame, GameWorld.cs:1333/1368) but reads it in PlayerPreThink (GameWorld.cs:1174), which runs EARLIER in the same tick. So the offhand-think sees the button one tick stale (press/release lands one server tick late). QC dispatches offhand_think from W_WeaponFrame itself, so the read and publish are same-frame there. Functional but a 1-tick latency vs Base."
    - "STILL MISSING: no client gameplay tip when the hook mutator is active (no BuildGameplayTipsString/GameplayTips system in the port at all); Base cl_hook appends 'grappling hook is enabled, press <+hook key> to use it'."
    - "STILL OPEN: no in-mutator vehicle/weaponUseForbidden gate on the offhand key (WeaponUseForbidden is a stub=false; the seated case is excluded only by WeaponThink's early return, which leaves OffhandFirePressed un-zeroed/stale while seated)."
features:
  - id: mutator-hook.enable.predicate
    name: "Enable predicate (string g_grappling_hook via expr_evaluate)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/hook/sv_hook.qc:REGISTER_MUTATOR"
      - "lib/cvar.qh:48:expr_evaluate"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:ExprEvaluate"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:ExprToken"
    constants:
      - { name: "g_grappling_hook", base: "\"0\" (string, mutators.cfg:418)", port: "GetString(g_grappling_hook) via ExprEvaluate", match: true }
      - { name: "expr_evaluate grammar", base: "+/- prefix + var>=x/var<=x/var>/var</var==/var!=/var===/var!== over tokenize_console (lib/cvar.qh:48-100)", port: "full grammar ported (ExprEvaluate +/- prefix; ExprToken all 8 BINOP tokens + bare literal/cvar with '!' invert)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Theoretical-only ordering divergence: the port's ExprToken tests >= <= == != === !== then > <, whereas Base's BINOP macro order is >= <= > < == != === !==. strstrofs/IndexOf both find the FIRST occurrence, so for every realistic token (a bare var, a single comparison like 'var>=1', the instahook literal '1') the two orders return identical results. They diverge only for a contrived token containing BOTH a > or < AND an == (e.g. 'a>b==c'), which never occurs in cvar expressions. Not a real gap; flagged for completeness."
    verification:
      - { kind: code, ref: "ExprEvaluate (HookMutator.cs:146-160) + ExprToken (163-194) vs lib/cvar.qh:48 expr_evaluate — +/- prefix, AND-chain, all 8 BINOPs, ftos-literal-or-cvar bare token, '!' invert all ported", result: pass }
      - { kind: code, ref: "MutatorActivation.Apply() walks Mutators.All and subscribes hooks; IsEnabled read live", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests.cs:443 — Boot(g_grappling_hook 1) -> Mutators.ByName('grappling_hook').IsEnabled true", result: pass }
    confidence: high
    notes: "Unchanged by Wave-5 (already faithful since Wave-2). The truthiness-only ExprEvaluate was replaced with a faithful port of QC expr_evaluate; full expression grammar handled. g_grappling_hook is a string cvar (cvar_string + expr_evaluate). LIVE + correct for literals 0/1 and ruleset-instahook 'g_grappling_hook 1'. Auto-discovered via [Mutator] (NetName='grappling_hook')."

  - id: mutator-hook.onadd.free_reel
    name: "MUTATOR_ONADD / ONROLLBACK_OR_REMOVE: free reeling when useammo off (WEP_HOOK.ammo_factor 0<->1)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/hook/sv_hook.qc:REGISTER_MUTATOR"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:UseAmmo"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:OnPlayerPreThink"
    constants:
      - { name: "g_grappling_hook_useammo", base: "false (bool, mutators.cfg:419)", port: "GetFloat(g_grappling_hook_useammo)!=0", match: true }
      - { name: "WEP_HOOK.ammo_factor", base: "1 -> 0 on add, restored to 1 on rollback/remove", port: "no ammo_factor; fuel topped to Primary.Ammo+1 each think", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "The port has no per-weapon ammo_factor; instead OnPlayerPreThink (line 107-108) tops the player's fuel up to Primary.Ammo+1 before each WrThink so the hooked-fuel TakeResource (Hook.cs) is a no-op. Functionally equivalent for the offhand path; the ONROLLBACK_OR_REMOVE ammo_factor=1 restore is moot because there is no ammo_factor to restore (Unhook just unsubscribes the handlers)."
    gaps:
      - "Equivalence holds only because the offhand path is gated on NOT carrying the real WEP_HOOK as main-hand; if the same Hook were main-hand the top-up would also free its primary fire (an edge case that does not arise here). Cosmetic-equivalence divergence, not a behavioral gap."
    verification:
      - { kind: code, ref: "HookMutator.UseAmmo read (line 69) + PreThink fuel top-up (line 107-108) vs MUTATOR_ONADD ammo_factor=0; Unhook (line 75-81) is the rollback analogue", result: pass }
      - { kind: code, ref: "OnPlayerPreThink is now LIVE (the offhand-think that contains the top-up is reached every tick via the wired ButtonHook->OffhandFirePressed chain)", result: pass }
    confidence: high
    notes: "WAVE-5 FIX (liveness dead->live): the baseline marked this dead because the top-up sits inside the offhand-think, whose grapple-driving body was input-starved. The +hook input wire (WeaponFireDriver.cs:66) now makes OnPlayerPreThink's body reachable, so the free-reel top-up actually runs. values:partial retained (no ammo_factor, intended divergence)."

