      - "src/XonoticGodot.Common/Gameplay/Weapons/Hook.cs:WrThink"
    constants: []
    status:
      logic: partial
      values: na
      timing: partial
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The +hook button never reaches the server: InputButtons (InputCommand.cs:11-19) has no hook bit (only Attack/Jump/Attack2/Zoom/Crouch/Use) and Entity.OffhandFirePressed is never assigned ANYWHERE in the codebase — it is read by HookMutator/OffhandBlasterMutator/NadesMutator but written by nothing."
      - "Because OffhandFirePressed is always false, OnPlayerPreThink mirrors false onto the offhand slot's ButtonAttack (HookMutator.cs:93) every tick, so Hook.WrThink (Hook.cs:130) only ever runs the 'primary released' branch — FireGrapplingHook is never reached and the grapple can never be cast. The instahook ruleset / campaign offhand hook is inert."
      - "No vehicle / weaponUseForbidden suppression of the offhand key (Base weaponsystem.qc:609-611 zeroes key_pressed in a vehicle or when weapon use is forbidden). Moot while the path is dead, but absent from the port even on paper."
    verification:
      - { kind: code, ref: "grep OffhandFirePressed across src/** and game/** -> reads only (HookMutator:93, NadesMutator:124, OffhandBlasterMutator:57), zero assignments", result: fail }
      - { kind: code, ref: "InputButtons enum (InputCommand.cs:11-19) has no Hook bit; net input sampler never sets OffhandFirePressed", result: fail }
      - { kind: code, ref: "MutatorHooks.PlayerPreThink.Call (GameWorld.cs:988) IS live per-tick, but the body is starved of input", result: pass }
    confidence: high
    notes: "Mechanically faithful design (drives Hook.WrThink primary-only on a dedicated high slot, no secondary via offhand — matching OffhandHook.offhand_think passing key_pressed?1:0). The deep grapple state machine/reel is faithful and covered by weapon-hook.yaml. The defects are (a) the missing input wiring (makes the whole offhand path dead) and (b) no vehicle/weaponUseForbidden key gate. Same dead-input issue affects offhand_blaster and the nade offhand throw (TODO.md T11)."

