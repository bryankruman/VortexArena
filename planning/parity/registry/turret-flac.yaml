# Re-audited 2026-06-25 (drift check). Two FIXES since 2026-06-22: (1) fuse time now forward-traced (timing faithful);
# (2) the hidden player FLAC weapon (FlacWeapon) is now implemented faithfully but UNREGISTERED -> liveness dead, not na.
# One NEW gap surfaced: TFL_DMG_HEADSHAKE is unwired for Flac though the engine now supports headShake (used by MLRS/MG/Plasma).
summary:
  feature_count: 11
  worst_gaps:
    - "all presentation missing: PROJECTILE_HAGAR trail, BLASTER muzzleflash, head-frame cycle, head model/bone"
    - "TFL_DMG_HEADSHAKE not wired for Flac: FlacTurret.Spawn omits headShake:true though the port engine supports it (TurretAI.Damage:887, used by MLRS/MG/Plasma) — Flac head never flinches on a hit"
    - "hidden player FLAC weapon (FlacWeapon) implemented faithfully but [Weapon] registration intentionally OFF (impulse-5 collision w/ Raptor + test-contract churn) -> liveness dead"
  notable_fixes_since_last_audit:
    - "fire.flak_shell timing partial->faithful: TurretAI.UpdateImpact (TurretAI.cs:725-750) now does a forward tracebox from the muzzle to aimpos and sets ImpactTime = vlen(ShotOrg - trace_endpos)/shot_speed, matching Base sv_turrets.qc:519-523. The fuse-base-time constant now matches; the headless fallback (no Trace service) keeps DistAimPos/shotSpeed for deterministic tests (== Base when the path is clear)."
    - "weapon.player_form logic/values/timing/audio missing->faithful: a FlacWeapon : Weapon class (FlacTurret.cs:168-261) now ports the IS_PLAYER branch of wr_think (impulse 5, SpecialAttack|Hidden, fixed 10s fuse, PortoLaunch no-ammo, 0.5s anim / 1s refire, fire sound). BUT the [Weapon] registration is intentionally OFF (line 163) to avoid impulse-5 collision with Raptor + WeaponById/MenuWeaponOrder test churn, so liveness is dead, not na. presentation (muzzleflash) still missing."
    - "(Prior 2026-06-22, commit 4be8357, still standing) on-death RadiusDamage blast REMOVED from TurretAI.Die (matches Base commented-out blast sv_turrets.qc:182); aim_firetolerance_dist 150 threaded into ValidTarget LOS tolerance; TFL_DMG_RETALIATE attacker-adoption removed; respawn -0.2 'offset' confirmed not real."
    - "(Prior Wave-2, still standing) shot_spread 0.0125->0.02, target_range_optimal 2000->1250, aim_maxpitch 90->35, respawntime 60->90, biases rangebias 0.25/anglebias 0.5/playerbias 0 passed, track accel_rot 0.7/blendrate 0.2 passed, zPredict aim flag dropped."
