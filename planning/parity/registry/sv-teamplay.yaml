summary:
  feature_count: 17
  worst_gaps:
    - "Forced teams for HUMANS still dead: DetermineForcedTeam (g_forced_team_*/campaign) exists but the connect path (ClientManager.cs:181) calls AssignBestTeam without ever populating _forcedTeam; g_forced_team_* cvars are unregistered → no effect."
    - "prevent_imbalance mid-match switch gate is DEAD: IsTeamAllowedForSwitch exists but CmdSelectTeam (Commands.cs:1160) / CmdMovePlayer / CmdJoin set Team directly with no gate, so a human can still switch to the larger/stronger team."
    - "Team-nagger DEAD: SizeDifference/TeamsUnbalancedForNag exist but have zero callers; WarmupController hardcodes badteams=false, sv_teamnagger is unregistered, and no nag is networked → no warmup-hold, no warning."
    - "No TrueSkill ratings: SkillProvider defaults to 5 for every player and variance is flat 1, so the weighted path reduces to a plain count and is inert; gametype JoinSmallestTeam callers bypass weighting entirely."
    - "No Player_ChangeTeam / Player_ChangedTeam mutator hooks on a team change: a mutator cannot block or react to team changes."
    - "No teamplay_lockonrestart: teams are not auto-locked after the ready-restart, so new players can join mid-match on a server that expects locked teams."
