summary:
  feature_count: 17
  worst_gaps:
    - "Join queue (g_balance_teams_queue) still entirely missing: no deficit-filling tag-in, wants_join exists as a field but is never consulted for queueing."
    - "No TrueSkill ratings: humans still default to skill 5 (bots feed real BotSkill, the unranked_factor 0.666 + time-scaled score ramp are now consumed, so the balance ALGORITHM is faithful, but human-vs-human ties remain count-only because the human skill DATA is flat)."
    - "Team-nagger network center-print still missing: warmup is now HELD while unbalanced, but players are never sent the unbalanced-teams nag notification (no SendFlags bits 5/6 Nagger entity)."
    - "Player_ChangeTeam / Player_ChangedTeam mutator hooks now exist and fire on every team-set, but no port mutator yet subscribes to them (the hook chain is live but has no consumers)."
    - "Bot autobalance still polls on a 3s cadence (Base is per-event) and uses frag score not SP_SCORE for the lowest-scorer tiebreak."
    - "No unified Team_* global-entity API (winner/alive/owned-item queries reimplemented per gametype); out of this unit's narrow scope."
