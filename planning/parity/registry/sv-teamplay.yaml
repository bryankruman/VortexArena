    notes: "FIX (Wave-5): no longer fully inert. (a) GameWorld now feeds each bot's real BotSkill into SkillProvider (was flat 5 for everyone); (b) the significance threshold (1.645) and skill cvars are registered and consumed. So bot-skill differences now move balance on equal-size ties. Still partial: humans remain flat 5 (no TrueSkill), unranked_factor is dead, and the score ramp is a flat bias rather than Base's time-scaled team_score ratio. values stub->partial; liveness partial->live."

