unit: sv-teamplay
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 17
  worst_gaps:
    - "No .team_forced field, no connect-time forced-team determination, no g_forced_team_* parsing; server configs that pin players (or force-spectate unlisted players) have no effect."
    - "A human can manually switch (team/join command) to the larger or stronger team mid-match; Base rejects switches to a team not in TeamBalance_FindBestTeams (cmd.qc:746)."
    - "No TrueSkill ratings: SkillProvider defaults to 5 for every player and variance is a flat 1, so the weighted path (which IS invoked on the live AssignBestTeam join when g_balance_teams_skill=1) reduces to a plain count and has no observable effect; the gametype-level JoinSmallestTeam callers bypass weighting entirely."
    - "No team-unbalanced nag is computed or networked; players are never warned when teams differ by >= sv_teamnagger; warmup is not held open while unbalanced."
    - "Port sizes the bot COUNT by |ratio| * active humans (TargetBotCount) but never bans teams so bots take one side and humans the other; a bot_vs_human match still mixes bots and humans on both teams."
    - "No Player_ChangeTeam / Player_ChangedTeam mutator hooks on a team change: a mutator cannot block or react to team changes (NIX/CA/etc. team-change reactions and balance overrides are unreachable)."
    - "No teamplay_lockonrestart: teams are not auto-locked after the ready-restart, so new players can join mid-match on a server that expects locked teams."
