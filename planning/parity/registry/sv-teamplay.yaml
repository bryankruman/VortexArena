      - "No score-ratio team-strength RAMP: Base TeamBalance_CompareTeamsInternal scales strength by team_score ratio * min(1,(t-start)/timelimit)^1.5 after warmup; the port applies a flat score*0.0001 strength bias instead (no time-into-match scaling)."
