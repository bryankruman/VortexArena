    constants:
      - { name: "g_balance_teams_skill", base: "1", port: "1 (registered)", match: true }
      - { name: "g_balance_teams_skill_significance_threshold", base: "1.645", port: "1.645 (registered, consumed in CompareTeams)", match: true }
      - { name: "g_balance_teams_skill_unranked_factor", base: "0.666", port: "0.666 (registered AND consumed in RecomputeServerSkillAverage)", match: true }
      - { name: "skill mu/var model", base: "TrueSkill m_skill_mu / m_skill_var", port: "bots = BotSkill, humans = flat unranked (server-avg); var = flat 1", match: false }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No TrueSkill ratings for humans: SkillProvider returns the bot's real BotSkill (0..10) for bots but a flat 5 for every human (IsRated treats only bots as rated; humans fall through the unranked server-average path). So skill weighting biases bot-involved ties but human-vs-human equal-size ties still reduce to a plain count. This is a VALUES/data gap, not a logic gap — the algorithm now matches Base."
      - "No warmup skill-aware join branch (Base TeamBalance_FindBestTeams warmup+sv_teamnagger+skill block picking the team whose weighted-mean skill is furthest from the joiner). The port always uses the size->strength ladder even in warmup."
      - "The weighted path is only reached from AssignBestTeam/IsTeamAllowedForSwitch (connect/moveplayer/team/selectteam); the per-gametype TeamBalance.JoinSmallestTeam callers (CTF/CA/FreezeTag/Dom/KeyHunt/TDM/TeamMayhem) ignore skill entirely."
    verification:
      - { kind: code-read, ref: "GameWorld.cs:557 wires Teamplay.SkillProvider = p => p.IsBot ? p.BotSkill : 5f; CompareTeams gates skill on z^2 > threshold^2 with threshold=g_balance_teams_skill_significance_threshold (1.645). MeasureTeam computes the per-team inverse-variance weighted mean (rated bots at 1/var; unranked humans at the server-average skill weight), and RecomputeServerSkillAverage now applies g_balance_teams_skill_unranked_factor (0.666). Mirrors TeamBalance_GetTeamCounts.", result: pass }
      - { kind: code-read, ref: "CompareTeams (Teamplay.cs:527-534) now applies the FULL Base score ramp: (1 + (scoreA/scoreB - 1) * min(1, elapsed/timelimit)^1.5) with the 0.96875 (31/32) zero-score fallback, gated on !IsWarmup() && SecondsSinceMatchStart()>0. IsWarmup/SecondsSinceMatchStart are wired (GameWorld.cs:561-562). This replaces the prior flat score*0.0001 bias.", result: pass }
    confidence: high
    notes: "FIX (since 2026-06-22): two of the three prior logic divergences are closed. (1) g_balance_teams_skill_unranked_factor (0.666) is now CONSUMED in RecomputeServerSkillAverage (was registered-but-dead) — the unranked down-weighting is applied (constant match false->true). (2) The score-strength RAMP is now the full Base time-scaled team_score ratio (min(1,(t-start)/timelimit)^1.5 + 0.96875 fallback), wired via IsWarmup/SecondsSinceMatchStart, replacing the flat bias. So CompareTeams/MeasureTeam now mirror TeamBalance_CompareTeamsInternal/GetTeamCounts structurally: logic partial->faithful. values stays partial: humans are still flat 5 (no TrueSkill), so the actual mu/var DATA diverges, and the warmup skill-aware join branch is still absent."

