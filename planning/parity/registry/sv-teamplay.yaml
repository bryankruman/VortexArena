  - id: sv-teamplay.join.skill_weighting
    name: "Inverse-variance skill-weighted balance (g_balance_teams_skill)"
    layer: [authority]
    base_refs:
      - "server/teamplay.qc:TeamBalance_GetTeamCounts"
      - "server/teamplay.qc:TeamBalance_CompareTeamsInternal"
    port_refs:
      - "src/XonoticGodot.Server/Teamplay.cs:TeamBalance_GetWeightedTeamCount"
      - "src/XonoticGodot.Server/Teamplay.cs:SkillProvider"
    constants:
      - { name: "g_balance_teams_skill", base: "1", port: "1 (registered)", match: true }
      - { name: "g_balance_teams_skill_significance_threshold", base: "1.645", port: "none (always significant)", match: false }
      - { name: "g_balance_teams_skill_unranked_factor", base: "0.666", port: "none", match: false }
      - { name: "skill mu/var model", base: "TrueSkill m_skill_mu / m_skill_var", port: "flat mu=5, var=1", match: false }
    status:
      logic: partial
      values: stub
      timing: na
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No TrueSkill ratings: SkillProvider defaults to 5 for every player and variance is a flat 1, so weighting reduces to a plain count and has no observable effect."
      - "No unranked-client factor (0.666) and no significance threshold (1.645) gate; threshold is treated as always met (SkillWeightingEnabled returns true whenever g_balance_teams_skill != 0)."
      - "No score-ratio team-strength ramp (Base TeamBalance_CompareTeamsInternal scales strength by team_score ratio * min(1,(t-start)/timelimit)^1.5 after warmup & past game_starttime)."
      - "No warmup skill-aware join branch (Base TeamBalance_FindBestTeams warmup+sv_teamnagger+skill block picking the team whose weighted-mean skill is furthest from the joiner)."
      - "The weighted path is only reached from AssignBestTeam (connect/moveplayer/team); the per-gametype TeamBalance.JoinSmallestTeam callers (CTF/CA/FreezeTag/Dom/KeyHunt/TDM/TeamMayhem) ignore skill entirely."
    verification:
      - { kind: code-read, ref: "AssignBestTeam useSkill=SkillWeightingEnabled (cvar default 1) -> TeamBalance_GetWeightedTeamCount; SkillProvider default _ => 5f; SkillVariance=1", result: partial }
    confidence: high
    notes: "Liveness=partial NOT dead: the weighted-count path IS invoked on the live AssignBestTeam join (g_balance_teams_skill defaults to 1), but with the flat provider it computes weight*(5/5)=count, identical to a plain count, so the effect is inert. A host wiring a real SkillProvider (e.g. BotBrain.Skill) would activate it. The gametype-level JoinSmallestTeam callers never touch this path."

