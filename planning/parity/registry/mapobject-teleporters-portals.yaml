  - id: teleporters.core.telefrag_teamplay
    name: "Teammates spared from telefrag in team modes (g_telefrags_teamplay)"
    layer: [authority]
    base_refs:
      - "common/mapobjects/teleporters.qc:tdeath"
      - "common/mapobjects/teleporters.qh:autocvar_g_telefrags_teamplay"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/MapObjects/Teleporters.cs:Telefrag"
    constants:
      - { name: "g_telefrags_teamplay", base: "1 (xonotic-server.cfg:60)", port: "0 (unregistered Cvar fallback)", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "g_telefrags_teamplay is not registered in Cvars.cs; Teleporters.cs:326 Cvar(g_telefrags_teamplay,0) fallback = 0 while Base default = 1. NOTE the polarity: Base default 1 = 'never telefrag teammates', so the spare-branch should be ACTIVE by default. The port reads teamTelefrags=false by default (no override), which actually SPARES teammates — so the runtime behaviour happens to match Base default, but a `set g_telefrags_teamplay 1` would WRONGLY start telefragging teammates (inverted semantics: the port treats the cvar as 'telefrag teammates' while Base names it 'never telefrag teammates' and uses it the same way)."
    verification:
      - { kind: value, ref: "xonotic-server.cfg:60 g_telefrags_teamplay 1; Cvars.cs registers only g_maxpushtime", result: fail }
    confidence: high
    notes: "CORRECTION vs draft: the draft claimed the port telefrags teammates by default. Re-read shows the opposite — with the cvar absent, teamTelefrags=false so teammates ARE spared (matches Base default 1 behaviour). The real defect is that the cvar is inert AND its sense is inverted relative to the Base name, so any explicit value flips it the wrong way. Net default behaviour is faithful; the wiring is wrong."

