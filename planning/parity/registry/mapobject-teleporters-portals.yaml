summary:
  feature_count: 17
  reaudit_note: "DRIFT RE-AUDIT 2026-06-27 (THIRD pass, consolidated re-verify) against current branch claude/parity-port-waves. Re-read all four port files (Teleporters.cs, Warpzone.cs, Porto.cs, GameWorld.cs) + confirmed XonoticGodot.Common builds clean (0 errors). Every fix the prior pass claimed is CONFIRMED genuinely landed AND wired live; only line refs had drifted, now corrected throughout. Wiring re-traced to live callers: GameScores.Gametype = GameType.NetName at GameWorld.cs:586 (Race.cs:284 \"rc\", Cts.cs:132 \"cts\"); RoundHandler.RoundNotStartedProvider wired GameWorld.cs:1645 (nulled 2776); ExpirePortals swept once/frame at GameWorld.cs:1811; Porto.PortalSpawner/PortalInId/PortalClearWithId/PortalClearAll wired GameWorld.cs:437-449; NotificationSystem.Announce(\"ACHIEVEMENT_AMAZING\") reaches a real Send->Sink.Dispatch (NotificationSystem.cs:200), registered NotificationsList.cs:144. The 15s Porto-portal LIFETIME/EXPIRY is implemented on the warpzone path — Warpzone.cs FadeTime + PortalFadeTime() (reads g_balance_portal_lifetime live, default 15, recharged on every crossing Warpzone.cs:344-349, stamped LinkPair:709-715), ExpirePortals() (Warpzone.cs:663-683) sweeps both halves. NEW CORRECTION this pass: natural-expiry now PLAYS the SND_PORTO_EXPIRE cue (porto/expire.wav, CH_SHOTS) via EmitPortalExpire (Warpzone.cs:691-696) for both halves — so portals.entity.lifecycle audio missing->partial (only the SHOOT-DOWN SND_PORTO_EXPLODE + EFFECT_ROCKET_EXPLODE remain absent, gated behind the unported portal-HEALTH entity). NOT registered: g_balance_portal_lifetime/_health read raw via GetFloat with a 15f test-path fallback (functionally correct at default; a live `set g_balance_portal_lifetime N` still applies). CARRIED FORWARD (all re-verified): Porto-crossing FORCE_TDEATH + Amazing<1s else portal-owner kill-credit (Warpzone.cs:336-367); item_flag_team never portalled + independent-player gate (Warpzone.cs:296-309); teleport SOUND CH_TRIGGER(-3), EF_TELEPORT_BIT XOR (1<<21) + istypefrag, RemoveGrapplingHooks on teleport, portal_activatetime self-skip; per-owner in/out slot replacement; exit-flash at to+v_forward*32. RESIDUAL OPEN (architectural): portal HEALTH entity (g_balance_portal_health=200, Portal_Damage shoot-down), MDL_PORTAL model/skins/EF glow, SND_PORTO_EXPLODE + EFFECT_ROCKET_EXPLODE on shoot-down, SUB_SetFade 0.5s expiry fade, Portal_Customize; Portal_WillHitPlane predict-ahead + grappling-hook teleport through the portal; the exact +/-48 plane-shift / Portal_FindSafeOrigin transform (warpzone transform substituted); g_telefrags_avoid hardcoded always-on for clients; EXACTTRIGGER_TOUCH brush-face precision."
  worst_gaps:
    - "Porto portal ENTITY partially replaced by a seamless warpzone pair: no portal HEALTH (g_balance_portal_health=200, can't be shot down via Portal_Damage), no portal model/skins(0/1/2)/EF_RED/BLUE/STARDUST/ADDITIVE glow, no SND_PORTO_EXPLODE + EFFECT_ROCKET_EXPLODE on shoot-down, no SUB_SetFade 0.5s fade-out, no Portal_Customize independent-player hiding. (The 15s lifetime/timeout AND the SND_PORTO_EXPIRE natural-expiry cue are now DONE — see below.)"
    - "Portal_WillHitPlane predict-ahead crossing (PHYS_GRAVITY-aware tracebox over velocity*2*frametime, portals.qc:237/317) and grappling-hook teleport through the portal (Portal_Think iterates weaponentity.hook) are still absent on the warpzone path — a fast mover relies on the fixed trigger overlap, and an active hook is not relocated. (Flag exclusion + Amazing + FORCE_TDEATH + the 15s lifetime/expiry from this cluster are now DONE.)"
    - "Portal_FindSafeOrigin (move_out_of_solid 16u in front, portal_safe_origin) + CheckWireframeBox 96^3 clearance are not modeled on the warpzone realisation; the +/-48 plane-shift / Portal_ApplyTransformToPlayerAngle angle transform is substituted by the generic warpzone transform (correctness not behaviorally verified)."
    - "g_telefrags_avoid is registered but PickDestination/CheckTdeath still force telefrag-avoid always-on for clients rather than reading the cvar / STAT(TELEPORT_TELEFRAG_AVOID) — equivalent at the Base default (1) but a `set g_telefrags_avoid 0` would not actually disable avoidance."
    - "g_balance_portal_lifetime / g_balance_portal_health are NOT registered in Cvars.cs (read raw via GetFloat with a 15f test-path fallback); lifetime is functionally correct at default and a live `set` applies, but the health cvar drives nothing (no portal-health entity)."
