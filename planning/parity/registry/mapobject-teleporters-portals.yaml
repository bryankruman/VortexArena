last_audited: "2026-06-22"
summary:
  feature_count: 17
  worst_gaps:
    - "Porto portal ENTITY entirely replaced by a seamless warpzone pair: no portal health (200), no 15s lifetime/fade/recharge, no portal model/skins(0/1/2)/EF_RED/BLUE/STARDUST/ADDITIVE, no explode/expire sounds, no Portal_Customize independent-player hiding."
    - "Map-teleporter telefrag gate is only g_telefrags; missing Base's !g_race && !g_cts && !(round pre-start) suppression — spawn-overlap kills fire in Race/CTS and during the round countdown. TELEPORT_FLAG_FORCE_TDEATH (portal path) also unmodeled."
    - "g_telefrags / g_telefrags_teamplay / g_telefrags_avoid are NOT registered in Cvars.cs: server overrides are inert and g_telefrags_teamplay falls back to 0 (Base default 1) so the port telefrags a teammate at the exit; Base spares them."
    - "ANNCE_ACHIEVEMENT_AMAZING (portal telefrag within 1s of creation) is never triggered on the warpzone-realised portal path."
    - "Second teleport flash emitted at the exit origin instead of Base's to + v_forward*32 (32u ahead of the exit); EF_TELEPORT_BIT player-model dissolve/flash never toggled."
