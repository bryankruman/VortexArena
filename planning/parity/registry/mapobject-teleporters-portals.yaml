last_audited: "2026-06-22"
summary:
  feature_count: 17
  reaudit_note: "RE-AUDITED 2026-06-22 post-Waves-1/2 against current branch claude/parity-port-waves. Every WAVE-2 FIX claim independently re-verified in code (and via git diff ec788f7): map-teleporter telefrag rules, team gating, FX flash debounce/offset, noise word-list, and the full Porto touch-tree/sound rework are GENUINELY closed and live. No regressions found. Residual open items are the portal-ENTITY architectural divergence + a handful of dead/stub seams (TeleportRoundGateSuppressed stub, PortalClearWithId unassigned, CH_TRIGGER channel mislabel, g_telefrags_avoid hardcoded)."
  worst_gaps:
    - "Porto portal ENTITY entirely replaced by a seamless warpzone pair: no portal health (200), no 15s lifetime/fade/recharge, no portal model/skins(0/1/2)/EF_RED/BLUE/STARDUST/ADDITIVE, no explode/expire sounds, no Portal_Customize independent-player hiding. (UNCHANGED by Waves 1-2.)"
    - "Porto portal-pair lifecycle absent: re-shot/death never tears down a prior pair AND warpzones never expire, so a player accumulates permanent two-way warpzones; PortalClearWithId is now CALLED in Porto.cs but no host wires it (the delegate is never assigned), so a failed combined shot still leaves its in-portal warpzone live. (STILL OPEN; partial dead seam.)"
    - "Portal-specific teleport extras still absent on the warpzone path: ANNCE_ACHIEVEMENT_AMAZING, portal_activatetime self-skip, IS_INDEPENDENT_PLAYER gating, portal-owner kill-credit, Portal_WillHitPlane predict-ahead crossing, and grappling-hook teleport. (STILL OPEN.)"
    - "teleporters.qc !g_race && !g_cts && !(round pre-start) telefrag suppression is a stub (TeleportRoundGateSuppressed()=>false) — the gate STRUCTURE now matches Base incl. FORCE_TDEATH, but the race/cts/round-prestart accessor is not yet wired, so a spawn-overlap can still telefrag during a round countdown / in Race/CTS."
    - "EF_TELEPORT_BIT player-model dissolve/restart-anim flash still never toggled on teleport (cosmetic)."
