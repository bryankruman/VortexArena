last_audited: "2026-06-25"
summary:
  feature_count: 17
  reaudit_note: "DRIFT RE-AUDIT 2026-06-25 against current branch claude/parity-port-waves. Net movement since the 2026-06-22 baseline is positive (5 fixes, 0 regressions). FIXES: (1) the teleport SOUND channel is now SoundChannel.TriggerAuto (CH_TRIGGER -3) — was the mislabeled Item(3); audio now faithful. (2) EF_TELEPORT_BIT is now XOR-toggled on teleport (Teleporters.cs:359) and istypefrag is now set (Teleporters.cs:383) — the two map-teleporter core gaps closed, presentation now faithful. (3) The Porto portal cleanup seams are now FULLY WIRED: GameWorld.cs:421-429 assigns PortalSpawner / PortalClearWithId / PortalClearAll to Warpzones.{PlacePortoPortal,ClearPortoPortal,ClearAllPortoPortals}; the static delegate is no longer dead. (4) Player death/reset now tears down ALL of an owner's portals (Porto.WrPlayerDeath -> PortalClearAll, and Race.cs:372 on checkpoint), so portals no longer outlive their owner. (5) portal_activatetime self-skip + portal-owner kill-credit are now modeled on the warpzone Teleport path (Warpzone.cs:231-235,263-272). RESIDUAL OPEN (architectural / unchanged): the whole portal-ENTITY model (health 200, 15s lifetime/fade, MDL_PORTAL skins, EF glow, explode/expire sounds, Portal_Customize), the ANNCE_ACHIEVEMENT_AMAZING announcer, Portal_WillHitPlane predict-ahead + hook teleport + flag exclusion, the TeleportRoundGateSuppressed stub (race/cts/round-prestart), g_telefrags_avoid still hardcoded for clients, and re-shoot-replaces-prior-pair."
  worst_gaps:
    - "Porto portal ENTITY entirely replaced by a seamless warpzone pair: no portal health (200), no 15s lifetime/fade/recharge, no portal model/skins(0/1/2)/EF_RED/BLUE/STARDUST/ADDITIVE, no explode/expire sounds, no Portal_Customize independent-player hiding. (UNCHANGED.)"
    - "Portal-specific teleport extras still absent on the warpzone path: ANNCE_ACHIEVEMENT_AMAZING (portal telefrag within 1s of creation), IS_INDEPENDENT_PLAYER gating, Portal_WillHitPlane predict-ahead crossing, grappling-hook teleport, and item_flag_team exclusion. (STILL OPEN.)"
    - "Warpzone portals never EXPIRE: there is no 15s g_balance_portal_lifetime / fade-out, so a portal pair persists for the whole match (death/reset teardown is now wired, but a living player's pair never times out). Re-shooting after a completed pair does not tear down the prior pair either (Base Portal_SetInPortal disconnects the old)."
    - "teleporters.qc !g_race && !g_cts && !(round pre-start) telefrag suppression is STILL a stub (TeleportRoundGateSuppressed()=>false, Teleporters.cs:485) — the gate STRUCTURE matches Base incl. FORCE_TDEATH, but the race/cts/round-prestart accessor is not yet wired, so a spawn-overlap can still telefrag during a round countdown / in Race/CTS."
    - "FORCE_TDEATH is wired for map teleporters but the Porto warpzone crossing does NOT route through TeleportPlayer (it warps via Warpzone.Teleport), so a portal crossing applies no tdeath at all (no force-telefrag of the exit)."
