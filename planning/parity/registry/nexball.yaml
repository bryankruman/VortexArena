last_audited: "2026-06-25"
summary:
  feature_count: 20
  worst_gaps:
    - "Ball-launcher weapon (BallStealer / WEP_NEXBALL) is FULLY PORTED and LIVE — a basketball carrier can charge-and-shoot the ball (power meter, primary launch), safe-pass to a locked teammate (homing arc), and tackle/steal (secondary projectile). The safe-pass CROSSHAIR LOCK is now also ported (CarryFrame -> UpdateSafePassLock runs crosshair_trace each frame and sets ball.enemy/ball.wait), so the secondary safe-pass branch is now reachable on the live path. The whole weapon + carry chain is faithful & live."
    - "STAT(OBJECTIVE_STATUS) NB_CARRYING bit is still not networked (no nexball case in any GametypeStatusBlock; no NB_CARRYING anywhere in the port); held-ball forteam-return notification (INFO_NEXBALL_RETURN_HELD) not sent."
    - "No HUD mod-icon: no carrying indicator, no charge-meter progress bar, no nexball event-chase camera; accuracy/item-stats scoreboard panels not hidden for nexball. NB_METERSTART also not networked so a drawer would have no data."
    - "Minor presentation: ball scale 1.3 + glow_trail render still client-deferred (SpawnForGametype never sets e.Scale); carrier glow + waypoint sprites + viewmodel scale (0.25) + EF_FLAME lock indicator client-deferred (QC ball_customize is CSQC)."
    - "SpectateCopy hook (copy NB_METERSTART to spectator) absent; ForbidDropCurrentWeapon's WEP_MORTAR special-case folded/approximated into ForbidThrow."
