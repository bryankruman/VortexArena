summary:
  feature_count: 17
  worst_gaps:
    - "No ball-launcher weapon: a basketball carrier still cannot SHOOT the ball (no WEP_NEXBALL / BallStealer, no weapon-arena swap, no power meter, no tackle/safe-pass projectile)."
    - "No per-frame carry layer: no view-ball positioning in front of the carrier, no carrier slowdown (highspeed 0.8), no safe-pass crosshair lock, no NB_CARRYING objective-status bit networked."
    - "No HUD mod-icon: no carrying indicator, no charge-meter bar, no nexball event-chase camera."
    - "Presentation deferred: ball model/scale/glow-trail and the carrier glow are config-described but the client never renders them; no waypoint sprites."
    - "Minor: goal SCORE sound uses kh/capture not ctf/respawn.wav; GameStartTime not synced into the gametype (ball releases at sim +3 s, not match-start +3 s); drop-on-disconnect / drop-on-observe hooks absent."
