unit: nexball
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 17
  worst_gaps:
    - "No ball-launcher weapon: a basketball carrier cannot shoot the ball at all (no WEP_NEXBALL / BallStealer, no weapon-arena handler)."
    - "No football kick physics: touching the ball always 'carries' it; there is no soccer-style velocity boost, so footballs cannot be moved toward a goal."
    - "No ball lifecycle thinks: ball never auto-releases at match start, never idle-resets, and a goal resets it instantly (no delay_goal/idle/start)."
    - "No power meter, no safe-pass, no tackle-steal, no anti-ballcamp drop, no carrier slowdown."
    - "No presentation: no ball model/trail, no carry view-ball, no HUD carrying icon / power-meter bar; and the registered NB_* sounds are never played."
