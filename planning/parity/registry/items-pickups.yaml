summary:
  feature_count: 24
  worst_gaps:
    - "NEW (2026-07-02 coverage fold): the map-superweapon tail of weapon_defaultspawnfunc is unported — a map-spawned superweapon never gets superweapons_finished seeded (g_balance_superweapons_time, spawning.qc:104-106) so its pickup applies a 0s superweapon timer, and the +/-10s superweapon respawn jitter (g_pickup_respawntimejitter_superweapon) is never set on weapon items."
    - "NEW (2026-07-02 coverage fold): give/target_give POSTGIVE feedback is silent (GiveSound/GiveRot not ported); the menu Guide's Items topic lists no entries (health/armor/ammo describe() text unported); dumpitems command missing."
    - "simple items (sv_simple_items, Base default 1) STILL not ported: always renders the 3D model, never the flat _simple sprite (no _simple model resolver, no bob suppression). The only remaining ITS_* bit Item_Show doesn't honor."
    - "2026-07-05 (playtest #29): ghost + stay-weapon COLORMOD now APPLIED — SetTreeColormod (ClientWorld) tints items via cached per-surface override variants of the shared materials (never mutates AssetSystem's cached materials); DriveItemGhostFx pushes cl_ghost_items_color, DriveItemStayFx pushes cl_weapon_stay_color. NB earlier rows misread the default: '-1 -1 -1' is a REAL negative colormod (clamps to BLACK — the dark ghost silhouette); '0 0 0' is Base's leave-unchanged sentinel (cfg description + DP only copies a non-zero colormod). Remaining: vehicle-hud item tint (cl_items_vehicle_*) — no vehicle-hud item pass exists; ShaderMaterial item surfaces stay untinted (alpha-only)."
    - "q3compat item-origin offset (z += -15 - mins.z) + item_armor1->ArmorSmall(shard) on Q3 maps remain DEAD: code present (StartItem) but gated on Q3CompatProvider, never wired."
    - "small-item clustering (setItemGroup / setItemGroupCount, 120qu radius -> item_group/item_group_count) still MISSING — itemstime HUD can't show a single 'xN' badge for a packed cluster. Presentation-only, low impact."
    - "RE-AUDIT 2026-06-28 (parity-port-waves Phases 1-4): this wave touched NO items-pickups code — git diff fbb18fd..HEAD shows zero changes under Gameplay/Items/* (only ClientWorld.cs gained the cosmetic add-on layer / crosshair-chase body-fade / cylindric-line pool / raptor pitch-roll, none of them item paths). All 4 remaining gaps (simple items, stay-weapon colormod + vehicle tint, q3compat origin/shard via unwired Q3CompatProvider, item_group clustering) re-verified UNCHANGED in the current port. NB: ClientWorld now applies a frozen ICE colormod to PLAYER meshes (ModelTint.SetColormod, cosmetic layer) — this does NOT contradict the 'item meshes have no per-instance colormod' claim; the colormod uniform stays player-skin-shader-only for items. Nothing closed, nothing regressed."
