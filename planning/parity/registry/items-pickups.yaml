  - id: items-pickups.touch.gate
    name: "Item_Touch gate (FL_PICKUPITEMS / dead / SOLID_TRIGGER / owner / spawnshield) + ItemTouch/ItemTouched hooks"
    layer: [authority]
    base_refs:
      - "server/items/items.qc:Item_Touch"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Items/ItemPickupRules.cs:ItemTouch"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorHooks.cs:FireItemTouch / FireItemTouched"
    constants:
      - { name: "gate conditions", base: "FL_PICKUPITEMS && !IS_DEAD && SOLID_TRIGGER && owner!=toucher && time>=item_spawnshieldtime", port: "same", match: true }
      - { name: "loot NODROP/sky kill on touch", base: "ITEM_TOUCH_NEEDKILL -> RemoveItem", port: "LootInNoDrop -> RemoveItem (NODROP only; no sky-surface flag on the trace result)", match: partial }
      - { name: "expiring-timer relativize/restore", base: "subtract time then restore if !gave", port: "same", match: true }
      - { name: "MUTATOR_CALLHOOK(ItemTouch) before give", base: "items.qc:706", port: "MutatorHooks.FireItemTouch (ItemPickupRules.cs:372) — LIVE; subscribers Instagib/LMS/SuperSpec", match: true }
      - { name: "MUTATOR_CALLHOOK(ItemTouched) after give + wasfreed guard", base: "items.qc:746", port: "MutatorHooks.FireItemTouched (ItemPickupRules.cs:417) + IsFreed re-check — LIVE; subscribers Powerups/RandomItems", match: true }
      - { name: "pickup-sound channel", base: "powerup (non-resource) = CH_TRIGGER_SINGLE; else CH_TRIGGER", port: "all items on TriggerAuto (channel distinction dropped)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: faithful
      liveness: live
    intended_divergence: true
    divergence_rationale: "The only remaining divergence is the pickup-sound CHANNEL: QC plays a non-resource powerup's pickup sound on CH_TRIGGER_SINGLE (self-cutting) and everything else on CH_TRIGGER; the port plays all items on the auto/TriggerAuto channel so two quick pickups stack instead of one cutting the other off — a deliberate, documented choice in ItemPickupRules.PlayPickupSound."
    gaps:
      - "loot kill checks NODROP only via a zero-length trace; the QC Q3SURFACEFLAG_SKY surface test isn't represented (no sky-surface flag on the port trace result) — loot landing on a sky brush isn't auto-killed on touch."
    verification:
      - { kind: code_read, ref: "Item_Touch (items.qc:686-781) vs ItemTouch (ItemPickupRules.cs:349-435) — gate + give + tail match; ItemTouch (l.372) + ItemTouched (l.417) hooks now FIRED and have live subscribers (Instagib/LMS/SuperSpec ItemTouch.Add; Powerups/RandomItems ItemTouched.Add); pickup sound on TriggerAuto not CH_TRIGGER[_SINGLE]", result: pass }
      - { kind: code_read, ref: "MutatorHooks.cs:671/725 declare ItemTouch/ItemTouched HookChains; FireItemTouch/FireItemTouched at 679/732; subscribers grep-confirmed in 5 mutator/gametype files", result: pass }
      - { kind: unit_test, ref: "ItemSpawnTouchTests.ItemTouch_Gate_RejectsNonPickerAndDeadAndOwner", result: pass }
    confidence: high
    notes: "FIXED 2026-06-25: the ItemTouch/ItemTouched mutator hook chain (recorded MISSING in the prior baseline) is now present, fired in order (ItemTouch before give, ItemTouched after the pickup sound with the IsFreed/wasfreed re-check), and LIVE with real subscribers. RandomItems' re-randomize-on-pickup, SuperSpec's spectator item pass-through, Instagib/LMS item filtering all now flow. Remaining: pickup-sound channel (intended) + the sky-surface loot kill (gap)."

