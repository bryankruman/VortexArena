summary:
  feature_count: 16
  worst_gaps:
    - "simple items (sv_simple_items, Base default 1) STILL not ported: always renders the 3D model, never the flat _simple sprite (no _simple model resolver, no bob suppression). The only remaining ITS_* bit Item_Show doesn't honor."
    - "loot sky-surface (Q3SURFACEFLAG_SKY) kill-on-touch NOT represented: ITEM_TOUCH_NEEDKILL's NODROP half is ported but the sky-surface half isn't (no sky flag on the port trace result). Loot landing on a sky brush isn't auto-killed."
    - "q3compat item-origin offset (z += -15 - mins.z) + item_armor1->ArmorSmall(shard) on Q3 maps remain DEAD: code present (StartItem) but gated on Q3CompatProvider, never wired."
    - "FIXED 2026-06-25 (Wave 12b, commit 6da9e80): Item_Damage (loot destroyed by NEEDKILL/lava damage), item_use + item_setactive (targeted-item trigger-to-spawn + active-toggle relay), and Item_FindTeam (team-item one-at-a-time random spawn/respawn group) are ALL now ported AND live — the three rows the prior baseline recorded as missing/dead are now faithful."
    - "FIXED 2026-06-25 (Wave 8e): respawn-countdown WP_Item/WP_Weapon waypoint sprites + per-second ITEMRESPAWNCOUNTDOWN sound now ported (ItemPickupRules.RespawnCountdown ll.771-826). Also FIXED: ItemTouch/ItemTouched mutator hook chain present + live; Item_Show now emits EF_NODEPTHTEST/EF_FULLBRIGHT/powerup-glow EF_ADDITIVE directly."
