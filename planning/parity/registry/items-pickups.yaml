summary:
  feature_count: 12
  worst_gaps:
    - "cl_autoswitch / CTS autoswitch: FIXED (re-verified 2026-06-23) — AutoswitchProvider/CtsAutoswitchProvider/CtsActiveProvider are wired in the Commands ctor (Commands.cs:351-354) right beside Inventory.PriorityProvider: AutoswitchProvider=GetAutoswitch(p) (backed by the live _autoswitch dict, set by ClientCommand_autoswitch + sentcvar), CtsAutoswitchProvider=GetClientCvarFloat(p,\"cl_autoswitch_cts\",-1), CtsActiveProvider=_world.GameType is Cts. The Commands ctor runs for every GameWorld, so picking up a better weapon auto-switches on the real match path. (The DRIFT/net-entity-state 'dead' notes for this seam are STALE — they predate commit 4be8357.)"
    - "respawn-countdown waypoint sprites + per-second ITEMRESPAWNCOUNTDOWN sound STILL MISSING: long-respawn megas/powerups show no radar countdown and no ticking sound (item still reappears on time)."
    - "team-item random selection (Item_FindTeam) STILL not wired: maps grouping items by team spawn/respawn each independently instead of one-at-a-time."
    - "simple items (sv_simple_items, Base default 1) STILL not ported: always renders the 3D model, never the flat _simple sprite."
    - "distance alpha-fade (g_items_maxdist 4500 / cl_items_fadedist 500): FIXED 2026-06-23 — ClientWorld.ItemDistanceAlpha (game/client/ClientWorld.cs:1194-1222, added in Wave 1-2 ec788f7, absent on main) computes the QC base alpha and composes it multiplicatively under ghost/despawn exactly as ItemDraw does (lines 1097-1131). The baseline's 'CONFIRMED ABSENT' was a stale miss. (Edge: only runs for items that enter IsItemEntity — animating/ghost/expiring; a non-animating available item, e.g. spawnflag 1024, doesn't distance-fade.) FuelRegen/Jetpack pickup center-prints + negative-take TakeResourceWithLimit also live+faithful."
