  - id: items-pickups.touch.gate
    name: "Item_Touch gate (FL_PICKUPITEMS / dead / SOLID_TRIGGER / owner / spawnshield)"
    layer: [authority]
    base_refs:
      - "server/items/items.qc:Item_Touch"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Items/ItemPickupRules.cs:ItemTouch"
    constants:
      - { name: "gate conditions", base: "FL_PICKUPITEMS && !IS_DEAD && SOLID_TRIGGER && owner!=toucher && time>=item_spawnshieldtime", port: "same", match: true }
      - { name: "loot NODROP/sky kill on touch", base: "ITEM_TOUCH_NEEDKILL -> RemoveItem", port: "LootInNoDrop -> RemoveItem", match: partial }
      - { name: "expiring-timer relativize/restore", base: "subtract time then restore if !gave", port: "same", match: true }
      - { name: "pickup-sound channel", base: "powerup (non-resource) = CH_TRIGGER_SINGLE; else CH_TRIGGER", port: "all items on TriggerAuto (channel distinction dropped)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: faithful
      liveness: live
    intended_divergence: true
    divergence_rationale: "VERIFIER: the touch tail DOES play the item pickup sound (PlayPickupSound, the correct per-item cue), so audio is not 'na' as the draft had it. The only divergence is the CHANNEL: QC plays a powerup's pickup sound on CH_TRIGGER_SINGLE (self-cutting) and everything else on CH_TRIGGER; the port plays all items on the auto/TriggerAuto channel so two quick pickups stack instead of one cutting the other off — a deliberate, documented choice in ItemPickupRules.PlayPickupSound."
    gaps:
      - "loot kill checks NODROP only via a zero-length trace; the QC Q3SURFACEFLAG_SKY surface test isn't represented (no sky-surface flag on the port trace result) — loot landing on a sky brush isn't auto-killed on touch."
      - "ItemTouch / ItemTouched mutator hook chain not present (the port's ItemTouch has an explicit '// (3) MUTATOR_CALLHOOK(ItemTouch) — the port has no ItemTouch hook chain yet' comment) — mutators that redirect/augment a pickup on touch (MUT_ITEMTOUCH_RETURN/_PICKUP, ItemTouched) won't fire."
    verification:
      - { kind: code_read, ref: "Item_Touch (items.qc:686-781) vs ItemTouch — gate + give + tail match; ItemTouch/ItemTouched hooks absent (confirmed by port comment); pickup sound on TriggerAuto not CH_TRIGGER[_SINGLE]", result: pass }
      - { kind: unit_test, ref: "ItemSpawnTouchTests.ItemTouch_Gate_RejectsNonPickerAndDeadAndOwner", result: pass }
    confidence: high
    notes: "The give+respawn tail (UseTargets, pickup sound, loot-remove vs respawn split) is ported faithfully. The wasfreed(this) guard after the ItemTouched hook is moot since that hook isn't present."

