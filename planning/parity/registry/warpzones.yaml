    - "func_camera / func_warpzone_camera (fixed dpcamera view) not implemented."
    - "trigger_warpzone_reconnect + WarpZone_Think (runtime/moving-warpzone re-link) not implemented — links computed once at init."
    - "Observers / SOLID_NOT clients can't pass through warpzones (WarpZone_StartFrame per-frame observer warp unported)."
