unit: mutator-melee_only
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "SetWeaponArena hook is now LIVE on the loadout path (forces the start/warmup arena to 'off'), BUT the item-suppression gate (StartItem.cs:331, GiveItems.cs:161) still reads the RAW g_weaponarena cvar instead of the hook-resolved arena, so melee_only + a configured g_weaponarena still wrongly suppresses every medium/large health/armor + ammo pickup Base would keep. Liveness fixed; the observable pickup bug is not."
    - "ForbidRandomStartWeapons is STILL DEAD: FireForbidRandomStartWeapons / ForbidRandomStartWeapons.Call has zero callers; GiveRandomWeapons (SpawnSystem.cs:838-843) is gated only on g_random_start_weapons count and never consults the forbid hook. With g_weaponarena_random the random-start forbid is not honored (masked in practice by the per-spawn OnPlayerSpawn re-clear)."
    - "Mutator-string tags (:MeleeOnly / ', Melee only Arena') still not implemented: no BuildMutatorsString/BuildMutatorsPrettyString hook chain exists in the port (MutatorHooks.cs has neither). melee_only never appears in the active-mutator label or server-browser tag."
features:
  - id: melee_only.enable.predicate
    name: "Enable predicate (g_melee_only and not instagib/overkill/arena)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/melee_only/sv_melee_only.qc:REGISTER_MUTATOR(melee_only,...)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MeleeOnlyMutator.cs:IsEnabled"
    constants:
      - { name: "g_melee_only (default)", base: "0", port: "0", match: true }
      - { name: "cvar read", base: "expr_evaluate(autocvar_g_melee_only) [string expr]", port: "ExprEvaluate(GetString(\"g_melee_only\")) [string expr]", match: true }
      - { name: "exclude instagib", base: "!MUTATOR_IS_ENABLED(mutator_instagib)", port: "!OtherEnabled(\"instagib\")", match: true }
      - { name: "exclude overkill", base: "!MUTATOR_IS_ENABLED(ok)", port: "!OtherEnabled(\"overkill\")", match: true }
      - { name: "exclude weaponarena", base: "!MapInfo_LoadedGametype.m_weaponarena", port: "g_weaponarena cvar == 0f", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Arena exclusion is checked against the g_weaponarena CVAR (==0f) rather than Base's MapInfo_LoadedGametype.m_weaponarena (the LOADED-gametype arena flag). Equivalent for the common case (arena driven by the cvar), but a gametype that sets m_weaponarena without the cvar (or vice-versa) would diverge. Minor; the instagib/overkill exclusions and the string expr_evaluate read are now faithful."
    verification:
      - { kind: code, ref: "MeleeOnlyMutator.cs:23-28 = ExprEvaluate(GetString(g_melee_only)) && !OtherEnabled(instagib) && !OtherEnabled(overkill) && g_weaponarena==0; OtherEnabled reads the other mutator's IsEnabled (MeleeOnlyMutator.cs:32-33); InstagibMutator NetName=instagib, OverkillMutator NetName=overkill confirmed; IsEnabled gates Hook() at MutatorActivation.cs:64", result: pass }
    confidence: high
    notes: "FIXED vs baseline: the !instagib && !overkill && !arena exclusion now exists AND the cvar is read as a string expr via ExprEvaluate(GetString) (matching Base expr_evaluate(autocvar_g_melee_only), no longer GetFloat). logic/values partial->faithful. Residual minor divergence: cvar-gate vs m_weaponarena gametype flag. cvar seeded from port mutators.cfg:178 (verbatim from Base)."
