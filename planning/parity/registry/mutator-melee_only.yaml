    - "SetWeaponArena hook is LIVE on the loadout path (forces the start/warmup arena to 'off'), BUT the item-suppression gate (StartItem.cs:331, GiveItems.cs:161) still reads the RAW g_weaponarena cvar instead of the hook-resolved arena, so melee_only + a configured g_weaponarena still wrongly suppresses every medium/large health/armor + ammo pickup Base would keep. Liveness fixed; the observable pickup bug is not."
    - "Mutator-string handlers (:MeleeOnly / ', Melee only Arena') STILL not contributed by melee_only: the shared BuildMutatorsString/BuildMutatorsPrettyString infrastructure now EXISTS (GameplayBases virtuals + MutatorActivation chains; machine-string is LIVE at GameWorld.cs:865) but MeleeOnlyMutator does NOT override either method (only Midair/Vampire do), so melee_only never adds its tag. The pretty-string chain also still has no live caller."
