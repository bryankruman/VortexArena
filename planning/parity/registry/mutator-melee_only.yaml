    constants:
      - { name: "warmup_start_ammo_shells", base: "0", port: "0 (via OnPlayerSpawn, NOT via warmup loadout)", match: true }
      - { name: "warmup_start_weapons", base: "WEPSET(SHOTGUN)", port: "shotgun-only (via OnPlayerSpawn ClearWeapons+GiveWeapon)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The port's warmup spawn path (SpawnSystem.ApplyWarmupLoadout / GiveWarmupResources, SpawnSystem.cs:742) does NOT call SetStartItems — it unconditionally grants g_warmup_allguns (ALL non-hidden weapons, default true) + 30 shells, so the melee_only SetStartItems hook is bypassed during warmup. Faithful end-state is salvaged ONLY because the port-only OnPlayerSpawn (PlayerSpawn hook, fired AFTER PutPlayerInServer at ClientManager.cs:542 on every spawn incl. warmup) re-clears to shotgun + 0 shells. Remove OnPlayerSpawn and warmup melee_only would break."
    verification:
      - { kind: code, ref: "ApplyWarmupLoadout (SpawnSystem.cs:742-781) grants g_warmup_allguns + 30 shells, never calls ComputeStartItems/SetStartItems; OnPlayerSpawn (MeleeOnlyMutator.cs:60-72) runs after it (ClientManager.cs:542) and re-applies shotgun-only/0 shells", result: pass }
    confidence: medium
    notes: "CORRECTION vs draft: the draft asserted 'StartLoadout has no warmup twin so warmup implicitly = same loadout' and called OnPlayerSpawn redundant/no-effect. In fact the port DOES have a separate warmup loadout that bypasses the SetStartItems seam, and OnPlayerSpawn is LOAD-BEARING for warmup parity (and for re-clearing the per-respawn weapon set), not redundant. Net observable result matches Base, via a different (port-specific) mechanism."
  - id: melee_only.loadout.player_spawn_reapply
    name: "Per-spawn loadout re-apply (port-only PlayerSpawn handler)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/melee_only/sv_melee_only.qc:MUTATOR_HOOKFUNCTION(melee_only, SetStartItems)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MeleeOnlyMutator.cs:OnPlayerSpawn"
    constants:
      - { name: "weapons given", base: "(via start_weapons/warmup_start_weapons)", port: "ClearWeapons + GiveWeapon(shotgun) + SwitchToBest", match: true }
      - { name: "shells set", base: "(via start_ammo_shells/warmup_start_ammo_shells=0)", port: "SetResource(Shells, 0)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port-only PlayerSpawn handler with no Base counterpart. Base enforces the loadout purely through the start_*/warmup_start_* globals computed once at config; the port's SetStartItems seam covers only the non-warmup spawn path, so this per-spawn re-application is the mechanism that (a) enforces melee_only during WARMUP (where the warmup loadout bypasses SetStartItems and would otherwise grant all-guns+shells) and (b) guarantees the shotgun-only set on every respawn. Same observable loadout as Base, achieved by a port-specific code path."
    gaps: []
    verification:
      - { kind: code, ref: "OnPlayerSpawn live via ClientManager.cs:542 PlayerSpawn.Call (after PutPlayerInServer on every spawn); duplicates/enforces the shotgun-only loadout per spawn", result: pass }
    confidence: medium
    notes: "Reclassified intended_divergence:true (draft had false). It is NOT inert redundancy: it is the sole enforcer of melee_only's loadout during warmup. See melee_only.loadout.warmup."
  - id: melee_only.arena.force_off
    name: "Force weapon arena off (SetWeaponArena -> 'off')"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/melee_only/sv_melee_only.qc:MUTATOR_HOOKFUNCTION(melee_only, SetWeaponArena)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MeleeOnlyMutator.cs:OnSetWeaponArena"
    constants:
      - { name: "arena value", base: "\"off\"", port: "\"off\"", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "MutatorHooks.SetWeaponArena has no .Call site anywhere in the port, so the handler never runs. Impact is REAL (not latent): the port reads g_weaponarena as a bool gate that suppresses ALL weapon/ammo world-item spawns (StartItem.cs:304, GiveItems.cs:161). Base's melee_only forces g_weaponarena to 'off' precisely so those pickups still spawn (melee_only only filters SMALL health/armor). With melee_only + a configured g_weaponarena, the port wrongly suppresses every medium/large health/armor and ammo pickup that Base would keep."
    verification:
      - { kind: code, ref: "grep 'SetWeaponArena.Call' over src/ returns nothing; only subscribers found. StartItem.cs:304 / GiveItems.cs:161 read g_weaponarena!=0 as a pickup-suppression gate that melee_only never clears", result: fail }
    confidence: high
    notes: "CORRECTION vs draft: draft hedged 'impact depends on whether port reads g_weaponarena... port may not read it.' It DOES read g_weaponarena (StartItem.cs:304), so the dead hook has a concrete pickup-suppression bug under melee_only+arena, not merely latent. Edge config (host must set both cvars). Shared-infra gap (hook dead for all subscribers)."
