    confidence: medium
    notes: "Unchanged net result vs baseline. Wave-2 added the SetWeaponArena seam to the warmup path (SpawnSystem.cs:891-893); melee_only forces it 'off' so warmup still takes the allguns branch, and OnPlayerSpawn remains LOAD-BEARING for warmup parity. Not verified in a live match."
  - id: melee_only.loadout.player_spawn_reapply
    name: "Per-spawn loadout re-apply (port-only PlayerSpawn handler)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/melee_only/sv_melee_only.qc:MUTATOR_HOOKFUNCTION(melee_only, SetStartItems)"
    port_refs:
