      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "PARTIAL FIX. The SetWeaponArena hook is now LIVE on the LOADOUT path: SpawnSystem.ComputeStartItems (SpawnSystem.cs:679) and ApplyWarmupLoadout (SpawnSystem.cs:892) both call SetWeaponArena.Call, so melee_only's 'off' now correctly prevents an arena weapon loadout from replacing the shotgun start set. HOWEVER the item-suppression gate still reads the RAW cvar, not the hook result: StartItem.cs:331 (HavePickupItem) and GiveItems.cs:161 test g_weaponarena (GetFloat != 0f) directly. So melee_only forcing the resolved arena to 'off' does NOT clear that gate — with melee_only + a configured g_weaponarena, the port still wrongly suppresses every medium/large health/armor and ammo world-pickup that Base keeps (Base's 'off' would re-enable them). Real bug, edge config (host must set both g_melee_only and g_weaponarena)."
    verification:
      - { kind: code, ref: "OnSetWeaponArena (MeleeOnlyMutator.cs:103-107) sets Arena='off'; LIVE via SpawnSystem.cs:679 + :892 SetWeaponArena.Call. But StartItem.cs:331 / GiveItems.cs:161 read g_weaponarena cvar (GetFloat!=0f) as the pickup-suppression gate, which the hook never clears", result: fail }
    confidence: high
    notes: "Liveness FIXED vs baseline (dead->live): SetWeaponArena.Call is now wired into the loadout path (was zero call sites). The loadout-arena half of the feature is now faithful+live. The residual is the pickup-suppression coupling: the item gate reads the raw cvar instead of the resolved arena, so the observable pickup bug the baseline flagged remains. status logic/values=faithful (handler is correct + reached), liveness=live, but a concrete residual gap stays open."
