unit: mutator-melee_only
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "Enable predicate omits the !instagib && !ok && !weaponarena exclusion: melee_only can be active simultaneously with instagib/overkill/an arena gametype (Base keeps it inert in those combos); loadout then depends on hook order."
    - "SetWeaponArena hook is DEAD (no .Call site) AND the port actively reads g_weaponarena as a bool gate (StartItem.cs:304 suppresses ALL weapon/ammo pickups when g_weaponarena!=0). So melee_only + a configured g_weaponarena wrongly suppresses the medium/large/ammo pickups Base would still spawn."
    - "Enable cvar read as float (GetFloat!=0) instead of Base expr_evaluate(string) — agrees for 0/1 but not for string expressions."
    - "ForbidRandomStartWeapons hook is DEAD (no .Call site): with g_weaponarena_random the random-start forbid is not honored."
    - "Mutator-string tags (:MeleeOnly / ', Melee only Arena') not implemented AND the BuildMutatorsString/BuildMutatorsPrettyString hook chains do not exist in the port at all: melee_only never appears in the active-mutator label or server-browser tag."
features:
  - id: melee_only.enable.predicate
    name: "Enable predicate (g_melee_only and not instagib/overkill/arena)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/melee_only/sv_melee_only.qc:REGISTER_MUTATOR(melee_only,...)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MeleeOnlyMutator.cs:IsEnabled"
    constants:
      - { name: "g_melee_only (default)", base: "0", port: "0", match: true }
      - { name: "cvar read", base: "expr_evaluate(autocvar_g_melee_only) [string expr]", port: "GetFloat(\"g_melee_only\") != 0f [float]", match: false }
      - { name: "exclude instagib", base: "!MUTATOR_IS_ENABLED(mutator_instagib)", port: "none", match: false }
      - { name: "exclude overkill", base: "!MUTATOR_IS_ENABLED(ok)", port: "none", match: false }
      - { name: "exclude weaponarena", base: "!MapInfo_LoadedGametype.m_weaponarena", port: "none", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port reads only g_melee_only != 0; the !instagib && !ok && !weaponarena exclusion is missing, so melee_only can run at the same time as instagib/overkill/an arena (Base would leave it inactive). Loadout outcome then depends on hook order instead of being deterministic."
      - "Base uses expr_evaluate on the cvar STRING (autocvar_g_melee_only is a string, like rocketflying which the port ports via ExprEvaluate(GetString)); the port uses GetFloat != 0 — equivalent for plain 0/1 but not for string expressions, and a minor type-fidelity divergence vs the Base mutator."
    verification:
      - { kind: code, ref: "MeleeOnlyMutator.cs:21-22 reads only g_melee_only via GetFloat; grep over src/ found no instagib/overkill/arena exclusion; no MutatorActivation conflict pass excludes it", result: fail }
    confidence: high
    notes: "Comment at MeleeOnlyMutator.cs:20 says exclusion is 'the bootstrap's job' but no bootstrap/MutatorActivation implements it. cvar seeded from port mutators.cfg:178 (verbatim from Base mutators.cfg:178). values downgraded to partial for the float-vs-expr_evaluate read."
