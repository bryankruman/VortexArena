      - "src/XonoticGodot.Common/Gameplay/Nades/NadeThrow.cs:OffhandThink / CheckThrow"
      - "src/XonoticGodot.Common/Gameplay/Nades/NadesMutator.cs:OnPlayerPreThink / OnForbidThrowCurrentWeapon"
    constants:
