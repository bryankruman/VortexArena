    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Minor 1-tick latency: OffhandFirePressed is written in WeaponFireDriver.Frame (PostThink of tick N) and read by NadesMutator.OnPlayerPreThink/OffhandThink (PreThink of tick N+1). The held-button state persists across ticks, so prime-on-press and throw-on-release both fire correctly — but the held-button is observed one server tick stale. This is the headless analogue of QC's engine offhand_think dispatch and is behaviorally faithful."
      - "The QC PreThink (sv_nades.qc:733) calls offhand_think only when (offhand != OFFHAND_NADE || hasHook); the port calls OffhandThink when OffhandWeapon == \"nade\". This is the correct headless inversion: in QC, when the nade IS the offhand and no hook is held, the engine weapon-frame dispatches offhand_think itself (NOT the PreThink hook), whereas the headless port has no engine offhand dispatch so it drives it from PreThink. No double-drive (OffhandThink has exactly one caller)."
      - "g_nades_override_dropweapon read in OnForbidThrowCurrentWeapon but the cvar is not in the default cvar table (defaults to 0 via GetFloat fallback — faithful at defaults)."
    verification:
      - { kind: code, ref: "Chain: BindInput.cs:46 (+hook) -> BindTable._hook/HookHeld:169 -> NetGame.cs:3984 buttons|=Hook -> ServerNet.cs:1415 ButtonHook -> WeaponFireDriver.cs:66 OffhandFirePressed -> NadesMutator.cs:158/160 OffhandThink. ALL links present + live (WeaponFireDriver.Frame called GameWorld.cs:1368).", result: pass }
