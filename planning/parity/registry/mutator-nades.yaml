last_audited: "2026-06-27"
summary:
  feature_count: 22
  worst_gaps:
    - "THROW INPUT IS NOW LIVE (Wave-5, commit 66e378f): InputCommand.InputButtons gained the Hook bit (BIT(6) / PHYS_INPUT_BUTTON_HOOK, InputCommand.cs:20), and the full chain is wired end-to-end: the `+hook` bind (BindInput.cs:46 / KeyBindings.cs:43) -> BindTable._hook/HookHeld -> NetGame.cs:3984 sets the bit -> ServerNet.cs:1415 decodes ButtonHook -> WeaponFireDriver.Frame (GameWorld.cs:1368, live per-tick PostThink) sets player.OffhandFirePressed -> NadesMutator.OnPlayerPreThink reads it and drives NadeThrow.OffhandThink. The weapon_drop second-press path is ALSO live now: NadesMutator subscribes ForbidThrowCurrentWeapon (CBC_ORDER_LAST), which WeaponThrowing.ThrowWeapon/IsWeaponThrowable (the live impulse-17 `weapon_drop` path, WeaponImpulses.cs:117/181) dispatches -> NadeThrow.CheckThrow. So a player can now prime, charge, and throw a nade in a real match. The entire subsystem (charge, toss, all 11 booms, pickup, shoot-down, orbs, bonus economy) is reachable — liveness flips dead->live across nearly every row. One caveat: OffhandFirePressed is set in tick N's PostThink and read in tick N+1's PreThink (a 1-tick latency), but the held-button state persists across ticks so prime/charge/release work correctly; this is the faithful headless analogue of the engine offhand_think dispatch."
    - "Most PRESENTATION is still missing (headless port): no projectile model/trail (nade_customize/spawn_held_nade trail), no orb 3D model + 2D color flash (orb_draw/orb_draw2d), no darkness blind overlay (HUD_DarkBlinking) + SND_BLIND, no spawn-loc EF_STARDUST, no DrawAmmoNades bonus-nade ammo-panel icon. The wired charge ring (CrosshairPanel.NadeTimer) NOW actually shows because a nade can finally be primed."
    - "Lifecycle cleanup is now NEARLY COMPLETE (DRIFT 2026-06-27, post Wave-12b): on top of the Wave-6b MakePlayerObserver + ClientDisconnect leaks-fix, the port now ALSO wires reset_map_global (NadesMutator.ResetMapGlobal, called live GameWorld.cs:4454 ResetMap), PutClientInServer (OnPutClientInServer = RemoveBonus, called live ClientManager.cs:720 respawn), and SpectateCopy (OnSpectateCopy mirrors the spectatee's nade HUD/bonus stats, called live ClientManager.cs:662) — three of the four previously-missing hooks. All are g_nades-gated host seams (no MutatorHooks chain needed). The round-reset / respawn-into-server / spectator-mirror leaks are CLOSED. ONLY the dedicated DropSpecialItems hook remains unported, and its common case (the death-toss) is already covered by the PlayerDies hook; the residual is the non-death special-item-drop toss. lifecycle logic partial->faithful, liveness partial->live."
    - "nade_damage NOW INCLUDES the melee-slap branch (force*10, damage=max_health*0.1 for WEP_TYPE_MELEE_PRI/SEC, faithful) AND the Nade_Damage MUTATOR_CALLHOOK is now invoked (NadeProjectile.cs:207 MutatorHooks.FireNadeDamage; OverkillMutator.OnNadeDamage subscribes for okhmg_nadesupport) — this closed the last logic gap on the damage row. Remaining: napalm ball damageforcescale 4 still not applied (modeled as Burning status, no knockback); ice revival_time<1.5s re-freeze skip omitted; freezetag revive-nade still suppresses damage but never unfreezes/revives (FreezeTag seam). pokenade monster_lifetime (150s despawn) is ported + live."
    - "REGISTRY-FIX (2026-06-25): BuildMutatorsString/BuildMutatorsPrettyString are now OVERRIDDEN (NadesMutator.cs:79-80 -> ':Nades' / ', Nades'), so the display.mutators_string row flips missing->faithful (was newly-mapped 2026-06-25 as missing; the override exists in current code). MonsterDies bonus also flips dead->live: NadeBonus.OnMonsterDies now has a live caller at MonsterAI.cs:1695 (direct call from the monster death path, no MutatorHooks.MonsterDies chain needed)."
    - "DRIFT 2026-06-27 (fixes, post Wave-12b commit 6da9e80): a broad fidelity sweep closed five logic/values gaps. (1) LIFECYCLE: reset_map_global + PutClientInServer + SpectateCopy now exist as NadesMutator static seams (ResetMapGlobal/OnPutClientInServer/OnSpectateCopy, NadesMutator.cs:321/337/349) AND have LIVE host callers (GameWorld.cs:4454 ResetMap, ClientManager.cs:720 respawn, ClientManager.cs:662 SpectateCopy) — three of the four previously-missing lifecycle hooks are now wired+live; only the dedicated DropSpecialItems hook remains unported (its common case, the death-toss, is already covered by PlayerDies). lifecycle logic partial->faithful, liveness partial->live. (2) ICE: the just-revived re-freeze skip (revival_time<1.5s, NadeIceBoom.cs:105) AND the round-not-started delete guard (RoundHandler.RoundGateBlocks, :60) are now implemented — ice logic partial->faithful. (3) NAPALM: water-contents velocity damping (WaterDamp via PointContents, NadeNapalmBoom.cs:37) AND the round-not-started guard are now ported; and damageforcescale=4 is RECLASSIFIED as inert-in-Base (the balls/fountain use PROJECTILE_MAKETRIGGER and never set takedamage=DAMAGE_AIM, so the Base force scale never multiplies anything either — napalm.qc:69-83) — napalm logic partial->faithful, values partial->faithful, the damageforcescale constant match false->true. (4) ENTRAP/VEIL/DARKNESS: the entrap monster run/walk slow (MonsterAI.cs:1011-1012) AND the veil monster-alpha lapse (MonsterAI.cs:945-946) are now ported inline in MonsterAI.Move — entrap_veil_darkness logic partial->faithful; only render (veil enemy tint, darkness blind overlay) + audio (SND_BLIND) gaps remain. All Base hooks remain mapped (no new_unmapped)."
    - "DRIFT 2026-06-26 (fix): the bonus.economy bank-a-nade notification + sound are now EMITTED (NadeBonus.GiveBonus, NadeBonus.cs:53-54): CENTER_NADE_BONUS via NotificationSystem.Send + SND_NADE_BONUS via SoundSystem.PlayOn, both registered (NotificationsList.cs:496, SoundsList.cs:180 -> kh/alarm == Base SND_KH_ALARM) and on the live path. bonus.economy presentation+audio missing->faithful. Additionally the VIP/flagcarrier bonus multiplier (g_nades_bonus_score_time_flagcarrier=2 + GameRules_scoring_is_vip + KH key count) is now wired in OnPlayerDies/OnPlayerPreThink — the previously-MISSING flagcarrier cvar is consumed (constant match false->true); logic/values held at partial pending per-gametype ScoringIsVip/KeyHuntKeyCount fidelity."
