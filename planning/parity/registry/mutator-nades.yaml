summary:
  feature_count: 21
  worst_gaps:
    - "The throw input is dead: InputCommand.InputButtons (src/XonoticGodot.Net/InputCommand.cs:11) has NO nade/offhand/hook/weapon_drop bit (only Attack/Jump/Attack2/Zoom/Crouch/Use), and Entity.OffhandFirePressed is ASSIGNED NOWHERE in src/ (verified: only HookMutator/OffhandBlasterMutator/NadesMutator READ it; NadeAltButton is set only inside NadeThrow itself, never by input). So OffhandThink runs every tick with keyPressed=false and a player can never prime or throw a nade. NadeThrow.CheckThrow (the weapon_drop path) has no caller (NadesMutator does not subscribe ForbidThrowCurrentWeapon). The entire subsystem (charge, toss, all 11 booms, pickup, shoot-down, orbs) is dead on the live path — same wire as the offhand hook/blaster (TODO.md T11)."
    - "All presentation is missing (headless port): no projectile model/trail (nade_customize/spawn_held_nade trail), no orb 3D model + 2D color flash (orb_draw/orb_draw2d), no darkness blind overlay (HUD_DarkBlinking) + SND_BLIND, no spawn-loc EF_STARDUST, no DrawAmmoNades bonus-nade ammo-panel icon. The only wired piece — the held-nade charge ring (CrosshairPanel.NadeTimer) — never shows because no nade can be primed."
    - "Lifecycle cleanup hooks are NOT ported: NadesMutator subscribes ONLY PlayerSpawn/PlayerPreThink/PlayerDies/DamageCalculate. MakePlayerObserver / ClientDisconnect / reset_map_global (nades_RemovePlayer = nades_Clear + RemoveBonus + delete spawnloc), PutClientInServer (RemoveBonus), SpectateCopy (copy nade stats to spectator), VehicleEnter (toss held nade), and DropSpecialItems (toss held nade) are all unsubscribed/absent — a held nade, banked bonus, or spawn marker leaks across observer/disconnect/round-reset, and a player entering a vehicle keeps a primed nade. nades_Clear/RemoveBonus exist as methods but have no live caller for these paths."
    - "nade_damage omits the melee-slap branch (force*10, damage=max_health*0.1 for melee primary/secondary weapons) and the Nade_Damage mutator hook; napalm ball damageforcescale 4 is not applied (modeled as Burning status, no knockback); pokenade monster_lifetime (150s despawn) is missing; freezetag revive-nade suppresses damage but never unfreezes/revives (FreezeTag seam); ice revival_time<1.5s re-freeze skip omitted."
