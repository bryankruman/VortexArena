    gaps:
      - "No latency gap for humans (re-verified 2026-06-27, post Wave-17): OffhandFirePressed is now published BEFORE the PlayerPreThink hook in the SAME tick for human players — GameWorld.OnClientMove (GameWorld.cs:2225-2234) reads InputProvider(p).ButtonHook and sets p.OffhandFirePressed = hookPressed && Vehicle is null right before the offhand_think runs, so the +hook offhand reacts same-tick (matching QC W_WeaponFrame's same-frame dispatch). Bots keep the WeaponFireDriver PostThink publish (WeaponFireDriver.cs:69), a 1-tick stale read — but bots never bind +hook so the offhand/nade path is moot for them. The earlier '1-tick latency for all players' note is superseded."
      - "The QC PreThink (sv_nades.qc:733) calls offhand_think only when (offhand != OFFHAND_NADE || hasHook); the port calls OffhandThink when OffhandWeapon == \"nade\". This is the correct headless inversion: in QC, when the nade IS the offhand and no hook is held, the engine weapon-frame dispatches offhand_think itself (NOT the PreThink hook), whereas the headless port has no engine offhand dispatch so it drives it from PreThink. No double-drive (OffhandThink has exactly one caller)."
      - "g_nades_override_dropweapon read in OnForbidThrowCurrentWeapon but the cvar is not in the default cvar table (defaults to 0 via GetFloat fallback — faithful at defaults)."
    verification:
      - { kind: code, ref: "Re-verified 2026-06-27 (post Wave-17, nade code untouched by W16/W17): +hook chain InputCommand.InputButtons.Hook=BIT(6) (InputCommand.cs:20) -> GameWorld.OnClientMove (GameWorld.cs:2223-2227, humans) publishes p.OffhandFirePressed = InputProvider(p).ButtonHook && Vehicle is null BEFORE the PlayerPreThink hook (same-tick) -> NadesMutator.OnPlayerPreThink reads player.OffhandFirePressed (NadesMutator.cs:177) -> NadeThrow.OffhandThink (NadesMutator.cs:179). Bots use the WeaponFireDriver.cs:69 PostThink publish (moot — bots don't bind +hook). LIVE.", result: pass }
      - { kind: code, ref: "weapon_drop path: NadesMutator.Hook subscribes MutatorHooks.ForbidThrowCurrentWeapon (NadesMutator.cs:66, HookOrder.Last); OnForbidThrowCurrentWeapon (NadesMutator.cs:97-116) dispatches NadeThrow.CheckThrow when the nade is the offhand / hook held / override set, suppressing the real drop (return true) == sv_nades.qc:715. LIVE on the impulse-17 weapon_drop path.", result: pass }
