frozen ice block / buff glow. ALL of this is wired into the live per-frame client passes (ClientEntityView entity stream + NetGame per-frame view-effects + ClientWorld cosmetic/projectile passes) and the throw path is already live (Wave-5), so the data FLOWS. **BUT none of it is RUNTIME/visually verified** — no in-game screenshot, no playtest, ZERO new tests cover the renderers/overlays/ammo-cell. Per parity-diff discipline (visible fidelity not runtime-verified ⇒ unknown, not faithful): the newly-coded presentation rows move missing→UNKNOWN (liveness missing/partial→live: the render path IS reached), NOT missing→faithful. Models present: grenademodel.md3 ✓, marker.md3 ✓; sphere.md3 is at models/sphere/sphere.md3 (renderer requests 'models/sphere.md3' → may miss → graceful glow-sprite fallback, a path nit to verify). Logic/values/audio of the new presentation are code-faithful to QC by inspection but the visual result is unconfirmed. The earlier-closed authority rows (throw input live, IsEnabled, boom dispatch logic, all 11 boom gameplay, bonus economy, lifecycle) are UNCHANGED by this wave and still hold."
    - "RE-AUDIT 2026-06-28 (post parity Phase-1/Phase-2, OPUS): the Phase-1 (60d45f5) + Phase-2 (493c876) waves touched NO nades-mutator code — git show --stat confirms zero src/.../Nades/ files in either commit; they built the WaypointSprite subsystem, the wepent channel, the objective/turret entity stream, and weapon visuals. The `Grenade` hits in game/client/ProjectileCatalog.cs / ProjectileRenderer.cs are the MORTAR weapon projectile (string match `grenade|nade|mortar` for the GL bouncing model), NOT the nades-mutator offhand nade — so no nade-projectile/orb/trail presentation landed. All previously-closed rows RE-VERIFIED against current code and still hold: throw input live (GameWorld.cs:2225-2234 same-tick publish of OffhandFirePressed from InputProvider(p).ButtonHook BEFORE the PlayerPreThink hook — line drifted 2223->2225 from the phases' GameWorld edits, functionally identical, no regression; + ForbidThrowCurrentWeapon subscribed NadesMutator.cs:66 HookOrder.Last), IsEnabled = g_nades!=0 (NadesMutator.cs:31), BuildMutators*String overrides present (NadesMutator.cs:74+). No regressions, no newly-closed rows, no new gaps. The unit's open set is UNCHANGED from the 2026-06-27 audit: render/audio presentation (projectile model/trail, orb 3D model + 2D color flash, darkness blind overlay, EF_STARDUST, DrawAmmoNades) + a few logic seams (newton-style-0 blend, freezetag actual-unfreeze, g_nades_client_select per-client type, DropSpecialItems non-death toss, translocate move_out_of_solid robustness, blaster 0-damage dispatch)."
    - "RE-AUDIT 2026-06-27 (post Wave-16/17, OPUS): Waves 16/17 made NO changes to any src/.../Nades/ file (git show --stat b3a9c06/2f0bfdb confirms — they touched GameWorld.cs etc. but nothing nade-related). All previously-closed rows RE-VERIFIED against current code and still hold live: throw input (GameWorld.cs:2223-2227 same-tick publish + ForbidThrowCurrentWeapon subscribed NadesMutator.cs:66), host seams ResetMapGlobal/OnPutClientInServer/OnSpectateCopy with live callers (GameWorld.cs:4628, ClientManager.cs:743/685), nade_damage melee branch + FireNadeDamage hook (NadeProjectile.cs:208/236-244) + Overkill subscriber (OverkillMutator.cs:142/496), napalm water-damp/round-guard/damageforcescale-inert (NadeNapalmBoom.cs:37/119/94), ice revival-skip/round-guard (NadeIceBoom.cs:105/60), entrap/veil/lifetime in MonsterAI (1131/1067/1396), bonus notif+sound (NadeBonus.cs:53/57) + live MonsterDies (MonsterAI.cs:1970). ONE refinement: the throw.input_wire '1-tick latency' caveat is now obsolete for humans (input published before PreThink same-tick); only bots read stale and they don't bind +hook. No regressions, no newly-closed rows, no new gaps."
    - "THROW INPUT IS NOW LIVE (Wave-5, commit 66e378f): InputCommand.InputButtons gained the Hook bit (BIT(6) / PHYS_INPUT_BUTTON_HOOK, InputCommand.cs:20), and the full chain is wired end-to-end: the `+hook` bind (BindInput.cs:46 / KeyBindings.cs:43) -> BindTable._hook/HookHeld -> NetGame.cs:3984 sets the bit -> ServerNet.cs:1415 decodes ButtonHook -> WeaponFireDriver.Frame (GameWorld.cs:1368, live per-tick PostThink) sets player.OffhandFirePressed -> NadesMutator.OnPlayerPreThink reads it and drives NadeThrow.OffhandThink. The weapon_drop second-press path is ALSO live now: NadesMutator subscribes ForbidThrowCurrentWeapon (CBC_ORDER_LAST), which WeaponThrowing.ThrowWeapon/IsWeaponThrowable (the live impulse-17 `weapon_drop` path, WeaponImpulses.cs:117/181) dispatches -> NadeThrow.CheckThrow. So a player can now prime, charge, and throw a nade in a real match. The entire subsystem (charge, toss, all 11 booms, pickup, shoot-down, orbs, bonus economy) is reachable — liveness flips dead->live across nearly every row. Re-verified 2026-06-27 (post Wave-17; W16/W17 touched NO nade code — git show --stat confirms): for HUMANS the +hook button is now published BEFORE PlayerPreThink in the same tick (GameWorld.OnClientMove, GameWorld.cs:2223-2227: p.OffhandFirePressed = InputProvider(p).ButtonHook && Vehicle is null), so the offhand reacts same-tick with no latency (matching QC W_WeaponFrame). Only bots keep the WeaponFireDriver.cs:69 PostThink (1-tick stale) publish, and bots never bind +hook so the nade/offhand path is moot for them — the earlier 'all players 1-tick latency' caveat is superseded."
    - "Most PRESENTATION is still missing (headless port): no projectile model/trail (nade_customize/spawn_held_nade trail), no orb 3D model + 2D color flash (orb_draw/orb_draw2d), no darkness blind overlay (HUD_DarkBlinking) + SND_BLIND, no spawn-loc EF_STARDUST, no DrawAmmoNades bonus-nade ammo-panel icon. The wired charge ring (CrosshairPanel.NadeTimer) NOW actually shows because a nade can finally be primed."
    - "Lifecycle cleanup is now NEARLY COMPLETE (DRIFT 2026-06-27, post Wave-12b): on top of the Wave-6b MakePlayerObserver + ClientDisconnect leaks-fix, the port now ALSO wires reset_map_global (NadesMutator.ResetMapGlobal, called live GameWorld.cs:4454 ResetMap), PutClientInServer (OnPutClientInServer = RemoveBonus, called live ClientManager.cs:720 respawn), and SpectateCopy (OnSpectateCopy mirrors the spectatee's nade HUD/bonus stats, called live ClientManager.cs:662) — three of the four previously-missing hooks. All are g_nades-gated host seams (no MutatorHooks chain needed). The round-reset / respawn-into-server / spectator-mirror leaks are CLOSED. ONLY the dedicated DropSpecialItems hook remains unported, and its common case (the death-toss) is already covered by the PlayerDies hook; the residual is the non-death special-item-drop toss. lifecycle logic partial->faithful, liveness partial->live."
    - "nade_damage NOW INCLUDES the melee-slap branch (force*10, damage=max_health*0.1 for WEP_TYPE_MELEE_PRI/SEC, faithful) AND the Nade_Damage MUTATOR_CALLHOOK is now invoked (NadeProjectile.cs:207 MutatorHooks.FireNadeDamage; OverkillMutator.OnNadeDamage subscribes for okhmg_nadesupport) — this closed the last logic gap on the damage row. Remaining: napalm ball damageforcescale 4 still not applied (modeled as Burning status, no knockback); ice revival_time<1.5s re-freeze skip omitted; freezetag revive-nade still suppresses damage but never unfreezes/revives (FreezeTag seam). pokenade monster_lifetime (150s despawn) is ported + live."
    - "REGISTRY-FIX (2026-06-25): BuildMutatorsString/BuildMutatorsPrettyString are now OVERRIDDEN (NadesMutator.cs:79-80 -> ':Nades' / ', Nades'), so the display.mutators_string row flips missing->faithful (was newly-mapped 2026-06-25 as missing; the override exists in current code). MonsterDies bonus also flips dead->live: NadeBonus.OnMonsterDies now has a live caller at MonsterAI.cs:1695 (direct call from the monster death path, no MutatorHooks.MonsterDies chain needed)."
    - "DRIFT 2026-06-27 (fixes, post Wave-12b commit 6da9e80): a broad fidelity sweep closed five logic/values gaps. (1) LIFECYCLE: reset_map_global + PutClientInServer + SpectateCopy now exist as NadesMutator static seams (ResetMapGlobal/OnPutClientInServer/OnSpectateCopy, NadesMutator.cs:321/337/349) AND have LIVE host callers (GameWorld.cs:4454 ResetMap, ClientManager.cs:720 respawn, ClientManager.cs:662 SpectateCopy) — three of the four previously-missing lifecycle hooks are now wired+live; only the dedicated DropSpecialItems hook remains unported (its common case, the death-toss, is already covered by PlayerDies). lifecycle logic partial->faithful, liveness partial->live. (2) ICE: the just-revived re-freeze skip (revival_time<1.5s, NadeIceBoom.cs:105) AND the round-not-started delete guard (RoundHandler.RoundGateBlocks, :60) are now implemented — ice logic partial->faithful. (3) NAPALM: water-contents velocity damping (WaterDamp via PointContents, NadeNapalmBoom.cs:37) AND the round-not-started guard are now ported; and damageforcescale=4 is RECLASSIFIED as inert-in-Base (the balls/fountain use PROJECTILE_MAKETRIGGER and never set takedamage=DAMAGE_AIM, so the Base force scale never multiplies anything either — napalm.qc:69-83) — napalm logic partial->faithful, values partial->faithful, the damageforcescale constant match false->true. (4) ENTRAP/VEIL/DARKNESS: the entrap monster run/walk slow (MonsterAI.cs:1011-1012) AND the veil monster-alpha lapse (MonsterAI.cs:945-946) are now ported inline in MonsterAI.Move — entrap_veil_darkness logic partial->faithful; only render (veil enemy tint, darkness blind overlay) + audio (SND_BLIND) gaps remain. All Base hooks remain mapped (no new_unmapped)."
    - "DRIFT 2026-06-26 (fix): the bonus.economy bank-a-nade notification + sound are now EMITTED (NadeBonus.GiveBonus, NadeBonus.cs:53-54): CENTER_NADE_BONUS via NotificationSystem.Send + SND_NADE_BONUS via SoundSystem.PlayOn, both registered (NotificationsList.cs:496, SoundsList.cs:180 -> kh/alarm == Base SND_KH_ALARM) and on the live path. bonus.economy presentation+audio missing->faithful. Additionally the VIP/flagcarrier bonus multiplier (g_nades_bonus_score_time_flagcarrier=2 + GameRules_scoring_is_vip + KH key count) is now wired in OnPlayerDies/OnPlayerPreThink — the previously-MISSING flagcarrier cvar is consumed (constant match false->true); logic/values held at partial pending per-gametype ScoringIsVip/KeyHuntKeyCount fidelity."
