  - id: cl-csqcmodel.forcecolors.cascade
    name: "Force player colors + unique enemy colors"
    layer: [presentation]
    base_refs:
      - "client/csqcmodel_hooks.qc:CSQCPlayer_ModelAppearance_Apply"
    port_refs:
      - "src/XonoticGodot.Engine/Simulation/CsqcModelAppearance.cs:ResolveForcedColormap"
