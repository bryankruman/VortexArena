summary:
  feature_count: 12
  worst_gaps:
    - "LOD swap is STILL a no-op (UNCHANGED, re-verified 2026-06-27): SelectLodIndex is computed faithfully (ClientWorld.cs:1324 `_ = CsqcModelLod.SelectLodIndex(...)`) but discarded — stock player models (erebus/gak/gakmasked) AND monsters (golem/spider/...) ship _lod1/_lod2, so with default cl_playerdetailreduction 4 distant players/monsters always render full-detail lod0 (real regression, persists). This is now the dominant open gap."
    - "MAJOR FIX (drift 2026-06-27): the upper-body ACTION state machine (shoot/melee/pain/draw/taunt/die torso overlays) — formerly the dominant baseline gap — is now FULLY PORTED AND LIVE end-to-end. Server producers latch actions (WeaponFireGate shoot/melee, WeaponFireDriver draw, DamageSystem pain1/pain2 + die1/die2, SoundSystem taunt) via AnimDecide.SetAction; the action+start are networked via the new EntityField.AnimAction bit (1<<18, NetEntity.UpperAction/AnimActionTime); the client decodes (ClientEntityView) and PlayerModel.Pose plays the torso action clip via LocomotionBlend.SelectTorsoAction with the priority cascade (DEAD>ACTIVE>IDLE) in AnimDecide.GetUpperAnim, and the per-anim framerates (die 0.5/shoot 5/jump 10/draw 3/taunt 0.33) are now USED (AnimDecide.SpecFor in PlayerModel.BuildClipTable ActionClip). The 8-direction + duck-variant LOCOMOTION (the prior drift fix) also remains faithful and live."
    - "CSQCMODEL networking contract spine still mostly unmapped, BUT alpha + UsingJetpack + the anim_* action block + the exterior-weapon (wepent) block are now ALL wired end-to-end. Still NOT networked: colormod (ALL entities, BIT(8)), scale (BIT(12)), traileffect (BIT(2)), non-jetpack modelflags (BIT(2)), non-player glowmod (BIT(8)), v_angle (BIT(10)), the anim_state LOCOMOTION bits (locomotion is inferred client-side from velocity/angles, which Base also does), and the networked colormap proper (only a team id is sent)."
    - "Per-player FORCED glowmod TINT (gametype/powerup role color RECOLORING the model surface over the colormap-derived glowmod) is built (ApplyForcedGlowmod + ForcedAppearance.HasForcedGlowmod) but STILL DEAD — no caller ever composes or passes a forced glowmod; the live jetpack composition passes forcedGlowmod (-1,-1,-1) = unset. (Distinct from the role-glow LIGHTS, which ARE live via PowerupsMutator EF_BLUE/EF_RED.)"
    - "Auto tag-index full QC cascade (h_/v_ model tag chain, recursive parent predraw, drawmask=0 on unresolved tag) still simplified to a tag_weapon marker attach, BUT the exterior-weapon (wepent) block (switch/raise-lower phase, skin, align, weapon alpha) is now networked + consumed by ViewEntityRenderer for the remote third-person held weapon (partial fix)."
