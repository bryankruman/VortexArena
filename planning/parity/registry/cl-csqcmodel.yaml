unit: cl-csqcmodel
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "animdecide not ported: upper-body ACTIONS (shoot/pain/draw/taunt/melee on the torso) never play on third-person models, and the 8-direction + duck-variant locomotion (~24 clips) is replaced by a coarse 6-state speed heuristic (no strafe/backward/duck-directional anims)"
    - "CSQCMODEL networking contract is largely unmapped: Entity carries only Frame/Skin/Effects/Team — the networked colormod (sent for ALL entities, BIT(8)), scale (BIT(12)), alpha (BIT(3)), traileffect (BIT(2)), modelflags (BIT(2)), non-player glowmod (BIT(8)), v_angle (BIT(10)), and anim_state/anim_upper/lower_action+time (BIT(7-9)) are not networked, so per-model colormod tint, scale, fade-out alpha, and server-driven actions never reach the client"
    - "Force MODEL (cl_forceplayermodels / cl_forcemyplayermodel / cl_forcemyplayerskin) does nothing — only the server-networked model is rendered"
    - "LOD swap is a no-op: SelectLodIndex is computed faithfully but the port never swaps to a _lodN model — and stock player models (erebus/gak/gakmasked) AND monsters (golem/spider/...) DO ship _lod1/_lod2, so with default cl_playerdetailreduction 4 distant players/monsters that downshift in Base always render full-detail lod0 in the port (a real regression, not just the fexists-miss path)"
    - "MF_* model flags + traileffect not networked: MF-driven trails (rocket/grenade/gib/tracer) and the MF_ROCKET jetpack loop never fire for remote players/entities (modelFlags hardcoded 0 in DriveCsqcModelHooks)"
