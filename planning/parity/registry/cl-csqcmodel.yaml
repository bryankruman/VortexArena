last_audited: "2026-06-25"
summary:
  feature_count: 12
  worst_gaps:
    - "animdecide STILL not ported: upper-body ACTIONS (shoot/pain/draw/taunt/melee on the torso) never play on third-person models, and the 8-direction + duck-variant locomotion (~24 clips) is replaced by a coarse 6-state speed heuristic (no strafe/backward/duck-directional anims); anim_state/anim_upper/lower_action+time still not networked (grep confirms zero anim_* bits in NetEntity/ClientEntityView)"
    - "CSQCMODEL networking contract still mostly unmapped, BUT alpha is now FULLY wired end-to-end (Wave 5 closed the dead-on-consume gap): server QuantizeAlpha producer -> codec -> ClientEntityView maps s.Alpha->e.Alpha (0->opaque, else byte/255) -> PlayerModel.ApplyAlpha renders per-instance Transparency, so Cloaked/Invisibility/fade now render translucent. Still NOT networked: colormod (ALL entities, BIT(8)), scale (BIT(12)), traileffect (BIT(2)), modelflags (BIT(2)) except the client re-derives MF_ROCKET from the new UsingJetpack flag, non-player glowmod (BIT(8)), v_angle (BIT(10)), the whole anim_* block"
    - "MF_* model flags still not networked, BUT MF_ROCKET is now re-derived client-side and LIVE: the new NetEntityFlags.UsingJetpack (1<<8) flows server->client->e.UsingJetpack->ComposeForcedAppearance(jetpackActive:true)->CsqcModelEffects.Apply(forced)->DriveJetpackLoop + rocket-trail return. So the jetpack loop + MF_ROCKET trail now fire for remote players. Still dead: the other MF trails (grenade/gib/tracer) for non-jetpack entities (modelFlags base still 0), and the role-glow path (ComposeForcedAppearance is always called with strength:false/shield:false, so EF_BLUE/EF_RED powerup glow is never composed) and ApplyForcedGlowmod (zero callers)"
    - "LOD swap is STILL a no-op (UNCHANGED): SelectLodIndex is computed faithfully (ClientWorld.cs:1273 `_ = SelectLodIndex(...)`) but discarded — stock player models (erebus/gak/gakmasked) AND monsters (golem/spider/...) ship _lod1/_lod2, so with default cl_playerdetailreduction 4 distant players/monsters always render full-detail lod0 (real regression, persists)"
    - "Per-player FORCED glowmod tint (gametype/powerup role color over the colormap-derived glowmod) is built (ApplyForcedGlowmod + ForcedAppearance.HasForcedGlowmod) but STILL DEAD — no caller ever composes or passes a forced glowmod; the live jetpack composition passes forcedGlowmod (-1,-1,-1) = unset"
