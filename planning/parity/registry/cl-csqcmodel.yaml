      - { name: "team colormap encoding", base: "1024 + 17*team", port: "1024 + 17*team", match: true }
      - { name: "forceplayercolors fallback (Base: player_localnum+1 SLOT idx)", base: "player_localnum+1 (slot)", port: "1024+playerLocalNum+1 (biased into >=1024 form for ModelTint)", match: false }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: faithful
      audio: na
      liveness: partial
    intended_divergence: true
    divergence_rationale: "The friend-only-force collision suppression (QC walks the live `teams` list to reject a forced friend color equal to any team's color) is reduced to a local-team-only compare because the port doesn't network the full team list to the client. The cascade is inert unless an AppearanceProvider is wired; on the live NetGame path it IS wired (NetGame.cs:BuildAppearanceContext), so it is live in a match but degrades to the entity's own colormap in a pure demo with no provider. The forcePlayerColorsEnabled branch returns 1024+playerLocalNum+1 rather than Base's bare slot index (player_localnum+1) so the port's ModelTint (which expects the >=1024 explicit-RGB form) paints correctly."
    gaps:
      - "Friend-color collision check compares only against the local team, not every team's color (QC's teams.sort_next walk); rare multi-team edge cases can differ."
      - "Without an AppearanceProvider (pure demo / no NetGame context) the override is inert and the entity keeps its server colormap."
      - "The forcePlayerColorsEnabled branch returns 1024+localnum+1 instead of Base's bare slot index (intended, for ModelTint contract-safety)."
    verification:
      - { kind: code, ref: "ClientWorld.cs ResolveForcedColormap -> ForcePlayerColorsEnabled/ResolveForcedColormap/UniqueColormap; provider wired NetGame.cs:BuildAppearanceContext", result: pass }
    confidence: high
    notes: "Unchanged behavior vs baseline (Wave 5 only added a const DefaultPlayerModel/DefaultPlayerSkin used by the forcemodel row; the slot-bias note is a clarifying comment). Pure cascade math is a 1:1 port with unit tests; the divergences are the collision-check reduction, the provider dependency, and the >=1024 colormap bias."
