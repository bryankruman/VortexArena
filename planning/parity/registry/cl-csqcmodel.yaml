    port_refs:
      - "game/client/ClientWorld.cs:DriveCsqcModelHooks"
    constants:
      - { name: "per-entity once-per-frame guard", base: "csqcmodel_predraw_run==framecount", port: "per-frame foreach _entityNodes", match: true }
    status:
      logic: partial
      values: na
      timing: faithful
      presentation: partial
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Order is appearance->LOD->effects (skeletal anim runs in a separate PlayerModel.Pose pass, not interleaved here); the appearance-before-LOD ordering is moot because LOD is a no-op swap."
      - "AutoTagIndex recursion + drawmask=0 on null-model are not part of this pass (held weapons attach via ViewEntityRenderer)."
    verification:
      - { kind: code, ref: "ClientWorld.cs DriveCsqcModelHooks called every _Process frame; iterates _entityNodes; appearance + LOD + EF_*/forced effects per entity", result: pass }
    confidence: high
    notes: "Live every frame from ClientWorld._Process. Wave 5 EXTENDED this pass: the effects step now composes a per-entity ForcedAppearance (MF_ROCKET when e.UsingJetpack) and passes it to CsqcModelEffects.Apply, and the item-fade branch gained a distance-fade compose. Dispatch structure unchanged vs baseline; still partial (no interleaved anim/tag, no-op LOD)."
