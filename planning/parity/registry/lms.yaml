unit: lms
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 23
  worst_gaps:
    - "LMS plays as a round-elimination mode (Activate calls EnableRounds with default CA predicates), not Base's continuous per-player-lives mode: living players don't respawn freely mid-round and 0-lives doesn't drive elimination/respawn-denial — the round gate (RoundHandler.IsRoundStarted) does. DefaultCanRoundEnd counts alive *teams*, degenerate in an FFA where every player is Team.None."
    - "No LMS loadout: players keep the normal DM start items AND regenerate health/armor AND map items still spawn (g_lms_start_*/g_lms_weaponarena/g_lms_regenerate/g_lms_rot/g_lms_items all unreferenced). LMS is meant to be a CA-like fixed-loadout survival mode."
    - "All leader presentation missing: no glow (EF_ADDITIVE|EF_FULLBRIGHT), no WP_LmsLeader radar waypoint, no periodic show-5s/hide-25s+jitter visibility window, no HUD mod-icon (leader count + colored +N lives lead). UpdateLeaders is computed live but nothing reads it."
    - "Forfeit/disconnect rank reassignment (lms_RemovePlayer), the late-join lives gate + lockout (LMS_NewPlayerLives/lms_AddPlayer), dynamic respawn delay, dynamic vampire lifesteal, ForbidThrowCurrentWeapon, the out-of-game spectate lockout, and extra-life pickups are all either dead code or missing. lms.AddPlayer (scoreboard column seeding) is never forwarded by MatchController."

