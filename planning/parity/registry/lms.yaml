last_audited: "2026-06-22"
summary:
  feature_count: 23
  worst_gaps:
    - "LMS still plays as a round-elimination mode (Activate calls EnableRounds with default CA predicates), not Base's continuous per-player-lives mode. Wave-5 wired ApplyRespawnTiming (the per-lives respawn-denial + dynamic delay) LIVE at DeadPlayerThink (GameWorld.cs:2126), but DeadPlayerThink still early-returns when Rounds.IsRoundStarted (GameWorld.cs:2110), so the round gate — not lives — still decides who is held dead. The headline logic inversion is UNCHANGED; only the timing seam beneath it went live. DefaultCanRoundEnd still counts alive *teams*, degenerate in an FFA where every player is Team.None."
    - "Leader RENDER presentation still missing: no glow (EF_ADDITIVE|EF_FULLBRIGHT PlayerPowerups), no WP_LmsLeader radar waypoint, no HUD mod-icon (leader count + colored +N lives lead). The recycled REDALIVE/BLUEALIVE/OBJECTIVE_STATUS leader stats are still not exported (no source consumer of LeaderCount/LeadersVisible/LeadersLivesDiff outside LastManStanding.cs). WAVE-5 PARTIAL WIN: the VISIBLE_LEADER/VISIBLE_OTHER centerprints + the local 'no more lives left' InfoMessage now fire live."
    - "Extra-life pickups + map/round reset still dead/missing: SpawnExtraLife has no caller (FilterItemDefinition keeps a HealthMega in place but never swaps it for an item_extralife per Base's FilterItem + lms_replace_with_extralife), and there is no reset_map_players/reset_map_global equivalent — LmsState is never reset between matches (compounded by the round-handler divergence whose round resets don't touch LmsState). Both dormant under default g_lms_extra_lives=0 / single-match listen play, but real gaps."
    - "WAVE-5 WINS (now live): the late-join/forfeit LIFECYCLE landed — CanJoin/AddPlayer are wired via Clients.GametypeJoinGate/GametypeOnJoin (GameWorld.cs:874-875 → JoinAllowed ClientManager.cs:418 + Join ClientManager.cs:249); RemovePlayer (rank reshuffle + last-forfeiter tracking + INFO_LMS_NOLIVES) fires from InfraClientDisconnect (GameWorld.cs:948); ApplyRespawnTiming (0-lives RESPAWN_SILENT denial + dynamic delay) fires from DeadPlayerThink (GameWorld.cs:2126); DriveLeaderVisibility (VISIBLE_LEADER/OTHER centerprint edges) fires from DriveGametypeFrame (GameWorld.cs:2042); the local-eliminated InfoMessage is driven by the networked LMS_RANK (NetGame.cs:3257)."
    - "WAVE-2 WINS (still live + faithful): fixed start loadout (200/200 + 60/320/160/180/0), forced weapon arena (most_available), regen/rot off, map-item suppression, dynamic vampire, and weapon-drop forbid are all subscribed in Activate() and fire on the real spawn/damage/item paths."

