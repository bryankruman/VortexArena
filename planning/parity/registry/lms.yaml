summary:
  feature_count: 26
  worst_gaps:
    - "TWO FIXES this pass (both prior-recorded gaps now RESOLVED). (1) FORCED-OBSERVER REMOVAL NOW LIVE: LMS subscribes to MutatorHooks.MakePlayerObserver via OnMakePlayerObserver (LastManStanding.cs:950, Activate line 323) and that hook is dispatched live from ClientManager.PutObserverInServer (MakePlayerObserver.Call, line 542). Prior baseline recorded the dispatch existing but LMS NOT subscribing — so a kick-to-spec / forced-observer now ranks + reshuffles, not only disconnect. lms.forfeit.remove_player liveness partial→live. (2) TIMELIMIT-CANCEL TIE NOW CONSUMED: the ReportsTie override (LastManStanding.cs:595) surfaces TimeLimitCancelled and is consumed by the host at GameWorld.cs:3636 (RunCheckRulesWorld → OverTimeManager), exactly like the other timed modes; CampaignBotsMayStart is wired by the server (GameWorld.cs:704). lms.win.last_standing timing partial→faithful, the no-host-consumer gap removed."
    - "LEADER CLIENT-RENDER REMAINS FULLY LIVE end-to-end. (1) Radar WAYPOINT SPRITE: LastManStanding.CollectWaypoints (LastManStanding.cs:856) emits a 'LmsLeader' sprite per in-game leader (registered Waypoints.cs:145, RADARICON_FLAGCARRIER, +64z, LeadersVisible-gated), pulled live each tick by ServerNet.SendWaypoints (ServerNet.cs:1056) → client WaypointSpriteLayer. (2) HUD MOD-ICON: ModIconsPanel.DrawLms (ModIconsPanel.cs:898) renders the leader-count icon + flag_stalemate overlay + colored +N lives-diff, dispatched at ModIconsPanel.cs:212 and Mode set at NetGame.cs:4273. (3) EXPORTED LEADER STATS: LeaderCount/LeadersLivesDiff/LeadersVisible networked via GametypeStatusBlock Kind.Lms (Capture line 128, Deserialize 361-365) → NetGame.cs:4272-4276."
    - "WARMUP GUARD: OnDeath (LastManStanding.cs:531) wraps the life-loss in `if (!PreMatch && !st.OutOfGame)` where PreMatch = InWarmup || time<=GameStartTime — exactly Base GiveFragsForKill's `if (!warmup_stage && time > game_starttime)` (sv_lms.qc:605)."
    - "LMS remains a SINGLE continuous per-player-lives match (no EnableRounds). ActivateGameType (GameWorld.cs:2881) is `case LastManStanding lms: lms.Activate(); break;`; Rounds stays null so DeadPlayerThink reaches ApplyRespawnTiming (0-lives ⇒ RESPAWN_SILENT, living ⇒ dynamic delay, GameWorld.cs:3418) and the win is latched by per-frame CheckWinningCondition (GameWorld.cs:3330). Host line numbers shifted from prior baseline (Activate 2392→2881, DriveGametypeFrame LMS block 2822→3320, ApplyRespawnTiming gate 2920→3418, ResetMap 3847→4447, join gate →1203) but the wiring is intact."
    - "Still missing/partial (UNCHANGED): the spectate lockout (no Player OUT_OF_GAME frags sentinel + no ClientCommand_Spectate gate in ClientManager — grep confirmed absent); the PlayerSpawn least-healthy late-join clone (RemovePlayer RECORDS last-forfeiter values but no spawn-side consumer in SpawnSystem); the mapinfo `lives=N` + legacy-defaults switch for starting lives. LIVE+faithful: fixed loadout (200/200 + 60/320/160/180/0), weapon arena (most_available), regen/rot off, map-item suppression, dynamic vampire, weapon-drop forbid, leader glow. NEW-UNMAPPED Base hooks found: Bot_FixCount, PlayerPreThink deadflag reset, AddPlayerScore RANK intermission write-allow."

