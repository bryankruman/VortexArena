summary:
  feature_count: 23
  worst_gaps:
    - "HEADLINE DIVERGENCE FIXED this pass: LMS is now a SINGLE continuous per-player-lives match. ActivateGameType (GameWorld.cs:1916) is `case LastManStanding lms: lms.Activate(); break;` with NO EnableRounds() — so Rounds is null, DeadPlayerThink's round gate (`!(Rounds is { IsRoundStarted: true })`, line 2401) is satisfied, and a mid-match dead player reaches ApplyRespawnTiming (line 2417): 0-lives ⇒ RESPAWN_SILENT denial, living ⇒ dynamic delay. The win is latched by the per-frame CheckWinningCondition (line 2329). The degenerate DefaultCanRoundEnd team-scan is gone. lms.respawn.continuous + lms.respawn.dynamic_delay liveness partial→live."
    - "Leader GLOW now LIVE: OnPlayerPowerups (LastManStanding.cs:853) applies EF_ADDITIVE|EF_FULLBRIGHT to IsLeader players, subscribed in Activate() and fired live from PlayerFrameLogic.cs:325 (MutatorHooks.PlayerPowerups.Call). lms.leader.glow missing→faithful+live. STILL missing: no WP_LmsLeader radar waypoint SPRITE, no HUD mod-icon (ModIconsPanel has no LMS mode), and the recycled REDALIVE/BLUEALIVE/OBJECTIVE_STATUS leader stats are still not exported/networked (no source consumer of LeaderCount/LeadersVisible/LeadersLivesDiff outside LastManStanding.cs)."
    - "Map/match reset now LIVE: ResetMapPlayers (LastManStanding.cs:479) re-livens eliminated players, zeroes+re-seeds LMS_RANK/LMS_LIVES, clears leader/forfeiter/win latches, and resets _lowestLives=999; wired from ResetMap (GameWorld.cs:3143) on a real match restart. lms.reset.map_players missing→faithful+live. Extra-life pickups LIVE (OnFilterItemDefinition retag + OnItemTouch grant), dormant under default g_lms_extra_lives=0."
    - "Win condition improved: CheckWinningCondition (LastManStanding.cs:568) now models the tie-cancel (TopTwoLivesEqual ⇒ TimeLimitCancelled, QC WINNING_NEVER), the forfeit-win path (totalPlayed + GameStartTime + g_lms_forfeit_min_match_time read), the zero-living draw end, AND the warmup/pre-start guard (PreMatch). Residual gaps: TimeLimitCancelled has no host consumer (timelimit-cancel seam unwired), no campaign human-loss WINNING_YES case, ranks counted over LmsState not the QC frags set."
    - "Still missing/partial: the spectate lockout (no Player OUT_OF_GAME frags sentinel + no ClientCommand_Spectate gate in ClientManager); the PlayerSpawn least-healthy late-join clone (last-forfeiter values recorded by RemovePlayer but no spawn-side consumer); the MakePlayerObserver (forced-observer non-disconnect) RemovePlayer caller (only the disconnect path is wired). LIVE+faithful: fixed loadout (200/200 + 60/320/160/180/0), weapon arena (most_available), regen/rot off, map-item suppression, dynamic vampire, weapon-drop forbid. All constants re-checked against Base sv_lms.qc + balance-xonotic.cfg this pass."

