  - id: lms.respawn.continuous
    name: "Living players respawn continuously throughout the single match (NOT round-based)"
    layer: [authority]
    base_refs:
      - "common/gametypes/gametype/lms/sv_lms.qc:MUTATOR_HOOKFUNCTION(lms, CalculateRespawnTime)"
      - "common/gametypes/gametype/lms/sv_lms.qc:MUTATOR_HOOKFUNCTION(lms, ReadLevelCvars)"
    port_refs:
      - "src/XonoticGodot.Server/GameWorld.cs:ActivateGameType (case LastManStanding: lms.Activate(); EnableRounds()) (line 1365)"
      - "src/XonoticGodot.Server/GameWorld.cs:DeadPlayerThink (line 1702 round gate)"
    constants: []
    status:
      logic: partial
      values: partial
      timing: unknown
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "LMS calls EnableRounds() with the DEFAULT CA-style predicates (DefaultCanRoundStart/DefaultCanRoundEnd), making it round-based: both RespawnDuePlayers (1668) and DeadPlayerThink (1702) early-return when Rounds.IsRoundStarted, so a living player who dies mid-match cannot respawn until the round resets. Base LMS is a SINGLE continuous match with no rounds — respawns are gated only by per-player lives (RESPAWN_SILENT at 0)."
      - "DefaultCanRoundEnd counts alive *teams* over Teams.Active(TeamCount); LMS is FFA (TeamGame=false, every player Team.None), so the team scan is degenerate and round/win resolution is ill-defined."
      - "Base disables sv_ready_restart_after_countdown (ReadLevelCvars hook) because it can't reset players mid-match without zeroing lives; the round-based port has the opposite reset semantics entirely."
    verification:
      - { kind: code, ref: "GameWorld.cs:1365 lms.Activate(); EnableRounds(); DefaultCanRoundEnd at 2527 iterates Teams.Active; DeadPlayerThink/RespawnDuePlayers gate on Rounds.IsRoundStarted", result: fail }
    confidence: high
    notes: "Confidence raised medium→high: the EnableRounds call and the round gates are confirmed in source. This is the headline logic inversion. Flagged as a gap (expedient handler reuse), not an intended divergence."

