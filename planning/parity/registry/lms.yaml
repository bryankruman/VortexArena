summary:
  feature_count: 23
  worst_gaps:
    - "LMS still plays as a round-elimination mode (ActivateGameType calls `lms.Activate(); EnableRounds()` at GameWorld.cs:1860 with the default CA predicates), NOT Base's continuous per-player-lives mode. ApplyRespawnTiming (the per-lives respawn-denial + dynamic delay) is wired LIVE at DeadPlayerThink (GameWorld.cs:2277), but DeadPlayerThink early-returns when `Rounds is { IsRoundStarted: true }` (GameWorld.cs:2261) BEFORE reaching it, so the round gate — not lives — still decides who is held dead. The headline logic inversion is UNCHANGED; only the timing seam beneath it is live. DefaultCanRoundEnd still counts alive *teams*, degenerate in an FFA where every player is Team.None."
    - "Leader RENDER presentation still missing: no glow (EF_ADDITIVE|EF_FULLBRIGHT PlayerPowerups), no WP_LmsLeader radar waypoint, no HUD mod-icon (leader count + colored +N lives lead). The recycled REDALIVE/BLUEALIVE/OBJECTIVE_STATUS leader stats are still not exported (no source consumer of LeaderCount/LeadersVisible/LeadersLivesDiff outside LastManStanding.cs). The VISIBLE_LEADER/VISIBLE_OTHER centerprints + the local 'no more lives left' InfoMessage DO fire live."
    - "Extra-life pickups are LIVE: OnFilterItemDefinition folds in Base's FilterItem + lms_replace_with_extralife (retags a HealthMega edict to item_extralife in place, RES_HEALTH zeroed) and OnItemTouch (MutatorHooks.ItemTouch, fired ItemPickupRules.cs:372) grants g_lms_extra_lives lives + CENTER_EXTRALIVES on pickup. Map/round reset is STILL missing: no reset_map_players/reset_map_global equivalent — LmsState is never reset between matches (compounded by the round-handler divergence whose round resets don't touch LmsState). Extra-lives dormant under default g_lms_extra_lives=0; the reset gap remains real."
    - "LIVE lifecycle (verified this pass): the late-join/forfeit lifecycle is wired — CanJoin/AddPlayer via Clients.GametypeJoinGate/GametypeOnJoin (GameWorld.cs:919-922 → JoinAllowed ClientManager.cs:302/316 + GametypeOnJoin ClientManager.cs:264); RemovePlayer (rank reshuffle + last-forfeiter tracking + INFO_LMS_NOLIVES) fires from InfraClientDisconnect (GameWorld.cs:1047); ApplyRespawnTiming (0-lives RESPAWN_SILENT denial + dynamic delay) fires from DeadPlayerThink (GameWorld.cs:2277); DriveLeaderVisibility (VISIBLE_LEADER/OTHER centerprint edges) fires from DriveGametypeFrame (GameWorld.cs:2193); the local-eliminated InfoMessage is driven by the networked LMS_RANK (NetGame.cs:3360-3373)."
    - "LIVE + faithful (verified this pass): fixed start loadout (200/200 + 60/320/160/180/0), forced weapon arena (most_available), regen/rot off, map-item suppression, dynamic vampire, and weapon-drop forbid are all subscribed in Activate() and fire on the real spawn/damage/item paths. All constants re-checked against Base sv_lms.qc + balance-xonotic.cfg this pass."

