    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Out-of-game state exists (Lives<=0 ⇒ OutOfGame, assigns Rank=CountAlive()+1) but is NOT connected to respawn denial: Base CalculateRespawnTime sets respawn_flags=RESPAWN_SILENT + respawn_time=time+2 at 0 lives; the port has no such path. An eliminated player is only kept dead by RoundHandler.IsRoundStarted, not by their lives."
      - "Base sets frag_target.frags = FRAGS_PLAYER_OUT_OF_GAME (-616) so the engine/scoreboard treat the player as ranked-out; the port tracks OutOfGame purely in LmsState and never sets Player.FragsLmsLoser/FRAGS_PLAYER_OUT_OF_GAME, so other systems (spectate gating, leader scan, win count) don't see it."
