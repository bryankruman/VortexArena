unit: lms
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 23
  worst_gaps:
    - "LMS still plays as a round-elimination mode (Activate calls EnableRounds with default CA predicates), not Base's continuous per-player-lives mode: living players don't respawn freely mid-round and 0-lives doesn't drive elimination/respawn-denial — the round gate (RoundHandler.IsRoundStarted) does. UNCHANGED by Wave-1/2. DefaultCanRoundEnd counts alive *teams*, degenerate in an FFA where every player is Team.None."
    - "All leader presentation still missing: no glow (EF_ADDITIVE|EF_FULLBRIGHT), no WP_LmsLeader radar waypoint, no periodic show-5s/hide-25s+jitter visibility window, no HUD mod-icon (leader count + colored +N lives lead), no VISIBLE_LEADER/VISIBLE_OTHER centerprint edges. UpdateLeaders is computed live but nothing reads it."
    - "Late-join + forfeit lifecycle still dead: lms_RemovePlayer rank reassignment, the late-join lives gate + lockout (LMS_NewPlayerLives/lms_AddPlayer), the AddPlayer scoreboard seed, dynamic respawn delay, the out-of-game spectate lockout, extra-life pickups, and the map/round reset_map_players are all still dead/missing — MatchController.AddPlayer/RemovePlayer (MatchController.cs:75/82) still never forward to LastManStanding."
    - "WAVE-2 WINS (now live + faithful): the CA-like loadout layer landed — fixed start loadout (SetStartItems 200/200 + 60/320/160/180/0), forced weapon arena (SetWeaponArena most_available), regen/rot off (PlayerRegen), map-item suppression (FilterItemDefinition), dynamic vampire (Damage_Calculate, all constants match), and weapon-drop forbid (ForbidThrowCurrentWeapon) are subscribed in Activate() and fire on the real spawn/damage/item paths."

