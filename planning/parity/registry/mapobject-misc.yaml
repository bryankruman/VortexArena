unit: mapobject-misc
category: mapobject
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "item_key* entirely missing: no key spawnfunc registered, so keys never spawn and key-gated doors/keylocks can never be opened"
    - "SUB_CalcMove default easing WRONG: port defaults platmovetype_start/end = 1/1 (forced LINEAR), Base defaults 0/0 (smoothstep ease -2t^3+3t^2) — EVERY long door/plat/train move is uneased linear instead of S-curved, and set_platmovetype is unported so a mapper platmovetype key is ignored on every mover"
    - "dynlight renders no light: server state machine runs but there is no realtime dynamic-light consumer, so authored map lights are invisible"
    - "func_clientwall distance-fade not rendered: fade_start/fade_end/alpha_max/alpha_min/fade_vertical_offset + PVS alpha-cull (Ent_Wall_PreDraw) are stored on the entity but no renderer applies them — a distance-faded clientwall does not fade"
    - "bgmscript ADSR not ported: func_clientwall/func_pointparticles never animate alpha/position/emission to the map music"
    - "dynlight path-follow parks on its first path_corner instead of traveling the corner chain"
    - "path_corner set_platmovetype not ported: a func_train's per-corner ease/turn string overrides are ignored"
