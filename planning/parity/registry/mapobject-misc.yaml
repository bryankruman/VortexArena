  - id: mapobject-misc.subs.calcmove
    name: "SUB_CalcMove / SUB_CalcAngleMove mover driver (linear + bezier + cubic_speedfunc)"
    layer: [shared]
    base_refs:
      - "common/mapobjects/subs.qc:SUB_CalcMove"
