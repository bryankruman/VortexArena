      - "src/XonoticGodot.Common/Gameplay/MapObjects/MapObjectsCommon.cs:CalcAngleMove"
    constants:
      - { name: "linear cutoff", base: "traveltime < 0.15", port: "< 0.15f", match: true }
      - { name: "platmovetype_start/end DEFAULT", base: "0/0 (QC float default) => smoothstep ease cubic_speedfunc(0,0,t) = -2t^3+3t^2", port: "PlatMoveStart=1/PlatMoveEnd=1 => forced LINEAR branch (cubic_speedfunc(1,1,t)=t)", match: false }
      - { name: "explicit-linear platmovetype", base: "start==1 && end==1", port: "PlatMoveStart==1 && PlatMoveEnd==1", match: true }
      - { name: "non-positive traveltime fallback", base: "0.001", port: "0.001f", match: true }
      - { name: "angle short cutoff", base: "traveltime < 0.1", port: "< 0.1f", match: true }
      - { name: "controller overshoot", base: "+ '0 0 0.125'", port: "+ (0,0,0.125)", match: true }
      - { name: "cubic_speedfunc", base: "(((s+e-2)x -2s-e+3)x +s)x", port: "verbatim", match: true }
    status:
      logic: faithful
      values: partial
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEFAULT EASING WRONG: QC .platmovetype_start/_end are uninitialized floats (default 0), so a mover with no platmovetype key fails the (start==1 && end==1) linear test and runs the bezier branch with cubic_speedfunc(0,0,t) = -2t^3+3t^2 (smoothstep ease-in-out). The port hardcodes PlatMoveStart=PlatMoveEnd=1, which makes (==1 && ==1) always true => EVERY long (>=0.15s) door/plat/train move runs the LINEAR branch (constant velocity) instead of the eased S-curve. Short (<0.15s) moves match (both linear). Path geometry is unaffected (straight-line midpoint control either way); only the speed profile diverges."
      - "set_platmovetype is unported (see corner.path_corner), so even a mapper-set platmovetype key on any mover is silently ignored — there is no path that ever sets PlatMoveStart/End to anything but the 1/1 default."
    verification:
      - { kind: code, ref: "MapObjectsCommon.cs:109-110 PlatMoveStart=1/PlatMoveEnd=1 defaults vs QC field default 0; subs.qc:309 linear test (start==1 && end==1); CubicSpeedFunc(0,0,t) = -2t^3+3t^2 (ease) vs CubicSpeedFunc(1,1,t) = t (linear)", result: fail }
      - { kind: code, ref: "MapObjectsCommon.cs:511-707 CalcMove/CalcMoveBezier/CalcMoveControllerThink/CalcAngleMove vs subs.qc:114-389 — branch split, controller sub-entity, cubic_speedfunc, PlatMoveTurn drive, .ltime scheduling, SUB_CalcMoveDone snap+think1 otherwise faithful", result: pass }
    confidence: high
    notes: "CORRECTED from draft (was all-faithful, no gap). The structural port is faithful, but the platmovetype default flip means stock movers are linear where Base is smoothstep-eased — a real timing/values divergence on the most-live feature in the unit. Used by every door/plat/train/button. Not yet observed in-game; severity (cosmetic vs noticeable) unconfirmed but the curve difference is mathematically real for any move >= 0.15s."

