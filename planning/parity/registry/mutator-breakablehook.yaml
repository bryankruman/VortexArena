unit: mutator-breakablehook
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 5
  worst_gaps:
    - "TEAMPLAY REGRESSION (Wave-2, STILL OPEN after the second-pass fix-up commit 4be8357): the DiffTeam(a,b) helper reads the STATIC GameScores.Teamplay bool, which is NEVER assigned on the server gameplay path — its only writer is ScoreInfoBlock.Apply (the CLIENT NET_HANDLE deserialise), and ScoreInfoBlock still has ZERO callers anywhere (re-confirmed by grep 2026-06-22: only the class def + the dead Serialize/Hash references inside it). So on the live (listen-)server DiffTeam always takes the FFA branch !ReferenceEquals(a,b). In a TEAM game (CTF/TDM/CA etc.) shooting a TEAMMATE's hook wrongly fires the punish (5 splash to the teammate + force-removes the hook); Base DIFF_TEAM uses team!=team and skips same-team. The OLD pre-Wave-2 port (!Teams.SameTeam) handled teamplay correctly, so this remains a genuine regression vs both Base and the pre-Wave-2 port. Shared bug class with NadeOrbHelper.DiffTeam, Teleporters, WeaponAccuracyEvents, KickTeamkiller, SpawnNearTeammate (all key off the dead static)."
    - "FFA self-break is FIXED (Wave-2): with GameScores.Teamplay false the FFA branch !ReferenceEquals(owner,owner)=false, so shooting your OWN hook with g_breakablehook_owner 1 no longer deals spurious 5 self-splash + removal — matches Base DIFF_TEAM(owner,owner)=false."
