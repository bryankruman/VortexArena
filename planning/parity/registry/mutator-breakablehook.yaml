    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "FFA self-break: shooting your own hook with g_breakablehook_owner 1 in non-teamplay deals 5 splash self-damage and force-removes the hook, because Teams.SameTeam has no DIFF_TEAM non-teamplay (a!=b) case; Base skips the punish branch for a self-hit (owner != owner is false)."
      - "Non-teamplay enemy breaks coincidentally still fire correctly (both !SameTeam and a!=b true), so the visible defect is scoped to the FFA self-hit edge; teamplay team-vs-team and same-team hits are faithful."
    verification:
      - { kind: code, ref: "Truth table SameTeam vs DIFF_TEAM: FFA both Team 0 => SameTeam=false always => !SameTeam=true even when attacker==owner; Base DIFF_TEAM(owner,owner) in FFA = (owner!=owner) = false. Teams.cs:35 has no teamplay branch (cf. teams.qh:242). DIVERGENT.", result: fail }
