    confidence: high
    notes: "Combat.Damage routes the punish through the normal damage system; RemoveHook proxied via target.ProjectileDamage (Hook.cs:223). Same SameTeam-vs-DIFF_TEAM class of bug likely affects other team checks (vampirehook, nade orb). A shared DiffTeam(a,b) helper would fix this class uniformly. VERIFIED by Base+port read."

  - id: breakablehook.remove.drop_chain
    name: "Remove the hook chain when broken (RemoveHook proxy)"
    layer: [authority]
    base_refs:
