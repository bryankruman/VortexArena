      - { name: "force", base: "'0 0 0'", port: "Vector3.Zero", match: true }
      - { name: "team_test", base: "DIFF_TEAM(attacker, realowner) = teamplay ? (team!=team) : (attacker!=realowner)", port: "DiffTeam(attacker, owner) = !ReferenceEquals(a,b) && !Teams.SameTeam(a,b); SameTeam = a.Team!=0 && a.Team==b.Team on the live server Entity.Team — reproduces all 4 DIFF_TEAM rows", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "DiffTeam helper rewritten (commit f86d947, Wave 6b): BreakablehookMutator.cs:93-94 `DiffTeam(a,b) => !ReferenceEquals(a,b) && !Teams.SameTeam(a,b)`. Teams.SameTeam (Teams.cs:35) = `a.Team != 0 && a.Team == b.Team`. NO LONGER reads the dead static GameScores.Teamplay — instead reads live Entity.Team, which IS written server-side on the spawn/team-assign paths (GameWorld.cs, SpawnSystem.cs, Commands.cs, etc.).", result: pass }
      - { kind: code, ref: "Truth table vs Base DIFF_TEAM(a,b)=(teamplay?(a.team!=b.team):(a!=b)): TEAMPLAY same-team (a≠b, same nonzero Team) ⇒ !true... wait: !Ref(a,b)=true AND !SameTeam=!true=false ⇒ DiffTeam=false = no punish (Base team!=team=false ✓ — REGRESSION FIXED); TEAMPLAY diff-team ⇒ true && !false=true = punish (Base ✓); FFA enemy (both Team 0) ⇒ true && !false(SameTeam=false because Team==0)=true = punish (Base a!=b=true ✓); FFA self (a==b) ⇒ !Ref=false ⇒ DiffTeam=false = no punish (Base a!=b=false ✓). All four rows match Base.", result: pass }
      - { kind: code, ref: "Value parity faithful: 5 dmg, hook|splash deathtype (DeathTypes.WithHitType/FromWeapon), owner.Origin, zero force, inflictor=attacker (BreakablehookMutator.cs:72-73; Combat.Damage). DMG_NOWEP weaponentity arg has no functional effect. Re-confirmed UNCHANGED 2026-06-25.", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests.cs:519 is an FFA self-hit (Team unset → DiffTeam false, no punish). No team-game ally-break test exists yet, so the fixed teamplay path is verified by code/truth-table read, not by a regression test.", result: pass }
    confidence: high
    notes: "FIXED in commit f86d947 (Wave 6b): the Wave-2 teamplay regression (DiffTeam keyed off the dead static GameScores.Teamplay, which is always false server-side and wrongly punished teammate-hook breaks) is closed. DiffTeam now derives both QC DIFF_TEAM cases from the live authoritative Entity.Team via Teams.SameTeam — the same field the friendly-fire damage pipeline uses. Self is handled by the !ReferenceEquals short-circuit; same-team by !SameTeam; FFA reduces to a!=b because Team==0 ⇒ SameTeam=false. logic upgraded partial → faithful. VERIFIED by Base+port read + exhaustive truth-table + live Entity.Team writer search."

  - id: breakablehook.remove.drop_chain
    name: "Remove the hook chain when broken (RemoveHook proxy)"
    layer: [authority]
    base_refs:
      - "server/hook.qc:48 RemoveHook"
      - "common/mutators/mutator/breakablehook/sv_breakablehook.qc:26 RemoveHook(frag_target)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Hook.cs:258 ProjectileDamage => RemoveHook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/BreakablehookMutator.cs:77 target.ProjectileDamage?.Invoke"
    constants: []
    status:
      logic: faithful
      values: na
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port's RemoveHook is private to Hook.cs; the mutator removes the chain by invoking the grapplinghook's own ProjectileDamage callback (Hook.cs:258: (self,attacker) => RemoveHook(actor.WeaponState(slot))), the same encapsulated path used when the chain is shot down normally. Behaviorally equivalent to QC's direct RemoveHook(frag_target): removes the chain entity and clears the owner's weapon hook slot."
    gaps: []
    verification:
      - { kind: code, ref: "Hook.cs:258 wires ProjectileDamage to RemoveHook(actor.WeaponState(slot)); mutator invokes it (BreakablehookMutator.cs:77). RemoveHook removes st.Hook and nulls the slot. Re-confirmed UNCHANGED 2026-06-25.", result: pass }
    confidence: medium
    notes: "Removal fires inside the punish branch; now that the punish branch's teamplay regression is fixed, the chain is correctly NOT removed on a same-team break. The removal MECHANICS themselves are faithful and unchanged. Minor incidental note (not specific to this mutator): the port's RemoveHook does not explicitly restore MOVETYPE_WALK whereas QC RemoveHook does when reeling."

