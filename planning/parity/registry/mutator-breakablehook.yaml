      - "common/mutators/mutator/breakablehook/sv_breakablehook.qc:26 RemoveHook(frag_target)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Hook.cs:223 ProjectileDamage => RemoveHook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/BreakablehookMutator.cs:79 target.ProjectileDamage?.Invoke"
    constants: []
    status:
      logic: faithful
      values: na
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port's RemoveHook is private to Hook.cs; the mutator removes the chain by invoking the grapplinghook's own ProjectileDamage callback (Hook.cs:223: (self,attacker) => RemoveHook(actor.WeaponState(slot))), the same encapsulated path used when the chain is shot down normally. Behaviorally equivalent to QC's direct RemoveHook(frag_target): removes the chain entity and clears the owner's weapon hook slot (Hook.cs:279-287)."
    gaps: []
    verification:
      - { kind: code, ref: "Hook.cs:223 wires ProjectileDamage to RemoveHook(actor.WeaponState(slot)); mutator invokes it (BreakablehookMutator.cs:79). RemoveHook (Hook.cs:279-287) removes st.Hook and nulls the slot.", result: pass }
    confidence: medium
    notes: "Removal fires only inside the punish branch, so it inherits that branch's FFA self-hit divergence (breakablehook.owner.punish_splash) for WHEN it runs; the removal mechanics themselves are faithful. Note: the port's RemoveHook does NOT explicitly restore MOVETYPE_WALK (comment Hook.cs:286 says the movement system reapplies walk via velocity) whereas QC RemoveHook restores MOVETYPE_WALK if reeling — a minor incidental difference, not specific to this mutator."

