last_audited: "2026-06-22"
summary:
  feature_count: 5
  worst_gaps:
    - "TEAMPLAY REGRESSION (introduced by Wave-2): the new DiffTeam(a,b) helper reads the STATIC GameScores.Teamplay bool, but that static is NEVER assigned on the server gameplay path (its only writer is ScoreInfoBlock.Apply — the CLIENT network-deserialise — and ScoreInfoBlock has no live caller anywhere). So on the live server DiffTeam always takes the FFA branch !ReferenceEquals(a,b). In a TEAM game (CTF etc.) shooting a TEAMMATE's hook now wrongly fires the punish (5 splash to the teammate + force-removes the hook); Base DIFF_TEAM uses team!=team and skips same-team. The OLD port code (!Teams.SameTeam) handled teamplay correctly, so this is a genuine regression vs both Base and the pre-Wave-2 port."
    - "FFA self-break is now FIXED: with GameScores.Teamplay false the FFA branch !ReferenceEquals(owner,owner)=false, so shooting your OWN hook with g_breakablehook_owner 1 no longer deals spurious 5 self-splash + removal — matches Base DIFF_TEAM(owner,owner)=false."
