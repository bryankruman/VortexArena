  - id: breakablehook.owner.punish_splash
    name: "Punish hook owner with 5 splash + remove on cross-team break"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/breakablehook/sv_breakablehook.qc:23-28 Damage_Calculate (DIFF_TEAM branch)"
      - "common/teams.qh:242 DIFF_TEAM"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/BreakablehookMutator.cs:70-79 OnDamageCalculate (DiffTeam branch)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/BreakablehookMutator.cs:84-85 DiffTeam helper"
      - "src/XonoticGodot.Common/Gameplay/Scoring/GameScores.cs:62 static Teamplay (DEAD on server: only writer is ScoreInfoBlock.Apply, which has no live caller)"
    constants:
      - { name: "owner_splash_damage", base: "5", port: "5f", match: true }
      - { name: "deathtype", base: "WEP_HOOK.m_id | HITTYPE_SPLASH", port: "WithHitType(FromWeapon(\"hook\"), Splash)", match: true }
      - { name: "Damage args", base: "Damage(realowner, attacker, attacker, 5, ..., DMG_NOWEP, realowner.origin, '0 0 0')", port: "Combat.Damage(owner, attacker, attacker, 5f, dt, owner.Origin, Vector3.Zero)", match: true }
      - { name: "force", base: "'0 0 0'", port: "Vector3.Zero", match: true }
      - { name: "team_test", base: "DIFF_TEAM(attacker, realowner) = teamplay ? (team!=team) : (attacker!=realowner)", port: "DiffTeam(attacker, owner) = GameScores.Teamplay ? (a.Team!=b.Team) : !ReferenceEquals(a,b)  — BUT GameScores.Teamplay is dead (never set server-side) so it ALWAYS takes the FFA !ReferenceEquals branch", match: false }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "TEAMPLAY REGRESSION (STILL OPEN): in a team game (CTF/TDM/CA etc.) breaking a TEAMMATE's hook fires the punish (5 splash to the teammate + force-remove), because DiffTeam falls to the FFA branch !ReferenceEquals(attacker, owner) when the static GameScores.Teamplay is false — and it is ALWAYS false on the server (no live writer; ScoreInfoBlock.Apply has zero callers, re-verified 2026-06-22). Base DIFF_TEAM uses team!=team in teamplay and would skip a same-team break. The pre-Wave-2 port (!Teams.SameTeam) handled this correctly, so this is a regression vs both Base and the old port. NOT addressed by the second-pass fix-up commit (4be8357)."
      - "Self-break in a TEAM game: the FFA branch !ReferenceEquals(owner,owner) IS false so a self-hit is still skipped — OK; the broken case is an ALLY hit."
    verification:
      - { kind: code, ref: "GameScores.Teamplay writer search (re-run 2026-06-22): the ONLY assignment is ScoreInfoBlock.cs:135 (Apply = client NET_HANDLE deserialise). grep ScoreInfoBlock across src returns the class def only (ScoreInfoBlock.cs:36) — no Apply/Serialize/Deserialize CALLER; the scoreboard-layout block is not wired into the snapshot composer. No server/GameWorld/host assignment exists (server uses the SEPARATE instance world.Teamplay / Cvars.Teamplay, NOT the static). So GameScores.Teamplay defaults false and stays false during a live match.", result: fail }
      - { kind: code, ref: "Truth table on the live path (GameScores.Teamplay==false ⇒ DiffTeam == !ReferenceEquals): FFA enemy break = true (punish, correct); FFA self-break = false (no punish, CORRECT — old baseline self-hit bug is FIXED); TEAMPLAY same-team ally break = true (punish, WRONG — Base team!=team is false); TEAMPLAY cross-team break = true (punish, coincidentally correct).", result: fail }
      - { kind: code, ref: "Value parity faithful: 5 dmg, hook|splash deathtype (DeathTypes.WithHitType/FromWeapon), owner.Origin, zero force, inflictor=attacker (BreakablehookMutator.cs:73-74; Combat.Damage). DMG_NOWEP weaponentity arg has no functional effect. Re-confirmed UNCHANGED 2026-06-22.", result: pass }
      - { kind: test, ref: "MutatorBatchT51Tests.cs:519 is an FFA self-hit (Team unset, Teamplay default false) → with DiffTeam the punish no longer fires, so the spurious 5 self-splash the baseline flagged is gone. The test only asserts args.Damage==0 so it neither catches nor exercises the teamplay regression (no team-game ally-break test exists).", result: pass }
    confidence: high
    notes: "Wave-2 swapped !Teams.SameTeam for a DiffTeam(a,b) helper meant to mirror QC DIFF_TEAM. It CLOSED the FFA self-hit gap but OPENED a teamplay gap because it keys off the dead static GameScores.Teamplay (vs the authoritative server-side instance world.Teamplay.IsTeamGame / Cvars.Teamplay). The second-pass fix-up commit (4be8357) did NOT touch this — re-audited 2026-06-22, regression persists. A correct fix reads the live server team-game flag or special-cases self (attacker!=owner) AND same-team. Still logic: partial — the divergence sits in the teamplay same-team case. VERIFIED by Base+port read + exhaustive writer search."

  - id: breakablehook.remove.drop_chain
    name: "Remove the hook chain when broken (RemoveHook proxy)"
    layer: [authority]
    base_refs:
      - "server/hook.qc:48 RemoveHook"
      - "common/mutators/mutator/breakablehook/sv_breakablehook.qc:26 RemoveHook(frag_target)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Hook.cs:258 ProjectileDamage => RemoveHook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/BreakablehookMutator.cs:78 target.ProjectileDamage?.Invoke"
    constants: []
    status:
      logic: faithful
      values: na
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port's RemoveHook is private to Hook.cs; the mutator removes the chain by invoking the grapplinghook's own ProjectileDamage callback (Hook.cs:258: (self,attacker) => RemoveHook(actor.WeaponState(slot))), the same encapsulated path used when the chain is shot down normally. Behaviorally equivalent to QC's direct RemoveHook(frag_target): removes the chain entity and clears the owner's weapon hook slot."
    gaps: []
    verification:
      - { kind: code, ref: "Hook.cs:258 wires ProjectileDamage to RemoveHook(actor.WeaponState(slot)); mutator invokes it (BreakablehookMutator.cs:78). RemoveHook removes st.Hook and nulls the slot. Re-confirmed UNCHANGED 2026-06-22.", result: pass }
    confidence: medium
    notes: "Removal fires only inside the punish branch, so WHEN it runs inherits that branch's teamplay regression (breakablehook.owner.punish_splash): in a team game a teammate-hook break will wrongly remove the chain. The removal MECHANICS themselves are faithful and unchanged. Minor incidental note (not specific to this mutator): the port's RemoveHook does not explicitly restore MOVETYPE_WALK whereas QC RemoveHook does when reeling."

