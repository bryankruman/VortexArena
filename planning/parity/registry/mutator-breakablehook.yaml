      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:60 Apply"
    constants:
      - { name: "g_breakablehook", base: "0", port: "0", match: true }
      - { name: "g_breakablehook_owner", base: "0", port: "0", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "[Mutator]-discovered into Mutators.All; MutatorActivation.Apply() (MutatorActivation.cs:60-64) walks Mutators.All and Add()s each IsEnabled mutator → Hook() subscribes the handler. Enable predicate reads g_breakablehook live (IsEnabled, BreakablehookMutator.cs:38). Re-confirmed UNCHANGED 2026-06-22.", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:102 (Mutators.ByName(\"breakablehook\")) + :522 (IsEnabled under g_breakablehook 1) — both present.", result: pass }
      - { kind: code, ref: "mutators.cfg defaults g_breakablehook 0 / g_breakablehook_owner 0 both match port GetFloat default-0 semantics", result: pass }
    confidence: high
    notes: "Server-only mutator (_mod.inc is #ifdef SVQC only; no client/HUD/sound component). Enable predicate reads g_breakablehook live; defaults match. On the real activation loop, not dead. Re-audited 2026-06-22 (post second-pass fix-up): no change to this feature."

