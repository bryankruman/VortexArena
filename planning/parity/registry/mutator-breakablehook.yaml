unit: mutator-breakablehook
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 5
  worst_gaps:
    - "FFA self-break: shooting your own hook with g_breakablehook_owner 1 in non-teamplay deals 5 splash self-damage and force-removes the hook, because Teams.SameTeam has no DIFF_TEAM non-teamplay (a!=b) case; Base skips the punish branch for a self-hit (owner != owner is false)."
    - "Base uses autocvar_g_breakablehook / autocvar_g_breakablehook_owner, re-read live on every Damage_Calculate (the .qc literally comments \"// allow toggling mid match?\"). The port snapshots Breakable/BreakableOwner once at Hook() (activation) and never refreshes them. Toggling g_breakablehook_owner 0->1 (or 1->0) mid-match while g_breakablehook stays 1 takes effect immediately in Base but has NO effect in the port until the mutator is re-activated. (g_breakablehook itself toggling on/off is fine because it drives Apply()'s add/remove, which re-runs Hook().)"
