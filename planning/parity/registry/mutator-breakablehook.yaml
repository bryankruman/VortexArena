      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:256 MutatorHooks.DamageCalculate.Call(ref dc) + write-back :257"
    constants:
      - { name: "target.classname guard", base: "\"grapplinghook\"", port: "\"grapplinghook\"", match: true }
      - { name: "zero-damage condition", base: "!autocvar_g_breakablehook || (!autocvar_g_breakablehook_owner && frag_attacker==frag_target.realowner)", port: "!Breakable || (!BreakableOwner && ReferenceEquals(attacker, owner))", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "DamageSystem.cs:254-259 builds DamageCalculateArgs(target=targ), Calls the chain live, writes back dc.Damage. Chain target is the shootable grapplinghook (Hook.cs:241 ClassName, :247 TakeDamage=Aim, :242 Owner=actor). target.RealOwner => Owner (DamageEntityState.cs:135, partial Entity), so RealOwner == the firer. Re-confirmed UNCHANGED 2026-06-22.", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:519 Breakablehook_ZeroesDamage_OnOwnHook_WhenOwnerBreakOff asserts args.Damage==0", result: pass }
