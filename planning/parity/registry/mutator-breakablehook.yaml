summary:
  feature_count: 5
  worst_gaps:
    - "No open gaps. The Wave-2 TEAMPLAY REGRESSION (DiffTeam keyed off the dead static GameScores.Teamplay) is FIXED as of commit f86d947 (Wave 6b): DiffTeam(a,b) now = !ReferenceEquals(a,b) && !Teams.SameTeam(a,b), where Teams.SameTeam(a,b)=a.Team!=0 && a.Team==b.Team reads the live authoritative server Entity.Team (set on GameWorld/SpawnSystem/Commands spawn paths). This reproduces all four QC DIFF_TEAM truth-table rows: teamplay same-team = no punish (was wrongly punishing), teamplay diff-team = punish, FFA enemy = punish, FFA self = no punish. Verified by exhaustive truth-table read + Base teams.qh:242 DIFF_TEAM(a,b)=(teamplay?(a.team!=b.team):(a!=b))."
    - "FFA self-break remains FIXED: !ReferenceEquals(owner,owner)=false short-circuits the AND, so shooting your OWN hook with g_breakablehook_owner 1 deals no spurious 5 self-splash + removal — matches Base DIFF_TEAM(owner,owner)=false."
