  - id: mutator-walljump.impulse.velocity
    name: "Off-wall velocity impulse (horizontal push /xy, z = jumpvel*z, crouch slam) + standard-jump composition"
    layer: [shared]
    base_refs:
      - "common/mutators/mutator/walljump/walljump.qc:52-60"
      - "common/mutators/mutator/walljump/walljump.qc:70"
      - "common/physics/player.qc:481"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WalljumpMutator.cs:84-100"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:820-822"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:887"
    constants:
      - { name: "g_walljump_force", base: "300", port: "300 (mutators.cfg:487); C# field default 300", match: true }
      - { name: "g_walljump_velocity_xy_factor", base: "1.15", port: "1.15 (mutators.cfg:488); C# field default 1.05", match: true }
      - { name: "g_walljump_velocity_z_factor", base: "0.5", port: "0.5 (mutators.cfg:489); C# field default 1.0", match: true }
      - { name: "g_walljump_delay", base: "1", port: "1 (mutators.cfg:486); C# field default 0.3", match: true }
      - { name: "sv_jumpvelocity (PHYS_JUMPVELOCITY)", base: "260", port: "260", match: true }
      - { name: "final velocity_z (normal walljump, stock cvars)", base: "260*0.5 + 260 = 390", port: "390", match: true }
      - { name: "final velocity_z (crouch walljump, stock cvars)", base: "-130 + 260 = 130", port: "130", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Cvar-override guards use `if (x != 0f) Field = x`, so an admin explicitly setting g_walljump_force/_delay/_velocity_xy_factor/_velocity_z_factor to 0 (legal in Base — e.g. g_walljump_velocity_z_factor 0 for a pure-horizontal wall jump) is silently ignored and the C# default is kept (WalljumpMutator.cs:48-51)."
      - "Server-authoritative only: the impulse runs in the server PlayerJump hook chain; on a remote client it is not predicted (see mutator-walljump.predict.shared_impulse). Base applies it shared. Hence liveness=partial."
    verification:
      - { kind: code, ref: "impulse arithmetic matches Base walljump.qc:55-60 (v.X+=n.X*force; v.X/=xy; v.Y likewise; v.Z=jumpvel*z; crouch inverts). Hook sets args.Multijump=true and returns false (WalljumpMutator.cs:100-101) so PlayerJump.Call returns false; doublejump=true skips the air-bail (PlayerPhysics.cs:841) and vel.Z+=mjumpheight (PlayerPhysics.cs:887) adds the full standard jump on top, reproducing Base player.qc:481. Stock jumpspeedcaps are NaN so the cap branches are skipped.", result: pass }
      - { kind: code, ref: "mutators.cfg:485-489 ships the exact Base defaults; Hook() reads them via Api.Cvars.GetFloat and overrides the (differing) C# field defaults at activation", result: pass }
    confidence: high
    notes: "Logic/values/timing faithful at runtime. The C# field defaults (xy 1.05, z 1.0, delay 0.3) differ from Base but are masked by the shipped cfg reads except in a config-less harness. Critical composition (multijump-grant-then-add-standard-jump) verified end-to-end."

  - id: mutator-walljump.predict.shared_impulse
    name: "Client-side prediction of the wall-jump impulse (Base runs it shared CSQC+SVQC)"
    layer: [shared, presentation]
    base_refs:
      - "common/mutators/mutator/walljump/walljump.qc:5"
      - "common/mutators/mutator/walljump/walljump.qc:36-60"
    port_refs:
      - "game/net/EntityMovementStep.cs:84"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
    constants: []
    status:
      logic: partial
      values: na
      timing: na
      presentation: partial
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The wall-jump velocity impulse is dispatched only via the static MutatorHooks.PlayerJump chain, which is subscribed by MutatorActivation.Apply() — called ONLY in GameWorld.cs:511 (server). Client prediction (EntityMovementStep.Step -> Movement.Move -> PlayerPhysics.PlayerJump -> PlayerJump.Call) shares the same static chain, so in a single-process / listen-server build the chain is populated and the wall jump IS predicted; but on a separate (dedicated-server) client process the chain is empty, so the wall jump is applied by the server only and the client mispredicts (rubberbands) on every wall jump. Base deliberately REGISTER_MUTATORs walljump on CSQC unconditionally precisely so the impulse predicts."
    verification:
      - { kind: code, ref: "EntityMovementStep.Step calls Movement.Move(_carrier,input) (line 84) which routes to PlayerPhysics.PlayerJump -> MutatorHooks.PlayerJump.Call (static). No client-side MutatorActivation.Apply caller exists (grep: MutatorActivation.Apply only in GameWorld.cs). So predicted-leg reach depends on process topology.", result: fail }
    confidence: medium
    notes: "In Bryan's usual listen-server/single-process play the same process runs Apply(), so the static chain is shared and prediction works incidentally; this row flags the dedicated-server-client case as the real divergence and explains why the registry liveness on the shared rows is partial, not live. Runtime A/B not performed."

