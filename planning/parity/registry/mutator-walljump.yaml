unit: mutator-walljump
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 8
  worst_gaps:
    - "Wall-jump impulse is server-authoritative only: it runs through the static PlayerJump mutator-hook chain, which is populated by MutatorActivation.Apply() — called ONLY in GameWorld (server, line 563). On a dedicated-server remote client the client-prediction Movement.Move->PlayerJump chain is empty, so the wall jump is NOT predicted and mispredicts/rubberbands; Base runs the impulse shared (CSQC+SVQC). UNCHANGED (Apply() line moved 539->563, topology identical)."
    - "Jump animation action (animdecide_setaction ANIMACTION_JUMP) still not triggered on a wall jump (no anim-action seam in the port; WalljumpMutator.cs:119 is a comment only). UNCHANGED — same missing server->client one-shot action channel as Dodging."
    - "Minor: jump voice plays on SoundChannel.VoiceAuto (CH_VOICE) vs Base CH_PLAYER. The sample resolves and is audible (manifest resolver landed), so this is the only residual on fx.sound. UNCHANGED."
features:
  - id: mutator-walljump.activation.enable
    name: "Mutator registration + g_walljump enable gate"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/walljump/walljump.qc:REGISTER_MUTATOR"
      - "common/stats.qh:322"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WalljumpMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs:563"
    constants:
      - { name: "g_walljump", base: "0", port: "0 (mutators.cfg:485)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "MutatorActivation.Apply() is invoked ONLY in GameWorld.cs:563 (server). The mutator (and thus its PlayerJump hook) is therefore subscribed on the SERVER process only. Base registers the mutator on CSQC unconditionally (true) AND on SVQC (autocvar). The port has no client-side activation, so on a remote (dedicated-server) client the walljump never runs in client prediction — see mutator-walljump.predict.shared_impulse. UNCHANGED (Apply() moved 539->563, topology identical)."
    verification:
      - { kind: code, ref: "MutatorActivation.Apply at GameWorld.cs:563 -> Mutators.All -> IsEnabled (g_walljump!=0) -> Add -> Hook() subscribes the static PlayerJump chain; grep MutatorActivation.Apply finds only GameWorld.cs:563 in production (tests also call it, no client-side caller)", result: pass }
    confidence: high
    notes: "Server-side enable + hook subscribe is correct and live. The gate value (g_walljump!=0) matches Base. The liveness caveat is the client-prediction reach (partial), not the server gate. Apply() call line moved 539->563 since last audit but topology is identical."

