  - id: mutator-walljump.fx.sound
    name: "Wall-jump jump voice (PlayerSound playersound_jump)"
    layer: [presentation]
    base_refs:
      - "common/mutators/mutator/walljump/walljump.qc:66"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WalljumpMutator.cs:112"
      - "src/XonoticGodot.Common/Gameplay/Sounds/SoundSystem.cs:229"
      - "src/XonoticGodot.Common/Gameplay/Sounds/GameSound.cs:180"
    constants:
      - { name: "sound cue", base: "playersound_jump (per-model voice, CH_PLAYER, VOL_BASE, VOICETYPE_PLAYERSOUND)", port: "PlayPlayerSound(player,\"jump\",null,VolBase,AttenNorm) — resolves to sound/player/default.sounds/jump (NO on-disk asset; .sounds manifest unparsed)", match: false }
      - { name: "channel", base: "CH_PLAYER", port: "SoundChannel.VoiceAuto (CH_VOICE/-2)", match: false }
    status:
      logic: faithful
      values: partial
      timing: faithful
      presentation: stub
      audio: stub
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "WAVE-2 switched to the correct per-model API (SoundSystem.PlayPlayerSound(player,\"jump\",null,...)) — \"jump\" is a registered PlayerSoundId — but passes null for modelSoundDir, so PlayerSoundSample(null,\"jump\") => sound/player/default.sounds/jump. `default.sounds` is a TEXT MANIFEST (id->sample mapping, e.g. jump -> sound/player/espeak/player/jump), not a directory; the port's AssetLoader.ResolveSoundVpath probes sound/player/default.sounds/jump.{ogg,wav} verbatim, which does not exist, and nothing in the port parses .sounds manifests. So the cue STILL fails to resolve = silent. The proper fix is to pass the player's real model sound dir, but DamageSystem.ModelSoundDir is itself a `return null` stub (DamageSystem.cs:896), so the whole player-sound family currently routes to the unresolved default."
      - "Channel divergence: Base plays on CH_PLAYER; SoundSystem.PlayPlayerSound plays on SoundChannel.VoiceAuto (CH_VOICE). Minor, and moot while the sample doesn't resolve."
      - "Server-only emit (no client-side activation), so even if it resolved it would not play in remote-client prediction; networked from the server matches Base's #ifdef SVQC emit."
    verification:
      - { kind: code, ref: "WalljumpMutator.cs:112 SoundSystem.PlayPlayerSound(player,\"jump\",null,SoundLevels.VolBase,SoundLevels.AttenNorm). Sounds.PlayerSoundIds contains \"jump\" (GameSound.cs:159). PlayerSoundSample(null,id) = DefaultPlayerSoundDir + \"/\" + id = sound/player/default.sounds/jump (GameSound.cs:154,181). Asset scan: per-model jump.ogg present only under sound/player/<model>/player/jump.ogg; NO sound/player/default.sounds/jump.{ogg,wav} on disk; default.sounds is an ASCII manifest. AssetLoader.LoadSound/ResolveSoundVpath probe the literal path, no manifest parse -> miss -> silent.", result: fail }
    confidence: high
    notes: "PARTIALLY improved by Wave-2 (now the correct API + right volume + a registered \"jump\" id, so logic:faithful), but NOT closed: the null model-dir routes through the unparsed default.sounds manifest so no sample resolves and no cue is produced (presentation/audio stay stub). Distinct from the g_jump_grunt-gated standard-jump voice. Same default-dir resolution gap afflicts DamageSystem's pain/death voices (ModelSoundDir stub)."

