unit: mutator-walljump
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "Wall-jump impulse is server-authoritative only: it runs through the static PlayerJump mutator-hook chain, which is populated by MutatorActivation.Apply() — called ONLY in GameWorld (server). On a remote client the client-prediction Movement.Move->PlayerJump chain is empty, so the wall jump is NOT predicted and mispredicts/rubberbands; Base runs the impulse shared (CSQC+SVQC)."
    - "Jump sound plays a hardcoded \"player/jump.wav\" that resolves to NO shipped asset (real jump samples are per-model sound/player/<model>/player/jump.ogg); the correct per-model API (SoundSystem.PlayPlayerSound(player,\"jump\",modelDir)) exists but is bypassed, so the cue is effectively silent."
    - "Smoke-ring particle (Send_Effect EFFECT_SMOKE_RING, count 5) never emitted on a wall jump; handler has only `_ = hitPos;` TODO (WalljumpMutator.cs:98) though the effect is registered (EffectsList.cs:219)."
    - "oldvelocity is mis-stashed: port writes OldOrigin = Origin (wrong field AND wrong value); Base writes oldvelocity = velocity (the post-impulse velocity). The port Entity has no OldVelocity field at all, so the Base value is unrepresentable."
    - "Jump animation action (animdecide_setaction ANIMACTION_JUMP) not triggered on a wall jump."
    - "Cvar-override guards use `if (x != 0f)`, so explicitly setting any g_walljump* tunable to 0 (legal in Base) is silently ignored and the C# default is kept."
features:
  - id: mutator-walljump.activation.enable
    name: "Mutator registration + g_walljump enable gate"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/walljump/walljump.qc:REGISTER_MUTATOR"
      - "common/stats.qh:322"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WalljumpMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs:511"
    constants:
      - { name: "g_walljump", base: "0", port: "0 (mutators.cfg:485)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "MutatorActivation.Apply() is invoked ONLY in GameWorld.cs (server). The mutator (and thus its PlayerJump hook) is therefore subscribed on the SERVER process only. Base registers the mutator on CSQC unconditionally (true) AND on SVQC (autocvar). The port has no client-side activation, so on a remote (dedicated-server) client the walljump never runs in client prediction — see mutator-walljump.predict.shared_impulse."
    verification:
      - { kind: code, ref: "MutatorActivation.Apply at GameWorld.cs:511 -> Mutators.All -> IsEnabled (g_walljump!=0) -> Add -> Hook() subscribes the static PlayerJump chain; no client-side Apply caller found (grep: only GameWorld + PlayerPhysics reference MutatorActivation/PlayerJump.Call)", result: pass }
    confidence: high
    notes: "Server-side enable + hook subscribe is correct and live. The gate value (g_walljump!=0) matches Base. The liveness caveat is the client-prediction reach (downgraded to partial), not the server gate."

