    status:
      logic: partial
      values: missing
      timing: faithful
      presentation: stub
      audio: stub
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The jump sound is Api.Sound.Play(player, SoundChannel.Body, \"player/jump.wav\") — a hardcoded raw sample path. No such asset exists: jump samples ship per-model at sound/player/<model>/player/jump.ogg (there is no generic sound/player/jump.* nor a .wav), so the cue almost certainly fails to resolve = silent. The port HAS the correct API — SoundSystem.PlayPlayerSound(player, \"jump\", modelDir) -> Sounds.PlayerSoundSample -> sound/<modeldir>/jump (GameSound.cs:180, \"jump\" is in PlayerSoundIds) — but walljump bypasses it. (DodgingMutator.cs:308 has the identical hardcoded-path bug.)"
      - "Server-only emit: fires only in the server hook (no client-side activation), so even if it resolved it would not play in remote-client prediction; networked from the server matches Base's #ifdef SVQC emit, so this is acceptable IF the path resolved — but it does not."
    verification:
      - { kind: code, ref: "WalljumpMutator.cs:97 Api.Sound.Play(...,\"player/jump.wav\") vs Base PlayerSound(player, playersound_jump, ...). Asset scan: only per-model sound/player/<model>/player/jump.ogg present, no generic player/jump.* and no .wav. Correct per-model API SoundSystem.PlayPlayerSound exists (id \"jump\" registered) and is unused by walljump.", result: fail }
    confidence: high
    notes: "Downgraded from the draft's audio:partial to audio:stub: a sound call IS made on the right trigger, but with a path that resolves to no shipped sample, so no cue is produced. Distinct from the g_jump_grunt-gated standard-jump voice (which PlayerPhysics also does NOT play — see notes there). Runtime audibility not directly observed but the asset gap is conclusive."

