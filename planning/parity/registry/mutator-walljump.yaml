unit: mutator-walljump
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "Wall-jump impulse is server-authoritative only: it runs through the static PlayerJump mutator-hook chain, which is populated by MutatorActivation.Apply() — called ONLY in GameWorld (server, line 535). On a dedicated-server remote client the client-prediction Movement.Move->PlayerJump chain is empty, so the wall jump is NOT predicted and mispredicts/rubberbands; Base runs the impulse shared (CSQC+SVQC). UNCHANGED by Waves 1-2."
    - "Jump voice is STILL effectively silent after the Wave-2 rewrite: the call now uses the correct per-model API SoundSystem.PlayPlayerSound(player,\"jump\",null,...), but the null model-dir resolves to sound/player/default.sounds/jump, and `default.sounds` is a TEXT MANIFEST (id->sample map), not a directory. The port's AssetLoader.ResolveSoundVpath probes sound/player/default.sounds/jump.{ogg,wav} verbatim on disk (no .sounds-manifest parsing anywhere in the port), so the file is absent and the cue stays silent. Base resolves jump per-model to e.g. sound/player/espeak/player/jump. (DamageSystem.ModelSoundDir is itself a `return null` stub, so the whole player-sound family shares this unresolved-default gap.)"
    - "oldvelocity is mis-stashed: port writes OldOrigin = Origin (wrong field AND wrong value); Base writes oldvelocity = velocity (the post-impulse velocity). The shared Entity (Framework/Entity.cs:31) STILL has no OldVelocity field (only Origin, OldOrigin, Velocity, Angles, AVelocity), so the Base value is unrepresentable here. UNCHANGED."
    - "Jump animation action (animdecide_setaction ANIMACTION_JUMP) still not triggered on a wall jump (no anim-action seam in the port). UNCHANGED."
features:
  - id: mutator-walljump.activation.enable
    name: "Mutator registration + g_walljump enable gate"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/walljump/walljump.qc:REGISTER_MUTATOR"
      - "common/stats.qh:322"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WalljumpMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs:535"
    constants:
      - { name: "g_walljump", base: "0", port: "0 (mutators.cfg:485)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "MutatorActivation.Apply() is invoked ONLY in GameWorld.cs:535 (server). The mutator (and thus its PlayerJump hook) is therefore subscribed on the SERVER process only. Base registers the mutator on CSQC unconditionally (true) AND on SVQC (autocvar). The port has no client-side activation, so on a remote (dedicated-server) client the walljump never runs in client prediction — see mutator-walljump.predict.shared_impulse. UNCHANGED by Waves 1-2."
    verification:
      - { kind: code, ref: "MutatorActivation.Apply at GameWorld.cs:535 -> Mutators.All -> IsEnabled (g_walljump!=0) -> Add -> Hook() subscribes the static PlayerJump chain; grep MutatorActivation.Apply finds only GameWorld.cs:535 (no client-side caller)", result: pass }
    confidence: high
    notes: "Server-side enable + hook subscribe is correct and live. The gate value (g_walljump!=0) matches Base. The liveness caveat is the client-prediction reach (partial), not the server gate. Apply() call moved 511->535 but topology is identical."

