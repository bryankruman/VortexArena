  - id: mutator-walljump.fx.sound
    name: "Wall-jump jump voice (PlayerSound playersound_jump)"
    layer: [presentation]
    base_refs:
      - "common/mutators/mutator/walljump/walljump.qc:66"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/WalljumpMutator.cs:114"
      - "src/XonoticGodot.Common/Gameplay/Sounds/SoundSystem.cs:229"
      - "src/XonoticGodot.Common/Gameplay/Sounds/GameSound.cs:195"
      - "game/loaders/PlayerSoundResolver.cs:Install"
      - "game/net/NetGame.cs:398"
    constants:
      - { name: "sound cue", base: "playersound_jump (per-model voice, CH_PLAYER, VOL_BASE, VOICETYPE_PLAYERSOUND)", port: "PlayPlayerSound(player,\"jump\",ModelSoundsFile(model,skin),VolBase,AttenNorm) — resolves via .sounds manifest to sound/player/espeak/player/jump.ogg (default pack)", match: true }
      - { name: "channel", base: "CH_PLAYER", port: "SoundChannel.VoiceAuto (CH_VOICE/-2)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: faithful
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Minor channel divergence: Base plays on CH_PLAYER; SoundSystem.PlayPlayerSound hardcodes SoundChannel.VoiceAuto (CH_VOICE). Audible and per-model-correct otherwise; channel only affects which slot the cue occupies/cuts."
      - "Server-only emit (no client-side mutator activation), so the cue does not play in remote-client prediction; it is networked from the server (matches Base's #ifdef SVQC emit). Hence liveness=partial, same root cause as predict.shared_impulse."
    verification:
      - { kind: code, ref: "WalljumpMutator.cs:114 SoundSystem.PlayPlayerSound(player,\"jump\",Sounds.ModelSoundsFile(player.Model,(int)player.Skin),VolBase,AttenNorm). PlayPlayerSound -> Sounds.PlayerSoundSample(modelSoundsFile,\"jump\") -> ModelSoundResolver.Invoke (PlayerSoundResolver.Resolve): tries the model's .sounds manifest then falls back to default.sounds, which maps `jump -> sound/player/espeak/player/jump` (verified line present in assets/.../sound/player/default.sounds). Asset on disk: assets/data/xonotic-data.pk3dir/sound/player/espeak/player/jump.ogg EXISTS. AssetLoader.ResolveSoundVpath probes sound/player/espeak/player/jump.ogg -> hit.", result: pass }
      - { kind: code, ref: "resolver is LIVE: PlayerSoundResolver.Install(_vfs) is called in NetGame._Ready (NetGame.cs:398) when a VFS is mounted (the normal play path), installing Sounds.ModelSoundResolver = Resolve. ModelSounds.ParseEntries faithfully parses the id/path/variant lines (last-wins, //comments skipped), matching QC LoadPlayerSounds (default first, model pack overrides).", result: pass }
    confidence: high
    notes: "CLOSED by the second-pass fix-up (commit 4be8357): the new PlayerSoundResolver parses .sounds manifests and is installed at boot, and walljump now passes the model's .sounds datafile (not null). The cue resolves to a real shipped asset (espeak default-pack jump.ogg) and is audible. Only the CH_PLAYER vs CH_VOICE channel choice and the server-only/predict liveness caveat remain. Same resolver fixes the whole player-sound family (pain/death voices via DamageSystem.ModelSoundDir)."

