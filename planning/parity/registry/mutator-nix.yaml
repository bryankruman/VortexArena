    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "QC's expr also requires !MUTATOR_IS_ENABLED(mutator_instagib) && !MUTATOR_IS_ENABLED(ok) && !MapInfo_LoadedGametype.m_weaponarena. The port has no cross-mutator MUTATOR_IS_ENABLED helper, so the exclusion is expressed against the underlying cvars g_instagib/g_overkill/g_weaponarena (NixMutator.cs:48-50) — the same stand-in NewToys/Vampire/instagib/melee_only use. Behaviorally equivalent: a direct `g_nix 1` can no longer double-activate alongside instagib/overkill/weapon-arena."
    gaps: []
    verification:
      - { kind: code, ref: "IsEnabled (lines 45-50): g_nix!=0 && g_instagib==0 && g_overkill==0 && g_weaponarena==0 — now mirrors sv_nix.qc:34's exclusions via the cvar stand-in", result: pass }
