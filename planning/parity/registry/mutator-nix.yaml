summary:
  feature_count: 14
  worst_gaps:
    - "Enable gate omits the instagib/overkill/weaponarena exclusion (IsEnabled = g_nix!=0 only); a direct cvar set can double-activate NIX alongside instagib/overkill."
    - "OnEntityPreSpawn target_items deletion is NOT ported and has no dispatch site; target_items triggers survive under NIX and can fight it over weapons/ammo."
    - "ForbidRandomStartWeapons handler is DEAD: a FireForbidRandomStartWeapons hook-method now exists (MutatorHooks.cs:382) but has zero call site repo-wide; effect moot only while the port grants no random start weapons."
    - "Per-frame switch re-asserts SwitchWeapon every tick instead of QC's switch-only-when-target-not-owned guard; not bit-identical with g_nix_with_blaster (manual mid-round switch not sticky)."
    - "BuildMutatorsString / BuildMutatorsPrettyString / SetModname not ported (no such hook chain in the port); NIX contributes no name to the scoreboard/mutator-list string."
