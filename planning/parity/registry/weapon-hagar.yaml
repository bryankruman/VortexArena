    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: faithful
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "exception value hardcoded to 1f on all three spawn paths; Base W_Hagar_Damage computes a DYNAMIC is_linkexplode (load_linkexplode=0 for same-owner secondary-load link, else -1). MOOT at stock g_projectiles_damage=-2 (both Base and port reject ALL projectile damage, so no rocket is shootable). Diverges only at non-stock modes -1/0/1, where the port would let any rocket be shot down while Base would not (the stock exception list is electro-combo/ML-mines, not general hagar shoot-down)."
      - "this.angles = vectoangles(this.velocity) re-orient on taking (non-lethal) damage is not ported (cosmetic; the rocket already self-aligns its angles to velocity each frame only on bounce)."
      - "damageforcescale (knockback applied to the rocket when shot) not modeled; moot at default 0."
    verification:
      - { kind: code_read, ref: "hagar.qc:53-74 W_Hagar_Damage vs Projectiles.MakeShootable/ShootDown (Hagar.cs:167,196,255): recursion guard + W_CheckProjectileDamage gate + RES_HEALTH subtract + detonate only at hp<=0 all faithful", result: pass }
      - { kind: code_read, ref: "live path: missile.TakeDamage=Yes + GtEventDamage installed by MakeShootable; DamageSystem.EventDamage (DamageSystem.cs:331-334) dispatches non-player GtEventDamage from the live Damage() apply path (DamageSystem.cs:280)", result: pass }
      - { kind: value_diff, ref: "balance-xonotic.cfg:202 g_projectiles_damage -2; bal-wep-xonotic.cfg:410 load_linkexplode 0 — exception:1 hardcode diverges but is masked at stock", result: partial }
    confidence: high
    notes: "MAJOR FIX in Wave-2 (was logic:partial). Previously the rocket detonated on ANY incoming damage with no gate and no HP accounting. Now Projectiles.MakeShootable installs the faithful W_CheckProjectileDamage gate + RES_HEALTH subtraction, and only detonates at hp<=0 (a non-lethal graze survives). Wired live via Entity.GtEventDamage dispatched by DamageSystem.EventDamage. Residual: exception:1 hardcode instead of the dynamic is_linkexplode — harmless at stock -2 but not bit-faithful at non-default g_projectiles_damage."

