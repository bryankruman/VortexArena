      - "DEAD at stock balance: secondary_load=1 (Base) and SecondaryLoad=true (port), so WrThink always routes the secondary to AttackLoadRelease — AttackBounce/BounceTouch have no live caller in a normal match. Only reachable if g_balance_hagar_secondary=load is set to 0 (non-stock)."
