  worst_gaps:
    - "Loadable secondary hold-to-charge state machine absent: every secondary press fires the full 4-rocket salvo instantly; no partial loads, no 0.5s/rocket charge."
    - "All Hagar load/charge audio missing (SND_HAGAR_LOAD per-rocket tick, SND_HAGAR_BEEP last-rocket/abort/auto-release warning beeps)."
