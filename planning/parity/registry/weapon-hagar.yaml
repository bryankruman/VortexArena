    divergence_rationale: "Documented in Hagar.cs class comment: the incremental hold-to-charge machine needs per-tick held-button input the headless layer does not carry yet, so the secondary is summarized to firing the full load_max salvo on each press, gated by the secondary refire (0.5s). The salvo math itself (load_spread fan via CalculateSpreadPattern + per-shot bias spread) is faithful."
