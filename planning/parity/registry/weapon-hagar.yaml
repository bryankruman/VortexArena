summary:
  feature_count: 12
  worst_gaps:
    - "RESOLVED (Wave-5): the loadable secondary hold-to-charge state machine is ported and driven live each frame (AttackLoad) — partial 1-3 loads, 0.5s/rocket charge, auto-release after load_hold, abort-on-primary give-back, loadblock gate. Re-verified live 2026-06-25: WeaponFireDriver.Frame calls WrThink(Primary) every tick with st.ButtonAttack/ButtonAttack2 set (driver.cs:134,163), AttackLoad runs first inside it."
    - "RESOLVED (Wave-5): Hagar load/charge audio (SND_HAGAR_LOAD per-rocket tick + SND_HAGAR_BEEP last-rocket/abort/warning beeps) play from the charge machine."
    - "RESOLVED (Wave-5): the HUD Hagar load ring draws — the charge machine writes a live st.HagarLoad; UpdateCrosshairWeaponRings (NetGame.cs:2915) feeds it to CrosshairPanel.HagarLoad which draws the ring (CrosshairPanel.cs:906)."
    - "FIXED (this 2026-06-25 audit): the load-state LIFECYCLE hooks (hagar.load_lifecycle) are now PORTED and LIVE — WrSetup (Hagar.cs:455, dispatched WeaponFireDriver.cs:284), WrGoneThink (Hagar.cs:470, dispatched WeaponFireDriver.cs:250), WrPlayerDeath (Hagar.cs:483, dispatched DamageSystem.cs:614), WrResetPlayer (Hagar.cs:499, dispatched SpawnSystem.cs:814). The 2026-06-22 'rockets+ammo vanish on switch/death mid-charge' divergence is CLOSED."
    - "Minor residual: WrPlayerDeath/WrResetPlayer dispatch only on the currently-active weapon (Inventory.CurrentWeapon) — Base wr_resetplayer iterates ALL weaponslots. Equivalent in the single-active-weapon port (load lives only on the held weapon) but narrower than Base."
