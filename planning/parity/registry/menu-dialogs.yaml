unit: menu-dialogs
category: menu
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-07-02"
# Scope: the settings dialog tree (menu/xonotic/dialog_settings*.qc) and the multiplayer dialog tree
# (dialog_multiplayer*.qc) — the dialog SURFACES and whether each bound cvar actually takes effect.
# Boundaries: menu-core owns the VM/toolkit/widget files, the one-off dialogs (quit/welcome/teamselect/
# uid2name/firstrun/ToS/winner/gamemenu/hudpanel_*/hudsetup_exit/sandbox/monster), the serverlist/maplist/
# keybinder/skinlist/languagelist/statslist WIDGETS, and the media dialogs. cl-crosshair owns the crosshair
# render wiring; cl-hud owns panel rendering; fx-sounds owns sound emission; physics-player owns movement
# cvar consumption. This unit audits: dialog exists? settings present? does changing them do anything?
# Wiring ground truth: planning/graphics-settings-audit-2026-06-14.md, re-spot-checked 2026-07-02 (several
# cvars have been wired since: hud_shownames*, waypointsprites, cl_bob/v_idlescale, chase_active/chase_back,
# cl_gunalign/cl_followmodel/cl_bobmodel/cl_viewmodel_alpha, cl_ghost_items, cl_forceplayer*, cl_deathglow).
summary:
  feature_count: 21
  worst_gaps:
    - "Effects tab is a facade: the 5 quality-preset buttons are DEAD ('exec effects-*.cfg' has no MenuCommand handler) and nearly every graphics cvar the tab binds (picmip, texture compression, lightmaps, offset mapping, reflections, decals master/fade/distance, damage effects, all r_shadow_* lights/shadows, coronas, bloom, motion blur, sky) has no reader — MSAA 4x/aniso 8x/glow/ambient 0.6 are hardcoded in project.godot/NetGame.AddLight."
    - "Misc tab's two escalation buttons are broken: 'Advanced settings...' issues menu_showcvarsdialog which no handler/registry entry resolves (DialogCvarList is reachable ONLY via the dev --menu-screen flag), and 'Factory reset' skips the QC confirm dialog + backup ('saveconfig backup.cfg; exec default.cfg') and instead resets EVERY store cvar in memory with no backup."
    - "QC makeMulti sibling cvars are silently dropped by nearly every port checkbox — and several dropped siblings ARE read live, so the toggle half-works: 'View bobbing' writes cl_bob but not cl_bob2 (FirstPersonView reads both), 'Gun model swaying' writes cl_followmodel but not cl_leanmodel (ViewModel reads both, default ON — unchecking leaves the lean), waypoint edge-offset writes 1 of the 4 edges WaypointSpriteLayer reads, 'Powerup notifications' writes 1 of 14 notification_* cvars, 'Just the gore' drops cl_gentle_damage; the 17-cvar start-weapon override is the one faithful multi."
    - "Audio output half is dead: snd_speed/snd_channels/snd_swapstereo/snd_spatialization_control are cosmetic (Godot mixer unconfigured), the Items (snd_channel3volume) and Pain (snd_channel6volume) sliders route to NO audio bus, snd_staticvolume is registered but never applied, and the volume sliders silently swap the QC decibel scale for linear percent."
    - "Profile 'Apply immediately' is inert: its verbatim QC command ('color -1 -1; name \"$_cl_name\"; playermodel ...; playerskin ...') hits MenuCommand's unknown-command log, so name/model/color edits only take effect through cvar replication on the NEXT connect instead of live mid-match."
