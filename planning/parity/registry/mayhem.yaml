      - "src/XonoticGodot.Server/GameWorld.cs:ActivateGameType (case Mayhem)"
    constants:
      - { name: "netname", base: "mayhem", port: "mayhem", match: true }
      - { name: "teamgame", base: "false (FFA)", port: "false", match: true }
      - { name: "pointlimit_default", base: "1000", port: "1000", match: true }
      - { name: "leadlimit_default", base: "0", port: "0", match: true }
      - { name: "timelimit_default", base: "15 (min)", port: "global timelimit cvar (not set on select)", match: false }
    status:
      logic: faithful
      values: partial
