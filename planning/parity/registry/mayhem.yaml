unit: mayhem
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Players spawn with only the Blaster, not the full arsenal: the SetWeaponArena hook (most_available) is DEAD — no Call site in the port."
    - "timelimit=15 gametype default is never applied (port reads the global timelimit cvar)."
    - "DEATH_CAMP environmental-suicide penalty omitted (no campcheck deathtype in the port)."
