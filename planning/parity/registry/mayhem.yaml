  - id: mayhem.combat.regen_rot
    name: "PlayerRegen — disable health/armor regen and rot"
    layer: [authority]
    base_refs:
      - "common/gametypes/gametype/mayhem/sv_mayhem.qc:MUTATOR_HOOKFUNCTION(mayhem, PlayerRegen)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Mayhem.cs:Mayhem.OnPlayerRegen"
      - "src/XonoticGodot.Server/PlayerFrameLogic.cs:46 (PlayerRegen.Call)"
    constants:
      - { name: "g_mayhem_regenerate", base: "0", port: "0", match: true }
      - { name: "g_mayhem_rot", base: "0", port: "0", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "The port's PlayerRegen hook surface is narrower than QC's — it returns a single 'disable' bool instead of separately zeroing the regen arg (M_ARGV 2) and the rot arg (M_ARGV 3). With the stock defaults (both off) QC's `return (!regenerate && !rot)` is exactly the port's `return !regenerate && !rot`, so the observable result is identical; this is a deliberate narrower seam, not a defect. It would only diverge if one of g_mayhem_regenerate / g_mayhem_rot were enabled independently (non-default)."
    gaps:
      - "If g_mayhem_regenerate XOR g_mayhem_rot were set (non-default), the port cannot independently zero one arg — it returns a single disable bool. Non-default config only; faithful in every shipped config."
    verification:
      - { kind: code, ref: "OnPlayerRegen returns !regen && !rot (Mayhem.cs:516); QC sv_mayhem.qc:77-84 identical for both-off; PlayerRegen.Call live at PlayerFrameLogic.cs:46", result: pass }
    confidence: high
    notes: "Default config (both 0) is bit-identical to QC. The narrower hook surface is the only divergence and only matters in a non-shipped config; flagged intended (logic faithful in every default/shipped config, not 'partial')."

