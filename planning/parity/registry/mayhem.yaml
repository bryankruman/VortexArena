    port_refs:
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Mayhem.cs:MayhemScoring.AccrueSplitHealthArmor"
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Mayhem.cs:Mayhem.OnSplitHealthArmor"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:401 (PlayerDamageSplitHealthArmor.Call)"
    constants:
      - { name: "damage_weight_zero_earlyout", base: "if !damage_weight return", port: "if DamageWeight==0 return", match: true }
      - { name: "useful_damage", base: "frag_damage - max(0, dmg - take - save)", port: "fragDamage - excess", match: true }
      - { name: "spawnshield_block_ge1", base: "StatusEffects_active(SpawnShield) && blockdamage>=1 → return", port: "HasSpawnShield(SpawnShieldExpire>now) && blockdamage>=1 → return", match: true }
      - { name: "env_suicide_set", base: "KILL,DROWN,HURTTRIGGER,CAMP,LAVA,SLIME,SWAMP", port: "Kill,Drown,Void,Lava,Slime,Swamp (no CAMP)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEATH_CAMP (campcheck) is omitted from the environmental-suicide subtraction (the port models no campcheck death), so a campcheck suicide would not be penalized. The port has no campcheck deathtype at all, so no such death is produced — latent, not currently observable."
    verification:
      - { kind: code, ref: "AccrueSplitHealthArmor vs QC; hook fires unconditionally at DamageSystem.cs:401", result: pass }
      - { kind: code, ref: "MayhemScoring.HasSpawnShield uses SpawnShieldExpire>now, identical to DamageSystem.HasSpawnShield (DamageSystem.cs:730) — the port's uniform spawn-shield model; QC StatusEffects_active(SpawnShield) equivalence VERIFIED, not approximate", result: pass }
    confidence: high
    notes: "Hook is fired with the TRUE FragAttacker/FragDeathType/pre-split FragDamage, so the self/world cases accrue correctly. DEATH_HURTTRIGGER maps to the port's Void tag. Spawn-shield read is the SAME model the whole DamageSystem uses (the StatusEffects catalog deliberately keeps SpawnShield on the entity) — equivalence confirmed, so this is NOT an unverified concern."

