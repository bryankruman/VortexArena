    verification:
      - { kind: code, ref: "GameWorld.ResolveGameType/ActivateGameType + Mayhem ctor", result: pass }
    confidence: high
    notes: "Pointlimit/leadlimit defaults are correctly hardcoded (1000/0). m_legacydefaults says timelimit 20 but gametype_init says 15; neither is applied."

