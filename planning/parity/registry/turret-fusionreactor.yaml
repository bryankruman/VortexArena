unit: turret-fusionreactor
category: turret
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "No client presentation at all: turrets have no networked ENT_CLIENT_TURRET entity in the port, so the reactor renders nothing — no model, no ammo-scaled head spin (Base '0 250 0'*ammo/ammo_max), no waypoint sprite/healthbar, no death/gib FX."
    - "te_smallflash at each recharged recipient is not emitted (the EffectEmitter.TeSmallflash API exists but the reactor only references it in a comment)."
    - "Recharge cadence diverges: the port tops up ALL eligible allies per shot_refire (0.2s), whereas Base advances attack_finished_single after the first turret_fire in the sweep so it tops up ONE ally per 0.2s — the port powers a cluster ~N× faster."
    - "Recipient TFL_AMMO_ENERGY check is missing: IsRechargeableAlly accepts any same-team alive turret_* without verifying the recipient uses energy ammo (harmless today since all offensive turrets use energy, but not faithful)."
    - "respawntime is 60 (TurretSpawn.Init default) instead of the cfg's 90 — FusionReactorTurret.Spawn doesn't pass the cfg value."
features:
