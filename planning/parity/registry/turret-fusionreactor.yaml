      - { name: "shot_refire", base: "0.2", port: "0.2", match: true }
      - { name: "target_range", base: "1024", port: "1024", match: true }
    status:
      logic: partial
      values: faithful
      timing: partial
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Recharge cadence diverges: the port refills ALL eligible allies on each shot_refire tick; Base advances attack_finished_single inside turret_fire after the FIRST recipient, and turret_fusionreactor_firecheck's attack_finished_single[0]>time gate then rejects the rest that same think — so Base tops up only ONE ally per 0.2s. The port powers a multi-turret cluster ~N× faster than Base AND drains its own ammo ~N× faster per tick (N*20 vs 20)."
    verification:
      - { kind: code-read, ref: "sv_turrets.qc:1022-1040 HITALLVALID loop + turret_fire (960-983) refire reset + firecheck (fusionreactor.qc:15) refire gate vs FusionReactorTurret.Think whole-sweep AttackFinished gate (lines 55,77-78)", result: fail }
    confidence: high
    notes: "Top-up amount/cap/own-ammo-spend-per-recipient are bit-faithful; the divergence is purely how the 0.2s refire gate interacts with the multi-target loop (per-recipient one-shot in Base vs whole-sweep in the port). Verified against actual Base loop + the per-fire attack_finished_single reset."

