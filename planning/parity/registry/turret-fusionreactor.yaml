last_audited: "2026-06-27"  # W16/17 re-verify: all prior fixes hold against current code (mutator hook LIVE, te_smallflash real block, recipient-energy gate, one-ally-per-refire, respawntime 90). Refreshed stale port_ref line numbers (Wave-16 landed the hook at MutatorHooks.cs:1463/1484, call site FusionReactorTurret.cs:122). No status changes.
summary:
  feature_count: 9
  worst_gaps:
    - "No client presentation at all: turrets have no networked ENT_CLIENT_TURRET entity in the port, so the reactor renders nothing — no model, no ammo-scaled head spin (Base '0 250 0'*ammo/ammo_max), no waypoint sprite/healthbar, no death/gib FX."
    - "head_model (reactor.md3) is not carried — no head entity exists in the port turret model; the initial head spin (50 deg/s) + scale 0.75 + ammo-scaled spin all depend on the absent client head render."
    - "TUR_FLAG_SUPPORT/AMMOSOURCE are not stored as flags; support behavior is hardcoded in the C# class instead of derived from spawnflags (functionally harmless — AMMOSOURCE is purely declarative in Base, SUPPORT only selects targetscore_support which the reactor never uses)."
    - "MENUQC describe() turret help text is not ported (no menu turret-codex equivalent in the port)."
