unit: turret-fusionreactor
category: turret
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"  # re-verified: no drift
summary:
  feature_count: 8
  worst_gaps:
    - "No client presentation at all: turrets have no networked ENT_CLIENT_TURRET entity in the port, so the reactor renders nothing — no model, no ammo-scaled head spin (Base '0 250 0'*ammo/ammo_max), no waypoint sprite/healthbar, no death/gib FX. (te_smallflash IS now emitted at each recipient, but it resolves to a generic muzzle-flash approximation, not the networked te_smallflash temp-entity.)"
    - "head_model (reactor.md3) is not carried — no head entity exists in the port turret model; the initial head spin (50 deg/s) + scale 0.75 + ammo-scaled spin all depend on the absent client head render."
    - "TUR_FLAG_SUPPORT/AMMOSOURCE are not stored as flags; support behavior is hardcoded in the C# class instead of derived from spawnflags (functionally harmless — AMMOSOURCE is purely declarative in Base, SUPPORT only selects targetscore_support which the reactor never uses)."
    - "The FusionReactor_ValidTarget mutator override hook is not implemented (no stock Xonotic mutator registers it, so it is inert in Base too)."
