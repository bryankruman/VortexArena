    constants:
      - { name: "own-ammo gate", base: "this.ammo >= shot_dmg", port: "st.Ammo < ShotDamage -> break", match: true }
      - { name: "recipient-not-full gate", base: "targ.ammo < targ.ammo_max", port: "allyState.Ammo >= AmmoMax -> continue", match: true }
      - { name: "same-team gate", base: "this.team == targ.team", port: "TurretAI.SameTeam", match: true }
      - { name: "alive gate", base: "!IS_DEAD(targ)", port: "ally.Health <= 0 -> reject", match: true }
      - { name: "range gate", base: "vdist(<= target_range)", port: "ValidTarget range / FindInRadius(TargetRange)", match: true }
      - { name: "recipient energy gate", base: "targ.ammo_flags & TFL_AMMO_ENERGY", port: "IsRechargeableAlly: !State(ally).AmmoIsEnergy -> reject", match: true }
