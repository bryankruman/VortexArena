      - "common/turrets/turret/fusionreactor.qh:FusionReactor (CLASS / REGISTER_TURRET)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Turrets/FusionReactorTurret.cs:FusionReactorTurret (ctor + Spawn SetSize)"
    constants:
      - { name: "netname", base: "fusreac", port: "fusreac", match: true }
      - { name: "m_name", base: "Fusion Reactor", port: "Fusion Reactor", match: true }
      - { name: "model", base: "models/turrets/base.md3", port: "models/turrets/base.md3", match: true }
      - { name: "head_model", base: "models/turrets/reactor.md3", port: "none (no head entity)", match: false }
      - { name: "m_mins", base: "'-34 -34 0'", port: "(-34,-34,0)", match: true }
      - { name: "m_maxs", base: "'34 34 90'", port: "(34,34,90)", match: true }
      - { name: "spawnflags", base: "TUR_FLAG_SUPPORT|TUR_FLAG_AMMOSOURCE", port: "doc-only (no flags int; behavior hardcoded as support)", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: partial
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "head_model (reactor.md3) is not carried — no head entity exists in the port turret model."
      - "TUR_FLAG_SUPPORT/AMMOSOURCE are not stored as flags; support behavior is hardcoded in the C# class instead of derived from spawnflags. (Verified TUR_FLAG_AMMOSOURCE is declared but NEVER read anywhere in Base qcsrc — purely declarative — so its omission is functionally harmless; TUR_FLAG_SUPPORT only selects turret_targetscore_support, which the reactor never invokes since it has no targetscore-driven path.)"
    verification:
      - { kind: code-read, ref: "fusionreactor.qh vs FusionReactorTurret.cs ctor+Spawn", result: pass }
    confidence: high
    notes: "Body identity/bbox faithful; the head model + support-scoring-by-flag are absent (support scoring is moot here anyway since the reactor never uses targetscore)."

