unit: weapon-shotgun
category: weapon
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "Hitscan spread distribution STILL style 0: Base default g_hitscan_spread_style=4 (gauss-2D on the aim plane, balance-xonotic.cfg:209) but WeaponFiring.CalculateSpread still implements only style 0 (dir + randomvec()*spread, normalized) — the 12-pellet scatter density profile remains non-Base-faithful. UNCHANGED by Waves 1-2."
    - "Shell-casing eject is server-wired but client-DEAD: Shotgun.Attack now calls WeaponFiring.EjectCasing (live, gated, deterministic velocity) which emits effect-name 'casing_shell', but NO sink maps that name to EffectSystem.SpawnCasing — RenderSink routes it to EffectSystem.Spawn('casing_shell',…) which resolves to a null effect and falls into the generic particle path, never a real brass casing. SpawnCasing still has ZERO callers (grep). Also the eject up-velocity uses the machinegun value (70 - rand*5) not the shotgun's (30 - rand*5, shotgun.qc:81), and the gate is g_casings>=2 vs Base shotgun's g_casings>=1."
    - "Out-of-ammo auto-melee fallback is wired-but-BROKEN: WrThink now has the emptyPrimaryAutoMelee branch, but it gates on PrepareAttack(actor, slot, FireMode.Secondary) which requires st.ButtonAttack2 held — on an empty PRIMARY press ATK2 is NOT held, so PrepareAttack returns false and the auto-melee never fires. Looks wired, is dead."
    - "Melee is still collapsed to a single-tick pass: no melee_delay (0.25s) wind-up and no melee_time (0.15s) multi-frame think; all damage lands on one frame. melee_no_doubleslap still not modeled. UNCHANGED by Waves 1-2."
    - "g_ballistics_mindistance still hardcoded to 1 in FireBullet vs cfg default 2 (xonotic-server.cfg:470) — penetrates walls thinner than Base allows. UNCHANGED."
    - "Impact ricochet now plays but UN-throttled: BulletImpactFx calls SoundSystem.PlayRic on EVERY pellet impact (~12/shot) with no 5%-chance / 0.25s-prevric throttle (shotgun.qc:404-409), so the ricochet sounds far too often vs Base."

