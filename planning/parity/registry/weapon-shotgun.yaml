summary:
  feature_count: 12
  worst_gaps:
    - "Hitscan spread distribution STILL style 0: Base default g_hitscan_spread_style=4 (gauss-2D on the aim plane, balance-xonotic.cfg:209) but WeaponFiring.CalculateSpread still implements only style 0 (dir + randomvec()*spread, normalized) — the 12-pellet scatter density profile remains non-Base-faithful. UNCHANGED by the Wave-4 fix-up."
    - "Impact ricochet plays but is UN-throttled: BulletImpactFx calls SoundSystem.PlayRic on EVERY pellet impact (~12/shot) with NO 5%-chance (w_random<0.05) / 0.25s-prevric throttle (shotgun.qc:404-409 verified), so the ricochet sounds far too often vs Base. STILL OPEN."
    - "Melee is still collapsed to a single-tick pass: no melee_delay (0.25s) wind-up and no melee_time (0.15s) multi-frame think; all damage lands on one frame. melee_no_doubleslap still not modeled. UNCHANGED."
    - "g_ballistics_mindistance still hardcoded to 1 in FireBullet (WeaponFiring.cs:235) vs cfg default 2 (xonotic-server.cfg:470) — penetrates walls thinner than Base allows. g_ballistics_penetrate_clips still not modeled. UNCHANGED."
    - "Bot aim override (wr_aim: melee within 120u, ranged tuning) STILL MISSING — bots use the generic brain. UNCHANGED."
    - "trueaim minrange clamp (g_trueaim_minrange=44) STILL not applied; point-blank shot dir can differ slightly. UNCHANGED."

