unit: weapon-shotgun
category: weapon
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "Hitscan spread distribution differs: Base default g_hitscan_spread_style=4 (clamped 2D gaussian on the aim plane) but the port's CalculateSpread only implements style 0 (forward + solid sphere then normalized) — the 12-pellet scatter density profile is not Base-faithful (verified: balance-xonotic.cfg:209 sets 4; WeaponFiring.CalculateSpread has no style switch)."
    - "Melee slap kill never tags HITTYPE_SECONDARY: Shotgun.Melee calls ApplyDamage with the bare RegistryId, and ApplyDamage maps that to FromWeapon(NetName) with no hittype bit, so the obituary always shows WEAPON_SHOTGUN_MURDER, never WEAPON_SHOTGUN_MURDER_SLAP — the selector branch in DeathMessages.cs:91 is dead for the slap."
    - "No shell-casing eject on fire: Base default g_casings=2 (>=1 ejects a shotgun casing per shot, shotgun.qc:78) but the port shotgun never spawns one (EffectSystem.SpawnCasing exists but has no shotgun caller)."
    - "Impact ricochet sound (5% chance / 0.25 s throttle, SND_RIC_RANDOM) is never played (SoundSystem.PlayRic exists but no caller) and the melee woosh (EFFECT_SHOTGUN_WOOSH) is registered but never emitted."
    - "Melee is collapsed to a single-tick pass instead of Base's traces-spread-over-melee_time think loop with a melee_delay (0.25 s) wind-up; all damage lands on one frame, no mid-swing ramp/escape window and no melee_no_doubleslap abort."
    - "g_ballistics_mindistance hardcoded to 1 in FireBullet vs cfg default 2 (xonotic-server.cfg:470) — penetrates walls thinner than Base allows."

