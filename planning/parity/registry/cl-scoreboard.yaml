      values: na
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Only the +showscores held-button path is wired (NetGame.cs:2701 reads BindTable.ShowScores → sets Visible). The death scoreboard (cl_deathscoreboard / _delay), intermission==1 forced-up, and intermission==2/QuickMenu/clickable-radar/DrawScoreboard-mutator-hook suppression branches of Scoreboard_WouldDraw are not ported."
