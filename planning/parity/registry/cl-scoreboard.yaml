unit: cl-scoreboard
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 22
  worst_gaps:
    - "Interactive scoreboard UI still entirely absent (arrow navigation, team-selection/join screen, spectate, vote-kick/tell, scoreboard_columns_set cycling, scores_per_round toggle)."
    - "Race/CTS rankings block on the scoreboard is STILL DEAD: ScoreboardPanel.SetRankings has no live caller (NetGame.cs:3453 feeds the ScorePanel overlay, not the scoreboard; race records not networked)."
    - "Item-stats block (per-item pickup-count icon grid) still entirely missing (no SetItemStats/DrawItemStats; inventory not networked for it)."
    - "Ping column still never networked (SetWireRows always passes ping -1 → dim '-'); color bands still hardcoded 75/200/500 vs Base cvar-driven 20/80/200."
    - "fps and skill columns still never render; packet-loss (pl) column always blank (not networked)."
    - "Name cell still missing all icons: player-color square, ready, handicap, ignored, and the (Q) wants-join marker."
    - "Accuracy block still drawn as plain '%' text, not the per-weapon icon grid; no showdelay/warmup/doublerows/nocolors."
    - "Map-stats secrets row still never fed (only monsters); death-scoreboard + intermission-forced visibility still not ported."
  notable_fixes_since_last_audit:
    - "Cross-fade in/out is now LIVE: NetGame.UpdateScoreboard sets ScoreboardPanel.Active=show, the Active setter + _Process ramp + _everActive now drive PanelFade on the real match path (was dead/popping)."
    - "Respawn-status line is now LIVE + three-state: server maintains Player.RespawnTimeStat (negated while DEAD_RESPAWNING), networked via ClientNet.RespawnTimeStat, fed every frame by UpdateScoreboard; DrawRespawn now renders the full QC dead/wait/press-jump line."
    - "Spectator list is now LIVE: the score wire carries an IsSpectator flag (ServerNet/ScoreboardBlock), SetWireRows routes spectator rows into the spectator block (was previously fed only by the dead SetSpectators API)."
