last_audited: "2026-06-27"
summary:
  feature_count: 21
  worst_gaps:
    - "Interactive scoreboard UI still entirely absent (arrow navigation, team-selection/join screen, spectate, vote-kick/tell, scoreboard_columns_set cycling, scores_per_round toggle)."
    - "Item-stats block (per-item pickup-count icon grid) still entirely missing (no SetItemStats/DrawItemStats; inventory not networked for it)."
    - "Ping column still never networked (SetWireRows always passes ping -1 → dim '-'); the value cell stays dead until per-row ping is added to the wire."
    - "fps and skill columns still never render; packet-loss (pl) movement-loss '~N' suffix not tracked."
    - "Name cell handicap icon LIVE (handicap_level networked end-to-end, exact '1 0 0'+'0 1 1'*((16-lvl)/15) tint); still missing player-color square, ready, ignored, and the (Q) wants-join marker."
    - "Accuracy block still drawn as plain '%' text, not the per-weapon icon grid; no showdelay/warmup/doublerows/nocolors."
    - "Content-measured column widths still approximated by a uniform numeric width + elastic name (no title-condense, no maxheight paging / '...and N more' overflow)."
    - "Rankings still single-column (no multi-column wrap / horizontal scroll)."
    - "Secondary teamscore (e.g. keyhunt) still not networked (only the primary team slot rides the wire)."
  notable_fixes_since_last_audit:
    - "RE-AUDIT 2026-06-27 (drift check): TWO new fixes since the prior audit, 0 regressions. (1) PING COLOR BANDS now match Base: PingColor (ScoreboardPanel.cs:727-738) reads hud_panel_scoreboard_ping_low=20/medium=80/high=200 live from the shared store (registered RegisterDefaults:1523-1525) with the QC band colors '0 1 0'/'1 1 0'/'1 0 0' and the exact lerp — was hardcoded 75/200/500 (an unintended value gap). The ping cell itself is still dead (ping not networked → always -1), but the colorization values are now faithful for when it is fed. (2) TEAM-SIZE side display (team_size_position) now PORTED on cl-scoreboard.teams.grouping_totals: DrawTeamTotals (ScoreboardPanel.cs:934-962) reads hud_panel_scoreboard_team_size_position (0/1/2, registered :1527) and draws the 'N/M' team-size string on the chosen side of each team box — was 'team_size_position absent'. All prior fixes (death/intermission auto-show, secrets feed, speed award, handicap icon, respawn jump-key, fade, spectators) re-confirmed live."
    - "RE-AUDIT 2026-06-25 (drift check): THREE fixes. (1) Death/intermission auto-show is LIVE on cl-scoreboard.toggle.showscores: UpdateScoreboard (NetGame.cs:3991-4073) implements the cl_deathscoreboard/_delay death scoreboard (4006-4020, client-side death_time stand-in via RESPAWN_TIME), intermission==1 force-up (4000), intermission==2/mapvote suppression (3999,4022), and the CTS-while-dead suppression hook (4013-4018); cl_deathscoreboard=1/_delay=1 cvars registered (NetGame.cs:1659-1660) and read live. (2) The map-stats SECRETS row is FED on cl-scoreboard.block.mapstats via FeedMapStats. (3) The race/CTS SPEED-AWARD line is ported + LIVE on cl-scoreboard.block.rankings (SetSpeedAward NetGame.cs:4065 → DrawSpeedAward ScoreboardPanel.cs:1291)."
    - "RE-AUDIT 2026-06-25 PRIOR: the name-cell HANDICAP icon is LIVE end-to-end (Entity.HandicapLevel → ScoreboardBlock.CaptureRows → ScoreRowWire.HandicapLevel → SetWireRows → DrawRow:1109-1117 colored square at the EXACT QC tint '1 0 0' + '0 1 1' * ((16-lvl)/15)). The other 4 name icons (player-color swatch, ready, ignored, (Q) wants-join) remain missing."
    - "Cross-fade in/out: LIVE (re-confirmed). NetGame.UpdateScoreboard:4026 sets ScoreboardPanel.Active=show; Active setter + _Process:747 ramp + _everActive:778 drive PanelFade on the real match path."
    - "Respawn-status line: LIVE + three-state (re-confirmed). RespawnStat fed every frame by UpdateScoreboard:4035; DrawRespawn:1200 renders the full QC dead/wait/press-jump line; RespawnJumpKey now resolved via BindTable.CommandKey (NetGame.cs:4039)."
    - "Spectator list / packet-loss (pl) / rankings block: all LIVE (re-confirmed) from Wave 5 — the score wire carries IsSpectator + PacketLossByte; rankings ride the scoreboard wire and feed SetRankings:4062."
