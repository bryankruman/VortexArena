unit: cl-scoreboard
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 22
  worst_gaps:
    - "Scoreboard is a passive overlay: no interactive UI (arrow navigation, team-selection/join screen, spectate, vote-kick/tell, scoreboard_columns_set cycling, scores_per_round toggle)."
    - "Cross-fade in/out is DEAD on the live path: NetGame.UpdateScoreboard toggles Visible directly and never sets ScoreboardPanel.Active, so _everActive stays false and PanelFade returns 1 — the panel pops instead of fading."
    - "Item-stats block (per-item pickup-count icon grid) is entirely missing."
    - "Race/CTS rankings block is present-but-dead: ScoreboardPanel.SetRankings has no live caller (NetGame.cs:2844 feeds ScorePanel, not the scoreboard; records not networked)."
    - "Spectator list + respawn-status line are present-but-dead: SetSpectators / RespawnRemaining have NO caller anywhere in the port."
    - "Ping column never networked (SetWireRows always passes ping -1 → dim '-'); color bands hardcoded 75/200/500 vs Base cvar-driven 20/80/200."
    - "fps and skill columns never render (FieldByLabel skips them); packet-loss (pl) column always blank."
    - "Name cell missing all icons: player-color square, ready, handicap, ignored, and the (Q) wants-join marker."
    - "Death-scoreboard (cl_deathscoreboard/_delay) and intermission==1 forced-up visibility, plus QuickMenu/radar/mutator-hook suppression, are not ported (only +showscores held)."
