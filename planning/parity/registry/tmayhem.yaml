summary:
  feature_count: 15
  worst_gaps:
    - "timelimit=20 gametype default is still not RESET per-select for a non-20 leftover: Wave-2 wired a live SeedTimeLimit(20) in OnInit, but its guard only writes when timelimit already == 20 (the generic default), so it is a 20→20 no-op and a prior mode's non-20 timelimit is NOT reset. Behavior unchanged from baseline mitigation."
    - "DEATH_CAMP environmental-suicide penalty omitted (no campcheck deathtype in the port; non-default mutator only)."
    - "Menu point-limit slider uses the generic fraglimit_override 5..100 instead of QC's g_tmayhem_point_limit 200..3000 (menu/mapinfo concern, deferred)."
  notes: >
    Wave-1/2 + second-pass re-audit (branch claude/parity-port-waves, commits ec788f7 / a76c8bc / 4be8357):
    the single biggest baseline gap — the DEAD SetWeaponArena chain (players spawning Blaster-only) —
    remains genuinely CLOSED and re-verified. MutatorHooks.SetWeaponArena.Call is live at
    SpawnSystem.ComputeStartItems:679 (the readplayerstartcvars seam, reached on the real spawn path via
    ApplyStartLoadout←SpawnSystem.cs:544) and the warmup path (:892). With TeamMayhem active, OnSetWeaponArena
    fills "most_available", ExpandWeaponArena resolves it to weapons_most, and players spawn with the full
    arsenal + unlimited ammo. NEW since baseline: Wave-2 also wired a live SeedTimeLimit(20) call in
    TeamMayhem.OnInit (GameWorld.cs:495 calls OnInit before ActivateGameType) — formerly dead scaffolding.
    Adversarial check: the seed's guard only fires when timelimit==20 (and writes 20), so it is observably a
    no-op and does NOT actually reset a non-20 leftover; the identity timelimit gap is therefore an intent/
    liveness improvement only, not a closed gap. No regressions found.
