  - id: tmayhem.score.per_kill
    name: "Per-kill score driver (QC GiveFragsForKill: zero direct frag + recompute attacker)"
    layer: [authority]
    base_refs:
      - "common/gametypes/gametype/tmayhem/sv_tmayhem.qc:MUTATOR_HOOKFUNCTION(tmayhem, GiveFragsForKill)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/GameTypes/TeamMayhem.cs:TeamMayhem.OnDeath"
      - "src/XonoticGodot.Server/Scores.cs:Obituary (OwnsScore gating)"
    constants:
      - { name: "direct_frag_suppressed", base: "M_ARGV(2)=0 (no +1)", port: "OwnsScore=false → Obituary never writes SP_SCORE", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Port routes the per-kill recompute through the Combat.Death bus (OnDeath) and suppresses the +1 frag by running Scores in non-owning mode (OwnsScore=false) rather than subscribing to a GiveFragsForKill hook. Observable result (no ±1 frag; score == the recompute) matches Base; the kills/teamkills/suicides aux columns are still maintained by the obituary so the recompute reads them."
    gaps: []
    verification:
      - { kind: code, ref: "VERIFIED 2026-06-22: GameWorld.cs:492 SubscribeToDeaths(teamGame, ownsScore:false) runs BEFORE :497 ActivateGameType, so Scores subscribes the Combat.Death bus first and ticks the aux kills/teamkills/suicides columns BEFORE TeamMayhem.OnDeath recomputes. Scores.Obituary guards every SP_SCORE/team write behind `if (OwnsScore)` (Scores.cs:492/502/510-522), all skipped here → no +1 frag. TeamMayhem.OnDeath:238/243 then calls MayhemScoring.Calculate(teamGame:true).", result: pass }
    confidence: high
    notes: "Same architecture as Mayhem.OnDeath; the recompute routes to the team total (teamGame:true). The QC GiveFragsForKill hook (M_ARGV(2)=0 + recompute, CBC_ORDER_FIRST) is NOT subscribed in the port; the equivalent effect is produced by OwnsScore=false suppressing the base +1 frag plus the OnDeath recompute (the divergence). NOTE: Scores.Obituary DOES still fire MutatorHooks.GiveFragsForKill.Call (Scores.cs:520) on enemy frags, but no tmayhem subscriber exists, so the frag stays +1 and is then suppressed solely by OwnsScore=false."

