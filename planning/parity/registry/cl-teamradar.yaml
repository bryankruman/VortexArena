unit: cl-teamradar
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 14
  worst_gaps:
    - "Maximized fullscreen radar entirely absent: no m-bind, no fullscreen tactical overview, no separate maximized rotation/zoom/scale runtime (cvars registered + dialog-exposed but never consumed)."
    - "Clickable maximized radar absent: no ONS spawn-point select (cmd ons_spawn), no teleport-click, no mouse/key/ESC/showscores input, no 'Click to select…' prompt, no icon hover-glow."
    - "Onslaught radar links (ENT_CLIENT_RADARLINK / draw_teamradar_link) not networked or drawn — ONS radar shows control points but no connection lines."
    - "TeamRadar_Draw client mutator hook unported: mutators cannot add custom blips, and its return value (ORed into the per-icon hover-glow team gate) is unmodeled."
    - "Minimap bounds come from raw BSP worldspawn model mins/maxs, not the authored minimap texcoord rect (get_mi_min_max_texcoords); misaligns on maps whose minimap rect != BSP bounds. Port also draws the dark playfield + blips even when no minimap image resolves (Base hard-gates the whole radar on minimapname != \"\")."
    - "Zoom/scale is a RangeUnits=2500 + scale/4 heuristic, not the Base mi_scale/scale2d bigsize/normalsize blend (the actual arena-fit big size is approximated by a fixed 2500u range)."

