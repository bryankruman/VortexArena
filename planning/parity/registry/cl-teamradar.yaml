unit: cl-teamradar
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Maximized fullscreen radar entirely absent: no m-bind, no fullscreen tactical overview, no separate maximized rotation/zoom/scale runtime."
    - "Clickable maximized radar absent: no ONS spawn-point select (cmd ons_spawn), no teleport-click, no mouse/key/ESC/showscores input, no 'Click to select…' prompt, no icon hover-glow."
    - "Onslaught radar links (ENT_CLIENT_RADARLINK / draw_teamradar_link) not networked or drawn — ONS radar shows control points but no connection lines."
    - "Ping pulses missing: a teammate/objective ping draws no expanding gfx/teamradar_ping ring on the radar (teamradar_times bit-7 stamping + pulse loop unported; ServerNet writes RadarIcon&0xFF, dropping the ping bit)."
    - "Registered cvar defaults are luma-skin values (scale 8192, foreground_alpha 1), not the QC code defaults (4096 / 0.8) teamradar_loadcvars applies when unset."
    - "Zoom/scale is a RangeUnits=2500 + scale/4 heuristic, not the Base mi_scale/scale2d bigsize/normalsize blend; current_zoomfraction modes 0/1 collapse to static endpoints so the +zoom-follow behavior is lost."
    - "hud_panel_radar enable cvar (0/1/2) is not honored at runtime: no disable, no team-only gating, no '2'=show-in-non-team-modes; the only live radar is the standalone NetGame instance (discovered HUD panel force-hidden)."

