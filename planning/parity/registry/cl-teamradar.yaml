      - { name: "bounds", base: "mi_min/mi_max from worldspawn minimap texcoords", port: "BSP Models[0].Mins/Maxs XY", match: partial }
      - { name: "flags", base: "DRAWFLAG_SCREEN | DRAWFLAG_MIPMAP, color '1 1 1'*fg, alpha 1", port: "DrawPolygon, color (1,1,1,fgAlpha)", match: partial }
    status:
