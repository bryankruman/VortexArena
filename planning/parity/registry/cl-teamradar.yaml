unit: cl-teamradar
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-28"
summary:
  feature_count: 14
  worst_gaps:
    - "TeamRadar_Draw client mutator hook unported: mutators cannot add custom blips, and its return value (ORed into the per-icon hover-glow team gate) is unmodeled."
    - "dynamichud scaling toggle (hud_panel_radar_dynamichud) + HUD_Radar_Export cvar-to-skin round-trip unported: the radar never participates in dynamic-HUD scaling and its 8 aesthetic cvars don't export to a saved skin."
    - "Minimap bounds come from raw BSP worldspawn model mins/maxs, not the authored minimap texcoord rect (get_mi_min_max_texcoords); also scale2d is assumed 1 in the zoom/scale fit — both misalign on maps whose authored minimap rect != BSP bounds."
    - "Maximized clickable prompt not gated on dead+showscores (no auto-hide); non-ONS teleport-click + death-time auto-open client-deferred (the maximized map + ONS spawn-pick themselves are now ported + LIVE)."
    - "Radar-link per-end color uses Team_ColorRGB not Base's colormapPaletteColor; ping pulses collapse Base's 32-slot per-icon ring to one timestamp per waypoint id."

