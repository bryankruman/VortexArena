unit: mutator-superspec
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Auto-spectate is unreachable on the live path: ItemTouch + SV_ParseClientCommand + ClientConnect mutator hook chains do NOT exist in MutatorHooks.cs, so no autospec/superspec flag can ever be SET. Even the now-live PlayerDies followkiller body is dead because ASF_FOLLOWKILLER can never be set."
    - "No superspec/autospec/superspec_itemfilter/followpowerup/followstrength/followshield spectator console commands (no SV_ParseClientCommand mutator hook chain to register verbs into)."
    - "No ItemTouch hook: spectators get no pickup-announcement messages and no auto-follow on Strength/Shield/Mega/flag grab."
    - "No per-client option persistence (superspec-*.options, ClientConnect/ClientDisconnect hooks absent); SUPERSPEC_MISSING_UID notification still has no producer."
    - "Scoreboard/serverinfo mutator list still never shows :SS / ', Super Spectators' (no BuildMutatorsString/BuildMutatorsPrettyString hook chains)."
