unit: mutator-superspec
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "Entire Super Spectate mutator is unimplemented: g_superspectate cvar does not exist and setting it has no effect (no SuperSpecMutator, not in Mutators.All)."
    - "No superspec/autospec/superspec_itemfilter/followpowerup/followstrength/followshield spectator console commands; spectators get none of the option toggles or manual follow commands."
    - "No auto-spectate switching on powerup/mega/flag/item pickup (ItemTouch) or on killer (PlayerDies/followkiller); no pickup-announcement messages."
    - "No per-client option persistence (superspec-*.options keyed by crypto_idfp); SUPERSPEC_MISSING_UID notification string is registered but dead (no caller, never fires)."
    - "Scoreboard/serverinfo mutator list never shows the :SS / ', Super Spectators' tags (no BuildMutatorsString/BuildMutatorsPrettyString handler)."
