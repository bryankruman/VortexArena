last_audited: "2026-06-22"
summary:
  feature_count: 11
  worst_gaps:
    - "[FIXED Wave-5] The superspec ItemTouch hook is now ported AND live: a new MutatorHooks.ItemTouch chain is fired from ItemPickupRules.ItemTouch (after the pickup gate, before the give), so spectators get the filtered pickup-announcement messages and the ASF_SSIM/Strength/Shield/Mega-Armor/Mega-Health/flag-grab auto-follow with observer_only suppression. This was the single largest remaining gap."
    - "[FIXED Wave-5] Per-client options persistence is now live: OnClientConnect/OnClientDisconnect are called from GameWorld.InfraClientConnect/Disconnect (gated on the mutator being Added), seed the SSF_VERBOSE/\"\" connect defaults, and load/save the crypto_idfp-keyed options file via the host-wired Store (magic SUPERSPEC_OPTIONSFILE_V1, ~/XonData/superspec/). Caveat: IsLocalProvider is left unwired, so the listen-host local-file fast path is not taken (everyone is crypto_idfp-keyed; an unauthenticated remote client is not persisted) — a documented intended divergence."
    - "[FIXED Wave-5] The SUPERSPEC_MISSING_UID notification now fires: a delayed superspec_hello is scheduled at time+5 on connect and drained by the live MutatorHooks.SvStartFrame pump, sending INFO_SUPERSPEC_MISSING_UID to a UID-less client only."
    - "[FIXED Wave-5] The centered (centerprint) form of superspec_msg is now wired: Msg routes the gated centerprint through NotificationSystem.SendCenterRaw (MsgType.CenterRaw), consumed live on the client HUD (HudNotifications.cs:146). The console sprint form remains wired via PrintTo. So spectators now see both the console line and the centered overlay."
    - "STILL OPEN: Scoreboard/serverinfo mutator list never shows :SS / ', Super Spectators' — no BuildMutatorsString/BuildMutatorsPrettyString hook chains exist in the port (shared gap across many ported mutators)."
