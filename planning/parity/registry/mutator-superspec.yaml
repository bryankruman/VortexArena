      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "IsLocalProvider is left unwired by the host, so the listen-host local-file fast path (IS_LOCAL -> superspec-local.options regardless of UID) is never taken; the port keys EVERYONE by crypto_idfp (dedicated-server behaviour). Net effect: an authenticated client persists; an unauthenticated remote client and a listen host's local fast-path do not. The bit-faithful load/save logic is in place behind the seam if IsLocalProvider is later wired."
