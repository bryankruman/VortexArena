    constants:
      - { name: "options file magic", base: "\"SUPERSPEC_OPTIONSFILE_V1\"", port: "\"SUPERSPEC_OPTIONSFILE_V1\" (checked on read, written on save)", match: true }
      - { name: "local filename", base: "superspec-local.options", port: "superspec-local.options (LocalOptionsFile; reached only when IsLocalProvider returns true)", match: true }
      - { name: "remote filename", base: "superspec-<uri_escape(crypto_idfp)>.options", port: "superspec-<UriEscape(PersistentId)>.options", match: true }
