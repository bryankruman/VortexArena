  feature_count: 17
  worst_gaps:
    - "Healthbar waypoint sprite (g_monsters_healthbars, WP_Monster) still not implemented: no monster health bars, no per-hit health update, no _Kill on death (the single largest remaining gap)."
    - "Monster sounds are GATED + THROTTLED, honour a per-monster .sounds cue set (SoundCues; Zombie={death,sight,idle}.ogg, Golem={death,sight,melee,pain,idle}.wav with variant counts, Spider=empty/silent), and route via a per-monster SoundDir/SoundExt/SoundCueCount (random-variant suffix) — but the path is still STATICALLY DERIVED from the descriptor, not the runtime .sounds-file GlobalSound parse + skin-keyed Monster_Sounds_Update. Mage/Wyvern still carry SoundCues==null (play-all) though Base ships no .sounds for them either (should be silent like Spider)."
