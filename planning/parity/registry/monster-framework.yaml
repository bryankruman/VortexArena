    confidence: high
    notes: "Core rejection set + facing cone faithful; the misses are the coarse PVS cull, alpha, typefrag, vehicle-melee, prematch, and crouch (next row)."

  - id: monster-framework.target.find_enemycheck
    name: "Target acquisition + enemy retention (Monster_FindTarget / Monster_Enemy_Check)"
    layer: [authority]
    base_refs:
