unit: monster-framework
category: monster
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Monster sound system is a stub: only sight/pain/death fixed-path cues play; the .sounds-file GlobalSound system, idle/melee/attack/ranged/spawn cues, the body-impact placeholder, the g_monsters_sounds gate, and the msound_delay throttle are all missing."
    - "Healthbar waypoint sprite (g_monsters_healthbars, WP_Monster) not implemented: no monster health bars, no per-hit health update, even with the cvar on."
    - "Team/skill colors unported: monster_setupcolors (skill-keyed colormap + glowmod) and monster_changeteam (team radar icon) have no port equivalent."
    - "Miniboss EF_RED red-glow tint not set: minibosses are visually indistinguishable from regular monsters."
    - "Round-restart reset sweep is DEAD: MonsterAI.Reset/ResetAll exist but ResetMapObjects only deletes projectiles — no entity .reset pass ever fires, so monsters are not restored on a round restart."
    - "Enemy-retention re-check omits QC's LOS re-traceline + frozen-enemy + alpha-fade drops, so an acquired enemy that breaks line of sight or freezes stays the enemy until out of range."
    - "g_monsters_quake_resize (MONSTER_SIZE_QUAKE x1.3) and g_monsters_playerclip_collisions (DPCONTENTS_PLAYERCLIP) not ported."
    - "Targeting refinements are no-ops: crouch 75% range scaling, alpha<0.5 fade gate, and the checkpvs coarse cull (traceline-only); typefrag/chat target gate not ported."
