    constants:
      - { name: "crouch range scale", base: "*0.75", port: "*0.75 (but IsCrouching => false, so never applied)", match: false }
      - { name: "enemy recheck cadence", base: "time + 1 (1s)", port: "Now + 1f", match: true }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: partial
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Enemy-RETENTION re-check is incomplete. QC Monster_Enemy_Check drops the held enemy on: LOS re-traceline blocked (trace_fraction<1 && trace_ent!=enemy), STAT(FROZEN, enemy), and alpha<0.5. The port's EnemyCheck (MonsterAI.cs:646-662) drops only on freed/dead/health<1/notarget/takedamage/out-of-range — so an enemy that ducks behind a wall or freezes is RETAINED until it strays out of target_range."
      - "Crouch 75% range scaling is dead: IsCrouching always returns false (no crouch flag on the headless Entity), so crouching gives no stealth/range benefit vs QC."
      - "QC scans the g_monster_targets intrusive list (anything with .monster_attack); the port scans FindInRadius for players (+ other monsters only in teamplay). Behaviorally equivalent for the stock target set."
      - "Sight sound on acquisition uses the fixed path monsters/<name>_sight.wav (see the sound row); QC uses the .sounds-driven GlobalSound."
    verification:
      - { kind: code, ref: "FindTarget keeps closest valid within target_range; EnemyCheck drops dead/oor/notarget/undamageable but NOT los-re-trace/frozen/alpha; recheck 1s", result: fail }
    confidence: high
    notes: "Acquisition + the 1s throttle are faithful; the retention re-check loses QC's LOS/frozen/alpha drops, and crouch scaling is dead."

