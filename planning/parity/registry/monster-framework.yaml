    notes: "WAVE-2 PARTIAL FIX (re-verified 2026-06-22): prematch guard added + LIVE (time<game_starttime). game_stopped half dead-wired — MatchHalted reads the never-written Scoring.GameScores.GameStopped instead of the live VehicleCommon.GameStopped; trivial to fix. Core rejection set + facing cone faithful; checkpvs/alpha/typefrag/vehicle/crouch still missing."

