summary:
  feature_count: 17
  worst_gaps:
    - "Monster sounds are GATED + THROTTLED, honour a per-monster .sounds cue set (SoundCues; Zombie={death,sight,idle}.ogg, Golem={death,sight,melee,pain,idle}.wav with variant counts, Spider/Mage/Wyvern=empty/silent), and route via a per-monster SoundDir/SoundExt/SoundCueCount (random-variant suffix) — but the path is still STATICALLY DERIVED from the descriptor, not the runtime .sounds-file GlobalSound parse + skin-keyed Monster_Sounds_Update (a deliberate fidelity simplification). RE-VERIFY DRIFT FIX (2026-06-27, Wave-16 b3a9c06): Mage AND Wyvern SoundCues moved null->empty-set, so ALL FIVE monsters now match Base silence (Base ships only zombie/golem .sounds) — the long-standing 'Mage/Wyvern play-all' divergence is CLOSED. Residual audio gap is only the static-path approximation + the SND_BODYIMPACT1 body-impact placeholder."
    - "RE-VERIFY DRIFT FIX (2026-06-27): g_monsters_quake_resize (MONSTER_SIZE_QUAKE x1.3) AND g_monsters_playerclip_collisions (DPCONTENTS_PLAYERCLIP) are NOW BOTH PORTED + LIVE — the baseline's 'largest remaining true gaps' are CLOSED. playerclip: Setup (MonsterAI.cs:244-246) stamps DpHitContentsMask=SOLID|BODY|BOTCLIP|MONSTERCLIP (+PLAYERCLIP when g_monsters_playerclip_collisions!=0, default 1), honored live by TraceService.GenericHitMask:562-563 on the monster's own movement trace (landed Wave-13 5427e74). quake_resize: ApplySize (MonsterAI.cs:487-499) scales mins/maxs*=1.3 when def.SizeQuake && !respawned && g_monsters_quake_resize!=0 (landed Wave-16 b3a9c06); the COLLISION bbox resizes (the matching VISUAL scale*=1.3 stays render-deferred — no networked Entity render-scale field). def.SizeQuake defaults false so the stock five (all Xonotic-native) are unaffected, matching Base."
    - "DRIFT FIX (2026-06-27): Healthbar waypoint sprite (g_monsters_healthbars, WP_Monster) is NOW IMPLEMENTED + LIVE + NETWORKED — SpawnHealthbar (MonsterAI.cs:446) spawns a real WaypointSprite ('Monster', maxs.z+15, RADARICON_DANGER, team/red, maxdist 1024) gated on g_monsters_healthbars, UpdateHealthbar refreshes on pain/corpse (MarkPain:1871), Kill on death/remove (MarkDead:1963 / Monster_Remove:727); it serializes per-peer via ServerNet (SendWaypoints) and renders the bar via the client WaypointSpriteLayer.DrawHealthBar (game/client/WaypointSpriteLayer.cs:207, drawn when wp.Health>=0). This closes the baseline's #1 worst gap."
    - "DRIFT FIX (2026-06-27): monster_changeteam radar-icon update is no longer a no-op — ChangeTeam (MonsterAI.cs:430) now calls WaypointSprites.UpdateTeamRadar on the live sprite. ChangeTeam itself still has NO live external caller (only inside the monster module), so its liveness stays partial."
    - "DRIFT FIX (2026-06-27): MonsterCheckBossFlag (miniboss-veto, MonsterAI.cs:285) AND MonsterDropItem (itemlist-rewrite, MonsterFramework.cs:219, used live by InstagibMutator) mutator hooks are NOW WIRED + LIVE — both previously-listed residuals are closed."
    - "DRIFT FIX (2026-06-27): Monster_Move_2D is NOW FULLY PORTED (Move2D, MonsterAI.cs:1255), a line-for-line faithful port of sv_monsters.qc:1161 (forward trace + wall/monster/ledge reverse + game-stopped/campaign gate + walk/idle anim). Latent: no stock Base caller, so it has no live caller in the port either (matching Base)."
    - "ValidTarget is FULLY faithful — checkpvs coarse cull (Api.Trace.CheckPvs, MonsterAI.cs:798), vehicle-vs-melee rejection (targ.VehicleDef && !Def.IsRanged, :749), alpha<0.5 fade gate (:784; same drop in EnemyCheck), typefrag/chat (:768) + crouch 75% range scaling all live."
