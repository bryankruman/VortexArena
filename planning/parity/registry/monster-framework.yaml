summary:
  feature_count: 15
  worst_gaps:
    - "Round-restart reset sweep is STILL DEAD: MonsterAI.Reset/ResetAll + Entity.Reset delegate exist, but the live ResetMapObjects (GameWorld.cs:2544) only deletes projectiles — no e.Reset pass ever fires, so monsters are not restored/removed on a round restart. (UNCHANGED by Wave-1/2.)"
    - "Team/skill colors unported: monster_setupcolors (skill-keyed colormap + glowmod) and monster_changeteam (team radar icon) still have no port equivalent (empty port_refs)."
    - "Healthbar waypoint sprite (g_monsters_healthbars, WP_Monster) still not implemented: no monster health bars, no per-hit health update."
    - "Monster sounds are now GATED + THROTTLED + cover all 8 cues, but still play via FIXED PATHS monsters/<name>_<cue>.wav — the .sounds-file GlobalSound lookup + skin-keyed Monster_Sounds_Update is still a fixed-path approximation (presentation/fidelity gap, not an API gap)."
    - "g_monsters_quake_resize (MONSTER_SIZE_QUAKE x1.3) and g_monsters_playerclip_collisions (DPCONTENTS_PLAYERCLIP) still not ported."
    - "ValidTarget still omits QC's checkpvs coarse cull, vehicle-vs-melee rejection, typefrag/chat gate, crouch 75% range scaling, and alpha<0.5 fade gate (headless Entity has no alpha/crouch field)."
    - "MatchHalted's game_stopped term is dead-wired: MonsterAI.MatchHalted reads Scoring.GameScores.GameStopped (NO live writer — re-verified 2026-06-22), not the live VehicleCommon.GameStopped the server actually drives (GameWorld.cs:1243). Only the time<game_starttime (prematch) term is live. So monster target/move halt works for the warmup/countdown window but NOT for intermission/timeout. ONE-LINE FIX available (read the right global)."
    - "Monster_CheckDanger trigger_hurt avoidance (danger code 4) still not ported."
