      - "Typefrag/chat gate not ported: QC rejects a chatting target when !g_monsters_typefrag (matches default-1; diverges only when g_monsters_typefrag 0). (UNCHANGED.)"
      - "Vehicle-vs-melee rejection (QC: IS_VEHICLE(targ) && !MON_FLAG_RANGED) not in ValidTarget; the port's ValidTarget has no vehicle gate at all. (UNCHANGED.)"
      - "WAVE-2 PARTIAL: ValidTarget now calls MatchHalted() (the QC game_stopped || time<game_starttime prematch guard) — but MatchHalted's game_stopped term is DEAD because it reads the WRONG global: MonsterAI.MatchHalted (MonsterAI.cs:1741) reads Scoring.GameScores.GameStopped, which has NO live writer (re-verified 2026-06-22: only the public setter exists, nobody on the server path assigns it). The server actually drives match-stopped state into VehicleCommon.GameStopped (GameWorld.cs:1243, = Intermission.Running||MatchEnded||Timeout.IsPaused) — the global the vehicle/mutator ports read. So pre-match acquisition is now correctly suppressed (the time<game_starttime half is live), but intermission/timeout is NOT detected here. One-line fix: read VehicleCommon.GameStopped (or g_game_stopped cvar) instead."
    verification:
      - { kind: code, ref: "ValidTarget covers self/dead/notarget/team/follow/lineofsight-trace/facing-cone + the new MatchHalted prematch gate; still missing checkpvs+alpha+typefrag+vehicle", result: pass }
      - { kind: code, ref: "grep 'GameScores.GameStopped =' src game = NO writer; MonsterAI.MatchHalted reads Scoring.GameScores.GameStopped (never written) NOT VehicleCommon.GameStopped (written GameWorld.cs:1243). game_stopped half false-on-live; StartItem.GameStartTimeProvider live-wired GameWorld.cs:550 (prematch half works).", result: fail }
