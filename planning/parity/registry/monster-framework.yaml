    - "ValidTarget still omits QC's checkpvs coarse cull, vehicle-vs-melee rejection, and the alpha<0.5 fade gate (headless Entity has no render-alpha field). Typefrag/chat gate and crouch 75% range scaling are now LIVE (Entity.ButtonChat/ButtonCrouch are written by PlayerPhysics)."
