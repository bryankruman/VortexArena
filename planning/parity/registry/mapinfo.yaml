    name: "Per-gametype mapinfo defaults + per-map key=value overrides (_MapInfo_Map_ApplyGametypeEx: timelimit/leadlimit/fraglimit reset, pointlimit/lives/laplimit/caplimit/teampointlimit aliases, m_parse_mapinfo hooks)"
