unit: mapinfo
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-07-02"
summary:
  feature_count: 21
  worst_gaps:
    - "Server-side MapInfo_CheckMap is a stub: MapRotation.MapExists / MapSupportsGametype default to `_ => true` and NO host wires them (only tests assign MapExists) — so the rotation build, the vote-map/nextmap validation, and suggestmap never actually check that a map exists or supports the current gametype on a live server."
    - "The server never reads a .mapinfo at map boot: the map's declared gametype list and the per-map `gametype <mode> key=value` overrides (timelimit/pointlimit/fraglimit/lives/laplimit/caplimit/teampointlimit + m_parse_mapinfo hooks) are never applied, and MapInfo_LoadMapSettings' unsupported-gametype fallback (random supported mode from the highest-m_priority tier) is absent — GameWorld boots ANY gametype on ANY map with no support check."
    - "The whole autogeneration subsystem (_MapInfo_Generate BSP-entity scan: spawnpoint count, world diameter, weapons/turrets/vehicles/monsters features, race_place→CTS demotion, the m_isAlwaysSupported/m_isTwoBaseMode heuristic dispatch, the .arena/.defi q3compat parsers, writing maps/autogenerated/<map>.mapinfo) is unported — a map without a .mapinfo has UNKNOWN support, which the menu treats as supports-everything (the opposite of Base's generated truth)."
    - "Map flags and features are never enforced: hidden/forbidden/frustrating/donotwant + gameversion_min never filter any list (g_maplist_allow_hidden/allow_frustrating don't exist), and `has weapons/turrets/vehicles/monsters` + MapInfo_CurrentFeatures (the instagib/overkill/nix/weaponarena weapons-required mask) are entirely unmodeled."
    - "Per-map settemp_for_type / clientsettemp_for_type lines (with the MAPINFO_SETTEMP_ACL_SYSTEM safety ACL + g_mapinfo_settemp_acl), the mapinfo `fog` line, and MapInfo_FindName unique-prefix map-name completion are not parsed/implemented anywhere (the SettempCvars mechanism exists but no mapinfo line ever feeds it)."
