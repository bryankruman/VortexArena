      - "common/mapinfo.qh:MapInfo_Map_bspname"
    port_refs:
      - "src/XonoticGodot.Common/Menu/MapInfoBackend.cs:Parse (170-260)"
      - "game/menu/CreateGameScreen.cs:MapInfoCache.Get (563-601)"
      - "game/menu/dialogs/DialogCreateGameMapInfo.cs:47 (live MapInfoBackend constructor)"
    constants:
      - { name: "comment styles", base: "# // _ prefixes + trailing //", port: "MapInfoBackend: same 4 forms (cs:196-202); MapInfoCache: none (raw StartsWith match only)", match: false }
      - { name: "invalid-char guard", base: "reject '/' in map name (mapinfo.qc:1044)", port: "MapInfoBackend.cs:174 same guard", match: true }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "TWO parallel parsers exist, both LIVE but neither complete. MapInfoBackend.Parse (constructed at DialogCreateGameMapInfo.cs:47 — the map-info popup) parses title/description/author/hidden/gametype/type/size with the QC comment styles; it IGNORES has/fog/cdtrack/settemp_for_type/clientsettemp_for_type/forbidden/frustrating/donotwant/gameversion_min (documented as parsed-and-ignored, cs:252-255). MapInfoCache.Get (the create-game MAPLIST filter, CreateGameScreen.cs:563-601) is a cruder line-prefix scan: title/author/gametype/type only, no comment stripping, no legacy-name remap."
      - "There is NO server-side .mapinfo parse at all (the only server-adjacent read is NetGame's cdtrack line scan — see mapinfo.metadata.cdtrack). Everything the server would take from a .mapinfo (gametype support, per-gametype defaults, flags, settemps, fog) is absent on the authority path."
      - "The maps/autogenerated/<map>.mapinfo fallback path (mapinfo.qc:1086) is not probed — only maps/<map>.mapinfo."
    verification:
      - { kind: code, ref: "DialogCreateGameMapInfo.cs:47 `new MapInfoBackend(MenuDataBridge.ReadText, ...)` + .Get(_bspName) at :55 — live on the double-click popup; CreateGameScreen.RefilterMaps:456 MapInfoCache.Get(map) — live on every maplist rebuild. Unit tests MenuDataSourceTests.cs:232-430.", result: pass }
    confidence: high
    notes: "NOTE: tdm.yaml's rules.map_support claim that MapInfoBackend is dead (no constructor) is STALE — DialogCreateGameMapInfo.cs:47 constructs it and wires both force-cvars (g_duel_not_dm_maps / g_tdm_on_dm_maps) from MenuState.Cvars. The maplist filter path uses the separate MapInfoCache, also live."

