    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The SUBSYSTEM is unported: Base resets timelimit/leadlimit/fraglimit to their cvar defaults, then applies the gametype's registered default string (Gametype.model2, e.g. 'timelimit=20 pointlimit=50 teams=2'), then the map's own `gametype <mode> key=value...` overrides from the .mapinfo, routing the pointlimit/lives/laplimit/caplimit aliases into fraglimit (teampointlimit/teamlaplimit for g_race_teams>=2) and dispatching unknown keys to every gametype's m_parse_mapinfo. The port instead hand-asserts a few gametype defaults in GameWorld.ActivateGameType (assault timelimit=20 at :3039, survival 20/12 at :3109-3115, cts/duel similar) and resolves the -1 'use mapinfo' sentinels per gametype (tdm SeedLimit, keepaway PointLimit, ...)."
      - "Consequence: a map's OWN .mapinfo overrides (e.g. `gametype ctf timelimit=30 caplimit=15`) never take effect — only the code-side gametype defaults and global cvars do."
      - "The legacy positional `type <mode> fraglimit timelimit ...` form (_MapInfo_Map_ApplyGametype + m_legacydefaults) and the Race qualifying-timelimit special case (mapinfo.qc:499-518) are likewise unported."
      - "Cross-ref: per-gametype VALUE rows (tdm.yaml win.point_limit, keepaway.yaml, lms.yaml lives, freezetag.yaml, invasion.yaml, nexball.yaml, race.yaml laps_limit) own the specific default numbers; this row owns the missing application MACHINERY."
    verification:
      - { kind: code, ref: "grep m_parse_mapinfo/ApplyGametypeEx/pointlimit-alias across src+game → no counterpart; GameWorld.cs:3039/3109-3115 are the hand-coded per-mode asserts; no .mapinfo read exists on the server (see parse.file).", result: fail }
