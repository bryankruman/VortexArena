summary:
  feature_count: 13
  worst_gaps:
    - "vr_impact bounce-pain not ported: no vehicles_impact fall-damage on ramming + bouncefactor/bouncestop unset (engine-default restitution)"
    - "Water mechanics partial: racer_air_finished air-meter (crouch-dive up-push 200->30) + racer_watertime 3s post-water downforce ramp not modeled"
    - "Homing-rocket tracker: the obstacle-avoidance traceline + newdir.z += 16*frametime climb-lift step is omitted; GuideRocket RacerHoming steers straight at the predicted point with no terrain dodge"
