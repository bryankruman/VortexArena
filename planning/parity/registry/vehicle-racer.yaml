    - "vr_enter does not reposition a boarding flag-carrier's flag to '-190 0 96' (CTF interaction dropped)"
    - "Constants hardcoded as fields: per-cvar server retune of g_vehicle_racer_* not honoured (master g_vehicle_racer boolean IS read)"
    - "Secondary HUD mirror dropped: vehicle_ammo2 (100/50/0) + vehicle_reload2 reload-bar progress never written"
    - "Presentation deferred: EFFECT_RACER_BOOSTER/MUZZLEFLASH/ROCKETLAUNCH, under-craft smoke, CSQC bolt/rocket trails, EXPLOSION_MEDIUM death FX, aux-crosshair lock colour"
    - "Audio partial: racer_move/racer_idle engine-sound state machine not ported (boost sound plays per-tick, idle/move loop selection does not)"
