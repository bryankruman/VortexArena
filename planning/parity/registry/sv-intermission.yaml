last_audited: "2026-06-22"
# Re-audited 2026-06-22 on branch claude/parity-port-waves after the Wave-1/2 implementation.
# Net change for this unit: 1 gap genuinely closed (the IntermissionThink +10s auto-advance grace is now
# live & faithful, correcting the false "input grace = 0" constant). No regressions. The mapvote panel got
# a fuller MapVote_Draw port (fade timing / suggester line / top2 alpha) but is STILL dead (never fed), and
# cl_autoscreenshot is now client-replicated but the server has no consumer (still missing). All other rows
# unchanged from the pre-implementation baseline.
summary:
  feature_count: 15
  worst_gaps:
    - "Map vote UI is dead: MapVotePanel is registered but never fed — no NetControl.MapVote opcode, so players never see the ballot or cast a vote; on the live path the server-side vote auto-resolves with zero real votes (and g_maplist_votable=6 makes the vote the DEFAULT end path)."
    - "NextLevel omits VoteReset, the centerprint kill (Kill_Notification NOTIF_ALL), WeaponStats_Shutdown, DumpStats, the MatchEnd_BeforeScores/MatchEnd mutator hooks, and the localcmd(sv_hook_gameend) — only winners/eventlog/playerstats/campaign/demo are ported."
    - "Scoreboard does not auto-show at intermission (Base force-draws at intermission==1, hides at ==2 for the mapvote); the port only shows it while +showscores is held."
    - "No SVC_INTERMISSION view freeze: local view is not locked to an intermission camera, viewmodel is not hidden (EF_NODRAW), health sentinel -2342 not set."
    - "The IntermissionThink +10s post-hold auto-advance grace is now LIVE & faithful (Intermission.Think waits ExitTime+10s). The per-player 'press fire/jump to skip during the grace' early-exit is STILL absent (RequestExit exists but has no input caller)."
    - "No autoscreenshot stuffcmd and no sv_intermission_cdtrack switch / target_music_kill at match end."
    - "DoNextMapOverride omits quit_when_empty, quit_and_redirect, and lastlevel overrides."
    - "Set_NextMap / Send_NextMap_To_Player broadcast is missing: clients never receive the queued _nextmap, so the scoreboard 'Next map: …' line (ScoreboardPanel.NextMap, an unfed field) stays blank."
