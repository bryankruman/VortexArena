    notes: "Idempotent (Begin returns early once Running). Active votes are suppressed via Voting.WarmupOrIntermission rather than an explicit VoteReset; the missing hooks are mostly mutator/eventlog/admin-script seams but the absent MatchEnd_BeforeScores/MatchEnd hooks could matter for a mutator that adjusts scores at match end."

