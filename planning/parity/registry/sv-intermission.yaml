unit: sv-intermission
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
# Re-audited 2026-06-22 on branch claude/parity-port-waves AFTER the Wave-5 wiring pass (commit 66e378f,
# on top of the Wave-1/2 implementation). Net change for this unit vs the prior re-audit: the map-vote
# client UI is now genuinely WIRED on the listen-server path — NetGame.UpdateMapVotePanel feeds the panel
# (candidates/counts/own-vote/winner) from the in-process MapVoting, AND a real cast path exists (number
# keys 1..9 → C2S impulse → Commands.DispatchImpulse intercepts during MapVote.Running → MapVoting.CastVote).
# So mapvote.client_ui moves dead→live(partial)/faithful and mapvote.server_core's vote now receives REAL
# votes on a listen server (liveness partial→partial-but-better). No regressions. Everything else
# (NextLevel hooks, input early-exit, nextmap overrides, nextmap broadcast, view-freeze, scoreboard
# auto-show, autoscreenshot, cdtrack) is UNCHANGED from the prior audit. Intermission.cs itself is byte-for-
# byte the Wave-1/2 state (the +10s auto-advance grace remains live & faithful).
summary:
  feature_count: 15
  worst_gaps:
    - "Map vote remains networked-incomplete for REMOTE clients: there is still no NetControl.MapVote opcode, so the live ballot/cast path works ONLY on a listen server (the client reads the in-process GameWorld.MapVote directly). A pure --connect client has no in-process MapVoting, so it never sees the ballot and cannot vote; the panel feed honestly blanks for it."
    - "NextLevel omits VoteReset, the centerprint kill (Kill_Notification NOTIF_ALL), WeaponStats_Shutdown, DumpStats, the MatchEnd_BeforeScores/MatchEnd mutator hooks, and the localcmd(sv_hook_gameend) — only winners/eventlog/playerstats/campaign/demo are ported."
    - "Scoreboard does not auto-show at intermission (Base force-draws at intermission==1, hides at ==2 for the mapvote); the port only shows it while +showscores is held."
    - "No SVC_INTERMISSION view freeze: local view is not locked to an intermission camera, viewmodel is not hidden (EF_NODRAW), health sentinel -2342 not set."
    - "The in-grace per-player early-exit (press fire/jump/atck2/hook/use to skip the +10s hold) is still unwired (RequestExit has no input caller); the +10s auto-advance itself is live & faithful."
    - "No autoscreenshot stuffcmd / sv_autoscreenshot consumer (cl_autoscreenshot is now accepted by the server allowlist but nothing reads it), and no sv_intermission_cdtrack switch / target_music_kill at match end."
    - "DoNextMapOverride omits quit_when_empty, quit_and_redirect, and lastlevel overrides."
    - "Set_NextMap / Send_NextMap_To_Player broadcast is missing: clients never receive the queued _nextmap, so the scoreboard 'Next map: …' line (ScoreboardPanel.NextMap, drawn but never assigned) stays blank."
