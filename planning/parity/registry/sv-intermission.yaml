      - { kind: grep, ref: "no NetControl.MapVote / mapvote serialization opcode in game/net; the vote is read directly from the in-process GameWorld.MapVote (listen-server only)", result: fail }
    confidence: high
    notes: "g_maplist_votable=6 by default, so the vote IS the default end-of-match path with players present. Wave-5 turned a server-only tally into a genuinely castable vote on the listen server (number-key → impulse → CastVote), and added SelectionOf for own-vote highlighting; liveness stays `partial` only because the remote-client wire opcode is still absent."

