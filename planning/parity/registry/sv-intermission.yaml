# Re-audited 2026-06-25 (drift check) on branch claude/parity-port-waves (Base local checkout
# xonotic-v0.8.6-151-gf6b1980; the pinned base_ref_rev above is the registry's reference revision and the
# intermission/mapvoting/world symbols are byte-compatible with it). Net change vs the prior 2026-06-25 baseline:
# THREE further end-of-match CLIENT features were completed since that audit:
#   (1) client.autoscreenshot: now FULLY ported — NetGame.UpdateIntermissionAutoscreenshot (NetGame.cs:3258)
#       arms the +0.1s timer off the networked intermission flag, latches once per match, applies the QC opt-in
#       gate (server_screenshot = sv_autoscreenshot && cl_autoscreenshot; client_screenshot = cl_autoscreenshot==2),
#       and fires a real `screenshot screenshots/autoscreenshot/<map>-<stamp>.jpg` via RunCommand. logic
#       missing→faithful, timing missing→faithful, presentation missing→faithful, liveness na→live.
#   (2) audio.cdtrack: the `cd loop <track>` random switch is now CONSUMED — MusicPlayer.PickIntermissionTrack
#       (MusicPlayer.cs:472) reproduces the QC RandomSelection-over-FOREACH_WORD pick and loops the chosen track,
#       fed live from sv_intermission_cdtrack (NetGame.cs:2411). logic partial→faithful, audio partial→faithful,
#       liveness partial→live.
#   (3) client.view_freeze: the intermission camera/mouse-look lock is now present — look input is ignored while
#       MatchIntermission (NetGame.cs:4298-4299) so the scoreboard view holds the latched angles, plus death-cam
#       suppression (NetGame.cs:4808) and the viewmodel EF_NODRAW hide (NetGame.cs:1610). logic partial→faithful,
#       presentation partial→faithful. The -2342 health sentinel is now a documented INTENDED divergence (would
#       render a literal "-2342" on the listen-server HealthArmor panel that has no intermission HUD suppression;
#       GameWorld.cs:3227-3231), so values missing→na (intended_divergence).
# No regressions. UNCHANGED since the prior 2026-06-25 baseline: matchend.nextlevel (still omits
# WeaponStats_Shutdown/DumpStats/sv_hook_gameend), matchend.freeze, matchend.nextmap_broadcast,
# client.scoreboard_autoshow, timer.exittime, timer.input_early_exit, overtime.cascade, maplist.rotation,
# nextmap.override (3 admin/redirect overrides still absent), nextmap.changelevel, mapvote.server_core
# (still no NetControl.MapVote opcode → listen-server cast only), mapvote.client_ui (listen-server only).
# Intermission.cs itself is byte-identical to the Wave-1/2 state.
summary:
  feature_count: 15
  worst_gaps:
    - "Map vote remains networked-incomplete for REMOTE clients: there is still no NetControl.MapVote opcode, so the live ballot/cast path works ONLY on a listen server (the client reads the in-process GameWorld.MapVote directly). A pure --connect client has no in-process MapVoting, so it never sees the ballot and cannot vote; the panel feed honestly blanks for it."
    - "NextLevel still omits WeaponStats_Shutdown, DumpStats(true), and the localcmd(sv_hook_gameend) trailing hook — but now DOES port VoteReset, MatchEnd_BeforeScores/MatchEnd hooks, Kill_Notification(NOTIF_ALL), and (client-side) target_music_kill."
    - "DoNextMapOverride omits quit_when_empty, quit_and_redirect, and lastlevel overrides."
    - "OverTime: STAT(OVERTIMES) is still not networked, so the persistent HUD 'OVERTIME' banner does not show (the one-shot begin-of-overtime center notifications do fire)."
