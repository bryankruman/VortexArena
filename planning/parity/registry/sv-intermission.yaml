    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "NextLevel now reproduces the winner latch (MarkWinners), VoteReset (Voting.Stop), the MatchEnd_BeforeScores + MatchEnd mutator hooks (MutatorHooks.FireMatchEndBeforeScores/FireMatchEnd), Kill_Notification(NOTIF_ALL) (NotificationSystem.SendCenterKill), the :gameover event log (sv_eventlog gated), PlayerStats_GameReport, the campaign PreIntermission decision, and the demo stop. STILL OMITS: WeaponStats_Shutdown, DumpStats(true), and the trailing localcmd(sv_hook_gameend) admin-script alias. (target_music_kill is ported but client-side — see sv-intermission.audio.cdtrack.)"
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/ServerInfraTests.cs:GameWorld_EndOfMatch_RotatesToNextMap", result: pass }
      - { kind: code-read, ref: "GameWorld.NextLevel (lines 2950-2991): Voting.Stop + FireMatchEndBeforeScores + MarkWinners + GameLog.GameOver/Close (sv_eventlog) + PlayerStats.GameReport + SendCenterKill(NotifBroadcast.All) + Campaign.PreIntermission + Demo.OnMatchEnd + FireMatchEnd. No WeaponStats_Shutdown / DumpStats / sv_hook_gameend (2026-06-25).", result: pass }
      - { kind: grep, ref: "no DumpStats / WeaponStats_Shutdown / sv_hook_gameend anywhere in src/XonoticGodot.Server (2026-06-25)", result: fail }
    confidence: high
    notes: "FIXED since the 2026-06-22 baseline: VoteReset (was only suppressed via the warmup/intermission gate, now an explicit Voting.Stop), the MatchEnd_BeforeScores/MatchEnd hooks, and the Kill_Notification centerprint kill are now on the live NextLevel path. The hook chains have no current subscribers but firing them is the parity element (a mode can subscribe). The three remaining omissions (WeaponStats_Shutdown, DumpStats, sv_hook_gameend) are stats-export / admin-script seams with no stock-config gameplay effect."

