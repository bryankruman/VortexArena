    constants:
      - { name: "sv_mapchange_delay (s)", base: "5", port: "5", match: true }
      - { name: "sv_eventlog", base: "0", port: "0", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "NextLevel reproduces the winner latch (MarkWinners), the :gameover event log (sv_eventlog gated), PlayerStats_GameReport, the campaign PreIntermission decision, and the demo stop — but OMITS VoteReset(true), Kill_Notification(NOTIF_ALL … kill all centerprints), WeaponStats_Shutdown, DumpStats(true), the MatchEnd_BeforeScores / MatchEnd mutator hooks, and the localcmd(sv_hook_gameend) trailing hook."
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/ServerInfraTests.cs:GameWorld_EndOfMatch_RotatesToNextMap", result: pass }
      - { kind: code-read, ref: "GameWorld.NextLevel (lines 1912-1936): MarkWinners + GameLog.GameOver/Close + PlayerStats.GameReport + Campaign.PreIntermission + Demo.OnMatchEnd; no VoteReset/centerprint-kill/WeaponStats/DumpStats/MatchEnd-hook/sv_hook_gameend", result: fail }
    confidence: high
    notes: "Idempotent (Begin returns early once Running). Active votes are suppressed via Voting.WarmupOrIntermission rather than an explicit VoteReset; the missing hooks are mostly mutator/eventlog/admin-script seams but the absent MatchEnd_BeforeScores/MatchEnd hooks could matter for a mutator that adjusts scores at match end."

