    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "NextLevel reproduces the winner latch (MarkWinners), the :gameover event log (sv_eventlog gated), PlayerStats_GameReport, the campaign PreIntermission decision, and the demo stop — but OMITS VoteReset(true), Kill_Notification(NOTIF_ALL … kill all centerprints), WeaponStats_Shutdown, DumpStats(true), the MatchEnd_BeforeScores / MatchEnd mutator hooks, and the localcmd(sv_hook_gameend) trailing hook."
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/ServerInfraTests.cs:GameWorld_EndOfMatch_RotatesToNextMap", result: pass }
      - { kind: code-read, ref: "GameWorld.NextLevel (lines 2339-2363): MarkWinners + GameLog.GameOver/Close + PlayerStats.GameReport + Campaign.PreIntermission + Demo.OnMatchEnd; no VoteReset/centerprint-kill/WeaponStats/DumpStats/MatchEnd-hook/sv_hook_gameend (re-confirmed 2026-06-22, unchanged by Wave-5)", result: fail }
