    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "There is still no NetControl.MapVote opcode, so the ballot/tally is not serialized over the wire and remote (--connect) clients can neither see nor cast. On a LISTEN server the cast path is now live (Wave-5): a player's number-key 1..9 emits a C2S impulse, which Commands.DispatchImpulse intercepts while MapVoting.Running and routes to MapVoting.CastVote(caller, imp-1) before the weapon-impulse path — so the host's local player and any in-process bots actually move the tally. For a dedicated/remote-client server the vote still closes on timeout/PlayerCount with zero real votes (deterministic RNG tiebreak)."
    verification:
      - { kind: code-read, ref: "MapVoting.Start/CastVote/Tick/Finish faithful (incl. abstain + unbeatable-leader early finish + RandomSelection tiebreak); started from DriveEndOfMatchMapFlow when g_maplist_votable>0 and PlayerCount>0", result: pass }
