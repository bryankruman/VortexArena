summary:
  feature_count: 8
  worst_gaps:
    - "respawntime 60 vs Base 120 — destroyed Tesla returns in half the time (Spawn never passes the cfg respawnTime, inherits the generic 60s default)"
    - "Port plays weapons/electro_fire.wav on every discharge, but Base tesla turret is silent server-side (electro_fire is gated behind the isPlayer-only branch of wr_think, never reached by the turret actor)"
    - "No head spin-up animation: Base tr_think sets tur_head.avelocity '0 45 0' (low ammo) / '0 180 0' (charged) scaled by ammo/shot_dmg; port has no tr_think and never spins the coil"
    - "No idle crackle arc: Base emits random te_csqc_lightningarc(muzzle, randomvec()*350) while charged + cooled (f*f>random && random<0.1); port arcs only on a real discharge"
    - "shot_force 400 applied as knockback, but Base toast() damages with force '0 0 0' (tesla deals zero knockback)"
