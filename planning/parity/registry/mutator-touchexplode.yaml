    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/TouchExplodeMutator.cs:76"   # OnPlayerPreThink
      - "src/XonoticGodot.Server/GameWorld.cs:2226"                            # PlayerPreThink.Call per client per tick
    constants:
      - { name: "outer_guard", base: "time>texp_time && !game_stopped && IS_PLAYER && !IS_DEAD && !FROZEN && !IS_INDEPENDENT_PLAYER", port: "same set (now>TouchExplodeTime + GameStopped + IsLivePlayer + IsFrozen + IsIndependentPlayer)", match: true }
      - { name: "overlap_test", base: "boxesoverlap(absmin,absmax)", port: "BoxesOverlap(AbsMin,AbsMax)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "IS_INDEPENDENT_PLAYER guard is a no-op: Entity.IsIndependentPlayer is hardcoded false; equivalent today since the port has no independent-players mode, but it won't gate if one is added."
    verification:
      - { kind: code, ref: "per-tick frame builds PlayerPreThinkArgs and fires PlayerPreThink.Call per client (GameWorld.cs:2226); IsFrozen via StatusEffectsCatalog.Frozen; AbsMin/AbsMax kept current in EngineServices.LinkEdict", result: pass }
    confidence: high
    notes: "QC FOREACH_CLIENT inner loop = port foreach(FindByClass('player')); handler invoked once per client so the all-players scan runs per-client just like QC. O(players^2)/frame in both, bounded by the debounce. IsLivePlayer folds in IS_PLAYER(EntFlags.Client) + !IS_DEAD(DeadState) + !IsFreed."

