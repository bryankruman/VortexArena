      - "common/deathtypes/all.inc:35"                                 # REGISTER_DEATHTYPE(TOUCHEXPLODE, DEATH_SELF/MURDER_TOUCHEXPLODE)
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/TouchExplodeMutator.cs:113"   # RadiusDamage(... deathType: 0) — no deathTag passed
      - "src/XonoticGodot.Common/Gameplay/Notifications/NotificationsList.cs:163" # DEATH_SELF_TOUCHEXPLODE string (registered, unreachable from this blast)
    constants:
      - { name: "deathtype", base: "DEATH_TOUCHEXPLODE -> 'died in an accident'", port: "0 (generic) — no deathTag passed AND no 'touchexplode' case in DeathTypes/SelectSpecial", match: false }
    status:
      logic: missing
      values: na
      timing: na
      presentation: missing
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEATH_TOUCHEXPLODE obituary not wired: the blast calls WeaponSplash.RadiusDamage with deathType:0 and no deathTag (TouchExplodeMutator.cs:113), so a touch-explode kill produces a generic FRAG/GENERIC obituary, not 'died in an accident'."
      - "Deeper: even if the mutator passed deathTag 'touchexplode', DeathMessages.SelectSpecial would still mis-resolve it — 'touchexplode' is NOT a registered DeathTypes constant and is absent from both _registry and the SelectSpecial switch (DeathTypes.cs / DeathMessages.cs:209-225), so it falls through `_ => GENERIC`. The same latent defect affects the nade booms that DO pass 'touchexplode' (NadeSpawnBoom.cs:62, NadeTranslocateBoom.cs:81). Fix needs BOTH: pass the tag here AND add a TOUCHEXPLODE constant + registry/SelectSpecial branch."
    verification:
      - { kind: code, ref: "blast call passes deathType:0 (no tag); grep of DeathTypes.cs for 'touchexplode' = 0 hits; SelectSpecial (DeathMessages.cs:207-235) has no TOUCHEXPLODE base-name case", result: fail }
    confidence: high
    notes: "The DEATH_SELF/MURDER_TOUCHEXPLODE notification ROWS are registered (NotificationsList.cs:163/240/859/1037/1080) but are unreachable from this blast. Note WeaponSplash.RadiusDamage DOES accept an optional `deathTag` param (WeaponSplash.cs:51) — the mutator simply omits it. Full fix is a 3-part wiring (tag + DeathTypes registry entry + SelectSpecial branch)."

