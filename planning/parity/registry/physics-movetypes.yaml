    confidence: high
    notes: "Verified both sides. Switch order/branches match _Movetype_Physics_Frame (PUSH/FAKEPUSH->Pusher, NONE->think, FOLLOW, NOCLIP, STEP, WALK, TOSS-family->Toss). Delayprojectiles reproduced via the pre-loop count snapshot (Xonotic default 0 = newly-spawned move next tick)."

