summary:
  feature_count: 13
  worst_gaps:
    - "Movetype_Physics_MatchTicrate (sub-tick interpolation: tic_* snapshots, floor(dt/tr) whole frames clamped to 32, residual-dt trace continuation + gravity half-step, sloppy straight-line interp) is STILL entirely missing — no between-tick interpolation in this layer for client-side moveables (gibs/casings/projectiles/trains). Re-grep 2026-06-25/26: zero hits for MatchTicrate/tic_origin/tic_velocity in src/."
    - "(RESOLVED since 2026-06-25 baseline) MOVETYPE_PHYSICS-rider fast-path in PushMove (push.qc:123-129) IS NOW implemented (FlyMove.cs:407-414: translate+relink+continue, skips the PushEntity sweep). Corpse/zero-thickness rider squash (push.qc:166-173) also now zeroes mins/maxs (FlyMove.cs:444-452). Both landed in commit faa4e89; push.pushmove logic partial->faithful. Only residual is the non-behavioral findradius-vs-flat-scan broadphase style."
    - "Toss bmodelstartsolid retry: Base re-runs _Movetype_UnstickEntity on a bmodel-embedded bounce then retries the push and gives up (zero-vel + SET_ONGROUND) if still stuck (toss.qc:60-82); the port's PushEntity nudges inline but PhysicsToss does not replicate the explicit unstick-retry-give-up sequence."
    - "(RESOLVED since 2026-06-25 baseline) CheckWaterTransition's hardcoded misc/water_in.wav cue is GONE — both CheckWater and CheckWaterTransition now route through the per-entity .ContentsTransition callback (Entity.ContentsTransition, MoveTypePhysics.cs:256/496), exactly matching Base which emits no sound in the movetype layer. checkwater row now fully faithful (audio na)."
