      - { name: "delayprojectiles (spawn-frame move skip)", base: "newly-spawned ents move next frame (sv_gameplayfix_delayprojectiles 0 default)", port: "SimulationLoop snapshots count before integrate loop", match: true }
    status:
      logic: faithful
