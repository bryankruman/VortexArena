      - { name: "rotation pivot", base: "MAKE_VECTORS(-moveangle), left=-right, org+pivot", port: "AngleVectors(NegateAngles), left=-right", match: true }
      - { name: "MOVETYPE_PHYSICS rider", base: "just translate (origin += move), no push", port: "NOT special-cased — falls through to PushEntity path", match: false }
      - { name: "blocked revert + .blocked", base: "revert pusher + all moved riders, call blocked", port: "same", match: true }
