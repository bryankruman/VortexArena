unit: physics-movetypes
category: physics
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Per-entity bouncefactor/bouncestop are dropped: Entity has no BounceFactor/BounceStop fields and PhysicsToss hardcodes the defaults (BOUNCE 0.5, BOUNCEMISSILE 1.0, bouncestop 60/800=0.075). Producers DO pass values (MonsterAI.SpawnProjectile bounceFactor/bounceStop params, spider 0.3/0.05, golem 0.5/0.075) but the params are NEVER consumed — verified dead. Base sets per-shot bouncefactor/bouncestop for mortar, electro-secondary, casings (0.25/0.5), spider proj (0.3/0.05), nexball (basketball 0.6/0.075), racer/raptor vehicle projectiles — all bounce with wrong restitution + settle threshold."
    - "_Movetype_CheckWater return-value bug: port CheckWater returns WaterLevel>=1 (wetfeet) but Base returns waterlevel>1 (>=2, swimming). WalkMove computes applygravity = !CheckWater(...), so a Walk/Step entity with just its feet in liquid wrongly SKIPS gravity in the port where Base still applies it. Concrete logic/values divergence."
    - "MOVETYPE_STEP is routed to a freefall-only FlyMove (PhysicsStep, stepHeight 0) instead of Base's STEP->Walk alias (step.qc is a 1-line call to _Movetype_Physics_Walk), so MOVETYPE_STEP monster bodies get no Walk-style slide+stair stepping — only fall/land."
    - "Movetype_Physics_MatchTicrate (sub-tick interpolation: tic_* snapshots, floor(dt/tr) whole frames clamped to 32, residual-dt trace continuation + gravity half-step, sloppy straight-line interp) is entirely missing — no between-tick interpolation in this layer for client-side moveables (gibs/casings/projectiles/trains)."
    - "Walk tunables diverge from Xonotic's default physicsX.cfg: sv_stepheight hardcoded 18 vs 31; sv_gameplayfix_stepdown hardcoded 1 vs 2 (down-step landing never re-sets ONGROUND); no sv_gameplayfix_stepdown_maxspeed 400 gate."
    - "CheckWaterTransition fires a hardcoded misc/water_in.wav on any water/slime crossing instead of routing through the entity's .contentstransition callback (no such mechanism exists in the port); no water_out cue, and lava/slime contact-damage transition is unwired."
