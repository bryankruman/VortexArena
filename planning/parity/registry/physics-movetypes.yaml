summary:
  feature_count: 13
  worst_gaps:
    - "REGRESSION (Wave-2 STEP->Walk alias): WalkMove's applyGravity gate is `!inWater && ent.MoveType == MoveType.Walk && !WaterJump` (MoveTypePhysics.cs:331) — it omits MOVETYPE_STEP. Base walk.qc:12 applies gravity for `WALK || STEP`. Now that STEP routes through WalkMove, a MOVETYPE_STEP body (monster corpse/body, MonsterAI.cs:210) gets NO gravity in this integrator — it slides + stair-steps but never free-falls. Previously (freefall PhysicsStep) it fell but didn't step; the Wave-2 change traded the stepping gap for a gravity gap on the corpse path."
    - "Per-entity bounce only PARTIALLY wired: Entity now HAS BounceFactor/BounceStop (EntityWeaponState.cs:46,49) and PhysicsToss reads them (FIX), and mortar (0.5/0.075), electro-secondary (0.3/0.05), raptor (0.2/0) wire them on the real spawn path. BUT MonsterAI.SpawnProjectile (MonsterAI.cs:1270) STILL declares bounceFactor/bounceStop params and NEVER assigns them to proj — so spider web (0.3/0.05) is dropped to defaults; golem zap (0.5/0.075) only matches by coincidence. Nexball basketball (BallEntity.cs, MoveType.Bounce) and racer chassis (Racer.cs:226, should be 0.25/0) set NO bounce fields -> default 0.5/0.075."
    - "Movetype_Physics_MatchTicrate (sub-tick interpolation: tic_* snapshots, floor(dt/tr) whole frames clamped to 32, residual-dt trace continuation + gravity half-step, sloppy straight-line interp) is STILL entirely missing — no between-tick interpolation in this layer for client-side moveables (gibs/casings/projectiles/trains)."
    - "CheckWaterTransition STILL fires a hardcoded misc/water_in.wav on any water/slime crossing instead of routing through the entity's .contentstransition callback (no such mechanism in the port); no water_out cue, lava/slime contact-damage transition unwired."
