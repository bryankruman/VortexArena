    port_refs:
      - "src/XonoticGodot.Engine/Simulation/MoveTypePhysics.cs:PhysicsStep"
    constants:
      - { name: "step->walk alias", base: "_Movetype_Physics_Step => _Movetype_Physics_Walk (step.qc:5, full slide+stair)", port: "freefall via FlyMove (stepHeight 0)", match: false }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: partial
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Base STEP is a straight 1-line alias to the full Walk integrator (slide + explicit up/forward/down stair stepping). The port's PhysicsStep only free-falls through FlyMove with stepHeight 0 (no stair stepping, no horizontal slide solve), so MOVETYPE_STEP monster bodies (MonsterAI.cs:210) get no Walk-style stepping — they fall and land but don't climb steps via this integrator. Walk-driven monster locomotion is handled by the monster AI's own movement elsewhere; this STEP integrator is the corpse/body freefall path."
      - "PhysicsStep plays misc/hitground.wav on first ground contact (clip&1). DP SV_Physics_Step has no hardcoded land cue here — the entity's own handlers do any sound. Port-local addition, not Base-faithful cue wiring."
    verification:
      - { kind: code, ref: "step.qc:5 is a 1-line _Movetype_Physics_Walk call; PhysicsStep (MoveTypePhysics.cs:265) calls FlyMove.Run(stepHeight:0) only + a hardcoded misc/hitground.wav", result: fail }
    confidence: high
    notes: "Live (monster bodies set MoveType.Step, MonsterAI.cs:210). Draft's STEP->freefall characterization confirmed correct against step.qc (which IS the Walk alias)."

