      - { name: "sv_jumpstep", base: "1 (xonotic-server.cfg:119)", port: "JumpStep=true", match: true }
      - { name: "sv_gameplayfix_stepdown", base: "2 (physicsX.cfg:59)", port: "StepDown=1", match: false }
      - { name: "sv_gameplayfix_stepdown_maxspeed", base: "400 (physicsX.cfg:60)", port: "not implemented (no maxspeed/onslick gate)", match: false }
      - { name: "sv_gameplayfix_stepmultipletimes", base: "1 (xonotic-server.cfg:563)", port: "in-loop step always enabled via stepHeight pass-through", match: true }
      - { name: "sv_gameplayfix_downtraceonground", base: "engine default 1", port: "DownTraceOnGround=true", match: true }
      - { name: "progress epsilon", base: "0.03125", port: "0.03125", match: true }
      - { name: "sv_wallfriction body", base: "#if 0 no-op", port: "no-op", match: true }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "applygravity uses CheckWater(), which has the return-value bug (see physics-movetypes.checkwater): the port skips gravity at waterlevel 1 (wetfeet) where Base only skips at waterlevel >= 2 (swimming). A Walk/Step entity wading with just its feet wet wrongly floats in the port."
      - "sv_stepheight hardcoded 18 vs Xonotic 31 (physicsX.cfg): non-player Walk/Step entities step over noticeably lower obstacles than Base."
      - "sv_gameplayfix_stepdown hardcoded 1 vs Xonotic 2: the down-step landing branch (WalkMove.cs:419-423) deliberately leaves ONGROUND unset to mimic DP's #if 0, but Base with stepdown==2 explicitly SET_ONGROUND + sets groundentity on a good landing (walk.qc:171-175). So Walk entities don't glue to descending stairs the way Base does."
      - "No sv_gameplayfix_stepdown_maxspeed 400 gate (and no IS_ONSLICK exception) in the down-step skip condition; Base walk.qc:151 includes vdist(start_velocity,>=,400) && !onslick."
    verification:
      - { kind: code, ref: "MoveTypePhysics.cs:20 StepHeight=18, :305 StepDown=1, no maxspeed gate; walk.qc uses PHYS_STEPHEIGHT(31)/STEPDOWN(2)/STEPDOWN_MAXSPEED(400) from physicsX.cfg:14,59,60. applygravity at :316 calls buggy CheckWater", result: fail }
    confidence: high
    notes: "Control flow (primary FlyMove, downtraceonground re-probe, up/forward/down explicit step, revert-on-no-progress, down-step glue) is faithful and complete; the tunables + the CheckWater gravity gate diverge. Confirmed exec physicsX.cfg is the default (xonotic-server.cfg:675)."

