summary:
  feature_count: 13
  worst_gaps:
    - "Movetype_Physics_MatchTicrate (sub-tick interpolation: tic_* snapshots, floor(dt/tr) whole frames clamped to 32, residual-dt trace continuation + gravity half-step, sloppy straight-line interp) is STILL entirely missing — no between-tick interpolation in this layer for client-side moveables (gibs/casings/projectiles/trains). Re-grep 2026-06-27: zero hits for MatchTicrate/tic_origin/tic_velocity/tic_flags in src/."
    - "WalkMove omits the sv_gameplayfix_unstickplayers _Movetype_CheckStuck call that Base runs at the top of _Movetype_Physics_Walk (walk.qc:9; cvar default 1, xonotic-server.cfg:575). The port's WalkMove (which drives monster bodies / STEP entities) never unsticks a body that starts a tick embedded in geometry. Minor: control flow otherwise faithful; the FlyMove startsolid-allsolid bail still protects against runaway, and PushEntity has its own NudgeOutOfSolid."
    - "(corrected 2026-06-27) The two toss.ballistic gaps recorded on the prior pass were re-audit errors — the port DOES replicate both: (a) the bmodelstartsolid unstick-retry-give-up sequence (MoveTypePhysics.cs:170-182 == toss.qc:60-82), and (b) the move_suspendedinair SOLID_BSP gate (MoveTypePhysics.cs:233-234 `trace.Ent==null || trace.Ent.Solid==Solid.Bsp` == toss.qc:130-131). Both verified against unchanged source (MoveTypePhysics.cs untouched since Wave 13). toss.ballistic is fully faithful with no residual gaps."
    - "(stable) push.pushmove MOVETYPE_PHYSICS-rider fast-path (push.qc:123-129 -> FlyMove.cs:409-414) and corpse/zero-thickness squash (push.qc:166-173 -> FlyMove.cs:444-453) remain implemented (commit faa4e89). Only residual is the non-behavioral findradius-vs-flat-scan broadphase style."
    - "(stable) CheckWaterTransition emits no sound; both CheckWater and CheckWaterTransition route through the per-entity .ContentsTransition callback (MoveTypePhysics.cs:280/520), matching Base. checkwater row faithful (audio na)."
