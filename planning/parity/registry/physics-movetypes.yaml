      - { name: "bouncefactor (BOUNCEMISSILE)", base: "(!this.bouncefactor)?1.0:this.bouncefactor", port: "ent.BounceFactor==0 ? 1.0 : ent.BounceFactor (MoveTypePhysics.cs:163)", match: true }
      - { name: "bouncestop (BOUNCE)", base: "(!this.bouncestop)?60/800:this.bouncestop", port: "ent.BounceStop==0 ? 60/800 : ent.BounceStop (MoveTypePhysics.cs:173)", match: true }
