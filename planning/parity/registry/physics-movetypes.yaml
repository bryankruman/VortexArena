  - id: physics-movetypes.toss.bounce
    name: "Bounce/BounceMissile restitution + bouncestop settle (grenades, casings, balls)"
    layer: [shared]
    base_refs:
      - "common/physics/movetypes/toss.qc:_Movetype_Physics_Toss"
    port_refs:
      - "src/XonoticGodot.Engine/Simulation/MoveTypePhysics.cs:PhysicsToss"
    constants:
      - { name: "bouncefactor (BOUNCE)", base: "this.bouncefactor ?: 0.5", port: "hardcoded 0.5 (no Entity field)", match: false }
      - { name: "bouncefactor (BOUNCEMISSILE)", base: "this.bouncefactor ?: 1.0", port: "hardcoded 1.0 (no Entity field)", match: false }
      - { name: "bouncestop (BOUNCE)", base: "this.bouncestop ?: 60/800 = 0.075", port: "hardcoded 60/800 (no Entity field)", match: false }
      - { name: "casing bounce", base: "0.25 / 0.5 (casings.qc:190,195)", port: "default 0.5 / 0.075", match: false }
      - { name: "spider projectile bounce", base: "0.3 / 0.05 (spider.qc:154-155)", port: "passed (Spider.cs:104) then DROPPED -> 0.5 / 0.075", match: false }
      - { name: "nexball basketball bounce", base: "0.6 / 0.075 (g_nexball_basketball_bounce*)", port: "default 0.5 / 0.075", match: false }
      - { name: "mortar/electro/racer/raptor bounce", base: "per WEP_CVAR / g_vehicle_* (mortar.qc:175, electro.qc:565, racer.qc:567, raptor.qc:728)", port: "default 0.5 / 0.075", match: false }
      - { name: "grenadebouncedownslopes (d source)", base: "1 -> d = normal.vel (signed)", port: "MathF.Abs(Dot(normal,vel))", match: false }
      - { name: "slidemoveprojectiles", base: "0 (Xonotic) -> movetime=0 after bounce", port: "movetime=0 after bounce", match: true }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Per-entity bouncefactor/bouncestop are silently dropped: Entity has NO BounceFactor/BounceStop fields and PhysicsToss hardcodes the defaults. Producers pass intended values (MonsterAI.SpawnProjectile has bounceFactor/bounceStop params at MonsterAI.cs:1196 that are NEVER read; Spider.cs:104 passes 0.3/0.05; Golem.cs:153 passes 0.5/0.075) but they reach no consumer. So mortar grenades, electro-secondary orbs, casings (0.25/0.5), spider projectiles (0.3/0.05), nexball basketball (0.6/0.075), racer/raptor vehicle projectiles all bounce with the wrong restitution and settle threshold. Observable as grenade/casing/ball bounce feel."
      - "Bounce settle-threshold d uses MathF.Abs(Dot(normal,vel)); Base with grenadebouncedownslopes=1 uses the SIGNED Dot (d = trace_plane_normal * velocity), not its absolute value. After ClipVelocity the velocity component into the floor is already removed/reflected so d is normally >=0, but the abs() is not byte-faithful to Base and can differ on the edge case where velocity still points into the plane."
    verification:
      - { kind: code, ref: "Entity.cs:32-67 has no bouncefactor/bouncestop; MonsterAI.cs:1196 params unused (grep: no read sites); Base callers casings.qc:190, spider.qc:154, racer.qc:567, raptor.qc:728, electro.qc:565, mortar.qc:175, sv_nexball.qc:598", result: fail }
    confidence: high
    notes: "Bounce control flow (clip 1+bf, settle vs slide, ONGROUND/zero-velocity) is faithful; the per-entity numeric inputs are missing AND the d source uses abs(). Adding Entity.BounceFactor/BounceStop fields + wiring the dropped params is the fix."

  - id: physics-movetypes.step.physics
    name: "MOVETYPE_STEP integrator (monster bodies)"
    layer: [shared]
    base_refs:
