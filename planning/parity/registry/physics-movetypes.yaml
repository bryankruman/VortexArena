      - { name: "step gravity gate", base: "applygravity for `WALK || STEP` (walk.qc:12)", port: "WalkMove applyGravity == MoveType.Walk ONLY (MoveTypePhysics.cs:331) — STEP excluded", match: false }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "FIXED (Wave-2): STEP now dispatches to WalkMove (RunEntity MoveTypePhysics.cs:59-71) instead of the freefall-only PhysicsStep, matching Base step.qc:5 (the 1-line _Movetype_Physics_Walk alias). MOVETYPE_STEP bodies now get the full Walk slide + explicit up/forward/down stair stepping. The old hardcoded misc/hitground.wav land cue is gone from the live path (PhysicsStep retained as dead reference only)."
      - "REGRESSION (Wave-2): WalkMove's applyGravity gate is `!inWater && ent.MoveType == MoveType.Walk && !WaterJump` (MoveTypePhysics.cs:331) and OMITS MoveType.Step. Base walk.qc:12 is `!CheckWater && (WALK || STEP) && !WATERJUMP`. So a MOVETYPE_STEP body routed here gets applyGravity=false -> NO gravity in FlyMove -> it slides/stair-steps but never free-falls. Before Wave-2 the freefall PhysicsStep gave STEP bodies gravity; the alias change traded the stepping gap for a gravity gap on the corpse/body path. One-line fix: include MoveType.Step in the applyGravity condition."
    verification:
      - { kind: code, ref: "RunEntity MoveTypePhysics.cs:59 calls WalkMove for MoveType.Step (FIX). WalkMove:331 applyGravity excludes Step; FlyMove.Run:542/691 only applies gravity when applyGravity true -> STEP body unaffected by gravity (regression). step.qc:5 alias + walk.qc:12 dual WALK/STEP gravity confirmed in Base.", result: fail }
    confidence: high
    notes: "Live (monster bodies set MoveType.Step, MonsterAI.cs:210). Wave-2 closed the stepping gap but introduced a gravity-gate omission. Net: corpse/body now steps but doesn't fall under gravity in this integrator. Both are single-line fixes."

