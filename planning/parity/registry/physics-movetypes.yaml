      - { name: "gravityunaffectedbyticrate (half-step)", base: "1 (Xonotic, MOVEFLAG)", port: "GravityUnaffectedByTicrate=true", match: true }
      - { name: "nogravityonground gate", base: "MOVEFLAG_NOGRAVITYONGROUND (sv_gameplayfix_nogravityonground 1 default) gates BOTH gravity half-steps", port: "gravity applied only when !OnGround (cvar not modeled — hardcoded to the =1 behavior)", match: true }
      - { name: "in-loop step gate", base: "GAMEPLAYFIX_STEPMULTIPLETIMES ? stepheight : 0 (default 1)", port: "stepHeight passed through when caller supplies it", match: true }
      - { name: "blocked flags", base: "1 floor / 2 wall / 4 dead / 8 teleport", port: "same bitset", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "FL_WATERJUMP easierwaterjump primal-velocity restore and the WALLCLIP pm_time primal-velocity restore at the tail of _Movetype_FlyMove are absent (port has no pm_time field). Player-centric (water-exit / wallclip) so low impact for the non-client entities this loop drives."
      - "Port does not model sv_gameplayfix_nogravityonground as a cvar — it hardcodes the nogravityonground=1 behavior (gravity only when !OnGround) in BOTH half-steps. Matches Xonotic's default 1, so faithful in practice; would diverge only if the cvar were 0."
    verification:
      - { kind: code, ref: "FlyMove.Run (FlyMove.cs:532) vs _Movetype_FlyMove: plane accumulation, crease, 0.001 progress reset, primal-velocity stop-dead, both gravity half-steps (FlyMove.cs:542,691, gated on applyGravity), return-3 startsolid-allsolid — all match", result: pass }
