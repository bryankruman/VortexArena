    divergence_rationale: null
    gaps:
      - "FIXED (Wave-2): Entity.BounceFactor/BounceStop now exist (EntityWeaponState.cs:46,49) and PhysicsToss reads them via `==0 ? default : value`, matching Base's `(!x)?default:x`. The settle-threshold d is now the SIGNED Dot (MoveTypePhysics.cs:175), matching Base with grenadebouncedownslopes=1 (was abs() before). Mortar, electro-secondary, and raptor producers wire their values on the live spawn path."
      - "STILL OPEN: MonsterAI.SpawnProjectile (MonsterAI.cs:1270) declares bounceFactor/bounceStop parameters but NEVER assigns them to proj.BounceFactor/proj.BounceStop (verified: method returns proj at :1349 with no assignment). So spider web (Spider.cs:109 passes 0.3/0.05) is silently dropped to the 0.5/0.075 defaults; golem zap (Golem.cs:153 passes 0.5/0.075) is also dropped but happens to equal the defaults. One-line fix: assign the params inside SpawnProjectile."
      - "STILL OPEN: nexball basketball (BallEntity.cs MoveType.Bounce) sets no bounce fields -> 0.5/0.075 instead of Base 0.6/0.075 (bouncefactor wrong; bouncestop coincidentally matches). Racer chassis (Racer.cs:226) sets no bounce fields -> 0.5/0.075 instead of Base 0.25/0 (both wrong)."
