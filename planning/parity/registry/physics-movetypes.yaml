      - { name: "electro-secondary orb bounce", base: "0.3 / 0.05 (g_balance_electro_secondary_bounce*)", port: "wired Electro.cs:328-329 (0.3/0.05)", match: true }
      - { name: "raptor vehicle bounce", base: "0.2 / 0 (g_vehicle_raptor_bounce*)", port: "wired Raptor.cs:130-131 (0.2/0)", match: true }
      - { name: "spider web projectile bounce", base: "0.3 / 0.05 (spider.qc:154-155)", port: "Spider.cs:109 passes 0.3/0.05 -> SpawnProjectile DROPS them -> default 0.5/0.075", match: false }
      - { name: "golem zap projectile bounce", base: "0.5 / 0.075 (golem)", port: "Golem.cs:153 passes 0.5/0.075 -> SpawnProjectile DROPS them; coincidentally equals defaults", match: false }
      - { name: "nexball basketball bounce", base: "0.6 / 0.075 (g_nexball_basketball_bounce*)", port: "BallEntity.cs sets MoveType.Bounce but NO bounce fields -> default 0.5/0.075", match: false }
      - { name: "racer chassis bounce", base: "0.25 / 0 (g_vehicle_racer_bounce*)", port: "Racer.cs:226 MoveType.Bounce but NO bounce fields -> default 0.5/0.075", match: false }
      - { name: "grenadebouncedownslopes (d source)", base: "1 -> d = trace_plane_normal * velocity (SIGNED)", port: "Vector3.Dot(normal, vel) (SIGNED) (MoveTypePhysics.cs:175)", match: true }
