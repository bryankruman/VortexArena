    confidence: high
    notes: "MAJOR FIX since baseline (Wave-6b): the typecheck/chat gate term and the weaponLocked gate term are now both present in the condition and live, and g_campcheck_typecheck is genuinely consulted (was read-but-dead). The bot exemption was already live. Remaining: (1) the chat-typing carrier is never transmitted over the wire so the exemption is inert in real multiplayer (liveness partial); (2) weaponLocked covers only the freeze subset (player_blocked/LockWeapon unmodeled). logic/values upgraded partial->faithful; liveness held partial because the chat-exemption carrier is not live end-to-end."

