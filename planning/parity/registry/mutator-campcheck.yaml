      - { name: "typecheck / !PHYS_INPUT_BUTTON_CHAT", base: "exempt while typing unless g_campcheck_typecheck 1", port: "gate term `(TypeCheck || !player.ButtonChat)` NOW PRESENT (CampcheckMutator.cs:118); ButtonChat fed from input.Typing (PlayerPhysics.cs:213). BUT the wire carries no typing bit (InputButtons has no Chat bit; ServerNet.ToMovementInput never sets Typing) so ButtonChat is permanently false for net clients — exemption inert in multiplayer.", match: partial }
      - { name: "!weaponLocked", base: "required (full QC: game-start/game-stopped/player_blocked/frozen/LockWeapon)", port: "gate term `!WeaponLocked(player)` NOW PRESENT; WeaponLocked = FrozenStat!=0 || STATUSEFFECT_Frozen (the freeze subset, mirroring WeaponFireDriver). player_blocked + LockWeapon mutator-hook pieces not modeled; game_stopped/game_starttime halves covered by other gate terms.", match: partial }
    status:
