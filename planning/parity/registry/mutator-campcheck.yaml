      - { name: "g_campcheck", base: "0 (string, expr_evaluate truthy)", port: 'ExprEvaluate(GetString("g_campcheck"))', match: true }
      - { name: "g_campcheck_interval", base: "10 s", port: "Interval = GetFloat (10)", match: true }
      - { name: "g_campcheck_damage", base: "100 hp", port: "Damage = GetFloat (100)", match: true }
      - { name: "g_campcheck_distance", base: "1800 qu (2D)", port: "Distance = GetFloat (1800)", match: true }
      - { name: "g_campcheck_typecheck", base: "0 (bool)", port: "TypeCheck = GetFloat != 0 (read in Hook, NOW consulted in the gate)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "[Mutator] discovery -> Mutators.All -> MutatorActivation.Apply (GameWorld.cs:614) -> Hook(); cvar reads vs mutators.cfg:328-331 (port mutators.cfg matches: interval 10/damage 100/distance 1800). Hook reads g_campcheck_typecheck into TypeCheck. Since the prior audit (Wave-6b) the TypeCheck value is now ALSO consulted in the PreThink gate (CampcheckMutator.cs:118).", result: pass }
    confidence: high
    notes: "Default g_campcheck 0 keeps it off exactly like Base. ExprEvaluate matches QC ''/'0'/'false' -> off. Hook() reads the cvars via plain GetFloat (not the 0-fallback Cvar helper); harmless since the port's mutators.cfg ships all four. UPDATE 2026-06-25: g_campcheck_typecheck is now READ AND USED in the gate (no longer read-but-dead) — see campcheck.realclient.gate."

