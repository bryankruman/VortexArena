unit: mutator-campcheck
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "Camp-kill obituary is STILL wrong: a campcheck kill uses deathtype \"camp\", but \"camp\" is NOT a registered special death in DeathTypes.cs (no 'camp' in the registry, no Camp constant), so EmitObituary (Scores.cs:565-566) routes it through SelectSpecial(\"camp\", murder:false), which (\"camp\" absent from the switch) falls to the default branch and returns DEATH_SELF_GENERIC. The DEATH_SELF_CAMP notification (info \"^BG%s thought they found a nice camping ground\", center \"^K1Die camper!\") exists in NotificationsList.cs:157/443/1053 but is never selected. Wave-2 did NOT touch this. Base REGISTER_DEATHTYPE(CAMP, DEATH_SELF_CAMP,...) yields the camp-specific obituary."
    - "Typing players are STILL punished: Base exempts players in chat unless g_campcheck_typecheck 1. Wave-2 now READS g_campcheck_typecheck into a TypeCheck field (Hook), but the field is never consulted in the PreThink gate and there is no chat-button (PHYS_INPUT_BUTTON_CHAT) seam, so a player typing can still be camp-damaged/killed. Net behavior unchanged from baseline; the cvar is read-but-dead."
    - "weaponLocked players are STILL camp-checked: Base skips the check when the weapon is locked; the port has no such gate (no weaponLocked seam)."
    - "Death STILL does not clear the 'Don't camp!' centerprint: OnPlayerDies is a no-op stub (returns false, sends nothing); Base does Kill_Notification(CPID_CAMPCHECK), so a lingering warning persists until its own timeout after the victim dies. Wave-2 left the body a stub."
    - "Pre-match reset is now PARTIAL: Wave-2 added the time<game_starttime re-grace (interval*2) wired live via StartItem.GameStartTimeProvider (GameWorld.cs:550), but the campaign-bot-wait (g_campaign && !campaign_bots_may_start) and round-active-but-not-started portions are still missing."
features:
  - id: campcheck.mutator.registration
    name: "Mutator enable via expr_evaluate(g_campcheck) + cvar load + activation"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/campcheck/campcheck.qc:REGISTER_MUTATOR(campcheck)"
      - "mutators.cfg:328"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/CampcheckMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/CampcheckMutator.cs:Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
      - "src/XonoticGodot.Server/GameWorld.cs:539"
    constants:
      - { name: "g_campcheck", base: "0 (string, expr_evaluate truthy)", port: 'ExprEvaluate(GetString("g_campcheck"))', match: true }
      - { name: "g_campcheck_interval", base: "10 s", port: "Interval = GetFloat (10)", match: true }
      - { name: "g_campcheck_damage", base: "100 hp", port: "Damage = GetFloat (100)", match: true }
      - { name: "g_campcheck_distance", base: "1800 qu (2D)", port: "Distance = GetFloat (1800)", match: true }
      - { name: "g_campcheck_typecheck", base: "0 (bool)", port: "TypeCheck = GetFloat != 0 (now READ in Hook)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "[Mutator] discovery -> Mutators.All -> MutatorActivation.Apply (GameWorld.cs:539) -> Hook(); cvar reads vs mutators.cfg:328-331 (port mutators.cfg matches: interval 10/damage 100/distance 1800). Wave-2 added a g_campcheck_typecheck read into TypeCheck; Wave-5 left CampcheckMutator.cs untouched.", result: pass }
    confidence: high
    notes: "Default g_campcheck 0 keeps it off exactly like Base. ExprEvaluate matches QC ''/'0'/'false' -> off. Hook() reads the cvars via plain GetFloat (not the 0-fallback Cvar helper); harmless since the port's mutators.cfg ships all four. NOTE: g_campcheck_typecheck is now READ but the value is NOT used in the gate (see campcheck.realclient.gate) — so registration/cvar-load is faithful even though the typecheck BEHAVIOR is still missing."

