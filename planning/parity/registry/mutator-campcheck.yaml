      - "weaponLocked gate is the freeze subset only: FrozenStat || STATUSEFFECT_Frozen is checked (matching WeaponFireDriver.WeaponLocked), but the broader QC weaponLocked() pieces (player_blocked, the LockWeapon mutator hook) are not modeled."
    verification:
