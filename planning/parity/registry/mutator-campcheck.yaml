unit: mutator-campcheck
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "Camp-kill obituary is wrong: a campcheck kill uses deathtype \"camp\", but \"camp\" is NOT a registered special death in DeathTypes.cs, so EmitObituary (Scores.cs:565-566) routes it through SelectSpecial(\"camp\", murder:false) which falls to the default branch and returns DEATH_SELF_GENERIC. The DEATH_SELF_CAMP notification (info \"^BG%s thought they found a nice camping ground\", center \"^K1Die camper!\") exists in NotificationsList.cs:157/443/1053 but is never selected. Base REGISTER_DEATHTYPE(CAMP, DEATH_SELF_CAMP,...) yields the camp-specific obituary."
    - "Bots are camp-checked (Base exempts them via IS_REAL_CLIENT): port IsPlayer() only checks EntFlags.Client and never consults Player.IsBot. Bots DO get EntFlags.Client (ClientManager.cs:164/392) and ARE driven through OnClientMove->PlayerPreThink, so camping bots on a listen server get 'Don't camp!' + camp damage/death — contradicts Base and the mutator's own docstring."
    - "Typing players are punished: Base exempts players in chat unless g_campcheck_typecheck 1; the port has no chat-button gate, so a player typing can be camp-damaged/killed. g_campcheck_typecheck is shipped in mutators.cfg:332 but read by no port code (dead cvar)."
    - "Death does not clear the 'Don't camp!' centerprint: OnPlayerDies is a no-op stub (returns false, sends nothing); Base does Kill_Notification(CPID_CAMPCHECK), so a lingering warning persists until its own timeout after the victim dies."
    - "No pre-match / round-start reset: Base zeroes the timer+distance during campaign-bot-wait, before game_starttime, and while a round hasn't started; the port relies only on GameStopped, so a player who held still across the round-start transition loses the interval*2 re-grace and can be camp-checked on the first post-start interval."
