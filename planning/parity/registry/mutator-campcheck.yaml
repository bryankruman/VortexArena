unit: mutator-campcheck
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-27"
summary:
  feature_count: 10
  worst_gaps:
    - "Chat-typing exemption is structurally present but INERT on the live net path: the gate has the `(TypeCheck || !ButtonChat)` term and g_campcheck_typecheck is genuinely consulted, and player.ButtonChat is fed from input.Typing in PlayerPhysics — BUT the wire never carries the typing flag (InputButtons has no Chat bit and ServerNet.ToMovementInput never sets Typing), so for a real network client ButtonChat is permanently false. Result: a typing player is still NOT actually exempted in multiplayer. Gate logic faithful; carrier liveness partial."
    - "weaponLocked gate is the freeze subset only: the port checks FrozenStat || STATUSEFFECT_Frozen (mirroring WeaponFireDriver) but the broader QC weaponLocked() pieces (player_blocked, the LockWeapon mutator hook) are not modeled; the game_stopped/game_starttime halves are covered by the gate's other terms. Logic faithful, scope partial."
    - "CopyBody clone origin STILL MISSING but architecturally moot: the port reuses the live player edict on respawn (no corpse clone), so there is no clone to carry campcheck_prevorigin onto; PlayerSpawn re-inits the fields. Treated as intended divergence."
