      - "src/XonoticGodot.Server/GameWorld.cs:1174"
    constants:
      - { name: "distance measured in", base: "vec2(prevorigin-origin) (Z dropped)", port: "delta.Z=0; abs(delta.Length())", match: true }
      - { name: "damage cap", base: "bound(0, damage, health + armor*g_balance_armor_blockpercent + 5)", port: "QMath.Bound(0, Damage, health + armor*blockpercent + 5)", match: true }
      - { name: "g_balance_armor_blockpercent", base: "0.7 (balance-xonotic)", port: 'Cvar("g_balance_armor_blockpercent", 0.7)', match: true }
      - { name: "deathtype", base: "DEATH_CAMP (DEATH_SELF_CAMP, DMG_NOWEP)", port: '"camp"', match: true }
      - { name: "post-check reset", base: "nextcheck = time + interval; traveled = 0", port: "same", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "line diff OnPlayerPreThink vs sv_campcheck.qc:47-72; hook fired GameWorld.cs:1174 (MutatorHooks.PlayerPreThink.Call); blockpercent 0.7 matches balance-xonotic.cfg:178. Wave-5 did not touch CampcheckMutator.cs (line shift from baseline 988 is unrelated Wave-5 edits in GameWorld).", result: pass }
    confidence: high
    notes: "Non-one-shot cap, interval cadence, 2D-only distance, and timer-keep-fresh-when-not-checked branch all match. The deathtype STRING is correct ('camp'); its OBITUARY routing is a separate (still-open) gap (campcheck.death.obituary)."

