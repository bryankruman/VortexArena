unit: sv-ipban
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Play-ban is NOT enforced on the live join path: CmdJoin has no g_playban_list check (Base client.qc:2274 blocks the join attempt), so a play-banned player just re-joins. CmdPlayBan also only flips the FragsStatus scoreboard sentinel — it never runs the real observer transition (Base PutObserverInServer), leaving the player solid/shootable."
    - "Connect-time chatban/playban not re-applied (Base client.qc:1243/1246): a muted/play-banned player who reconnects or survives a map change can talk/play again."
    - "g_playban_minigames default is 1 in the port but 0 in Base — play-banned players are wrongly barred from minigames out of the box; and CmdPlayBan never actively removes a banned player from an in-progress minigame (Base part_minigame)."
    - "Online cross-server ban-list sync (g_ban_sync_*, bansyncer entity, uri_get protocol) is entirely absent (intended divergence)."
    - "No shutdown Ban_SaveBans: persisted seconds-remaining is not refreshed at session end (saved on each Insert/Delete only)."
