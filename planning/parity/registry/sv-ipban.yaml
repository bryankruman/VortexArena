    divergence_rationale: null
    gaps:
      - "STILL OPEN (presentation): the CENTER_JOIN_PLAYBAN center-print is registered (NotificationsList.cs:962) but is NOT emitted on a refused join. CmdJoin (Commands.cs:1344) surfaces only console text (\"You are banned from joining the game on this server.\") via ctx.Print — Base sends MSG_CENTER CENTER_JOIN_PLAYBAN to the joiner instead."
      - "Minor scope (liveness): the gate is on the `join` command path only. Base enforces in joinAllowed() which also covers the team-menu/selectteam/queue auto-join legs; the port's CmdSelectTeam only sets team (does not transition an observer into play) so it does not bypass the gate, and the auto-join-on-connect leg is unmodeled. The load-bearing `join` command is gated."
