      logic: missing
      values: na
      timing: na
      presentation: missing
      audio: na
      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The live join path has NO playban check. Base client.qc:2274 (Join_Try) refuses the join with CENTER_JOIN_PLAYBAN when a non-INGAME client is in g_playban_list. The port's CmdJoin (Commands.cs:1072) and ClientManager join path do not consult g_playban_list — ClientManager.cs:254 explicitly notes the playban gate is 'deferred'. Combined with CmdPlayBan only flipping the scoreboard sentinel, a play-banned player can simply run 'join' and re-enter play. The JOIN_PLAYBAN center-print (NotificationsList.cs:900) is registered but never emitted on a join attempt."
    verification:
      - { kind: code, ref: "Commands.cs:1072-1088 CmdJoin no g_playban_list check; ClientManager.cs:254 'playban ... gates are deferred'; grep g_playban_list -> only minigame gate + CmdPlayBan add", result: fail }
    confidence: high
    notes: "This is the load-bearing play-ban enforcement in Base and it is entirely absent on the port's live join path."

