    constants:
      - { name: "g_playban_list", base: "\"\"", port: "\"\"", match: true }
      - { name: "g_playban_minigames", base: "0", port: "1", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "CmdPlayBan (Commands.cs:1403) only sets target.FragsStatus = FragsSpectator (the scoreboard sentinel, -666); it never runs the real observer transition Base does (PutObserverInServer(client, true, true)). Per the CmdSpectate fix-comment (Commands.cs:1095-1097) flipping only FragsStatus leaves the player a solid, shootable, still-scoring actor — so the playban does not actually take the player out of play this tick."
      - "g_playban_minigames default is 1 in the port (Cvars.cs:341) but 0 in Base (xonotic-server.cfg:436): out of the box the port wrongly removes/blocks play-banned players from minigames. NOTE: the Commands.cs:1167 comment claims the port 'ships 0', which is factually wrong about its own default."
      - "Base playban runs part_minigame(client) when g_playban_minigames, actively kicking a banned player out of an in-progress minigame at ban time. CmdPlayBan does no such active removal — only the start/join/invite gate (MinigameSessionManager.cs:361) is wired."
      - "Connect-time playban re-application is missing: Base client.qc:1243 TRANSMUTEs connecting clients in g_playban_list to Observer. InfraClientConnect never reads g_playban_list, so a play-banned player who reconnects is not re-spectated."
    verification:
      - { kind: code, ref: "Commands.cs:1398-1406 CmdPlayBan sets FragsSpectator only (no PutObserverInServer); Cvars.cs:341 default 1 vs Base 0; no g_playban_list re-apply in InfraClientConnect", result: fail }
    confidence: high
    notes: "playban adds to the list and flips the scoreboard sentinel; the real observer transition, the on-connect re-spectate, the minigame active-removal, and the join-attempt gate are absent (the last is its own row sv-ipban.softban.playban.join_gate). Untested by unit tests."

