unit: sv-ipban
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "Play-ban is NOW enforced on the live join path (CmdJoin consults g_playban_list, Commands.cs:1108) AND CmdPlayBan now runs the real observer transition (PutObserverInServer) + active minigame removal — the two load-bearing Wave-2 fixes. STILL OPEN: the CENTER_JOIN_PLAYBAN center-print is registered but never emitted (join refusal surfaces only as console text)."
    - "g_playban_minigames default is STILL 1 in the port (Cvars.cs:347) but 0 in Base — out of the box the port wrongly removes/blocks play-banned players from minigames. Wave-2 did NOT change this default; it only wired the active-removal call behind the (mis-defaulted) gate."
    - "Connect-time chatban/playban re-application is STILL missing (Base client.qc:1243/1246): InfraClientConnect (GameWorld.cs:762) never reads g_chatban_list/g_playban_list, so a muted/play-banned player who reconnects or survives a map change can talk/play again. Wave-2 added Bans.IsChatBanned/IsPlayBanned seam helpers but they have NO live caller (dead code)."
    - "Online cross-server ban-list sync (g_ban_sync_*, bansyncer entity, uri_get protocol) is entirely absent (intended divergence)."
    - "No shutdown Ban_SaveBans: persisted seconds-remaining is not refreshed at session end (saved on each Insert/Delete only)."
