unit: sv-ipban
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 13
  worst_gaps:
    - "Play-ban is enforced on the live join path (CmdJoin consults g_playban_list, Commands.cs:1341) AND CmdPlayBan runs the real observer transition (PutObserverInServer) + active minigame removal. The CENTER_JOIN_PLAYBAN center-print is registered (NotificationsList.cs:962) but NEVER emitted — a refused join surfaces only as console text. This is the single remaining ipban gap of any note."
    - "Connect-time chatban/playban re-application is NOW LIVE (InfraClientConnect, GameWorld.cs:1156-1159 reads Bans.IsPlayBanned/IsChatBanned): a muted/play-banned player who reconnects or survives a map change is re-spectated / re-muted. (Was missing/dead in the 2026-06-22 baseline — fixed.)"
    - "g_playban_minigames default is NOW 0 in the port (Cvars.cs:382), matching Base (xonotic-server.cfg:436). Out of the box the port no longer removes/blocks play-banned players from minigames. (Was mis-defaulted to 1 in the 2026-06-22 baseline — fixed.)"
    - "Shutdown Ban_SaveBans is NOW wired (GameWorld.Shutdown, GameWorld.cs:1383): the persisted seconds-remaining is refreshed against the final clock at session end. (Was missing in the baseline — fixed.)"
    - "Online cross-server ban-list sync (g_ban_sync_*, bansyncer entity, uri_get protocol) is entirely absent (intended divergence)."
