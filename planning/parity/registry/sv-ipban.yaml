last_audited: "2026-06-27"
summary:
  feature_count: 13
  worst_gaps:
    - "Play-ban is FULLY enforced on the live join path: CmdJoin consults g_playban_list (Commands.cs:1526-1527) AND EMITS the CENTER_JOIN_PLAYBAN center-print to the refused joiner (Commands.cs:1530, NotificationSystem.Send OneOnly Center, bot-guarded), AND ClientManager.JoinAllowed gates via Bans.IsPlayBanned (ClientManager.cs:352 ForcedSpectate, the auto-join/team-menu leg). CmdPlayBan (Commands.cs:2275) runs the real observer transition (PutObserverInServer, :2283) + active minigame removal (:2286)."
    - "Connect-time chatban/playban re-application is LIVE (InfraClientConnect, GameWorld.cs:1309-1312 reads Bans.IsPlayBanned/IsChatBanned): a muted/play-banned player who reconnects or survives a map change is re-spectated / re-muted. InfraClientConnect is wired as Clients.OnClientConnect (GameWorld.cs:1235)."
    - "g_playban_minigames default is 0 in the port (Cvars.cs:420), matching Base (xonotic-server.cfg:436). Out of the box the port does not remove/block play-banned players from minigames."
    - "Shutdown Ban_SaveBans is wired (GameWorld.Shutdown, GameWorld.cs:1739) and LIVE: NetGame.Shutdown (NetGame.cs:2433) calls _serverWorld.Shutdown() on real teardown (_ExitTree/map change), refreshing persisted seconds-remaining against the final clock."
    - "Ban enforcement runs on BOTH the connect path (GameWorld.cs:1297) AND every remote client command (Commands.cs:657, the Base cmd.qc:1181 first-command re-check), so a ban inserted mid-session drops the client the moment they next act — the prior 'connect-only' gap is closed."
    - "Online cross-server ban-list sync (g_ban_sync_*, bansyncer entity, uri_get protocol) is entirely absent (intended divergence)."
