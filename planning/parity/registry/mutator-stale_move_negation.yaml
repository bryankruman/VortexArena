  - id: smneg.multiplier_curve
    name: "smneg_multiplier(weight) atan/tan damage-scale curve"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/stale_move_negation/sv_stale_move_negation.qc:smneg_multiplier"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/StaleMoveNegationMutator.cs:Multiplier"
    constants:
      - { name: "x floor (bonus on)", base: "-a + .1 = -3.9", port: "-a + 0.1", match: true }
      - { name: "x floor (bonus off)", base: "0", port: "0", match: true }
      - { name: "z", base: "(M_PI/5)*a", port: "(QMath.Pi/5)*a", match: true }
      - { name: "f (x>0)", base: "atan(z/x)/(M_PI/2)", port: "atan(z/x)/(QMath.Pi/2)", match: true }
      - { name: "f (x<=0)", base: "tan(-(x/z)) + 1", port: "tan(-(x/z)) + 1", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "line-by-line diff of Multiplier vs smneg_multiplier; QMath.Pi == M_PI (3.14159265358979)", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.cs:153 StaleMoveNegation_MultiplierDecreasesWithWeight asserts f(0)>f(50)>f(200) (curve exercised at runtime)", result: pass }
    confidence: high
    notes: "Verbatim port. Both the staleness (x>0) and bonus (x<=0) branches present and unit-tested as monotonically decreasing in weight."

  - id: smneg.damage_calculate_hook
    name: "Damage_Calculate hook: scale damage+force, accumulate weight, decay other weapons"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/stale_move_negation/sv_stale_move_negation.qc:MUTATOR_HOOKFUNCTION(mutator_smneg, Damage_Calculate)"
      - "qcsrc/server/damage.qc:601"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/StaleMoveNegationMutator.cs:OnDamageCalculate"
      - "src/XonoticGodot.Common/Gameplay/Damage/DamageSystem.cs:219"
    constants:
      - { name: "damage scale", base: "M_ARGV(4) *= f", port: "args.Damage *= f", match: true }
      - { name: "force scale", base: "M_ARGV(6) *= f", port: "args.Force *= f", match: true }
      - { name: "weight add", base: "weight + frag_damage", port: "weight + fragDamage", match: true }
      - { name: "other-weapon decay", base: "-= frag_damage * cooldown_factor", port: "-= fragDamage * CooldownFactor", match: true }
      - { name: "no-weapon early-out", base: "DEATH_WEAPONOF == WEP_Null -> return", port: "WeaponNetNameOf empty / ByName null / attacker null -> return", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Per-attacker per-weapon weight stored in a ConditionalWeakTable keyed by the attacker entity instead of QC's per-CS() .float x_smneg_weight[] field. Behaviorally identical: server-only, non-networked, lives for the match; chosen to avoid adding an Entity field. Deathtype is a string (project-wide) vs QC int+DEATH_WEAPONMASK; WeaponNetNameOf empty is the faithful analogue of DEATH_WEAPONOF==WEP_Null. The Base FOREACH `it != WEP_Null` guard is automatically satisfied: this port registers NO Null weapon, so Weapons.All holds only real weapons and the loop's `other.RegistryId == wid` skip mirrors `it != w`."
    gaps: []
    verification:
      - { kind: code, ref: "hook fires at DamageSystem.cs:219 (MutatorHooks.DamageCalculate.Call) AFTER global g_weapondamage/forcefactor (lines 204-214) and BEFORE the self-damage percent (line 225-226) — same pipeline position as Base damage.qc:601", result: pass }
      - { kind: test, ref: "MutatorBatchT19Tests.cs:167 StaleMoveNegation_RepeatedSameWeapon_ScalesDamageDown drives Combat.Damage 7x with the same weapon; asserts last hit < first hit (full live damage path: Combat.Damage -> DamageSystem -> hook)", result: pass }
    confidence: high
    notes: "Event-driven decay (per hit), no timers — identical to Base. Both early-out and the staleness decay are exercised end-to-end through the real damage pipeline in the unit test. Hook ordering: Base default order; port HookChain is registration order (no CBC_ORDER_LAST in Base for smneg)."

