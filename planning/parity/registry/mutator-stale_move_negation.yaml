      - { name: "g_smneg_bonus_asymptote", base: "4", port: "4", match: true }
      - { name: "g_smneg_cooldown_factor", base: "1/4 = 0.25", port: "0.25", match: true }
      - { name: "start_health (g_balance_health_start)", base: "100 (xonotic balance)", port: "100 fallback / cvar 100", match: true }
