      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Zero-guards in Hook(): `if (a != 0f) BonusAsymptote = a;` and `if (cf != 0f) CooldownFactor = cf;` mean an explicit cvar value of 0 is ignored (default kept). Base honors 0 (degenerate). Defaults are seeded from mutators.cfg (4 / 0.25) so normal play matches; only a deliberate 0 diverges."
