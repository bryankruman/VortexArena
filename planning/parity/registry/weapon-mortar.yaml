summary:
  feature_count: 11
  worst_gaps:
    - "No CSQC projectile model/trail: the grenade is invisible in flight (NetEntityKind.Projectile defined but never assigned; no PROJECTILE_GRENADE vs PROJECTILE_GRENADE_BOUNCING model/trail)."
    - "Grenade shoot-down is DEAD: the ProjectileDamage callback is set but DamageSystem.EventDamage only routes non-player victims through GtEventDamage, never ProjectileDamage (cross-weapon gap, same as Seeker/Minelayer) — a player cannot shoot a grenade out of the air."
    - "Airshot achievement announcement (ANNCE_ACHIEVEMENT_AIRSHOT) on a direct hit to an airborne enemy is not implemented."
    - "EFFECT_HAGAR_BOUNCE bounce particle is not emitted on a grenade bounce (only the bounce sound plays)."
