  - id: mortar.grenade.shootdown
    name: "Shootable grenade -> explode when destroyed (W_Mortar_Grenade_Damage)"
    layer: [authority]
    base_refs:
      - "common/weapons/weapon/mortar.qc:W_Mortar_Grenade_Damage"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Mortar.cs:Attack"
    constants:
      - { name: "primary_health", base: "15", port: "15 (set, but never depleted — callback dead)", match: true }
      - { name: "secondary_health", base: "30", port: "30 (set, but never depleted — callback dead)", match: true }
      - { name: "primary_damageforcescale", base: "0", port: "0", match: true }
      - { name: "secondary_damageforcescale", base: "4", port: "4", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEAD on the live path: gren.ProjectileDamage is assigned but NEVER invoked. DamageSystem.EventDamage (DamageSystem.cs:294) routes every non-player victim through GtEventDamage and returns; only BreakablehookMutator invokes ProjectileDamage, and a grenade is not a hook. Mortar never sets GtEventDamage either, so a grenade takes no damage handler at all — it cannot be shot down. Same cross-weapon gap as Seeker/Minelayer/Hagar."
      - "Even if it were wired, the ProjectileDamage delegate detonates on ANY incoming damage rather than subtracting from RES_HEALTH and bursting only at hp<=0; a graze that wouldn't destroy the grenade in Base would still detonate it (no W_PrepareExplosionByDamage accumulation)."
      - "W_CheckProjectileDamage (g_projectiles_damage friendly/team gate) not reproduced on the shoot-down path."
    verification:
      - { kind: code_read, ref: "mortar.qc:71-81 vs Mortar.cs:195 gren.ProjectileDamage=Explode", result: partial }
      - { kind: grep, ref: "ProjectileDamage?.Invoke called only by BreakablehookMutator.cs:79; DamageSystem.cs:294 EventDamage routes non-players via GtEventDamage only", result: fail }
    confidence: high
    notes: "Health and damageforcescale are set on the grenade and it is DAMAGE_YES, but the shoot-down is unreachable: the damage pipeline never calls a grenade's ProjectileDamage. Downgraded from the draft's 'liveness: live' — corrected by tracing DamageSystem.EventDamage, which matches the documented Seeker/Minelayer shoot-down findings exactly."

