unit: vehicle-bumblebee
category: vehicle
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Boarding seam (VehicleBoarding.UseKey, the +use board/exit) has NO live caller in src/ — only tests call it. There is no +use rising-edge -> UseKey dispatch in the net layer/GameWorld. No human can pilot or gun the bumblebee in a real match; the whole vehicle is present-but-unreachable on the live path."
    - "Vehicle damage/death (VehicleCommon.DamageVehicle -> Bumblebee.Death) has NO live caller in src/ — only one test (VehicleRuntimeTests.cs:470). The combat pipeline only has DeathTypes.IsVehicle classification helpers, no routing of hits into vehicle entities, so blowup/gibs/respawn never fire in a match."
    - "Signature networked BRG_* healray/damage beam (the visible green/red ray + bumble_raygun_draw multi-segment cylinder, the ENT_CLIENT_BUMBLE_RAYGUN net entity) NOT IMPLEMENTED — only a placeholder EffectEmitter.TeHealBeam/TeBeam stub."
    - "vr_death gib toss (gun1/gun2/gun3 + body via vehicle_tossgib) and the tumble EFFECT_EXPLOSION_SMALL/MEDIUM/BIG + SND_ROCKET_IMPACT death FX NOT IMPLEMENTED."
    - "All vehicle HUD/crosshair presentation NOT IMPLEMENTED: vr_hud, vr_crosshair (vCROSS_HEAL), the three aux crosshairs (lock + two gunner), the 'No right/left gunner!' prompts, the 0..100% ammo/energy/shield HUD mirroring, cosmetic gun models + cockpit offsets + scale 1.5, MENUQC describe text."
