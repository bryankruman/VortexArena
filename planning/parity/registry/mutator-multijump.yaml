  - id: mutator-multijump.jump.rejump_grant
    name: "Midair re-jump grant: ready-gate debounce + count/speed/maxspeed gates + add-vs-set z (PlayerJump hook)"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/multijump/multijump.qc:49-117 (MUTATOR_HOOKFUNCTION(multijump, PlayerJump))"
      - "common/physics/player.qc:386,403,544-546 (PlayerJump fires only on a jump/jetpack press; M_ARGV(2)=doublejump bypasses the airborne early-out; air_jump feeds the jetpack)"
      - "common/physics/player.qh:205 (IS_JUMP_HELD = !(flags & FL_JUMPRELEASED); FL_JUMPRELEASED = BIT(12))"
      - "common/stats.qh:163 (REGISTER_STAT(MULTIJUMP_SPEED, FLOAT))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MultijumpMutator.cs:103-167 (OnPlayerJump), :116 (IS_JUMP_HELD mapping), :118 (ready-gate truthiness factor now present), :126 (3D maxspeed via Velocity.Length()), :169-180 (Horiz2D, JumpVelocity)"
      - "src/XonoticGodot.Common/Physics/PlayerPhysics.cs:759-792 (CheckPlayerJump host; calls PlayerJump only on ButtonJump||ButtonJetpack; sets JumpReleased when jump not held), :819-823 (PlayerJumpArgs build + pj.Multijump writeback), :841 (doublejump bypasses the airborne early-out)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/EntityMutatorState.cs:50,52 (MultijumpCount, MultijumpReady)"
    constants:
      - { name: "ready gate", base: "!IS_JUMP_HELD && !IS_ONGROUND && client_multijump -> ready=true else false", port: "!jumpHeld && !OnGround && clientMultijump != 0 -> ready=true else false (truthiness factor now present)", match: true }
      - { name: "count gate", base: "PHYS_MULTIJUMP_COUNT < phys_multijump || phys_multijump == -1", port: "MaxJumps == -1 || MultijumpCount < MaxJumps", match: true }
      - { name: "speed gate", base: "velocity_z > PHYS_MULTIJUMP_SPEED (FLOAT, default -999999)", port: "Velocity.Z > MinSpeed (-999999f)", match: true }
      - { name: "maxspeed gate", base: "g_multijump_maxspeed==0 || vdist(player.velocity,<=,maxspeed) [3D vlen]", port: "MaxSpeed==0f || player.Velocity.Length() <= MaxSpeed [3D, now matches vdist]", match: true }
      - { name: "add-mode (g_multijump_add=1)", base: "M_ARGV(2)=true unconditionally (core adds jumpvel on top of z)", port: "args.Multijump=true", match: true }
      - { name: "set-mode (g_multijump_add=0)", base: "if velocity_z<jumpvelocity: M_ARGV(2)=true; velocity_z=0 (core then re-adds -> z==jumpvel)", port: "if Velocity.Z<jumpVel: Multijump=true; Velocity.Z=0", match: true }
      - { name: "count increment", base: "if phys_multijump > 0: ++multijump_count (NOT incremented when -1/infinite)", port: "if MaxJumps > 0: MultijumpCount++", match: true }
      - { name: "ready reset after grant", base: "multijump_ready = false (require release+press again)", port: "MultijumpReady = false", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "OnPlayerJump subscribed to the PlayerJump chain; host calls it only on a jump/jetpack press (CheckPlayerJump:759) exactly like Base CheckPlayerJump:542; pj.Multijump written back at PlayerPhysics.cs:823, honored at line 841. Wave-2 added the `&& clientMultijump != 0` ready-gate factor (MultijumpMutator.cs:118) and changed maxspeed from Horiz2D to Velocity.Length() (line 126).", result: pass }
    confidence: high
    notes: "FIXED by Wave-2 (both prior divergences closed): (a) the previously-omitted client_multijump truthiness factor is now present in the ready gate (`&& clientMultijump != 0`); (b) the maxspeed comparison is now the full 3D speed Velocity.Length(), matching Base vdist (was 2D Horiz2D). Core logic (press/release debounce via FL_JUMPRELEASED<->EntFlags.JumpReleased, count/speed gates, add-vs-set z branch, count increment, ready-reset) remains faithful and live, fired on the jump-pressed path. Confidence raised to high. Residual minor edge: JumpVelocity() reads sv_jumpvelocity (260 fallback) -- matches the core PlayerJump mjumpheight source for the common no-crouch case; Base's PHYS_JUMPVELOCITY honors the crouch jumpvelocity, the port's set-mode threshold uses the non-crouch value (minor edge case, unchanged from baseline). NOTE: the clientMultijump value here is sourced from the same dead provider tracked in jump.client_gate; on the default path it resolves to ClientDefault=1, which is truthy, so the factor matches Base default behavior."

  - id: mutator-multijump.jump.client_gate
    name: "Per-client cl_multijump opt-in/out/cap with g_multijump_client server default"
    layer: [authority, shared, presentation]
    base_refs:
      - "common/mutators/mutator/multijump/multijump.qc:5 (REPLICATE(cvar_cl_multijump,...) ), :29-34 (PHYS_MULTIJUMP_CLIENT = CS_CVAR(s).cvar_cl_multijump on SVQC / autocvar_cl_multijump on CSQC; PHYS_MULTIJUMP_CLIENTDEFAULT = STAT(MULTIJUMP_CLIENT)), :55-59 (client_multijump=-1 -> g_multijump_client default; >1 -> return)"
      - "common/mutators/mutator/multijump/multijump.qh:4 (REPLICATE_INIT(int, cvar_cl_multijump))"
      - "common/stats.qh:158,164 (bool autocvar_g_multijump_client = true; REGISTER_STAT(MULTIJUMP_CLIENT, BOOL, autocvar_g_multijump_client))"
      - "mutators.cfg:473,475 (seta cl_multijump -1; set g_multijump_client 1)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MultijumpMutator.cs:46 (ClientDefault field), :54 (ClientMultijumpProvider hook -- DEAD, never assigned), :82 (ClientDefault read from g_multijump_client cvar), :110-114 (gate: provider->-1->ClientDefault substitution, >1 -> return)"
    constants:
      - { name: "cl_multijump (replicated per-client field) default", base: "-1 (server decides)", port: "ClientMultijumpProvider returns -1 when unwired -- and it IS always unwired (no host assigns it)", match: false }
      - { name: "g_multijump_client (STAT MULTIJUMP_CLIENT, the server default for cl_multijump==-1) default", base: "1 (true)", port: "ClientDefault = (int)Cvars.GetFloat(\"g_multijump_client\") -> 1 (mutators.cfg:475); now read and honored", match: true }
      - { name: "disable rule", base: "client_multijump > 1 -> return (no multijump for this client)", port: "clientMultijump > 1 -> return (logic present, but clientMultijump can never exceed ClientDefault since the per-client source is dead)", match: false }
    status:
      logic: partial
      values: partial
      timing: na
      presentation: missing
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The per-client opt-out/cap is non-functional: ClientMultijumpProvider (the QC cvar_cl_multijump REPLICATE source) is declared but NEVER assigned by any host code. The analogous Inventory.PriorityProvider IS wired (Commands.cs:324 via GetClientCvar(p,\"cl_weaponpriority\")); the multijump equivalent was added as a seam but left dead. It always returns -1, so a client who sets cl_multijump 0 or 2+ is still treated as 'server decides' and still gets multijump."
      - "Because the per-client value can never be 0, the rejump_grant ready-gate truthiness factor (`clientMultijump != 0`) can also never gate to false on the default path -- it only ever sees ClientDefault."
    verification:
      - { kind: code, ref: "grep -rn ClientMultijumpProvider over src/**: only the declaration (line 54) and the read (line 110) inside MultijumpMutator itself; no assignment anywhere. By contrast PriorityProvider has a live assignment at Commands.cs:324. g_multijump_client IS now read at MultijumpMutator.cs:82.", result: fail }
    confidence: high
    notes: "PARTIAL FIX by Wave-2. Two of the three constants moved: (1) the g_multijump_client SERVER DEFAULT is now read from the cvar store (ClientDefault) and honored in the -1 substitution -- this closes the previously-missing server-default portion and is LIVE/faithful on the default path; (2) the gate LOGIC (>1 -> return; -1 -> default; truthiness factor) is now coded. BUT the per-client portion is still effectively MISSING because its data source (ClientMultijumpProvider) is dead -- a textbook 'compiles but isn't wired' seam. Functionally: in a default server (every client cl_multijump -1) the result matches Base, exactly as before; the gap that remains is the per-client opt-out/cap, which still cannot fire. Status downgraded from baseline's all-missing to partial (server-default live, per-client dead). To fully close: assign ClientMultijumpProvider in the server Commands ctor like PriorityProvider, reading the replicated cl_multijump value."

