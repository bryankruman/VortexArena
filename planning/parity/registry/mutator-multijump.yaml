      - { name: "redirect", base: "velocity_x = wishdir_x*curspeed; velocity_y = wishdir_y*curspeed; z kept", port: "v.X = wishDir.X*curSpeed; v.Y = wishDir.Y*curSpeed; z kept", match: true }
