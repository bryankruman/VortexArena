    confidence: high
    notes: "Base CSQC additionally copies the networked stat into the local field (player.multijump_count = PHYS_MULTIJUMP_COUNT) BEFORE the on-ground reset, for prediction sync (#ifdef CSQC, multijump.qc:40-42). The port has no explicit stat-copy step (see counter.networking row); whether the predicted client count stays synced with the server tally is unresolved."

  - id: mutator-multijump.jump.rejump_grant
