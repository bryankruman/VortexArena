    confidence: medium
    notes: "Base's commented-out SVQC branch (antilag-averaged topspeed via antilag_takebackavgvelocity, multijump.qc:92-99) is NOT in the shipping path -- the live Base path is plain vlen(vec2(velocity)), which the port matches. g_multijump_dodging is an INT stat in Base (any non-zero truthy); the port stores a bool -- equivalent for all normal values. Yaw-source equivalence (ViewAngles.Y vs v_angle_y) is structurally correct but unverified against a live view-angle frame, hence medium confidence."

