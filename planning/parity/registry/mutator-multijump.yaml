      - { kind: code, ref: "Verified 2026-06-27 (lines re-resolved). SentCvarAllowlist contains 'cl_multijump' (Commands.cs:228) -> CmdSentCvar gates on the allowlist at Commands.cs:3201 and stores the client's replicated value. ClientMultijumpProvider assigned in the live Commands ctor (Commands.cs:550-551) reading GetClientCvarFloat(p,'cl_multijump',-1f) (:333) from that store. Mutator gate (MultijumpMutator.cs:110-114) substitutes ClientDefault on -1 and returns on >1. g_multijump_client read at :82. Same end-to-end pattern as the now-working cl_dodging provider (Commands.cs:560). The whole per-client opt-out(0)/cap(>1)/default(-1) path is wired.", result: pass }
    confidence: high
    notes: "Faithful + live (unchanged this audit; line refs re-resolved 2026-06-27). The two seams the original baseline flagged are both closed: (1) 'cl_multijump' is in SentCvarAllowlist (Commands.cs:228, with an explaining comment referencing the REPLICATE field), so the client's replicated value is no longer dropped by CmdSentCvar (gate at :3201) -- it lands in the per-client store; (2) ClientMultijumpProvider is assigned in the live Commands ctor (Commands.cs:550-551) reading that store. The mutator-side gate logic was already correct. Net result: a client who sets cl_multijump 0 (opt out) or 2+ (cap off) is now honored, and -1 (default) defers to the server's g_multijump_client. The ready-gate truthiness factor and the `>1 -> return` cap in rejump_grant are now fed real per-client values. NOTE: Base REPLICATE type is `bool` at qc:5 but `int` at qh:4 REPLICATE_INIT; the port stores/reads as int (via GetClientCvarFloat -> (int)) which correctly carries the -1/0/1/2+ value semantics the gate logic needs. Not runtime-verified end-to-end (no live sentcvar round-trip test), but the wiring is structurally complete and mirrors a verified sibling (dodging)."

