      - "common/stats.qh:158,164 (bool autocvar_g_multijump_client = true; REGISTER_STAT(MULTIJUMP_CLIENT, BOOL, autocvar_g_multijump_client))"
      - "mutators.cfg:473,475 (seta cl_multijump -1; set g_multijump_client 1)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MultijumpMutator.cs:46 (ClientDefault field), :54 (ClientMultijumpProvider hook), :82 (ClientDefault read from g_multijump_client cvar), :110-114 (gate: provider->-1->ClientDefault substitution, >1 -> return)"
      - "src/XonoticGodot.Server/Commands.cs:228 (\"cl_multijump\" IN SentCvarAllowlist, declared at :210), :550-551 (ClientMultijumpProvider assigned in Commands ctor: e is Player p ? (int)GetClientCvarFloat(p,\"cl_multijump\",-1f) : -1), :3201 (CmdSentCvar gates on SentCvarAllowlist before storing into the per-client store), :333 (GetClientCvarFloat reads it back)"
    constants:
      - { name: "cl_multijump (replicated per-client field) default", base: "-1 (server decides)", port: "provider reads GetClientCvarFloat(p,\"cl_multijump\",-1f) (Commands.cs:551); cl_multijump is allowlisted (Commands.cs:228) so a client `sentcvar cl_multijump <n>` passes the CmdSentCvar gate (:3201), lands in the per-client store, and is read back", match: true }
      - { name: "g_multijump_client (STAT MULTIJUMP_CLIENT, the server default for cl_multijump==-1) default", base: "1 (true)", port: "ClientDefault = (int)Cvars.GetFloat(\"g_multijump_client\") -> 1 (mutators.cfg:475); read and honored", match: true }
      - { name: "disable rule", base: "client_multijump > 1 -> return (no multijump for this client)", port: "clientMultijump > 1 -> return (logic present and fed by a LIVE, now-stored provider value)", match: true }
