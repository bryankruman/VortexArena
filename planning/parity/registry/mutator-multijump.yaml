unit: mutator-multijump
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 7
  worst_gaps:
    - "Per-client cl_multijump opt-in/out/cap is NOT implemented: a player who sets cl_multijump 0 (opt out) or cl_multijump 2+ still gets multijump in the port; Base disables it for that client (>1 -> return, and a 0/falsey client value also fails the ready-gate truthiness factor so the ready flag never arms). The g_multijump_client server-default (used when cl_multijump==-1) is parsed but never read."
    - "maxspeed gate uses Horiz2D (xy speed) but Base vdist(player.velocity,<=,maxspeed) is the full 3D speed including velocity_z -- when g_multijump_maxspeed>0 the port allows re-jumps Base would reject (and vice versa) near the cap. Default g_multijump_maxspeed=0 makes this inert, so it only bites a non-default ruleset."
    - "The serverinfo/scoreboard active-mutators list (BuildMutatorsString ':multijump' / BuildMutatorsPrettyString ', Multi jump') is not produced for this mutator."
features:
  - id: mutator-multijump.enable.registration
    name: "Registration + enable cvar (g_multijump is both switch and extra-jump count)"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/multijump/multijump.qc:13-17 (REGISTER_MUTATOR(multijump, autocvar_g_multijump) SVQC; REGISTER_MUTATOR(multijump, true) CSQC)"
      - "common/stats.qh:153,167 (int autocvar_g_multijump; REGISTER_STAT(MULTIJUMP, INT, autocvar_g_multijump))"
      - "mutators.cfg:474 (set g_multijump 0)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MultijumpMutator.cs:39-40 (IsEnabled), :45-62 (Hook caches tuning cvars)"
      - "src/XonoticGodot.Server/GameWorld.cs:511 (MutatorActivation.Apply on the live boot path)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:60-69 (Apply: only IsEnabled mutators are Hook()ed)"
    constants:
      - { name: "g_multijump default", base: "0 (disabled)", port: "0 via cvar store; field fallback MaxJumps=1 (unused when disabled because Hook() is not called)", match: true }
      - { name: "enable predicate", base: "autocvar_g_multijump != 0", port: "Cvars.GetFloat(\"g_multijump\") != 0f", match: true }
      - { name: "value semantics", base: "STAT(MULTIJUMP) is enable switch AND extra-jump count; -1 = infinite", port: "MaxJumps=(int)g_multijump (set only when mj!=0); -1 honored in count gate", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "[Mutator] attr -> Mutators.All; MutatorActivation.Apply() at GameWorld.cs:511 calls Add()->Hook() only for IsEnabled mutators; Hook() subscribes PlayerPhysics + PlayerJump chains", result: pass }
    confidence: high
    notes: "The cvar value is simultaneously the enable switch AND the extra-jump count (-1 = infinite). CSQC registers always-true and reads STAT(MULTIJUMP); the port runs a single shared physics path and only hooks the mutator when g_multijump!=0, so its in-hook `MaxJumps==0 -> return` guard is effectively dead (mirrors Base CSQC's `if(!PHYS_MULTIJUMP) return` which IS meaningful there because CSQC is always-registered). Tuning cvars are cached in Hook() from the loaded mutators.cfg store; a mid-match g_multijump* change is not re-read until Apply() re-runs (same caching pattern as bloodloss; no live-reread test was performed)."

