      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The ready-gate's client_multijump truthiness factor is omitted: Base requires client_multijump to be truthy to arm multijump_ready, so a falsey/0 client value never even arms a re-jump; the port always arms it from the server setting (see jump.client_gate row)."
      - "maxspeed gate uses Horiz2D (xy speed) but Base vdist(player.velocity,<=,maxspeed) is the full 3D speed including velocity_z -- when g_multijump_maxspeed>0 the port allows re-jumps that Base would reject (and vice versa) near the cap. Default g_multijump_maxspeed=0 makes this inert, so it only bites a non-default ruleset."
    verification:
      - { kind: code, ref: "OnPlayerJump subscribed to the PlayerJump chain; host calls it only on a jump/jetpack press (CheckPlayerJump:759) exactly like Base CheckPlayerJump:542; pj.Multijump written back at PlayerPhysics.cs:823, honored at line 841", result: pass }
    confidence: medium
    notes: "Core logic (ready-gate press/release debounce via FL_JUMPRELEASED<->EntFlags.JumpReleased, count/speed gates, add-vs-set z branch where z is zeroed then re-added by the core jump to land exactly at jumpvelocity, count increment, ready-reset) is faithful and live, fired on the same gameplay path (jump pressed). Two divergences vs Base: (a) the omitted client_multijump factor in the ready gate; (b) the 2D-vs-3D maxspeed comparison. JumpVelocity() reads sv_jumpvelocity (260 fallback) -- matches the core PlayerJump mjumpheight source for the common no-crouch case; Base's PHYS_JUMPVELOCITY honors the crouch jumpvelocity, the port's set-mode threshold uses the non-crouch value (minor edge case)."

  - id: mutator-multijump.jump.client_gate
    name: "Per-client cl_multijump opt-in/out/cap with g_multijump_client server default"
    layer: [authority, shared, presentation]
    base_refs:
      - "common/mutators/mutator/multijump/multijump.qc:5 (REPLICATE(cvar_cl_multijump,...) ), :29-34 (PHYS_MULTIJUMP_CLIENT = CS_CVAR(s).cvar_cl_multijump on SVQC / autocvar_cl_multijump on CSQC; PHYS_MULTIJUMP_CLIENTDEFAULT = STAT(MULTIJUMP_CLIENT)), :55-59 (client_multijump=-1 -> g_multijump_client default; >1 -> return)"
      - "common/mutators/mutator/multijump/multijump.qh:4 (REPLICATE_INIT(int, cvar_cl_multijump))"
      - "common/stats.qh:158,164 (bool autocvar_g_multijump_client = true; REGISTER_STAT(MULTIJUMP_CLIENT, BOOL, autocvar_g_multijump_client))"
      - "mutators.cfg:473,475 (seta cl_multijump -1; set g_multijump_client 1)"
    port_refs: []
    constants:
      - { name: "cl_multijump (replicated per-client field) default", base: "-1 (server decides)", port: "none (no replicated cl_multijump field; never read)", match: false }
      - { name: "g_multijump_client (STAT MULTIJUMP_CLIENT, the server default for cl_multijump==-1) default", base: "1 (true)", port: "none (cvar present in store but never read)", match: false }
      - { name: "disable rule", base: "client_multijump > 1 -> return (no multijump for this client)", port: "none", match: false }
    status:
      logic: missing
      values: missing
      timing: na
      presentation: missing
      audio: na
      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "A player who sets cl_multijump 0 (opt out) or cl_multijump 2+ still gets multijump in the port; Base disables it for that client (>1 -> return, and a falsey client value also fails the ready-gate truthiness factor so the ready flag never arms)."
      - "g_multijump_client (the server-side per-client default applied when cl_multijump == -1) is parsed from mutators.cfg but never read; the port always uses the global server setting."
      - "No replicated cl_multijump field/cvar exists in the port."
    verification:
      - { kind: code, ref: "grep across port src/** and game/**: no cl_multijump or g_multijump_client read anywhere (only the source comment at MultijumpMutator.cs:16 acknowledging the deferral)", result: fail }
    confidence: high
    notes: "CORRECTION to draft: cl_multijump and g_multijump_client are TWO distinct things. cl_multijump is the per-client REPLICATE field (cvar_cl_multijump; declared int in the .qh but REPLICATE'd as bool in the .qc -- a Base type quirk, irrelevant to the port). g_multijump_client is STAT(MULTIJUMP_CLIENT) (BOOL), the server-side default substituted when cl_multijump==-1. The port implements neither. Functionally: in a default server (every client cl_multijump -1) the result is identical to Base because the substituted g_multijump_client 1 is truthy and <=1; the gap only manifests when a client opts out/caps or an admin changes g_multijump_client. Documented in-code, but it is a behavioral gap not a deliberate design change, so flagged missing rather than intended_divergence."

