summary:
  feature_count: 7
  worst_gaps:
    - "Per-client cl_multijump opt-out/cap (cl_multijump 0 or 2+) is STILL non-functional, but the dead point has MOVED one layer deeper: the second-pass fix-up DID assign ClientMultijumpProvider (Commands.cs:392, reading GetClientCvarFloat(p,'cl_multijump',-1)), closing the mutator-level seam the prior baseline flagged. HOWEVER 'cl_multijump' is NOT in CmdSentCvar's SentCvarAllowlist (Commands.cs:179-198), so a client pushing `sentcvar cl_multijump 0/2` is silently dropped (Commands.cs:2036-2037) and the value never lands in _clientCvars. The provider therefore always reads its -1 fallback -> still 'server decides' for every client. Net behavior is unchanged from baseline; the per-client opt-out/cap can never fire."
