unit: mutator-overkill
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 16
  worst_gaps:
    - "Normal health/armor pickups are not filtered out of Overkill maps (Base blocks ArmorMedium+ArmorBig by default; HealthMega/ArmorMega toggle-off by default); item economy wrong."
    - "Strength/Shield powerups are not replaced by HMG/RPC superweapon pickups; those superweapons are unobtainable from the map."
    - "Player-death loot drop is a non-functional entity: it never runs the item spawn pipeline (no Touch handler, no def.ItemInit), so the dropped loot cannot be picked up — it just despawns."
    - "Monsters drop no loot and their normal drop is not suppressed (MonsterDropItem hook chain does not exist in the port)."
    - "Secondary Blaster does not work during the round countdown (Overkill does not subscribe the live PlayerPreThink chain)."
    - "No item-respawn waypoints for surviving health/armor; no OK items injected into the random-items pool (neither hook chain exists)."
    - "SetWeaponArena('off') and ForbidRandomStartWeapons handlers are dead: no caller fires those hook chains anywhere in the port."
