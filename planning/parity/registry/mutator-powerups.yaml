    - "Powerdown center-print fires on ANY status-effect falling edge, not just TIMEOUT (Base gates m_remove on removal_type==STATUSEFFECT_REMOVE_TIMEOUT); stopsound(CH_TRIGGER_SINGLE) on removal still unported."
