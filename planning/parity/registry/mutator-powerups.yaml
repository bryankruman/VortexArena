unit: mutator-powerups
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 15
  worst_gaps:
    - "Strength/Shield player glow never applied: actor.effects never gets EF_BLUE/EF_RED|EF_ADDITIVE|EF_FULLBRIGHT, so a powerup holder does not glow (the EF_BLUE/EF_RED render path EXISTS in CsqcModelEffects.cs but nothing sets the bits on the player)."
    - "Drop-on-death / drop-on-use entirely missing (Base default g_powerups_drop_ondeath=1): powerups vanish on death instead of dropping a pickup-able item with a countdown WP_Item waypoint."
    - "Pickup/powerdown notifications (INFO broadcast + CENTER print) never fire: StatusEffectsCatalog.Apply/Remove are generic and send nothing, even though POWERUP_/POWERDOWN_ strings are registered."
    - "Strength-fire sound never plays (W_PlayStrengthSound + prevstrengthsound/prevstrengthsoundattempt anti-spam not ported)."
    - "Powerdown countdown beep absent: every powerup m_tick calls play_countdown(..., SND_POWEROFF); StatusEffectsCatalog.Tick has no countdown audio (POWEROFF sound IS registered)."
    - "Invisibility stealth incomplete: enemy radar still shows the player, monsters still target, bots still attack (CustomizeWaypoint/MonsterValidTarget/Bot_ForbidAttack unported)."
    - "Speed attack-rate boost only applies on the shared fire/reload gate; per-weapon animtime paths (Machinegun/Shotgun/Electro/Rifle/OkHmg/OkMachinegun) call the parameterless WeaponRateFactor() and skip the hook, so those weapons do not fire faster under Speed."
    - "Death-log item codes (S/I) + server-browser mutator strings (:powerups / Powerups) for powerups unported."
