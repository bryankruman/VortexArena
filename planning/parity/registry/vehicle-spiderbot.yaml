unit: vehicle-spiderbot
category: vehicle
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 16
  worst_gaps:
    - "Per-frame controller runs once per 0.1s vehicle think (DefaultThinkRate) but its turn/gravity steps multiply by Api.Clock.FrameTime (= TicRate, ~0.0167s), NOT QC's per-movement-frame PHYS_INPUT_FRAMETIME — so head/body slew + gravity advance ~TicRate/0.1 (~6x) SLOWER than Base, not merely coarser. Magnitude error, not just feel."
    - "vr_enter does NOT reattach a pilot's carried CTF flag to tur_head at '-20 0 120' (QC spiderbot.qc:552-556); EnterVehicle leaves it a cross-boundary TODO. Directly relevant to the CTF flag-rotation validation anchor."
    - "Death blowup is simplified: no 4 physics gib entities (head MF_ROCKET+EF_FLAME bounce+fade, 2 tossed guns, body frame 11) and no spiderbot_headfade; the per-burn random EFFECT_EXPLOSION_SMALL + SND_ROCKET_IMPACT during the ~3.4s burn are a TODO. The 250-dmg blast + 45s respawn ARE faithful."
    - "Landing sound (SND_VEH_SPIDERBOT_LAND on the frame 4->5 land transition) is not played; the port has no landing-detect branch."
    - "Head turret aim traces only tag_hardpoint01; QC averages tag_hardpoint01 + tag_hardpoint02 (and both v_forward) for the aux-crosshair aim point."
    - "pushable (jumppad launches the spiderbot) is set in QC vr_setup but has no port concept; mass=5000 not modeled; vr_impact/bouncepain handler not ported (no-op by default)."
