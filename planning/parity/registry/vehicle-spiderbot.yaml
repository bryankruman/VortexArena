summary:
  feature_count: 16
  worst_gaps:
    - "FIXED-IN-WAVE-15 (719d377, verified this re-audit): the death blowup now spawns the 4 physics gib entities server-side (Spiderbot.SpawnDeathGibs: body frame 11 + colormod dark + SUB_SetFade; head MOVETYPE_BOUNCE + EF_FLAME + avelocity + the spiderbot_headfade closure that fires SND_ROCKET_IMPACT + EFFECT_EXPLOSION_BIG on its final fade; 2 guns MOVETYPE_TOSS v_forward*700 + fade), hides the originals (alpha=-1), and the gib entities replicate via the normal entity feed. The per-burn EFFECT_EXPLOSION_SMALL + SND_ROCKET_IMPACT and the 250-dmg blast + 45s respawn are faithful. ONLY RESIDUAL on the death scene = the head's MF_ROCKET modelflag (client rocket-smoke-trail render; no port Entity field — EF_FLAME IS set). death.blowup presentation upgraded partial->faithful."
    - "FIXED-SINCE-BASELINE: vr_impact / bouncepain (g_vehicle_spiderbot_bouncepain) is ported (Spiderbot.Impact) and live via VehicleCommon.Touch — a faithful no-op at the stock '0 0 0' default (the bouncepain cvar is not yet server-overridable). pushable IS set (vehicle.PushableFlag=true in Spawn — jumppad launches modeled). FIXED-THIS-AUDIT: mass=5000 is now modeled (Spiderbot.cs:119 vehicle.Mass=5000; the Entity.Mass field from DamageEntityState.cs is read by the blast-push pipeline DamageSystem.cs:791 — mass-scaled only for MOVETYPE_PHYSICS targets, matching QC where .mass affects knockback only on physics-movetype bodies; the spiderbot is MOVETYPE_STEP so neither Base nor port mass-scales its own knockback, but the field is now faithfully present)."
    - "FIXED-SINCE-BASELINE: the server-authoritative Send_Effect muzzle/launch effects are now emitted — EFFECT_SPIDERBOT_MINIGUN_MUZZLEFLASH (FireMinigun) and EFFECT_SPIDERBOT_ROCKETLAUNCH (RocketDo). Still client-only TODO across the unit: gun barrel spin, aux crosshairs, vehicle_ammo2/reload2 HUD %, PROJECTILE_SPIDERROCKET in-flight CSQC visual, walk/strafe/idle engine sounds (re-architected client-side), and the per-pain EFFECT_SMOKE_SMALL puff (the gameplay-authoritative DmgShake jitter from vehicles_painframe IS produced)."
    - "view_ofs '0 0 70' / height 170 (seated camera offset + chase distance) still not modeled on the headless server descriptor (client-view concern)."
    - "STABLE since prior audit (commit 4be8357): the Wave-2 locomotion-gravity regression (GravityTicrateFactor read an unregistered cvar -> 1.0 -> 2x-too-strong gravity) is resolved — the factor is hardcoded 0.5, matching QC's sv_gameplayfix_gravityunaffectedbyticrate default-true. Also fixed: vr_spawn no longer wrongly nulls Touch (run-over crush restored), and vehicles_painframe is invoked each Think (low-health DmgShake jitter)."
