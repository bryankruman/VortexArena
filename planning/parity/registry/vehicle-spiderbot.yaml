summary:
  feature_count: 16
  worst_gaps:
    - "Death blowup is still simplified on presentation: no 4 physics gib entities (head MF_ROCKET+EF_FLAME bounce+fade via spiderbot_headfade, 2 tossed guns body-vel v_forward*700, body frame 11) and no spiderbot_headfade head EXPLOSION_BIG+ROCKET_IMPACT on final fade; the per-burn EFFECT_EXPLOSION_SMALL visual is still a TODO. The ~10% burn-tick SND_ROCKET_IMPACT audio + the 250-dmg blast + 45s respawn ARE faithful."
    - "FIXED-SINCE-BASELINE: vr_impact / bouncepain (g_vehicle_spiderbot_bouncepain) is now ported (Spiderbot.Impact) and live via VehicleCommon.Touch — a faithful no-op at the stock '0 0 0' default (the bouncepain cvar is not yet server-overridable). pushable IS now set (vehicle.PushableFlag=true in Spawn — jumppad launches modeled); only mass=5000 remains unmodeled (no mass field)."
    - "Client-only presentation still TODO across the unit: EFFECT_SPIDERBOT_MINIGUN_MUZZLEFLASH, gun barrel spin, aux crosshairs, vehicle_ammo2/reload2 HUD %, EFFECT_SPIDERBOT_ROCKETLAUNCH / PROJECTILE_SPIDERROCKET visuals, walk/strafe/idle engine sounds (re-architected client-side), and the per-pain EFFECT_SMOKE_SMALL puff (the gameplay-authoritative DmgShake jitter from vehicles_painframe IS now produced)."
    - "view_ofs '0 0 70' / height 170 (seated camera offset + chase distance) still not modeled on the headless server descriptor (client-view concern)."
    - "FIXED since 2026-06-22 baseline (commit 4be8357): the Wave-2 locomotion-gravity regression (GravityTicrateFactor read an unregistered cvar -> 1.0 -> 2x-too-strong gravity) is resolved — the factor is now hardcoded 0.5, matching QC's sv_gameplayfix_gravityunaffectedbyticrate default-true. Also fixed: vr_spawn no longer wrongly nulls Touch (run-over crush restored), and vehicles_painframe is now invoked each Think (low-health DmgShake jitter)."
