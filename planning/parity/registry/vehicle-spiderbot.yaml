    confidence: high
    notes: "Pilot glue (origin = vehic.origin + maxs.z, velocity match, oldorigin negate fall damage) is faithful. game_stopped park via FreezeIfGameStopped. The empty-spiderbot vr_think brake-to-stop is folded into Think (OnGround -> BrakeSimple). The TODO.md 'orphaned / VehInput never written' note is STALE."

