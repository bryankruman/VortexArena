      - { kind: code, ref: "Think now calls VehicleCommon.PainFrame(vehicle) at its tail each tick (commit 4be8357), porting vehicles_painframe (sv_vehicles.qc:594-618) which QC runs after vr_think — low-health (<=50%) DmgShake velocity jitter is produced (spiderbot has VHF_DMGSHAKE); the EFFECT_SMOKE_SMALL puff is deferred (client/net).", result: pass }
    confidence: high
    notes: "FIXED in Wave-2: the prior DOUBLE timing defect (invoke every 0.1s but step by FrameTime ~0.0167 => ~6x too slow) is resolved by stepping by dt=0.1. Pilot glue + game_stopped park + empty-spiderbot BrakeSimple all faithful. FIXED-SINCE-BASELINE (4be8357): vehicles_painframe is now wired into Think (low-health jitter live)."

