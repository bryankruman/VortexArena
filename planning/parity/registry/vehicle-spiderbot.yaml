    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DOUBLE timing defect: the controller is INVOKED once per 0.1s (DefaultThinkRate) but its turn/gravity steps multiply by Api.Clock.FrameTime (= TicRate, ~0.0167s), not by the time elapsed since the last call. QC runs spiderbot_frame EVERY movement frame and multiplies by that frame's PHYS_INPUT_FRAMETIME. Net: head/body slew and the locomotion gravity step accumulate at ~TicRate/0.1 (~1/6) of the Base rate — turning is ~6x slower, not merely 'coarser'. Magnitude error."
    verification:
      - { kind: code, ref: "Seated input stashed on vehicle.VehInput (GameWorld.cs:1049-1056); vehicle.Think pumped by SimulationLoop.RunThink at NextThink=Time+ThinkRate(0.1); Frame multiplies by FrameTime=TicRate", result: pass }
