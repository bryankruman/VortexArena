unit: mapobject-func
category: mapobject
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 17
  worst_gaps:
    - "MAP-OBJECT ROUND-RESTART RESET IS DEAD: GameWorld.ResetMapObjects only deletes projectiles — it never invokes any mover's .reset, and NO mover assigns .Reset. So door_reset / plat_reset / button_reset / func_breakable_reset / func_rotating_reset / secret_reset are all dead; movers caught mid-cycle at a round/match restart stay where they are instead of snapping home + re-arming."
    - "func_button DONTACCUMULATEDMG semantics are INVERTED: QC button_damage with DONTACCUMULATEDMG fires ONLY on a single hit whose damage >= health (it does NOT subtract health), so a high-HP button never opens from small hits; the port's Combat.Death hook always accumulates damage until HP<1 then fires. Also NOSPLASH (splash-immune) is not honored on door/button/breakable, and the QC `health -1 = fire on ANY (even damageless) attack` case is unmodeled."
    - "the `sounds` map key is not promoted by ApplyDictFields/MapObjectFieldsExtra, so QC's sounds>0 (door), sounds==1/2 (plat) and sounds>0 (secret) sound-pack selection plus the plat sound1/sound2 backwards-compat fields are all bypassed; the port unconditionally uses the default pack."
    - "DOOR_ROTATING_BIDIR / BIDIR_IN_DOWN trigger-side reverse-open logic (door_use's trigger.trigger_reverse path) is not ported; the lip==666 HitBottom undo is present but never set without BIDIR, so bidirectional rotating doors always open the default direction."
    - "no CSQC ENT_CLIENT_* networking/draw and no client-side centerprint for any func_* (door .message, key-door CENTER_DOOR_* notifications, secret .message); the port plays only the audible play2(noise) halves. (Net_LinkEntity is commented out in Base too — the CSQC handlers are latent there.)"
