summary:
  feature_count: 17
  worst_gaps:
    - "MAP-OBJECT ROUND-RESTART RESET IS STILL DEAD (re-verified 2026-06-22): GameWorld.ResetMapObjects (GameWorld.cs:2544-2556) STILL only deletes projectiles/weapon_proj* — it never iterates movers and never invokes any .Reset; the only Entity.Reset?.Invoke dispatch in the whole port is MonsterAI.cs:1613, unreachable from this path. NO func_* mover assigns Entity.Reset (grep `.Reset =` -> DynamicLight/TargetMusic/VoiceScript only). The Buttons.cs:15 comment still claims 'button_reset re-arm is wired centrally in GameWorld.ResetMapObjects' — FALSE. door_reset / plat_reset / button_reset / func_breakable_reset / func_rotating_reset / secret_reset all remain dead; movers caught mid-cycle at a round/match restart stay where they are."
    - "CENTERPRINT SEAM IS UNWIRED (dead, re-verified 2026-06-22): the Wave-2 MapMover.Centerprint(...) calls for door .message, door_secret .message/touch, and target_items give-message all route through MapObjectsCommon.CenterprintHandler (MapObjectsCommon.cs:782/797), which is NEVER assigned anywhere in src/ or game/ (grep `CenterprintHandler =` = 0 hits) — so every map-object .message centerprint silently no-ops on the live path. The audible play2(noise) halves play; the visible text still does not show. Key-door CENTER_DOOR_* notifications were not even given a Centerprint call."
    - "DOOR_ROTATING_BIDIR / BIDIR_IN_DOWN trigger-side reverse-open logic (door_use's trigger.trigger_reverse path) is STILL not ported; DoorUse still takes (self, actor) with no trigger arg. The lip==666 HitBottom undo is present but never set without BIDIR, so bidirectional rotating doors always open the default direction. Now explicitly documented out-of-scope (Doors.cs:15)."
    - "no CSQC ENT_CLIENT_* networking/draw for any func_* (door/plat/train/conveyor/ladder); brushes sync via engine entity state. (Net_LinkEntity is commented out in Base too — the CSQC handlers are latent there.)"
