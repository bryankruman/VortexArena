    gaps:
      - "Port substitutes raw GiveResourceWithLimit(Health, steal, 5) for Base Heal(), bypassing the event_heal/PlayerHeal indirection AND Heal's own game_stopped/spectator/FROZEN/IS_DEAD guards (damage.qc:951-953)."
