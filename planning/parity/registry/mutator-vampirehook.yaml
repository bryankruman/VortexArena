    base_refs:
      - "server/hook.qc:273 (GrapplingHookTouch -> GrapplingHook_Stop + SetMovetypeFollow(this, toucher))"
      - "common/util.qc:2129 (SetMovetypeFollow sets ent.aiment = e, with explicit IS_PLAYER(aiment) view_ofs clamping)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Hook.cs:269 (GrapplingHookTouch)"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Hook.cs:284 (self.Aiment = other + IS_PLAYER bbox clamp 287-294)"
    constants:
      - { name: "view_ofs bbox clamp inset", base: "+4 / -4 (util.qc:2140-2142)", port: "+4 / -4 (Hook.cs:291-293)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Minor structural omission vs SetMovetypeFollow (util.qc:2129-2147): the port does NOT set solid=SOLID_NOT, MOVETYPE_FOLLOW, v_angle, aiment_classname, or aiment_deadflag. Instead it keeps MoveType.None (set on latch) and manually re-positions the chain to follow each think (Hook.cs:330-331). These fields are unused by the vampirehook drain and the reel pull, so behavior is equivalent for this unit; flagged only for completeness."
    verification:
      - { kind: code, ref: "GrapplingHookTouch (Hook.cs:284) now sets self.Aiment = other UNCONDITIONALLY on every latch (matching Base's commented-out `if move_movetype != MOVETYPE_NONE`), and clamps the follow offset into the player bbox with +4/-4 inset (Hook.cs:287-294) exactly as util.qc:2140-2142 when other is a Client", result: pass }
      - { kind: code, ref: "Hook is MoveType.Fly + Solid.Corpse (MakeTrigger, Projectiles.cs:40) with DpHitContentsMask incl SuperContentsBody; engine FlyMove (FlyMove.cs:107-111) dispatches Touch against solid bodies, so the chain genuinely touches and latches onto a player on the live match path", result: pass }
      - { kind: code, ref: "GrapplingHookThink top-guard (Hook.cs:310-315) removes the hook only when aiment IsFreed or is an Item-flagged non-nade; a player has no Item flag, so a player-aiment survives and keeps thinking (NextThink=time, Hook.cs:317)", result: pass }
    confidence: high
    notes: "FIXED in Wave-2. This was the baseline root cause (aiment always null -> whole mutator inert). The port now reproduces SetMovetypeFollow's aiment write + player-bbox clamp inline in GrapplingHookTouch and tracks the followed origin each think. Drain is now reachable on a direct hook hit onto an enemy."

