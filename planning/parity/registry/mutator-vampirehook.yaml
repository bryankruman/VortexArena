  - id: mutator-vampirehook.latch.aiment_follow
    name: "Latched hook follows its toucher (sets .aiment) — the precondition for the drain"
    layer: [authority]
    base_refs:
      - "server/hook.qc:273 (GrapplingHookTouch -> GrapplingHook_Stop + SetMovetypeFollow(this, toucher))"
      - "common/util.qc:2129 (SetMovetypeFollow sets ent.aiment = e, with explicit IS_PLAYER(aiment) handling)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/Hook.cs:234 (GrapplingHookTouch)"
    constants: []
    status:
      logic: missing
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port GrapplingHookTouch (Hook.cs:234) latches by setting Health=1, Velocity=0, MoveType=None — it never makes the hook FOLLOW its toucher and never sets Aiment. Base GrapplingHookTouch (hook.qc:273-286) calls SetMovetypeFollow(this, toucher) UNCONDITIONALLY on every latch (the old `if (toucher.move_movetype != MOVETYPE_NONE)` is commented out), and SetMovetypeFollow (util.qc:2133) sets ent.aiment = toucher — including when the toucher is a player (util.qc:2140 has explicit IS_PLAYER(aiment) view_ofs clamping). This is independent of g_grappling_hook_tarzan: even the simple pull sets aiment to whatever was hit. Because the port skips this, thehook.Aiment is always null, which is what makes the whole vampirehook drain inert."
    verification:
      - { kind: code, ref: "grep: no SetMovetypeFollow / no `.Aiment =` anywhere in Hook.cs; the only Aiment writers in Gameplay are DynamicLight/Follow/Triggers (map objects), not the grapple", result: fail }
      - { kind: code, ref: "Base hook.qc:284 SetMovetypeFollow(this, toucher) runs unconditionally inside `if (toucher)`; util.qc:2133 sets ent.aiment = e", result: pass }
    confidence: high
    notes: "The true upstream root cause. NOT a 'missing tarzan reel-to-victim variant' — aiment is set on any latch in Base; the port just never makes the hook a MOVETYPE_FOLLOW entity. Fix belongs in Hook.cs (the weapon), not the mutator. Drain becomes reachable the moment the port latches onto a player and sets Aiment."

