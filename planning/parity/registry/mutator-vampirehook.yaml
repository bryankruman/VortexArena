      - { kind: code, ref: "RealOwner => Owner (DamageEntityState.cs:135) and Hook.cs:207 sets hook.Owner=actor, so thehook.RealOwner resolves to the firer correctly", result: pass }
      - { kind: code, ref: "Hook.cs GrapplingHookTouch never sets Aiment -> aiment always null -> VampireHookMutator.cs:88 returns early every call", result: fail }
      - { kind: code, ref: "GrappleHookThink.Call live at Hook.cs:258 (per-think, NextThink=time); MutatorActivation.Apply activates the mutator (GameWorld.cs:511)", result: pass }
      - { kind: value, ref: "cvar defaults vs mutators.cfg:425-429 (damage 2, damagerate 0.2, health_steal 2, teamheal 1); DamageRate field fallback 0.1 != Base 0.2", result: fail }
    confidence: high
    notes: "The single behavior of the mutator. Faithful translation gated dead by the missing hooked-player aiment (latch.aiment_follow). last_dmg debounce keyed per-hook via ConditionalWeakTable. Fix is upstream in the grapple weapon, plus the warmup-gate condition."

  - id: mutator-vampirehook.drain.heal_indirection
    name: "Heal via event_heal/PlayerHeal vs direct GiveResourceWithLimit"
