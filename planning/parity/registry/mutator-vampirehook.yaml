    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEAD BODY on a live chain: GrappleHookThink.Call IS dispatched every think (Hook.cs:258) and the mutator IS activated, but because the port grapple never sets the hook's Aiment (see mutator-vampirehook.latch.aiment_follow), the `owner is null || aiment is null` guard (VampireHookMutator.cs:88) always short-circuits. The drain/heal/self-drain never runs in any normal match. The handler body itself is a faithful translation."
      - "Entry gate `time < game_starttime` (block during pre-match warmup/countdown) was replaced with `VehicleCommon.GameStopped` (sv_vampirehook.qc:17 vs VampireHookMutator.cs:84). GameStopped is end-of-match/intermission; there is no game_starttime/warmup-start concept in the port. Conditions differ: the port would let the drain run during warmup and blocks it at match end. Not flagged intentional; reads as a mistranslation."
      - "Damage attribution: Base passes `WEP_HOOK.m_id, DMG_NOWEP` (hook weapon id but flagged no-weapon) (sv_vampirehook.qc:30); port passes DeathTypes.FromWeapon(\"hook\") only (VampireHookMutator.cs:107) — the DMG_NOWEP flag is not modeled, so a drain kill would be attributed as a normal hook-weapon kill rather than weaponless. Minor death-message/stats nuance."
      - "DamageRate field fallback is 0.1 but Base default is 0.2; only surfaces if g_vampirehook_damagerate is 0/unset (Hook() at line 64 only overwrites when the cvar is non-zero), so faithful with the stock cfg loaded."
    verification:
