unit: mutator-vampirehook
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 5
  worst_gaps:
    - "Entry gate `time < game_starttime` (block during pre-match warmup/countdown) is STILL replaced with `VehicleCommon.GameStopped` (block at match end/intermission). Different conditions; no warmup-start concept exists in the port, so warmup behavior diverges (drain runs during warmup; is blocked at match end). Not flagged intentional — a mistranslation."
    - "Damage attribution drops the DMG_NOWEP flag: Base passes `WEP_HOOK.m_id, DMG_NOWEP` (hook id but flagged no-weapon); port passes `DeathTypes.FromWeapon(\"hook\")` only — a drain kill is attributed as a normal hook-weapon kill, not weaponless. Minor death-message/stats nuance."
    - "Heal() substituted by raw GiveResourceWithLimit, skipping Heal's game_stopped/spectator/FROZEN/IS_DEAD guards and PlayerHeal's `health <= 0` dead-target floor (Base no-ops on a dead target; port would heal it)."
    - "hitsound_damage_dealt accumulator still not carried, so a vampire-hook tick gives the owner no hit-confirm ding (presentation; intended-divergence)."
    - "DamageRate field fallback is 0.1 but Base default g_vampirehook_damagerate is 0.2 (only surfaces if the cvar is 0/unset; Hook() overwrites it from the stock cfg)."
