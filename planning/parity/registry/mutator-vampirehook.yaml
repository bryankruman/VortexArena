unit: mutator-vampirehook
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 5
  worst_gaps:
    - "Entire effect is INERT: the port's GrapplingHookTouch (Hook.cs:234) never makes the latched hook FOLLOW its toucher — it has no SetMovetypeFollow equivalent and never sets the hook's Aiment. Base's GrapplingHookTouch->SetMovetypeFollow(this, toucher) sets .aiment to ANY toucher (player included) on EVERY latch, unconditional of g_grappling_hook_tarzan. So a direct hook hit on an enemy would drain in Base; in the port aiment is always null and the drain handler's `aiment is null` guard short-circuits every call."
    - "Entry gate `time < game_starttime` (block during pre-match warmup/countdown) was replaced with `VehicleCommon.GameStopped` (block at match end/intermission). Different conditions; no warmup-start concept exists in the port, so warmup behavior diverges. Not flagged as intentional — reads as a mistranslation."
    - "hitsound_damage_dealt accumulator not carried, so a vampire-hook tick gives the owner no hit-confirm ding (presentation)."
    - "Heal() substituted by raw GiveResourceWithLimit, skipping Heal's game_stopped/spectator/FROZEN/IS_DEAD guards and PlayerHeal's `health <= 0` dead-target floor (Base no-ops on a dead target; port would heal it)."
    - "DamageRate field fallback is 0.1 but Base default g_vampirehook_damagerate is 0.2 (only surfaces if the cvar is 0/unset; Hook() overwrites it from the stock cfg)."
