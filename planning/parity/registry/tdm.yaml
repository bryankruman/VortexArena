    gaps:
      - "Stock TDM never ends on a frag limit: the shipped g_tdm_point_limit -1 is returned literally by Tdm.PointLimit, and UpdateLeaderAndCheckLimit only ends the match when pointLimit > 0, so the limit branch never fires; the match ends only on the timelimit. Base treats -1 as 'use the mapinfo/gametype default' (GameRules_limit_score skips cvar_set when limit < 0), leaving fraglimit at 50. The DefaultPointLimit=50 fallback in PointLimit is dead because the cvar IS set (to -1)."
      - "Setting g_tdm_point_limit 50 (or fraglimit 50) directly makes the port end correctly, so the limit-check LOGIC is sound; only the -1 'use mapinfo' resolution is missing."
    verification:
      - { kind: code_read, ref: "Tdm.PointLimit returns the cvar literally (-1); UpdateLeaderAndCheckLimit guards pointLimit>0; GameRules_limit_score (sv_rules.qc:24 'if (limit<0) return') keeps mapinfo 50", result: fail }
    confidence: high
    notes: "Per-frame check runs live (DriveGametypeFrame:1617 + on-death). The defect is the unhandled -1 sentinel, not the comparison."

