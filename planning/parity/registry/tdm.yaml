summary:
  feature_count: 13
  worst_gaps:
    - "per-player SP_SCORE never credited in TDM: every player's scoreboard Score column reads 0 (team total is correct). VERIFIED: Tdm.cs has no ScoreFrags write (unlike Deathmatch/Ctf/CA), and Scores.cs/GameWorld.cs comments wrongly assert 'TDM writes ScoreFrags'."
    - "shipped g_tdm_point_limit -1 is read literally, so no frag limit ever fires (Base GameRules_limit_score returns on limit<0, leaving mapinfo pointlimit 50); stock TDM ends only on timelimit"
    - "no per-gametype default-limit string applied: effective timelimit is the generic 20 min, not TDM's 15 (Tdm.OnInit is a no-op, no boot-time seeding)"
    - "remaining-frags team announcer (ANNCE_REMAINING_FRAG_1/2/3) never fires"
