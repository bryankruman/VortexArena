    gaps:
      - "Every TDM player's scoreboard Score column reads 0: Tdm.OnDeath only adds to the team total (AddTeamScore) and never credits attacker.ScoreFrags, while Scores.Obituary runs ownsScore:false and skips SP_SCORE. Base routes each frag through PlayerTeamScore_Add, which writes BOTH the player's SP_SCORE and the team's ST_SCORE. Contrast Deathmatch.cs:152 / Ctf.cs:870 / ClanArena.cs:256, which DO credit attacker.ScoreFrags."
