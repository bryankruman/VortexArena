# NOTE on scope boundaries: registry/scoring.yaml row `scoring.report.playerstats` owns the
# GameReport PIPELINE verdict (Init/Finalize/GameReport call order from GameWorld); this unit owns
# the finer-grained truth underneath it — the event FEEDS, consent gating, the V9 payload field set,
# the HTTP/URI layer, and the client-side profile/skill fetches. registry/sv-world-rules.yaml row
# `sv-world-rules.entity.pingplreport` owns the LATENCY_THINKRATE=10s latency accumulation feed
# (CS(p).latency_sum/latency_cnt) that this unit's avglatency row consumes.
# Base file note: the prompt's "server/playerstats.qc" does not exist at this rev — playerstats
# lives at common/playerstats.qc/.qh (SVQC+MENUQC sections in one file).
summary:
  feature_count: 11
  worst_gaps:
    - "No HTTP submission layer exists: PlayerStats.GameReport builds the V9 report body but BOTH live call sites (GameWorld.cs:4067 end-of-match, :1823 shutdown) discard the returned string — nothing is ever sent to XonStat. Worse than 'off by default': the live boot execs the shipped xonotic-server.cfg (GameWorld.cs:472 dedicated / MenuState.cs:106 listen), whose line 636 sets g_playerstats_gamereport_uri to the Base default https://stats.xonotic.org/stats/submit — so stats accumulation runs and a full report is built then silently discarded EVERY match (the Cvars.cs:431 '' fallback is only reached with no assets mounted, i.e. bare tests)."
    - "Most report events are registered but NEVER FED: kills-<victimid>, achievement-* (kill sprees, firstblood/firstvictim, botlike), total-<label> / scoreboard-<label> score columns, team Q sections (EventTeam has zero callers) and acc-* accuracy are all permanently absent from the report — AccuracyProvider / ScoreColumnsProvider / PingProvider are declared on PlayerStats but never wired in GameWorld (only 6 of 9 providers wired at GameWorld.cs:1250-1255)."
    - "Privacy consent is ignored on the server: AddPlayer keys the report to the crypto UID without Base's cvar_cl_allow_uidtracking==1 gate, _netname is written without the cl_allow_uid2name==1 gate, and the 'r' (cl_allow_uidranking) line is never emitted — the menu checkboxes exist and the server CAN read replicated client cvars (race records do), but PlayerStats never asks."
    - "The XonStat player-skill fetch (PlayerStats_PlayerBasic: JSON mu/sigma -> SP_SKILL, feeding g_balance_teams_skill team balance and sv_showskill) is missing — the SKILL scoreboard column is registered in GameScores but never fed."
    - "The menu profile/rankings fetch (PlayerStats_PlayerDetail) is missing — 'menu_cmd playerstats_update' is logged inert, the Profile dialog stats list is an honest placeholder; and the V9 payload itself lacks the R/I/C/U/RP/L/r lines, G is always blank (reads a never-set cvar), D is absolute sim time instead of time-game_starttime."
