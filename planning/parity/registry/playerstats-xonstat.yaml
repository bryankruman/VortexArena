      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "There is no upload at all: PlayerStats.GameReport RETURNS the V9 body 'so a host that DOES implement upload can send it' (PlayerStats.cs:293) — but both live callers (GameWorld.cs:4067, :1823) invoke it as a statement and discard the string. No HttpClient/POST code exists anywhere in src/ or game/ for stats (grep urllib/HttpClient/WebRequest)."
      - "This is the DEFAULT live behavior, not an opt-in: the shipped xonotic-server.cfg:636 (exec'd at boot) sets the uri to the Base XonStat URL, so PlayerStats.Enabled is true out of the box — every match accumulates, builds the report, and silently drops it (no log). The response-handling states (CANREAD debug echo, CLOSED success, ERROR 'Player stats writing failed') have no counterpart."
