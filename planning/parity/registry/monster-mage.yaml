      - { name: "self_heal_eligibility", base: "monster branch: RES_HEALTH < max_health (ALL skins)", port: "skin==0 && health < regenstable(100) only", match: false }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: missing
      audio: partial
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Self-heal eligibility is WRONG. In Base, M_Mage_Defend_Heal_Check(this, this=self) falls through the !IS_PLAYER branch (a mage is a monster) and returns IS_MONSTER && RES_HEALTH < max_health — so the mage self-heals (toward max 400) on EVERY skin. The port's HealCheck:252-256 special-cases targ==self to return only `skin==0 && health < regenstable(100)`, so a skin 1 or skin 2 mage never self-heals at all, and a skin 0 mage stops self-healing above 100 HP (vs Base's 400). The healed AMOUNT (GiveResourceWithLimit Health 20 toward MaxHealth in the non-client branch) is correct; only the trigger gate diverges."
      - "Send_Effect(EFFECT_HEALING / AMMO_REGEN / ARMOR_REPAIR) particles per skin not emitted."
      - "Port plays monsters/mage_heal.wav (Voice) on heal; QC plays no dedicated heal sound."
      - "Waypoint-sprite health update for healed ally monsters (WaypointSprite_UpdateHealth) not invoked in the port."
    verification:
      - { kind: code, ref: "HealPulse skin switch (player branch) + non-client branch GiveResourceWithLimit(Health,20,MaxHealth) vs M_Mage_Defend_Heal", result: pass }
      - { kind: code, ref: "HealCheck:252-256 self special-case vs M_Mage_Defend_Heal_Check:103-104 monster branch", result: fail }
    confidence: high
    notes: "Player skin 0 health / 1 ammo / 2 armor branches and the per-resource caps match Base. Non-player ally heal toward MaxHealth matches. The self-heal divergence is in the eligibility check (HealCheck), not the heal magnitude."

