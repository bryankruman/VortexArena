summary:
  feature_count: 13
  audit_note: "Re-audited post-Wave-5 (HEAD 023ba70). CORRECTION to the prior audit: it claimed Machinegun.cs/WeaponFiring.cs/BotBrain.cs were byte-identical to 2eea096 and untouched by Wave-5 — that is FALSE. git diff 2eea096..HEAD shows Wave-5 substantially edited all three (Machinegun.cs +93/-... , WeaponFiring.cs, BotBrain.cs). The edits are real, wired, and verified live. THREE baseline gaps are now genuinely closed: (1) the bot wr_aim distance switch is implemented + live (BotWantsSecondary override + BotBrain ButtonAttack2 routing); (2) both firemode.dispatch gaps (mode-0 `first` re-check + secondary-as-zoom) are closed; (3) the mode-0 held-fire W_MachineGun_Attack_Frame loop is now modeled. Two rows remain open: the EFFECT_BULLET tracer is still not passed by the MG (verified — Base passes it on all 4 fireBullet calls, port's FireOne passes none), and the SNIPE obituary is still only reachable via the (default-dead) mode-0 secondary. No regressions."
  worst_gaps:
    - "EFFECT_BULLET tracer trail STILL not drawn for the MachineGun: FireBullet has the tracerEffect param (Wave-1) and BULLET is registered (EffectsList.cs:230 -> tr_bullet, isTrail), but Machinegun.FireOne (Machinegun.cs:367) calls FireBullet WITHOUT a tracerEffect, so the MG bullet tracer is absent. Base passes EFFECT_BULLET on every MG fireBullet call (machinegun.qc:86/101/194/244)."
    - "SNIPE obituary only reachable via the non-default mode-0 secondary: g_balance_machinegun_mode defaults to 1, so AttackSingle/AttackFrame/the snipe path are dead on the live path. Faithful to Base (xonotic balance is also mode 1), but means MURDER_SNIPE never fires in stock play in either Base or port."
    - "Ballistics ruleset cvars hardcoded: g_ballistics_solidpenetration_exponent and g_ballistics_mindistance are const (1,1) in FireBullet, not live cvars — matches default but won't follow a retuned ruleset."
