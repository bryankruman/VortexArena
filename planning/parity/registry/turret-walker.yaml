    - "Rocket up-and-over loop maneuver still unported (Base: 1% chance on LAUNCH and 1% per in-flight think to enter loop->loop2->loop3); port rockets only ever steer straight-pull, plus no te_explosion launch flash and no tag_rocket01/02 alternation."
