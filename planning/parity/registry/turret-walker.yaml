unit: turret-walker
category: turret
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 12
  worst_gaps:
    - "Locomotion collapses 12 gaits to walk/run/idle/melee: no idle roam/wander, no last-seen pursuit, no waypoint path-following (walker_move_path/findtarget/turret_checkpoint), no swim/jump/strafe/turn/pain gaits — an idle walker brakes in place instead of wandering/patrolling"
    - "Body-yaw turn rate is framerate-scaled (port: turny*frameTime) vs Base per-frame raw degrees (turny applied each think, nextthink=time): at ~60fps the port body turns ~60x slower than Base, so a chasing walker barely faces its heading"
    - "No head entity (walker_head_minigun.md3): the minigun head never visibly tracks/spins; track_type FluidInertia(3) vs Base STEPMOTOR(1)"
    - "Rocket launch sound wrong: plays weapons/rocket_fire.wav vs Base SND_TUR_WALKER_FIRE = hagar_fire"
    - "Lead-aim shot speed 34920 vs Base shot_speed 18000 (aim lead overshoots)"
    - "No walk/run/melee animation frames (turrets_setframe + TNSF_MOVE) and no CSQC walker_draw (ground-align, head spin, low-hp te_spark)"
    - "No rocket te_explosion launch flash and no walker_rocket_loop up-and-over maneuver (1% chance on launch AND 1% per in-flight think)"
    - "No minigun EFFECT_BLASTER_MUZZLEFLASH / EFFECT_BULLET tracer"
