unit: sv-anticheat
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"
summary:
  feature_count: 15
  worst_gaps:
    - "AntiCheat.PingProvider STILL hardcoded 0f (GameWorld.cs:997): the snap-aim suppression window after a forced view change is always 0.2s instead of min(0.4,ping*0.001)+0.2. No net host overrides it (PlayerStats.PingProvider is also default 0 — the port has no server-side real ping wired anywhere), so this only bites laggy remote clients on a dedicated host; listen-server/bot ping is 0 anyway."
    - "ReportToPlayerStats still not behaviorally observed end-to-end: no playerstats round-trip test exercises the anticheat rows, only that the feed is wired (GameWorld.cs:1032, FinalizePlayer)."
features:
  - id: sv-anticheat.core.power_mean
    name: "Power-mean accumulator (MEAN_DECLARE/accumulate/evaluate)"
    layer: [authority]
    base_refs:
      - "lib/math.qh:mean_accumulate"
      - "lib/math.qh:mean_evaluate"
    port_refs:
      - "src/XonoticGodot.Server/AntiCheat.cs:Mean"
    constants:
      - { name: "geometric_branch (m==0): acc*=value**weight, acc0=1", base: "yes", port: "yes", match: true }
      - { name: "additive_branch (m!=0): acc+=value**m*weight, acc0=0", base: "yes", port: "yes", match: true }
      - { name: "evaluate: m==0 -> acc**(1/count), else (acc/count)**(1/m); count==0 -> 0", base: "yes", port: "yes", match: true }
      - { name: "internal precision", base: "float", port: "double", match: false }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Mean uses double internally vs QC float; verdicts are threshold-coarse so precision is immaterial. Deliberate."
    gaps: []
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/ServerInfraTests.cs:AntiCheat_Mean_PowerMean", result: pass }
      - { kind: code, ref: "AntiCheat.cs:25-39 matches lib/math.qh mean_accumulate/mean_evaluate bodies branch-for-branch (re-verified 2026-06-25; unchanged)", result: pass }
    confidence: high
    notes: "Exponents 1/2/3/4/5/7/10 all match; every anticheat statistic is non-zero exponent so the additive path is live."

