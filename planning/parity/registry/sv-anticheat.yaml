  - id: sv-anticheat.frame.fixangle_window
    name: "Snap-aim suppression window after a forced view change"
    layer: [authority]
    base_refs:
      - "server/anticheat.qc:anticheat_fixangle"
      - "server/anticheat.qc:anticheat_endframe"
      - "common/mapobjects/teleporters.qc:310"
    port_refs:
      - "src/XonoticGodot.Server/AntiCheat.cs:FixAngle"
      - "src/XonoticGodot.Server/AntiCheat.cs:EndFrame"
      - "src/XonoticGodot.Server/GameWorld.cs:1214"
      - "src/XonoticGodot.Server/GameWorld.cs:1004"
      - "src/XonoticGodot.Common/Gameplay/MapObjects/Teleporters.cs:396"
    constants:
      - { name: "fixangle_endtime = servertime + ANTILAG_LATENCY + 0.2 (formula)", base: "min(0.4,ping*0.001)+0.2", port: "min(0.4,ping*0.001)+0.2", match: true }
      - { name: "applied on spawn (PutPlayerInServer)", base: "yes", port: "yes (GameWorld.cs:1214, InfraClientSpawn)", match: true }
      - { name: "applied on teleport (teleporters.qc:310)", base: "yes", port: "yes (Teleporters.cs:396 OnPlayerFixAngle -> GameWorld.cs:1004 wires AntiCheat.FixAngle for non-bots)", match: true }
      - { name: "applied via endframe FOREACH_CLIENT(it.fixangle)", base: "yes (world.qc:2505 -> anticheat_endframe)", port: "intended divergence: the two server-side .fixangle sources (spawn + teleport) call FixAngle directly at their call site (exactly as Base calls anticheat_fixangle straight from teleporters.qc); the networked Player.FixAngle flag has no server-side per-frame reset, so EndFrame(GameWorld.cs:1798) passes no fixAngleClients by design", match: false }
      - { name: "ping fed to window", base: "real per-client ping", port: "AntiCheat.PingProvider STILL hardcoded 0f (GameWorld.cs:997); no net host override", match: false }
    status:
      logic: faithful
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "The Base EndFrame FOREACH_CLIENT(.fixangle) catch-all is intentionally not propagated: the port's only two server-side forced-view sources — respawn (InfraClientSpawn -> FixAngle, GameWorld.cs:1214) and teleport (Teleporters.OnPlayerFixAngle -> FixAngle, GameWorld.cs:1004) — both open the window directly at their call site, exactly as Base calls anticheat_fixangle straight from teleporters.qc. The networked Player.FixAngle flag has no server-side per-frame reset in the port (the client predictor/listen host own it), so feeding it through EndFrame would perpetually re-arm the window. Passing no fixAngleClients is the correct port design."
    gaps:
      - "STILL OPEN (values only): AntiCheat.PingProvider hardcoded to 0 (GameWorld.cs:997: AntiCheat.PingProvider = _ => 0f) and no net host overrides it, so the suppression window is always 0.2s instead of min(0.4,ping*0.001)+0.2 — too short for laggy remote clients on a dedicated host. Consistent with the rest of the port (PlayerStats.PingProvider is also default 0; there is no server-side real-ping source wired anywhere), and listen-server/bot ping is 0 regardless, so this only bites remote clients on a dedicated host."
    verification:
      - { kind: code, ref: "FixAngle formula AntiCheat.cs:168-169 matches anticheat.qc:246 + ANTILAG_LATENCY (re-verified 2026-06-25)", result: pass }
      - { kind: code, ref: "FIXED (Wave 6a/6b): teleport path now opens the window — Teleporters.cs:396 OnPlayerFixAngle?.Invoke(player) on the live WarpZone_PostTeleportPlayer path, wired to AntiCheat.FixAngle for non-bots at GameWorld.cs:1004-1008", result: pass }
      - { kind: code, ref: "GameWorld.cs:997 PingProvider=0f, no net override (grep 2026-06-25); window width too short for laggy remote clients", result: fail }
    confidence: high
    notes: "FIXED since the 2026-06-22 baseline: spawn + teleport both open the window now (the teleporter wiring gap is closed), and the EndFrame FOREACH_CLIENT propagation is reclassified as an intended divergence (direct call-site, matching Base teleporters.qc). The only residual is the ping-scaled window WIDTH (PingProvider=0) — a values gap, not a logic/liveness gap."

