  feature_count: 15
  worst_gaps:
    - "div0_evade reseed STILL broken: AntiCheat.PreThink (zeroes evade_offset every PlayerPreThink) still has zero callers post-Wave-5 — OnClientMove fires MutatorHooks.PlayerPreThink but never AntiCheat.PreThink, so the evade detector never re-arms per frame and reads differently from Base."
