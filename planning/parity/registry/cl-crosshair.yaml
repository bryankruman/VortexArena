last_audited: "2026-06-28"  # OPUS re-verify of the wepent-rings wave: confirmed the full networked path end-to-end (ServerNet.WriteOwnerState:2818 ResolveOwnerWeaponRings -> OwnerWeaponRings.Write:2831; ClientNet.HandleSnapshot:1055 OwnerWeaponRings.Read -> LocalWeaponRings; NetGame.UpdateCrosshairWeaponRings:3301 called UNCONDITIONALLY at 2691 + UpdateCrosshairFeedback:3180 at 2698) plus the spectatee WepentView branch (NetGame:3313, TryGetRemoteState). All five ring rows + hit-indication + nade/revive objring stay liveness:live (host + pure-remote + spectatee). Still-dead claims re-confirmed: CAPTURE_PROGRESS hardcoded 0 (NetGame:3192, ServerNet:2100 no producer); pickup pulse host-only (UpdatePickupFeed:3235 reads LocalServerPlayer only). No status changes this pass -- the prior 2026-06-27 scoring is accurate. ORIGINAL 2026-06-27 note: W17 added UpdateCrosshairFeedback (NetGame:3163, live at 2681) which reads the networked own-entity slice ClientNet.LocalState -> the NADE_TIMER + REVIVE_PROGRESS objective rings AND the hit-indication flash now also work on a PURE REMOTE client (not just the listen host). hit_indication liveness UPGRADED partial->live; objring nade/revive remote read-back CLOSED (capture still dead). FIX (post-W17, wepent-rings): the weapon-stat rings (vortex charge/chargepool, clip/ammo, Hagar, Mine Layer, Arc heat) are now networked on the owner block (ServerNet.ResolveOwnerWeaponRings -> OwnerWeaponRings.Write; ClientNet reads via OwnerWeaponRings.Read -> LocalWeaponRings; UpdateCrosshairWeaponRings feeds them on a pure remote client) so all three ring rows go liveness partial->live. This ALSO fixed a latent desync: W16 (b3a9c06) added the WriteOwnerState ring tail but no matching client read, so the 9 unread floats corrupted every owner-block-following section for a real remote client; the shared OwnerWeaponRings struct + OwnerWeaponRingsTests now guard the layout. Only the pickup pulse remains host-only (no networked LAST_PICKUP).
summary:
  feature_count: 18
  worst_gaps:
    - "The pickup pulse is fed ONLY on the host/listen-server path: UpdatePickupFeed (NetGame:3214) reads only LocalServerPlayer (3218), so a PURE REMOTE client gets no pickup bump — there is no networked STAT(LAST_PICKUP) in the LocalState slice. (The weapon-stat rings, by contrast, ARE now networked — see the wepent-rings FIX in last_audited and the three cl-crosshair.ring.* rows — and the nade/revive/hit FEEDBACK fields were wired remote in W17 via UpdateCrosshairFeedback.)"
    - "CAPTURE_PROGRESS objective ring is still fully DEAD end-to-end: no producer assigns Player.CaptureProgress, ServerNet.cs:2100 leaves NetEntityState.CaptureProgress at 0 (commented), the host feed hardcodes x.CaptureProgress=0 (NetGame:3175), and the remote read (ls.CaptureProgress, NetGame:3189) is always 0. Only test-side use (ClientFeedbackTests.cs:275). NADE_TIMER + REVIVE_PROGRESS, by contrast, are now fed on BOTH host and remote (W17 LocalState read-back)."
    - "No third-person chase crosshair (crosshair_chase / _chase_playeralpha): crosshair always drawn at the panel centre, never traced from the player org, body alpha never faded. crosshair_chase/_playeralpha ARE now registered in RegisterDefaults (CrosshairPanel.cs:324-325) but have NO reader (inert cvars). UNCHANGED this pass."
    - "Per-weapon crosshair pic is still partial: PerWeaponNumber dict is never populated, so every weapon shows the same `crosshair` number; crosshair_2d (registered at 323 but no reader) and the vehicle crosshair are absent; color_special 3 (rainbow) not ported. UNCHANGED this pass."
    - "Objective rings drawn centred on the crosshair panel (radius 64px) rather than Base's `0.5*conwidth, 0.6*conheight` screen anchor with `0.1*conheight` radius; nade-timer text label (cl_nade_timer 2) not drawn. UNCHANGED this pass."
    - "crosshair_hittest_showimpact (Base crosshair.qc:320-321: keep the crosshair drawn at the reprojected impact point) is registered (CrosshairPanel.cs:352) but never read — the panel always draws at the geometric centre. Minor debug cvar."
