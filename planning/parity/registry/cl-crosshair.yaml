summary:
  feature_count: 17
  worst_gaps:
    - "All five weapon-stat rings + the pickup pulse are now fed, but ONLY on the host/listen-server path: UpdateCrosshairWeaponRings / UpdatePickupFeed / the HitFlash+NadeTimer+ReviveProgress feeds all read LocalServerPlayer and the ring/hit/nade feeds sit inside `if (_server is not null)` (NetGame.cs:2260-2303, 2826). A PURE REMOTE client still gets no charge/clip/heat/load ring, no pickup bump, no hit flash, no nade/thaw ring — the networked wepent/stat fields are not read back into the panel client-side."
    - "CAPTURE_PROGRESS objective ring is still DEAD: nothing assigns CrosshairPanel.CaptureProgress on any path (grep finds only test-side assignments). REVIVE_PROGRESS is now fed on the host (NetGame:2294) but, like NadeTimer, only host-side — the networked NetEntityState.ReviveProgress is never read into the panel for a remote client."
    - "No third-person chase crosshair (crosshair_chase / _chase_playeralpha): crosshair always drawn at the panel centre, never traced from the player org, body alpha never faded. crosshair_chase/_playeralpha are NOT EVEN REGISTERED in the port (no reader, no cvar). UNCHANGED this pass."
    - "Per-weapon crosshair pic is still partial: PerWeaponNumber dict is never populated, so every weapon shows the same `crosshair` number; crosshair_2d (not registered) and the vehicle crosshair are absent; color_special 3 (rainbow) not ported. UNCHANGED this pass."
    - "Teammate-shrink divisor diverges at default cvars: port divides scale by HitTestTeammateShrink (1.25 = shrink) where Base `/= crosshair_hittest` divides by 1 (NO shrink). UNCHANGED this pass."
    - "Objective rings drawn centred on the crosshair panel (radius 64px) rather than Base's `0.5*conwidth, 0.6*conheight` screen anchor with `0.1*conheight` radius; nade-timer text label (cl_nade_timer 2) not drawn. UNCHANGED this pass."
