    notes: "WAVE-5 FIX (dead->live, values missing->faithful): the entcs_GetAlpha factor is now applied AND the producer chain is real — ServerNet quantizes the gameplay player.Alpha (Cloaked/RunningGuns/Invisibility/Buffs-invisible/Nade-veil) into the networked NetEntityState.Alpha, so a fading/cloaked model's enemy/self tag now fades with the model. QC f==0->1 maps to the port's 'Alpha==0 means opaque (never networked)' wire convention; <0 sentinel sends 0 (opaque) on the wire, matching QC's '<0 -> 0' only for the model-hidden RunningGuns case (negative gameplay alpha quantizes to 0=opaque, a minor edge: a fully-hidden model's tag stays opaque rather than vanishing — negligible, RunningGuns hides the model not the tag). Mutator-hook gap remains but is a stock no-op. Not covered by a dedicated unit test (verified by code-read of the live chain)."
