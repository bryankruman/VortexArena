unit: cl-shownames
category: client
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "sameteam is derived client-side from (Colormap & 0xFF)==LocalTeam, not QC's server-gated m_entcs_private; health/armor are read from the always-present remote slice rather than only the private (teammate) slice — an enemy health/armor info-parity divergence (ServerNet streams Health/Armor unconditionally)"
    - "Name is never truncated: QC textShortenToWidth(name, box width) clamps the tag to its drawing area; the port draws the full name centered with no width clamp"
    - "LOS trace is a Fraction>=0.99 heuristic, not the QC trace_networkentity/entnum self-exclusion check (intended divergence — port can't map a remote to a trace-set entnum)"
    - "Chase own-tag (truly-local player) still can't draw: predicted local player is never in ClientNet.RemoteIds — only the spectatee arm of the self branch is live"
    - "Status bar drawn as flat DrawRect rects, not the QC nametag_statusbar skin-image progress bar"
