  - id: cl-shownames.los.traceline
    name: "Line-of-sight occlusion test"
    layer: [presentation]
    base_refs:
      - "client/shownames.qc:Draw_ShowNames"
    port_refs:
      - "game/client/ShowNamesLayer.cs:TraceVisible"
    constants:
      - { name: "trace move type", base: "MOVE_NOMONSTERS", port: "MoveFilter.NoMonsters", match: true }
      - { name: "hit predicate", base: "!(trace_fraction<1 && trace_networkentity!=entnum && trace_ent.entnum!=entnum)", port: "Fraction>=0.99", match: false }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "The port can't map a remote player to a trace-set entnum (the remote isn't a distinct trace edict client-side), so QC's trace_networkentity/trace_ent.entnum self-exclusion is approximated by treating Fraction>=0.99 (essentially reached the target) as clear LOS. Falls back to visible when no trace service is up, matching the radar's degrade-to-shown."
    gaps:
      - "Tag occlusion can flicker when thin geometry (or the target's own client-side collision) sits right at the eye-line, where QC would exclude the player edict and keep the tag."
    verification:
      - { kind: code, ref: "ShowNamesLayer.cs:477-487 (TraceVisible: Trace + Fraction>=0.99); QC Draw_ShowNames:62-63", result: fail }
    confidence: high
    notes: "Teammates skip the trace entirely when crosshairdistance==0 (ShowNamesLayer.cs:184), exactly like QC line 56-58."
