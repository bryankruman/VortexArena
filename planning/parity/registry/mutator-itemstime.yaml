      - "common/mutators/mutator/itemstime/itemstime.qc:ClientConnect"
      - "common/mutators/mutator/itemstime/itemstime.qc:reset_map_global"
    port_refs: []
    constants:
      - { name: "send_gate", base: "warmup_stage || !IS_PLAYER(it) || sv_itemstime==2", port: "none (single local view)", match: false }
    status:
      logic: missing
      values: missing
      timing: na
      presentation: na
      audio: na
      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "The per-client send gate (only spectators/warmup get times in a live round unless sv_itemstime==2 via SetTimesForAllPlayers), and the MakePlayerObserver / PlayerSpawn / ClientConnect / reset_map_global sync+reset hooks (SetTimesForPlayer / ResetTimesForPlayer / ResetTimes) are not implemented. There is no per-player networked itemstime state in the port."
    verification:
      - { kind: code, ref: "ItemstimeMutator hooks only MutatorHooks.SvStartFrame (Hook()); no observer/spawn/connect/reset_map_global hooks", result: fail }
    confidence: high
    notes: "Folded away by the single-view + host-only feed. The observable consequence (always-visible to alive players) is realized via the enable-gate feature below. Note the port also lacks Item_ItemsTime_ResetTimes / SetTimesForPlayer (the per-client reset/full-sync primitives)."

  - id: mutator-itemstime.hud.enable_gate
    name: "Panel enable gate (spectator/warmup/STAT(ITEMSTIME) visibility)"
    layer: [presentation]
    base_refs:
      - "common/mutators/mutator/itemstime/itemstime.qc:HUD_ItemsTime"
      - "common/stats.qh:138"
    port_refs:
      - "game/hud/ItemsTimePanel.cs:DrawPanel"
      - "game/net/NetGame.cs:2090"
    constants:
      - { name: "hud_panel_itemstime_default", base: "2", port: "2 (_hud_common.cfg analogue)", match: true }
      - { name: "mode1_gate", base: "hud_panel_itemstime==1 && spectatee_status != 0", port: "shows to everyone (no spectatee gate)", match: false }
      - { name: "mode2_gate", base: "hud_panel_itemstime==2 && (spectatee_status!=0 || warmup_stage || STAT(ITEMSTIME)==2)", port: "shows whenever mutator enabled (Visible=true)", match: false }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: partial
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Base draws the panel only for spectators (mode 1) or spectators+warmup+STAT(ITEMSTIME)==2 (mode 2). With stock cvars (hud_panel_itemstime=2, sv_itemstime=1) an ALIVE player in a normal round sees NOTHING. The port's ItemsTimePanel never consults spectatee_status / warmup_stage / STAT(ITEMSTIME), and NetGame.cs:2092 force-sets Visible=true whenever the mutator is enabled, so an alive player sees the panel always - the opposite of Base."
    verification:
      - { kind: code, ref: "ItemsTimePanel has no ResolveVisible override and no spectatee/warmup/ITEMSTIME read (grep: only a doc-comment mention); NetGame.cs:2092 Visible=true", result: fail }
    confidence: high
    notes: "The panel enable DEFAULT value (2) and the layout/behavior cvars are faithful; only the dynamic gate (who/when) diverges. The spectatee/warmup/STAT(ITEMSTIME) context is never available to the panel because STAT(ITEMSTIME) is not modeled (see net.itemstime_stat)."

