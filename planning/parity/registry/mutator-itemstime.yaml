unit: mutator-itemstime
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "No CSQC itemstime net message: the HUD feed is host-only (NetGame.cs:2068 guards it with `if (_server is not null)`); a pure remote client on a dedicated/separate server never receives item respawn times and the panel stays empty."
    - "Enable-gate inverted: Base HUD_ItemsTime shows only to spectators (mode 1) or spectators+warmup+STAT(ITEMSTIME)==2 (mode 2), so an ALIVE player in a normal round sees nothing with stock cvars; the port's ItemsTimePanel never consults spectatee/warmup and NetGame.cs:2092 force-sets Visible=true whenever the mutator is enabled."
    - "STAT(ITEMSTIME) (= live sv_itemstime value) is not modeled in the port: no client stat carries the 0/1/2 tier, which is why both the enable-gate and the spectator waypoint gate cannot be reproduced."
    - "Per-player send tiers + observer/spawn/connect sync hooks (SetTimesForAllPlayers warmup/observer/sv_itemstime==2 gate, ResetTimesForPlayer, MakePlayerObserver/PlayerSpawn/ClientConnect) are not implemented (single local host view, no per-client networked state)."
    - "Spectator/warmup respawn waypoint sprites for timed items (g_waypointsprite_itemstime default 2, SPRITERULE_SPECTATOR) are not implemented."
