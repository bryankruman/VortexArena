    port_refs:
      - "game/net/NetProtocol.cs:NetControl.ItemsTime"
      - "game/net/ServerNet.cs:SendItemsTime"
      - "game/net/ClientNet.cs:HandleItemsTime"
    constants:
      - { name: "wire_format", base: "WriteHeader(itemstime) + WriteByte(id) + WriteFloat(time), MSG_ONE per real client", port: "WriteByte(NetControl.ItemsTime) + WriteByte(tier) + WriteByte(count) + (WriteString(key)+WriteFloat(time)) per item, reliable per-peer", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base writes one IT_Write per (item-id, float) keyed by the CSQC item registry id; the port batches the whole table into a single reliable NetControl.ItemsTime message keyed by the HUD panel's item NAMES (plus a leading STAT(ITEMSTIME) tier byte), and dedups per-peer (resent only when that peer's resolved view changes) instead of Base's STATIC_INIT-seeded + per-event IT_Write stream. The delivered per-peer table content is equivalent."
    gaps: []
    verification:
      - { kind: code, ref: "game/net/ServerNet.cs:SendItemsTime — writes tier + per-item (name,float) with the SetTimesForAllPlayers send gate (warmup||IsObserver||tier==2), per-peer dedup key, reliable; called every server tick from the Send loop (ServerNet.cs:489)", result: pass }
      - { kind: code, ref: "game/net/ClientNet.cs:HandleItemsTime — decodes tier + table into ItemsTimeTier / ItemTimes / HasItemsTime; dispatched via NetControl.ItemsTime case (ClientNet.cs:531)", result: pass }
      - { kind: code, ref: "game/net/NetGame.cs:2500-2515 remote-client feed (`else if (_client.HasItemsTime)`) wires ItemTimes/ItemsTimeTier into ItemsTimePanel via ShouldDraw", result: pass }
    confidence: high
    notes: "FIXED since the 2026-06-25 baseline (Wave 7/8). Was logic/values/timing/presentation=missing, liveness=dead with empty port_refs. The CSQC itemstime net-temp message is now ported as a batched reliable per-peer push (NetProtocol v10), gated by Base's SetTimesForAllPlayers send rule, decoded on the client and fed to ItemsTimePanel — so a pure remote/dedicated-server client now receives respawn times. The net layer lives under game/net (not src/XonoticGodot.Net, which is why the old grep over that dir showed nothing)."

  - id: mutator-itemstime.producer.per_player_tiers
    name: "Per-player send tiers + observer/spawn/connect sync hooks"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/itemstime/itemstime.qc:Item_ItemsTime_SetTimesForAllPlayers"
      - "common/mutators/mutator/itemstime/itemstime.qc:Item_ItemsTime_ResetTimesForPlayer"
      - "common/mutators/mutator/itemstime/itemstime.qc:MakePlayerObserver"
      - "common/mutators/mutator/itemstime/itemstime.qc:PlayerSpawn"
      - "common/mutators/mutator/itemstime/itemstime.qc:ClientConnect"
      - "common/mutators/mutator/itemstime/itemstime.qc:reset_map_global"
    port_refs:
      - "game/net/ServerNet.cs:SendItemsTime"
    constants:
      - { name: "send_gate", base: "warmup_stage || !IS_PLAYER(it) || sv_itemstime==2", port: "warmup || st.Player.IsObserver || tier == 2", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base implements the per-player send tiers via discrete sync/reset hooks (MakePlayerObserver / PlayerSpawn / ClientConnect / reset_map_global call SetTimesForPlayer / ResetTimesForPlayer / ResetTimes). The port folds all of these into ServerNet.SendItemsTime: it evaluates the SAME send gate (warmup || IsObserver || sv_itemstime==2) for each peer every tick and resends (with per-peer dedup) only when that peer's resolved view flips — so the observable consequence of join/observe/spawn/reset (a gated-out live player gets the reset/-1 table, an observer/warmup player gets the full table) is reproduced without the named hooks. !IS_PLAYER is realized as Player.IsObserver."
    gaps:
      - "The discrete Base hooks (MakePlayerObserver / PlayerSpawn / ClientConnect / reset_map_global) are not present as named mutator-hook handlers; their effect is reproduced by the per-tick per-peer send gate + dedup in ServerNet.SendItemsTime. A gated-out live player receives the reset (-1) table via the dedup-driven resend rather than an explicit ResetTimesForPlayer call — equivalent in delivered state but not a 1:1 hook port."
    verification:
      - { kind: code, ref: "game/net/ServerNet.cs:SendItemsTime — `bool sendFull = warmup || st.Player.IsObserver || tier == 2;` (== QC warmup_stage || !IS_PLAYER || sv_itemstime==2); a gated-out peer is sent -1 for every key (the reset value); per-peer ItemsTimeKey dedup resends only on view change", result: pass }
      - { kind: code, ref: "ItemstimeMutator.Hook() still adds only MutatorHooks.SvStartFrame (no named observer/spawn/connect/reset hooks) — the gating moved into the net send path instead", result: pass }
    confidence: high
    notes: "FIXED since the 2026-06-25 baseline. Was logic/values=missing, liveness=na with empty port_refs. The per-player SERVER send gate (only spectators/warmup get times in a live round unless sv_itemstime==2) is now implemented in ServerNet.SendItemsTime with a faithful gate expression; the join/observe/spawn/reset re-sync semantics are reproduced via the per-peer dedup resend (a peer whose gate flips gets a fresh full or reset table). Modeled as intended_divergence because it consolidates the discrete QC hooks into a per-tick send pass rather than porting each hook."

