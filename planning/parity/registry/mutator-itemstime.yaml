      - "common/mutators/mutator/itemstime/itemstime.qc:Item_ItemsTime_SpectatorOnly"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:TimedItemClasses"
      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:ClassKeyMap"
    constants:
      - { name: "set", base: "powerups + ArmorMega/Big + HealthMega/Big + superweapons slot", port: "health_mega/big, armor_mega/big, strength, shield, superweapons", match: true }
      - { name: "tracks_big_items_serverside", base: "true (SVQC hidebig=false)", port: "true", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:Itemstime_PublishesRespawnTime_ForTimedItem", result: pass }
      - { kind: code, ref: "ItemstimeMutator.TimedItemClasses vs Item_ItemsTime_Allow (powerups Strength/Shield + mega/big H+A)", result: pass }
    confidence: high
    notes: "Set matches Base. Superweapon weapon-pickups map to the single aggregate slot via weapon_<netname> classnames where Weapon.IsSuperWeapon, mirroring WEPSET_SUPERWEAPONS. The Base powerup set is exactly Strength+Shield (the two instanceOfPowerup items), which the port enumerates explicitly."

  - id: mutator-itemstime.producer.times_table
    name: "Server it_times table: min scheduled respawn time per timed item"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/itemstime/itemstime.qc:Item_ItemsTime_SetTime"
      - "common/mutators/mutator/itemstime/itemstime.qc:Item_ItemsTime_UpdateTime"
      - "server/items/items.qc:Item_Respawn"
      - "server/items/items.qc:Item_ScheduleRespawnIn"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:Recompute"
      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:Note"
    constants:
      - { name: "sv_itemstime_default", base: "1", port: "1 (assets/data/.../xonotic-server.cfg:421)", match: true }
      - { name: "available_value_when_all_up", base: "0", port: "0", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base updates it_times event-driven (SetTime/UpdateTime called at each item pickup / respawn-schedule in items.qc). The port instead re-scans all live world items every server frame (OnStartFrame -> Recompute) reading each item's ScheduledRespawnTime. The published value is identical (min cooldown across copies); only the trigger differs. Documented in ItemstimeMutator.cs comments (lines 64-65, 89-93)."
    gaps: []
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:Itemstime_PublishesRespawnTime_ForTimedItem (t=20 on cooldown)", result: pass }
      - { kind: code, ref: "GameWorld.cs:511 MutatorActivation.Apply -> Add -> Hook -> SvStartFrame.Add; GameWorld.cs:943 MutatorHooks.FireStartFrame pumps it every server frame", result: pass }
    confidence: high
    notes: "Reads Entity.ScheduledRespawnTime set by the item respawn scheduler (ItemPickupRules). Verified LIVE: sv_itemstime default 1 -> IsEnabled true -> MutatorActivation.Apply (GameWorld.cs:511) calls Add->Hook, and MutatorHooks.SvStartFrame is fired every server frame (GameWorld.cs:943)."

  - id: mutator-itemstime.producer.available_encoding
    name: "Negative 'another copy available now' encoding"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/itemstime/itemstime.qc:Item_ItemsTime_UpdateTime"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:Recompute"
    constants:
      - { name: "encoding", base: "if isavailable: return -t (negate min cooldown)", port: "avail ? -t : t", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:Itemstime_NegativeEncoding_WhenAnotherCopyAvailable (asserts -30)", result: pass }
    confidence: high
    notes: "When one copy is up and another is on cooldown, the min cooldown time is sent negated; the panel decodes it as 'available now' + a still-running countdown. Test asserts -30 for the two-copy case. hasMin flag correctly distinguishes 'no cooldown copy yet' from min==0 (matches QC's `t == 0 || it.scheduledrespawntime < t` guard)."

  - id: mutator-itemstime.net.csqc_sync
    name: "CSQC itemstime net message (per-client respawn-time sync)"
    layer: [authority, presentation]
    base_refs:
      - "common/mutators/mutator/itemstime/itemstime.qc:IT_Write"
      - "common/mutators/mutator/itemstime/itemstime.qc:NET_HANDLE(itemstime)"
      - "common/mutators/mutator/itemstime/itemstime.qc:REGISTER_NET_TEMP(itemstime)"
    port_refs: []
    constants:
      - { name: "wire_format", base: "WriteHeader(itemstime) + WriteByte(id) + WriteFloat(time), MSG_ONE per real client", port: "none", match: false }
    status:
      logic: missing
      values: missing
      timing: missing
      presentation: missing
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No itemstime net message exists in XonoticGodot.Net (REGISTER_NET_TEMP(itemstime) / IT_Write / NET_HANDLE not ported). Item times are fed directly from the local server mutator to the local HUD in NetGame.cs:2090-2093, guarded by `if (_server is not null)`. A pure remote client (dedicated/separate server) never receives times and the items-time panel stays empty."
    verification:
      - { kind: code, ref: "grep itemstime/ItemsTime across src/XonoticGodot.Net -> no matches", result: fail }
      - { kind: code, ref: "NetGame.cs:2068 host-only guard `if (_server is not null)`", result: fail }
    confidence: high
    notes: "Single-listen-server architecture currently makes this host-only. Whether that is an intended simplification or a true gap is an open question for the owner (see spec Open questions)."

