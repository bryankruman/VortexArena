      - "game/net/ClientNet.cs:ItemsTimeTier"
    constants:
      - { name: "stat", base: "REGISTER_STAT(ITEMSTIME, INT, autocvar_sv_itemstime)", port: "ItemstimeMutator.Tier=(int)sv_itemstime, networked as the leading byte of NetControl.ItemsTime -> ClientNet.ItemsTimeTier", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base registers STAT(ITEMSTIME) as a generic networked player stat (the stat system streams autocvar_sv_itemstime). The port has no generic stat registry; instead the tier is sourced on the server from ItemstimeMutator.Tier (= sv_itemstime) and carried as the leading byte of the dedicated NetControl.ItemsTime message, decoded into ClientNet.ItemsTimeTier. Same value, same liveness, carried on the itemstime channel rather than a general STAT block."
    gaps:
