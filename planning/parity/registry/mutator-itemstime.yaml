      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:ClassKeyMap"
    constants:
      - { name: "set", base: "powerups + ArmorMega/Big + HealthMega/Big + superweapons slot", port: "health_mega/big, armor_mega/big, strength, shield, superweapons", match: true }
      - { name: "tracks_big_items_serverside", base: "true (SVQC hidebig=false)", port: "true", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:Itemstime_PublishesRespawnTime_ForTimedItem", result: pass }
      - { kind: code, ref: "ItemstimeMutator.TimedItemClasses vs Item_ItemsTime_Allow (powerups Strength/Shield + mega/big H+A)", result: pass }
    confidence: high
    notes: "Set matches Base. Superweapon weapon-pickups map to the single aggregate slot via weapon_<netname> classnames where Weapon.IsSuperWeapon, mirroring WEPSET_SUPERWEAPONS. The Base powerup set is exactly Strength+Shield (the two instanceOfPowerup items), which the port enumerates explicitly. Wave 5 left the producer set untouched (the only ItemstimeMutator.cs diff is the new Tier property + doc-comments)."

