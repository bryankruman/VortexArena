      - "game/hud/ItemsTimePanel.cs:GetRowCount"
    constants:
      - { name: "ar", base: "max(2,ratio)+1", port: "Mathf.Max(2,ratio)+1", match: true }
      - { name: "seconds_remaining", base: "floor(item_time - time + 0.999)", port: "FloorToInt(itemTime - now + 0.999)", match: true }
