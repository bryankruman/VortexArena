      - "common/stats.qh:138"
    port_refs:
      - "game/hud/ItemsTimePanel.cs:ShouldDraw"
      - "game/net/NetGame.cs:2286"
    constants:
      - { name: "hud_panel_itemstime_default", base: "2", port: "2 (HudLayoutDefaults itemstime + RegisterCvars)", match: true }
      - { name: "mode1_gate", base: "hud_panel_itemstime==1 && spectatee_status != 0", port: "panelMode==1 && spectateeStatus != 0", match: true }
      - { name: "mode2_gate", base: "hud_panel_itemstime==2 && (spectatee_status!=0 || warmup_stage || STAT(ITEMSTIME)==2)", port: "panelMode==2 && (spectatee!=0 || warmup || tier==2)", match: true }
      - { name: "mode0_gate", base: "else: don't show", port: "else: return false", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Live only on the listen host (the gate runs inside NetGame's `if (_server is not null)` block) — same host-only limitation as the whole feed (see net.csqc_sync / hud.feed_host). The gate LOGIC itself is now byte-faithful: a remote client just never reaches it."
    verification:
      - { kind: code, ref: "ItemsTimePanel.ShouldDraw(panelMode, spectateeStatus, warmup, itemstimeStat) == QC HUD_ItemsTime gate (itemstime.qc:292-294); mode1 spectatee!=0, mode2 spectatee!=0||warmup||stat==2, else false", result: pass }
      - { kind: code, ref: "NetGame.cs:2293-2300 wires it LIVE: panelMode=hud_panel_itemstime, spectatee=_client.SpectateeStatus, warmup=_client.MatchWarmup, tier=itm.Tier(=sv_itemstime); Visible=show; times fed only when show", result: pass }
      - { kind: code, ref: "HudManager StartHiddenIds contains 'itemstime' -> manager force-HIDES on cvar-off but never force-SHOWS, so it preserves the NetGame data-driven Visible (ResolveVisible base returns hud_panel_itemstime!=0=true)", result: pass }
    confidence: high
    notes: "FIXED in Wave 5 (was logic/presentation partial). Previously NetGame force-set Visible=true whenever the mutator was enabled and the panel never read spectatee/warmup/STAT — an alive player always saw the panel, the opposite of Base. Now ShouldDraw is a faithful port of the QC gate, wired in NetGame with the live spectatee_status (_client.SpectateeStatus), warmup_stage (_client.MatchWarmup) and the sv_itemstime tier (itm.Tier, the host-side STAT(ITEMSTIME) analogue). spectatee!=0 correctly includes the free-fly observer (-1). HudManager's StartHiddenIds membership means the manager won't fight the data-driven Visible. Residual: host-only reachability (a remote client never runs the block). _hud_configure preview path still absent (see hud.draw)."

