  - id: mutator-itemstime.hud.draw
    name: "HUD draw: grid layout, countdown, color/blink, checkmark, progress bar, expanding flash"
    layer: [presentation]
    base_refs:
      - "common/mutators/mutator/itemstime/itemstime.qc:HUD_ItemsTime"
      - "common/mutators/mutator/itemstime/itemstime.qc:DrawItemsTimeItem"
    port_refs:
      - "game/hud/ItemsTimePanel.cs:DrawPanel"
      - "game/hud/ItemsTimePanel.cs:DrawItemsTimeItem"
      - "game/hud/ItemsTimePanel.cs:GetRowCount"
    constants:
      - { name: "ar", base: "max(2,ratio)+1", port: "Mathf.Max(2,ratio)+1", match: true }
      - { name: "seconds_remaining", base: "floor(item_time - time + 0.999)", port: "FloorToInt(itemTime - now + 0.999)", match: true }
      - { name: "color_red_lt", base: "t<5 -> (0.7 0 0)", port: "t<5 -> (0.7 0 0)", match: true }
      - { name: "color_yellow_lt", base: "t<10 -> (0.7 0.7 0)", port: "t<10 -> (0.7 0.7 0)", match: true }
      - { name: "icon_blink", base: "blink(0.85,0.15,5)=0.85+0.15*sin(time*5)", port: "0.85 + 0.15*sin(now*5)", match: true }
      - { name: "icon_alpha_else", base: "0.5 (not available, hidespawned!=2)", port: "0.5", match: true }
      - { name: "available_flash", base: "f=(time-availableTime)*2, (f>1?0:bound 0..1)", port: "(now-avail)*2, f>1?0:Clamp 0..1", match: true }
      - { name: "expanding_sizefactor", base: "1.2/(1.2-fadelerp)", port: "1.2f/(1.2f-fadelerp)", match: true }
      - { name: "progressbar_maxtime", base: "30", port: "30", match: true }
      - { name: "hidespawned_default", base: "1", port: "1", match: true }
      - { name: "row_count_formula", base: "bound(1, floor((sqrt(4*ar*aspect*n + aspect^2)+aspect+0.5)*0.5), n)", port: "same (GetRowCount)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "hud_panel_itemstime_hidebig (Base default 0/false) is not registered in the port; the catalog always shows Big Health/Armor (matches the stock default false, but a user setting hidebig 1 would have no effect)."
      - "The _hud_configure HUD-editor preview (Base Item_ItemsTime_GetTime returns fake times: ArmorMega+8, ArmorBig+0, HealthMega+0, Strength+4) is not ported; the port panel has no hud-configure preview path, so the items-time panel shows nothing in the HUD editor."
    verification:
      - { kind: code, ref: "ItemsTimePanel.DrawItemsTimeItem vs DrawItemsTimeItem (grid/color/blink/checkmark/bar/flash); GetRowCount vs HUD_GetRowCount; Blink vs blink_synced", result: pass }
    confidence: medium
    notes: "Thorough faithful port incl. the exact HUD_GetRowCount formula, blink_synced (start_time=0,start_pos=0), color thresholds, progress bar baralign, and the expanding-box size factor. Live on host path via NetGame feed. Visual fidelity is source-verified, not screenshot-verified; checkmark/progressbar/icon skin-art presence in the port skin not confirmed (graceful tinted-swatch fallback exists). The _hud_configure preview and hidebig are the only draw-side gaps."

