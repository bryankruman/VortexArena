unit: mutator-itemstime
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 10
  worst_gaps:
    - "No CSQC itemstime net message: the HUD feed is host-only (NetGame.cs:2260 guards the whole block with `if (_server is not null)`); a pure remote client on a dedicated/separate server never receives item respawn times and the panel stays empty. STILL OPEN after Waves 1/2/5."
    - "Per-player send tiers + observer/spawn/connect sync hooks (SetTimesForAllPlayers warmup/observer/sv_itemstime==2 gate, ResetTimesForPlayer, MakePlayerObserver/PlayerSpawn/ClientConnect) are not implemented (single local host view; the mutator still hooks only SvStartFrame). STILL OPEN after Waves 1/2/5."
    - "STAT(ITEMSTIME) is not REGISTERED as a networked client stat. Wave 5 instead models the live sv_itemstime tier on the host (ItemstimeMutator.Tier) and feeds it to the enable gate — so the behavior is reproduced on the listen host, but a remote client still has no stat. Partially closed."
    - "Spectator/warmup respawn waypoint sprites for timed items (g_waypointsprite_itemstime default 2, SPRITERULE_SPECTATOR) are not implemented. STILL OPEN after Waves 1/2/5."
    - "FIXED in Wave 5: the panel enable gate now consults spectatee_status / warmup_stage / STAT(ITEMSTIME)-tier — an ALIVE player in a normal round no longer sees the panel (matches Base). See hud.enable_gate."
