      - "server/items/items.qc:Item_ScheduleRespawnIn"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:Recompute"
      - "src/XonoticGodot.Common/Gameplay/Mutators/ItemstimeMutator.cs:Note"
    constants:
      - { name: "sv_itemstime_default", base: "1", port: "1 (assets/data/.../xonotic-server.cfg:421)", match: true }
      - { name: "available_value_when_all_up", base: "0", port: "0", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base updates it_times event-driven (SetTime/UpdateTime called at each item pickup / respawn-schedule in items.qc). The port instead re-scans all live world items every server frame (OnStartFrame -> Recompute) reading each item's ScheduledRespawnTime. The published value is identical (min cooldown across copies); only the trigger differs. Documented in ItemstimeMutator.cs comments."
    gaps: []
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT51Tests.cs:Itemstime_PublishesRespawnTime_ForTimedItem (t=20 on cooldown)", result: pass }
      - { kind: code, ref: "src/XonoticGodot.Server/GameWorld.cs MutatorActivation.Apply -> Add -> Hook -> SvStartFrame.Add; MutatorHooks.FireStartFrame pumps it every server frame", result: pass }
    confidence: high
    notes: "Reads Entity.ScheduledRespawnTime set by the item respawn scheduler (ItemPickupRules). Verified LIVE: sv_itemstime default 1 -> IsEnabled true -> Hook() adds SvStartFrame and seeds Recompute immediately; FireStartFrame fires every server frame. The Recompute/Hook producer logic is byte-identical to baseline; Wave 5 added only the Tier property and doc-comments."

