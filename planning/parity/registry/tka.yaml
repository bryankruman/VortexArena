    - "Drop triggers other than death are still unwired: only OnDeath calls DropBall (TeamKeepaway.cs:549). Base also drops on PlayerUseKey, ClientDisconnect, MakePlayerObserver, DropSpecialItems. MutatorHooks.PlayerUseKey now EXISTS but TKA does not subscribe it; the other three hooks are still absent."
