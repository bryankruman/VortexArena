summary:
  feature_count: 18
  worst_gaps:
    - "Drop triggers: 3 of Base's 4 are now wired LIVE — death (OnDeath), use-key (OnUseKey on MutatorHooks.PlayerUseKey, fired via the +use impulse path), and observe/disconnect (OnPlayerRemoved, fired from ClientManager). Only DropSpecialItems (the special-item-strip drop edge) remains unwired."
    - "Multi-ball chaining (g_tkaball_count / g_tka_ballcarrier_maxballs, the ballcarried.cnt chain + cnt orbit offset) is still unported — the port models exactly one ball (the stock default count=1, so no stock divergence)."
    - "tka.waypoints.tracking residual (presentation:partial): the carrier sprite now uses SPRITERULE_TEAMPLAY + a per-viewer VisibleForPlayer predicate (same-team/spectator/warmup/tracking==1 all faithful, and ==2 dropped-only is now distinguished). Only the two narrowest QC nuances remain approximated — hide-from-spectators-of-the-carrier and hide-on-IS_INVISIBLE(owner)."
    - "tka.ball.pickup minor: no scale 0.75 while carried, no alpha/invisibility sync, no EFFECT_BALL_SPARKS / EFFECT_KA_BALL_RESPAWN particles (the respawn/pickup/world-touch SOUNDS are all played; only the particle effects + the carried-scale shrink remain)."
