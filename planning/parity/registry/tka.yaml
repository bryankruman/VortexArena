last_audited: "2026-06-22"
summary:
  feature_count: 17
  worst_gaps:
    - "No ball exists in a live match: SpawnBall has no caller (GameWorld BuildSpawnHandler [T36] has only a Nexball ball case), so TKA is unplayable — nothing to pick up or carry. Verified: the spawn-handler switch has no Keepaway/TeamKeepaway arm and there is no procedural ball driver replacing QC tka_Handler_CheckBall."
    - "Because there is never a carrier, NO TKA scoring ever fires: no killac, no bckill bonus, no carrierkills, no pickups, no bctime; the match never ends except on timelimit."
    - "WRONG CVAR FAMILY: the port reads g_keepaway_* / g_keepawayball_* cvars (score_killac, score_bckill, ballcarrier_damage, noncarrier_damage, respawntime) but Base TKA has its OWN g_tka_* / g_tkaball_* cvars. These are DISTINCT engine cvars, so even with a stock cfg loaded the port reads Keepaway's tunables, not TKA's — every numeric value can silently diverge."
    - "The distinguishing TKA rule g_tka_score_team (default 1: any teammate's kill scores while the team holds the ball) is NOT modeled — the port only credits when the attacker personally carries (FFA semantics) and never scans the team-has-ball set. OnDeath also omits the Base DIFF_TEAM team-kill exclusion."
    - "No HUD mod-icon (HUD_Mod_TeamKeepaway), no TKA_BALLSTATUS stat, no team-colored carrier waypoints/radar, no pickup/drop/respawn/touch sounds, no notifications; the damage matrix is dead (never subscribed to DamageCalculate) and exposes no force getter; carrier-highspeed missing; no per-frame Tick so bctime/timepoints never accrue."
