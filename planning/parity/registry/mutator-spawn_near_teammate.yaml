      - "src/XonoticGodot.Common/Gameplay/Mutators/SpawnNearTeammateMutator.cs:353 (FaceAngles → FixAngle/FixAngleAngles)"
      - "src/XonoticGodot.Server/ClientManager.cs:550,570 (PutPlayerInServer THEN PlayerSpawn.Call)"
    constants: []
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "OnPlayerSpawn:171 computes QMath.FixedVecToAngles(mate.Origin - player.Origin) (== vectoangles + pitch flip), roll-zeroed, and routes through FaceAngles which sets player.Angles + FixAngle=true + FixAngleAngles", result: pass }
      - { kind: code-read, ref: "ClientManager.Spawn calls PutPlayerInServer (line 550, latches FixAngle/FixAngleAngles=sp.Angles) BEFORE MutatorHooks.PlayerSpawn.Call (line 570) — so the mutator OVERWRITES the spawnpoint latch on the same respawn edge, exactly as Base's 'fixangle is already set' comment", result: pass }
    confidence: high
    notes: "WAVE-2 FIX (baseline = presentation missing / dead). The baseline defect was that the look-at branch wrote only player.Angles (the non-networked channel) which PutPlayerInServer's spawnpoint latch overwrote. The branch now routes through FaceAngles, which latches the FixAngle/FixAngleAngles channel that actually reaches the client — and the ordering (PutPlayerInServer before PlayerSpawn.Call in ClientManager) means the mutator's facing wins. The angle math (FixedVecToAngles == vectoangles + explicit pitch flip, roll-zeroed) was already correct. Now genuinely live + faithful end to end."

