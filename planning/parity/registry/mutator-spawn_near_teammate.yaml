    name: "Mutator registration + cvar gate (expr_evaluate g_spawn_near_teammate)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/spawn_near_teammate/sv_spawn_near_teammate.qc:16 (REGISTER_MUTATOR expr_evaluate)"
      - "common/mutators/mutator/spawn_near_teammate/spawn_near_teammate.qc:4 (REPLICATE cvar_cl_spawn_near_teammate)"
      - "lib/cvar.qh:48 (expr_evaluate)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/SpawnNearTeammateMutator.cs:61 (IsEnabled)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/SpawnNearTeammateMutator.cs:404 (ExprEvaluate)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/SpawnNearTeammateMutator.cs:421 (ExprToken)"
    constants:
      - { name: "g_spawn_near_teammate", base: "0 (string/expr; overkill: \"!g_assault !g_freezetag\")", port: "ExprEvaluate(string) — real expr parser", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "cl_spawn_near_teammate is read as a host-global cvar (Api.Cvars.GetFloat, lines 103/160), not a per-player REPLICATEd value (cvar_cl_spawn_near_teammate); the ignore_spawnpoint==2 per-client opt-in mode is therefore not per-player. (Carried over from baseline — still open.)"
      - "MINOR/cosmetic: ExprToken tests the comparison operators in the order >= <= == != === !== > < whereas Base BINOP source order is >= <= > < == != === !==. The '> / <' before '== / !=' difference only changes the split point for a pathological token that contains BOTH a '>'/'<' and an '=='/'!=' (e.g. 'a>b==c'); no real ruleset/cvar value has such a token, so the live result is identical. The code comment overclaims 'EXACTLY QC's BINOP source order'."
    verification:
      - { kind: code-read, ref: "ExprEvaluate (404)/ExprToken (421) vs lib/cvar.qh:48-104 — leading +/- handling, whitespace tokenize, BINOP AND-chain, bare-token (ftos(f)==k ? f : cvar(k)) truthiness with '!' invert: all present and matching", result: pass }
      - { kind: code-read, ref: "overkill value \"!g_assault !g_freezetag\": both tokens take the bare-token path (no operator), each = cvar truthiness with '!' invert → correctly disables when g_assault or g_freezetag is set", result: pass }
      - { kind: unit-test, ref: "MutatorBatchT19Tests: g_spawn_near_teammate=\"1\" enables", result: pass }
    confidence: high
    notes: "WAVE-2 FIX: ExprEvaluate was a stub (any non-''/'0'/'false' string read as enabled); it is now a genuine port of expr_evaluate — tokenizes the string, evaluates each token as a cvar boolean/comparison predicate (AND-chain), honors leading +/-, and uses (ftos(f)==k ? f : cvar(k)) bare-token truthiness with '!' invert. The overkill ruleset value now correctly disables the mutator during assault/freezetag. Activation stays live via the [Mutator] auto-register + IsEnabled gate. Remaining gap: cl_spawn_near_teammate non-replication (host-global)."

