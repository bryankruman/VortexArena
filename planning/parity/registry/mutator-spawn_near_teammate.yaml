unit: mutator-spawn_near_teammate
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "Spawn facing never reaches the client view: the look-at branch and relocate Place() write only player.Angles, but the port (by its own SpawnSystem comment) requires the FixAngle/FixAngleAngles channel to move the client camera, and PutPlayerInServer latches that channel to the SPAWNPOINT angles — so the 'face your teammate' orientation is overwritten and never shown. (CONFIRMED, not speculative.)"
    - "Registration expr_evaluate is a stub, not a parser: ExprEvaluate treats any non-empty/non-'0'/non-'false' string as enabled, so the overkill-ruleset value g_spawn_near_teammate=\"!g_assault !g_freezetag\" (the primary live consumer) activates the mutator even during assault/freezetag instead of evaluating the boolean cvar expression."
    - "Relocate keeps spots Base rejects: TryOffset omits the sky (Q3SURFACEFLAG_SKY), lava/slime/water (pointcontents), hurt-trigger (tracebox_hits_trigger_hurt) and nade-in-range (g_nades_nade_radius 300) rejects, so a player can be relocated into damage/water or onto a sky leak."
    - "closetodeath (default on) uses the player's CURRENT origin instead of death_origin, so 'spawn nearest where you died' picks the wrong reference and can choose a different teammate than Base."
    - "checkpvs visibility gate skipped in Spawn_Score: spots are biased toward / face teammates not visible from the spot (a superset of Base's chosen set)."
features:
  - id: mutator-spawn_near_teammate.registration.cvar_gate
    name: "Mutator registration + cvar gate (expr_evaluate g_spawn_near_teammate)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/spawn_near_teammate/sv_spawn_near_teammate.qc:16 (REGISTER_MUTATOR expr_evaluate)"
      - "common/mutators/mutator/spawn_near_teammate/spawn_near_teammate.qc:REPLICATE(cvar_cl_spawn_near_teammate)"
      - "lib/cvar.qh:48 (expr_evaluate)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/SpawnNearTeammateMutator.cs:53 (IsEnabled)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/SpawnNearTeammateMutator.cs:363 (ExprEvaluate)"
    constants:
      - { name: "g_spawn_near_teammate", base: "0 (string/expr; overkill: \"!g_assault !g_freezetag\")", port: "ExprEvaluate(string)", match: false }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "ExprEvaluate is NOT a port of Base expr_evaluate (lib/cvar.qh:48): Base tokenizes the string and evaluates each token as a cvar boolean/comparison expression (>=,<=,>,<,==,!=,===,!==, leading !/+/-); the port returns false only for '' / '0' / 'false' and true for any other string. The overkill ruleset value \"!g_assault !g_freezetag\" (the mutator's primary live consumer, ruleset-overkill.cfg:33) therefore always reads as enabled, so the mutator stays active even when g_assault or g_freezetag is set, where Base would disable it. (Shared defect across all ExprEvaluate-gated port mutators.)"
      - "cl_spawn_near_teammate is read as a host-global cvar (Api.Cvars.GetFloat), not a per-player REPLICATEd value (cvar_cl_spawn_near_teammate); the ignore_spawnpoint==2 per-client opt-in mode is not per-player and is meaningless without replication."
    verification:
      - { kind: code-read, ref: "ExprEvaluate (line 363) vs lib/cvar.qh:48; no tokenize/cvar-expr evaluation", result: fail }
      - { kind: unit-test, ref: "MutatorBatchT19Tests: g_spawn_near_teammate=\"1\" enables (simple-value path only)", result: pass }
    confidence: high
    notes: "Registration via [Mutator] auto-register is live. The simple '1'/'0' value path matches; the expression-string path does not. Both mutators.cfg defaults and ruleset-overkill.cfg are shipped in the port (assets/data/xonotic-data.pk3dir)."

