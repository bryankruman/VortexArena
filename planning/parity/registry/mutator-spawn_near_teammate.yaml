  - id: mutator-spawn_near_teammate.bias.lookat_facing
    name: "Spawn facing: aim the spawned player at the chosen teammate"
    layer: [authority, presentation]
    base_refs:
      - "common/mutators/mutator/spawn_near_teammate/sv_spawn_near_teammate.qc:204-214 (else if spawn_spot.msnt_lookat)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/SpawnNearTeammateMutator.cs:158-165 (OnPlayerSpawn look-at branch)"
    constants: []
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: missing
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Look-at facing never reaches the client view (CONFIRMED). The port's own PutPlayerInServer (SpawnSystem.cs:555-560) documents that p.Angles alone never reaches the camera and is overwritten by the client's input view angles on the next tick — the spawn facing must be latched into the FixAngle/FixAngleAngles channel, which PutPlayerInServer sets to the SPAWNPOINT angles. The mutator's look-at branch writes only player.Angles (not FixAngle/FixAngleAngles), so the client snaps to the spawnpoint facing and the teammate-facing is discarded. The angle math (FixedVecToAngles == vectoangles + pitch flip) is correct; the channel is wrong."
    verification:
      - { kind: code-read, ref: "OnPlayerSpawn:164 sets player.Angles only; SpawnSystem.cs:559-560 owns FixAngle/FixAngleAngles=sp.Angles and comments that .Angles never reaches the client", result: fail }
    confidence: high
    notes: "Upgraded from the draft's 'partial/medium' to missing/dead/high: the port's own SpawnSystem comment is the proof, no in-game check needed. In Base, PlayerSpawn runs after fixangle is set and writes .angles, which the DP client honors while fixangle is true; the port split angle into two channels and the mutator only writes the non-networked one."

