unit: mutator-spawn_near_teammate
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "checkpvs(spot.origin, teammate) visibility gate is still skipped in Spawn_Score (no mutator-reachable PVS query): spots are biased toward / face teammates not visible from the spot — a superset of Base's chosen set."
    - "closetodeath (default ON) still uses the player's CURRENT origin instead of player.death_origin (no .death_origin field exists anywhere in the port), so 'spawn nearest where you died' measures from the wrong reference and can pick a different teammate than Base. This is the DEFAULT relocate behavior."
    - "Relocate spot_search still omits two of Base's four rejects: the hurt-trigger reject (tracebox_hits_trigger_hurt) and the nade-in-range reject (g_nades, g_nades_nade_radius 300). A player can still be relocated inside a trigger_hurt or beside a live nade. (The sky and lava/slime/water rejects ARE now applied — Wave-2 fix.)"
    - "cl_spawn_near_teammate is still read as a host-global cvar (Api.Cvars), not a per-player REPLICATEd value, so the ignore_spawnpoint==2 per-client opt-in mode is not per-player."
    - "weaponLocked(teammate) and PHYS_INPUT_BUTTON_CHAT(teammate) relocate gates are still hardcoded false (no per-player weapon-lock / chat-button input reachable) — a faithful subset that may relocate beside a mate Base would skip."
