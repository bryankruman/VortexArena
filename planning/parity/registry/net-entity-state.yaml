summary:
  feature_count: 13
  worst_gaps:
    - "Weapon charge/clip/heat HUD rings never draw: CrosshairPanel charge setters have no live feeder (wepent vortex_charge/clip_load/hagar_load/arc_heat/minelayer_mines + chargepools not networked)"
    - "No ent_cs enemy-privacy mask (radar_showenemies/SAME_TEAM): every player's origin/health/armor is sent to everyone, PVS-gated only — Base strips private fields for non-teammates"
    - "Networked anim action state (anim_state/anim_upper_action/anim_lower_action + times) not ported: remote attack/pain/jump torso overlays are reconstructed client-side (LocomotionBlend) from one networked Frame, not the QC animdecide upper/lower split"
    - "Remote weapon switch animation coarse: only the resolved active weapon is networked, not wepent m_switchweapon/m_switchingweapon"
    - "No out-of-PVS teammate GPS: Base keeps sending a teammate's coarse ent_cs origin out of PVS (radar blip persists); the port's relevance cull drops the entity entirely"
    - "Several replicate client cvars unported (cl_autoscreenshot, cl_clippedspectating, cl_autoswitch_cts, cl_handicap*, g_xonoticversion)"
    - "Animation frame-group cross-fade (cl_lerpanim_maxdelta_framegroups/cl_nolerp) not networked; replaced by client-side LocomotionBlend"
features:
  - id: net-entity-state.csqcmodel.change_mask
    name: "csqcmodel SendFlags change-mask delta channel"
    layer: [shared]
    base_refs:
      - "lib/csqcmodel/sv_model.qc:CSQCModel_Send"
      - "lib/csqcmodel/cl_model.qc:ENT_CLIENT_MODEL"
      - "lib/csqcmodel/common.qh:ALLPROPERTIES"
    port_refs:
      - "src/XonoticGodot.Net/NetEntity.cs:EntityField"
      - "src/XonoticGodot.Net/NetEntity.cs:EntityStateCodec.WriteDelta"
      - "src/XonoticGodot.Net/NetEntity.cs:EntityStateCodec.ReadDelta"
    constants:
      - { name: "mask_width_bits", base: "24 (WriteInt24_t)", port: "32 (uint)", match: false }
      - { name: "origin_quantization", base: "WriteVector 13.3 coord", port: "NetPrecision.Low", match: false }
      - { name: "angle_quantization", base: "WriteAngle 8-bit", port: "NetPrecision.Low", match: false }
      - { name: "only_changed_fields_on_wire", base: "true", port: "true", match: true }
    status:
      logic: faithful
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Unified NetEntityState delta-codec replaces QC's per-entity SendEntity/ReadEntity funcs (csqcmodel + ent_cs + wepent + CSQCProjectile + generic stream) with one change-masked table; the port has no QCVM SendEntity machinery, and DP's own entity delta already works this way. Wire bit-layout differs (32-bit mask, NetPrecision.Low coords) but the only-changed-fields contract and precision class match."
    gaps: []
    verification:
      - { kind: code_read, ref: "NetEntity.cs Diff/WriteDelta/ReadDelta vs CSQCModel_Send", result: pass }
    confidence: high
    notes: "Verified by reading NetEntity.cs in full: EntityField is a 32-bit mask; WriteDelta/ReadDelta emit only set fields; Diff compares per field; StatusEffects (bit 16) is what widened the mask past ushort. Field set = a SUBSET of csqcmodel ALLPROPERTIES + entcs radar slice + wepent active weapon. NOT in NetEntityState: scale (BIT12), modelflags/traileffect (BIT2), colormod/glowmod (resolved locally by the appearance hook), v_angle pitch (BIT10, folded into Angles), tag_entity/viewloc, dphitcontentsmask, move_movetype, and the networked anim action state (anim_state/anim_upper/lower_action — see net-entity-state.csqcmodel.anim_state). No dedicated codec unit test located."

