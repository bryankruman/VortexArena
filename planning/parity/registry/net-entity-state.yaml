      - "common/wepent.qh"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Weapons/WepentResolver.cs:Resolve (THE single authoritative resolver — engine-free; feeds all three sinks)"
      - "src/XonoticGodot.Common/Gameplay/Weapons/WepentViewState.cs (per-player view-state DATA struct, ×255 unit coding)"
      - "src/XonoticGodot.Net/WepentViewCodec.cs:Write/Read (per-player WIRE codec, 13-byte block)"
      - "src/XonoticGodot.Net/OwnerWeaponRings.cs:Write/Read (owner-block 9-float ring scalars — local player's own rings on a remote/dedicated client)"
      - "src/XonoticGodot.Net/NetEntity.cs:EntityField.WepentView (BIT20) + NetEntityState.WepentView + WriteDelta/ReadDelta (453)"
      - "game/net/ServerNet.cs:2133 (per-player producer WepentView=WepentResolver.Resolve on the live snapshot loop) + ResolveOwnerWeaponRings (2676, delegates to WepentResolver) + WriteOwnerState (2818-2831 OwnerWeaponRings tail)"
