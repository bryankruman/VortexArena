      - "game/net/ClientEntityView.cs:157 (e.WepentView=s.WepentView per-player decode)"
      - "game/net/NetGame.cs:UpdateCrosshairWeaponRings (3 branches: spectatee per-player WepentView 3312-3325, pure-remote owner rings 3332-3340, host LocalServerPlayer slot scratch 3354+; called unconditionally each HUD frame, hoisted out of the host-only block)"
      - "game/hud/CrosshairPanel.cs:ClipLoad/ClipSize/ChargeFraction/ChargePool/HagarLoad/MineCount/ArcHeat (ring setters)"
    constants:
      - { name: "vortex_charge_coding", base: "x255 byte (networked)", port: "WepentViewState ×255 byte (per-player) / OwnerWeaponRings float (owner)", match: true }
      - { name: "oknex_charge_coding", base: "x16 byte (networked)", port: "WepentViewState ×255 byte (port uses ×255 uniformly, intended)", match: false }
      - { name: "clip_load/size_coding", base: "short (networked)", port: "WepentViewState signed short (per-player) / OwnerWeaponRings float (owner)", match: true }
      - { name: "hagar_load_coding", base: "byte (networked)", port: "WepentViewState byte (per-player); load_max cap owner-only", match: true }
      - { name: "arc_heat_percent_coding", base: "x255 byte (networked)", port: "WepentViewState ×255 byte; overheat-decay latch resolved server-side", match: true }
      - { name: "minelayer_mines_coding", base: "byte (networked)", port: "WepentViewState byte; live g_mines scan server-side (CountLiveMines delegate)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: true
