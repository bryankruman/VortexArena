    status:
      logic: faithful
      values: partial
      timing: faithful
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Base sets the bit explicitly at the teleport/respawn site (EF_TELEPORT_BIT); the port re-derives it from a one-tick origin-jump past a distance threshold in the snapshot builder. Same observable effect (client snaps instead of lerping) and it also clears the antilag ring (parity with PutPlayerInServer antilag_clear)."
