  - id: net-entity-state.wepent.charges_clip_heat
    name: "wepent charge/clip/heat HUD fields (vortex/oknex charge+pool, clip_load/size, hagar_load, minelayer_mines, arc_heat)"
    layer: [authority, presentation]
    base_refs:
