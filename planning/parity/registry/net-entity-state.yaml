summary:
  feature_count: 24
  worst_gaps:
    - "Coverage fold 2026-07-02 (CSQCProjectile + lib/net wire contracts): projectile fade-out (fade_time/fade_rate, sf 0x20) is NOT networked or rendered (port_refs empty); the projectile no-trail/teleport bit (sf 0x08, UpdateCSQCProjectileAfterTeleport) has no analog so a warpzone-jumped projectile's faithful trail draws a straight segment across the discontinuity; STAT(FRAGLIMIT) (stats.qh magic slot 235) has no networked client consumer (TIMELIMIT/MOVEVARS/etc. all have live typed channels); WriteApproxPastTime is ported in Quantize/BitWriter but DEAD (no caller — times ride raw floats)."
    - "FIX since baseline (Wave-14a): wepent switch/alpha is now NETWORKED + LIVE — EntityField.Wepent (BIT19) carries m_switchweapon/m_switchingweapon + a derived WS_RAISE/WS_DROP phase + the exterior-weapon m_alpha; ServerNet (1970-1983) produces them from the live slot-0 weapon state machine, ClientEntityView (148-153) decodes them, ViewEntityRenderer renders the remote weapon raise/lower dip + per-instance gun transparency on the live Player snapshot path (ClientEntityView.cs:213). Residual missing wepent fields: m_gunalign (field exists, NO producer -> default 0), skin/ViewmodelSkin (NO producer), porto_v_angle_held, tuba_instrument. Tracked in net-entity-state.wepent.switch_alpha_misc."
    - "csqcmodel m_alpha (per-entity render transparency, BIT17) is NETWORKED + LIVE (NetEntityState.Alpha; ServerNet QuantizeAlpha at 1931/2264; ClientEntityView.cs:135 maps 0->opaque/255->hidden/else byte/255) — drives Cloaked/Running Guns/Invisibility/death-fade. Wire coding x255 vs Base x254 (intended divergence). Tracked in net-entity-state.csqcmodel.alpha."
    - "ent_cs enemy-privacy mask LIVE (Wave-6c ba3ae47): ServerNet.RelevantEntitiesFor strips enemy HEALTH/ARMOR per-recipient via the radar_showenemies/SAME_TEAM gate — the anti-cheat HP/armor leak is CLOSED. Residual: origin/angles privacy is handled by whole-entity PVS culling rather than a coarse stripped-GPS send (intended divergence)"
    - "FIX since baseline (uncommitted wave 2026-06-28): the wepent charge/clip/heat HUD rings are now NETWORKED + LIVE across ALL clients — one authoritative WepentResolver.Resolve feeds (a) the per-player WepentView entity block (EntityField.WepentView BIT20) so a spectator following another player draws that player's rings, and (b) the owner-block OwnerWeaponRings (9 floats) so a pure remote / dedicated client draws its own rings; the host slot-scratch branch is unchanged. liveness partial(host-only)->live. Residual = the Phase-2 ViewmodelFrame/BeamState reserved fields have no render consumer yet. Tracked in net-entity-state.wepent.charges_clip_heat. (NOTE: wave is uncommitted in the working tree; HEAD is the warpzone branch.)"
    - "FIX since baseline (Wave-14b): the networked UPPER-body anim ACTION (anim_upper_action + start time) is now LIVE — EntityField.AnimAction (BIT18) carries UpperAction/AnimActionTime; server producers latch the action at the live gameplay sites (WeaponFireGate SHOOT/MELEE, DamageSystem PAIN1/PAIN2 + DIE1/DIE2, WeaponFireDriver DRAW, SoundSystem TAUNT), ServerNet (1918-1924/1977-1982) networks the expiry-resolved id, ClientEntityView (142-143) decodes it, and PlayerModel (214-234) renders it as a torso overlay (LocomotionBlend.SelectTorsoAction) over the velocity-derived legs, driven by the live ServerTimeProvider (NetGame.cs:1224). Residual missing: anim_state byte (BIT7) + the lower-body anim_lower_action split (BIT8) are still NOT separately networked — legs locomotion is reconstructed client-side from velocity. Tracked in net-entity-state.csqcmodel.anim_state."
    - "No out-of-PVS teammate GPS: Base keeps sending a teammate's coarse ent_cs origin out of PVS (radar blip persists); the port's relevance cull drops the entity entirely"
    - "Replicate cvars (NARROWED 2026-06-27): g_xonoticversion has a live server-side consumer — Commands.CheckClientVersion reads the per-client replicated g_xonoticversion and sends the VERSION_OUTDATED/OLD/BETA mismatch notification, armed on connect (ClientManager.cs:229 VersionNagTime) and fired on the live PlayerPreThink path (src/XonoticGodot.Server/GameWorld.cs:2255). Residual = ONLY cl_autoscreenshot (driven client-locally off the networked intermission flag, not the per-client replicated value) is allowlisted+stored but not honored off the replicated value per-player."
features:
  - id: net-entity-state.csqcmodel.change_mask
    name: "csqcmodel SendFlags change-mask delta channel"
    layer: [shared]
    base_refs:
      - "lib/csqcmodel/sv_model.qc:CSQCModel_Send"
      - "lib/csqcmodel/cl_model.qc:ENT_CLIENT_MODEL"
      - "lib/csqcmodel/common.qh:ALLPROPERTIES"
    port_refs:
      - "src/XonoticGodot.Net/NetEntity.cs:EntityField"
      - "src/XonoticGodot.Net/NetEntity.cs:EntityStateCodec.WriteDelta"
      - "src/XonoticGodot.Net/NetEntity.cs:EntityStateCodec.ReadDelta"
    constants:
      - { name: "mask_width_bits", base: "24 (WriteInt24_t)", port: "32 (uint)", match: false }
      - { name: "origin_quantization", base: "WriteVector 13.3 coord", port: "NetPrecision.Low", match: false }
      - { name: "angle_quantization", base: "WriteAngle 8-bit", port: "NetPrecision.Low", match: false }
      - { name: "only_changed_fields_on_wire", base: "true", port: "true", match: true }
    status:
      logic: faithful
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "Unified NetEntityState delta-codec replaces QC's per-entity SendEntity/ReadEntity funcs (csqcmodel + ent_cs + wepent + CSQCProjectile + generic stream) with one change-masked table; the port has no QCVM SendEntity machinery, and DP's own entity delta already works this way. Wire bit-layout differs (32-bit mask, NetPrecision.Low coords) but the only-changed-fields contract and precision class match."
    gaps: []
    verification:
      - { kind: code_read, ref: "NetEntity.cs Diff/WriteDelta/ReadDelta vs CSQCModel_Send", result: pass }
    confidence: high
    notes: "Verified by reading NetEntity.cs in full (re-audited 2026-06-28): EntityField is a 32-bit mask now using bits 0..22; WriteDelta/ReadDelta emit only set fields; Diff compares per field; StatusEffects (bit 16) widened the mask past ushort. Field set: Alpha (BIT17), AnimAction (BIT18, UpperAction/AnimActionTime — LIVE-fed, see net-entity-state.csqcmodel.anim_state), Wepent (BIT19, SwitchWeapon/SwitchingWeapon/WepPhase/ViewmodelSkin/WepAlpha/GunAlign), and NEW this wave WepentView (BIT20, the per-player wepent HUD view-state block via WepentViewCodec — closes the charges_clip_heat cross-client gap), plus TurretHead (BIT21) and ObjState (BIT22). Field set = a SUBSET of csqcmodel ALLPROPERTIES + entcs radar slice + wepent block. STILL not in NetEntityState: scale, modelflags/traileffect, colormod/glowmod (resolved locally by the appearance hook), v_angle pitch (folded into Angles), tag_entity/viewloc, dphitcontentsmask, move_movetype, anim_state byte + anim_lower_action (legs reconstructed client-side), and the wepent porto_v_angle_held/tuba_instrument. SnapshotDeltaTests.cs covers the codec round-trip."

