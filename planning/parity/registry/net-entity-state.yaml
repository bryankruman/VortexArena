      - "common/ent_cs.qc:_entcs_send (ENTCS_PUBLICMASK gating, lines 213-240)"
      - "common/ent_cs.qc:ENTCS_PUBLICMASK/ENTCS_PRIVATEMASK"
    port_refs:
      - "game/net/ServerNet.cs:RelevantEntitiesFor (radarShowEnemies/teamplay/applyPrivacy gate + Health/Armor strip)"
      - "game/net/ServerNet.cs:BroadcastSnapshots (reads radar_showenemies + TeamGame once per broadcast, passes per-recipient)"
      - "src/XonoticGodot.Common/Gameplay/GameTypes/Race.cs:432 (sets radar_showenemies=1)"
    constants:
      - { name: "private_fields", base: "origin, angles_y, health, armor", port: "health, armor stripped; origin/angles PVS-governed (folded model channel)", match: partial }
      - { name: "public_fields", base: "name, model, skin, colors, frags, handicap, wantsjoin, solid", base_note: "always sent", port: "all sent", match: true }
      - { name: "enemy_gate", base: "radar_showenemies || SAME_TEAM || !(IS_PLAYER(to)||INGAME(to))", port: "!radar_showenemies && !recipient.IsObserver && !sameTeam (teamplay?colormap==team) && Kind==Player", match: true }
    status:
      logic: faithful
      values: partial
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: true
    divergence_rationale: "FIXED (Wave-6c ba3ae47): ServerNet.RelevantEntitiesFor now applies the ent_cs enemy-privacy gate per-recipient, mirroring _entcs_send's break-condition (radar_showenemies || SAME_TEAM || recipient-not-active-player => send private; else strip). It zeroes the HEALTH/ARMOR resource slice for an enemy recipient of a live remote Player entity. Intended divergence on ORIGIN/ANGLES: Base marks those private too, but in QC the visible player MODEL is a SEPARATE csqcmodel channel sent (PVS-gated) regardless of the entcs mask — the mask only hides the out-of-PVS radar GPS. The port folds model+entcs into one state whose origin IS the render position and already PVS-culls the whole entity when out of view, so an enemy's origin is governed by PVS exactly as QC's csqcmodel origin is; freezing it here would wrongly stall a visible enemy's model. So only HEALTH/ARMOR (no csqcmodel counterpart, otherwise leaked even for visible enemies) are stripped. The residual out-of-PVS coarse-GPS degrade remains its own tracked gap (csqcmodel.force_updates)."
    gaps:
      - "Origin/angles privacy not separately enforced: Base's ENTCS_PRIVATEMASK also covers origin/angles_y (the out-of-PVS radar GPS), which the port governs by whole-entity PVS culling instead of a coarse stripped-GPS send. Anti-cheat critical HEALTH/ARMOR leak is now closed; the GPS-degrade nuance is folded into the csqcmodel.force_updates gap."
    verification:
      - { kind: code_read, ref: "ServerNet.RelevantEntitiesFor: applyPrivacy=!radarShowEnemies&&!owner.IsObserver; per-entity sameTeam=teamplay&&ownerTeam!=0&&state.Colormap==ownerTeam; Kind==Player gate; Health=0/Armor=0 strip — matches _entcs_send break-condition + ENTCS private resource set", result: pass }
      - { kind: code_read, ref: "Base common/ent_cs.qc:213-240 _entcs_send gate + lines 100-151 prop ispublic flags (ORIGIN/ANGLES/HEALTH/ARMOR=false; name/model/skin/colors/frags/handicap/wantsjoin/solid=true)", result: pass }
      - { kind: code_read, ref: "Race.cs:432 Api.Cvars.Set(radar_showenemies,1); ServerNet reads radar_showenemies cvar per broadcast (ServerNet.cs:1628) — gate driven live", result: pass }
    confidence: high
    notes: "FIX (Wave-6c ba3ae47): baseline had this fully missing (every enemy's exact HP/armor on the wire). Now LIVE: a modified client can no longer read enemy health/armor. logic missing->faithful, values missing->partial, liveness na->live, intended_divergence false->true. NetEntityState is a struct so Health/Armor are zeroed on a copy per-recipient before EncodeSnapshot (delta sends one zero on first sight then silent — equivalent to QC ANDing the bit out of SendFlags). Residual = origin/angles privacy handled via PVS rather than a coarse stripped-GPS send (deliberate, see rationale)."

