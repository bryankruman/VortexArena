unit: sv-chat
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-25"  # drift re-audit on claude/parity-port-waves: printtochat helpers now IMPLEMENTED (faithful) but DEAD (no callers; Base callers are all commented-out debug too)
summary:
  feature_count: 15
  worst_gaps:
    - "INGAME(it) round-mode semantics not modeled: no per-player .ingame round flag, so IsIngame(p)==!IsObserver(p); eliminated-but-INGAME players (Clan Arena / LMS / Survival) diverge from Base in spectator-downgrade + team-routing filter. No effect on FFA/CTF/DM."
    - "%y/%x crosshair tokens trace the player's VIEW ANGLES (server-side) rather than Base's CSQC-reported cursor (WarpZone_crosshair_trace_plusvisibletriggers); the port does not network the cursor, so an off-view-axis aim resolves differently. %y/%x/%d are now functional (live), only the trace SOURCE differs."
    - "Line-wrap width is an integer 82 visible chars vs Base's 82.4289758859709 px-equiv (perl averagewidth on gfx/vera-sans.width); proportional per-char widths unmodeled, so the flood==2 'too long' boundary can differ by one char on edge-length messages."
    - "NearestLocation has no item fallback: Base falls back to nearest pickup item .netname via findnearest(checkitems=true) when no target_location matches (chat.qc:453-457); the port returns 'somewhere' on item-only maps."
    - "PrintToChat/PrintToChatAll/PrintToChatTeam/Debug* chat-line helpers (chat.qc:593-645) are now ported faithfully (Chat.cs:770-823) but DEAD — no live caller in the port. (Base itself has zero live callers either: every teamplay.qc / random_items use is commented-out debug code, so the practical impact is nil.)"
