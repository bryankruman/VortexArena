  - id: sv-chat.routing.recipients
    name: "Recipient routing (public / team / spectator / private) with ignore + spectator-downgrade"
    layer: [authority]
    base_refs:
      - "server/chat.qc:Say"
    port_refs:
      - "src/XonoticGodot.Server/Chat.cs:Say"
    constants:
      - { name: "g_chat_nospectators", base: "0", port: "0", match: true }
      - { name: "g_chat_tellprivacy", base: "1", port: "1", match: true }
    status:
      logic: partial
      values: faithful
      timing: na
      presentation: faithful
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No active_minigame routing branch: a say_team from a player inside a ported minigame is routed as a normal team/spectator say (minigame players are usually observers), not to co-session participants; the :chat_minigame: event-log line is never emitted (minigames exist in the port: MinigameSessionManager). Player has no ActiveMinigame link."
      - "INGAME(it) round-mode semantics not modeled: the port has no per-player .ingame round flag, so IsIngame(p) == !IsObserver(p). In round/elimination modes (Clan Arena / LMS / Survival) an eliminated-but-still-INGAME player is treated as a spectator, so the spectator-downgrade (teamsay->-1) and the (IS_PLAYER||INGAME) team-routing filter diverge from Base for those players. No effect on FFA/standard CTF/DM."
    verification:
      - { kind: test, ref: "ChatEngineTests.Routing_PublicSay_* / Routing_TeamSay_ReachesOnlyTeammates / Routing_SpectatorSay_* / Routing_PrivateTell_ReachesOnlyTarget", result: pass }
      - { kind: code-read, ref: "chat.qc:241-364 (INGAME(it), active_minigame, teamsay>0/<0, public) vs Chat.cs:296-412 + IsIngame/IsObserver helpers", result: fail }
      - { kind: code-read, ref: "grep INGAME/Ingame/RoundEliminated on Player.cs = absent (no round-ingame flag)", result: fail }
    confidence: high
    notes: "Public/team/spectator/private routing, the spectator say->teamsay=-1 downgrade under CHAT_NOSPECTATORS, the spectator-tells-ingame hide (ret=-1), DedicatedPrint, and tellprivacy are present. Two logic divergences: the minigame team-say branch is entirely absent, and the INGAME() round-elimination case is approximated by !IsObserver."

