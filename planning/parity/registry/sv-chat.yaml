unit: sv-chat
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 13
  worst_gaps:
    - "IGNORE_MAXPLAYERS = 50 in the port vs Base 16 (cmd.qh:11): a player can ignore 50 others before 'list full'; the code comment mislabels 50 as the QC constant."
    - "VoiceMessage text is never routed through Say: a player's voice/radio message text never appears in chat, isn't flood-throttled, and the flood<0/flood==0 'fake'/abort gating of the voice sound is absent (port plays the sound regardless of chat flood)."
    - "No active_minigame chat branch: a say_team from inside a ported minigame is not routed to co-session participants and emits no :chat_minigame: event log."
    - "%y / %x / %d formatmessage macros fall back to self-location / 'nothing' (no server-side crosshair trace wired into chat); %d uses self-origin not death_origin."
    - "DedicatedPrint is NOT gated on sv_dedicated: Base dedicated_print prints only when autocvar_sv_dedicated, but the port unconditionally echoes every routed chat line (and tells when tellprivacy off) to the host console (GD.Print)."
