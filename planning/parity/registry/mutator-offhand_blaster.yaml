unit: mutator-offhand_blaster
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-27"
summary:
  feature_count: 8
  worst_gaps:
    - "LIVE end-to-end (Wave-5, commit 66e378f; re-verified 2026-06-27, line numbers drifted but chain intact): the offhand-fire input wire. InputButtons.Hook = 1<<6 (src/XonoticGodot.Net/InputCommand.cs:20), C2S byte carries bit 6 (0x40), NetGame sets it from BindTable.HookHeld (game/net/NetGame.cs:4918), BindTable handles `+hook`→`case \"hook\"` (src/XonoticGodot.Engine/Console/BindTable.cs:153), ServerNet maps it to MovementInput.ButtonHook (game/net/ServerNet.cs:1617), and WeaponFireDriver.Frame (WeaponFireDriver.cs:69) assigns `player.OffhandFirePressed = input.ButtonHook`. Default binds `bind MOUSE5/e +hook` match Base. The offhand blaster genuinely shoots in a match."
    - "BuildMutatorsString / BuildMutatorsPrettyString are ported AND both LIVE. OffhandBlasterMutator.cs:53/57 override both (`:offhand_blaster` / `, Offhand blaster`); MutatorActivation.BuildMutatorsString (MutatorActivation.cs:108) called LIVE from GameWorld.cs:1117 (sv_eventlog GameLog ':gameinfo:mutators:' line). The pretty-string chain has live callers too: GameWorld.cs:1128-1130 writes it to the 'modifications' serverinfo key at match-start, GameWorld.cs:1392 surfaces it per-player as the 'Active modifications:' chat line, and ServerNet.cs:608 (BuildServerInfo) surfaces it on the server-browser 'modifications' field."
    - "The client gameplay-tips line is PORTED and LIVE. GameWorld.cs:1314-1321 emits '^3offhand blaster^8 is enabled, press ^3<key>^8 to use it' (the exact Base cl_offhand_blaster.qc text) to the connecting non-bot player via Commands.ChatToPlayer, gated on `offhandMut.Added`, with the +hook bind resolved via BindTable.CommandKey(\"offhand hook\", \"+hook\") — matching Base getcommandkey(_(\"offhand hook\"), \"+hook\"). (The mut_is_active bitfield isn't networked, but the server knows the mutator state directly, so the gate is equivalent.)"
    - "FIXED (2026-06-27): the menu mutator-info describe text is NOW PORTED and LIVE. OffhandBlasterMutator.cs:27-31 provides the 3-paragraph GuideDescription override (faithful to Base MutatorOffhandBlaster.describe()), and DialogMediaGuide.cs:140-148/184-186 enumerates Mutators.All under the 'Mutators' guide topic, listing 'Offhand Blaster' (Humanize(NetName)) and rendering its GuideDescription. This is the media-guide / describe info page that Base's describe() feeds. The incidental reference in the Grappling Hook tooltip (DialogMutators.cs:197) still exists too. The only nuance vs Base: the port has no localized `message` ATTRIB, so the entry label is Humanize(NetName)='Offhand Blaster' rather than the localized string."
