summary:
  feature_count: 8
  worst_gaps:
    - "STILL DEAD after Wave-1/2: the offhand blaster can never fire in a match. The input wire was NOT added — InputButtons (src/XonoticGodot.Net/InputCommand.cs:11-20) still has only Attack/Jump/Attack2/Zoom/Crouch/Use (no hook/offhand bit), the C2S Serialize payload carries no such bit, and Entity.OffhandFirePressed has ZERO assignments anywhere in src/ or game/ (verified by grep — only read by HookMutator/NadesMutator/OffhandBlasterMutator). The whole offhand-fire path remains unreachable. This was the #1 baseline gap and the PORTING-PLAN headline; it is untouched."
    - "BuildMutatorsString/BuildMutatorsPrettyString still not ported: no hook chain or per-mutator implementation exists; the mutator never appears in any machine/pretty mutator-list string. GameLog.Init (GameWorld.cs:717) is still called with no mutators arg → empty ':gameinfo:mutators:' line."
