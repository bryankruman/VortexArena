  - id: offhand_blaster.fire.offhand_think
    name: "Offhand fire: hold +hook to fire a Blaster shot without switching weapons"
    layer: [authority, shared]
    base_refs:
      - "common/weapons/weapon/blaster.qc:OffhandBlaster.offhand_think (l.138-147)"
      - "server/weapons/weaponsystem.qc:~610-618 (key_pressed = PHYS_INPUT_BUTTON_HOOK && !vehicle; weaponUseForbidden clears it; off.offhand_think dispatch)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:OnPlayerPreThink"
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:FireOffhand"
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:WeaponRateFactor"
      - "src/XonoticGodot.Common/Gameplay/Weapons/WeaponFireDriver.cs:Frame (OffhandFirePressed = input.ButtonHook)"
      - "src/XonoticGodot.Net/InputCommand.cs:InputButtons.Hook"
      - "game/net/NetGame.cs:3984 (BindTable.HookHeld -> InputButtons.Hook)"
      - "game/net/ServerNet.cs:1415 (InputButtons.Hook -> MovementInput.ButtonHook)"
    constants:
      - { name: "blaster_primary_refire", base: "0.7", port: "0.7 (Primary.Refire / fallback)", match: true }
      - { name: "refire * W_WeaponRateFactor(actor)", base: "scaled by 1/g_weaponratefactor + WeaponRateFactor mutator hook", port: "scaled via WeaponRateFactor(player) helper (g_weaponratefactor + WeaponRateFactor.Call hook)", match: true }
      - { name: "key_pressed = PHYS_INPUT_BUTTON_HOOK && !vehicle", base: "true", port: "true (ButtonHook bit; vehicle excluded by WeaponThink early-return while seated)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: partial
      presentation: na
      audio: faithful
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "weaponUseForbidden suppression incomplete: Base (weaponsystem.qc:610-612) clears key_pressed when weaponUseForbidden(actor) (round active-but-not-started OR the ForbidWeaponUse mutator hook). The port DOES zero OffhandFirePressed alongside the fire buttons when WeaponUseForbidden(player) is true (WeaponFireDriver.cs:72-73), BUT WeaponUseForbidden is still a stub returning false (WeaponFireDriver.cs:324) — so the round-grace / ForbidWeaponUse gate is not actually enforced. The vehicle and frozen/dead/game-stopped halves ARE handled (WeaponThink returns while p.Vehicle != null; WeaponLocked covers freeze; caller gates dead/game-stopped). Minor residual: the offhand could fire during the inter-round grace countdown in round-based modes."
    verification:
      - { kind: code, ref: "Wave-5 (66e378f) added the input wire: InputButtons.Hook (InputCommand.cs:20), Serialize writes Buttons&0xFF / Deserialize reads a byte (bit 6=0x40 fits), NetGame.cs:3984 sets it from BindTable.HookHeld, BindTable.cs:131 `case \"hook\"` from `+hook`, ServerNet.cs:1415 -> MovementInput.ButtonHook, WeaponFireDriver.cs:66 `player.OffhandFirePressed = input.ButtonHook`. Default binds `bind MOUSE5/e +hook` match Base. OnPlayerPreThink (PlayerPreThink.Call live at GameWorld.cs:1174) now reads a real signal -> FireOffhand reachable.", result: pass }
      - { kind: code, ref: "FireOffhand does `OffhandNextThink = now + refire * WeaponRateFactor(player)`; WeaponRateFactor() does 1/g_weaponratefactor then MutatorHooks.WeaponRateFactor.Call (live producers: BuffsMutator/PowerupsMutator register it). Matches Base jump_interval = time + refire*W_WeaponRateFactor(actor).", result: pass }
      - { kind: code, ref: "WeaponUseForbidden (WeaponFireDriver.cs:324) still `=> false;` unconditionally — round-grace/ForbidWeaponUse zeroing of the offhand button not enforced.", result: fail }
    confidence: high
    notes: "MAJOR Wave-5 fix: liveness dead -> live. The trigger signal (Entity.OffhandFirePressed / the +hook input bit) that the baseline flagged as having ZERO producers now has a complete, verified producer chain on the real match path; the offhand blaster fires in a match. logic upgraded partial -> faithful (trigger + vehicle gate present); the W_WeaponRateFactor values gap was already closed in Wave-2. timing kept `partial` ONLY because WeaponUseForbidden remains a stub (the round-grace suppression is the lone residual). The SAME wire revives HookMutator's and the nade offhand-throw's +hook paths (see mutator-hook, mutator-nades, weapon-hook)."
