summary:
  feature_count: 8
  worst_gaps:
    - "FIXED (Wave-5, commit 66e378f) and still intact 2026-06-25: the offhand-fire input wire is LIVE end-to-end. InputButtons.Hook = 1<<6 (src/XonoticGodot.Net/InputCommand.cs:20), C2S byte carries bit 6 (0x40), NetGame sets it from BindTable.HookHeld (game/net/NetGame.cs:4105), BindTable handles `+hook`→`case \"hook\"` (src/XonoticGodot.Engine/Console/BindTable.cs:131), ServerNet maps it to MovementInput.ButtonHook (game/net/ServerNet.cs:1458), and WeaponFireDriver.Frame (WeaponFireDriver.cs:66) assigns `player.OffhandFirePressed = input.ButtonHook`. Default binds `bind MOUSE5/e +hook` match Base. The offhand blaster genuinely shoots in a match."
    - "FIXED since 2026-06-22 audit: BuildMutatorsString / BuildMutatorsPrettyString are now ported. OffhandBlasterMutator.cs:45/49 override both (`:offhand_blaster` / `, Offhand blaster`); MutatorActivation.BuildMutatorsString (MutatorActivation.cs:108) is called LIVE from GameWorld.cs:876 (gated by sv_eventlog) feeding the ':gameinfo:mutators:' GameLog line. The pretty-string chain (MutatorActivation.BuildMutatorsPrettyString) has the per-mutator override but NO live caller yet (scoreboard/votescreen consumer not wired) → DEAD."
    - "FIXED since 2026-06-22 audit: the round-grace weaponUseForbidden suppression is now wired. WeaponFireDriver.WeaponUseForbidden delegates to RoundFireForbidden (WeaponFireDriver.cs:328), which GameWorld.cs:1130 sets to `_ => Rounds is { IsRoundStarted: false }`. The offhand button is zeroed during the inter-round grace, matching Base round_handler_IsActive() && !round_handler_IsRoundStarted(). Only the ForbidWeaponUse mutator-hook half is unmodeled (no port mutator forbids weapon use — non-issue)."
    - "STILL MISSING: client gameplay-tips line ('offhand blaster is enabled, press <key>') and the menu describe text — no BuildGameplayTipsString builder and no 'offhand' menu entry exist in the port (grep src/, game/menu/ found none)."
