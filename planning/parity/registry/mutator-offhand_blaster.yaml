unit: mutator-offhand_blaster
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "Offhand blaster can never fire in a match: no input button bit (InputButtons has no hook/offhand bit), no wire field, and BindTable.SetButton has no 'hook' case, so the `+hook` bind sets nothing and OffhandFirePressed is never written true on the server. The entire offhand-fire path is dead."
    - "BuildMutatorsString/BuildMutatorsPrettyString not ported: the mutator never appears in any machine/pretty mutator-list string (scoreboard/serverinfo/menu); GameLog.Init is even called with no mutator list."
    - "Client gameplay-tips line ('offhand blaster is enabled, press <key> to use it') not shown — no gameplay-tips builder exists in the port."
features:
  - id: offhand_blaster.enable.register
    name: "Mutator enable via g_offhand_blaster cvar"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/offhand_blaster/sv_offhand_blaster.qc:REGISTER_MUTATOR (expr_evaluate(autocvar_g_offhand_blaster))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:IsEnabled"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:Apply"
    constants:
      - { name: "g_offhand_blaster", base: "\"0\" (string cvar; expr_evaluate)", port: "0 (Cvars.GetFloat != 0)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "IsEnabled => Api.Cvars.GetFloat(\"g_offhand_blaster\") != 0; MutatorActivation.Apply() called live at GameWorld.cs:511 (Add/Remove reconcile against IsEnabled)", result: pass }
      - { kind: value, ref: "Base mutators.cfg:435 'set g_offhand_blaster 0' == port assets/data/xonotic-data.pk3dir/mutators.cfg:435 'set g_offhand_blaster 0'", result: pass }
    confidence: high
    notes: "Port reads the cvar as a float (!=0); Base uses expr_evaluate on a string. Equivalent for the 0/1 default; would differ only for exotic string values ('true'/expressions). Verified Apply() is the live activation loop."
  - id: offhand_blaster.spawn.assign
    name: "Assign Blaster to player offhand slot on spawn"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/offhand_blaster/sv_offhand_blaster.qc:MUTATOR_HOOKFUNCTION(offhand_blaster, PlayerSpawn) — player.offhand = OFFHAND_BLASTER"
      - "common/weapons/weapon/blaster.qh:STATIC_INIT(OFFHAND_BLASTER)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:OnPlayerSpawn"
    constants: []
    status:
      logic: faithful
      values: na
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "OnPlayerSpawn sets player.OffhandWeapon = \"blaster\"; MutatorHooks.PlayerSpawn.Call fired live at ClientManager.cs:542", result: pass }
    confidence: high
    notes: "QC sets player.offhand = OFFHAND_BLASTER (a singleton); port stores the offhand as the string \"blaster\" on Entity.OffhandWeapon. The assignment itself is reachable/live even though the fire it gates is dead."
  - id: offhand_blaster.fire.offhand_think
    name: "Offhand fire: hold +hook to fire a Blaster shot without switching weapons"
    layer: [authority, shared]
    base_refs:
      - "common/weapons/weapon/blaster.qc:OffhandBlaster.offhand_think (l.138-147)"
      - "server/weapons/weaponsystem.qc:~610-618 (key_pressed = PHYS_INPUT_BUTTON_HOOK && !vehicle; weaponUseForbidden clears it; off.offhand_think dispatch)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:OnPlayerPreThink"
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:FireOffhand"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Blaster.cs:WrThink (slot.Index >= MaxWeaponSlots)"
    constants:
      - { name: "blaster_primary_refire", base: "0.7", port: "0.7 (Primary.Refire / fallback)", match: true }
      - { name: "refire * W_WeaponRateFactor(actor)", base: "scaled by rate factor", port: "refire only (no scaling)", match: false }
    status:
      logic: partial
      values: partial
      timing: partial
      presentation: na
      audio: faithful
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "DEAD on the live path: no input button maps to the offhand fire. InputButtons (src/XonoticGodot.Net/InputCommand.cs) has only Attack/Jump/Attack2/Zoom/Crouch/Use — no hook/offhand bit, and the C2S wire payload (Serialize) carries no such bit. BindTable.SetButton has no 'hook' case, so a bound `+hook` press is a no-op. OffhandFirePressed is only ever READ (HookMutator, NadesMutator, here) and never assigned `= true` anywhere in src/ or game/."
      - "Refire gate omits W_WeaponRateFactor scaling (Base: jump_interval = time + refire * W_WeaponRateFactor(actor)); identical at default rate 1.0, diverges under handicap/rate-factor cvars."
      - "No vehicle / weaponUseForbidden suppression of the offhand fire (Base clears key_pressed in a vehicle or when weapon use is forbidden — frozen/eliminated). Latent because the path can't fire at all."
    verification:
      - { kind: code, ref: "grep src/ game/ for OffhandFirePressed= : zero writes of true. InputButtons enum has no hook bit; BindTable.SetButton switch has no 'hook' case", result: fail }
      - { kind: code, ref: "FireOffhand gates on OffhandNextThink and calls Blaster.WrThink on slot index == MaxWeaponSlots (ungated by PrepareAttack); refire fallback 0.7 matches Base", result: pass }
    confidence: high
    notes: "Fire logic mirrors Base structurally (dedicated high slot ~ Base weaponentities[1], refire-gated, aims from view angles). Triple-confirmed dead: the trigger signal has no producer anywhere up the input/net stack. The same dead button also strands HookMutator's and the nade offhand-throw's +hook paths (NadesMutator reads OffhandFirePressed too; NadeAltButton, by contrast, IS written by NadeThrow). Spec comment 'offhand laser parameters' is inaccurate — Base uses the ordinary W_Blaster_Attack for both offhand and in-hand."
