      - { name: "edgedamage", base: "10", port: "10", match: true }
      - { name: "radius", base: "60", port: "60", match: true }
      - { name: "force", base: "375", port: "375", match: true }
      - { name: "force_zscale", base: "1", port: "1", match: true }
      - { name: "speed", base: "6000", port: "6000", match: true }
      - { name: "spread", base: "0", port: "0", match: true }
      - { name: "lifetime", base: "5", port: "5", match: true }
      - { name: "delay", base: "0", port: "0", match: true }
      - { name: "shotangle", base: "0", port: "0", match: true }
      - { name: "animtime", base: "0.1", port: "0.1", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: faithful
      audio: faithful
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Reachable from the offhand only through the dead offhand-fire button, so the offhand never actually spawns this projectile in a match. (The in-hand Blaster, covered by the weapon audit, IS live — this dead status is the offhand entry point only.)"
    verification:
      - { kind: value, ref: "Blaster.Configure vs bal-wep-xonotic.cfg g_balance_blaster_primary_* (damage 20, edge 10, radius 60, force 375, zscale 1, speed 6000, spread 0, refire 0.7, animtime 0.1, delay 0, lifetime 5, shotangle 0)", result: pass }
      - { kind: code, ref: "Attack/OnTouch mirror W_Blaster_Attack/W_Blaster_Touch (RadiusDamage, fly bolt, impact sound/effect)", result: pass }
    confidence: high
    notes: "The Blaster weapon itself is fully ported and faithful (weapon audit). Listed here because the offhand reuses it; liveness=dead reflects the offhand entry point only."
  - id: offhand_blaster.precedence.over_hook
    name: "Offhand blaster overrides the grappling hook offhand when both enabled"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/offhand_blaster/offhand_blaster.qc:describe (\"overrides the hook mutator, since they use the same bind\")"
      - "common/mutators/mutator/hook/sv_hook.qc:PlayerSpawn (.offhand = OFFHAND_HOOK)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:OnPlayerSpawn"
      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:OnPlayerSpawn"
      - "src/XonoticGodot.Common/Framework/Registry.cs:Sort (ordinal RegistryName)"
      - "src/XonoticGodot.Common/Framework/Hooks.cs:HookChain.Add/Call (registration-order within bucket)"
    constants: []
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "Registry<MutatorBase>.Sort sorts ordinal by RegistryName(=NetName). 'grappling_hook' (g=0x67) < 'offhand_blaster' (o=0x6F). MutatorActivation.Apply iterates Mutators.All in that order calling Hook()/Add; HookChain.Add appends and Call runs in registration order within the default HookOrder.Any bucket. So OffhandBlasterMutator.OnPlayerSpawn runs AFTER HookMutator.OnPlayerSpawn → OffhandWeapon='blaster' is the last writer, winning. Matches Base's documented override.", result: pass }
    confidence: high
    notes: "UPGRADED from unknown: precedence is deterministic and correct via the ordinal NetName sort + registration-order hook dispatch. The HookMutator source comment ('the registry NetName sort makes offhand_blaster run AFTER grappling_hook') is verified accurate. The override only affects the OffhandWeapon assignment (live); the fire it would gate is dead for both."
