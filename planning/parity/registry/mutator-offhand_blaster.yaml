last_audited: "2026-06-22"
summary:
  feature_count: 8
  worst_gaps:
    - "FIXED by Wave-5 (commit 66e378f): the offhand-fire input wire is now LIVE end-to-end. InputButtons gained `Hook = 1 << 6` (src/XonoticGodot.Net/InputCommand.cs:20), the C2S Serialize/Deserialize byte (InputCommand.cs:86/103) carries bit 6 (0x40 < 0xFF), NetGame sets it from BindTable.HookHeld (game/net/NetGame.cs:3984), BindTable.SetButton handles `+hook`→`case \"hook\"` (BindTable.cs:131), ServerNet.ToMovementInput maps it to MovementInput.ButtonHook (game/net/ServerNet.cs:1415), and WeaponFireDriver.Frame (src/.../Weapons/WeaponFireDriver.cs:66) finally ASSIGNS `player.OffhandFirePressed = input.ButtonHook`. Default binds `bind MOUSE5 +hook`/`bind e +hook` match Base (binds-xonotic.cfg:29/37). So OnPlayerPreThink's `if (player.OffhandFirePressed)` can now fire, and the offhand blaster genuinely shoots in a match. This was the #1 baseline gap (input wire never added) and the PORTING-PLAN headline — it is CLOSED."
    - "STILL MISSING: BuildMutatorsString/BuildMutatorsPrettyString not ported — no hook chain or per-mutator implementation; the mutator never appears in any machine/pretty mutator-list string. GameLog.Init (GameWorld.cs:829, line shifted) still called with no mutators arg → empty ':gameinfo:mutators:' line. (grep finds only doc-comment refs in Cloaked/Powerups/RocketFlying/SuperSpec mutators.)"
    - "STILL MISSING: client gameplay-tips line ('offhand blaster is enabled, press <key>') and the menu describe text — no BuildGameplayTipsString builder and no 'offhand' menu entry exist in the port (grep src/, game/menu/ found none)."
