  - id: offhand_blaster.fire.offhand_think
    name: "Offhand fire: hold +hook to fire a Blaster shot without switching weapons"
    layer: [authority, shared]
    base_refs:
      - "common/weapons/weapon/blaster.qc:OffhandBlaster.offhand_think (l.138-147)"
      - "server/weapons/weaponsystem.qc:~610-618 (key_pressed = PHYS_INPUT_BUTTON_HOOK && !vehicle; weaponUseForbidden clears it; off.offhand_think dispatch)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:OnPlayerPreThink"
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:FireOffhand"
      - "src/XonoticGodot.Common/Gameplay/Mutators/OffhandBlasterMutator.cs:WeaponRateFactor"
      - "src/XonoticGodot.Common/Gameplay/Weapons/Blaster.cs:WrThink (slot.Index >= MaxWeaponSlots)"
    constants:
      - { name: "blaster_primary_refire", base: "0.7", port: "0.7 (Primary.Refire / fallback)", match: true }
      - { name: "refire * W_WeaponRateFactor(actor)", base: "scaled by 1/g_weaponratefactor + WeaponRateFactor mutator hook", port: "now scaled via WeaponRateFactor(player) helper (g_weaponratefactor + WeaponRateFactor.Call hook)", match: true }
    status:
      logic: partial
      values: faithful
      timing: partial
      presentation: na
      audio: faithful
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "STILL DEAD on the live path (the baseline #1 gap is UNCHANGED): no input button maps to the offhand fire. InputButtons (src/XonoticGodot.Net/InputCommand.cs:11-20) still has only Attack/Jump/Attack2/Zoom/Crouch/Use — no hook/offhand bit — and the C2S Serialize payload carries no such bit. Entity.OffhandFirePressed is assigned NOWHERE in src/ or game/ (grep: zero writes), so OnPlayerPreThink's `if (player.OffhandFirePressed)` is always false. FireOffhand has no caller on the real match path."
      - "No vehicle / weaponUseForbidden suppression of the offhand fire. Base (weaponsystem.qc:610-612) computes key_pressed = PHYS_INPUT_BUTTON_HOOK(actor) && !actor.vehicle, then clears it if weaponUseForbidden(actor) (frozen/eliminated/etc.). The port's OnPlayerPreThink only guards on Flags&Client and DeadState — no vehicle/forbidden check. Latent because the path can't fire at all."
    verification:
      - { kind: code, ref: "grep 'OffhandFirePressed *=' over src/ and game/ -> zero matches (verified 2026-06-22). InputButtons enum (InputCommand.cs:11-20) has no hook bit; no BindTable 'hook' case exists.", result: fail }
      - { kind: code, ref: "Wave-2 added WeaponRateFactor scaling: FireOffhand now does `OffhandNextThink = now + refire * WeaponRateFactor(player)`, and WeaponRateFactor() does 1/g_weaponratefactor then MutatorHooks.WeaponRateFactor.Call. That hook chain has LIVE producers (BuffsMutator.cs:97, PowerupsMutator.cs:95 register it; WeaponFireGate.cs:429 is the in-hand caller), so the scaling is genuine, not a default-1 stub. Matches Base jump_interval = time + refire*W_WeaponRateFactor(actor).", result: pass }
    confidence: high
    notes: "Wave-2 CLOSED the values gap: the W_WeaponRateFactor scaling that the baseline flagged as missing (match:false) is now present and correct (helper mirrors WeaponFireGate.WeaponRateFactor, hook has live producers). Fire logic still mirrors Base structurally (dedicated high slot ~ Base weaponentities[1], refire-gated, aims from view angles). BUT the feature is STILL DEAD: the trigger signal (OffhandFirePressed / a +hook input bit) still has no producer anywhere up the input/net stack — the PORTING-PLAN's headline input-wire fix was NOT done. The same dead button still strands HookMutator's and the nade offhand-throw's +hook paths. timing kept `partial` because the vehicle/weaponUseForbidden suppression is still absent."
