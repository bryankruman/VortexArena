      - "src/XonoticGodot.Common/Gameplay/Mutators/HookMutator.cs:OnPlayerSpawn"
      - "src/XonoticGodot.Common/Framework/Registry.cs:Sort (ordinal RegistryName)"
      - "src/XonoticGodot.Common/Framework/Hooks.cs:HookChain.Add/Call (registration-order within bucket)"
    constants: []
    status:
      logic: faithful
      values: na
      timing: na
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "Registry<MutatorBase>.Sort sorts ordinal by RegistryName(=NetName). 'grappling_hook' (g=0x67) < 'offhand_blaster' (o=0x6F). MutatorActivation.Apply iterates Mutators.All in that order calling Hook()/Add; HookChain.Add appends and Call runs in registration order. So OffhandBlasterMutator.OnPlayerSpawn runs AFTER HookMutator.OnPlayerSpawn → OffhandWeapon='blaster' is the last writer, winning. Matches Base's documented override.", result: pass }
    confidence: high
    notes: "Unchanged by Wave-1/2. Precedence is deterministic and correct via the ordinal NetName sort + registration-order hook dispatch. The override only affects the OffhandWeapon assignment (live); the fire it would gate is dead for both."
