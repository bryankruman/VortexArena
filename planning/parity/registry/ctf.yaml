  worst_gaps:
    - "Stalemate DETECTION is live + faithful (CheckStalemate ticks at WPFE_THINKRATE, set/clear ladder matches Base) but still has NO visible effect: PackCtfStatus (GametypeStatusBlock.cs:184) never ORs the CTF_STALEMATE bit from ctf.Stalemate, and the enemy-FC waypoint reveal + CENTER_CTF_STALEMATE prints are absent. Wave 5 did not touch this file."
