unit: ctf
category: gametype
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-27"
summary:
  feature_count: 28
  worst_gaps:
    - "Flag model is static at base: no md3 wave/bob/rotate animation, no glow trail (g_ctf_flag_glowtrails), no dynamic team light (g_ctf_dynamiclights). Dropped/thrown/passed flags DO move under MoveType.Toss/Fly physics and the carried flag trails its carrier each tick."
    - "Capture-time PERSISTENT record (ctf_CaptureRecord ServerProgsDB write + cross-session g_ctf_leaderboard) is unported (needs a persistent DB); the in-match fastest-cap broadcast CTF_CAPTURE_TIME/_BROKEN/_UNBROKEN IS fired. The leaderboard send/record subsystem (ClientConnect/GetPressedKeys/GetRecords race_SendAll), the takedamage flag-return path (g_ctf_flag_health/_return_damage/_return_when_unreachable) and two-flag g_ctf_reverse remain unported."
    - "Pass completes as an instant transfer when viable (no physical arc / pass_directional cone) — a deliberate simplification; the flight velocity is still computed for an integrating host. VEHICLE board/leave carrier-drop is NOW wired (OnVehicleEnter/Exit, live); the PORTAL-teleport carrier-leave drop (g_ctf_portalteleport) is still not wired (the PortalTeleport hook has no port dispatch at all)."
    - "Capture shield spawns the physical ctf_captureshield push entity (model models/ctf/shield.md3, EF_ADDITIVE, force push, CENTER_CTF_CAPTURESHIELD_SHIELDED on touch) co-located with each flag; with the stock samual cfg the shield ratio is 0 (inert) by default exactly like Base, so nobody is shielded and the entity never pushes. Only missing nuance: the per-viewer same-team-hide customize (ctf_CaptureShield_Customize) is not networked."
    - "Flag-damage / return-when-unreachable (g_ctf_flag_health, _return_damage, _return_when_unreachable lava/slime/needkill health bleed) not implemented; the dropped flag is TakeDamage.Yes but carries no health. Niche CTF hooks still unported: AbortSpeedrun (CTS-in-CTF flag-return), DropSpecialItems flag-eject, LogDeath 'F' item code, GiveFragsForKill frag suppression (g_ctf_ignore_frags), followfc superspectate command, PreferPlayerScore_Clear."
