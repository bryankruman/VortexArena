summary:
  feature_count: 19
  worst_gaps:
    - "Throw / pass / request-pass are fully ported + unit-tested AND a HandleUseKey(+use) dispatcher now exists, but the server's +use rising edge (ServerNet ProvideInput) only calls VehicleBoarding.UseKey — HandleUseKey has NO caller, so a player still cannot drop/throw/pass the flag (only dying drops it)."
    - "ctf_RemovePlayer is now ported (Ctf.RemovePlayer drops the flag + clears pass/dropper back-links) but is DEAD: ClientDisconnect calls MatchController.RemovePlayer (which only removes from its own roster list, no gametype dispatch), and there is no observer/portal/vehicle hook. A leaving carrier still keeps the flag."
    - "Stalemate DETECTION is now live + faithful (CheckStalemate ticks at WPFE_THINKRATE, set/clear ladder matches Base) but has NO visible effect: PackCtfStatus never ORs the CTF_STALEMATE bit from ctf.Stalemate (constant declared, unused), and the enemy-FC waypoint reveal + CENTER_CTF_STALEMATE prints are absent."
    - "Flag model is static at base: no md3 wave/bob/rotate animation, no glow trail, no dynamic light (dropped flags now DO settle via MoveType.Toss physics)."
    - "Capture-time leaderboard/records + fastest-cap broadcast, flagcarrier damage/force factors, and auto-helpme ping remain unported."
