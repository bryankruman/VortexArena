summary:
  feature_count: 19
  worst_gaps:
    - "CTF mod-icon flag-status HUD is dead: server never sends OBJECTIVE_STATUS for CTF and client never selects ModIconsMode.Ctf — no flag icons appear in a match."
    - "Throw / pass / request-pass fully ported + unit-tested but have NO input binding — a player can never drop/throw/pass the flag (only dying drops it)."
    - "No drop on disconnect/observe/portal/vehicle (ctf_RemovePlayer unwired): a leaving carrier keeps the flag, which can get stuck."
    - "Stalemate detection (ctf_CheckStalemate / CTF_STALEMATE / enemy-FC reveal) is not implemented."
    - "Flag model is static at base: no md3 wave/bob/rotate animation, no glow trail, no dynamic light, no DropToFloor settle."
