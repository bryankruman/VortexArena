summary:
  feature_count: 7
  worst_gaps:
    - "Bot bunnyhop-disable is wired (PlayerSpawn hook zeroes the bot's skill, propagated to Nav.Skill by the per-frame BotPopulation resync, which trips the bunnyhop gate), but it zeroes the bot's WHOLE skill instead of a separate move-skill: Base gates on `skill + bot_moveskill >= offset` and only zeroes bot_moveskill, so a high-skill Base bot can still bhop; the port's `Skill=0` is both more aggressive (always under the offset) AND collaterally degrades aim/reaction/dodge/reload (all Skill-gated). Behavioral, not just cosmetic. Still open after Wave 5."
    - "BuildMutatorsPrettyString (`, Midair`) override exists but is NEVER consumed: MutatorActivation.BuildMutatorsPrettyString has no live caller (Base consumes it at server/client.qc:1107 for the per-client active-mutators display string). The machine string (`:midair`) was FIXED in Wave 5 — it now flows MutatorActivation.BuildMutatorsString -> GameWorld.cs:867 -> GameLog.Init (gated on sv_eventlog, default 0 in both Base and port, so faithful liveness) — but the pretty/display half is still missing a consumer."
