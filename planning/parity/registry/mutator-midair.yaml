unit: mutator-midair
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 7
  worst_gaps:
    - "Bot bunnyhop-disable (bot_moveskill=0 on spawn) is not implemented: MidairMutator has no PlayerSpawn hook and the port has no bot_moveskill field, so port bots keep bunnyhopping and hug the ground (staying permanently shielded) instead of being forced airborne/huntable."
    - "BuildMutatorsString/BuildMutatorsPrettyString (`:midair` / `, Midair`) are not produced: the port's only mutator-list analog is GameLog.Init's `:gameinfo:mutators:LIST`, which GameWorld.cs:673 calls with NO mutators arg (always empty); there is no server-browser/scoreboard mutator label at all, so an active midair is invisible in match metadata."
    - "Setting g_midair_shieldtime 0 or g_midair_damagemultiplier 0 (both valid Base configs) is ignored by the port's `if (x != 0f)` Hook-time override, falling back to C# field defaults (0.5 / 1) instead of the configured 0; the ShieldTime field default 0.5 also disagrees with Base's 0.3."
    - "g_midair_* cvars are cached once at Hook() instead of read live each frame as in Base, so a mid-match cvar change does not take effect until re-hook."
