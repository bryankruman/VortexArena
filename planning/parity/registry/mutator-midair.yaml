  - id: mutator-midair.bot.disable_bunnyhop
    name: "Disable bot bunnyhopping on spawn (bot_moveskill = 0)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/midair/sv_midair.qc:40-46 (MUTATOR_HOOKFUNCTION(midair, PlayerSpawn): if(IS_BOT_CLIENT(player)) player.bot_moveskill = 0)"
      - "server/bot/default/havocbot/havocbot.qc:1315 (skill + bot_moveskill >= bot_ai_bunnyhop_skilloffset)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MidairMutator.cs:105-110 (OnPlayerSpawn -> bot.BotMoveSkill = 0)"
      - "src/XonoticGodot.Common/Gameplay/Player/Player.cs:101 (BotMoveSkill field — separate move-skill, QC .bot_moveskill)"
      - "src/XonoticGodot.Server/ClientManager.cs:749 (MutatorHooks.PlayerSpawn.Call)"
      - "src/XonoticGodot.Server/Bot/BotPopulation.cs:153 (per-frame resync BotMoveSkill -> Nav.MoveSkill)"
      - "src/XonoticGodot.Server/Bot/BotNavigation.cs:391 (Nav.MoveSkill field), :484 (bunnyhop gate Skill + MoveSkill < bot_ai_bunnyhop_skilloffset=7)"
    constants:
      - { name: "bot_moveskill", base: "0 (forced on midair spawn; separate from skill)", port: "0 (BotMoveSkill zeroed; BotSkill left intact)", match: true }
      - { name: "bunnyhop gate", base: "skill + bot_moveskill >= 7", port: "Skill + MoveSkill >= 7 (bot_ai_bunnyhop_skilloffset)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code, ref: "OnPlayerSpawn (MidairMutator.cs:105-110) sets bot.BotMoveSkill=0 (separate field Player.cs:101, BotSkill untouched); live via PlayerSpawn.Call (ClientManager.cs:749); BotPopulation.cs:153 copies BotMoveSkill->Nav.MoveSkill each think; BotNavigation.cs:484 gates bhop on `Skill + MoveSkill < skillOffset` (offset bot_ai_bunnyhop_skilloffset, ships 7) — matches Base havocbot.qc:1315 `skill + bot_moveskill >= offset`.", result: pass }
    confidence: high
    notes: "FIXED to faithful (was logic/values partial). The port now has a SEPARATE BotMoveSkill field (Player.cs:92) mirroring QC .bot_moveskill, with a matching Nav.MoveSkill term (BotNavigation.cs:331). OnPlayerSpawn zeroes only BotMoveSkill and leaves BotSkill intact, so the bot's aim/reaction/dodge/reload (all BotSkill-gated) are unaffected — the prior collateral-over-reach gap is gone. The bunnyhop gate is now `Skill + MoveSkill < skillOffset` (BotNavigation.cs:346), exactly Base's `skill + bot_moveskill >= bot_ai_bunnyhop_skilloffset`, so a high-skill Base-equivalent bot with a configured moveskill keeping the sum >= 7 would still bhop — the prior over-aggressive `0 >= 7 always-false` divergence is gone. The per-frame BotPopulation resync (148-153) now propagates the separate BotMoveSkill -> Nav.MoveSkill, so midair's spawn-time zero is preserved through the resync (a console `skill N` only writes BotSkill, leaving the zeroed BotMoveSkill in place). Behaviorally and value-faithful to Base."

