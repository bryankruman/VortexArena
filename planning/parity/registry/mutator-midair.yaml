summary:
  feature_count: 7
  worst_gaps:
    - "Bot bunnyhop-disable is now wired (PlayerSpawn hook zeroes the bot's skill, propagated to Nav.Skill by the per-frame BotPopulation resync, which trips the bunnyhop gate), but it zeroes the bot's WHOLE skill instead of a separate move-skill: Base gates on `skill + bot_moveskill >= offset` and only zeroes bot_moveskill, so a high-skill Base bot can still bhop; the port's `Skill=0` is both more aggressive (always under the offset) AND collaterally degrades aim/reaction/dodge/reload (all Skill-gated). Behavioral, not just cosmetic."
    - "BuildMutatorsString/BuildMutatorsPrettyString (`:midair` / `, Midair`) are STILL not produced: GameWorld.cs:717 still calls GameLog.Init with NO mutators arg (defaults null), so the `:gameinfo:mutators:LIST` line is always empty and an active midair is invisible in match metadata. Unchanged by Wave-1/2."
