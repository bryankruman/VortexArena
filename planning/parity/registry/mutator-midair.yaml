  - id: mutator-midair.bot.disable_bunnyhop
    name: "Disable bot bunnyhopping on spawn (bot_moveskill = 0)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/midair/sv_midair.qc:40-46 (MUTATOR_HOOKFUNCTION(midair, PlayerSpawn): if(IS_BOT_CLIENT(player)) player.bot_moveskill = 0)"
      - "server/bot/default/havocbot/havocbot.qc:1315 (skill + bot_moveskill >= bot_ai_bunnyhop_skilloffset)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/MidairMutator.cs:104 (OnPlayerSpawn -> bot.BotSkill = 0)"
      - "src/XonoticGodot.Server/ClientManager.cs:649 (MutatorHooks.PlayerSpawn.Call)"
      - "src/XonoticGodot.Server/Bot/BotPopulation.cs:148-152 (per-frame resync BotSkill -> Nav.Skill)"
      - "src/XonoticGodot.Server/Bot/BotNavigation.cs:336-337 (bunnyhop skill gate vs bot_ai_bunnyhop_skilloffset=7)"
    constants:
      - { name: "bot_moveskill", base: "0 (forced on midair spawn; separate from skill)", port: "no separate field — zeroes whole BotSkill instead", match: false }
      - { name: "bunnyhop gate", base: "skill + bot_moveskill >= 7", port: "Nav.Skill >= 7 (no moveskill term)", match: false }
    status:
      logic: partial
      values: partial
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Port has no separate bot_moveskill field, so OnPlayerSpawn zeroes the bot's ENTIRE skill (Player.BotSkill = 0). Base only zeroes bot_moveskill and leaves `skill` (aim/reaction) intact; its bunnyhop gate is `skill + bot_moveskill >= offset`, so a Base bot with skill >= 7 STILL bunnyhops even with moveskill 0. The port's gate becomes `0 >= 7` = always false, disabling bunnyhop unconditionally — more aggressive than Base."
      - "Collateral over-reach: BotBrain keys aim error, reaction interval, dodge cadence, reload-on-purpose (Skill<2/<5 gates) and roles off the same Skill, so zeroing it makes midair bots not just ground-hugging-free but markedly dumber than Base's midair bots (whose aim/reflexes are unchanged). A faithful port would add a separate move-skill term to the gate rather than zero the whole skill."
      - "The zero persists for the whole match: every respawn re-zeroes BotSkill, and the per-frame BotPopulation resync (148-152) keeps Nav.Skill at 0; a console `skill N` change would overwrite it back up (BotPopulation:146) until the next respawn re-zeroes — a minor extra divergence from Base, which re-applies bot_moveskill=0 on every spawn independent of skill."
    verification:
      - { kind: code, ref: "OnPlayerSpawn (MidairMutator.cs:104-108) sets bot.BotSkill=0; live via ClientManager.cs:649; BotPopulation.cs:151-152 copies BotSkill->Skill/Nav.Skill every think; BotNavigation.cs:337 gates bhop on Nav.Skill >= 7. Base gate at havocbot.qc:1315 adds bot_moveskill term, absent in port.", result: pass }
    confidence: high
    notes: "FIXED to LIVE in Wave-2 (was missing/na): the PlayerSpawn hook is now subscribed, fired on the real spawn path, and the per-frame resync genuinely propagates BotSkill=0 into the bunnyhop gate so the bot stops bunnyhopping as intended. But it is logic/values-partial, not faithful: the port lacks a separate bot_moveskill field and instead nukes the whole skill, which (a) disables bhop more aggressively than Base's skill+moveskill gate and (b) collaterally degrades aim/reaction/dodge/reload. Net effect (bots stay airborne/huntable) is achieved; fidelity is not."

