summary:
  feature_count: 10
  worst_gaps:
    - "HEADLINE: the dodge mechanic is fully LIVE. PlayerPhysics.cs:249-253 writes player.MovementForward = input.MoveValues.X / MovementRight = input.MoveValues.Y / ButtonCrouch / ViewAngles (RAW, pre-frozen-clamp) immediately BEFORE the PlayerPhysics hook fires (PlayerPhysics.cs:261 MutatorHooks.PlayerPhysics.Call). The chain Movement.Move -> PlayerPhysics.Move -> bridge -> hook -> DodgingMutator.OnPlayerPhysics is live on the real match path; the mutator is activated via MutatorActivation.Apply (GameWorld.cs:614)."
    - "FIXED since 2026-06-22: the MakePlayerObserver reset is now wired. MutatorHooks.MakePlayerObserver HookChain now EXISTS (MutatorHooks.cs:47) and is dispatched live from ClientManager.cs:542 (PutObserverInServer). DodgingMutator subscribes to it (DodgingMutator.cs:104, 298-302) and calls ResetPlayer. Both Base reset triggers (PlayerSpawn + MakePlayerObserver) are now live — a player who spectates mid-dodge no longer keeps stale dodging_* fields."
    - "RESOLVED (Wave 8d): the dodge jump animation is faithful in its OBSERVABLE result. Base calls animdecide_setaction(ANIMACTION_JUMP) on the hop, but animdecide.qc:283 states verbatim 'currently, in CSQC this is the only jump detection, as the explicit jump action is never called!' — Base's own CLIENT renderer drives the jump clip off the IMPLICIT ground->air (ANIMIMPLICITSTATE_INAIR) transition, NOT the explicit server-pushed action. The port reconstructs the jump pose by the identical implicit path: the dodge does UNSET_ONGROUND + up-impulse (DodgingMutator.cs:365-366), and LocomotionBlend.SelectLegs returns Locomotion.Jump whenever !onGround (LocomotionBlend.cs:81). The explicit anim-action seam is absent server-side, but it has no distinct rendered effect in Base either, so the visible outcome is fully covered."
    - "FIXED since the last audit: BOTH per-client cvars are now replicated. cl_dodging opt-in rides ClientDodgingProvider (Commands.cs:568-569 -> GetClientCvarFloat) AND cl_dodging_timeout now has a real per-client provider too — DodgingMutator.TimeoutProvider exists (DodgingMutator.cs:93) and is installed at Commands.cs:577-578 (GetClientCvarFloat 'cl_dodging_timeout' default 0.2). TimeoutFor (DodgingMutator.cs:258-262) consults it before falling back to the server-side Timeout field, so the double-tap window is now per-client, matching Base PHYS_DODGING_TIMEOUT(s) = CS_CVAR(s).cvar_cl_dodging_timeout. The baseline's 'TimeoutProvider seam does not exist' residual is resolved."
