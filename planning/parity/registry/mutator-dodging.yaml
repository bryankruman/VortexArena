  - id: mutator-dodging.input.double_tap
    name: "Double-tap detection (PM_dodging_checkpressedkeys)"
    layer: [authority, shared]
    base_refs:
      - "common/mutators/mutator/dodging/sv_dodging.qc:151 PM_dodging_checkpressedkeys"
      - "common/mutators/mutator/dodging/sv_dodging.qc:278 PM_dodging_GetPressedKeys"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/DodgingMutator.cs:123 CheckPressedKeys"
    constants:
      - { name: "cl_dodging_timeout", base: "0.2", port: "0.2 (cl_dodging_timeout cvar; server-side, NOT per-client)", match: true }
    status:
      logic: partial
      values: faithful
      timing: unknown
      presentation: na
      audio: na
      liveness: dead
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Reads player.MovementForward / player.MovementRight for the wish-move, but those Entity fields are NEVER written anywhere in the port (verified: zero `MovementForward =` / `MovementRight =` assignments in src/**; only reads in Dodging/Multijump/Bugrigs). Live input flows through IMovementInput.MoveValues into PlayerPhysics.Move and is never copied onto the Entity fields. They stay 0, so all four direction branches are false and no dodge is ever detected."
      - "Entity.PressedKeys is only ever written by this mutator itself (DodgingMutator.cs:190), never seeded by the input layer, so the previous-frame state-change test is fed stale self-authored bits."
      - "+dodge button path is unwired: DodgeButtonHeld() is hardcoded false (no input bit), so even a +dodge bind cannot trigger via this path."
      - "frozen_no_doubletap single-tap branch missing: Base forces detection (bypassing both the state-change test and the timeout) when PHYS_FROZEN && sv_dodging_frozen && !sv_dodging_frozen_doubletap. The port has no PHYS_FROZEN handling in CheckPressedKeys at all."
      - "Port adds a crouch-exclusion not in Base: `dodgeButton = (pressed & Crouch)==0 && DodgeButtonHeld()`. Base checks PHYS_INPUT_BUTTON_DODGE unconditionally. Moot while DodgeButtonHeld is always false, but a real logic divergence."
    verification:
      - { kind: code, ref: "repo-wide grep: no writes to Entity.MovementForward/MovementRight in src/**; PressedKeys written only at DodgingMutator.cs:190; DodgeButtonHeld hardcoded false at :198", result: fail }
    confidence: high
    notes: "Detection SHAPE for the doubletap is faithful (per-direction state-change test, timeout-vs-delay split, normalized tap dir). Dead because its input source fields are never populated. Multijump and bugrigs read the same dead MovementForward/Right fields — one input-bridge fix would revive all three. The CSQC pressedkeys-rebuild (PM_dodging_GetPressedKeys) is folded into the tail of CheckPressedKeys."

