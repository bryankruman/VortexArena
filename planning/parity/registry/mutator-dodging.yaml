summary:
  feature_count: 10
  worst_gaps:
    - "Dodging never triggers on the live path: the input layer never writes Entity.MovementForward/MovementRight (verified: zero assignments anywhere in src/**, only reads in Dodging/Multijump/Bugrigs) and there is no +dodge input bit, so the double-tap detector's four direction branches are always false."
    - "Frozen dodging entirely missing across all three sites: the detector has no frozen_no_doubletap single-tap branch, determine_force has no PHYS_FROZEN→horiz_force_frozen branch, and PMDodging's swimming/dead abort has no frozen-dodge bypass."
    - "Client opt-in missing: sv_dodging_clientselect + cl_dodging + REPLICATE are not implemented, so a clientselect server has no per-client dodging gate; cl_dodging cvar exists in cfg but is dead."
    - "MakePlayerObserver reset is not reachable: the MutatorHooks layer has no MakePlayerObserver hook at all, so no mutator (incl. dodging) can reset state when a player goes to spectate mid-dodge."
