unit: sv-cheats
category: server
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 19
  worst_gaps:
    - "cmd usetarget / killtarget are DEAD: the Cheats.Command switch has those cases, but neither verb is Register()ed in Commands.cs nor present in the ClientCommandRegistry allowlist (only god/notarget/noclip/fly/give are), so no client command ever routes to them."
    - "Cheat impulse GIVE_ALL (99) is DEAD: Cheats.GiveAll exists + is unit-tested but DispatchImpulse routes 'impulse N' only to vehicle + weapon impulses, so impulse 99 (and 30/140/141/142/143/148) is never matched."
    - "No CopyBody / corpse-clone mechanic (CLONE_MOVING 140 / CLONE_STANDING 142); sv_clones is an unread stub and the gating omits its clone-allowance branch."
    - "No CheatFrame per-frame hook and no Drag subsystem: cannot pick up/carry/throw entities (cheat or normal-range g_grab_range), no te_lightning1 drag beam, no dragbox/dragpoint race map editor; g_grab_range cvar exists but is never read."
    - "No SPEEDRUN_INIT/SPEEDRUN personal-waypoint, no TELEPORT (MoveToRandomMapLocation / info_autoscreenshot), no R00T radius nuke, no teleporttotarget, no pointparticles/trailparticles/make/penalty cheat commands."
