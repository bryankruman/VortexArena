summary:
  feature_count: 19
  worst_gaps:
    - "cmd usetarget / killtarget are STILL DEAD: the Cheats.Command switch has those cases (and they self-count), but neither verb is Register()ed in Commands.cs (only god/notarget/noclip/fly/give at Commands.cs:649-653) nor present in the ClientCommandRegistry allowlist (only god/notarget/noclip/fly/give at ClientCommandRegistry.cs:99), so no client command ever routes to them. Wave-5 (the only commit after the 2026-06-22 second pass) did NOT touch this unit — re-verified unchanged on the 2026-06-22 third adversarial pass."
    - "No CopyBody / corpse-clone mechanic (CLONE_MOVING 140 / CLONE_STANDING 142); sv_clones is an unread stub (Cvars.cs:352) and the gating omits its clone-allowance branch."
    - "No CheatFrame per-frame hook and no Drag subsystem: cannot pick up/carry/throw entities (cheat or normal-range g_grab_range), no te_lightning1 drag beam, no dragbox/dragpoint race map editor; g_grab_range cvar exists (Cvars.cs:350) but is never read."
    - "No SPEEDRUN_INIT/SPEEDRUN personal-waypoint, no TELEPORT (MoveToRandomMapLocation for the player / info_autoscreenshot), no R00T radius nuke, no teleporttotarget, no pointparticles/trailparticles/make/penalty cheat commands."
