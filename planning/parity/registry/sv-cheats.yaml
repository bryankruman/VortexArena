    layer: [authority]
    base_refs:
      - "server/cheats.qc:CheatsAllowed"
      - "server/cheats.qc:CheatInit"
    port_refs:
      - "src/XonoticGodot.Server/Cheats.cs:Allowed"
      - "src/XonoticGodot.Server/Cheats.cs:Init"
    constants:
      - { name: "sv_cheats (default)", base: "0", port: "0", match: true }
      - { name: "gamestart_sv_cheats snapshot at init", base: "yes", port: "yes (GameStartCheats)", match: true }
      - { name: "observer gate threshold", base: "sv_cheats>=2", port: "GameStartCheats>=2", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Missing the sv_clones clone-allowance branch (CHIMPULSE CLONE_* permitted while this.lip < sv_clones regardless of sv_cheats) — moot until the CLONE impulses exist, but the branch is absent."
      - "Missing the cheat-attempt bprintf logging when a player is refused (Base logs 'Player ... tried to use cheat impulse N / <cmd> / cheat frame N'). The port's Allowed() has no logattempt parameter and silently returns false."
    verification:
      - { kind: test, ref: "tests/XonoticGodot.Tests/ServerInfraTests.cs:Cheats_GatedBySvCheats", result: pass }
      - { kind: code, ref: "Cheats.cs:62-68 vs server/cheats.qc:59-90", result: partial }
    confidence: high
    notes: "Core gate (snapshot AND live cvar, dead block, observer<2 block, maycheat override) is faithful and live; only the clone branch and the refusal-logging are absent."

