      liveness: na
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "No round-handler gate in OnStartFrame: in round modes (Clan Arena, Freezetag, etc.) the port can roll gravity in the inter-round window before the round starts; Base suppresses it. NOT trivially fixable: there is NO global RoundHandler accessor reachable from the Common gameplay layer — RoundHandler (Common/Gameplay/GameTypes/RoundHandler.cs) is owned per-gametype, and DamageSystem.cs:470 explicitly notes 'No round handler is reachable from the pipeline.' Wiring this gate needs a new global round-state seam."
    verification:
      - { kind: code-read, ref: "OnStartFrame has no round-handler check. RoundHandler exposes Phase/RoundStartTime per instance (RoundHandler.cs:55,58) but there is no static/global accessor for the active instance (grep for static RoundHandler/Current/Active found none); DamageSystem.cs:470 confirms the round half of this same QC gate is unreachable from Common.", result: fail }
