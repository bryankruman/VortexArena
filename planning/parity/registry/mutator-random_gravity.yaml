    notes: "FIXED by Wave-1/2 (was logic:missing/timing:missing/liveness:na in the baseline). The game_starttime half of QC's pre-start suppression is now ported and live-wired via the existing GameStartTimeProvider seam. The round-handler half remains a separate open row (round_gate). gravity no longer flips during the warmup countdown on the live server path."

