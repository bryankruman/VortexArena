    gaps:
      - "No `time < game_starttime` gate in OnStartFrame: the port re-rolls sv_gravity during the pre-match warmup/countdown window, where Base suppresses it. The port comment (RandomGravityMutator.cs:62-63) claiming game_stopped is 'a faithful superset' is incorrect — game_stopped (Intermission/MatchEnded/Timeout) is NOT set during the pre-game countdown. Readily fixable: StartItem.GameStartTimeProvider exists and is already used for this exact QC gate at DamageSystem.cs:472."
    verification:
      - { kind: code-read, ref: "OnStartFrame (RandomGravityMutator.cs:55-89) has only `game_stopped` (VehicleCommon.GameStopped) + `time < _gravityDelay`; the game_starttime gate from sv_random_gravity.qc:29 is absent. StartItem.GameStartTimeProvider (StartItem.cs:37) is wired (GameWorld.cs:520) and consumed by DamageSystem.cs:472 for the same gate, so the omission is not infra-limited.", result: fail }
    confidence: high
    notes: "Real divergence: gravity flips during the warmup countdown. Cheap fix with already-present infra. liveness:na — the gate code does not exist."

