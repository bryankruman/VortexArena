  - id: random_gravity.roll.round_gate
    name: "Pre-round-start suppression gate (round active && !round started)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/random_gravity/sv_random_gravity.qc:30 if(round_handler_IsActive() && !round_handler_IsRoundStarted()) return false"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/RandomGravityMutator.cs:77 if (RoundHandler.RoundGateBlocks()) return false;"
      - "src/XonoticGodot.Common/Gameplay/GameTypes/RoundHandler.cs:41 RoundNotStartedProvider"
      - "src/XonoticGodot.Common/Gameplay/GameTypes/RoundHandler.cs:48 RoundGateBlocks() => RoundNotStartedProvider?.Invoke() ?? false"
      - "src/XonoticGodot.Server/GameWorld.cs:1584 RoundHandler.RoundNotStartedProvider = () => Rounds is { IsRoundStarted: false } (in EnableRounds; cleared to null at :2658)"
    constants: []
    status:
      logic: faithful
      values: na
      timing: faithful
      presentation: na
      audio: na
      liveness: partial
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "Liveness is partial-by-design: RoundNotStartedProvider is wired only inside GameWorld.EnableRounds (GameWorld.cs:1584), i.e. only for round-based gametypes (CA/Freezetag/round Domination/…). In non-round modes the provider is null and RoundGateBlocks() returns false — which exactly matches QC where round_handler_IsActive() is false outside round modes. So the gate is correctly inert where Base is inert, and active where Base is active. Not a defect, just mode-scoped reachability."
    verification:
      - { kind: code-read, ref: "OnStartFrame (RandomGravityMutator.cs:73-77) now performs the round-handler check via RoundHandler.RoundGateBlocks(), ordered after the game_starttime gate exactly as sv_random_gravity.qc:29-30.", result: pass }
      - { kind: code-read, ref: "RoundHandler.RoundGateBlocks() (RoundHandler.cs:48) delegates to the static RoundNotStartedProvider; the host wires it in EnableRounds (GameWorld.cs:1584) to () => Rounds is { IsRoundStarted: false } and nulls it on teardown (GameWorld.cs:2658). Rounds != NULL == round_handler_IsActive(); IsRoundStarted == round_handler_IsRoundStarted().", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT19Tests.cs sets RoundHandler.RoundNotStartedProvider inert (line ~53 comment) so the random_gravity roll tests aren't suppressed by the gate — confirms the seam is the consumed path.", result: pass }
    confidence: high
    notes: "FIXED since the 2026-06-22 baseline (was logic:missing/timing:missing/liveness:na). The global round-state seam the baseline said 'does not exist' was added: RoundHandler.RoundNotStartedProvider / RoundGateBlocks(), wired live per round-based match in GameWorld.EnableRounds. Gravity no longer rolls in the inter-round pre-start window in round modes."

