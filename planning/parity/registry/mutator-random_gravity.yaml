    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/RandomGravityMutator.cs:33 IsEnabled (Api.Cvars.GetFloat(\"g_random_gravity\") != 0)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/RandomGravityMutator.cs:41-52 Hook (subscribes _onStartFrame + MutatorActivation.SettempCvar(\"sv_gravity\", ...))"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:38 SettempCvar -> SettempCvarHandler"
      - "src/XonoticGodot.Server/GameWorld.cs:613 MutatorActivation.SettempCvarHandler = (n,v) => SettempCvars.Set(n,v)"
      - "src/XonoticGodot.Server/GameWorld.cs:614 MutatorActivation.Apply()"
    constants:
      - { name: "g_random_gravity", base: "0 (mutators.cfg:184)", port: "0 (assets/data/xonotic-data.pk3dir/mutators.cfg:184)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "IsEnabled reads g_random_gravity (RandomGravityMutator.cs:33); MutatorActivation.Apply (MutatorActivation.cs:80, called from GameWorld.cs:614) walks Mutators.All and calls Add->Hook for each enabled mutator on the live server-boot path", result: pass }
      - { kind: code-read, ref: "FIXED: MUTATOR_ONADD cvar_settemp IS now modelled. Hook() (RandomGravityMutator.cs:50-51) calls MutatorActivation.SettempCvar(\"sv_gravity\", Api.Cvars.GetString(\"sv_gravity\")); the host wires SettempCvarHandler = SettempCvars.Set at GameWorld.cs:613 (BEFORE Apply() at :614), so the original gravity is pushed onto the server's settemp restore stack and reverted at match end. Headless (unwired) falls back to a plain cvar set (MutatorActivation.cs:41) — no restore target exists there anyway, matching QC's no-op.", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT19Tests.cs:RandomGravity_SetsSvGravityWithinBounds + ByName(\"random_gravity\") not-null (booted with g_random_gravity=1)", result: pass }
    confidence: high
    notes: "FIXED since the 2026-06-22 baseline (was logic:partial). The cvar_settemp restore is now modelled via the MutatorActivation.SettempCvar seam wired to the server's SettempCvars stack. Enable predicate + live activation remain 1:1. Random Gravity has no IsEnabled mode-exclusion in Base, so the instagib/ok/arena exclusion (a gap noted for NIX) is not applicable here."

  - id: random_gravity.roll.startframe
    name: "Per-frame gravity re-roll on SV_StartFrame (formula + clamp + delay schedule)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/random_gravity/sv_random_gravity.qc:25-40 MUTATOR_HOOKFUNCTION(random_gravity, SV_StartFrame)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/RandomGravityMutator.cs:60-102 OnStartFrame"
      - "src/XonoticGodot.Server/GameWorld.cs MutatorHooks.FireStartFrame(Time) per server frame"
    constants:
      - { name: "g_random_gravity_delay", base: "3 (mutators.cfg:185)", port: "3 (mutators.cfg:185, read live via GetFloat)", match: true }
      - { name: "g_random_gravity_negative_chance", base: "0.5 (mutators.cfg:186)", port: "0.5 (mutators.cfg:186)", match: true }
      - { name: "g_random_gravity_min", base: "-2000 (mutators.cfg:187)", port: "-2000 (mutators.cfg:187)", match: true }
      - { name: "g_random_gravity_max", base: "2000 (mutators.cfg:188)", port: "2000 (mutators.cfg:188)", match: true }
      - { name: "g_random_gravity_positive", base: "1000 (mutators.cfg:189)", port: "1000 (mutators.cfg:189)", match: true }
      - { name: "g_random_gravity_negative", base: "1000 (mutators.cfg:190)", port: "1000 (mutators.cfg:190)", match: true }
      - { name: "branch1_formula (random>=neg_chance)", base: "bound(min, random() - random()*-negative, max)", port: "QMath.Bound(min, Prandom.Float() - Prandom.Float()*-negative, max)", match: true }
      - { name: "branch2_formula (else)", base: "bound(min, random()*positive, max)", port: "QMath.Bound(min, Prandom.Float()*positive, max)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "OnStartFrame (RandomGravityMutator.cs:84-95): two-branch formula + QMath.Bound clamp + _gravityDelay=time+delay vs sv_random_gravity.qc:32-37; byte-for-byte equivalent incl. the `* -negative` sign flip (C# `*` binds before unary `-`, matching QC). Two Prandom.Float() draws in QC order in branch1. game_stopped guard via VehicleCommon.GameStopped (RandomGravityMutator.cs:65).", result: pass }
      - { kind: code-read, ref: "Prandom.Float() (Math/Prandom.cs) is the seeded random() facade ([0,1) via (Next()>>8)*(1/2^24))", result: pass }
      - { kind: code-read, ref: "OnStartFrame is subscribed to MutatorHooks.SvStartFrame (Hook(), RandomGravityMutator.cs:44) and pumped every server frame by GameWorld's FireStartFrame loop", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT19Tests.cs:RandomGravity_SetsSvGravityWithinBounds (rolls all in [min,max]) + RandomGravity_RespectsDelay (no re-roll inside the delay window)", result: pass }
    confidence: high
    notes: "1:1 roll, unchanged. Branch naming in Base is counter-intuitive (both branches normally yield non-negative gravity at stock defaults; gravity only goes negative if min<0 forces the lower clamp) — ported faithfully as written. LOG_TRACE at sv_random_gravity.qc:39 is a dev trace only, no behavior, intentionally not a separate row."

