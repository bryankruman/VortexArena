      - { kind: code-read, ref: "Liveness: GameWorld.cs:550 wires StartItem.GameStartTimeProvider = () => GameStartTime in the same BuildGameWorld setup block as MutatorActivation.Apply() (:535); GameStartTime is the real countdown-end, synced from Warmup.GameStartTime (GameWorld.cs:951, :2469). The same provider is consumed live by DamageSystem.cs:509, Domination.cs:528, MonsterAI.cs:1742 — a shared, exercised seam, not dead.", result: pass }
      - { kind: code-read, ref: "Headless tests with no host wire-up read the provider as 0 so the gate is a no-op there (matches 'match already live') — the gate is correctly inert pre-wire and active on the real server path.", result: pass }
