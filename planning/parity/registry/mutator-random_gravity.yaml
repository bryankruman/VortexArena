unit: mutator-random_gravity
category: mutator
base_ref_rev: "v0.8.6-1779-g863cd3e84"
last_audited: "2026-06-22"
summary:
  feature_count: 6
  worst_gaps:
    - "Missing the round-handler gate (`round_handler_IsActive() && !round_handler_IsRoundStarted()`): in round modes (CA/Freezetag/etc.) the port can roll gravity in the inter-round pre-start window; Base suppresses it. STILL NOT fixable — there is NO global round-state seam reachable from Common (grep for any static RoundActive/IsRoundStarted provider found none; the per-gametype RoundHandler lives on the gametype, DamageSystem.cs documents the same)."
    - "MUTATOR_ONADD cvar_settemp(\"sv_gravity\", ...) is not modelled: nothing pushes/restores the original gravity, so a mutator-modified sv_gravity may leak into the next match (deferred to the host by an in-code NOTE)."
    - "BuildMutatorsString / BuildMutatorsPrettyString not implemented: 'Random gravity' / ':RandomGravity' is not advertised in the scoreboard/server-info mutator list (no generic mutator-list builder exists in the port for this unit either)."
features:
  - id: random_gravity.enable.cvar_gate
    name: "Enable gate — g_random_gravity cvar gating mutator registration + ONADD cvar_settemp"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/random_gravity/sv_random_gravity.qc:15 REGISTER_MUTATOR(random_gravity, cvar(\"g_random_gravity\"))"
      - "common/mutators/mutator/random_gravity/sv_random_gravity.qc:17-20 MUTATOR_ONADD cvar_settemp(\"sv_gravity\", cvar_string(\"sv_gravity\"))"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/RandomGravityMutator.cs:33 IsEnabled (Api.Cvars.GetFloat(\"g_random_gravity\") != 0)"
      - "src/XonoticGodot.Common/Gameplay/Mutators/RandomGravityMutator.cs:41 Hook"
      - "src/XonoticGodot.Common/Gameplay/Mutators/MutatorActivation.cs:60 Apply -> Add -> Hook"
      - "src/XonoticGodot.Server/GameWorld.cs:535 MutatorActivation.Apply()"
    constants:
      - { name: "g_random_gravity", base: "0 (mutators.cfg:184)", port: "0 (assets/data/xonotic-data.pk3dir/mutators.cfg:184)", match: true }
    status:
      logic: partial
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "MUTATOR_ONADD cvar_settemp(\"sv_gravity\", ...) is not modelled: the original sv_gravity is not pushed onto a restore stack, so a modified gravity is not guaranteed to be reverted at match end (deferred to the host via an in-code NOTE at RandomGravityMutator.cs:46-47). UNCHANGED by Wave-1/2 — no cvar_settemp/SetTemp restore exists anywhere in src/XonoticGodot.Common."
    verification:
      - { kind: code-read, ref: "IsEnabled reads g_random_gravity (RandomGravityMutator.cs:33); MutatorActivation.Apply (MutatorActivation.cs:60, called from GameWorld.cs:535) walks Mutators.All and calls Add->Hook for each enabled mutator on the live server-boot path", result: pass }
      - { kind: code-read, ref: "Hook() (RandomGravityMutator.cs:41) subscribes _onStartFrame to MutatorHooks.SvStartFrame and resets _gravityDelay; NO cvar_settemp restore is modelled (comment defers it to host) — grep cvar_settemp|SetTemp|settemp over src/XonoticGodot.Common found only the comment, no restore-stack impl", result: fail }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT19Tests.cs:RandomGravity_SetsSvGravityWithinBounds + ByName(\"random_gravity\") not-null (booted with g_random_gravity=1)", result: pass }
    confidence: high
    notes: "Enable predicate and live activation are 1:1. The only enable-side gap is the un-modelled cvar_settemp restore (logic:partial) — a real but host-deferrable defect, not a deliberate divergence. UNCHANGED since the baseline audit. Random Gravity has no IsEnabled mode-exclusion in Base, so the instagib/ok/arena exclusion (a gap noted for NIX) is not applicable here."

  - id: random_gravity.roll.startframe
    name: "Per-frame gravity re-roll on SV_StartFrame (formula + clamp + delay schedule)"
    layer: [authority]
    base_refs:
      - "common/mutators/mutator/random_gravity/sv_random_gravity.qc:25-40 MUTATOR_HOOKFUNCTION(random_gravity, SV_StartFrame)"
    port_refs:
      - "src/XonoticGodot.Common/Gameplay/Mutators/RandomGravityMutator.cs:56-97 OnStartFrame"
      - "src/XonoticGodot.Server/GameWorld.cs:992 MutatorHooks.FireStartFrame(Time)"
    constants:
      - { name: "g_random_gravity_delay", base: "3 (mutators.cfg:185)", port: "3 (mutators.cfg:185, read live via GetFloat)", match: true }
      - { name: "g_random_gravity_negative_chance", base: "0.5 (mutators.cfg:186)", port: "0.5 (mutators.cfg:186)", match: true }
      - { name: "g_random_gravity_min", base: "-2000 (mutators.cfg:187)", port: "-2000 (mutators.cfg:187)", match: true }
      - { name: "g_random_gravity_max", base: "2000 (mutators.cfg:188)", port: "2000 (mutators.cfg:188)", match: true }
      - { name: "g_random_gravity_positive", base: "1000 (mutators.cfg:189)", port: "1000 (mutators.cfg:189)", match: true }
      - { name: "g_random_gravity_negative", base: "1000 (mutators.cfg:190)", port: "1000 (mutators.cfg:190)", match: true }
      - { name: "branch1_formula (random>=neg_chance)", base: "bound(min, random() - random()*-negative, max)", port: "QMath.Bound(min, Prandom.Float() - Prandom.Float()*-negative, max)", match: true }
      - { name: "branch2_formula (else)", base: "bound(min, random()*positive, max)", port: "QMath.Bound(min, Prandom.Float()*positive, max)", match: true }
    status:
      logic: faithful
      values: faithful
      timing: faithful
      presentation: na
      audio: na
      liveness: live
    intended_divergence: false
    divergence_rationale: null
    gaps: []
    verification:
      - { kind: code-read, ref: "OnStartFrame (RandomGravityMutator.cs:78-90): two-branch formula + QMath.Bound clamp + _gravityDelay=time+delay vs sv_random_gravity.qc:32-37; byte-for-byte equivalent incl. the `* -negative` sign flip (C# `*` binds before `-`, matching QC). Two Prandom.Float() draws in QC order in branch1. UNCHANGED by Wave-2.", result: pass }
      - { kind: code-read, ref: "Prandom.Float() (Math/Prandom.cs) is the seeded random() facade ([0,1) via (Next()>>8)*(1/2^24))", result: pass }
      - { kind: code-read, ref: "FireStartFrame pumped every server frame at GameWorld.cs:992 (alongside ServerHooks.FireStartFrame at :989); line moved from baseline :943 by the Wave-2 GameWorld edits but is still pumped from the same per-frame loop", result: pass }
      - { kind: test, ref: "tests/XonoticGodot.Tests/MutatorBatchT19Tests.cs:RandomGravity_SetsSvGravityWithinBounds (rolls all in [min,max]) + RandomGravity_RespectsDelay (no re-roll inside the delay window)", result: pass }
    confidence: high
    notes: "1:1 roll. Branch naming in Base is counter-intuitive (both branches normally yield non-negative gravity at stock defaults; gravity only goes negative if min<0 forces the lower clamp) — ported faithfully as written. LOG_TRACE at sv_random_gravity.qc:39 is a dev trace only, no behavior, intentionally not a separate row. No regression from Wave-1/2."

