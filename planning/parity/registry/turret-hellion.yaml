summary:
  feature_count: 10
  worst_gaps:
    - "Missile blast radius 500 vs Base 80: HellionTurret.Attack passes radius:500 to GuidedProjectile.Launch (a misread of the player-only actor.shot_radius=500 branch in wr_think); the dead ShotRadius=80f const proves the right value was known. Base turret_projectile_explode uses owner.shot_radius=80 — port splash is 6.25x too large."
    - "Proximity-detonate / stray thresholds inflated (knock-on of radius 500): proximity g.Radius*0.2 = 100u vs Base 16u, lost-target stray-out g.Radius*5 = 2500u vs Base 400u."
    - "Death blast NOT in Base: Base turret_die has its RadiusDamage line COMMENTED OUT (sv_turrets.qc:181) — a hellion does no death explosion; the port's TurretAI.Die fires a min(ammo,50) blast Base never performs (logic divergence the draft missed)."
    - "Target-select bias weights wrong: HellionTurret.Think passes NO bias args so TurretParams defaults rangeBias=1/sameBias=1/angleBias=1/missileBias=1/playerBias=1 vs Base hellion 0.7/0.01/0.01/0/1 — most consequential: missileBias 1 vs Base 0 (port weights missiles in target scoring; Base gives them zero score)."
    - "shot_spread 0.08 not applied at launch: Base scatters launch dir normalize(dir+randomvec()*0.08); GuidedProjectile.Launch has no spread arg and launches dead-on."
    - "target_range_optimal 3000 vs Base 4500 (distance-score killzone biased nearer than Base for a long-range unit)."
    - "respawntime 60 vs Base 90 (HellionTurret.Spawn passes no respawnTime to TurretSpawn.Init, takes the generic 60 default)."
    - "track_accel_pitch/rot/blendrate use TurretParams defaults 0.5/0.5/0.35 vs hellion cfg 0.25/0.6/0.25 — fluid-inertia head slew dynamics differ."
    - "Framework targetscan_maxdelay hardcoded 0.6 in RunCombat vs Base cfg 1."
    - "No launcher head-spin animation (tr_think frame 1..6->0), no two-cannon tag_fire/tag_fire2 muzzle alternation, no te_explosion launch puff, no PROJECTILE_ROCKET trail / MIF_* flags."
