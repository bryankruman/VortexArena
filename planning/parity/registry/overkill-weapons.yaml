    - "okhmg_nadesupport still missing: HMG nade self-damage not reduced to 10%."
    - "okrpc missile: still not CSQC-networked (no visible chainsaw), not bot-dodgeable, not damagedbycontents (lava won't detonate it)."
    - "Overkill mode has no menu toggle (reachable only via ruleset/cvar) — but this MATCHES Base, so it is faithful, not a regression."
