summary:
  feature_count: 17
  worst_gaps:
    - "2026-06-27 drift re-audit: NO regressions or fixes on the 14 existing rows — the port (Ok*.cs, edited 2026-06-26) still matches the Wave-8b baseline exactly (all balance constants verified against bal-wep-xonotic.cfg:792-922; FX/casing/recoil/tracer/muzzle/impact seams all still wired LIVE). THREE newly-unmapped Base features added this pass: bot AI (wr_aim), oknex sniper zoom (wr_zoom/wr_zoomdir), and the standalone g_overkill_weapons activation path."
    - "Wave-8b CLOSED the fire/impact presentation gap across ALL FIVE OK weapons (drift since the 2026-06-25 baseline, which recorded these as missing): okmachinegun/okhmg/okshotgun/oknex/okrpc now ALL emit W_MuzzleFlash (registered EFFECT names), wr_impacteffect impact puff + impact/ricochet sound, and the bullet weapons (okmg/okhmg/okshotgun) eject casings (g_casings gate) + recoil PRNG + EFFECT_RIFLE/RIFLE_WEAK tracer. The baseline's central claim that 'okhmg/okshotgun/oknex are byte-identical to main / got NONE of the FX seam' is now STALE — they were all migrated in commit 31aa799 (Wave 8b)."
    - "okrpc shoot-down remains LIVE+faithful: OkRpc.Attack:166 calls Projectiles.MakeShootable(missile, exception:-1); correctly inert under stock g_projectiles_damage=-2, exactly like Base."
    - "STILL OPEN (okrpc online/networking subset): missile not CSQC-networked (no visible flying chainsaw, CSQCProjectile(PROJECTILE_RPC) omitted), not registered for bot dodge (IL_PUSH g_bot_dodge), and not damagedbycontents (IL_PUSH g_damagedbycontents) — lava/slime won't detonate the in-flight chainsaw even at g_projectiles_damage>=0."
    - "okhmg_nadesupport STILL missing: NadeProjectile.NadeDamage has no okhmg case, so HMG nade self-damage is not reduced to max_health*0.1."
    - "oknex charge subsystem still inert+deferred (charge default 0): velocity-charge GetPressedKeys hook, chargepool, wr_glow charge glow, SND_OK_NEX_CHARGE overcharge sound all unported (intended_divergence — matches the shipped Vortex-without-charge balance). oknex CSQC beam particle (SendCSQCVortexBeamParticle) and Yoda/Impressive announcements also still absent."
    - "Overkill mode has no menu toggle (reachable only via ruleset/cvar) — but this MATCHES Base, so it is faithful, not a regression."
