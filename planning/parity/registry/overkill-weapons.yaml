  worst_gaps:
    - "2026-06-28 re-audit (OkWeapons.cs FIRE2-anim edit, Common build green): ONE FIX, NO regressions. shared.secondary_blaster_jump: the animdecide_setaction(ANIMACTION_SHOOT,true) torso overlay is now driven on the refire_type==1 jump path (OkWeapons.FireSecondaryBlasterJump:89-93 -> AnimDecide.SetAction, the same overlay PrepareAttack latches for primary fire, networked ServerNet.cs:2052/2121 + rendered PlayerModel.cs:486). presentation missing->faithful, logic partial->faithful — the lone residual is the non-default refire_type==0 secondary-button gate nuance. This closes the last presentation gap on that row; third-person observers now see a fire pose on the blaster jump."
    - "2026-06-27 Wave-16/17 re-audit (commit b3a9c06, build green): FOUR FIXES vs the prior baseline, NO regressions. (1+2) oknex.primary_rail: the networked CSQC rail beam (EFFECT_VORTEX_BEAM/_OLD, the SAME Vortex.EmitBeam treatment, routed through the live ServerNet EffectNetSink + ClientWorld RenderSink) AND the Yoda/Impressive announcements (OkNex.Announce -> NotificationSystem.Announce) are now wired — presentation partial->faithful. (3+4) okrpc.primary_chainsaw_missile: the missile now sets BotDodge+BotDodgeRating (consumed LIVE by BotBrain.HavocbotDodge SUPERBOT scan) and DamagedByContents (consumed LIVE by GameWorld.CreatureFrameAll's per-tick contents sweep) — two of the three okrpc STILL-OPEN items closed."
    - "The other 13 rows are UNCHANGED — all balance constants still verified against bal-wep-xonotic.cfg:792-922; the Wave-8b FX/casing/recoil/tracer/muzzle/impact seams + Wave-13 bot_ai + okhmg_nadesupport all remain wired LIVE."
    - "okrpc shoot-down remains LIVE+faithful: OkRpc.Attack:179 calls Projectiles.MakeShootable(missile, exception:-1); correctly inert under stock g_projectiles_damage=-2, exactly like Base."
    - "STILL OPEN (okrpc, narrowed to ONE networking item): missile not CSQC-networked as a projectile body (no visible flying chainsaw, CSQCProjectile(PROJECTILE_RPC) omitted) + accuracy stat bookkeeping. Bot-dodge + damagedbycontents are now CLOSED."
    - "oknex charge subsystem still inert+deferred (charge default 0): velocity-charge GetPressedKeys hook, chargepool, wr_glow charge glow, SND_OK_NEX_CHARGE overcharge sound all unported (intended_divergence — matches the shipped Vortex-without-charge balance). NOTE: the CSQC beam + Yoda/Impressive are NO LONGER in this list (Wave-16 closed them)."
    - "STILL OPEN (niche): standalone g_overkill_weapons activation path (un-block the 5 OK weapons without full g_overkill) has no reader in src/; oknex ATCK2-zoom non-default branch (secondary==0) unmodeled. Both dormant at stock balance."
    - "Overkill mode has no menu toggle (reachable only via ruleset/cvar) — but this MATCHES Base, so it is faithful, not a regression."
