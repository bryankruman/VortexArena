    intended_divergence: false
    divergence_rationale: null
    gaps:
      - "NEWLY CONFIRMED (shoot-down DEAD): OkRpc sets missile.TakeDamage=Yes + missile.ProjectileDamage=Explode but NEVER calls Projectiles.MakeShootable, which is the ONLY thing that installs the GtEventDamage shim the damage pipeline dispatches (DamageSystem.EventDamage only routes non-player victims via GtEventDamage; ProjectileDamage is never invoked otherwise). So a missile that takes RadiusDamage falls into PlayerDamage/PlayerCorpseDamage (player-resource paths), never runs Explode → the chainsaw cannot be shot out of the air. W_OverkillRocketPropelledChainsaw_Damage is effectively unported. (Pre-existing; the new MakeShootable shim — used by Mortar/Devastator/etc. — was not wired into okrpc.)"
      - "STILL OPEN: missile not networked as a CSQC projectile (no visible flying chainsaw on clients) — CSQCProjectile(PROJECTILE_RPC) omitted."
      - "STILL OPEN: missile not registered for bot dodge (QC bot_dodge=true, bot_dodgerating=damage*2, IL_PUSH g_bot_dodge)."
      - "STILL OPEN: missile does NOT set damagedbycontents / IL_PUSH g_damagedbycontents, so lava/slime won't detonate the in-flight chainsaw (QC does)."
      - "STILL OPEN: no wr_impacteffect (rocket-explosion impact particle / SND_ROCKET_IMPACT)."
      - "Accuracy bookkeeping (first-hit fired/hit add, explode 'add fired back') omitted (stat-only)."
      - "Pass-through victim filter is `(Flags & Client) && TakeDamage!=No` vs QC IS_PLAYER(trace_ent): could catch a spectator client edict carrying the Client flag. Minor; corpses filtered by TakeDamage."
    verification:
      - { kind: value-diff, ref: "bal-wep-xonotic.cfg:874-895 — all 14 okrpc cvars match", result: pass }
      - { kind: code-read, ref: "OkRpc.Attack sets ProjectileDamage but no Projectiles.MakeShootable; cf. Mortar.cs:207 / Devastator.cs:205 which DO call it. DamageSystem.cs:331 only dispatches GtEventDamage for non-player victims; OkRpc never installs GtEventDamage → shoot-down dead.", result: fail }
      - { kind: code-read, ref: "OkRpc.OnThink tracebox pass-through damage2 + Explode RadiusDamage on contact/lifetime are spawned + thought LIVE (the missile flies, passes-through-damages, and explodes on touch/timeout); only the shoot-DOWN path is dead", result: pass }
    confidence: high
    notes: "Flight/pass-through/contact-explosion are faithful and live (Accel/pass-through use Api.Clock.FrameTime == fixed sim tic). logic downgraded faithful→partial and liveness live→partial because the shoot-down branch (a real QC behavior: health 25 shootable missile) does not execute. Fix is a one-liner: call Projectiles.MakeShootable(missile) after seeding health+ProjectileDamage."

