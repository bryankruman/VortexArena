  title: ''
  headline: Fixes a race condition where observer view angles fail to persist when a spectator becomes an observer due to the spectated player disconnecting.
  summary: 'Fixes a race condition where observer view angles fail to persist when a spectator becomes an observer due to the spectated player disconnecting. The issue occurs because PutObserverInServer() sets angles from the spawnpoint, but physics code executing earlier in the same frame (during PlayerPreThink) reverts them. The fix caches the target spawnpoint in a new .entity angles_ent field and re-applies angles+fixangle from that cached spawnpoint in the PlayerFrame observer block after all physics has run. Base files touched: qcsrc/server/client.qc (PutObserverInServer ~line 287-290, PlayerFrame ~3043-3050). New field: .entity angles_ent.'
  recommendation: Recommend port. The fix addresses a real playability bug (broken spectator camera angles on disconnect) in an observer-only code path. Effort is minimal (S), risk is low (isolated, no determinism impact, no hot paths), and the behavior is correctness-focused, not cosmetic. Once ported to Vortex Arena's PutObserverInServer and player frame logic, this should close a known gap in sv-client-lifecycle parity. Bryan's decision required only if gameplay impact or design rationale differs from upstream assumptions.
