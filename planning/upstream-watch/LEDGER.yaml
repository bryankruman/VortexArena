- uw: UW-0116
  title: ''
  headline: Modifies DarkPlaces loading-screen framerate throttle to call Sys_DirtyTime() ad-hoc instead of relying on host.realtime.
  summary: 'Modifies DarkPlaces loading-screen framerate throttle to call Sys_DirtyTime() ad-hoc instead of relying on host.realtime. The issue: during asset-load phases (sounds, models), synchronous load functions block Sys_Frame from executing, so host.realtime freezes. The loading screen uses this stale value to throttle FPS via scr_loadingscreen_maxfps cvar, causing it to stop updating. The fix grabs the current wall-clock time directly via Sys_DirtyTime() each frame. Touches: cl_screen.c (line ~2250 in CL_UpdateScreen). Base symbols: CL_UpdateScreen, scr_loadingscreen_maxfps (cvar), Sys_DirtyTime (engine API).'
  recommendation: 'Do not port. The fix solves a DarkPlaces engine-specific problem (synchronous asset loading blocking Sys_Frame, freezing host.realtime). Godot''s architecture does not have this race condition: the engine loop continues running asynchronously, and asset loading is either threaded or non-blocking. Our loading-screen implementation (if implemented as a feature) would use Godot''s independent timer/clock, not a port of cl_screen.c logic. Porting this would add complexity with no benefit. If a loading screen becomes a feature, design it from Godot-native primitives (e.g. Timer nodes, SceneTreeTimer).'
  relevance: low
  decision: reject
