- uw: UW-0018
  title: ''
  headline: Single-line fix to WarpZone_FindRadius's simple (non-warpzone) path to exclude warpzone_refsys entities, matching the behavior of the full recursive path.
  summary: Single-line fix to WarpZone_FindRadius's simple (non-warpzone) path to exclude warpzone_refsys entities, matching the behavior of the full recursive path. The issue was introduced when MR !1598 (commit 39dcdfa87) enabled the fast-path; the fast path removes bad entities but did not include the warpzone_refsys exclusion, creating a divergence. The fix adds the classname check to the simple_findradius loop (qcsrc/lib/warpzone/common.qc line 674) to ensure warpzone reference-system entities are never included in splash-radius queries, maintaining correctness across both code paths.
  recommendation: Accept and port. This is a correctness fix to prevent warpzone reference entities from polluting splash-radius queries in the optimized path. The issue only manifests when the fast path is taken (no warpzones in the search box), so it would be silent in most maps but cause subtle bugs in edge cases (e.g., a refsys touching the blast radius in a contrived setup). The port surface (FindRadiusWarpzone in WarpzoneRadiusQuery.cs:445 IsBadEntity logic) should mirror this exclusion when/if the simple-path fast-path optimization is ported. Current parity registry notes FindRadiusWarpzone already implements a partial is_pure blacklist (Solid.Not + empty classname); adding an explicit warpzone_refsys classname guard aligns with Base and closes a latent portal-physics bug. No dependencies; low effort; no test needed (regression is silent, covered by existing warpzone combat tests).
