  recommendation: '**Port this.** It is a genuine improvement (UX + correctness) that aligns with Vortex Arena''s goals. The scope is clear: merge join/selectteam commands, wire nospam logic, update notifications. The bot-sizing fix should be adopted independently if we port bot logic. Start with a design doc to map our current join/team command structure and confirm where the optional argument goes, then implement the port in a series: (1) argument parsing + join logic, (2) nospam field, (3) notification multiteam support. Assign to a single dev to avoid rebasing churn. Not urgent (playable without it) but high-quality (reduces complexity, improves correctness).'
