  summary: 'Fixes a bug where spectators who set a CTS/Race time could not have their stats submitted to XonStats. The fix applies three targeted changes: (1) introduces a `cts_isEliminated()` predicate to mark spectators with a ranked time as FRAGS_PLAYER_OUT_OF_GAME (matching LMS semantics); (2) calls `EliminatedPlayers_Init(cts_isEliminated)` on CTS initialization so the eliminated-status tracking entity receives updates; (3) sets `eliminatedPlayers.SendFlags |= 1` on both MakePlayerObserver and PutClientInServer transitions to resync the client-side scoreboard greying; (4) makes MakePlayerObserver return true to prevent `.frags` from being cleared by the engine (preserving the FRAGS_PLAYER_OUT_OF_GAME sentinel); and (5) updates an LMS comment to clarify the intent. Base files touched: `qcsrc/common/gamemodes/gamemode/cts/sv_cts.qc` (primary), `qcsrc/common/gamemodes/gamemode/lms/sv_lms.qc` (comment only).'
  recommendation: Accept for porting. This is a targeted bug fix for CTS spectator-stats handling that has zero drift from our existing port patterns (ClanArena and FreezeTag already use EliminatedPlayers_Init). The cts.qc changes are 10 new lines (predicate + two hook sites + initialization). Both the logic and the delivery (small, focused, upstream-clean) make this a low-risk high-value port. Assign to Wave-X CTS tasks for integration (cross-check cts.lifecycle.prepare_player parity row).
