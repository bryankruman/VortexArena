- uw: UW-0019
  title: ''
  headline: Fix uninitialized warpzone transform/shift fields in WarpZone_FindRadius.
  summary: Fix uninitialized warpzone transform/shift fields in WarpZone_FindRadius. The function reuses entity pointers across calls; after MR !1598's radius-search optimization, the per-entity warpzone_transform and warpzone_shift fields were no longer cleared between searches, leaving stale cross-portal transform data from a prior blast that could cause mispredicted splash zones on subsequent radius queries. The fix explicitly resets those fields (via WarpZone_Accumulator_Clear) on each entity found, matching the expected initialization. A hash update confirms this behavioral correction and documents the regression.
  recommendation: No action required. Upstream QC fix; port's WarpzoneRadiusQuery already exhibits the correct semantics (fresh per-hit transform, no reuse). Archive in ledger as architectural divergence confirmed safe.
