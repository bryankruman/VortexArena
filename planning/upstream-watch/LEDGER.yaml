  title: ''
  headline: Refactors forced-team system to apply g_forced_team_* cvar changes immediately (without map restart) by converting the connect-time one-shot Player_DetermineForcedTeam() into a per-check Player_GetForcedTeamIndex() query.
  summary: 'Refactors forced-team system to apply g_forced_team_* cvar changes immediately (without map restart) by converting the connect-time one-shot Player_DetermineForcedTeam() into a per-check Player_GetForcedTeamIndex() query. Separates internal forced-team (minigame spectators) from cvar-driven forcing so they don''t clobber. Improves notifications: removes generic TEAMCHANGE_NOTALLOWED, adds team-specific TEAMCHANGE_FORCEDTEAM and JOIN_PREVENT_FORCEDSPEC, renames CENTER_JOIN_PREVENT to CENTER_JOIN_PREVENT_MAXPLAYERS. Updates joinAllowed() and ClientCommand_join to query forced-team status at decision time. Simplifies admin moveplayer path (no longer temporarily clears forced-team). Affected files: qcsrc/server/teamplay.qc (90 line simplification), qcsrc/server/teamplay.qh (comment), qcsrc/server/client.qc (removes connect-time call), qcsrc/server/command/cmd.qc (reorders forced-team check before imbalance gate), qcsrc/server/command/sv_cmd.qc (removes forced-team save/restore), notifications.cfg + qcsrc/common/notifications/all.inc (new/renamed notification IDs). Base symbols: Player_DetermineForcedTeam (removed), Player_GetForcedTeamIndex (changed from simple accessor to full logic), Player_HasRealForcedTeam (now calls GetForcedTeamIndex), joinAllowed, ClientCommand_join, TeamBalance_CheckAllowedTeams, TeamBalance_JoinBestTeam, MoveToTeam (simplified).'
  recommendation: 'Accept for porting. The logic is sound and the UX improvement is valuable. Adaptation needed: ensure the port''s forced-team field/query plumbing (currently Player_DetermineForcedTeam + storage in team_forced) is refactored to call the query-on-demand pattern at each join/team-change decision point (joinAllowed, CmdJoin, etc.). The port already has the cvars registered (Cvars.cs:176-180) and force-spectate blocking (ClientManager.cs:348), so the main work is threading GetForcedTeamIndex() through the join gates and updating notification IDs. Verify: (1) force-spectate status is checked in both joinAllowed and CmdJoin paths, (2) notification routed correctly when forced to a team vs spectator, (3) the internal forced-team (minigame-set team_forced field) is NOT clobbered by cvar-based forcing (should early-out in GetForcedTeamIndex if player.team_forced != TEAM_FORCE_DEFAULT). Low risk: this is a refactor of existing plumbing, not new machinery.'
