- uw: UW-0103
  title: ''
  headline: Fixes a bug in DarkPlaces cl_input.c where the v_flipped cvar (which negates yaw for flipped view) was not applied to turn left/right input handling, causing inverted/broken controls when v_flipped=1.
  summary: 'Fixes a bug in DarkPlaces cl_input.c where the v_flipped cvar (which negates yaw for flipped view) was not applied to turn left/right input handling, causing inverted/broken controls when v_flipped=1. The fix multiplies the yaw deltas for in_left and in_right by (v_flipped.integer ? -1 : 1) in CL_AdjustAngles, so input controls are flipped consistently with the final view angle. Also cleans up spacing in three related angle-adjustment lines. Base symbols touched: CL_AdjustAngles (cl_input.c:431), in_left/in_right button handlers (cl_input.c:443-444).'
  recommendation: 'Do not port. Rationale: v_flipped is not ported to Vortex Arena (client input and view are reimplemented in C# and Godot, not QuakeC + DP engine). This is a localized DP client-input bug fix with no gameplay impact outside the quirky v_flipped mode (which is a developer/accessibility feature, not a balance/mechanic change). The principle is sound (controls must track display transforms), but the implementation is DP-specific. If Xonotic ever ships a horizontal-mirror accessibility feature in Vortex Arena, the same principle would apply at the Godot input layer, but there is no v_flipped cvar to mirror.'
