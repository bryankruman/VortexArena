  title: ''
  headline: Five interlocking QuakeC optimizations merged into data@8a677c236a69.
  summary: 'Five interlocking QuakeC optimizations merged into data@8a677c236a69. (1) Electro & Hook: damage-over-time (DOT) blast spread over `duration` seconds now ticks every 0.0625s (1/16 frame) instead of every physics tick, reducing network spam and CPU. Unified code between W_Electro_ExplodeComboThink and W_Hook_ExplodeThink; old per-entity temp fields (dmg, dmg_edge, dmg_radius, dmg_force) replaced by time-based delta calculation (dmg_last, teleport_time). (2) Fireball & Napalm: laser-play (scorch) loop optimized: squared-distance comparisons (vlen2) skip expensive sqrt except for the final winner''s weight, reusing last_dist to avoid recalc. (3) Hook bomb secondary damage interval raised 0.05s→0.0625s for consistency. (4) WarpZone_FindRadius fast-path: when no warpzones touch the query radius, use plain findradius + inline LOS filter instead of full recursive warpzone walk—huge perf win on non-warpzone maps (the common case). Removed NearestPointOnBox duplicate (reused NearestPointOnBoundingBox). (5) Weapon firing gate: removed allow-on-move-frames code path (LordHavoc comment), fire only on server frames (frametime-gated), reducing redundant fire calls. Impacts: Electro, Hook, Fireball (primary laser + secondary firemine scorch), Napalm nade, WarpZone radius queries. Base symbols: W_Electro_ExplodeComboThink, W_Hook_ExplodeThink, W_Fireball_LaserPlay, napalm_damage, WarpZone_FindRadius, PlayerThink weapon-fire gate, const ELECTRO_COMBO_OVERTIME_DELAY, HOOK_SECONDARY_DELAY.'
  recommendation: Accept and port. All five optimizations are mature (merged, tested on upstream master), algorithmically sound, and cleanly map to the C# weapon/warpzone code already ported. No balance changes, no design dependencies. Link the ported commit(s) back to the UW id and parity registry (Electro, Hook, Fireball units). This is a free perf win that keeps Vortex Arena aligned with upstream gameplay tuning. Estimate 1–2 days porting + regression testing (DOT timing replay, laser scorch LOS, WarpZone predicate coverage).
