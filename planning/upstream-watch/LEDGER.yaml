  summary: 'Refactors respawn-ghost spawning from the respawn() function to the death handler (PlayerDamage) and renames SpawnGhost() to TransmuteToGhost(). The original logic triggered when a player respawned—immediately fade the corpse, then optionally spawn a floating ghost. The refactor moves ghost-spawning to the moment of death (when autocvar_g_respawn_ghosts=1), creating a death ghost via CopyBody() that floats away, while the corpse itself always fades immediately. CopyBody() now returns the cloned entity pointer. Touches: qcsrc/server/client.qc (respawn path simplified), qcsrc/server/player.qc (TransmuteToGhost new func, CopyBody signature change), qcsrc/server/player.qh (function declarations), qcsrc/common/gamemodes/gamemode/ctf/sv_ctf.qc (flag damagedbycontents cleanup), xonotic-server.cfg + xonotic-client.cfg (cvar descriptions reworded for "death ghost" phrasing), .gitlab-ci.yml (hash bump for the test build). Base symbols: respawn, CopyBody, TransmuteToGhost (new), PlayerDamage, ctf_FlagSetup.'
  recommendation: 'Recommend **port**: this is a low-effort, high-confidence semantic improvement to an existing visual effect that aligns with Vortex Arena''s death-event architecture. No new dependencies, no netcode, no gameplay values. CopyBody''s return-type change is a minor API enhancement. The config rewording is cosmetic. Upstream has merged and shipped it with no reported issues. The only reason not to port is if Vortex Arena has intentionally diverged on ghost timing (unlikely, since the parity registry already has the client-side ghost rendering). Effort S, risk minimal — worth fitting into the next dev cycle. **Decision is Bryan''s** because it touches player-visible behavior (death moment), but I see no blocking concern.'
