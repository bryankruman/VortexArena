  summary: 'Makes video playback (cin_*) functionality optional via CONFIG_VIDEO_PLAYBACK compile flag, paralleling the existing CONFIG_VIDEO_CAPTURE mechanism. Core change (37c0641f) wraps cl_video.h includes and CL_Video_* calls in six files (cl_main.c, cl_parse.c, cl_screen.c, gl_draw.c, gl_rmain.c, host.c, keys.c, prvm_cmds.c/h) with preprocessor guards, removes cl_video.o from the default build object list, and adds a makefile flag (default disabled initially, then enabled via cc646f1a). Base symbols touched: CL_Video_Init, CL_VideoStop, CL_DrawVideo, CL_Video_Frame, CL_Video_Shutdown, VM_cin_open, VM_cin_close, VM_cin_setstate, VM_cin_getstate, VM_cin_restart, VM_CL_videoplaying (prvm_cmds.c), and builtin menu/client builtins for cin_* and videoplaying() function.'
  recommendation: '**Reject:** Video playback (cin_*) is not used anywhere in the Xonotic codebase (confirmed: zero grep matches in qcsrc/). The Vortex Arena port has no video playback on the roadmap (checked planning/TODO.md and parity registry — only T65 Video Capture exists, a different, unrelated system). DarkPlaces internals are generally n/a to the port (Godot replaces them), and this is a pure engine housekeeping change. The MR is 21 months stale with draft status and no upstream momentum. **Rationale:** Porting would add zero gameplay value, expands the engine-services facade (ADR-0009) surface for an unused subsystem, and creates maintenance debt (every future cin_* fix would require decision-making). Reject; if upstream ever does adopt this flag universally (i.e., marks CONFIG_VIDEO_CAPTURE/PLAYBACK as standard), revisit as part of a larger parity baseline refresh (T-quarterly-repin, ADR-0009 §3).'
